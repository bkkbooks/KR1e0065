body:
  text: 春秋闕疑卷四十二元鄭玉撰十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛夏四月秋宋樂大心自曹入于蕭宋公母弟辰暨仲佗石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也胡氏曰出奔陳則稱暨入于蕭以叛則稱及及非不得已之辭得已而不已者也夫事君者可貧可賤可殺而不可使為亂今不得已而輕于去國猶之可也得已不已而果于叛君則無首從之别其罪一施之故不稱暨而稱及四卿在蕭以叛而大心自曹從之其叛可知矣故不書叛而曰入于蕭入逆辭也書自陳自曹者結隣國以入叛陳與曹之罪亦著矣冬及鄭平叔還如鄭涖盟始叛晉也家氏曰自文公之霸魯事晉惟其常中間雖即楚即齊而不敢顯然與晉絶去年及齊平今又及鄭平既背晉不得不樹黨以自固焉耳許氏曰夫晉之為晉自若也定亦未有他惡而諸侯離心者政在多門貨賄讒慝汩昏其間則無以令天下極于執樂祁也十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈張氏曰墮毁也毁其所恃以為固者所以制陪臣抑私家而復强幹弱枝之勢也仲由之舉此議蓋因南蒯侯犯之叛而為三家忠謀使强臣不敢恃强以叛君陪臣不敢負固以䟦扈而上下皆順然侯犯南蒯皆以叛為季氏叔氏之害故費郈皆墮獨公歛處父方恃强以敗陽虎而孟氏用之故二邑雖墮而成獨不服雖定公圍之而卒不克也衛公孟彄帥師伐曹克郊高氏曰諸侯同叛晉而齊不能一之衛之伐曹亦自適已事而已季孫斯仲孫何忌帥師墮費仲由為季氏宰將墮三都于是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費家氏曰始城費城郈强族所以抗其君今墮郈墮費强族所以自去其疾蓋費郈有叛者故二氏以君命而墮之而成之守者猶事孟氏而不替故孟氏猶不受命劉氏意林曰諸侯僭天子而大夫强大夫執國命而陪臣叛事勢則然矣不務以所望乎下者事上則奚由順哉譬之伐木不自其根必復滋塞水不自其源必復流源與根無他在己而已矣故師行邦域之中而書之若異國然此孔子所謂不在顓臾而在蕭牆之内之意也冬大雩冬十月癸亥公㑹齊侯盟于黄十有一月丙辰朔日有食之公至自黄十有二月公圍成公至自圍成將墮成公歛處父謂孟孫墮成齊人必至于北門且成孟氏之保障也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克孫氏曰天子有天下諸侯有一國天下有逆命不服者則天子命諸侯伐之一國之邑有背叛不從則諸侯命其臣伐之故天子無伐其諸侯諸侯無討于其邑春秋之時天下無王而諸侯逆命者衆故有王而伐鄭者陪臣擅命而權在私家諸侯不得為政故有公而圍成者成魯邑而魯圍之書曰公圍成以見諸侯之失道也愚按三都之墮先儒多以為夫子與聞其事愚獨以為不然蓋夫子相定公為夾谷之㑹以禮服齊齊人憂孔子用于魯王道將復行于天下而齊之所為無所容于世矣于是歸女樂實欲沮孔子之為政而孔子遂行所謂行乎季孫三月不違者夫子仕魯得時行道不及百日其行事之可見者夾谷一㑹而已叔孫州仇仲孫何忌帥師圍郈至再而不克此時孔子已不得用十二年仲由為季氏宰于是始墮三都計孔子已不在魯矣議者謂傳稱費人攻之弗克入及公側仲尼命申句須樂頎下伐之以為證愚疑仲尼本仲由字傳寫之誤爾蓋仲由將墮三都故在公側目擊其事命申句須樂頎下伐之非必仲尼也按公山弗擾以費畔召子欲往子路曰何必公山氏之之也子曰夫召我者而豈徒哉如有用我者吾其為東周乎詳味夫子是言豈墮郈墮費云乎哉公親圍成云乎哉聖人所為有大過人者必如夾谷之㑹齊人自服侵疆自歸何煩二氏之帥師公之親圍乎學者宜深考焉不可拘于傳記之説遂惑之而不辨也十有三年春齊侯衛侯次于垂葭齊侯衛侯次于垂葭實郥氏使師伐晉將濟河諸大夫皆曰不可邴意兹曰可鋭師伐河内傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河内家氏曰齊侯次于五氏次于垂葭傳皆以為伐晉春秋惟書次而不書伐不與其伐也非謂晉不可伐也晉既失霸則凡中國諸侯能舉方伯連帥之事者皆可以修明霸業號召天下初不必求之于晉也為景公者當請命于周而徧告于諸侯之國曰晉比歲多故夏盟無主諸侯强吞弱小併大弗問臣逐君下陵上弗恤夷狄滅同盟之國視非己責弗救諸夏罔所依慿吾承王命將攘夷遏亂以修方伯連帥之職辭直而義壯孰不我從乃今日㑹某明日盟某又明日次于某其末也復悉力以救晉大夫之叛者愈行而愈陋欲以圖霸豈不難哉夏築蛇淵囿高氏曰魯政不修而非時勤民築囿志不及國矣且圍成弗克歸而為此何振之有又况魯國之囿一而已矣成築鹿囿昭築郎囿定築蛇淵囿何囿之多也大蒐于比蒲衛公孫彄帥師伐曹高氏曰衛比伐曹者曹不叛晉故也靈公志在軍旅之事不知以禮為國故亟戰如此秋晉趙鞅入于晉陽以叛晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯鄲而寘諸晉陽絶衛之道也不如侵齊而謀之乃如之而歸之于晉陽趙孟怒召午而囚諸晉陽使其從者説劍而入渉賓不可乃使告邯鄲人曰吾私有討于午也二三子唯所欲立遂殺午趙稷渉賓以邯鄲叛夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也而相與睦故不與圍邯鄲將作亂董安于聞之告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也安于曰與其害于民寧我獨死請以我説趙孟不可秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之胡氏曰趙鞅之入拒范中行也而直書曰叛何也人臣專土與君為市則是篡弑之階堅氷之戒豈無以有己之義乎後世大臣有困于讒間遷延居外不敢釋兵卒以憂死者亦未明人臣之義故爾故直書入于晉陽以叛入者不順之辭叛者不赦之罪冬晉荀寅士吉射入于朝歌以叛范臯夷無寵于范吉射而欲為亂于范氏梁嬰父嬖于知文子文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言于晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊高疆曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌胡氏曰晉主夏盟威服天下及大夫專政賄賂公行内外離析示威平丘而齊叛辭請召陵而蔡叛盟于沙鹹而鄭叛次于五氏而衛叛涖于鄭㑹于夾谷歃于黄而魯叛諸侯叛于外大夫叛于内故奔于晉陽而趙鞅叛入于朝歌而荀寅士吉射叛以晉國之大天下莫强焉邦分崩而不能守也春秋于晉事或畧而不序或賤而稱人或書侵以陋之責亦備矣至是三卿内叛直書于䇿見其效也故臧哀伯曰國家之敗由官邪也官之失德寵賂章也晉卿始禍緣衛貢也樂祁見執獻楊楯也蔡侯從吳荀寅貨也昭公弗納范鞅賂也而晉室自是不復能主盟矣故為國以義不以利春秋之大法在焉見諸行事亦可謂深切著明矣晉趙鞅歸于晉韓魏以趙氏為請十二月辛未趙鞅入于絳盟于公宫十四年梁嬰父惡董安于謂知文子曰不殺安于使終為政于趙氏趙氏必得晉國盍以其先發難也討于趙氏文子使告于趙孟曰范中行氏雖信為亂安于則發之是安于與謀亂也晉國有命始禍者死二子既伏其罪矣敢以告趙孟患之安于曰我死而晉國寧趙氏定將焉用之人誰不死吾死莫矣乃縊而死趙孟尸諸市而告于知氏曰主命戮罪人安于既伏其罪矣敢以告知伯從趙孟盟而後趙氏定祀安于于廟蘇氏曰鞅寅吉射之叛其罪均也鞅以有助故得復寅吉射以無援故終叛春秋無所與也胡氏曰叛逆人臣之大惡始禍晉國之載書既不能致辟于鞅奉行天討以警亂臣又亢不衷狥韓魏之請而使之復無政刑矣其能國乎陳氏曰歸易辭也晉無人之辭也此韓趙魏分晉之本也叛臣至于書歸則仗義不足錄矣家氏曰人臣不忌其君未有不終于為亂者也晉大夫不忌其君為日久矣衛孫林父逐君晉大夫從而羽翼之魯季氏逐君晉大夫又從而羽翼之羽翼他人之亂臣者皆有欲為亂者心也而其君㝠然無所悟一聽其所為至是而三卿俱叛夫豈一朝一夕之故哉趙鞅專殺荀寅士吉射之興兵其罪不同所以不忌其君則同也鞅挾晉陽之甲將以内向此叛也寅吉射據朝歌外交齊狄以抗其君亦叛也鞅之交在内故不旋踵而得入寅吉射之交在外故事危而難成春秋于入晉陽入朝歌皆書叛惟其公也知躒韓不信魏曼多黨趙鞅為之請復惡寅吉射攻而去之各私其私也春秋先書鞅叛繼書鞅歸言已叛之人非所得歸而歸也非謂鞅無罪而歸之于晉也薛弑其君比胡氏曰稱國以弑者當國大臣之罪也孫復以為舉國之衆皆可誅非矣三晉有國半天下若皆可誅刀鋸不亦濫乎潁川常秩曰孫復之于春秋動輒有罪蓋商鞅之法耳棄灰于道者有誅歩過六尺者有罰其不即人心逺矣愚按稱國以弑其義有二晉弑其君州蒲歸罪遭弑之君也吳弑其君僚歸罪當國大臣也薛比之弑三傳不載其事莫詳其故不敢妄為之説要之亦不出此二者之例姑闕以俟知者十有四年春衛公叔戌來奔衛趙陽出奔宋十三年春衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免于難上下同之戌也驕其亡乎富而不驕者鮮吾唯子之見驕而不亡者未之有也戌必與焉及文子卒衛侯始惡于公叔戌以其富也公叔戌又將去夫人之黨夫人愬之曰戌將為亂至是衛侯逐公孫戌與其黨故趙陽奔宋戌來奔家氏曰靈公不君南子不婦比而為惡亦既稔矣公叔戌以宗國之老起而正之乃戍之所得為非戍之所能為也人臣欲正其君者必先自正其身其身既正而後可以格君心之非而措之于善今戌也恃富而驕素無國中之譽乃欲以正君自任事不濟而速禍宜也春秋書三大夫之奔所以著衛亂之所從始胡氏曰趙陽北宫結皆戌黨也故以出奔而靈公無道不能正家以喪其大臣之罪著矣夫富者怨之府也使戌積而能散以財發身不貪人之所怨于以保其爵位倘庶幾乎二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸頓子牂欲事晉背楚而絶陳好二月楚滅頓家氏曰楚為中國患百有餘年至是始戢諸侯無從楚者頓本楚之與國嘗與夏盟召陵之㑹頓子在焉去楚而即晉正也陳以盛德之後當荆楚既衰猶比而從之不釋是亦不知䫫矣春秋書楚結陳佗連兵滅國誅楚而罪陳也啖氏曰凡書滅之書以歸及名者既責其不死位又責其無興復之志也夏衛北宫結來奔公叔戌之故也五月於越敗吳于檇李吳子光卒吳伐越越子句踐禦之陳于檇李句踐患吳之整也使死士再禽焉不動使罪人三行屬劍于頸而辭曰二君有治臣奸旗鼔不敏于君之行前不敢逃刑敢歸死遂自勁也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬傷將指取其一屨而還卒于陘去檇李七里夫差使人立于庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越哀元年吳王夫差敗越于夫椒報檇李也遂入越越子以甲楯五千保于㑹稽使大夫種因吳太宰嚭以行成吳子將許之伍員曰不可臣聞之樹徳莫如滋去疾莫如盡昔者過澆殺斟灌以伐斟鄩滅夏后相后緡方娠迯出自竇歸于有仍生少康焉為仍牧正惎澆能戒之澆使椒求之迯奔有虞為之庖正以除其害虞思于是妻之以二姚而邑諸綸有田一成有衆一旅能布其德而兆其謀以收夏衆撫其官職使女艾諜澆使季杼誘􅜦遂滅過戈復禹之績祀夏配天不失舊物今吳不如過而越大于少康或將豐之不亦難乎勾踐能親而務施施不失人親不棄勞與我同壤而世為仇讐于是乎克而弗取將又存之違天而長寇讐後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長寇讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎三月越及吳平吳之入楚也使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨逢滑當公而進曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何對曰國之有是多矣何必不復小國猶復况大國乎臣聞國之興也視民如傷是其福也其亡也以民為土芥是其禍也楚雖無德亦不艾殺其民吳日敝于兵暴骨如莾未見德焉天其或者正訓楚也禍之適吳其何日之有陳侯從之及夫差克越已修先君之怨秋八月吳侵陳修舊怨也吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我于柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宫室不觀舟車不飾衣服財用擇不取費在國天有災癘親巡其孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乘與焉勤恤其民而與之勞逸是以民不罷勞死知不曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬪嬙御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讐而用之日新夫先自敗也已安能敗我胡氏曰書敗者詐戰也定公五年於越入吳至是敗吳于檇李㑹黄池之歲越又入吳悉書于史以其告也哀之元年吳子敗越棲句踐于㑹稽之上豈獨不告而史冊不書疑仲尼削之也然則夫差之戰復父讐也非報怨也春秋削而不書以為常事其㫖㣲矣公㑹齊侯衛侯于牽公至自㑹晉人圍朝歌公㑹齊侯衛侯于脾上梁之間謀救范中行氏析成鮒小王桃甲率狄師以襲晉戰于綘中不克而還士鮒奔周小王桃甲入于朝歌張氏曰齊景公欲求伯誅晉之亂臣以正其國可也三國之君同為范中行而㑹以助不衷可乎秋齊侯宋公㑹于洮范氏故也冬十二月晉人敗范中行氏之師于潞獲籍秦高疆又敗鄭師及范氏之師于百泉許氏曰齊宋魯衛崇奬亂逆而謀動干戈大義亡矣愚按晉國天下莫强焉且世主夏盟至其衰弱諸侯猶所畏憚也故齊景圖霸睥睨逡廵而不敢進今晉國内亂三卿俱叛使齊景能因其時誅其叛逆以正君臣之分則晉猶且賴之况他國之諸侯乎一舉而霸業成矣顧乃背其君而助其臣舍其順而從其逆此所謂禽獸之行也豈可以主盟諸侯哉宜其死之日民無德而稱焉天王使石尚來歸脤公羊氏曰脤者何俎實也腥曰脤熟曰膰杜氏曰石尚天子之士石氏尚名泰山孫氏曰天子祭社稷宗廟有與諸侯共福之理此謂助祭諸侯焉魯未嘗助祭天王使石尚來歸脤非禮也衛世子蒯瞶出奔宋衛公孟彄出奔鄭衛侯為夫人南子召宋朝㑹于洮大子蒯瞶獻盂于齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭大子羞之謂戲陽速曰從我朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯瞶將殺余公執其手以登臺太子奔宋盡逐其黨故孟彄出奔鄭自鄭奔齊太子告人曰戲陽速禍余戲陽速告人曰大子則禍余太子無道使余殺其母余不許將戕于余若殺夫人將以余説余是故許而弗為以紓余死劉氏權衡曰蒯瞶雖不善謀安有此事哉且殺夫人蒯瞶獨得全乎彼所羞者以夫人名惡也如殺其母為惡愈大反不知可羞乎蓋蒯瞶聞野人之歌其心慚焉則朝而謂夫人夫人惡其斥己之淫則啼而走言大子將殺余以誣之靈公惑于南子所言必聽從故外則召宋朝而内則逐公叔戌趙陽彼不恥召宋朝固亦不難于逐蒯瞶矣此其真也不當如左氏所記又蒯瞶出乃奔宋宋南子家也蒯瞶負殺南子之名而又走入其家使真冇其事者敢乎哉此亦一證也常山劉氏曰蒯瞶出奔春秋不去其世子者衛侯之罪也南子之惡亦已甚矣其欲去世子之意亦已明矣如哀姜亂魯驪姬亂晉若此比者不鮮矣而靈公聽南子之譖謂蒯瞶欲弑其母不能為辨明以致其出奔豈非靈公之罪乎張氏曰劉氏之説發明蒯瞶不敢殺其母當合劉質夫解觀之自古讒婦之誣其子多矣故考二劉之言足以知左氏所記乃南子之讒言而非當時之實錄也愚按蒯瞶無弑母之事二劉辨之詳矣或者猶有疑于戲陽速之言謂此為當時明證殊不知讒諂面諛之人茍欲阿附其上則亦何所不至速聞夫人之啼知其欲歸罪于大子即為同謀之説迎合夫人之意誣太子以證其事之為實此姦人憸險之所為世常有之而人不之覺也太子告人曰戲陽速禍余正謂其誣已也此等之言何足信哉家氏曰自入春秋衛國再亂始以宣公納伋妻終以靈公溺南氏綱淪法斁内憂外患相乘而起以是知一身一家一國理亂脈絡相為流通聖賢六經所以垂戒殆非虚語春秋先書三大夫之奔至是遂書大子逐衛亂已成而靈公獨不悟其後子據國而拒其父臣稱兵以伐其君大亂幾亡可不懼哉可不戒哉宋公之弟辰自蕭來奔大蒐于比蒲邾子來㑹公高郵孫氏曰春秋田狩之事公行之者必書公公觀魚于常公狩于郎是也而蒐田見于經皆不曰公于是比蒲之蒐未還而邾子來㑹公足知蒐者公也然而不曰公者政在三桓非公自出也棠魚郎狩逺地則譏而隱桓之時政猶自出無三桓之專故也故皆曰公自昭之紅蒐政在三桓久矣蒐田之禮雖公自行而政之所出實由三桓也故皆曰大蒐而不曰公焉所以見公之不得為政而大夫專國之罪也城莒父及霄謝氏曰郈與費患其固而墮之莒父及霄患其不固而城之茍惟弗擇忠良而畀之以邑則二邑雖固適足以為叛人之資而已杜氏曰此年無冬史闕文十有五年春王正月邾子來朝邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰于是乎取之朝祀䘮戎于是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎家氏曰邾魯不相為下有自來矣今中國無霸諸侯擅兵魯之强家且將不利于邾故邾子以去年來㑹為未成禮復此來朝未幾奔魯之喪其卑屈抑亦甚矣而哀二年季氏卒興師夷其國春秋備書之責魯也鼷鼠食郊牛牛死改卜牛公羊氏曰不言其所食慢也穀梁氏曰不敬莫大焉二月辛丑楚子滅胡以胡子豹歸吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡胡氏曰滅人之國其罪大矣然胡子豹乘楚之約盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也國君造命不可委命者既以為有命而貪生忍辱不死于社稷則是不知命矣書以歸罪豹之不能死于位也夏五月辛亥郊謝氏曰著其失時也壬申公薨于高寢五月壬申公薨仲尼曰賜不幸而言中是使賜多言者也高氏曰定公立十五年豈不欲政自已出權不外奪乎而卒不能者以其愚蔽故季氏立之爾夫季氏藉祖父之勢僭有民柄一旦制在陽虎僅而脱禍公不能乘其衰微尊任聖賢以自固則公之愚蔽可知矣是時季孫創艾禍難勉用孔子而齊人歸其侵疆則公與季氏豈不知聖賢之可以安國而取榮耶卒之齊人歸女樂君臣共觀之遂廢朝事而孔子行蓋公之愚蔽如此鄭罕達帥師伐宋齊侯衛侯次于渠蒢鄭罕逹敗宋師于老邱齊侯衛侯次于蘧拏謀救宋也師氏曰經凡書次譏其緩不及事也然雖有不及事而尚可為聲援者如次于聶北救邢之類邢獨倚之危而不亡是以錄其功書救若夫名爲救而勢力危弱不足以為聲援徒勞民動衆以次于無用之地則今齊衛二侯是也欲救宋也既無救宋之實又無救宋之聲在宋則不知其援在鄭則不知所畏徒見其次于渠蒢而已書之者譏其無謂而徒勞也家氏曰齊桓伐楚次陘當伐而伐當次而次景不足知此邾子來奔喪公羊氏曰奔喪非禮也高郵孫氏曰禮天王崩諸侯近者奔喪遠者㑹葬魯諸侯邾滕列國而奔喪㑹葬如天王之禮春秋一切書之用見魯之强而邾滕之弱其失禮僭禮有如此者常山劉氏曰當周之衰天子崩葬諸侯皆無奔喪㑹葬之事而邾滕反行于强大之國非禮明矣秋七月壬申姒氏卒高郵孫氏曰姒氏定公之妾哀公之母禮妾母不稱夫人不書卒葬而春秋之時稍稍僭之故妾母稱夫人書卒葬同于小君而孔子皆書之以懲其僭是時哀公即位未逾年而其母未敢僭夫人之號故卒不稱夫人而書氏八月庚辰朔日有食之九月滕子來㑹葬杜氏曰諸侯㑹葬非禮也大東萊呂氏曰邾子來奔喪畏魯甚也滕差逺而大于邾故但來㑹葬此專以强弱利害為國者也丁巳葬我君定公雨不克葬戊午日下昃乃克葬葬定公雨不克襄事穀梁氏曰葬既有日不為雨止禮也雨不克葬喪不以制也乃急辭也不足乎日之辭也謝氏曰古者日旦而葬日中而虞日旦而葬敬之至也日中而虞哀之至也高氏曰日下昃則失虞之時甚矣君子之于親不忍一日而離也故葬曰虞者所以寧親也乃者難辭乃克葬者所以重孝弟之情也辛巳葬定姒高氏曰春秋自成風後妾母皆僭稱夫人譏不正也此不稱小君以子未成君故母亦未成夫人家氏曰定姒得書卒葬明其為君母也不書夫人小君著其為妾母也春秋于魯之妾母著義甚精雖不削其夫人之號亦未嘗輕與之以夫人之名特傳者求之未精耳冬城漆某氏曰漆非魯邑邾庶其以之來奔者魯受之于叛人而又勞民以城之所謂不待貶絶而罪惡見者也春秋闕疑卷四十二
