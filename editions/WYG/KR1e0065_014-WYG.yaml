body:
  text: 春秋闕疑卷十四元鄭玉撰七年春齊人伐鄭孔叔言于鄭伯曰諺有之曰心則不競何憚于病既不能强又不能弱所以斃也國危矣請下齊以救國公曰吾知其所由来矣姑少待我對曰朝不及夕何以待君胡氏曰將卑師少稱人聲罪致討曰伐鄭伯棄順効逆南與楚合而未離也故桓公復治之家氏曰所以固中國諸侯之心而逆折强楚慿陵之􅆋義之所不容己也夏小邾子来朝石氏曰此郳黎来也周武王封帝顓之後挟于邾挟之後有功于周又封其子友于郳邾魯之附庸也郳又邾之别封也莊四年郳黎来来朝書其名附庸之君稱字而郳又附庸之邑爾今来朝稱小邾子何休以為齊桓由天子進之遂以爵通義或然也鄭殺其大夫申侯五年陳轅宣仲怨鄭申侯之反已於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請于諸侯而城之美遂譖諸鄭伯曰美城其賜邑將以叛也申侯由是得罪至是鄭殺申侯以説于齊且用陳轅濤塗之譖也謝氏曰凡殺其大夫不以有罪無罪皆書罪其專殺也胡氏曰稱國以殺者罪累上也不知自反内忌聽讒而擅殺大夫信失刑矣如申侯者其見殺何也專利而不厭則足以殺其身矣師氏曰意者鄭伯以逃之故被齊伐者一再度其不能自支乃求大夫之微過者殺之以謝齊若曰始誤鄭以背齊者由斯人也於是求成而有甯母之盟焉嗚呼齊侯主盟于諸侯彼諸侯有專殺大夫者齊宜正典刑今也鄭專殺大夫以説齊齊侯乃釋不問則是齊侯使鄭專殺之矣主盟之職今果安在哉秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于甯母盟于甯母謀鄭故也管子言于齊侯曰臣聞之招攜以禮懐遠以德德禮不易無人不懐齊侯脩禮于諸侯諸侯官受方物鄭伯使太子華聽命于㑹言于齊侯曰洩氏孔氏子人氏三族實違君命君若去之以為成我以鄭為内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不奸之謂禮守命共時之謂信違此二者姦莫大焉公曰諸侯有討于鄭未㨗今茍有釁從之不亦可乎對曰君若綏之以徳加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣何懼且夫合諸侯以崇徳也㑹而列姦何以示後嗣夫諸侯之㑹其徳刑禮義無國不記記姦之位君盟替矣作而不記非盛徳也君其勿許鄭必受盟夫子華既為太子而求介于大國以弱其國亦必不免鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪于鄭冬鄭伯使請盟于齊胡安定先生曰鄭伯以逃首止之盟齊人連年伐鄭未已鄭懼欲求成于齊故先使世子受盟于甯母家氏曰管仲可謂知以禮服人者矣桓公亦可謂樂從諫知自克者使桓公從子華之言以詐而服鄭事未必濟且失諸侯今示之以禮綏之以徳鄭不旋踵而請盟是以甯母之㑹爵之曹伯班卒公子友如齊髙氏曰罷盟而聘謝不敏也能事大國如此其恭恨不移此以事天王耳冬葬曹昭公八年春王正月公㑹王人齊侯宋公衞侯許男曹伯陳世子欵盟于洮鄭伯乞盟七年冬閏月惠王崩襄王惡太叔帶之難懼不立不發䘮而告難于齊至是盟于洮謀王室也襄王定位而後發䘮鄭伯乞盟請服也公羊氏曰王人者何微者也曷為序乎諸侯之上先王命也謝氏曰洮之盟齊侯欲以服鄭也甯母之㑹世子雖受盟鄭伯猶懼見討故請盟于洮書曰乞盟賤之也首止之盟盟之善者也攘外冦安中國尊王室諸侯之所同志也文公獨以貳楚之心背盟以至啟諸侯之伐召新城之圍及其禍連不解也以世子受盟于甯母以卑辭屈體求盟于洮可謂失事大之道矣為宗廟社稷主而其始也若賤者負罪而逃盟其終也若賤者哀告而乞盟人君之徳侯伯之體替矣春秋前盟書逃後盟書乞所以著其屈辱所以罪其不智也髙氏曰夫楚為中國患乆矣而鄭先受其害也自莊十六年至僖三年凡五伐鄭與中國争衡自齊桓召陵之役兵不血刃楚自懾服然則鄭之為鄭非齊侯撫以徳禮則鄭終不知反遂為強楚之屬矣攷之于經自此鄭十七年齊侯小白卒楚人絶迹不復加兵于鄭則小白之功亦盛矣鄭伯曷可背齊而附楚邪故聖人僃書其逃盟乞盟之事既以罪鄭伯見義之不固亦以惡惠王御世之無道也愚按傳稱惠王以七年閏月崩今年正月諸侯㑹洮謀王室之難襄王位定而後發䘮若然則正月既盟二月位已定矣何至十二月始發䘮乎匿䘮期月終嵗無君豈有是理哉况春秋聖人之實録王崩天下之重事夫子安得舍崩朞之實從赴告之虚乎是盟也以鄭伯来乞盟觀之則其為謀服鄭明矣夏狄伐晉晉里克帥師梁由靡御虢射為右以敗狄于采桑梁由靡曰狄無耻從之必大克里克曰懼之而已無速衆狄虢射曰朞年狄必至示之弱矣夏狄伐晉報采桑之役也復朞月髙氏曰齊桓率諸侯以伐楚師而秦晉不至亦不强致狄知晉不與中國之㑹故敢伐之許氏曰當齊桓之隆同盟者安介立者殆矣秋七月禘于太廟用致夫人禘而致哀姜焉愚按用致夫人為無姓氏遂至紛紜左氏以為哀姜公羊以為齊媵穀梁以為立妾之辭而劉向因以為成風又有以為文姜者則權子之説也以今考之若以為齊媵則僖公賢君必不以齊媵為夫人桓公伯主必不脇人以妾為妻也若以為成風則僖公豈有為父立妻之理成風既非始嫁又非祔主安可致于廟也若以為文姜則已隔莊公一世何緣至此方祔唯以為哀姜則庶幾近之蓋哀姜之死僖公既請于齊而葬之至此復致于廟而祔之所以厯八年之乆者以哀姜與弑閔公義已絶于宗廟禮不當祔至此始强行之且以􅆺齊也故哀姜始而孫邾猶稱姜氏以明邾不當納至䘮歸自齊則去姓存氏以明齊已絶之至此不舉姓氏獨稱夫人者以明其得罪宗廟大義已絶不當祔也穀梁氏曰用者不宜用也致者不宜致也陳氏曰向曰夫人氏而不言姜見絶于其國之辭也今曰夫人而不言氏見絶于宗廟之辭也絶哀姜所以惡僖公也是故魯禘非禮也雖用之羣公之廟不書有用之羣公之廟而書者矣但曰有事譏不在用禘也必禘于太廟致哀姜也而後書譏在用禘也冬十有二月丁未天王崩髙氏曰或者去歲惠王疾不蒞政世子懼難而圖諸齊故為洮之㑹至是惠王始崩歟按厯七年閏十一月八年又閏十一月此雖置閏之失豈此年閏十一月王崩秘之至十二月乃發䘮歟然聖人作春秋必據實而書之宜以經為正九年春王正月丁丑宋公御説卒宋公疾太子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退夏公㑹宰周公齊侯宋子衞侯鄭伯許男曹伯于葵丘尋盟且修好王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受胡氏曰宰周公者以冢宰兼三公也權子曰天子之宰與世子禮異謝氏曰宰周公勢亦尊矣然非王世子比故宰周公雖序諸侯上不若王世子之殊㑹也髙郵孫氏曰春秋諸侯居䘮而盟㑹侵伐者多矣其稱子者四孔子因而書之以見其居䘮而與乎國事之罪不稱子而行者其罪又不可勝誅也髙氏曰齊侯圖霸内帥諸侯外攘冦亂經營馳驟出入上下二十餘年勞亦至矣然自服楚之後其心乃盈不能朝于京師翼戴天子與衰振治以復文武之業前此致王世子于首止今又致宰周公至葵丘且惠王方崩諸侯不㑹其䘮襄王在諒闇之中百官總已方聽政于冢宰齊侯既不帥諸侯而朝之反自相㑹以致天子之宰以天子之宰反下㑹諸侯大義乖矣故聖人不予齊侯坐致天子之宰而以宰周公主㑹為文也秋七月乙酉伯姬卒穀梁氏曰内女也未適人不卒此何以卒也許嫁笄而字之死則以成人之䘮治之髙郵孫氏曰未目其國未適他國也必書其字許嫁者也許嫁而卒者春秋書之以吾君為之服因録之也八月戊辰諸侯盟于葵丘齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無㑹也齊侯不務德而勤逺畧故北伐山戎南伐楚西為此㑹也東畧之不知西則否矣其在亂乎君務靖亂無勤于行晉侯乃還孟子曰五霸桓公為盛葵丘之㑹諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有徳三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言歸于好陸氏微㫖曰盟稱諸侯者前目後凡之義且明周公之不與盟臨江劉氏曰此一地也曷為再言葵丘善是盟也謝氏曰葵丘之盟上明先王之禁令下修列國之訓戒諸侯載事不歃血莫敢違法以歸于正邦國亦庻幾于治矣故君子美之髙郵孫氏曰葵丘之盟孟子美之以為後之諸侯皆犯其五禁蓋春秋之盛莫盛于齊桓齊桓之盟莫著于葵丘之事齊桓最髙之業春秋甚盛之際以孟子之時諸侯言之則齊桓在可褒之域校之三王之盛則齊桓又其罪人此春秋所以無褒而孟子言其有罪也甲子晉侯詭諸卒冬晉里克殺其君之子奚齊九月晉獻公卒里克㔻鄭欲納文公故以三公子之徒作亂初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以貳能欲復言而愛身乎雖無益也將焉辟之且人之欲善誰不如我我欲無貳而能謂人己乎冬十月里克殺奚齊于次荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之穀梁氏曰其君之子云者國人不子也國人不子者不正其殺世子申生而立之也胡氏曰人君擅一國之名寵為其所子則當子矣國人何為不子也民至愚而神是非好惡靡不明且公也其所子而不子者莫能使人弗之子也非所子而子之者莫能使人之亦子也晉獻公殺世子申生立奚齊矣而大臣殺奚齊詩不云乎天生烝民有物有則民之秉彝好是懿徳此言天理根于人心雖以私欲滅之而有不可滅也春秋書此以明獻公之罪抑人欲之私示天理之公為後世戒以此防民猶有欲易太子而立趙王如意致夫人之為人彘者謝氏曰奚齊雖書曰君之子以明奚齊獨君意立之然立奚齊獻公之命也里克志欲立正當與大臣諫之于初可也奚齊不可以主社稷當與顧命大臣明大義以告宗廟而後更立可也獻公既死君命定矣而又奚齊未有大惡克以廢立自任擅殺奚齊是以臣子抗先君之命也里克之亂書曰殺其君之子以罪克之逆也春秋于奚齊稱君之子而獻公立庻之惡由此見矣于君之子稱殺而里克犯君之惡由此見矣然則君命雖重行不以正則咈人心臣志雖正行不以順則淪惡逆是故以正行命者君之道也以順行正者臣之義也胡安定先生曰按文十四年五月齊侯潘卒九月齊公子商人殺其君舍舍亦未踰年之君何以不稱君之子而謂殺其君蓋嫡嗣當立雖未踰年亦稱君也十年春王正月公如齊髙氏曰公始朝齊也公朝他國皆書如著其出境也若又有故則書故重其罪也納聘觀社之類是也春秋書公如他國者三十五如京師者一而已此又罪其朝王之簡也狄滅温温子奔衞狄滅温蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衞家氏曰狄滅衞邢以来浸以强盛與荆楚交為中國患今又滅温温乃近畿之地司宼蘇公世有之蘇子叛王即狄又不能於狄是以為狄人所并蘇子信有罪矣而温近于王狄伐而滅之豈非伯主之責乎桓公日以伐戎為事置狄弗問豈非伯業之衰乎晉里克弑其君卓及其大夫荀息公羊氏曰及者累也何以書賢也何賢乎荀息荀息可謂不食其言矣家氏曰君臣之分未定以前殺之曰殺簒立之公子爾君臣之分既定以後則其殺為弑矣春秋于奚齊之死書曰殺其君之子奚齊至卓子之死則曰晉里克弑其君卓嘗求其故奚齊之死君臣之分猶未定也卓子之死君臣之分已定矣是以書法不同或曰君薨子立君臣之分猶有未定乎曰奚齊之立荀息一人立之爾非臣民之所共戴使里克于奚齊之既死即率國人迎立公子在外長且賢者以主社稷則事正理順國人無不服今乃坐視荀息遂非從邪更立卓子于君父既葬之後而殺之則為弑矣春秋錄大夫死節凡三孔父仇牧荀息是也孔父仇牧之死與其君皆死死之正也荀息者從獻公于昏為驪戎女任託孤之寄復不能其事以身死之曾何足恤而與孔父仇牧俱見録于春秋諸儒未得其説愚于公羊子之義有取焉公羊于孔父曰可謂義形于色矣于仇牧曰可謂不畏强禦矣于荀息則曰可謂不食其言矣蓋荀息之死以為合乎義則未也然則既許獻公以死雖欲不死不可也使荀息早知二子之立國人不與而力辭託孤之寄以悟其君其君不能用則是時有不必死矣既不能正諫于其始又為之任託孤之寄雖臨難茍免其可得乎聖人所取特在于能不食言若以事君大節而觀不免猶有所愧胡氏曰按外傳克者申生之傅也驪姬將殺世子而難里克使優施飲之酒而告之以其故里克聽其謀乃欲以中立自免稱疾不朝居三旬而難作是謂持禄容身速獻公殺嫡立庻之禍故成其君臣之名正其弑逆之罪雖欲辭而不受其可得乎使克明于大臣之義據經廷諍以動其君執節不貳固太子以攜其黨多為之故以變其志其濟則國之福也其不濟而死于其職亦無歉矣人臣所明者義于功不貴幸而成所立者節于死不貴幸而免克欲以中立期免而亦終不能免等死耳不死于世子而死于弑君其亦不知命之蔽哉為人臣而不知春秋之義者必陷于篡弑誅死之罪克之謂矣髙氏曰栁子厚曰春秋之進荀息非聖人之情也進荀息以甚茍免之惡也此言是矣愚按管仲荀息皆以所事不正為人所殺然荀息死之管仲不死夫子于春秋既書荀息之死以表其忠于論語復稱管仲之功而許其仁何也權子曰始與之同謀遂與之同死可也知輔之争為不義將自免以圖後功亦可也若管仲者所謂不死以圖後功者也若荀息者所謂始與同謀遂與之同死者也聖人之許與各當其可而已矣夏齊侯許男伐北戎薛氏曰當時患有大于戎者狄及晉楚是也晉滅虢滅虞狄嘗入衞迫邢前年伐晉近又滅温召陵之後楚滅弦圍許豈可置而不圖捨强圖弱守衞果如是乎所謂不務徳而勤逺畧况許方患楚而敺以伐戎非用人之道也晉殺其大夫里克九年晉郤芮使夷吾重賂秦以求入齊隰朋帥師㑹秦師納晉惠公秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讐夷吾弱不好弄能鬬不過長亦不改不識其他公謂公孫枝曰夷吾其定乎對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也又曰不僭不賊鮮不為則無好無惡不忌不克之謂也今其言多忌克難哉公曰忌則多怨又焉能克是吾利也至是周公忌父王子黨㑹齊隰朋立晉侯晉侯殺里克以説將殺里克公使謂之曰㣲子則不及此雖然子弑二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪何患無辭臣聞命矣伏劍而死于是㔻鄭聘于秦且謝緩賂故不及穀梁氏曰稱國以殺罪累上也其以累上之辭言之者殺之不以其罪也胡氏曰殺之不以其罪柰何里克所為弑為重耳也夷吾曰是又將殺我也故殺之若惠公既立而謂克曰先君命大夫為世子傅世子死非其罪大夫不知恤若奚齊者既有先君之命矣而大夫又殺之以及卓大夫雖殺之獨不念先君之命乎則克必再拜而死不復有言矣惠公乃曰又將圖寡人是殺之不以其罪也故稱國以殺而不去其官愚按既書弑君于前既誅里克之為賊復書殺大夫于後以明惠公之不能討其賊春秋推見至隱曲盡其情故曰非聖人莫能修之也秋七月冬大雨雪十有一年春晉殺其大夫㔻鄭父㔻鄭之如秦也言于秦伯曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣冬秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺㔻鄭祁舉及里㔻之黨㔻豹奔秦言于秦伯曰晉侯背大主而忌小怨民弗與也伐之必出至是晉侯使以㔻鄭之亂来告胡氏曰㔻鄭言于秦伯曰出晉君則鄭有罪矣曷為稱國以殺而不去其官惠公以私意殺里克故其黨皆懼鄭之有此謀由殺里克致之也春秋以大義公天下為誅賞故書法如此其稱國者兼罪用事大夫不能格君心之非至于多忌濫刑危其國也愚按使惠公能申明二君之弑正其罪以誅里克則里克既甘心于死不復有辭而臣下莫不震懾恐懼豈敢復有亂心㔻鄭之徒既保首領而惠公長有晉國矣安得濫刑至此而煩春秋之屢書乎夏公及夫人姜氏㑹齊侯于陽穀髙氏曰公稔聞桓莊之失而不改其轍桓親見二國之事而循其迹姜氏婦人何知焉以齊桓魯僖兩君相㑹而使婦人厠于其間何以視兩國侍御僕從之臣乎張氏曰諸侯㑹伯主而婦人與焉君臣之大義夷夏之大計凡所當講者必有所不及而般樂凟亂浸淫日長宜桓公自是伯業遂衰而魯僖之怠棄國政亦自此始矣家氏曰桓公之始伯僨齊女之無度以哀姜為首戮天下肅然知人類之所以異于禽獸者實在于是齊襄衞宣污染之習為之一掃庶乎古方伯之餘烈矣及其暮年志得而驕乃復與僖姜為陽穀與卞之㑹伯業其衰矣乎或曰此齊侯之女禮有歸寜今往㑹之不亦可乎曰歸寜當在國中此疾驅于通道大都非所謂寜也伯者一舉動諸夏之所式儀可不謹乎故春秋書法與禚㑹祝享同所以重戒于後秋八月大雩冬楚人伐黄黄人不歸楚貢楚人伐黄胡氏曰按穀梁子曰貫之盟管敬仲言於桓公江黄逺而近楚楚為利之國也若伐而不能救則無以宗諸侯矣公不聽遂與之盟管敬仲死楚伐江滅黄桓公不能救故君子閔之也逺國慕義背逆即順所謂出自幽谷􅁶于喬木春秋之所取也被兵城守更厯三時告命已至而援師不出則失救患分災攘外冦安中國之義矣滅弦滅温皆不書伐滅黄而必書者罪桓公既與盟㑹而又不能救也家氏曰管仲之慮患可謂逺矣方江黄之始来盟而已憂異時之不能救其深思逺慮豈與小智淺識之士朝不及夕者同日語乎齊不得江黄無以制楚故楚恨江黄為最深既滅弦以蕩其藩牆遂縱兵以潰其心腹齊人卒不能遣偏師之援坐視其亡然則滅黄者齊也非楚也陽穀之㑹于貫之盟本以求中國之援反以是速其亡悲夫自是而後諸侯日散伯業日衰無足稱者矣十有二年春王三月庚午日有食之夏楚人滅黄黄人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我夏楚滅黄謝氏曰黄人嘗受盟于齊矣及楚之伐黄也齊不救故楚滅黄書貫之盟陽穀之㑹于前書伐黄滅黄于後齊桓方伯之職不脩見矣胡氏曰春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難之節又無克復之志貪生畏死甘就執辱其罪為重許斯頓䍧之類是也出奔者雖不死于社稷有興復之望焉託于諸侯猶得寓禮其罪為輕弦子温子之類是也若夫國滅死于其位是得正而斃焉者矣于禮為合于時為不幸若江黄二國是也其書滅者見楚人之强罪列國之弱責方伯連帥之不脩其職使小國賢君不得其所公羊子所謂亡國之善辭上下之同力也秋七月冬十有二月丁丑陳侯杵臼卒春秋闕疑卷十四
