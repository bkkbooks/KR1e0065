body:
  text: 春秋闕疑卷五元鄭玉撰十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衞師燕師敗績宋多責賂于鄭鄭不堪命故以紀魯及齊與宋衞燕戰髙郵孫氏曰齊宋衞三國穪爵君行舉重也燕穪人微之也戰則舉重敗則穪師重衆也春秋之法居䘮穪子緣人子之心創巨痛深之時不忍即先君之爵而穪之衞侯晉卒於去年之冬於此纔三月耳猶未葬也而衞之嗣君出會諸侯而伐人之國又自穪其爵不以喪禮自持聖人據實而書之以見其罪且深疾之也胡氏曰左氏以為鄭與宋戰公羊以為宋與公戰穀梁以為紀與齊戰趙氏考據經文内兵則以紀為主而先於鄭外兵則以齊為主而先於宋獨取穀梁之説蓋齊紀者世仇也齊人合三國以攻紀魯鄭援紀而與戰戰而不地於紀也不然紀懼滅亡不暇何敢將兵越國助魯鄭以增怨乎齊為無道恃强凌弱此以紀為主何也彼為無道加兵於己必有引咎責躬之事禮義辨喻之文猶不得免焉則亦固其封疆效死以守上訴諸天子下告諸方伯連率與隣國之諸侯其必有伸之者矣不如是而憤然與戰豈已亂之道乎力同度德動則相時小國仇大國而幸勝焉禍之始也息伐鄭而亡鄭勝蔡而懼蔡敗楚而滅今紀人不度德不量力不徵辭輕與齊戰而為之援者弑君之賊篡國之人也不能保其國自此戰始春秋以紀為主省德相時自治之意也三月葬衞宣公胡氏曰葬自内錄旣與衞人戰曷為葬衞宣公怨不棄義怒不廢禮是知古人以葬為重也夏大水秋七月冬十月十有四年春正月公會鄭伯于曹十有三年來請修好至是會于曹曹人致餼髙氏曰鄭伯欲結曹好故公往會之也公與鄭伯皆篡逆之大惡天下所不容今會于曹曹之容惡可知也無氷公羊氏曰記異也胡氏曰按豳風七月周公陳王業之詩也其詞曰二之日鑿氷冲冲三之日納于凌陰四之日其蚤獻羔祭韭周官凌人之職頒氷於夏其藏之也凅陰沍寒於是乎取其出之也賓食喪祭於是乎用藏之周用之徧亦理隂陽天地之一事也髙郵孫氏曰春秋之春夏時之冬也冬而氷者陰陽之常物理之自然也冬而無氷則是陽氣不閉而陰氣不凝也洪範五行是謂常燠聖人以為政敎之差上干陰陽則陰陽乖戾故謹而書之曰無氷無不宜無也春秋書災異之法有曰無者無氷是也有曰不者不雨是也然而氷不曰不氷而謂之無雨不曰無雨而謂之不皆曲盡其微而書之也孔子於春秋委曲詳盡無一字茍然者所以傳信萬世以示人也夏五穀梁氏曰夏五傳疑也杜氏曰不書月闕文泰山孫氏曰孔子作春秋專其筆削損之益之以成大中之法豈其日月舊史之有闕者不隨而刋正之哉此云夏五無月者後人傳之脱漏耳鄭伯使其弟語來盟鄭子人來尋盟且修曹之會髙郵孫氏曰春秋諸侯使弟来者皆罪其不當使也弟而可使則命而使之可也不命而使之徒曰弟焉罪之也胡氏曰諸侯之弟兄例以字通而書名者罪其有寵愛之私非友于之義也秋八月壬申御廪災乙亥嘗髙郵孫氏曰御廪者粢盛所藏也雖尊為天子必有宗廟貴為諸侯必供粢盛故天子籍田諸侯躬耕皆所以敎民務農而親事祖襧也然而災焉公之所事者得無不敬而粢盛之用無乃闕乎四時之祭秋曰嘗春秋之八月夏時之六月也而嘗不時也御廪災終四日而嘗焉不時且不敬焉御廪之災公之不德而事祖襧之道不至也不知遇災而懼責身修德以答災異之戒遽然以災之所餘未及時而祭之蓋公無恐懼之心而黷益甚也胡氏曰御廪粢盛之所藏其新必矣何以不書營宮室以宗廟為先重本也御廪災而新則不書常事也以為常事而不書垂敎之意深矣知其説者然後知有國之急務為政之後先雖勤於工築而民不勞怨與妄興土木困民力以自奉者異矣冬十有二月丁卯齊侯祿父卒宋人以齊人蔡人衞人陳人伐鄭宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宮之椽歸為盧門之椽穀梁氏曰以者不以者也謝氏曰以用也髙氏曰宋公不道執人之卿易人之君既又求賂無厭深怨突之背已而自量其力不足以加之於是復以齊蔡衞陳之兵以伐之夫諸侯之國甲兵有制皆統乎天子乃敢私用之與私為之用以伐人之國大亂之道也宋公之罪斯為尤甚故加以焉十有五年春二月天王使家父來求車左氏曰諸侯不貢車服天子不私求財公羊氏曰王者無求求車非禮也穀梁氏曰求車非禮也求金甚矣常山劉氏曰世之治也天子命貢賦于天下而無敢不從無有求也諸侯奉貢賦于天子而無敢不恭不至于來求也世亂反此書者交譏之所以見王室之微而著諸侯之罪也胡氏曰遣使需索之謂求以喪事而求貨財已為不可況車服乎經於求賻求車求金皆書曰求垂後戒也夫上有好者下必有甚焉者矣王曰有求下觀而化諸侯必將有求以利其國大夫必將有求以利其家士庻人必將有求以利其身皇皇焉惟恐不足未至於篡弑奪攘則不厭也古之君子必昭儉德以臨照百官尊卑登降各有定數示等威眀貴賤民志既定之後皆安其分而無求兵形寢矣及侈心一動莫為防制必至於亢不衷官失德亷耻道喪寵賂日章淪於危亡而後止也觀春秋所書則見王室衰亂之由而知興廢撥亂之説矣三月乙未天王崩夏四月己巳葬齊僖公五月鄭伯突出奔蔡鄭世子忽復歸于鄭祭仲專鄭伯患之使其婿雍糾殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪公載以出曰謀及婦人宜其死也夏厲公出奔蔡六月乙亥昭公入謝氏曰突進不以正王法所不容也故出奔稱爵而復名張氏曰忽之所以得歸者以其嘗為世子也所以不稱鄭伯者以其不能君也故程子曰忽稱世子本當立者不能保其位故不爵樸鄉呂氏曰書復歸者復其位也髙氏曰突假宋之援以弟篡兄居位數年患祭仲之專將殺之為仲所覺故避仲而出聖人因其出奔故書名以絶之然突之出奔非國人絶之止避祭仲耳不書祭仲逐君何也逐君之臣其罪易知君而見逐其罪甚矣聖人之教在乎端本清源故凡諸侯之奔皆不書所逐之臣而以自奔為文所以警乎人君也君存稱世子君没稱子鄭伯既没而忽猶稱世子者何也忽之出奔不能自固其位耳人皆疑其不正故因其歸而正名曰世子以明冡適當嗣也不曰復歸則無以知其嘗有國矣許叔入于許髙郵孫氏曰隱十一年許嘗為鄭所有許之宗祀不絶而許叔居許東偏故無滅許之文至此鄭有子忽子突之亂許叔能乘其𫝑入許而復其國聖人美之故特書許叔入于許叔當許之危亡國君出奔則茍全宗祀居其東偏及鄭伯之亂兄弟爭立强臣制命則以我之全力復其國而居之聖人善其屈伸得宜進退無失也特書其字曰許叔不書其爵者未嘗有爵也不曰歸者有鄭之難不可以安而歸也謝氏曰稱入外之也莊公非以罪惡失國特以大國為之難而已蓋未絶于國人也許叔上伸正義於王下求直於大國復莊公於位而相之以治國人許叔之義也今乃乘鄭之亂幸君之危而竊有其國與盜而得之者亦奚以異哉故春秋書入而外之也愚按入有二義一曰逆辭一曰難辭使莊公而尚存則許叔當迎莊公反國而相之今擅其國而有之惡也則入為逆辭所以貶之也莊公而已卒則許叔復有其國使先祀不絶善也則入為難辭所以褒之而又見其克復之不易也今亦無所考矣然以經文觀之夫子所書既繫之國復著其字則入非有所貶乃所以見其難而褒之耳公會齊侯于艾謀定許也愚按隱十一年入許之役齊魯鄭也今許叔乘鄭之亂以復其國齊魯不興師以問之則亦已矣安得反為之會以定其位乎髙氏謂魯嘗與齊絶矣至是僖公卒襄公立公復通好焉而齊襄居喪出會越禮畔道與文姜為鳥獸之行桓公彭生之禍兆於此矣故春秋志之以齊侯為主理或然也邾人牟人葛人來朝正義曰曹使世子射姑來朝諸侯世子稱名則附庸世子稱人稱謂之等節也陳氏曰旅見非邦交之舊自參以上甚矣凡朝不勝譏莫甚於自參以上秋九月鄭伯突入于櫟鄭伯因櫟人殺檀伯而遂居櫟程子曰突非正也忽既微弱故國人君之諸侯助之書爵所以戒居正者已不能保則人取之矣書入以見義不容也謝氏曰忽雖復歸衆所不保故突入于櫟人心所在則命令隨之命令所在則君道隨之故忽雖正雖在内穪世子突雖不正雖在外穪鄭伯人心在突不在忽故也突雖爵以其非正故穪名以世子在内故書入春秋之於突也出奔名之入櫟又名之惡其不正而始終罪之固已至矣然以忽無君道人心歸突故出奔穪鄭伯入櫟穪鄭伯然則突穪鄭伯乃以忽失君道而國人從突也觀春秋前書忽歸後書突入而聖人所以罪忽而誅突責君道而存世嫡其㫖盡於此矣胡氏曰經於厲公復國削而不書獨書入於櫟何也夫制邑之死虢君共城之叛太叔皆莊公所親戒也今又城櫟而寘子元焉使昭公不立何謀國之誤也衞有蒲戚而出獻公楚有陳蔡不羮而叛棄疾末大必折有國之害也厲公復國削而不書者若曰既入於櫟則其國已復矣於以明居重馭輕强幹弱枝以身使臂之義為天下與來世之鑒也冬十有一月公會宋公衞侯陳侯於袲伐鄭會于袲謀伐鄭將納厲公也弗克而還初鄭伯將以髙渠彌為卿昭公惡之固諫不聽昭公立懼其殺已也十七年十月辛卯弑昭公而立公子亹十八年秋齊侯師於首止子亹會之髙渠彌相七月戊戌齊人殺子亹而轘髙渠彌祭仲迎鄭子于陳而立之莊十四年鄭厲公自櫟侵鄭及大陵獲傅瑕傅瑕曰茍舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公厲公入遂殺傅瑕使謂原繁曰傅瑕貳周有常刑既伏其罪矣納我而無貳心者吾皆許之上大夫之事吾願與伯父圖之且寡人出伯父無裏言入又不念寡人寡人憾焉對曰先君桓公命我先君典司宗祏社稷有主而外其心其何貳如之茍主社稷國内之民其誰不為臣臣無貳心天之制也子儀在位十四年矣而謀召君者庸非貳乎莊公之子猶有八人若皆以官爵行賂勸貳而可以濟事君其若之何臣聞命矣乃縊而死髙氏曰伐鄭者伐忽而納突也突無道篡國諸侯當伐突而恤忽今反欲出忽納突廢嫡立庻其罪大矣宋公始納突反為突所伐今又連諸侯為突伐忽無道之甚不可勝誅胡氏曰穀梁氏曰地而後伐疑詞非其疑也夫昭公雖正其才不足以君一國之人復歸於鄭日以微弱厲公雖篡其智足以結四隣之援既入於櫟日以盛强諸侯不顧是非而計其强弱始疑於輔正終變而與邪相與連兵動衆納篡國之公子故詳書其會地而後言伐以譏之也十有六年春正月公會宋公蔡侯衞侯于曹謀伐鄭也泰山孫氏曰未能納突故復會於此夏四月公會宋公衞侯陳侯蔡侯伐鄭程子曰突善結諸侯故皆為之致力屢伐鄭也髙氏曰春與曹謀而曹人不肯今又與陳侯同伐宋初伐突期於服突而已不期忽之歸也突奔而忽歸則不利於宋故宋公連年伐忽以納突以此言之鄭國之亂宋公實為之故以宋為首惡家氏曰自去冬迄今夏三書公會再出伐鄭不間以他事誅宋魯之輔篡而干正也人孰無禮義之心忽之正突之不正皦如黑白之易辨忽在外五年莫有仗義而復之者突甫入櫟五國之君翕然來會如蟻慕羶蚋集醯其故何哉蓋宋馮魯允以其所以篡者而輔人之篡不惟同惡相恤抑亦惟利是趨鄭之土田鄭之重器有以蕩揺其方寸故雖黨惡隳義彼亦有所不恤矣樸鄉呂氏曰或疑宋既以齊蔡衞陳責賂於突而伐鄭不宜今年又謀納突遂謂袲之會曹之會皆是伐突以救忽然以魯桓方與突伐宋亦不宜會宋以伐突春秋諸侯離合不常可勝辨哉今但據伐鄭二字言之則是時突在櫟忽在鄭則為伐忽明矣愚按春正月會於曹蔡先於衞夏四月伐鄭衞先於蔡夫諸侯班序自有定制猶天建地設不可亂也何俄頃之間而變易若此哉或以為以至之先後為上下夫以至之先後為上下是以利害率人而不要諸禮也當時諸侯固有為之者夫子之修春秋其肯從乎又或以為以兵之多寡為先後夫以兵之多寡為先後是以强弱率人而不要諸義也當時諸侯固有行之者夫子之修春秋安得不正之乎惟或者以為蔡自此服屬於楚故春秋貶之而列於衞下為近是然蔡之從楚亦無歲月之可考豈在是歲正月至四月之間乎姑闕之以俟知者秋七月公至自伐鄭冬城向程子曰春秋之文莫不一一意在示人如土工之事無大小莫不書之其意止欲人君重民之力也十有一月衞侯朔出奔齊初衞宣公烝於夷姜生急子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子夷姜縊宣姜與公子朔構急子公使諸齊使盜待諸莘將殺之壽子告之使行不可曰棄父命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之急子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子洩右公子職立公子黔牟惠公奔齊髙氏曰衞宣納伋之妻生壽及朔朔譖其兄伋因併壽殺之既立之後驕而無禮二公子之黨怨之朔懼而出奔遂立公子黔牟為衞侯聖人於朔之出奔特名以絶之蓋春秋之法凡諸侯不能嗣守先業上下乖離播越失地自取奔亡之禍者皆生名之朔齊甥也故奔齊樸鄉呂氏曰奔而名國非其國矣奔而不名國猶其國也鄭伯突出而世子忽入國固忽之國也衞侯朔出而公子黔牟立國非朔之國也陳氏曰此衞人立公子黔牟而後奔則其但書奔何以為自失國也春秋之法茍其道足以失國雖有篡公子亦以自致之文出之十有七年春正月丙辰公會齊侯紀侯盟于黄平齊紀且謀衞故也髙氏曰紀懼齊之見圖每為之備而齊人多詐故為此盟示之以不疑俾之弛怠而不我慮是以尋盟既退魯遂與齊戰於奚二年之後齊遂遷紀之三邑足以知盟之無益而侵伐隨之矣二月丙午公及邾儀父盟于趡尋蔑之盟也髙氏曰下有五月丙午則二月無丙午必有一誤此盟豈非諸侯有謀邾者欲求魯之援故邪觀下文可見愚按盟之未幾魯即及宋衞伐邾盟又足恃乎夏五月丙午及齊師戰于奚疆事也於是齊人侵魯疆疆吏來告公曰疆埸之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉程子曰天下有道禮樂征伐自天子出春秋之時擅相侵伐舉兵以侵伐人其罪著矣春秋直書其事而責常在被侵伐者蓋彼加兵於己則當引咎或自辨喻之以禮樂不得免焉則固其封疆告於天子方伯若忿而與戰則以與戰者為主處已絶亂之道也髙氏曰二國春方盟會而夏遽交戰彼以疆事興師而來則魯宜有以諭之凡戰由主人主人服罪則不戰矣孫氏曰戰穪及戰由我起也主戰者公也不書公諱之也六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡桓侯卒蔡人召蔡季於陳秋蔡季自陳歸於蔡髙郵孫氏曰蔡季事迹公穀皆無文惟左氏以蔡侯封人卒蔡人召蔡季於陳秋蔡季自陳歸於蔡蔡人嘉之也何休曰蔡封人無子蔡季當立封人欲立獻舞而疾季季避而之陳封人死歸反奔喪思慕三年卒無怨心故賢而字之左氏何休之意皆謂季賢故經特字之也而何休所載不出於傳記不知何從知之然其事極美可賢則與經所字之義合杜預以為桓侯無子故召季而立之季内得國人之望外有諸侯之助故書字以善其得衆穪歸以明外納杜預之意蓋謂蔡季當立為蔡君而啖趙陸氏皆以為蔡季義而後取非如當時之歸者或謀殺或奪正或本非當立國人不順惟蔡季入繼之善美而字之與杜預之説相表裏矣今按蔡世家及諸侯年表無蔡季甞立為蔡君之文又莊十年荆敗蔡師於莘以蔡侯獻舞歸中間亦無蔡季為君之文由此觀之則蔡季之歸但為蔡臣爾未甞為君也季之所以得字著於春秋當如左氏何休之説蔡季去其國以避其位入其國以終其喪一國之尊社稷之重則輕去以遜於人吾君之喪吾兄之喪則必歸焉以服其服然則為蔡季之行亦足以見取於孔子而書字於春秋也若杜預陸氏之説考之傳記則無文求之春秋又無事雖得立為君亦未足多賢不若生被其逐死服其喪之為美也況獻舞之事相去纔十年間不容蔡季卒葬與獻舞得立之迹不見於經也況世家年表皆無其事杜預陸氏失之矣春秋入之例有加自文者此蓋其國奉之以歸故書其所自以其有助焉爾其事之善惡亦皆隨而見之不繫於輕重也胡氏曰蔡季之去以道而去者也其歸以禮而歸者也公子不去國季何以去權也既歸何以不有國獻舞立矣若季者劉敞所謂智足以與權而不亂力足以得國而不居遠而不攜邇而不迫者也是以見貴於春秋癸巳葬蔡桓侯愚按五等諸侯春秋於其葬皆稱公惟蔡桓侯書本爵啖氏曰蔡季之賢為之請於王故仍其爵先儒遂以為書其一是則諸非自見書蔡桓侯則以見春秋之臣子不請於王私諡其君而稱公者皆為有罪矣啖氏之説不知何所本春秋二百四十二年列國之君書者多矣豈無賢如蔡季者一二人為其君請諡於王而獨一蔡季也朱子曰書蔡桓侯只是文誤此説為近及宋人衞人伐邾高郵孫氏曰宋衞穪人微者也髙氏曰春與儀父盟于趡今乃自背其盟同宋衞伐之是誠何心哉夫宋人者豈非弑君之黨乎自宋督弑君而賊猶未討也夫衞人豈非逐君之賊乎自衞侯見逐而賊猶在國也今公與他國弑君逐君之黨合心同黨以伐同盟之隣國則公之惡不容於世矣聖人不書公而止書及者以桓之罪顯然如此千載之下皆知其與宋衞伐邾者魯桓也不必斥言之冬十月朔日有食之髙郵孫氏曰書朔不書日孔子因舊史不能加之也十有八年春王正月胡氏曰春秋於十八年復書王明弑君之賊雖身已没而王法不得赦也又據桓十五年天王崩至是新君嗣三年之喪畢矣明弑君之賊雖在前朝而古今之惡一也然則篡弑者不容於天地之間身無存殁時無古今皆得討而不赦聖人之法嚴矣公會齊侯于濼公與夫人姜氏遂如齊春公將有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公會齊侯於濼遂及文姜如齊齊侯通焉公謫之以告張氏曰濼之會不言夫人者夫人不與行會禮也謝氏曰與者彼欲行而我從之也遂者彼欲行而我弗能制也春秋書與書遂罪其微弱也女子以幽靜為德正位於内而已故女子與外事則專修外禮則放馴致其欲必為大患文姜之弗率婦行也既與之出會於濼又與之出適于齊人君正家之道掃地盡矣女子一失防閑其亂有如此者然則閨門袵席之間可不慎哉胡氏曰與者許可之辭罪在公也按齊詩惡魯桓微弱不能防閑文姜使至淫亂為二國患而其辭曰敝笱在梁其魚唯唯齊子歸止其從如水言公於齊姜委曲順從若水從地無所不可故為亂者文姜而春秋罪桓公治其本也易曰夫夫婦婦而家道正夫不夫則婦不婦矣乾者夫道也以乘御為才坤者婦道也以順從為事易著於乾坤述其理春秋施於桓公見其用夏四月丙子公薨于齊四月丙子享公使公子彭生乘公公薨於車魯人告於齊曰寡君畏君之威不敢寜居來修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生胡氏曰魯君弑而薨者則以不地見弑今書桓公薨於齊豈不没其實乎前書公與夫人姜氏如齊後書夫人孫於齊去其姓氏則其實亦明矣髙氏曰書薨于齊而不書所薨之故不忍言也所以養臣子志而厲忠孝之心夫桓公弑君而篡其位其終亦不免見殺於人而不以討賊之辭加之者齊侯但殺魯君耳不討其弑隱之罪也聖人亦據實而書之所以絶篡弑無已之亂也丁酉公之喪至自齊髙郵孫氏曰桓公見弑於齊喪於此始自齊至告于廟故經書之也髙氏曰喪在外必至於内然後能葬故書公之喪至自齊而夫人之罪不言可知也秋七月冬十有二月己丑葬我君桓公髙氏曰穪我君别外喪也愚按春秋之法君弑賊不討則不書葬所以責臣子以討賊之事而盡其不共戴天之義也故隱公弑則不書葬今桓公亦弑而書葬者有諸己而後求諸人無諸已而後非諸人桓公弑隱公而自立不特不為君父討賊而已蓋弑君之賊也及其弑也又安可責其臣子以復讐討賊之義哉故於齊人殺公而書薨明齊人無討賊之義於桓公既弑而書葬明桓公為當討之賊此皆聖人之特筆而春秋之權衡也春秋闕疑卷五
