body:
  text: 春秋闕疑卷二十一元鄭玉撰十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒邾文公卜遷于繹史曰利于民而不利于君邾子曰茍利于民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗爲邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒自正月不雨至于秋七月大室屋壞穀梁氏曰大室猶世室也周公曰大廟伯禽曰大室羣公曰宮爲社稷之主而先君之廟壞極稱之志不敬也左氏曰大室屋壞書不共也公羊氏曰譏久不修也常山劉氏曰觀春秋之中文公事宗廟最爲不謹遂有大室屋壞之變天人之際可不畏哉胡氏曰不雨凡七月而先君之廟壞不恭甚矣師氏曰後世有大廟室壞而大臣不以爲異且謂之適㑹不可妨幸東都誠春秋之罪人也冬公如晉衛侯㑹公于沓高郵孫氏曰沓之㑹公已去魯而未至乎晉也謝氏曰衛侯來㑹故書㑹公狄侵衛十有二月己丑公及晉侯盟高氏曰公朝晉而請盟故書公及公還自晉鄭伯㑹公于棐冬公如晉朝且尋盟衛侯㑹公于沓請平于晉公還鄭伯㑹公于棐亦請平于晉公皆成之鄭伯與公宴于棐子家賦鴻鴈季文子曰寡君未免于此文子賦四月子家賦載馳之四章文子賦采薇之四章鄭伯拜公答拜高郵孫氏曰棐之㑹公已去晉而未至于魯經書還自晉者所以見公㑹鄭伯于道也家氏曰魯望國也諸夏所視儀而聽倡者也方楚人爲厥貉之次宋鄭陳皆背晉而即楚獨魯使叔彭生㑹郤缺于承筐魯可謂知所從矣今文公復如晉及晉侯盟于是衛侯于其往而㑹之于沓鄭伯及其還而㑹之于棐俱以魯爲介而求成于晉彼非有懼于晉也魯君介然不忍即夷而有以感其羞惡之心也是時晉已失諸侯因叔仲之往㑹魯君之特盟而諸侯散者復合明年遂㑹于新城魯爲倡也高氏曰鄭衛舍晉而從楚豈得已哉强弱之勢不敵滅亡之徵可待始爲一時之計爾而晉未之察季文子相魯侯爲之請成以舒兩國之禍春秋善和難故詳志之且見公一出而二國附如此惜乎其自怠也十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾高氏曰邾人特以使人不敬遽興兵以伐人之國則已甚焉邾人來也不敢近我止伐南鄙而已魯之報也往伐其國則又甚焉家氏曰魯以七年伐邾取須句邾人不能報至是忽興南鄙之師傳謂魯人弔喪不敬邾以是來討彼小國安敢責禮于大國亦修怨耳春秋聨書所以交致其責夏五月乙亥齊侯潘卒子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施于國而多聚士盡其家貸于公有司以繼之夏五月昭公卒舍即位六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城從于楚者服且謀邾也謝氏曰新城之盟晉爲盟主大夫不可先諸侯故晉趙盾叙曹伯下穀梁氏曰同者有同也同外楚也程子曰諸侯始㑹議合而後盟盟者志同故書同同懼楚也胡氏曰志諸侯同欲非强之也而宋公陳侯鄭伯在焉則知楚次厥貉三國雖從誠有弗獲已者削而不書蓋恕之也蔡不與盟果有背晉即楚之實矣夷攷晉楚行事未有以大相遠而春秋予奪如此者荆楚僭王若與同好陵蔑中華是將代宗周爲共主君臣之義滅矣可不謹乎薛氏曰踐土之㑹十九年矣晉士穀再合諸侯而功不就雖嘗潰沈而不救江之滅九年楚復伐鄭故諸侯懼而同此盟晉侯怠而大夫主之宜其不能振也陳氏曰向也扈之盟不序諸侯此其復序何諸夏之志也晉救江無功救鄭無功與秦亟戰而楚浸强交聘于中國得蔡次厥貉矣而晉遂不競于是公朝晉衛侯來㑹公還自晉鄭伯來㑹諸夏之懼矣汲汲于晉而爲此盟如之何勿序也以諸夏汲汲于晉也而徒以趙盾主是盟書曰同盟同衆辭也自幽以來未之有也則不與晉以主是盟之辭也秋七月有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂穀梁氏曰孛之爲言猶茀也高郵孫氏曰星孛之異經書之者三而皆曰有者不宜有之辭且不知其孛者何星闕所不知也胡氏曰孛者惡氣所生闇亂不明之貌也入于北斗者斗有環域天之三辰綱紀星也宋先代之後齊晉天子方伯中國紀綱禎祥妖孽隨其所感先事而著後三年宋弑昭公又二年齊弑懿公又二年晉弑靈公此三君者皆違道失德而死于亂符叔服之言天之示人顯矣史之有占明矣公至自㑹高氏曰晉人因新城之盟遂以諸侯之兵納捷菑而此先致公者見諸侯皆使卿行也自是公出皆致矣晉人納捷菑于邾弗克納邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乘納捷菑于邾邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還高氏曰捷菑爲人之子去君父而奔他國又欲藉他國之兵以歸篡其兄罪不容誅故不繫之邾也納者不當納之辭胡氏曰在易同人之九四曰乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也其趙盾之謂矣聖人以改過爲大過而不改將文過以遂非則有怙終之刑過而能悔不貳以遠罪則有遷善之美其曰弗克納見私欲不行可以爲難矣然則何以稱人大夫而置諸侯非也聞義能徙故爲之諱内以諱爲貶外以諱爲善高郵孫氏曰春秋之義可責者責之不可責者不責之春秋納諸侯者蓋皆書其君與其臣之帥師也公伐齊納子糾楚子圍陳納頓子于頓齊高偃帥師納北燕伯于陽晉趙鞅帥師納衛世子蒯瞶于戚不書其君即書其臣未有貶之曰人者晉人納捷菑于邾弗克納非其君則臣也然而不書其名則曰人者豈以晉人知捷菑之不可納畏義而反不敢以兵加邾焉爲可責而責之歟用兵者多矣齊桓之師則貶之納君者多矣晉弗克納則貶之可責者然後責之也九月甲申公孫敖卒于齊穆伯之從已氏也魯人立文伯穆伯生二子于莒而求復文伯以爲請襄仲使無朝聽命復而不出三年而盡室以復適莒文伯疾而請曰穀之子弱請立難也許之文伯卒立惠叔穆伯請重賂以求復惠叔以爲請許之將來九月卒于齊告喪請葬弗許穀梁氏曰奔大夫不言卒而言卒何也爲受其喪不可不卒也其地于外也齊公子商人弑其君舍秋七月乙卯夜齊商人弑舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾爲之齊人定懿公使來告難齊公子元不順懿公之爲政也終不曰公曰夫已氏穀梁氏曰舍立未踰年其曰君何也成舍之爲君所以重商人之弑也愚按州吁商人皆弑君之賊州吁則削其屬籍不書公子商人則存其屬籍書公子者聖人豈無意乎蓋削其屬籍使人有所畏而不敢爲欲天下之絶是禍也存其屬籍使人有所感而不忍欲天下之無是禍也不削之于前則無以杜亂臣賊子篡弑之萌不存之于後則無以啟天下後世悔悟之念春秋多變例非聖人孰能修之宋子哀來奔宋高哀爲蕭封人以爲卿不義宋公而出遂來奔左氏曰書宋子哀來奔貴之也高郵孫氏曰春秋出奔之大夫未有以字書者而子哀之奔特書其字考之于經明年宋弑其君而左氏以爲不義宋公而出然則子哀見其國之將亂不忍食其祿而無救其禍于是違而去之春秋以爲得去就之分故賢而字之也冬單伯如齊齊人執單伯齊人執子叔姬單伯如齊請子叔姬齊人執之又執子叔姬高氏曰商人弑其君而囚其母又怒單伯之來請因誣單伯以淫子叔姬而併執之春秋兩書齊人執者不可及也不可及者所以明單伯子叔姬之無是事也别而言之若二事焉所以重齊人之罪惡也明年書單伯至自齊又書齊人來歸子叔姬則知齊人執之者誣也然聖人不直書商人執而以齊人執之爲辭何也商人罪惡已著矣齊人不能討弑君之賊俱北面而事之又聽執其君母而加汚辱之名則黨惡之罪均不可赦故兩書其人所以窮逆賊之黨與而治之也十有五年春季孫行父如晉爲單伯與子叔姬故也張氏曰魯不能閒暇明政刑以義討齊而反因晉以求于齊行父爲大夫不能請討弑君之賊晉爲盟主不能奉天討于商人皆罪也三月宋司馬華孫來盟宋華耦來盟公與之宴辭曰君之先臣督得罪于宋殤公名在諸侯之䇿臣承其祀其敢辱君請承命于亞旅魯人以爲敏穀梁氏曰司馬官也其以官稱無君之辭也家氏曰春秋書宋司馬華孫來盟言不以君命至也謝氏曰華孫安暴君之朝食汚君之祿進無直諫之忠退無潔身之義姦邪同黨爲昭公以國事來盟書華孫貶之也書司馬著其失職也華氏孫名左氏以爲字誤矣夏曹伯來朝劉氏權衡曰周禮大行人之職曰凡諸侯之邦交歲相問也殷相聘也世相朝也愚按春秋書此以起齊人伐曹入郛之文且爲不能以禮自守而妄悦于人以招禍亂者之戒齊人歸公孫敖之喪齊人或爲孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以爲請立于朝以待命許之取而殯之齊人送之葬視共仲聲已不視帷堂而哭襄仲欲勿哭惠伯曰喪親之終也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無失道何怨于人襄仲説帥兄弟以哭之許氏曰以敖之醜奔而錄卒錄其喪歸春秋爲之屢見于經者以文伯惠叔之哀誠無已也易曰有子考無咎書曰尚蓋前人之愆惟忠惟孝故聖人以敖著教焉張氏曰趙鞅之誓師曰桐棺三寸不設屬辟素車樸馬無入于兆此公孫敖之葬禮孝子慈孫所不能改者與六月辛丑朔日有食之鼓用牲于社單伯至自齊齊人許單伯請而赦之使來致命高氏曰内大夫爲他國所執而見釋者皆書其至以見執非其罪且執之書則其歸不得不著也晉郤缺帥師伐蔡戊申入蔡新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還許氏曰言伐言入甚之也師氏曰以蔡從楚背中國而即夷狄固天下之罪人主盟者從而問罪是有辭以伐之似矣然不㑹諸侯而獨以大夫往則是主盟之事不惟晉自擅行又且專行于晉之大夫此皆晉靈不能紹霸而政在大夫之過也陳氏曰自伐書陽處父入書郤缺侵書趙穿由是凡役書大夫雖大夫自爲戰書大夫甚者大夫與君戰亦書大夫是經之變文也秋齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈秋齊人侵我西鄙故季文子告于晉冬十有一月晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還于是有齊難是以公不㑹陳氏曰此晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯也曷爲不序散辭也新城之盟不可以不序徒以諸夏之志焉耳而晉侯不出于是楚霸成而頃王崩葬不見于春秋諸侯無統紀甚矣故終靈公之篇凡合諸侯皆散辭家氏曰齊商人弑其君執其君之母晉人討之師直辭壯何患不克今以討召諸侯以賂釋篡賊由晉靈幼弱不君趙盾怙權自私導其君以賄晉靈豈知爲此乎春秋于是不書晉㑹諸侯于扈而書諸侯盟于扈削晉霸而同之于諸侯其貶晉也大矣師氏曰不序諸侯以諸侯之所爲不足序而主盟者不足以令諸侯也十有二月齊人來歸子叔姬高氏曰晉㑹諸侯盟于扈受齊賂而不伐齊故齊人自歸子叔姬以解諸侯之意凡内女見黜皆書來歸罪在姬也此書齊人來歸者罪在齊人也家氏曰書齊人執子叔姬齊人歸子叔姬閔姬而病魯也齊侯侵我西鄙遂伐曹入其郛齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討于有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣高氏曰諸侯爲扈之㑹不能討齊國弑君之賊反受其賂而還是成商人之爲君也故自此遂書齊侯以罪諸國之㑹于扈者謝氏曰書侵書入罪之也書遂著暴也陳氏曰一役而再有事不悉書也茍悉書也則以遂言之兵事言遂必天下之大故也此其言遂何齊始敗夏盟也許氏曰魯盡禮于晉而見侵弗恤曹修禮于魯而被伐莫救此仁義之所以日壞而兵革之所以方興也十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟及齊平公有疾使季文子㑹齊侯于陽穀請盟齊侯不肻曰請俟君間高氏曰以行父當齊侯宜齊侯弗肻與盟也而曰弗及者恥也内辭也謝氏曰陽穀之㑹文公遣大夫出盟大國至使失歡于齊將以保國而反以危國書弗及盟危之也危之著文公之倦于政也家氏曰春秋備書行父襄仲如齊如晉請援乞盟辭繁而不厭者哀魯國之無人坐視逆商慿陵莫如之何也夏五月公四不視朔疾也程氏學曰古者頒告朔于邦國諸侯受而藏之祖廟每月朔朝于廟告而行之然則朝廟者謂告月也穀梁曰公四不視朔公不臣也以公爲厭政已甚矣高氏曰前此未有書不視朔者若其有疾則亦常事不書耳此特書者見公非有疾而然也張氏曰文公自是因循不講告朔之禮以致餘公不復舉行所以定哀之時聖人有我愛其禮之言羊存而禮廢其必始于此矣六月戊辰公子遂及齊侯盟于郪丘公使襄仲納賂于齊侯故盟于郪丘高氏曰陽穀之㑹齊侯弗及盟者晉爲魯故㑹諸侯于扈將以伐齊齊侯賂之遂不果伐于是齊侯欲取償于魯至是公使公子遂納賂于齊而復求盟所以得盟于郪丘則有辭矣謝氏曰郪丘之盟齊爲盟主盟以魯大夫及齊侯者抑齊之强也抑齊之强者責其以賂屈魯而盟也家氏曰齊魯皆千乘之國齊能伐魯魯豈不能捍齊况直而壯者在魯曲而老者在齊彼以其力我以吾義吾何慊于彼而行父襄仲乞盟不得至納賂以求盟視長勺乘丘之大夫真可以愧死矣秋八月辛未夫人姜氏薨杜氏曰僖公夫人文公母也毁泉臺有蛇自泉宫出入于國如先君之數秋八月辛未聲姜薨毁泉臺公羊曰毁泉臺何以書譏何譏爾築之譏毁之譏先祖爲之已毁之不如勿居而已矣謝氏曰上之所爲下之所效國君舉動不可以不慎也物之不足疑情之不足信者明君弗惑也興之無利于民廢之無益于民者明君弗爲也故災變妖孽之來不以邪説亂其心不以無稽之言貳其聽反身修德以應之而已魯人以蛇出泉宫夫人繼殁由是惡泉臺而毁之惑之大者也書毁泉臺罪其不明也愚謂魯因蛇妖毁泉臺以惑衆固有罪矣茍不因蛇妖而毁之亦徒勞百姓之力彰先祖之過而已何益于政治哉公羊之論蓋得之矣楚人秦人巴人滅庸楚大饑戎伐其西南至于阜山師于大林又伐其東南至于陽丘以侵訾枝庸人帥羣蠻以叛楚麇人帥百濮聚于選將伐楚于是申息之北門不啟楚人謀徙于阪高蔿賈曰不可我能往宼亦能往不如伐庸乃出師旬有五日百濮乃罷自廬以往振廪同食次于句澨使廬戢黎侵庸及庸方城庸人逐之囚子揚窻三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯禆儵魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乘馹㑹師于臨品分爲二隊子越自石溪子貝自仭以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸張氏曰庸乘饑饉率蠻危楚楚一畏徙則無以保其國矣然禦變待敵亦制服之而已夷人宗社豈王法之所容乎家氏曰秦人不以成周建國自重儕于僭號之強楚與之連兵伐國異乎小國之脅從于楚者矣自是春秋始外秦冬十有一月宋人弑其君杵臼宋公子鮑禮于國人宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數于六卿之門國之材人無不事也親自桓以下無不恤也公子鮑美而艶襄夫人欲通之而不可乃助之施昭公無道國人奉公子鮑以因夫人于是華元爲右師公孫友爲左師華耦爲司馬鱗矔爲司徒蕩意諸爲司城公子朝爲司寇初司城蕩卒公孫壽辭司城請使意諸爲之既而告人曰君無道吾官近懼及焉棄官則族無所庇子身之貳也姑紓死焉雖亡子猶不亡族既夫人將使公田孟諸而殺之公知之盡以寶行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人諸侯誰納我且既爲人君而又爲人臣不如死盡以其寳賜左右而使行夫人使謂司城去公對曰臣之而逃其難若後君何冬十有一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之文公即位使毋弟須爲司城華耦卒而使蕩虺爲司馬胡氏曰此襄夫人使甸殺之也而書宋人者昭公無道國人之所欲弑也君無道而弑之可乎諸侯殺其大夫雖當于罪若不歸諸司寇猶有專殺之嫌以爲不臣矣况于北面歸戴奉之以爲君也昭公無道聖人以弑君之罪歸之宋人者以明三綱人道之大倫君臣之義不可廢也然則有土之君可以肆于民上而無誅乎諸侯無道天子方伯在焉臣子國人其何居死于其職而明于去就從違之義斯可矣蕩意諸亦死職春秋削之不得班于孔父仇牧荀息何也二子閑其君而不能春秋之所取也意諸知國人將弑其君而不能止知昭公之將見殺而不能正坐待其及而死之所謂匹夫匹婦自經于溝瀆而莫知之也奚得與死于其職者比乎聖人所以獨取高哀之去而書字以褒之也十有七年春晉人衛人陳人鄭人伐宋晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弑君猶立文公而還程子曰行天討而成其亂失天職也故不卿之謝氏曰伐宋討逆之師也逆亂未治乃立公子鮑而還師莫大于行義義莫大于討逆將以行義討逆而其終反成宋亂故大夫皆貶稱人夏四月癸亥葬我小君聲姜齊侯伐我西鄙六月癸未公及齊侯盟于穀齊侯伐我北鄙襄仲請盟六月盟于穀家氏曰魯當討齊者也魯不能討齊反坐受逆商之侮盟其臣以爲未厭復伐之而盟其君齊之無道亦極矣魯之不振亦甚矣嗟夫齊商傲而日益淫魯文卑而日益索淫與索皆將死之證而商又惡之稔歟宜其及于難諸侯㑹于扈晉侯蒐于黄父遂復合諸侯于扈平宋也公不與㑹齊難故也于是晉侯不見鄭伯以爲貳于楚也鄭子家使執訊而與之書以告趙宣子晉鞏朔行成于鄭趙穿公壻池爲質焉冬十月鄭太子夷石楚爲質于晉家氏曰兩扈之盟諸侯不序春秋所以削晉霸而著其黨逆之罪也齊商人弑其君盾爲㑹于扈曰將以討之卒以取賂而止今宋弑君盾復合四國之大夫曰將以討之既而立鮑而還鮑既立矣位既定矣乃復爲㑹于扈扈之山川鬼神亦將爲之切齒况于在㑹之諸侯乎故春秋特削其霸書曰諸侯㑹于扈或曰桓二年宋督弑其君齊魯陳鄭爲㑹于稷春秋書曰以成宋亂今晉人兩扈之㑹視稷無以相遠春秋不書成齊亂成宋亂何哉曰督之弑霸事未興齊魯陳鄭相率而往共奬篡賊也故春秋書成亂並責在㑹之人也今晉主夏盟商與鮑後先弑君皆納賂而無討更要討篡之諸侯共定篡賊之位罪浮于稷故春秋削霸以示討此其事雖同而書法異也胡氏曰大夫無沐浴之請則貶而稱人諸侯無討賊之功則畧而不序不然是廢君臣之義人欲肆而天理滅矣秋公至自穀冬公子遂如齊襄仲如齊拜穀之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死師氏曰既以躬行而及之盟其卑遜不爲不至既盟之後方抵國稅駕不望齊侯遣使來謝乃使公子遂如齊朝聘以謝之公之所爲甘于屈辱如此何以君魯哉十有八年春王二月丁丑公薨于臺下齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨高郵孫氏曰人君之薨必于路寢非路寢者皆不正也其曰臺下蓋又甚焉朱子曰一毫不正則有累于其生故春秋書公薨必謹其地學者要當知古人所以嚴終如此秦伯罃卒夏五月戊戌齊人弑其君商人齊懿公之爲公子也與邴歜之父爭田弗勝及即位乃掘而刖之而使歜僕納閻職之妻而使職􅆖乘夏五月公遊于申池二人浴于池歜以扑抶職職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如乃謀弑懿公納諸竹中歸舍爵而行齊人立公子元高氏曰春秋之法弑君之賊以弑君討之則以賊書商人弑君自立至于五年宜加討賊之辭而稱齊人弑其君者齊人恬不討賊皆北面事之遂令商人專行無道而邴歜閻職乃自以私怨殺之故以弑君之罪歸之齊人以誅亂賊之黨且見齊無臣子而商人得遂爲君也既君之復弑之則代篡代立相弑之禍何時而已故雖魯桓篡弑自立聖人不没其罪然亦從而君之所以明君臣之大義定萬世之法此但不出弑君之名以著商人有以致之也胡氏曰刖邴歜之父而使歜僕納閻職之妻而使職􅆖乘二人者實弑懿公于法宜書曰盜而特變其辭以爲齊人何也亂臣賊子之動于惡必有利其所爲而與之者人人不利其所爲而莫之與則孤危獨立無以濟其惡篡弑之謀熄矣齊人貪公子一時之私施不顧君臣萬世之大倫弑其國君則靦面以爲之臣而不能討執其君母則拱手以聽其所爲而不能救故于懿公見殺特不書盜反以弑君之罪歸諸齊人所謂㧞本塞源懲禍亂之所由也六月癸酉葬我君文公秋公子遂叔孫得臣如齊秋襄仲莊叔如齊惠公立故且拜葬也文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見于齊侯而請之齊侯新立而欲親魯許之胡氏曰使舉上客將稱元帥此春秋立文之常體也其有變文書介副者欲以起問者見事情也子赤夫人之子今卒于弑不著其實是爲國諱惡無以傳信于將來而春秋之大義隱矣故上書大夫並使下書夫人歸于齊中曰子卒則見禍亂邪謀發于奉使之日而公子遂弑其君之罪著矣冬十月子卒冬十月仲殺惡及視而立宣公仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公冉務人奉其帑以奔蔡既而復叔仲氏陳氏曰惡位未定則其稱子卒何成之爲在喪之君也凡君在喪恒稱子猶未葬也則稱子某于是公子遂殺惡而立宣公故成之爲在喪之君以弑罪罪宣公也胡氏曰子卒何以不日遇弑不忍言也既葬不名不名而遇弑者不日以見其弑子赤是也張氏曰叔彭生身爲大臣既無以拯救文公又不能知公子遂之邪謀有公冉務人之忠言而不能用甘心就死無一毫扶持之實没而不書有以也哉夫人姜氏歸于齊將行哭而過市曰天乎仲爲不道殺適立庶市人皆哭魯人謂之哀姜胡氏曰書夫人則知其正書姜氏則知其非見絶于先君書歸于齊則知無罪異于孫于邾者而魯國臣子殺嫡立庶敬嬴宣公不能事主君存嫡母其罪不書而並見矣家氏曰是時風教大壞亂臣披猖齊人弑其君舍而歸叔姬于魯魯人弑其君赤而歸姜氏于齊弑君出母後先一轍王綱隳頹霸政掃地莫有聲其罪而討之者吾意聖人把筆至此重爲三嘆云季孫行父如齊許氏曰文子之行告宣公立也前乎子卒書如齊後乎子卒書如齊齊與聞故也所以惡齊也高氏曰按左傳宣十八年公薨季孫行父言于朝曰使我殺嫡立庶以失大援者仲也則知行父實與公子遂同弑子惡而立宣公故夫人姜氏歸于齊而行父遽如齊焉惡實齊之甥恐齊人聽夫人之訢而來討于是議納賂以講平焉此見魯國臣子之罪皆不可勝誅也莒弑其君庶其莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮于國僕因國人以弑紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮于其君者事之如孝子之養父母也見無禮于其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則爲賊掩賊爲藏竊賄爲盜盜器爲姦主藏之名賴姦之用爲大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝悌忠信爲吉德盜賊藏姦爲凶德夫莒僕則其孝敬則弑君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度于善而皆在于凶德是以去之公羊氏曰稱國以弑者衆弑君之辭家氏曰弑君者天下之大惡商臣之弑聖人不以荆楚而遂畧之莒雖小使紀公之死世子預聞春秋書法當視商臣必無稱國以弑之理當從公羊之説春秋闕疑卷二十一
