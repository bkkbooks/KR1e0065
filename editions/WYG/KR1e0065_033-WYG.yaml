body:
  text: 春秋闕疑卷三十三元鄭玉撰二十有七年春齊侯使慶封來聘齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也杜氏曰景公即位通嗣君也夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋二十五年趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以徃兵其少弭矣齊崔慶新得政将求善于諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭至是宋向戌善于趙文子又善于令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀于諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必将許之弗許楚将許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告于秦秦亦許之皆告于小國為㑹于宋五月甲辰晉趙武至于宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介戊申叔孫豹齊慶封陳須無衛石惡至甲寅晉荀盈從趙武至丙辰邾悼公至壬戌楚公子黑肱先至成言于晉丁卯宋向戌如陳從子木成言于楚戊辰滕成公至子木謂向戌請晉楚之從交相見也庚午向戌復于趙孟趙孟曰晉楚齊秦匹也晉之不能于齊猶楚之不能于秦也楚君若能使秦君辱于敝邑寡君敢不固請于齊壬申左師復言于子木子木使驛謁諸王王曰釋齊秦他國請相見也秋七月戊寅左師至是夜也趙孟及子晳盟以齊言庚辰子木至自陳陳孔奐蔡公孫歸生至曹許之大夫皆至以藩為軍晉楚各處其偏伯夙謂趙孟曰楚氛甚惡懼難趙孟曰吾左還入于宋若我何高氏曰此何以㑹楚意也楚人患吳而結諸夏也于宋者宋向戌善于趙武又善于楚屈建實為之㑹晉楚以求弭諸侯之兵且使晉楚之從得交相見此事利害甚重不可輕與也而諸侯大夫不詳其故始循其弭兵之名遂㑹于宋而與之盟自是大啟戎心干盟偪好華夏蠻貊莫知其辨而諸國亦俛首兩事晉楚此見當時天下之事中國之政皆大夫專持之諸侯亦弗能制也泰山孫氏曰隱桓之際天子失道諸侯擅權宣成之間諸侯僭命大夫專國至宋之㑹則又甚矣何哉自宋之㑹諸侯日微天下之政中國之事皆大夫專持之故二十九年城把三十年㑹澶淵昭元年㑹虢諸侯莫有見者此天下之政中國之事皆大夫專持之可知也陳氏曰晉楚嘗盟矣㑹于瑣澤之歲宋華元克合晉楚之成士燮㑹公子罷于宋西門之外不書猶曰特相盟也兩君之好而非天下之大變也以諸侯分為晉楚之從而交相見也于是始則是南北二霸也天下之大變也于溴梁而無君臣之分于宋而無中外之辨昭定哀之春秋將以終于吳越焉爾矣家氏曰宋牼以秦楚構兵欲告之以不利使皆罷兵而孟子所以語之者則有仁義而已矣今向戌弭兵與宋牼罷兵事有相類者謂弭兵為非不可也而所以弭兵者則未得其説荆蠻之勢自是而愈張夫豈中國之利哉葢征伐天子事也晉楚及其與國雖有中外之辨而皆天子之建國也向戌而欲弭兵當先禀命京師已而馳告晉楚俾各率其與國朝王而受命焉盟于王庭自今以徃有罪當討王命之討而後討四夷内侵王使之伐而後伐一如周家盛時之制夫如是兵庻可弭矣今徒以弭兵為説俾晉楚之從交相見而中國諸侯一朝為外夷役而天下乃有二霸趙武向戌豈非中國之罪人乎或曰如子之説晉人猶知有尊王之義其如楚之弗率何曰楚自用兵以來令尹死者三四人内困于吳外困于晉其力已憊徒以恥出晉下是以日尋干戈而不得息今使之聽命于王而南北罷兵亦楚之福彼胡為而不從不從則奉王命以臨之我有辭矣衛殺其大夫􅑔喜衛侯之弟鱄出奔晉衛􅑔喜專公患之公孫免餘請殺之公曰微􅑔子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻􅑔氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻􅑔氏殺􅑔喜及右宰穀尸諸朝石惡將㑹宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟于河託于木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰愬乎吾不可以立于人之朝矣終身不仕公喪之如税服終身公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上禄亂也臣弗敢聞且􅑔子唯多邑故死臣懼死之速也公固與之受其半以為少師公使為卿辭曰大叔儀不貳能贊大事君其命之乃使文子為卿穀梁氏曰􅑔喜弑君其以累上之辭言之何也嘗為大夫與之渉公事矣􅑔喜出君弑君而不以弑君之罪罪之者惡獻公也髙郵孫氏曰喜弑剽而立衎衎反國而復用之既而以其私殺之喜雖有罪而衛侯殺之不以其罪矣昔里克弑奚齊而立夷吾夷吾殺之二君之殺其大夫皆以其私里克􅑔喜之見殺皆不以其罪故春秋皆曰殺其大夫也家氏曰剽篡君者也他人可殺而寗喜甞事之以為君不得殺也故書弑以正其罪喜納君者也他人可殺而衛獻因之以入不得殺也故稱國以殺不去其官謝氏曰鱄出奔稱弟罪獻公之不能全其弟也愚按􅑔喜之死實鱄有以致之則鱄之奔亦有不得已者矣始鱄以獻公之言與􅑔喜約政由􅑔氏祭則寡人已而喜專獻公患之至于殺喜則喜之死鱄不執其咎將誰執其咎哉喜既被殺鱄不出奔豈唯有愧于心且將不保其身矣夫政者人君之大柄故曰天下有道則政不在大夫雖有君命豈可輕以是許人哉方獻公之使鱄鱄之約喜宜皆以大義告之使剽之死必以其罪衎之歸必以其道則喜免于弑逆之名而鱄無奔逃之患觀其初君不信臣懼不免之言及其終不向衛國而坐不為他國之臣則其識見之明執守之固豈常人之所能及哉所以至此者由其資質雖美而無學問之功故明于小節而昧于大體知守經常不識權變故也然則若鱄者亦可謂之獨行之士矣律以中庸之道則名教之罪人也此責備賢者之意故因其出奔而論著焉秋七月辛巳豹及諸侯之大夫盟于宋辛巳將盟于宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信于楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信大宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死若合諸侯之卿以為不信必不捷矣食言者不病非子之患也夫以信召人而以僭濟之必莫之與也安能害我且吾因宋以守病則夫能致死與宋致死雖倍楚可也子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我吾庸多矣非所患也季武子使謂叔孫以公命曰視邾滕既而齊人請邾宋人請滕皆不與盟叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟晉楚争先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟久矣豈專在晉叔向謂趙孟曰諸侯歸晉之徳只非歸其尸盟也子務徳無争先且諸侯盟小國必有尸盟者楚為晉細不亦可乎乃先楚人壬午宋公兼享晉楚之大夫趙孟為客子木與之言弗能對使叔向侍言焉子木亦不能對也乙酉宋公及諸侯之大夫盟于蒙門之外子木問于趙孟曰范武子之徳何如對曰夫子之家事治言于晉國無隱情其祝史陳信于鬼神無愧辭子木歸以語王王曰尚矣哉能歆神人宜其光輔五君以為盟主也子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與争晉荀盈遂如楚涖盟鄭伯享趙孟于垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁趙孟曰牀笫之言不踰閾况在野乎非使人之所得聞也子西賦黍苗之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子大叔賦野有蔓草趙孟曰吾之子惠也印段賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈趙孟曰匪交匪敖福將焉徃若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賓榮其能久乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎宋左師請賞曰請免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文徳也聖人以興亂人以廢廢興存亡昬明之術皆兵之由也而求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之左師辭邑向氏欲攻司城左師曰我將亡夫子存我徳莫大焉又可攻乎臨江劉氏曰豹何以名一事而再見者卒名也地于宋以宋為主也高氏曰此謀出于宋向戌而春秋不出向戌之名但書㑹于宋盟于宋者聖人傷中國無人之甚也彼向戌者何足道哉陳氏曰晉楚争先乃先楚人九月楚薳罷如晉涖盟此先晉何春秋不以荆蠻先中國也自宋以來晉不專主盟矣虢之盟讀舊書加于牲上而已至剸陵則齊主諸侯至臯鼬則魯及諸侯晉之不足以主夏盟自宋始胡氏曰此一地曷為再言宋書之重辭之複其中必有大美惡焉宋之盟合左師欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是中國諸侯南面而朝楚及申之㑹南蠻之君篡弑之賊大合十有一國之衆而用齊桓召陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭不見伐吳滅頼無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也故㑹盟同地而再言宋者貶之也小東萊吕氏曰宋向戌合晉楚之成以弭兵左氏書曰欲弭諸侯之兵以為名觀以為名三字便見得向戌之弭兵非是果欲息民欲求息民之名耳其後向戌挾弭兵之事又書左師請賞公與之邑六十則向戌弭兵之意非果欲息天下之民平諸侯之爭區區為一己之利而已上而為名下而為利左氏于前書弭兵為名既有以誅其心于後記其請邑之事又有以指其實真有書法愚謂湨梁之㑹諸侯皆在而大夫自盟聖人書曰大夫盟不曰諸侯之大夫者責大夫之無君也宋之㑹諸侯不在而大夫自盟聖人書曰諸侯之大夫而不曰大夫者憂天下之無君也葢諸侯在㑹而大夫自盟春秋雖不書諸侯之大夫人猶知其為諸侯之大夫也故不書諸侯以罪其臣諸侯不在㑹而大夫自盟不書諸侯之大夫人安知其為諸侯之大夫故書諸侯以存其君冬十有二月乙亥朔日有食之辰在申司厯過也再失閏矣劉氏權衡曰厯家之術求閏餘易求交朔難今司厯能正交朔反不能置閏乎二十有八年春無氷梓慎曰今兹宋鄭其饑乎歲在星紀而淫于𤣥枵以有時菑隂不堪陽蛇乗龍龍宋鄭之星也宋鄭必饑𤣥枵虛中也枵耗名也土虛而民耗不饑何為師氏曰周之春夏之冬也夏衛石惡出奔晉衛人討􅑔氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀邾子來朝秋八月大雩仲孫羯如晉孟孝伯如晉告將為宋之盟故如楚也夏齊侯陳侯蔡侯北燕伯把伯胡子沈子白狄朝于晉宋之盟故也齊侯將行慶封曰我不與盟何為于晉陳文子曰先事後賄禮也小事大未獲事焉從之如志禮也雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行蔡侯之如晉也鄭伯使游吉如楚及漢楚人還之曰宋之盟君實親辱今吾子來寡君謂吾子姑還吾將使馹奔問諸晉而以告子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休此君之憲令而小國之望也寡君是故使吉奉其皮幣以歲之不易聘于下執事今執事有命曰女何與政令之有必使而君棄而封守䟦渉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君徳而執事有不利焉小國是懼不然其何勞之敢憚子大叔歸復命告子展曰楚子將死矣不修其政徳而貪昧于諸侯以逞其願欲久得乎君其徃也送葬而歸以快楚心不幾十年未能恤諸侯也吾乃休吾民矣九月鄭游吉如晉告將朝于楚以從宋之盟子産相鄭伯以如楚舍不為壇外僕曰昔先大夫相先君適四國未嘗不為壇自是至今亦皆循之今子草舍無乃不可乎子産曰大適小則為壇小適大茍舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其菑患賞其徳刑教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠于徳小適大有五惡説其罪戾請其不足行其政事共其職貢從其時命不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也冬齊慶封來奔二十七年齊崔杼生成及彊而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老于崔崔子許之偃與無咎弗予曰崔宗邑也必在宗主成與彊怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告慶封曰子姑退吾圖之告盧蒲嫳盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉崔之薄慶之厚也他日又告慶封曰茍利夫子必去之難吾助女九月庚辰崔成崔彊殺東郭偃棠無咎于崔氏之朝崔子怒而出其衆皆逃求人使駕弗得使圉人駕寺人御而出且曰崔氏有福止余猶可遂見慶封慶封曰崔慶一也是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之弗克使國人助之遂滅崔氏殺成與彊而盡俘其家其妻縊嫳復命于崔子且御而歸之至則無歸矣乃縊崔明夜辟諸大墓辛巳崔胡來奔慶封當國至是齊慶封好田而耆酒與慶舍政則以其内實遷于盧蒲嫳氏易内而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有􅃂妻之慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也曰宗不余辟余獨焉辟之賦詩斷章余取所求焉惡識宗癸言王何而反之二人皆嬖使執寢戈而先後之公膳日雙鷄饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣使析歸父告晏平仲平仲曰嬰之衆不足用也知無能謀也言弗敢出有盟可也子家曰子之言云又焉用盟告北郭子車子車曰人各有以事君非佐之所能也陳文子謂桓子曰禍將作矣吾其何得對曰得慶氏之木百車于莊文子曰可慎守也已盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讐敢獻其兆子之曰克見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸慶嗣聞之曰禍將作矣謂子家速歸禍作必于嘗歸猶可及也子家弗聽亦無悛志子息曰亡矣幸而獲在吳越陳無宇濟水而戕舟𤼵梁盧蒲姜謂癸曰有事而不告我必不㨗矣癸告之姜曰夫子愎莫之止將不出我請止之癸曰諾十一月乙亥嘗于大公之廟慶舍涖事盧蒲姜告之且止之弗聽曰誰敢者遂如公麻嬰為尸慶奊為上獻盧蒲癸王何執寢戈慶氏以其甲環公宫陳氏鮑氏之圉人為優慶氏之馬善驚士皆釋甲束馬而飲酒且觀優至于魚里欒髙陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動于甍以俎壺投殺人而後死遂殺慶繩麻嬰公懼鮑國曰羣臣為君故也陳須無以公歸税服而如内宫慶封歸遇告亂者丁亥伐西門不克還伐北門克之入伐内宫弗克反陳于嶽請戰弗許遂來奔獻車于季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封氾祭穆子不説使工為之誦茅鴟亦不知既而齊人來讓奔吳吳句餘予之朱方聚其族焉而居之富于其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃崔氏之亂喪羣公子故鉏在魯叔孫還在燕賈在句瀆之丘及慶氏亡皆召之具其器用而反其邑焉與晏子􅆁殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以􅆁殿乃足欲足欲亡無日矣在外不得宰吾一邑不受􅆁殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利于是乎正徳以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之公以為忠故有寵釋盧蒲嫳于北竟求崔杼之尸將戮之不得崔氏之臣曰與我其拱璧吾獻其柩于是得之十二月乙亥朔齊人遷莊公殯于大寢以其棺尸崔杼于市國人猶知之皆曰崔子也二十九年二月癸夘齊人葬莊公于北郭家氏曰慶封崔杼之黨也杼既弑莊公而慶封共為政其必與于弑矣去年杼以家難而死慶封當國其權任可謂專矣而莊公之倖臣曰盧蒲癸王何者乃共謀討之殺其子慶舍慶封田而歸戰弗克遂來奔齊人乃出崔杼之尸而戮之改葬荘公莊之死也倖臣與之俱死者十人今為討賊亦倖臣也身為國君以倖臣為羽翼莊固可鄙矣而卿大夫無能為君討賊復讐者而倖臣乃能之亦卿大夫之恥也欒髙陳鮑之徒因人成事耳十有一月公如楚為宋之盟故公及宋公陳侯鄭伯許男如楚公過鄭鄭伯不在伯有迋勞于黄崖不敬及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有遠慮小人從邇饑寒之不恤誰遑其後不如姑歸也叔孫穆子曰仲子專之矣子服子始學者也榮成伯曰遠圖者忠也公遂行宋向戌曰我一人之為非為楚也饑寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反薛氏曰前此未嘗朝楚而今朝之由晉之失諸侯也陳氏曰諸夏之君旅見于楚始于此舉魯以見其餘也外相如不志有異焉則志之凡舉魯以見其餘者則天下之辭也公朝于王所公如楚于以見王霸之盛衰故曰天下之辭也十有二月甲寅天王崩乙未楚子昭卒胡氏曰甲寅天王崩乙未楚子昭卒相距四十二日則閏月之騐也然不以閏書見䘮服之不數閏也齊景公葬書閏月明殺恩之非禮也范氏曰閏承前月而受其餘日故書閏月之日繫前月之下乃史册之常體二十有九年春王正月公在楚楚人使公親襚公患之穆叔曰祓殯而襚則布幣也乃使巫以桃茢先祓殯楚人弗禁既而悔之夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓楚郟敖即位王子圉為令尹鄭行人子羽曰是謂不宜必代之昌松栢之下其草不殖胡氏曰歲之首月公如他國有矣此獨書公在楚外為荆蠻所制以俟其葬而不得歸内為强臣所逼欲擅其國而不敢入故于歲首朝正之時特書所在以存君使後世臣子戴天履地視君父之危且困者必有天威不違顔咫尺食坐見于羮牆之意而不以頃刻忘也此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背其君者乎薛氏曰在楚之書危其在中國之外也夏五月公至自楚公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭强之而後受公欲無入榮成伯賦式微乃歸五月公至自楚公冶致其邑于季氏而終不入焉曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣曰我死必無以冕服斂非徳賞也且無使季氏葬我庚午衛侯衎卒閽弑吳子餘祭吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弑之吳子使屈狐庸聘于晉通路也趙文子問焉曰延州來季子其果立乎巢隕諸樊閽戕戴吳天似啟之何如對曰不立是二王之命也非啟季子也若天所啟其在今嗣君乎甚徳而度徳不失民度不失事民親而事有序其天所啟也有吳國者必此君之子孫實終之季子守節者也雖有國不立穀梁氏曰閽門者也寺人也不稱名姓閽不得齊于人也不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弑吳子餘祭仇之也家氏曰吳之諸君易而無禮徃徃以此蹈禍遏卒于巢猶曰以戎事故餘祭死于閽僚死于專諸直死于刑人刺客之手春秋書之良以垂戒示後焉耳仲孫羯㑹晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城把晉平公把出也故治把六月知悼子合諸侯之大夫以城把孟孝伯㑹之鄭子大叔與伯石徃子大叔見大叔文子與之語文子曰甚乎其城把也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離徳詩曰協比其鄰昏姻孔云晉不鄰矣其誰云之家氏曰事有關乎中國繫乎王室如城虎牢城成周之類公也事有關乎救災恤患如城邢城縁陵城楚丘之類亦公也若是者合諸侯而城之其誰曰不然今晉平為其母家城把事之私者也乃以煩諸侯是以已事而僭王事其在文武成康之世則誅矣胡氏曰晉主夏盟令行中國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王惟不撫其民而遠屯戍于母家周人怨思揚之水所以降于國風而不得列于雅也城把之役不待貶絶而可見矣晉侯使士鞅來聘拜城把也公享之展莊叔執幣射者三耦公臣不足取于家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦杞子來盟晉侯使司馬女叔侯來治杞田弗盡歸也晉悼夫人愠曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也晉是以大若非侵小將何所取武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦于晉以杞封魯猶可而何有焉魯之于晉也職貢不乏玩好時至公卿大夫相繼于朝史不絶書府無虛月如是可矣何必瘠魯以肥杞且先君而有知也母寧夫人而焉用老臣杞文公來盟髙氏曰晉侯使魯歸前所侵杞田故書杞子來盟于士鞅來聘之下黍離之同國風則周道不復興矣把國之削公爵則夏禮不足徴矣聖人于此稱子又稱來盟蓋志其削弱之甚有國而不能自强又恃晉而求田所以深貶之也愚按杞爵稱子未詳吳子使札來聘公子札來聘見叔孫穆子説之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子請觀于周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌􅆁鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其大公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至矣其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以徳輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之遠也非令徳之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周徳之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之徳乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不偪遠而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛徳之所同也見舞象箾南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙徳聖人之難也見舞大夏者曰美哉勤而不徳非禹其誰能修之見舞韶箾者曰徳至矣哉大矣如天之無不幬也如地之無不載也雖甚盛徳其蔑以加于此矣觀止矣若有他樂吾不敢請已其出聘也通嗣君也故遂聘于齊説晏平仲謂之曰子速納邑與政無邑乃免于難齊國之政將有所歸未獲所歸難未歇也故晏子因陳桓子以納政與邑是以免于欒髙之難聘于鄭見子産如舊相識與之縞𢃄子産獻紵衣焉謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗適衛説蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晉將宿于戚聞鐘聲焉曰異哉吾聞之也辯而不徳必加于戮夫子獲罪于君以在此懼猶不足而又何樂夫子之在此也猶燕之巢于幕上君又在殯而可以樂乎遂去之文子聞之終身不聽琴瑟適晉説趙文子韓宣子魏獻子曰晉國其萃于三族乎説叔向將行謂叔向曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免于難陳氏曰荆人來聘楚子使椒來聘秦人來歸僖公成風之襚秦伯使術來聘春秋葢累而後進也吳始通于上國則曷為書君大夫吳驟强也然則是賢札歟書札猶楚椒秦術則皆非命大夫之辭也必若屈完而後特書氏春秋公萬世之是非不以私一人也秋九月葬衛獻公齊高止出奔北燕秋九月齊公孫蠆公孫竈放其大夫髙止于北燕高止好以事自為功且專故難及之左氏曰書出奔罪高止也陳氏曰春秋之法茍不足以免于難雖放逐也以自奔書之冬仲孫羯如晉報范叔也三十年春王正月楚子使薳罷來聘通嗣君也穆叔問王子之為政何如對曰吾儕小人食而聽之猶懼不給命而不免于戾焉與知政固問焉不告穆叔告大夫曰楚令尹將有大事子蕩將與焉助之匿其情矣張氏曰魯以君朝而楚以大夫聘此齊桓晉文所以行乎列國者故自宋之盟夷夏不辨楚人行霸主之禮于中國非晉平趙武之責而誰責哉夏四月蔡世子般弑其君固蔡景侯為太子般娶于楚通焉太子弑景侯高氏曰稱世子以見父子之親稱君以見君臣之義以臣子之愛而弑君父之尊則般之于尊親盡矣家氏曰般之惡景之禍其積習有自來矣人莫不有義理之心貴華賤夷者所謂以義理之心夫人所同也蔡與陳鄭本皆諸夏之與國中間為楚所迫叛晉即楚去來無常惟蔡自厥貉之㑹甘于從楚去而不復者七十有餘年其染于夷久矣般之逆殆為商臣所染其積習有自來矣去盟主即附于僣竊附僣竊即胥于禽獸此理之必然又何怪乎五月甲午宋災宋伯姬卒或叫于宋太廟曰譆譆出出鳥鳴于亳社如曰譆譆宋大災宋伯姬卒待姆也穀梁氏曰取卒之日加之災上者見以災卒也伯姬之舍失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也高氏曰安定胡先生嘗謂伯姬乃婦人中之伯夷也葢婦人以貞為行者也當春秋時以魯一國言之如文姜哀姜穆姜皆夫人也杞伯姬鄫季姬皆魯女也其行有不可言者唯宋伯姬以貞潔之行矯其獘遇災不少避以死真有伯夷之風哉劉氏意林曰使共姬避火而全生未足以害其貞也然而不以已之所以全其生之故而違天下之常義此安乎性命者乃能之故審乎死生之度辨乎榮辱之境知禮之重重于生辱之甚甚于死而不渝故也高郵孫氏曰伯夷之賢不見稱于孔子則亦西山之餓夫共姬之行不見列于春秋則亦小國之愚婦爾為伯夷共姬又何恨哉亦信其志而已矣家氏曰宋平身為國君其母以逮火而死何以逭不孝之罪天王殺其弟佞夫王子瑕奔晉初王儋季卒其子括将見王而歎單公子愆期為靈王御士過諸廷聞其歎而言曰嗚呼必有此夫入以告王且曰必殺之不慼而願大視躁而足高心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉左氏曰天王殺其弟佞夫罪在王也穀梁氏曰諸侯且不首惡况于天子乎君無􅃘親之義天子諸侯所親者長子母弟耳天王殺其弟佞夫甚之也陳氏曰凡王殺不書雖王子不書甚者母弟亦不書必殺無罪也而後書謝氏曰佞夫以非罪見殺故王子瑕奔晉普天莫非王土故周公奔晉書出以明王室之衰也王子瑕奔晉王子朝奔楚不書出以正王室之尊也明其衰所以責王國正其尊所以責諸侯始之以衰而責王國終之以尊而責諸侯春秋之序也高氏曰後世人君不知春秋之㫖徃徃推刄同氣至使天下有斗粟尺布之謡此萬世人君之大戒也樸鄉呂氏曰孫明復謂春秋之義天子得專殺故無天子殺大夫之文此言殺其弟佞夫以為不能容一母弟不可不言也竊以為明復此言未為知春秋者也夫所謂諸侯無專殺大夫者必禀命于天子也天子無所禀命有罪則與衆殺之非謂生殺自恣悉由已出而謂之專殺也春秋二百四十二年偶無天子殺大夫之事爾或史官脱畧孔子無從取書也如使實殺無罪見之簡册聖人豈有不書以為世戒之理使後世暴君有作殺生自恣無所忌憚由明復此言也秋七月叔弓如宋葬宋共姬公羊氏曰外夫人不書葬此何以書隱之也何隱爾宋災伯姬卒焉其稱謚何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見𫝊母不下堂傅至矣母未至也逮乎火而死謝氏曰宋共姬公室女婦之賢者也魯以叔弓㑹葬嘉之也春秋以夫諡稱共姬褒之也共姬為女為婦可謂賢矣其嫁也宋公孫壽納幣魯季孫行父致女晉人衛人齊人來媵以其賢而昏禮之厚也其終也以死守義而卒于災以卿送死而共其事以夫配諡而彰其徳以其賢而䘮禮之厚也方是時闗睢之化不修漢女之行不聞賢妃正女不回之節卓然見于亂世者共姬一人而已此春秋所以賢其懿行而褒之也愚按共姬昏禮䘮禮之過厚春秋書之皆因貶以見褒也鄭良霄出奔許自許入于鄭鄭人殺良霄二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余徃是殺余也伯有曰世行也子晳曰可則徃難則已何世之有伯有將强使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟于伯有氏禆諶曰是盟也其與幾何詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能紓然明曰政將焉徃禆諶曰善之代不善天命也其焉辟子産舉不踰等則位班也擇善而舉則世隆也天又除之奪伯有􅷠子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾不然將亡矣三十年子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此歲也駟良方爭未知所成若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣夏四月己亥鄭伯及其大夫盟君子是以知鄭難之不已也伯有耆酒為窟室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許大夫聚謀子皮曰仲虺之志云亂者取之亡者侮之推亡固存國之利也罕駟豐同生伯有汰侈故不免人謂子産就直助彊子産曰豈為我徒國之禍難誰知所敝或主彊直難乃不生姑成吾所辛丑子産斂伯有氏之死者而殯之不及謀而遂行印段從之子皮止之衆曰人不我順何止焉子皮曰夫子禮于死者况生者乎遂自止之壬寅子産入癸卯子石入皆受盟于子晳氏乙巳鄭伯及其大夫盟于大宫盟國人于師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻己也喜曰子皮與我矣癸丑晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶帥國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死于羊肆子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止鄭子皮授鄭子産政辭曰國小而偪族大􅃂多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小小能事大國乃寛子産為政有事伯石賂與之邑子大叔曰國皆其國也奚獨賂焉子産曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛于邑邑將焉徃子大叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先姑先安大以待其所歸既伯石懼而歸邑卒與之伯有既死使大史命伯石為卿辭大史退則請命焉復命之又辭如是三乃受䇿入拜子産是以惡其為人也使次己位子産使都鄙有章上下有服田有封洫廬井有伍大夫之忠儉者從而與之泰侈者因而斃之豐卷將祭請田焉弗許曰唯君用鮮衆給而已子張怒退而徴役子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里三年而復之反其田里及其入焉從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之三十一年冬公薨之月子産相鄭伯以如晉晉侯以我䘮故未之見也子產使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修㓂盗充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館髙其閈閎厚其牆垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆以待賔客若皆毁之其何以共命寡君使匄請命對曰以敝邑褊小介于大國誅求無時是以不敢寧居悉索敝賦以來㑹時事逄執事之不閒而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥溼之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廐繕修司空以時平易道路圬人以時塓館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車脂轄𨽻人牧圉各贍其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則廵之教其不知而恤其不足賔至如歸無寧菑患不畏㓂盗而亦不患燥濕今銅鞮之宫數里而諸侯舍於𨽻人門不容車而不可踰越盗賊公行而夭癘不戒賔見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之雖君之有魯䘮亦敝邑之憂也若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不徳而以𨽻人之垣以贏諸侯是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子產有辭諸侯頼之若之何其釋辭也鄭子皮使印段如楚以適晉告十二月北宫文子相衛襄公以如楚宋之盟故也過鄭印段迋勞于棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子大叔逆客事畢而出言于衛侯曰鄭有禮其數世之福也其無大國之討乎子產之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨于其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀于野則獲謀于邑則否鄭國將有諸侯之事子產乃問四國之為于子羽且使多為辭令與禆諶乗以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賔客是以鮮有敗事北宫文子所謂有禮也鄭人游于鄉校以論執政然明謂子産曰毁鄉校如何子產曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大决所犯傷人必多吾不克救也不如小决使道不如吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實頼之豈唯二三臣仲尼聞是語也曰以是觀之人謂子產不仁吾不信也子皮欲使尹何為邑子產曰少未知可否子皮曰愿吾愛之不吾叛也使夫徃而學焉夫亦愈知治矣子產曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛于子子于鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也行此必有所害譬如田獵射御貫則能獲禽若未嘗登車射御敗績厭覆是懼何暇思獲乎子皮曰善哉虎不敏自今請雖吾家聽子而行子産曰人心不同如其面焉吾豈敢謂子靣如吾靣乎抑心所謂危亦以告也子皮以為忠故委政焉子產是以能為鄭國昭四年鄭子産作丘賦國人謗之曰其父死于路已為蠆尾以令于國國將若之何子寛以告子產曰何害茍利社稷死生以之且吾聞為善者不改其度故能有濟也民不可逞度不可改詩曰禮義不愆何恤于人言吾不遷矣渾罕曰國氏其先亡乎君子作法于涼其敝猶貪作法于貪敝將若之何姬在列者蔡及曹滕其先亡乎偪而無禮鄭先衛亡偪而無法政不率法而制于心民各有心何上之有謝氏曰良霄以汰侈構禍出奔其還也結許之力興兵入鄭其入也介于襄庫伐舊北門此構亂以危社稷者也入稱自許以明罪在所討也殺稱人以衆棄之之辭誅之也入逆辭也胡氏曰不言入者其位未絶也若宋魚石晉欒盈去國三年其稱復入位已絶矣不言叛者將以滅國非直叛也若華亥之入南里宋辰之入蕭其書叛者皆據土背君以自保未有滅國之謀也不言殺其大夫者非其大夫矣討賊之辭也張氏曰良霄之出公孫黒葢有罪焉春秋舍公孫黒專伐之罪而罪良霄者耆酒而不恤政汰侈而好争伯有之所為有䘮家亡身之道焉春秋于䘮國失家者不書所逐之人明其身之有罪使有國有家者兢兢自謹而求所以保身也知所以反身自修之道則奔亡之禍遠矣冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人􅅬人薛人把人小邾人㑹于澶淵宋災故為宋災故諸侯之大夫㑹以謀歸宋財冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫佗鄭罕虎及小邾之大夫㑹于澶淵既而無歸于宋三十一年春穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子乎吾子盍與季孫言之可以樹善君子也晉君將失政矣若不樹焉使早僃魯既而政在大夫韓子懦弱大夫多貪求欲無厭齊魯未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫將死矣吾語諸趙孟之偷也而反甚焉又與季孫語晉故季孫不從趙文子卒晉公室卑政在侈家韓宣子為政不能圖諸侯魯不堪晉求䜛慝𢎞多是以有平丘之㑹臨江劉氏曰㑹未有言其所為者此其言所為何譏何譏爾晉人與諸侯十二國之大夫㑹于澶淵凡為宋災故謀之也曰更宋之所䘮雖死者不可復生其財復矣非務也何言乎非務㑹者講禮正刑一徳以紀天下也蔡侯弑其君而不謀宋災而謀之微矣陳恒弑其君孔子沐浴而朝告于哀公曰請討之公曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也胡氏曰叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱軍政之本至于淪絶無父與君是禽獸也禽獸逼人雖得天下不能一朝居矣昔者伯禹過門不入放龍蛇也周公坐以待旦驅猛獸也今世子弑君與之同羣而不恤有國者不戒于火自亡其財茍其來告弔之可也則合十二國之大夫而謀更其所䘮尚為知類也乎蔡之亂猶人有腹心之疾而宋之災譬諸桐梓雞犬之亡失也以為未之察也可謂不智察之而不謀亦不仁矣是故諸國之大夫貶而稱人魯卿諱而不書又特言㑹之所為以垂戒後世其欲人之自别于禽獸之害也可謂深切著明矣三十有一年春王正月夏六月辛巳公薨于楚宫公作楚宫穆叔曰大誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月辛巳公薨于楚宫穀梁氏曰非正也髙氏曰公適楚而好其宫歸而擬之因名焉不居先君之正寢而安于所樂是以不正其終也夫公作宫而以楚為式稱名不經非禮也不于始作而譏之直言薨于楚宫者乃所以深譏之也大東萊吕氏曰不薨于路寢已非正也而又薨于楚宫若襄公者可謂安其危而利其災樂其所以亡者秋九月癸巳子野卒立胡女敬歸之子子野次于季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子裯穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子且是人也居䘮而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰衽如故衰于是昭公十九年矣猶有童心君子是以知其不能終也泰山孫氏曰襄公太子未踰年之君也名者襄公未葬也不薨不地降成君也己亥仲孫羯卒冬十月滕子來㑹葬癸酉葬我君襄公滕成公來㑹葬惰而多涕子服惠伯曰􅅬君將死矣怠于其位而哀已甚兆于死所矣能無從乎謝氏曰奔䘮㑹葬臣子之禮也諸侯于王室無奔䘮㑹葬之事而邾滕反行于强國書滕子邾子奔䘮㑹葬而諸侯之惡見矣家氏曰魯君未嘗㑹天王之葬而􅅬子來㑹魯葬滕子之來魯之受皆有貶也諸侯來㑹𦵏于是始陳氏曰改葬惠公也衛侯來㑹葬隱公不見春秋之初魯猶秉禮晉景公之䘮成公弔焉亦巳卑矣晉于是止公使送葬諸侯莫在魯人辱之雖霸主未有君㑹葬者也葬楚康王也公及陳侯鄭伯許男送于西門之外則天下諸侯有㑹葬于楚者矣于是滕子㑹葬于魯是春秋之季也㑹葬猶可奔䘮甚矣十有一月莒人弑其君密州莒犂比公生去疾及展輿既立展輿又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弑之乃立去疾奔齊齊出也展輿吳出也程子曰莒子虐國人弑之而立展輿展輿非親弑也故書國人胡氏曰經以傳為按傳有乖繆則信經而棄傳可也若密州之事是矣故趙匡謂其文當曰展輿因國人之攻莒子弑之乃立而後來傳寫誤為以字爾家氏曰犂比公虐國人作亂而弑之展輿既廢于父見立于國人故有以弑之罪而加之者使展輿能討賊于既立之後庻乎可以逃此名矣春秋闕疑卷三十三
