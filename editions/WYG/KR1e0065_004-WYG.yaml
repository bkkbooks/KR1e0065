body:
  text: 春秋闕疑卷四元鄭玉撰七年春二月己亥焚咸丘胡氏曰書焚咸丘所謂焚林而田也程子曰古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也咸丘地名焚咸丘見其廣之甚也謝氏曰古者天子不合圍諸侯不掩羣示愛也舉咸丘焚之失先王田獵之道矣夏穀伯綏來朝鄧侯吾離來朝程子曰臣之弑君天理滅矣宜天下所不容也而天子反聘之諸侯相繼而朝之逆亂乎天道歲功不能成矣故不書秋冬與四年同曰然則十五年邾人牟人葛人來朝何以書秋冬四年與此明其義矣胡氏曰立天之道曰陰陽陽居春夏以養育為事所以生物也陰居秋冬以肅殺為事所以成物也王者繼天而為之子則有刑賞賞以勸善非私與也故五服五章謂之天命刑以懲惡非私怒也故五刑五用謂之天討古者賞以春夏刑以秋冬象天道也桓弟弑兄臣弑君而天討不加焉是陽而無陰歲功不能成矣故特去秋冬二時以志當世之失刑也獨於四年七年缺焉者按周制大司馬諸侯而有賊殺其親者則正之放弑其君者則殘之桓弑隱公而立大司馬九伐之法雖未之舉猶有望也及冡宰下聘恩禮加焉則天下之望絶矣故四年宰糾書名而去秋冬二時以見天王之不復能用刑也陳恒弑其君孔子請討之以從大夫之後不敢不告也桓弑隱公而立雖方伯連帥環視而未之恤猶有望也及穀鄧二國自遠來朝則天下諸侯莫有可望者矣故七年穀伯鄧侯各書其名而去秋冬二時以見諸侯之不復能修其職也然則見之行事不亦深切著明已乎八年春正月己卯烝公羊氏曰烝冬祭也春曰祠夏曰礿秋曰甞冬曰烝常事不書此何以書譏亟也亟則黷黷則不敬君子之祭也敬而不黷髙郵孫氏曰烝進也於冬時物皆成熟凡可薦者皆進而祭之也程子曰冬烝非過也書之以見五月又烝為非禮之甚也程氏學曰春秋祭祀常事不書周正月夏十一月也烝冬祭合禮而書者為五月復烝見黷也禮曰祭不欲數數則煩煩則不敬宗廟重事祭祀有時乃慢棄彞典黷于先君其罪著矣天王使家父來聘杜氏曰家父天子大夫家氏父字程子曰魯桓弑立未嘗朝聘而屢聘之失道之甚也胡氏曰下聘弑逆之人而不加貶者既名冡宰於前其餘無責焉乃同則書重之義以此見春秋任宰相之專而責之備也髙郵孫氏曰桓公大惡之人而五年之間來聘者三春秋一切書之所以見不能討惡而王道之衰遂使篡人得志也夏五月丁丑烝程子曰正月既烝矣而非時復烝者必以前烝為不備也其黷亂甚矣胡氏曰春秋之文有一句而包數義者有再書而一貶者戎伐凡伯于楚丘以歸之類一句而包數義春正月己卯烝夏五月丁丑烝再書而一貶秋伐邾泰山孫氏曰不出主名微者冬十月雨雪春秋十月夏時八月也陰未當盛陽未當衰八月雨雪所以見陰盛而陽衰也程子曰建酉之月未霜而雪書異也祭公來遂逆王后于紀公羊氏曰祭公天子之三公何以不稱使昏禮不稱主人遂者何生事也大夫無遂事此其言遂何成使乎我也使我為媒可則因用是徃逆也女在其國稱女其稱王后何王者無外其辭成矣髙郵孫氏曰祭公逆王后而來至於魯者魯主天王之婚也祭公來魯謀婚謀合而遂徃逆之不反白於天王也張氏曰祭公謀於魯則當復命于王然後遣於宗廟以明逆后之重今使魯為媒而用是往逆輕䙝王配如此何以示正始之道哉故書若祭公之私行而以逆后為遂事以深譏之陳氏曰書遂始於此凡遂譏也莫甚於逆后罪祭公且罪魯也九年春紀季姜歸于京師程子曰書王國之事不可用無王之月故書時而已杜氏曰季姜桓王后季字姜姓公羊氏曰其辭成矣則其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜京師者天子之居京大也師衆也天子之居必以衆大之辭言之髙郵孫氏曰祭公之逆則曰王后天子命為之后雖在於紀亦天子之天下也自紀而歸則曰季姜有父母之尊不敢以尊名稱也天王之居必以衆大之辭言之者猶曰至大矣小者不能敵也至衆矣寡者不能當也欲天王自處於至衆至大之地以臨天下之寡小也季姜之歸不曰周天下無往而非周也胡氏曰自逆者而言則當尊崇其匹内主六宫之政使妃妾不得以上僭故從天王所命而稱王后示天下之母儀也自歸者而言則當樛屈待下使夫人嬪婦皆得進御於君而無嫉妒之心故從父母所子而稱季姜化天下以婦道也其辭之抑揚上下進退先後各有所當而不相悖皆正始之道王化之基春秋之所謹也樸鄉吕氏曰季姜書歸于京師而劉夏之逆后不書歸者祭公之逆以魯為之主故書之詳劉夏之逆以其過魯而已故書之畧也夏四月秋七月冬曹伯使其世子射姑來朝曹太子來朝賓之以上卿享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也穀梁氏曰朝不言使言使非正也使世子抗諸侯之禮而來朝曹伯失政矣諸侯相見曰朝以待人父之道待人子以内為失正矣内失正曹伯失正世子可以已矣則是方命也尹子曰夫已多乎道胡氏曰周官典命凡諸侯之適子誓於天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出會朝聘之儀矣然攝其君繼子男者謂諸侯朝於天子急述職也諸侯閒於王事則相朝其禮本無時曹伯既有疾何急於朝桓而使世子攝哉大位姦之窺也危病邪之伺也世子君之貳也君疾而儲副出啟窺伺之心當享而射姑歎踰月而終生卒其有疾明矣而使世子來終生之過也世子將欲已乎則方命矣曰孝子盡道以事其親者也不盡道而茍焉以從命為孝又焉得為孝十年春王正月庚申曹伯終生卒胡氏曰十者盈數也天道十年則亦周矣人事十年則亦變矣桓公至是其數已盈宜見誅於天人矣十年書王紀常理也夏五月葬曹桓公秋公會衞侯于桃丘弗遇公羊氏曰會者何期辭也穀梁氏曰弗遇者志不相得也弗内辭也髙氏曰衞侯先與公為會期既而復與齊鄭合謀將以伐我故公往會而弗遇此固衞侯之失信然亦見公以弑逆為諸侯所棄聖人書之所以深為萬世之戒也范氏曰魯至桃丘而衞不來故書弗遇以殺耻家氏曰此魯桓有求於衞侯欲為此會衞人拒而弗許春秋與之諸説皆以為譏衞侯失信非也自入春秋弑君者衞州吁魯桓宋督三人爾州吁迄正天討而宋督以賂免魯桓請婚以結齊割許田以賂鄭故得逭討至今而諸侯實不盡與也衞於魯親而非黨自弑君未甞受其要結之賂今魯人請以為會衞侯獨不從春秋與其斥絶惡人不與為會非貶其失信也冬十有二月丙午齊侯衞侯鄭伯來戰于郎初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衞師助之胡氏曰春秋加兵于魯衆矣未有書來戰者此獨不稱侵伐而以來戰為文何也兵凶器戰危事聖人之所重也誅暴禁亂敵加兵於己有不得已而應之者矣未有悖道縱欲得已不已而先之者也魯桓弑立天下大惡人人之所得討也鄭伯則首盟于越以定其位齊侯則繼會于稷以濟其姦曾不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師戰于魯境尚為知類也哉春秋之所必誅而不以聽也故以三國為主而書來戰于郎鄭人主兵而首齊猶衞州吁主兵而先宋十有一年春正月齊人衞人鄭人盟于惡曹胡氏曰盟會皆君臣之禮故微者之盟會不志于春秋凡春秋所志必有君與貴大夫居其間者也惡曹之盟即三國之君矣既不以道興師為郎之戰又結怨固黨為惡曹之盟故前書其爵而以來戰著罪後書此盟而以奪爵示貶夏五月癸未鄭伯寤生卒秋七月葬鄭莊公九月宋人執鄭祭仲突歸于鄭鄭忽出奔衞公之未昏於齊也齊侯欲以文姜妻鄭太子忽太子忽辭人問其故太子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何遂辭諸鄭伯祭仲曰必取之君多内寵子無大援將不立三公子皆君也弗從初祭仲有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衞己亥厲公立胡安定先生曰宋公執人權臣廢嫡立庻以亂鄭國故奪其爵胡氏曰祭仲鄭相也見執于宋使出其君而立不正罪較然矣何以不名命大夫也命大夫而稱字非賢之也乃尊王命貴正卿大祭仲之罪以深責之也或曰孔父賢而書名則曰禮之大節也今此則名其君於下而字其臣于上何以異乎曰春秋者輕重之權衡也變而不失其正之謂權常而不過于中之謂正宋殤孔父道其常祭仲昭公語其變惟可與權者其知之矣愚謂孔父死于其君之難故得盡君前臣名之禮祭仲擅廢其君故不得從孔父之道陳氏曰春秋之褒貶名號不足以盡意則見於辭書曰宋人執鄭祭仲突歸于鄭鄭忽出奔衞斯其為辭也詳矣謝氏曰國有權臣則上下易分生殺廢置惟其所命故宋之改立鄭君也執一鄭祭仲而鄭國之君位遷矣春秋首書宋執祭仲而繼以突歸忽出以明鄭國進退之權皆出祭仲也突公子也不以國氏者責其非正也忽君也稱名不稱子以其絶于國人也鄭莊公之卒也忽以世子嗣位巳五月矣政不足以結人心德不足以保君位美狂狡以為忠良矜小廉以失大援賢人棄外而國命擅于私門君道微弱而倡和行於叔伯由此命令皆出于權臣而其𫝑與匹夫不異故宋人誘祭仲而執之也突有臣民歸從而忽無左右之助矣由此突歸國而忽出奔于衞也然則突非正也非正而於入稱歸以咎忽之失人心也忽正也正而於出稱名以咎忽之失君位也其于突也去國以明非正穪歸以明得國其于忽也稱國以明正去爵以示絶而突之進不由正忽之䘮失君道其惡顯矣歸内辭入外辭於歸而稱入於入而稱歸皆春秋變文以示義也臨江劉氏曰歸者順辭有易辭焉非所順而書易也突之易見祭仲之専也柔會宋公陳侯蔡叔盟于折公羊氏曰柔者何吾大夫之未命者也胡安定先生曰蔡叔者字也蔡侯之弟也髙氏曰諸侯之弟國而字之言與君同體也趙氏曰凡大夫特盟公侯非禮也陳氏曰以大夫會諸侯盟於是始也家氏曰大夫盟諸侯强國行之則為伉弱國行之則為僭末流之弊諸侯大夫因是而外交强國以脅制其君如魯季衞孫宋華之所為此其權輿春秋不與也公會宋公于夫鍾冬十有二月公會宋公于闞胡氏曰臣與宋公盟于折君與宋公會于夫鍾于闞于虛于龜皆存而不削何其辭費也曰盟者春秋所惡而屢盟以長亂會者諸侯所不得而數會以厚疑聖人皆存而不削於以見屢盟而卒叛數會而卒離其事可謂著明矣是故春秋之志在於天下為公講信修睦不以會盟為可恃也十有二年春正月夏六月壬寅公會把侯莒子盟于曲池平把莒也秋七月丁亥公會宋公燕人盟于穀丘張氏曰宋之納突于鄭求賂而後使之入及突入國之後不能償其責言遂成釁隙故桓公欲平之髙氏曰宋公連燕人將以討鄭故公復往會請平而與之盟杜氏曰燕人南燕大夫家氏曰南燕姞姓在鄭衞之閒姞女為后稷元妃周王業所基也北燕姬姓在晉之北召公奭之後也昭三年北燕伯欵奔齊稱北所以别于南二燕皆周建國而俱以燕為號豈受封之始便有南北之異乎史記謂北燕為山戎所隔至齊桓伐戎開道而後與中國通故其見於春秋獨後此二燕之辨八月壬辰陳侯躍卒公會宋公于虛冬十有一月公會宋公于龜髙氏曰公委宗社人民而六出與宋會蓋公憾鄭忽而欲定突是以不憚屈辱力為鄭請然諸侯臨涖一國之民民不可一日不治則國不可一日去之故先王之法諸侯朝事天子則出境天子巡狩則出境方伯率諸侯以征伐則出境親迎則出境若無事出境則誅春秋之時侵伐盟會無時無之諸侯未嘗安居國中以治其民也聖人悉書之以著其罪於罪之中又為之輕重焉蓋當時王政不行天下無王諸侯不從事於盟會則又無以安其國有相會以謀侵伐者各從其會以見其事以王法論之凡諸侯去其國家而擅相會者皆罪爾聖人又通以一時之權而較以輕重也今公區區為鄭而數出會宋宋公亦為求賂而數與公會皆非為國為民其罪均耳丙戌公會鄭伯盟于武父髙氏曰宋公辭平故公自龜還遽會鄭伯而謀伐之許氏曰王迹既熄伯統未興諸侯自擅無所禀命觀隱十年見兵革之亂也桓十一年以來見盟會之亂也是以君子不得已於斯民而以禮樂征伐實與桓文故伯統興起則無復此亂諸侯有所一矣樸鄉呂氏曰突篡君也武父之盟書曰鄭伯何也諸侯雖以篡得國茍其大臣君之其國人君之諸侯亦與之會盟以為彼國之君也聖人亦從而君之其實也丙戌衞侯晉卒髙氏曰卒而日之蒙上文也重書丙戌必有一誤十有二月及鄭師伐宋丁未戰于宋公欲平宋鄭秋公及宋公盟于句瀆之丘宋成未可知也故又會于虛冬又會于龜宋公辭平故與鄭伯盟于武父遂帥師而伐宋戰焉胡氏曰既書伐宋又書戰于宋者責賂于鄭而無厭屢盟于魯而無信者宋也二國聲其罪以致討故書曰伐夫宋人之罪固可伐矣取其賂以立督者魯桓也􅓵其力以篡國者鄭突也無諸己然後可以非諸人春秋之義用賢治不肖不以亂易亂也故又書曰戰于宋來戰者罪在彼戰于郎是也往戰者罪在内戰于宋是也謝氏曰凡内戰公敗則書戰不書敗以敗為耻也戰不書公諱之也敵敗則書敗不書戰以敗之為耻也敗則書公不諱也伐宋者公也戰則知為敗矣故諱不書公春秋闕疑卷四
