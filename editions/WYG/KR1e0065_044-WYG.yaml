body:
  text: 春秋闕疑卷四十四元鄭玉撰六年春城邾瑕許氏曰定哀十六年間凡八城邑魯既不得事晉諸侯方爭是以髙城㴱池務守其國以捍禍亂防虞至矣雖然使魯能修其政如治城者則天下歸之豈特菫菫自守而已是以譏也三年以來歲書城邑以著魯無德政勞民如此後雖城邑不復志矣愚按邾瑕公羊以為邾邑然魯人既無入瑕之事又無取瑕之文忽有城瑕之舉且不帥師徒竞成是役疑只魯邑而自城之非强城邾邑也晉趙鞅帥師伐鮮虞治范氏之亂也髙氏曰鮮虞納荀寅于柏人故趙鞅伐之吳伐陳復修舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師于城父髙氏曰陳楚與也吳之入楚召陳侯不至吳人怨之今伐陳者修先君之怨也聖人惡吳人侵暴中國故狄之夏齊國夏及髙張來奔齊陳乞偽事髙國者毎朝必驂乘焉所從必言諸大夫曰彼皆偃蹇將棄子之命皆曰髙國得君必偪我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定既成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入于公宫昭子聞之與惠子乗如公戰于莊敗國人追之國夏奔莒遂及髙張晏圉弦施來奔髙氏曰二子從君之亂命廢長立少既又不能全其嗣君而陳乞將立陽生故先出奔師氏曰國君將薨必有受顧命之臣而齊之所任無出二子之右二子既受命立君不終所事畏死奔于他國則齊國之難誰任其責以弭之二子之罪于此不可逃矣許氏曰親臣去則國體輕國體輕則君勢降故必奔髙國而後陳乞弑君之謀得肆矣家氏曰髙國從君于邪又不能以死奉茶名而奔之所以誅也然髙國百年之舊族一旦為疎逺賤臣所傾髙國逐而孺子死孺子死而陽生立齊國之命制于陳氏自是三弑其君國隨以亡由辨之不早辨以至此極亡齊者景公乎叔還㑹吳于柤許氏曰叔還以吳在柤故徃㑹之始結吳好也僣亂之國可以强大服難以衰弱御以魯政之不修務與吳親以資其力君子志柤之㑹于此知魯之將有吳患矣秋七月庚寅楚子軫卒七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讐亦不如死死一也其死讐乎命公子申為王不可則命公子結亦不可則命公子啟五辭而後許將戰王有疾庚寅昭王攻大㝠卒于城父子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還是歲也有雲如衆赤鳥夾日以飛三日楚子使問于周太史周太史曰其當王身乎若禜之可移于令尹司馬王曰除腹心之病而寘諸股肱何益不穀不有大過天其夭諸有罪受罸又焉移之遂弗禜初昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭齊陽生入于齊程子曰稱齊陽生見景公廢長立少以啟亂也胡氏曰陽生曷為不稱公子非先君之子也為人子者無以有已則以父母之心為心者景公命茶世其國已則篡荼而自立是自絶于先君豈復得為先君之子也不稱公子誅不子也陽生不子則曷為繫之齊春秋端本之書正其本則事理陽生之不子其誰使之然也不有廢長立少以啟亂者乎故齊景問于孔子孔子對曰君君臣臣父父子子君不君則臣不臣父不父則子不子以陽生繫之齊著亂之所由生也愚按繫陽生于齊所以明國君與子之法陽生不稱公子所以明人子事親之道使人君而知此則豈有廢長立少以亂其國如齊景公者乎使人子而知此則豈有弑君篡位以陷于逆如陽生者乎此春秋之所以為教也齊陳乞弑其君荼陳僖子使召公子陽生陽生駕而見南郭且于曰嘗獻馬于季孫不入于上乘故又獻此請與子乘之出萊門而告之故闞止知之先待諸外公子曰事未可知反與壬也處戒之遂行逮夜至于齊國人知之僖子使子士之母養之與饋者皆入冬十月丁卯立之將盟鮑子醉而徃其臣差車鮑㸃曰此誰之命也陳子曰受命于鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不惟子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江説囚王豹于句竇之丘公使朱毛告于陳子曰微子則不及此然君異于器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庻亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪于陳子而圖其小可也使毛遷孺子于駘不至殺諸野幕之下葬諸殳冒淳杜氏曰弑荼者朱毛與陽生也而書陳乞所以明乞立陽生而荼見弑則禍由乞始也謝氏曰陽生之入陳乞召之也立陽生遷孺子陳乞之命也由此上下易位而齊君被難于姦凶之手矣齊國廢立之權皆出于乞故荼之禍以首惡歸陳乞髙郵孫氏曰陽生入齊而陳乞弑君則是陽生與聞乎弑也不以陽生首惡者陽生之入陳乞召之荼之弑陳乞為之加陽生以弑君之罪則陳乞廢立之迹不明書陽生之入而陳乞弑君則陳乞之惡著而陽生與有罪也髙氏曰乞召陽生固將君之矣陽生為君則孺子荼安所置哉春秋别嫌明微故誅陳乞非天下之至公孰能與于此家氏曰桓公之入書齊小白入于齊陽生之入亦書齊陽生入于齊然桓公之入齊無君也陽生之入齊有君也陽生先荼之弑而入既入而後陳乞弑荼荼弑雖在陽生既入之後謀實定于陽生未入之前不與小白同也晉獻公戕其世子而立嬖妾之子其事與此畧相似荼則卓也陽生則夷吾也里克則陳乞也然夷吾不與殺而陽生實與于殺則陽生又不得與夷吾同也但弑荼立陽生乃陳乞之本謀陽生非陳乞不得入故弑君之罪專在陳乞此春秋書法輕重之權衡也冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭鄭叛晉也家氏曰是時諸侯無從晉者宋之侵鄭豈為晉乎宋人連歲有事于曹諸侯無救之者意鄭人與曹為援宋疾而侵之故是歲冬宋圍曹鄭救之自是宋鄭交兵互取師焉于雍丘于嵒是也春秋書宋侵鄭責宋也晉魏曼多帥師侵衛衛不服也愚按衛輒以子拒父于今六年晉人不能明大義聲其罪而伐之曼多乃以衛不服之故掠其境而侵之亦可謂不知務矣晉之失霸不亦宜乎夏公㑹吳于鄫公㑹吳于鄫吳來徵百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命于諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦唯執事吳人弗聽景伯曰吳將亡矣棄天而背本不與必棄疾于我乃與之太宰嚭召季康子康子使子貢辭太宰嚭曰國君道長而大夫不出門此何禮也對曰豈以為禮畏大國也大國不以禮命于諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髮文身臝以為餙豈禮也哉有由然也反自鄫以吳為無能為也謝氏曰六年㑹吳于柤七年㑹吳于鄫魯之畏甚矣非保國之道也張氏曰比年書㑹吳所以著哀公之失謀于始而遺患于後日也家氏曰吳徵百牢魯人陳義以爭吳卒不從甘于吳也秋公伐邾八月己酉入邾以邾子益來季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信伐小國不仁民保于城城保于德失二德者危將焉保孟孫曰二三子以為何如惡賢而逆之對曰禹合諸侯于塗山執玉帛者萬國今其存者無數十焉唯大不字小小不事大也知必危何故不言魯德如邾而以衆加之可乎不樂而出秋伐邾及范門猶聞鐘聲大夫諫不聽茅成子請告于吳不許曰魯擊析聞于邾吳二千里不三月不至何及于我且國内豈不足成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保于繹師宵掠以邾子益來獻于宅社囚諸負瑕負瑕故有繹邾茅夷鴻以束帛乘韋自請救于吳曰魯弱晉而逺吳馮恃其衆而背君之盟辟君之執事以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟于鄫衍秋而背之成求而不違四方諸侯其何以事君且魯賦八百乗君之貳也邾賦六百乘君之私也以私奉貳惟君圖之吳子從之穀梁氏曰以者不以者也臨江劉氏曰邾子益何以名賤之也賤之奈何虜服也蘇氏曰魯入邾以邾子益來而不書滅何也邾大夫茅夷鴻保于茅請救于吳明年吳為之伐魯魯復邾子故不言滅也在外曰以歸在内曰以來内外之别也胡氏曰春秋隱君之惡故滅國書取婉以成章而不失其實也恃强凌弱無故伐人而入其國處其宫晝夜掠以其君來獻于亳社囚于負瑕此天下之惡也吳師為是克東陽齊人為是取吾二邑辱國亦甚矣何以僃書于䇿而不諱乎聖人道隆而德大人之有惡務去之而不積也則不念其惡而進之矣以邾子益來惡也歸邾子益于邾是知其為惡能去之而不積也故書以邾子益來而不諱者欲見後書歸邾子之為能去其惡而與之也聖人之情見矣明此然後可以操賞罸之權不明乎此以操賞罸之權而能濟者鮮矣宋人圍曹冬鄭駟𢎞帥師救曹宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫疆許之旦而求之曹無之戒其子曰我死爾聞公孫疆為政心去之及曹伯陽即位好田弋曹鄙人公孫疆好弋獲白雁獻之且言田弋之説説之因訪政事大説之有寵使為司城以聽政夢者之子乃行疆言霸説于曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑于其郊曰黍丘揖丘大城鍾邘髙氏曰宋之伐曹數矣今又圍之亦已甚矣故貶而人之謝氏曰樂髠帥師伐曹向巢帥師伐曹宋人圍曹大國無一為之援而鄭能帥師救之善之也家氏曰春秋與鄭之能救所以愧齊晉諸大國之不能救也八年春王正月宋公入曹以曹伯陽歸宋公伐曹將還禇師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城疆以歸殺之愚按宋公滅曹而經書入先儒以為力能救之而不救故不言滅信爾則救者之罪何責乎曹之過也或又謂滅者亡國之善辭曹亡與虞同故不書滅曹之與虞事既不同書法亦異難以例觀也或又謂曹亡春秋之終興滅國繼絶世夫子蓋嘗有此言也于是曹不言滅其意蓋謂夫子至此不忍書滅也義則㴱矣而失之巧聖人之心公正平大聖人之言明白洞逹未必如是之㴱且晦也詳考其義與公入邾以邾子益來同文然其後既殺曹伯又無復曹之事亦不應以内辭書外事也入字疑誤吳伐我吳為邾故將伐魯問于叔孫輒叔孫輒對曰魯有名而無情伐之必得志焉退而告公上不狃公山不狃曰非禮也君子違不適讐國未臣而有伐之奔命焉死之可也所托也則隱且夫人之行也不以所惡廢鄉今子以小惡而欲覆宗國不亦難乎若使子率子必辭王將使我子張病之王問于子洩對曰魯雖無與立必有與斃諸侯將救之未可以得志焉晉與齊楚輔之是四讐也夫魯齊晉之唇唇亡齒寒君所知也不救何為三月吳伐我子洩率故道險從武城初武城人或有因于吳竟田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之王犯嘗為之宰澹臺子羽之父好焉國人懼懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉吳師克東陽而進舍于五梧明日舍于蠶室公賓庚公甲叔子與戰于夷獲叔子與析朱鉏獻于王王曰此同車必使能國未可望也明日舍于庚宗遂次于泗上微虎欲宵攻王舍私屬徒七百人三踊于幕庭卒三百人有若與焉及稷門之内或謂季孫曰不足以害吳而多殺國士不如己也乃止之吳子聞之一夕三遷吳人行成將盟景伯曰楚人圍宋易子而食析骸以㸑猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能乆將歸矣請少待之弗從景伯負載造于萊門乃請釋子服何于吳吳人許之以王子姑曹當之而後止吳人盟而還蘇氏曰不言四鄙直言伐我兵加于國都也胡氏曰吳為邾故興師伐魯盟于城下經不書盟諱之也楚人圍宋易子而食析骸而㸑亦云急矣欲盟城下則曰有以國斃不能從也晉師從齊齊侯致賂晉人不可國佐對曰子若不許請合餘燼背城借一斃邑之幸亦云從也遂盟于爰婁而春秋與之今魯未及虧不能少待遂有城下之盟是棄國也夫棄國者其能國乎使有華元國佐之臣則不至此矣故春秋不言與吳盟者欲見其實而㴱諱之以為後世謀國之士不能以禮自强偷生惜死至于侵削凌遲而不知恥者之戒也夏齊人取讙及闡齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡程子曰内失邑不書君辱當諱也不能保其土地人民是不君也已與之彼以非義而受則書取此與濟西田是也魯入邾而俘其君能致齊怒吳伐故賂齊以説之家氏曰公羊穀梁以齊人為邾故謀伐魯故以地賂之左氏則以為季康子嘗以女妻陽生陽生既君齊而女未以歸故齊人來伐今以經㫖而觀齊之兵端當從公穀非以女故蓋齊取二邑要魯以存邾魯既歸邾于取邑之後即繫之以存邾魯既歸邾子齊既歸侵疆春秋與齊以存亡之義也歸邾子益于邾齊侯使如吳請師將以伐我乃歸邾子邾又無道吳子使大宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政愚按不曰邾子益歸于邾而曰歸邾子益于邾者蓋言邾子益歸于邾則是邾子能自歸或藉諸侯之力以歸也今曰歸邾子益于邾則是魯見諸侯之伐已悔前過而自歸之也聖人與魯之意明矣許人改過遷善之義宏矣此義茍行天下後世有不可為善者乎家氏曰觀吳伐我而春秋不與之以救邾齊取二邑而春秋繫之以存邾而聖人之意可識矣蓋齊之力自足以制魯何必召吳而與之俱伐存亡國義也召吳兵而伐與國則不得謂之義矣所以卒召外寇而有殞身喪師之悔也秋七月冬十有二月癸亥杞伯過卒齊人歸讙及闡秋及齊平九月臧賓如如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖冬十二月齊人歸讙及闡季姬嬖故也九年春齊侯使公孟綽辭師于吳吳子曰昔歲寡人聞命今又革之不知所從將進受命于君髙氏曰公既歸邾子益于邾故齊人歸讙及闡前書取逆辭此書歸順辭張氏曰濟西田歸于十年之後故書我讙及闡歸于取之年故不言我泰山孫氏曰凡土地諸侯取之歸之皆書者惡專恣也取而不歸則又甚矣謝氏曰我兼邾則齊取我邑我棄邾則齊歸我邑不守天子分地而輒以兵力爭地爭城王法皆在所誅者也師氏曰齊欲救邾緩頰修辭開譬利害使魯悟而自歸之可也乃取魯田以為脅致若曰不歸邾子則田不可復得兹則因事肆貪魯既失之齊亦未為得也向使魯不歸邾子則讙闡遂不免為齊所有是豈救邾之道耶胡氏曰魯以益來則齊人取讙及闡又如吳請師而怒猶未怠也以此見魯君造惡不悛則四鄰謀取其國家莫能保矣歸益于邾則齊人歸讙及闡又辭師于吳而德猶未冺也以此見國君去惡而不積則四隣不侵其封境而自安矣去逆效順息爭休兵齊無取地之罪魯無失地之辱以此見遷善之優改過之大而春秋不諱入邾以邾子益來者以明歸益于邾之能掩其前惡而美之也九年春王二月葬杞僖公宋皇瑗帥師取鄭師于雍丘鄭武子賸之嬖許瑕求邑無以與之請外取之故圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚救之大敗二月甲戌宋取鄭師于雍丘使有能者無死以郟張與鄭羅歸穀梁氏曰取易辭也以師而易取鄭病矣趙氏曰凡悉俘之曰取某師臨江劉氏曰此師也其言取之何覆之也覆而敗之不遺一人之辭也許氏曰春秋之季日尋干戈詐力相傾竒變滋起于是始志取人之師甚其譎惡其盡也鄭以不義㴱入敵境而圍其邑此固喪師之道也大東萊呂氏曰宋人蔡人衛人伐戴鄭伯伐取之不義也猶有難也此直言取之易之甚也夏楚人伐陳陳即吳故也秋宋公伐鄭晉趙鞅卜救鄭遇水適火占諸史趙史墨史龜史龜曰是謂沈陽可以興兵利以伐姜不利子商伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啟帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止家氏曰宋既滅曹又取鄭師于雍丘怙其驕盈親御戎以伐鄭書宋公伐鄭非爵也貶也何以知其為貶宋滅曹者也鄭救曹者也鄭自救曹以來與宋有隙連歲交兵雖更勝迭負不能存曹人之傾覆而鄭于義為直春秋與之比事而觀可以見矣冬十月十年春王二月邾子益來奔齊甥也故遂奔齊陳氏曰此吳人討邾奉太子革為政而後奔則其但書奔何以是為自失國也春秋之法茍其道足以失國雖有敵國猶以自致之文書之髙氏曰先為魯所獲而又來奔其不知恥甚矣公㑹吳伐齊九年秋吳城邗溝通江淮冬吳子使來儆師伐齊至是公㑹吳子邾子郯子伐齊南鄙師于鄎泰山孫氏曰公㑹吳伐齊齊中國也吳夷狄也㑹夷狄伐中國其惡可知也家氏曰甚矣夫差之不仁也齊請兵伐魯為邾故耳邾子既得返國齊人辭吳師齊魯無事吳亦得息其民夫豈不善乃以是為怒移伐魯之兵以伐齊于此知夫差之將亡夫以太伯之後已起而圖霸使之率循于義亦無不可而負才矜力日尋干戈聞伐國則喜而勇徃聞止師則怒而移伐是故春秋惡之書㑹吳伐齊公與吳皆有貶也三月戊戌齊侯陽生卒齊人弑悼公赴于師吳子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還愚按經書齊侯陽生卒而傳稱齊人弑悼公以赴于師蓋是時夫差怒齊之止吳師也率四國之師以臨乎齊兵威甚盛齊人方恐懼無以為解而悼公適斃乃偽赴乎師若曰齊君得罪于吳國人已討之矣無辱諸侯之師吳師乃還史因其赴遂以弑書經考其弑乃書卒也夏宋人伐鄭許氏曰春取其師秋又伐之明年夏又伐之惡其修怨不已也晉趙鞅帥師侵齊趙鞅帥師伐齊大夫請卜之趙孟曰吾卜于此起兵事不再令卜不襲吉行也于是取犁及轅毁髙唐之郭侵及賴而還許氏曰助吳亂華伐齊之喪具文以見其罪五月公至自伐齊𦵏齊悼公衛公孟彄自齊歸于衛謝氏曰公孟彄以世子之禍出奔今以齊力還國書歸明其無大罪也薛伯夷卒秋𦵏薛惠公冬楚公子結帥師伐陳吳救陳楚子期伐陳吳延州來季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還胡氏曰凡書救者未有不善之者也吳雖南蠻之國來㑹于戚則進而書人矣使季札來聘則又進而書子矣救而果善曷為獨以號舉而不進之也其以號舉而不進之者㴱著楚罪而傷中國之衰也春秋闕疑卷四十四
