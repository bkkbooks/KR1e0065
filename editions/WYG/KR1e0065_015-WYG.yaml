body:
  text: 春秋闕疑卷十五元鄭玉撰十有三年春狄侵衞胡氏曰齊桓公為陽穀之㑹是肆于寵樂其行荒矣楚人伐黄而救兵不起是忽于簡書其業荒矣然後狄人窺伺中國今年侵衞明年侵鄭近在王都之側淮夷亦来病杞而不忌也伯益戒于舜曰無怠無荒四夷来王此至誠無息帝王之道春秋之法也齊桓晉文若此類者其事則直書于䇿其義則游聖門者黙識于言意之表矣故曰仲尼之徒無道桓文之事者夏四月葬陳宣公公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹十一年夏楊距泉臯伊雒之戎同伐京師入王城焚東門王子帶召之也秦晉伐戎以救周秋晉侯平戎于王十二年王以戎難故討王子帶秋王子帶奔齊冬齊侯使管夷吾平戎于王王以上卿之禮享管仲管仲辭曰臣賤有司也有天子之二守國髙在若節春秋来承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勲應乃懿徳謂督不忘往踐乃職無逆朕命管仲受下卿之禮而還是年春齊侯使仲孫湫聘于周且言王子帶事畢不與王言歸復命曰未可王怒未怠其十年乎不十年王弗召也夏㑹于鹹淮夷病杞故且謀王室也十六年王以戎難告于齊齊徴諸侯而戍周二十二年富辰言于王曰請召太叔詩曰協比其鄰婚姻孔云吾兄弟之不協焉能怨諸侯之不睦王悦王子帶自齊復歸于京師王召之也髙郵孫氏曰鹹之㑹二傳皆無事迹惟左氏以為謀杞且謀王室案王室之事不載于經而明年經書城緣陵前目後凡則謀杞之説與經合矣秋九月大雩冬公子友如齊十有四年春諸侯城緣陵諸侯城緣陵而遷杞焉髙郵孫氏曰緣陵之地經不言杞者杞未􅁶也不叙諸侯而凡言之者㑹鹹之諸侯于是復合而城之前目後凡春秋之簡辭也去年之冬經書公子友如齊則是公子友受命魯公而聘諸侯也公子友受命而聘則齊魯之君皆當反其國矣然經不再敘之者以去年定其謀今年終其役事無殊異國無增損可以簡言之矣胡氏曰齊桓城三國而書辭不同城楚丘則没諸侯而不書城緣陵則書諸侯而不敘城邢則再序三國之師何也邢以自􅁶為文再序三師而書城邢者美其得救患分災之義也淮夷病杞諸侯㑹鹹城緣陵而遷杞焉其事專矣故前目後凡直書諸侯而不序也衞為狄滅東涉渡河野處漕邑桓公使公子無虧戍以甲士歸其祭服乘馬凡為國之用其力尤勤其功尤大其事尤專而春秋責之尤重曰城楚丘而不書諸侯正王法也是故以功言之則楚丘為大以義言之則城邢為美春秋之法明其道不計其功正其義不謀其利者也詳著城邢之師深没楚丘之迹貴王賤伯羞稱桓文以正待人之體也明此則知曾西不為管仲深畏仲由之説矣夏六月季姬及鄫子遇于防使鄫子来朝鄫季姬来寜公止之以鄫子之不朝也夏遇于防使来朝也胡氏曰春秋内女適人者明有所從則繫諸國若杞伯姬是也其未適人者欲有所别則書其字若子叔姬是也季姬書字而未繫諸國其女而非婦亦明矣及者内為志内女而外與諸侯遇譏魯也朝不言使言使非正鄫子國君而季姬使之朝病鄫也魯秉周禮男女之際豈其若是之甚乎蓋魯公鍾愛其女使自擇配故得與鄫子遇于防而遂以季姬歸之非所以愛而厚其别也故稱及稱遇稱使罪魯與鄫以正男女之禮為後世戒也髙郵孫氏曰傳以季姬歸寜而公止之故遇于防而使之朝案春秋内女適他國者必書歸季姬未嘗言歸于鄫而明年始書之又經不曰鄫季姬明其未歸也左氏徒見醜惡之甚以為必不至此故曲為之解文姜哀姜之行有甚于此者矣季姬之事經書之甚明無足疑也樸鄉吕氏曰豈其許嫁于鄫而未歸于鄫乎家氏曰僖公號賢君畧無正家之法魯之不競實由乎此春秋書此而季姬之惡狀見矣僖公何以辭其責秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國穀梁氏曰林屬于山為鹿沙山名也無崩道而崩故志之公羊氏曰外異不書此何以書為天下記異也髙郵孫氏曰春秋災異之志必言其國沙鹿梁山崩皆非魯地而春秋書之如内辭焉此聖人之意也夫水火之為災石鷁之為異地不過百里時不過數日所以召之者止于其君所以應之者盡于一國故國不可不著也至于王道大壊彜倫一斁而天下之人皆反皇極則天見其變而日食星孛地見其妖而川竭山崩所以召之者在于天下所以應之者徧于四海則雖在于國不得著其國也日有食之星孛于某其變之大其應之廣不可以一國言也沙鹿崩梁山崩雖在于晉而異及于天下不可以晉言也許氏曰恒星不見星隕如雨齊桓之祥也沙鹿崩晉文之祥也齊桓將興而天文隳晉文欲作而地理决王道之革也狄侵鄭許氏曰前年狄侵衞今年狄侵鄭而莫或攘之桓志之衰也王伯之政兢兢不可怠也齊桓之烈盛茂如此一矜而易心生之則狄人伐其同盟是以先王屢省成功而率作興事修誠慎憲務以戒終也冬蔡侯肸卒十有五年春王正月公如齊髙氏曰公十年如齊朝矣今又朝之五年一朝者諸侯事天子之禮也今移之于齊侯可乎楚人伐徐徐即諸夏故也三月公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐盟于牡丘尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之謝氏曰救患之師如解焚捄溺緩而不急則失救之道桓之救徐也八國已受盟矣其終也諸侯止而不進大夫帥師以出其救難不力可知也為隣國謀而不盡其心為不忠視人危急而􅁶延不進為不仁大者止而小者行為不義三者齊桓失救之道也然則遂救許遂之善者也以其進也遂次于匡遂之不善者也以其止也胡氏曰楚都于郢距徐亦逺而舉兵伐徐暴横慿陵之罪著矣徐在山東與齊宻邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見桓德益衰而禦冦亂安中國之志怠矣凡兵而書救未有不善之救而書次則尤罪其當速而故緩失用師之義矣中庸曰至誠無息不息則乆春秋謹始卒欲有國者敦不息之誠也始勤而終怠則不能乆而固其國矣陳氏曰諸侯在而大夫將于是始桓公為之也則桓志荒矣夏五月日有食之秋七月齊師曹師伐厲伐厲以救徐也薛氏曰厲楚漢東之與國也楚師東出而伐其與國固用兵之道也不役諸侯而專曹師之用求救微矣無救于徐之敗理也八月螽九月公至自㑹季姬歸于鄫胡安定先生曰歸者始嫁之辭髙郵孫氏曰季姬之歸不言所逆逆者鄫子也内女之歸不書逆皆其君自来逆之常事不書爾季姬惡行當絶而春秋書之與内女之歸旡異蓋季姬之貶己見於遇鄫子于防之時于是但以恩錄之爾己夘晦震夷伯之廟於是展氏有隱慝焉髙氏曰春秋遇朔書朔遇晦書晦蓋聖人因事而書晦朔之法使後世得以考焉杜氏曰夷伯魯大夫展氏之祖父左氏曰震夷伯之廟罪之也穀梁氏曰因此見天子至于士皆有廟天子七諸侯五大夫三士二故徳厚者流光徳薄者流卑是以貴始徳之本也始封必為祖權子曰春秋所書皆天人嚮應有致之道如石隕于宋而言隕石夷伯之廟震而言震夷伯之廟此天應之也但以淺狹之見以為無應其實皆應之然漢儒推災異皆牽合不足信儒者有厭於此因盡廢之謝氏曰慝惡之人使之居廟以享血食天之所惡也夷伯蓋有慝惡于魯而子孫猶以宗廟事之然則雷震其廟乃天惡夷伯而殛之也故春秋書之以示天戒焉師氏曰魯大夫之廟而雷震之彼天之威豈妄加于宗廟鬼神邪是必廟之踰制而子孫為魯用事之臣又不敢廢之故天震之以示變盈之道也冬宋人伐曹討舊怨也師氏曰自莊十四年曹嘗助齊以伐宋至此三十五年矣邇来未見其隙及齊侯伯中國二國同與盟㑹者十數矣今宋無故而侵曹乃以舊怨藉口而謂之伐宋公之可罪也明矣此其所以人之與陳氏曰諸夏之交兵自莊之十九年未之有也于是再見宋襄公為之也許氏曰同盟始相攻伐桓不能一矣則何以禁外域之亂伯徳方衰諸侯浸以貳也威靈之陵夷豈不惜哉家氏曰桓公志怠宋見閒而起于此知宋襄之為人外静内躁于桓之方存已有圖伯之心矣楚人敗徐于婁林徐恃救也家氏曰春秋初年猶未狄徐至此以後徐方以號舉師氏曰前此三月諸侯之大夫嘗救徐而今則楚人敗徐于婁林中國之威不足以震楚人而當時所救無益也明矣齊桓之伯得不衰乎張氏曰書以見楚兵之獨勝而救徐之功不立伐厲之謀無補也陳氏曰不數年宋楚争盟以是為盟主病矣十有一月壬戌晉侯及秦伯戰于韓獲晉侯晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯烝于賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山内及解梁城既而不與十三年冬晉荐饑使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤隣道也行道有福㔻鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦于是乎輸粟于晉自雍及絳相繼命之曰汎舟之役十四年冬秦饑使乞糴于晉晉人弗與慶鄭曰背施無親幸災不仁貪愛不祥怒隣不義四徳皆失何以守國虢射曰皮之不存毛將安傅慶鄭曰棄信背隣患孰恤之無信患作失援必斃是則然矣虢射曰無損于怨而厚于宼不如勿與慶鄭曰背施幸災民所棄也近猶讐之况怨敵乎弗聽退曰君其悔是哉十五年秦伯伐晉卜徒父筮之吉渉河侯車敗詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫狐蠱必其君也蠱之貞風也其悔山也歳云秋矣我落其實而取其材所以克也實落材亡不敗何待三敗及韓晉侯謂慶鄭曰宼湥矣若之何對曰君實深之可若何公曰不孫卜右慶鄭吉弗使歩揚御戎家僕徒為右乘小駟鄭入也慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤隂血周作張脉僨興外彊中乾進退不可周旋不能君必悔之弗聽九月晉侯逆秦師使韓簡視師復曰師少于我鬬士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以来也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎遂使請戰秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰于韓原晉戎馬還濘而止公號慶鄭慶鄭曰愎諫違卜固敗是求又何逃焉遂去之梁由靡御韓簡虢射為右輅秦伯將止之鄭以救公誤之遂失秦伯秦獲晉侯以歸穆姬聞晉侯將至以太子罃𢎞與女簡璧登臺而履薪焉使以免服衰絰逆且告曰上天降災使我兩君匪以玉帛相見而興戎若晉君朝以入則婢子夕以死夕以入則朝以死惟君裁之乃舍諸靈臺大夫請以入公曰獲晉侯以厚歸也既而䘮歸焉用之大夫其何有焉公子縶曰不如殺之無聚慝焉子桑曰歸之而質其太子必得大成晉未可滅而殺其君祗以成惡且史佚有言曰無始禍無怙亂無重怒重怒難任陵人不祥乃許晉平晉侯使郤乞告瑕吕飴甥且召之子金教之言曰朝國人而以君命賞且告之曰孤雖歸辱社稷矣其卜貳圉也衆皆哭晉于是乎作爰田吕甥曰君亡之不恤而羣臣是憂惠之至也將若君何衆曰何為而可對曰征繕以輔孺子諸侯聞之䘮君有君羣臣輯睦甲兵益多好我者勸惡我者懼庶有益乎衆説晉于是乎作州兵十月晉隂飴甥㑹秦伯盟于王城秦伯曰晉國和乎對曰不和小人耻失其君而悼䘮其親不憚征繕以立圉也曰必報讐寜事戎狄君子愛其君而知其罪不憚征繕以待秦命曰必報德有死無二以此不和秦伯曰國謂君何對曰小人慼謂之不免君子恕以為必歸小人曰我毒秦秦豈歸君君子曰我知罪矣秦必歸君貳而執之服而舍之德莫厚焉刑莫威焉服者懐德貳者畏刑此一役也秦可以伯納而不定廢而不立以徳為怨秦不其然秦伯曰是吾心也改館晉侯饋七牢焉蛾析謂慶鄭曰盍行乎對曰陷君于敗敗而不死又使失刑非人臣也臣而不臣行將焉入十一月晉侯歸丁丑殺慶鄭而後入是歲晉又饑秦伯又餼之粟曰吾怨其君而矜其民且吾聞唐叔之封也箕子曰其後必大晉其庸可冀乎姑樹德焉以待能者于是秦始征晉河東置官司焉十七年夏晉太子圉為質于秦秦歸河東而妻之二十二年太子圉將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱于秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸胡氏曰秦伯伐晉而經不書伐專罪晉也獲晉侯以歸而經不書歸免秦伯也書伐書及者兩俱有罪而以及為主書獲書歸者兩俱有罪而以歸為甚今此專罪晉侯之背施幸災貪愛怒隣而恕秦伯也然則秦戰義乎春秋無義戰彼善于此則有之矣其不言師敗績何也君獲不言師敗績君重于師也大夫戰而見獲必書師敗績師與大夫敵也君為重師次之大夫敵春秋之法也與孟子之言何以異孟子為時君牛羊用人莫之恤也故以民為貴君為輕春秋正名定分為萬世法故以君為重師次之堯以天下命舜舜亦以命禹必稱元后為先此經世大常而仲尼祖述之也惟此義不行然後叛逆之黨有託以為名輕棄君親而不顧者矣十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都隕石于宋五隕星也六鷁退飛過宋都風也周内史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大䘮明年齊有亂君將得諸侯而不終退而告人曰君失問是隂陽之事非吉凶所生也吉凶由人吾不敢逆君故也髙郵孫氏曰是月者别非戊申之日也不書日者所不知闕之也權子曰隕石于宋自空凝結而隕六鷁退飛倒逆而飛必有氣驅之也如此等皆是異事故書之胡氏曰石鷁隕飛而得其數與名在春秋時凡有國者察于物象之變亦審矣此宋異也何以書于魯史亦見當時諸國有非所當告而告者矣何以不削乎聖人因災異以明天人感應之理而著之于經垂戒後世如石隕于宋而書曰隕石此天應之也和氣致祥乖氣致異人事感于下則天變應于上茍知其故恐懼修省變可消矣張氏曰星隕為石不祥也六鷁退飛不順也宋襄欲圖伯而無其徳故天出怪異以警懼之卒之五年被執六年兵敗天之示人顯矣髙氏曰聖人之于災祥不敢必其有亦不敢必其無若必其無則有國者不復畏天若必其有則後世將妄推象類以求天意所在其弊有不可勝言若漢世圖䜟之學是也故聖人于災祥存之而不辨使人知所戒而已昔髙宗祭成湯有飛雉升鼎耳而雊祖已訓諸王曰唯先格王正厥事不言其吉凶禍福唯使正厥事而已此先王處災祥之法也春秋書災祥之㫖蓋不異祖已之意三月壬申公子季友卒胡氏曰季者其字也友者其名也大夫卒而書名則曷為稱字聞諸師曰春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者何命之世為卿也季子忠賢在僖公有翼戴之勤襄仲殺逆在宣公有援立之力此二君者不勝私情欲以異賞報之也故皆生而賜氏俾世其官經于其卒各以氏書者誌變法亂紀之端權臣竊柄之禍其垂戒逺矣夏四月丙申鄫季姬卒胡氏曰内女嫁于諸侯則尊同尊同則記其卒記其卒則必記其葬然而有不記者此筆削之㫖非可以例求者也宋伯姬在家為淑女既嫁為賢婦死于義而不囘此行之超絶卓異者既書其葬又載其諡僖公鍾愛季姬使自擇配季姬不能自克以禮恃愛而行雖書其卒因奪其葬所以謹夫婦之道正人倫之統明王教之始也秋七月甲子公孫茲卒冬十有二月公㑹齊侯宋公陳侯衞侯鄭伯許男邢侯曹伯于淮謀鄫且東畧也城鄫役人病有登城而呼曰齊有亂不果城而還樸鄉吕氏曰北伐山戎南伐楚西為葵丘之盟東㑹于淮桓公之威加于天下者畧徧矣此伯者之極盛也十有七年春齊人徐人伐英氏齊人為徐伐英氏以報婁林之役也髙郵孫氏曰英氏近于楚而附屬之齊桓以楚之强而暴中國也于是㑹徐人伐之且為徐申其忿也髙氏曰為徐伐楚而不加兵于楚乃移兵于英氏非所以禦強暴而救中國也謝氏曰桓公無東畧之志可知也夏滅項師滅項淮之㑹公有諸侯之事未歸而取項齊人以為討而止公權子曰滅人之國罪惡大矣在君則當諱故魯滅國書取滅項君在㑹季孫為之也故不諱胡氏曰執政之臣擅權為惡而不與之諱此春秋尊君抑臣不為朋黨比周之意也陳氏曰書滅項失兵權之漸也襄公在晉書邾庻其来奔昭公在晉書莒牟夷来奔皆非常也春秋之季大夫不禀命于諸侯非但魯也鄭伯㑹于夷儀鄭公孫舍之帥師入陳蔡侯㑹于召陵蔡公孫姓帥師滅沈春秋必謹而志之秋夫人姜氏㑹齊侯于卞聲姜以公故㑹齊侯于卞謝氏曰卞魯邑齊侯自淮還師而夫人出㑹焉張氏曰大臣滅項而止僖公刑已偏頗又㑹婦人于魯地此管仲既亡桓公志荒之㑹也髙氏曰卞之㑹夫人以齊侯止公故其情則可而禮則不可也九月公至自㑹冬十有二月乙亥齊侯小白卒齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衞姬生武孟少衞姬生惠公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公于宋襄公以為太子雍巫有寵于衞共姬因寺人貂以薦羞于公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯愚按孔子曰管仲相桓公霸諸侯一匡天下民到于今受其賜又曰桓公九合諸侯一匡天下管仲之力也如其仁如其仁又曰齊桓公正而不譎孟軻氏五霸三王之罪人也又曰仲尼之徒無道桓文之事者誦此則齊桓之行事可知而功過不得相掩矣蓋王者之學至誠無偽純亦不已故商周之盛傳世之逺至七八百年澤猶未泯霸者之術假公濟私始勤終怠故桓公身死未幾五子争立國内大亂誠偽之分禍福如此可不畏哉權子曰得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也王道如砥本乎人情出乎禮義若履大路而行無復囘曲霸者﨑嶇反側於曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之以霸則霸矣二者其道不同在審其初而已易所謂差若毫􅁵繆以千里其初不可不審也故治天下必先立其志志立則邪説不能移異端不能惑故力進于道而莫之禦也茍以霸者之心而求王道之成是􅃷石以為玉也故仲尼之徒無道桓文而曾西耻比管仲義所不由也五峯胡氏曰齊亦公侯之地耳管仲得政遂能强大霸諸侯何也守信不貳行法無移舉用賢才開闢言路不藉樹蓄務富民財不大興兵務舒民力仗尊王之義㑹于首止天子憚其正而王室之亂消寜魯難誅哀姜公道伸而諸侯服盟于召陵制荆楚而中國之義立城衞楚丘城邢夷儀遷杞緣陵而外寇不得肆此其所以九合諸侯虎視中原之大畧也若夫伐魯國以殺子糾而父子兄弟之恩薄五大夫立子頺出天王不能奔命而君臣之義虧魯晉宋有弑君之賊而不能討也陳有殺嫡立庻之罪而不能正也鄭有兄弟争國之禍而不能平也以不從己則伐宋伐鄭伐陳執濤塗厚自封殖滅譚滅遂處己若是何以服人于是北則晉專冀方西則秦專雍土南則荆楚強横滅弦滅黄圍許伐徐而終不退聽也原其失皆由不知天理之本而馳心于功利之域故無以得天下心而功烈如彼其卑也其去王也逺矣大東莱吕氏曰桓公雖能用管仲尊王室霸諸侯有一匡天下之功然仲本無正心誠意格君之學徒急于一時之功利卒至五子之亂其所以有始無終者家法之不正也管仲且有三歸之失豈能正其君哉樸鄉吕氏曰霸圖之興小白為之首霸權之重小白為之盛小白未興之前天下不知有王小白既興以後天下始知有霸天下不知有王君子以為憂也天下始知有霸君子又豈以為喜乎然是時也有相盟者矣而未有合諸侯以同盟者合諸侯以同盟者自小白始有相㑹者矣而未有合諸侯以大㑹者合諸侯以大㑹者自小白始方其列國争衡侯度無統亦誠有望于方伯連帥之功然而大合諸侯糾率列國同盟而有主盟同㑹而有主㑹其事則前此所未有也而小白創為之是以當時諸侯亦疑焉而未至北杏之㑹小白圖霸之始也舉天下而聽命于一邦向未之有也魯為是疑焉遲遲而不至至莊二十七年再盟于幽則始授之諸侯矣自是而后㑹于檉盟于貫㑹于陽穀盟于首止于甯母于洮于葵丘于鹹于牡丘于淮諸侯無一役之不從焉召陵之役諸侯之大夫一語不中則其身見執而其國見伐首止之盟鄭伯逃歸則新城之圍伐鄭之師連年不捨不至于乞盟不已葵丘之㑹幾于改物淮之㑹其霸既衰之時也魯猶以滅項之故而見止焉是則合天下而聽命于一邦者未有如桓公之盛也是故北杏之㑹諸侯遲焉而未至葵丘之㑹諸侯奔走而畢從遲焉而未至者是諸侯猶不敢以事周者事齊也奔走而畢從者是諸侯不敢不以其事王者事霸也霸圖之盛王迹之泯歟然則諸侯之所以從小白者其故何也曰春秋之初王綱浸弛天下未有知尊周者小白起而倡為尊周之義春秋之初列國分爭諸侯未有寜處者小白起而執其安中國之權春秋之初外寇恣横莊閔之際益以强盛當時莫有能攘却之者小白起而振其攘夷狄之功故讀隱桓之春秋則見天下之無王而紛紛者莫之一也讀莊閔僖之春秋則見天下之有霸而擾擾者有所依也是則霸圖之興固天下之至幸也然桓隱之間天下雖不知有王而王之實猶存何者王之威令雖不行而其權猶未有所移也閔僖之間天下既知有霸而王之實已泯何者移其所以事王者而事霸也是則霸圖之盛又非天下之至不幸歟故嘗謂小白未興之前是一時也小白既興之後是一時也小白既卒之後是一時也王綱浸弛莫提挈之侯度無統莫糾率之外冦恣横莫攘却之此小白未興之時也五禁明而王臣不下聘者四十二年盟㑹同而諸侯無所爭者三十年南盟召陵北弭孤竹此小白既興之時也天王出居而官守不問衞滅懿親而義師無討楚書子而主盟狄書人而參盟此小白既卒之時也然小白一身亦三變焉伐郳侵宋侯度不一入蔡侵鄭戎疾未殄滅譚滅遂履事未乆施設多乖遇穀盟扈閱理未熟檢防是肆蓋小白圖霸之初也貫澤而下葵丘以前衣裳不歃血兵車無大戰夫子稱其一匡孟子與其為盛在此數年此小白定霸之日也九國叛而震矜萌管仲死而繩墨廢城把貶于城邢救徐怠于救許此小白成霸之後也驗春秋大𫝑之三變則小白為有功觀桓公一身之三變而其功亦為不逺徐攷顛末而小白之事可得而知矣十有八年春王正月宋公曹伯衞人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊宋襄公以諸侯伐齊三月齊人殺無虧齊人將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還穀梁氏曰非伐䘮也胡氏曰伐齊之䘮奉少奪長其罪大故其責詳書救齊者善魯也救者善則伐者惡矣凡書救未有不善之也書狄救齊者許狄也許救者則罪伐者矣許之曷為不稱人深著中國諸侯之罪也凡伐者為客受伐者為主今齊人受伐以宋為主者曲在宋也凡師直為壯曲為老書齊師敗績者責齊臣也或曰桓公管仲嘗屬孝公于宋襄以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也桓公君臣乃欲以私愛亂長㓜之節其可哉春秋深罪宋公大義明矣愚謂古之為學者物格而後知至知至而後意誠意誠而後心正心正而後身脩身脩而後家齊家齊而後國治國治而後天下平其為功自内以及外其為效由近以及逺故脩身以治其國而國無不治者矣桓公不知正心誠意之學惟以趨事赴功為務故其攘夷狄安中國雖有一時之功身死未幾五子爭立鄰國交伐由其身之不脩家之不齊知治其外而不知治其内知治于人而不知治于身也桓公之德如此固可見矣宋襄公方欲圖伯諸侯以安中國而首亂人少長之序伐與國之䘮則其伯業之不遂又何待執于盂而後見哉則有天下國家者可不知所以為學乎秋八月丁亥葬齊桓公樸鄉吕氏曰讀此編者自齊小白卒至葬齊桓公當作一類㸔胡氏曰桓公九合諸侯不以兵車威令加乎四海幾于改物雖名方伯實行天子之事然而不能慎終如始付託非人柩方在殯四鄰謀動其國家而莫之恤至于九月而後葬以此見功利之在人淺矣春秋明道正義不急近功不規小利于齊桓晉文有所貶而無過襃以此冬邢人狄人伐衞圍莵圃衞侯以國讓父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師于訾婁狄師退愚按穀梁氏曰狄伐衞救齊故進而稱人然以經考之狄救齊齊亂定而後葬桓公今又踰時矣邢人始與狄人伐衞安得為救齊也師氏曰聖人之心遂肯以一事許其餘乎家氏曰果善之何不于救齊之際而善之今乃于伐衞而進之蓋春秋書邢人狄人伐衞者責邢不當與狄比而伐與國也謝氏曰邢人引狄以為中國患先邢人罪以首患也薛氏曰狄之書人何齒乎邢也狄邢衞之宼讐也邢衞嘗同患難者也幸乎方伯之死交宼讐以伐同患取亡之道也春秋闕疑卷十五
