body:
  text: 春秋闕疑巻二十三元鄭玉撰七年春衛侯使孫良夫來盟始通且謀㑹晉也樸鄉呂氏曰凡書來盟自内錄也其稱使則前定之盟也高氏曰此乃衛欲爲晉致魯蓋專事齊未與晉通故也宣公以不義得國以是自疑而衛侯任其無咎故遣良夫來爲此盟然而黑壤之㑹公卒見辱則知是盟之無信也夏公㑹齊侯伐萊秋公至自伐萊高氏曰公方與衛盟將復從晉而又應齊侯之命興兵以臨弱小之國此取辱之道也大旱胡氏曰軍旅之後必有凶年言民以征役怨咨之氣感動天變而旱乾作矣其以大旱書者或不雩或雖雩而不雨也不雩則無恤民憂國之心雩而不雨格天之精意闕矣冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤六年楚人伐鄭取成而還至是鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黑壤王叔桓公臨之以謀不睦晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免左氏曰黑壤之盟不書諱之也胡氏曰㑹而不得見不以不得見爲諱盟而不與盟不以不與盟爲諱則曲不在公而主盟㑹者之罪耳與于㑹不與于盟而公有歉然非主㑹盟者之過也則書㑹不書盟若黑壤是也凡不直者臣爲君隱子爲父隱于是養臣子愛敬之心而不事盟主又必賂免則不直在已矣家氏曰據左傳是㑹也王叔桓公臨之春秋不書者王人董㑹所以光霸業也晉自新城以來君侈臣專政亂于内威䙝于外成公新立政猶在趙氏乃强合四國之君以爲此㑹屈王叔下臨欲以踵桓文之盛烈多見其不知量也八年春公至自㑹夏六月公子遂如齊至黄乃復胡氏曰至黄乃復壅君命也有疾亦不復可乎大夫以君命出聞喪徐行而不反未致事而死以尸將事乃者無其上之詞其曰復事未畢也辛巳有事于大廟仲遂卒于垂壬午猶繹萬入去籥陳氏曰不言公子蒙上文也胡氏曰有事言時祭此公子遂也曷爲書字生而賜氏俾世其官也曷爲書卒以事之變卒之也古者諸侯立家大夫卒而賜氏其後尊禮權臣寵遇貴戚而不由其道于是乎有生賜氏其在魯則季友仲遂是也經于其卒書族以志變法之端繹者祭之明日以賓尸也猶者可已之辭萬舞也以其無聲也故入而遂用籥管也以其有聲也故去而不作是謂故知不可存其邪心而不能格也禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之誠于宗廟不繹者存始終之恩于臣子今仲遂國卿也卒而猶繹則失寵遇大臣之禮矣東萊呂氏曰萬舞二舞之總名也干舞者武舞之别名籥舞者文舞之别名萬入去籥言文武二舞皆入以仲遂之喪于二舞之中去其有聲者故去籥焉石氏曰昭十五年有事于武宫叔弓卒去樂卒事以大夫之卒而去祭樂是以所輕廢所重也有事于大廟仲遂卒壬午猶繹以卿佐之喪而猶繹是忽所重而行所輕也宣公之行所輕昭公之廢所重春秋譏之一也戊子夫人嬴氏薨胡氏曰敬嬴文公妾也何以稱夫人自成風聞季友之繇事友而屬其子及僖公得國立以爲夫人于是乎嫡妾亂矣春秋于風氏始卒四貶之禘于大廟秦人歸禭榮叔含賵召伯㑹葬去其姓氏不稱夫人王再書而無天是也敬嬴又嬖私事襄仲而屬宣公不待致于大廟援例以立則從同同而無貶矣晉師白狄伐秦春白狄及晉平夏㑹晉伐秦胡氏曰晉主夏盟糾合諸侯尊王室安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責已可矣乃復興師動衆㑹白狄以伐之獨不惡傷其類乎直書而貶自見家氏曰書晉師白狄而不言及者偶晉于狄亦外晉耳楚人滅舒蓼楚爲衆舒叛故伐舒蓼滅之楚子疆之及滑汭盟吳越而還胡氏曰詩稱用戒戎作用遏蠻方是先王所遏者其自相攻滅中國何與焉然春秋書而不削者是時楚人疆舒蓼及滑汭盟吳越勢益强大將爲中國憂而天下大事不可復問矣經斯世者當以爲懼而有攘却之謀則聖人意也秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬冬葬敬嬴旱無麻始用葛茀穀梁子曰雨不克葬喪不以制也胡安定先生曰禮平旦而葬日中而虞今言日中而葬是無備也胡氏曰喪事即遠有進無退葬不爲雨止士喪禮潦車載簑笠有國家者乃不能爲雨備何也不得不可以爲悦無財不可以爲悦得之爲有財古之人皆用焉而不能爲之備是儉其親也不亦薄乎城平陽許氏曰國有大喪始葬而又動衆城邑非特不愛民力以公爲忘親矣楚師伐陳陳及晉平楚師伐陳取成而還九年春王正月公如齊公至自齊泰山孫氏曰公有母喪而遠朝强齊公之無哀也甚矣夏仲孫蔑如京師春王使來徵聘夏孟獻子聘于周王以爲有禮厚賄之胡氏曰屬辭比事春秋教也當歲首月公朝于齊夏使大夫聘于京師此皆比事可考不待貶絶而惡自見者也宣公享國九年于周纔一往聘其在齊則又再朝矣故聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之禍起此經書君如齊臣如周之意也齊侯伐萊許氏曰狄比侵齊齊不敢報萊不犯齊而齊亟伐之畏衆强而虐微弱此可以觀惠公矣秋取根牟八月滕子卒九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳謝氏曰不知制楚而區區伐陳晉之失道也家氏曰晉成之立諸夏聳觀冀其一反前人之所爲討宋魯之弑君以風厲天下修文襄之霸業以懷來諸侯義聲所加齊楚自當畏服今不能然惟以爭陳鄭爲當務之急夫陳鄭豈樂于去華即夷正以楚師日夜至懼不克自保焉耳晉不能制楚惟欲服陳鄭夫不能拯人之急惟欲人之從已此不義之至也晉楚之爭陳鄭十有餘年春秋皆所不與楚夷也春秋每致其問鼎之憂晉盟主也春秋每望之以尊王之事攘楚所以尊王非爭諸侯也夫豈殘暴小國朝夕用師以求其從我者乎辛酉晉侯黑臀卒于扈㑹于扈討不睦也陳侯不㑹晉荀林父以諸侯之師伐陳晉侯卒于扈乃還樸鄉呂氏曰諸侯卒于國都之外則地之袵金革而死則書卒于師如曹伯負芻修玉帛之好而死則書卒于㑹如杞伯成卒于境外則如許男甯之卒于楚吳子遏之卒于巢于封内則如鄭伯髠頑卒于鄵宋公佐卒于曲棘冬十月癸酉衛侯鄭卒高氏曰衛成事晉甚謹而魯宣獨㴱向齊衛欲爲晉致魯故謀黑壤之㑹而特使孫良夫來盟以定之及㑹于黑壤晉人止公賂然後免是以扈之㑹皆前日諸侯而魯獨不往二國繼以喪赴亦皆不㑹此所謂無其事而闕其文者也宋人圍滕因其喪也胡氏曰圍國非將卑師少所能辦也然而稱人是貶之也滕既小國又方有喪用兵革以圍之比事以觀知不仁矣楚子伐鄭晉郤缺帥師救鄭楚子爲厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于桺棼國人皆喜唯子良憂曰是國之災也吾死無日矣家氏曰五年楚伐鄭荀林父救之春秋不書救今而書救者楚之初伐鄭也人謂其討鄭人之弑其君者必將以歸生爲戮既而再以兵加鄭但欲鄭之歸已于弑賊皆無所問則其伐鄭自爲其私耳今而鄭人告急晉于義不得不救于是乎許之以救陳殺其大夫洩冶陳靈公與孔寧儀行父通于夏姬皆衷其衵服以戲于朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶胡氏曰稱國以殺者君與用事大臣同殺之也稱其大夫則不失官守而殺之者有專輒之罪矣洩冶無罪而書名何也冶以諫殺身者也殺諫臣者必有亡國弑君之禍故書其名爲徵舒弑君楚子滅陳之端以垂後戒此所謂義係于名而書其名者也家氏曰洩冶非世族大夫非名無以傳且名之與字在當時已不容㴱辯况千載之後欲以此求春秋褒貶之意豈非説經之大弊乎十年春公如齊公至自齊齊人歸我濟西田公如齊齊侯以我服故歸濟西之田張氏曰歸田而言我者言此田魯之舊封而非齊之所得專也不言來歸請而得之也讙及闡歸于取之年故不言我今歸于十年之後故書我也特書曰我則取之不以其道而歸之不以其正一出于相與之私爲可見矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛夏齊惠公卒崔杼有寵于惠公高國畏其偪也公卒而逐之奔衛公羊子曰其稱崔氏譏世卿也高郵孫氏曰春秋世卿多矣而尹氏書卒崔氏書奔聖人于世卿之中擇其尤强而爲害之㴱者以爲後世戒也張氏曰特書其氏見崔杼之宗强于齊故勢足以偪高國雖今日逐之而尚能復歸于齊也家氏曰以歲月考之是歲至杼弑君蓋五六十年使杼得年七十此時方在弱冠不應權勢已盛爲人所畏疑非崔杼之身或其父或其族皆未可知公如齊夏五月公至自齊左氏曰奔喪也胡氏曰天王之喪不奔欲行郊禮而汲汲于奔齊惠之喪天王之葬不㑹使微者往而公孫歸父㑹齊惠之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也癸巳陳夏徵舒弑其君平國陳靈公與孔寧儀行父飲酒于夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廐射而殺之二子奔楚胡氏曰禍莫大于拒諫而殺直臣忠莫顯于身見殺而其言驗洩冶所謂不憚斧鉞盡言于其君者正謂靈公君臣淫于夏徵舒之家恐其及禍不忍坐視故眛死言之靈公不能納又從而殺之卒以見弑而亡其國此萬世之大戒也特書徵舒之名以見洩冶忠言之驗靈公見弑之由使有國者必以遠色修身包容狂直開納諫諍爲心也以爲罪不及民故稱大夫以弑則非經意矣張氏曰古人以禮爲防閑而人君之尊有妃偶嬪御之侍有居處出入之奉有廉恥羞惡之限所以養其尊貴者至矣何至驅馳于株林以爲樂哉洩冶之諫夏南之詩皆以其舍人道而躬爲禽獸之行也考之國語前年單子如楚過陳時洩冶未死也單子歸而告王以陳侯帥其卿佐南冠以淫于夏氏陳侯不有大咎國必亡已見于三年之前矣能無及乎觀春秋所書弑君如陳平國齊光蔡固以千乘之主而自儕于閭巷小人之所不爲者心術之惑可不戒哉六月宋師伐滕滕人恃晉而不事宋六月宋師伐滕胡氏曰稱師用衆也隣有弑逆不能聲罪致討乃用大師以伐當恤之小邦故特稱師以著其罪公孫歸父如齊葬齊惠公胡氏曰宣公㴱德齊侯之能定其位又以濟西田歸之也故生則傾身以事之而不辭于屈辱没則親往奔喪而使貴卿㑹其葬亦不顧天王之禮闕然莫之供也比事考辭義自見矣張氏曰春秋書此㴱著亂臣賊子不復明送終之正禮故缺于天子而厚于强國豈非九伐之威不行而專征之討不加以至于此晉人宋人衛人曹人伐鄭鄭及楚平諸侯之師伐鄭取成而還胡氏曰稱人貶之也鄭居大國之間從于强令豈其罪乎不能以德鎮撫而以力爭之庸何愈于楚秋天王使王季子來聘劉康公來報聘胡氏曰王季子者王之母弟也王有時聘以結諸侯之好禮也宣公享國至是十年不朝于周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿㑹匡王葬而使歸父㑹齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不振矣自是王聘春秋亦不書公孫歸父帥師伐邾取繹胡氏曰用貴卿爲主將舉大衆出征伐不施于亂臣賊子奉天討罪而陵弱侵小近在邦域之中附庸之國是爲盜也故特書取繹以罪之大水季孫行父如齊冬公孫歸父如齊季文子初聘于齊冬子家如齊伐邾故也胡氏曰齊侯嗣立宣公親往奔其父喪又使貴卿㑹葬矣若待逾年然後修聘未晩也而季孫亟行歸父繼往則以宣公君臣不知爲國以禮而謂妄説取人可以免于討也歸父貪于取繹畏齊而往蓋理曲則氣必餒矣春秋備書而不削以著其罪也齊侯使國佐來聘國武子來報聘高氏曰嗣子踰年始稱君未踰年稱子今當凶釁而行吉禮忘哀思而結歡好蓋自速成君之意故如其意而書曰齊侯以著其惡也胡氏曰葬之速也太不懷也又未踰年而以君命遣使聘于隣國則哀戚之情忘矣齊頃公嗣位之初舉動如此喪師失地幾見執獲夫豈婦人笑客之罪哉饑宋氏曰宣公即位六年書螽七年書大旱今書大水復書饑咎徵頻仍未有甚于此時者也宣公以臣弑其君以子逐其母罪大惡極天討未加發而爲水旱之災百姓重受其害春秋書之以垂戒于後張氏曰前此百有餘年水旱螟螽之災多矣不以饑書今大水之後特書饑者見宣公煩于事外國用無節上下用竭故一遇水旱遂致乏食耳高氏曰國無三年之畜曰國非其國也今以秋大水而冬即饑則其爲國可知矣于是乎有稅畆之事焉楚子伐鄭楚子伐鄭晉士㑹救鄭逐楚師于潁北諸侯之師戌鄭高氏曰晉士㑹救鄭及諸侯戌鄭而春秋削之者責晉雖得鄭而不能有之也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵春楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏盟于辰陵陳鄭服也師氏曰陳鄭二君中國之諸侯也曰侯曰伯其爵自天子受之向嘗背天子而以諸侯爲盟主雖已爲非而猶可恕者不失于存中國也今也又背中國而從楚猶曰我侯也曰我伯也不思其爵之所從來忍以此而服屬于楚其無愧恥不亦甚乎薛氏曰陳鄭以中國之不足恃而盟于楚由中國之無霸諸侯之失其恃也家氏曰序楚子于陳侯鄭伯之上著南夷之子國而僭居中國侯伯之上紊内外之辨亦以卑從楚之二國也愚謂春秋書法至此聖人之不得已也雖非予楚以霸然亦不得奪楚之霸矣故不加褒貶直書其事使讀者思之知楚人之盛中國之衰而世道于是乎變矣公孫歸父㑹齊人伐莒薛氏曰一不受命而伐取邑七年而猶不置陵弱之甚也許氏曰辰陵之盟中國所宜震也而齊魯方且務窮兵于小國何震之有秋晉侯㑹狄于欑圅晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉秋㑹于欑圅衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非德莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤况寡德乎高氏曰春秋内中國而外夷狄此與隱二年公㑹戎于潛同文所以同晉于内而離狄于外也師氏曰晉景紹盟主之業嘗憤楚伐鄭則救鄭而惟恐其從楚又嘗憤鄭從楚則伐鄭必欲其棄楚或救或伐雖未盡善亦似矣今乃㑹狄欑圅此何禮也不能正一身而欲主盟以令諸侯俾不敢他屬難矣哉張氏曰晉侯爲盟主而往與狄㑹捨夏徵舒之罪以遺楚討使楚舉大義以加于中國又欲與楚爭鄭所以敗于邲也愚按春秋以來中國猶知君臣人類不爲禽獸者齊桓晉文之功也今楚盟陳鄭于辰陵而楚爲之主此中國不知君臣人類入于禽獸之漸也而齊方伐莒晉方㑹狄畧無以爲憂者于是聖人之望絶矣乃書伐莒㑹狄之事于辰陵之盟之下比事以觀春秋事勢之升降可考而聖人不得已之情亦見矣冬十月楚人殺陳夏徵舒高氏曰元惡大憝衆所欲誅稱人以殺蓋衆辭爾非與楚也師氏曰盟主之職爲陳討賊以定陳君而懷陳斯爲能事徒坐視陳從楚楚爲陳討賊以殺徵舒則楚于陳爲有德雖欲使陳不從楚而從晉可乎泰山孫氏曰孔子與楚討者傷中國無人喪亂陵遲之甚也愚按聖人于楚人之事書之必加貶斥之辭者懼其亂常荐食而絶之也今中國弑逆之賊天子不能討方伯不能誅隣國無聲罪之師大夫無沐浴之請而夷狄能正之夫子雖欲貶而不與亦不可得矣楚固明徳之後而介在南蠻使其克自祓濯一改􅁋名窺鼎之舊聖人豈終絶楚哉丁亥楚子入陳冬楚子爲陳夏氏亂故伐陳謂陳人無動將討于少西氏遂入陳殺夏徵舒轘諸栗門因縣陳陳侯在晉申叔時使于齊反復命而還王使讓之曰夏徵舒爲不道弑其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徵舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罸已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也乃復封陳鄉取一人焉以歸謂之夏州程子曰誅其罪義也取其國惡也入者不受而强之也謝氏曰書入罪其因人之亂而利之也呂氏曰稱楚人殺夏徵舒討賊之辭且衆同欲也故曰楚人入陳非衆志也故曰楚子陸氏㣲㫖曰入人之國又納淫亂之臣邪也故明書其爵以示不正春秋之義彰善癉惡纖芥無遺稱事原情瑕瑜不掩斯之謂也高氏曰書殺徵舒于前而掩縣陳之惡書入陳于後不使全討罪之美此斷大小之獄必以情惡惡疾其始善善樂其終之義也胡氏曰按左氏傳楚子爲夏氏亂遂入陳殺徵舒轘諸栗門而經先書殺後書入者與楚子之能討賊故先之也討其賊爲美取其國爲貪爲善爲惡特在一念須臾之間而書法如此春秋傳心之要典不可以不察也愚按討賊則分其美于衆人入國則歸其罪于楚子聖人豈固欲與楚哉其不得已之情又可見矣納公孫寧儀行父于陳穀梁曰納者内弗受也輔人之不能民而討猶可入人之國制人之上下使不得其君臣之道不可高氏曰楚子殺徵舒若能誅賊而出于正者由納二臣觀之楚子殺徵舒正爲二臣殺之非爲討賊殺也楚子之情于是不能逃矣胡氏曰二臣者從君于昬宣淫于朝誅殺諫臣使其君見弑蓋致亂之臣也肆諸市朝與衆同棄然後快于人心今乃詭詞奔楚託于討賊復讐以自脱其罪而楚莊又使陳人用之故聖人外此二人于陳而特書曰納爲楚莊者瀦徵舒之宮封洩冶之墓尸孔寧儀行父于朝謀于陳衆定其君而去其庶幾乎家氏曰楚莊有意爲陳討賊即辰陵之㑹召徵舒而戮之陳無事矣乃于既盟之後遽興掩襲之師入陳而遂縣之仗義以濟利假信以行詐此春秋之所甚惡也幸而從申叔時之言事弗獲逞猶納其朋淫首禍之人俾復爲政于陳國則其區區本心猶在于利特畏晉兵之來是以舍之而去非知其不義悔之而不爲也薛氏曰中國無賢王賢伯而使荆蠻盜政多見其卒于亂也張氏曰聖人予善之𢎞待人之公先旌其討賊之義然後著其入陳且納亂臣之罪使楚莊之善惡功罪顯然明白詳味此編則知非聖人莫能修而游夏不能與者矣十有二年春葬陳靈公師氏曰陳亂故二十有一月而後葬始也以公孫寧儀行父與靈公昏淫使靈公被弑終也以公孫寧儀行父使楚討賊楚以入陳又從而納二子爲是紛紛不暇葬也楚子圍鄭厲之役鄭伯逃歸自是楚未得志焉鄭既受盟于辰陵又徼事于晉至是楚子圍鄭句有七日鄭人卜行成不吉卜臨于大宫且巷出車吉國人大臨守陴者皆哭楚子退師鄭人修城進復圍之三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福于厲宣桓武不泯其社稷使改事君夷于九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可幾乎退三十里而許之平潘尫入盟子良出質謝氏曰圍鄭之役楚已入鄭矣不書入者以楚子叛而伐之服而舍之退三十里而許之平也高氏曰楚入陳而封之書曰入入鄭而赦之書曰圍何也楚之入陳也欲縣之人言其不可乃封陳侯其入鄭也欲赦之人言其不可卒與鄭平封陳侯者非其本謀也不善而能改故書曰入與鄭平者蓋其本謀也不爲利害所誘故書曰圍夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績六月晉師救鄭荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之趙括趙嬰齊爲中軍大夫鞏朔韓穿爲上軍大夫荀首趙同爲下軍大夫韓厥爲司馬及河聞鄭既及楚平桓子欲還曰無及于鄭而𠞰民焉用之隨武子曰善彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵不從不可謂武由我失霸不如死以中軍佐濟韓獻子謂桓子曰彘子以偏師陷子罪大矣子爲元帥師不用命誰之罪也與其專罪六人同之不猶愈乎師遂濟楚子北師次于郔沈尹將中軍子重將左子反將右將飲馬于河而歸聞晉師既濟王欲還嬖人伍參欲戰令尹孫叔敖不欲伍參言于王曰晉之從政者新未能行令其佐先縠剛愎不仁未肻用命其三帥者專行不獲聽而無上衆誰適從此行也晉師必敗王告令尹改乘轅而北之楚少宰如晉師曰寡君少遭閔凶不能文聞二先君之出入此行將鄭是訓定豈敢求罪于晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夾輔周室毋廢王命今鄭弗率寡君使羣臣問諸鄭豈敢辱侯人敢拜君命之辱彘子以爲諂使趙括更之曰行人失辭寡君使羣臣遷大國之迹于鄭曰無避敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔爲右以致晉師晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還趙旃求卿未得且怒失楚致師者請挑戰弗許請召盟許之夜至于楚軍席于軍門之外使其徒入之乙卯王乘左廣以逐趙旃趙旃棄車而走林屈蕩搏之晉懼二子之怒楚師使軘車逆之楚望其塵懼晉師至且懼王之入晉師也遂疾進師車馳卒奔乘晉軍桓子不知所爲鼓于軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也晉師右移上軍未動楚從上軍駒伯曰待諸乎隨季曰楚師方壯若萃于我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗楚熊負羈囚知罃知莊子以其族反之􅌮武子御射連尹襄老獲之遂載其尸射公子穀臣囚之以二者還及昏楚師軍于邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至于邲遂次于衡雍祀于河作先君宫告成事而還秋晉師歸桓子請死晉侯欲許之士貞子諫使復其位成三年晉人歸楚公子穀臣與連尹襄老之尸于楚以求知罃楚人重爲之禮而歸之胡氏曰戰而言及主乎是戰者也陳人弑君晉不討賊而楚能討之楚人圍鄭亦既退師與鄭平矣而又與之戰則非觀釁之師也故釋楚不貶而使晉主之然違命濟師者先縠也而獨罪林父何也尊無二上定于一也古者仗鉞臨戎專制閫外雖君命有所不受况其屬乎林父既知無及于鄭焉用之矣諸帥又皆信然其策先縠若獨以中軍佐濟者下令三軍無得妄動按軍法而行辟夫豈不可既不能令乃畏失屬亡師之罪而從韓獻子分惡之言知難而冐進是棄晉師于誰責乎故稱敗績特以林父主之也高氏曰夫晉欲救陳鄭豈可由一大夫將不協心之屬以與强暴新勝之楚師交戰乎徒取敗衂血肉生靈非救難解紛之道也故不書救秋七月冬十有二月戊寅楚子滅蕭楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊遂傅于蕭明日蕭潰胡氏曰假于討賊以滅陳春秋以討賊之義重也故末減而書入惡其貳已而入鄭春秋以退師之情恕也故末減而書圍與人爲善之德宏矣至是肆其强暴滅無罪之國其志已盈雖欲赦之不可得也故傳稱蕭潰經以滅書斷其罪也蕭既滅亡必無赴者何以得書楚莊縣陳入鄭大敗晉師莫與校者不知以禮制心克伐怨欲皆得行焉遂以滅蕭赴告諸侯矜其威力以恐中國也家氏曰蕭宋之附庸也楚莊志得而驕睥睨于宋故滅蕭以動之自是易子析骸之禍權輿于此春秋書之不惟罪楚亦以憂中國晉人宋人衛人曹人同盟于清丘晉原縠宋華椒衛孔逹曹人同盟于清丘曰恤病討貳謝氏曰楚日强盛四國欲恤病討貳協力相維同心爲盟故書同盟同盟之後四國反覆背盟故奪爵稱人凡盟既盟而背之者猶以其盟出于不得已也同盟而違之則其惡大矣宋師伐陳衛人救陳宋爲盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之胡氏曰陳有弑君之亂宋不能討而楚能討之雖曰縣陳尋復封之其德于楚而不貳未足責也宋人不能内自省德遽以大衆伐之非義舉也衛人救陳背盟失信而以救書者意在責宋也高氏曰衛方盟于清丘而反救陳救雖義事而有背盟之患故貶稱人春秋闕疑卷二十三
