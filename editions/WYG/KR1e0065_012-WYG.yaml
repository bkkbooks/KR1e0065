body:
  text: 春秋闕疑卷十二元鄭玉撰閔公公名開一名啟方莊公之子般之庶弟惠王十六年即位諡法在國逢難曰閔元年春王正月齊人救邢狄人伐邢管敬仲言于齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懐也詩云豈不懐歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢穀梁氏曰善救邢也胡氏曰凡書救者未有不善之也救在京師則罪列國子突救衞是也救在外域則罪諸侯狄救齊吴救陳是也救在逺國則罪四鄰晉陽處父帥師伐楚以救江是也救而不速救者則書所次以罪其慢叔孫豹救晉次于雍榆是也救而不敢救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇是也兵者春秋之所至重獨于救兵而書法若此聖人之情見矣其稱人將卑師少也張氏曰論語以一匡九合之功歸于管仲蓋奬王室從簡書皆管仲發其端也夏六月辛酉葬我君莊公亂故是以緩秋八月公及齊侯盟于落姑季子来歸公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之季子来歸公羊氏曰其稱季子何賢也其言来歸何喜之也小東莱吕氏曰閔公方九歳安能自㑹如此蓋國人上下皆惡慶父而賢季友故欲復之公與齊盟亦國人左右扶持而去當時國亂猶能惡慶父而復季友此亦見魯秉周禮處髙氏曰凡人臣出奔而反國則書曰歸或曰復歸經未有季子出奔之文而書来歸何也凡奔云者負罪以出迫逐而不遑暇之辭也今魯國連䘮二君當凶禍艱難之際季子以貴戚之重違而去之是之謂全身逺害求援以庇國既而國人以慶父之故思得賢公子以輔㓜主視公族之中唯季子託辭以出若愛其生以有待者魯人唯恐其不歸故公與齊侯盟而請之其書来歸者所以變乎歸之文又變乎復歸之文也既歸而遂以國政付之是其委任亦不輕矣唯其委任之重所以没其去國之因而責其後效聖人特字之而不名又不稱公子者見季子自以賢徳為國人所與不緣宗親之故則所以望于季子者重矣然季子既歸乃反託親親之故卒不能平姜氏之亂討慶父之惡故使二人卒弑吾君明年書公子慶父出奔莒夫人姜氏孫于邾以著季子徒然来歸無補于急難大失國人之望是以變文書来歸者亦所以責之家氏曰慶父之奔也春秋書之其歸也不書惡其歸也季友之奔也春秋不書其歸也書之喜其歸也陳氏曰國人之欲歸季子以已亂也而季子雖歸慶父夫人亂未巳俄而弑閔公於是以僖適邾則國人何賢乎季子微季子則慶父之簒成而莊公之統絶慶父之簒不成莊公之統不絶者季子在也薛氏曰季子来歸雖定魯國竊國之政自此作也春秋詳其出入見其事君之際善其善起其强也冬齊仲孫来齊仲孫湫来省難仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寜魯難而親之親有禮因重固間攜貳覆昏亂伯王之器也髙氏曰此齊侯既復季子因使仲孫来窺我非使于我也故不書齊侯使而止書齊仲孫来所以嘉仲孫而譏齊侯譏齊侯有窺魯之心失霸者之義而嘉仲孫能俾齊侯務寜魯難有全魯之功故特書字以褒之五峯胡氏曰二帝三王施仁政定天下盡道而已非有利天下之心也五伯仗義結信摟諸侯奬王室謀以自强大非有正天下之心也五伯桓公為盛忿不懲而滅譚欲不窒而窺魯其心源可考矣雖力行信義豈其如日之晝如月之夜不可離乎使其無死安知其不志驕氣溢而後有失信棄義之事哉惟其執之不敢中道廢是以得成伯者之名爾此孟子所謂假也五伯假信義而未歸則既有之矣其得罪于三王何也其以有為而為之也此王伯所以分乎二年春王正月齊人􅁶陽胡安定先生曰陽微國也齊桓逼逐而􅁶之以著齊桓之惡故貶而人之啖氏曰移其國于國中為附庸也大東莱吕氏曰聖人作春秋功過不相掩齊人遷陽罪之甚也夏五月乙酉吉禘于莊公趙氏曰禘王者之大祭也王者既立始祖之廟又推始祖所自出之帝祀之于始祖之廟而以始祖配之也程子曰天子曰禘諸侯曰祫朱子曰王者有禘有祫諸侯有祫無禘劉氏意林曰禘者帝也帝者天子之號也諸侯不得祖天子故禘不及諸侯也天子禘諸侯祫大夫享庻人薦此上下之殺也公羊氏曰言吉未可以吉也言莊公未可稱宫廟也穀梁氏曰䘮事未畢舉吉祭故非之也謝氏曰魯禘之失者三諸侯而行禘禮一也禘不于太祖而于莊公二也二十二月而吉祭三也髙氏曰禘者天子之祭魯不當禘也然成王賜天子之禮以享周公而先公因僭用之過在前世聖人不一一追貶但因事書之蓋魯國常事不可勝書故也雖然此特用其禮物耳非有追配之事故直言禘于莊公也愚按禮記謂成王以周公有大勲勞于王室賜魯重祭孔子曰魯之郊禘非禮也周公其衰矣成王之賜伯禽之受皆非也然其始蓋賜于周公之廟許用王者禮樂如八佾之類耳其後羣公之廟皆僭用之既皆僭用王者禮樂遂因而有禘祭之名遂用郊天之禮嗚呼使武王在位之日周公為政之時豈有過賜過受之失至于成王伯禽則有是舉矣此其所以為聖賢之分也雖然是蓋過厚而已非有大失也末流之弊至于季氏舞八佾三家以雍徹上下交僭而君臣之分蕩然矣禮謹於微君子不可不慎也子疾病子路使門人為臣病閒曰乆矣哉由之行詐無臣而為有臣吾誰欺欺天乎觀于此則知聖人之所處矣秋八月辛丑公薨初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公于武闈成季以僖公適邾共仲奔莒乃入立之成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之成風聞成季之繇乃事之而屬僖公焉故成季立之陳氏曰魯之春秋固書曰公子慶父弑公于武闈聖人修之曰公薨諱之也遇弑君父之大哀也則何忍言之是故書薨而不地且不葬薨十二公所同也不地不葬隱閔所獨也然則雖諱而亂臣賊子之獄具矣胡氏曰諱而不言弑何以傳信于將来曰書薨以示臣子之情不地以存見弑之實何為無以傳信也凡君終必書其所獨至于見弑則没而無所其情厚矣其事亦白矣非聖人能修之乎後世記言之士欲諱國惡則必失其實直書母隱又非臣子所當施于君父也而春秋之法不傳矣髙郵孫氏曰弑君之賊討則書葬閔公之賊不討而使之出奔春秋不記其葬所以罪魯之臣子也愚謂慶父雖縊不以賊討猶不討也九月夫人姜氏孫于邾閔公哀姜之娣叔姜之子也故齊人立之共仲通于哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾公子慶父出奔莒以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊髙氏曰先書公薨而繼書此則知夫人姜氏與公子慶父實弑公也夫季子者閔公盟而歸之以為國卿正為姜氏慶父季子專魯國之政足以有為今已踰年既不能防閑其君母稍治慶父之罪而反召弑君之禍又不能率魯國之衆以討弑君之賊乃縱之使逸故此書夫人姜氏孫于邾公子慶父出奔莒者非特著姜氏慶父之罪又以見季子孤國人之望也或謂緩誅逸賊親親之道是尢不然人臣之義莫大乎為君討賊故曰大義滅親今季子于慶父親也而于閔公則親而又尊也慶父弑閔彼尊尊親親之義已絶矣茍能誅之則尊尊親親之義兩得之捨慶父而忍乎閔公是尊尊親親之義兩失之也棄兩得而從兩失賢者之所為果如是乎髙郵孫氏曰文姜之孫也不稱姜氏所以令齊絶之哀姜之孫也稱姜氏以明邾非姜氏父母之國其得絶之無疑焉邾容而受之為有罪春秋湥罪邾容他國之夫人特書曰夫人姜氏孫于邾以見其不絶之罪陳氏曰宋萬奔陳雖殺之不書慶父奔莒雖殺之不書春秋所以嚴逸賊之責也季子奔陳不書適邾不書全之也則其嚴逸賊之責何若季子可與言事存矣事亡則未也有季友在慶父將不免于為戮則曷為謂之無討均之為逸賊也冬齊髙子来盟公羊氏曰比三君死曠年無君設以齊取魯曾不興師徒以言而已矣桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至于争門者是也或曰自争門至于吏門者是也魯人至今以為美談曰猶望髙子也程子曰髙子来省難然後盟盟未前定也稱髙子善其能恤魯胡氏曰桓公命髙子必曰魯可取則兼其國以廣地魯可存則平其難以善隣非有安危繼絶一定不可易之計也髙子至則平魯難定僖公魯人賴焉聖人美其明人臣之義得奉使之宜特稱髙子以著其善不曰齊侯使之者權在髙氏子也家氏曰春秋書此亦以著桓公不吝改過而大夫之出疆者皆能納君于善也始仲孫之来桓公因使之覘國而仲孫之歸也以魯秉周禮為對不惟存魯于亡又能納君于善而非使事之指也及髙子来盟率甲與俱至人疑其將不利于魯而髙子立僖公而盟之又以甲城魯魯于是始定而非使事之指也然齊桓不以失指為怒反因是而伸哀姜之討有以見桓公善用人樂從諫始而覘魯卒而存魯利欲不足以蝕其本心伯之猶有德者也十有二月狄入衞狄人伐衞衞懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰公與石祈子玦與甯莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽于二子渠孔禦戎子伯為右黄夷前驅孔嬰齊殿及狄人戰于熒澤衞師敗績遂滅衞衞侯不去其旗是以甚敗初惠公之即位也少齊人使昭伯烝于宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人文公為衞之多患也先適齊及敗宋桓公逆諸河宵濟衞之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹許穆夫人賦載馳齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服牛羊豕雞狗與門材歸夫人魚軒重錦衞文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘謝氏曰狄人入衞也國人分散衞已滅矣自文公徙居楚丘建城市營宫室而衞國復興則狄未能滅衞而有之故入衞不書滅張氏曰衞之滅非特懿公好鶴而失人心蓋自惠公即位以来宣姜淫恣躭樂亡政習以為常故狄人一至而渙然國隨以亡非齊桓救而封之則康叔之後至此無噍類矣衞在春秋時初為大國與齊侯胥命才四十年而淪于亡滅所以治國先齊家而淫亂之禍不簒必滅可不戒哉鄭棄其師鄭人惡髙克使帥師次于河上乆而弗召師潰而歸髙克奔陳鄭人為之賦清人胡氏曰人君擅一國之名寵殺生與奪惟我所制爾使克不臣之罪已著案而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏用假以兵權委諸境上坐視其失伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進謀于君協志同力黜逐小人而國事至此是謂危而不持顛而不扶則將焉用彼相矣鄭棄其師君臣同責也春秋闕疑卷十二
