body:
  text: 春秋闕疑卷三十五元鄭玉撰七年春王正月暨齊平齊求之也榖梁氏曰平者成也暨猶暨暨也暨者不得已也以外及内曰暨胡氏曰當時昭公結昏强吳外附荆楚其與齊平無汲汲之意乃齊求于魯而許平也故曰暨至定公八年魯再侵齊結大國之怨見復必矣其與齊平非不得已乃魯求于齊而欲其平也故曰及平者聖人之所貴然或以賄賂而結平或以臣下而擅平或以附夷狄而得平或以侵犯大國而急于平則皆罪也攷其事而輕重見矣三月公如楚楚子成章華之臺願與諸侯落之太宰薳啟疆曰臣能得魯侯薳啟疆來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀奉承以來弗敢失隕而致諸宗祧曰我先君共王引領北望日月以冀傳序相授于今四王矣嘉恵未至唯襄公之辱臨我喪孤與其二三臣悼心失圖社稷之不皇况能懐思君徳今君若步玉趾辱見寡君寵靈楚國以信蜀之役致君之嘉恵是寡君既受貺矣何蜀之敢望其先君鬼神實嘉頼之豈唯寡君君若不來使臣請問行期寡君將承質幣以見于蜀以請先君之貺公將往夢襄公祖梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服恵伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚鄭伯勞于師之梁孟僖子為介不能相儀及楚不能答郊勞楚子享公于新臺使長鬛者相好以大屈既而悔之薳啟疆聞之見公拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰慎守寳矣敢不賀乎公懼乃反之愚按襄公適楚慕其宫室歸作楚宫遂以薨焉今楚子作章華之臺昭公又往落之豈非欲效其父之所為乎以朝聘而往楚猶曰中國朝于夷狄辱也况以宫室臺榭之樂而往乎不待貶絶而罪惡見矣叔孫婼如齊涖盟榖梁氏曰涖位也内之前定之辭謂之涖外之前定之辭謂之來高氏曰以暨齊平故婼往涖盟也昭公自是遂以善齊故孫于陽州卒以齊為寄夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒八月衛襄公卒晉大夫言于范獻子曰衛事晉為睦晉不禮焉庇其賊人而取其地故諸侯貳詩曰鶺鴒在原兄弟急難又曰死喪之威兄弟孔懐兄弟之不睦于是乎不弔况逺人誰敢歸之今又不禮于衛之嗣衛必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衛弔且反戚田衛齊惡告喪于周且請命王使成簡公如衛弔且追命襄公曰叔父陟恪在我先王之左右以佐事上帝余敢忘高圉亞圉家氏曰榖梁曰鄉曰衛齊惡今曰衛侯惡何為君臣同名也君子不奪人名不奪人親之所名重其所以來也注謂親之所名臣雖欲改君不當聴也君不聴臣易名者欲使人重父命也榖梁此義其必有所授矣盖所謂諱者特諱之于廟耳未聞生者而為之諱衛之君臣同名乃其眀證後之人以諂事君諱其所不當諱是故春秋每因事而垂法九月公至自楚公至自楚孟僖子病不能相禮乃講學之苟能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘聖人之後也而滅于宋其祖弗父何以有宋而授厲公及正考父佐戴武宣三命滋益共故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫余敢侮饘于是粥于是以餬余口其共也如是臧孫紇有言曰聖人有眀徳者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬說與何忌于夫子使事之而學禮焉以定其位故孟懿子與南宫敬叔師事仲尼冬十有一月癸未季孫宿卒許氏曰季武子相魯作三軍改變公室唯己所利取鄆瀆盟敗諸侯約幾陷名卿以國為憂則知昭公乾侯之禍此其専欲不忌之習非一日也家氏曰自後世而言司馬懿其人也至昭師遂移宗社意如逐君宿所命也其魯國之大盜與十有二月癸亥葬衛襄公衛襄公夫人姜氏無子嬖人婤姶生孟縶孔成子夢康叔謂己立元余使羈之孫圉與史苟相之史朝亦夢康叔謂己余將命而子苟與孔烝鉏之曽孫圉相元史朝見成子告之夢夢協晉韓宣子為政聘于諸侯之嵗婤姶生子名之曰元孟縶之足不良弱行孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列于宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲于夢武王所用也弗從何為弱足者居侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居各以所利不亦可乎故孔成子立靈公十二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師陳哀公元妃鄭姬生悼太子偃師二妃生公子畱下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼大子偃師而立公子留高氏曰此陳公子招也其曰陳侯之弟招殺陳世子偃師者正其天倫之次所以甚招之罪且以見陳侯寵其弟假之以權致此禍也謝氏曰自招作亂覆世子由是楚人乘之起而滅陳然則世子繫國安危可知矣哀公内失尊隆世子之道外失訓養宗族之道崇嬖妾寵孽子以致冢嗣孤弱骨肉起為冦讐而世子不保其身也家氏曰如傳所言廢太子本哀公意何為憂懼以致于縊以春秋書法而觀招實為之耳意者招與二姬廢適立庶如敬嬴襄仲之所為而哀公未之知是故書招殺不然將目君如晉獻宋平之殺矣夏四月辛丑陳侯溺卒夏四月辛亥哀公縊許氏曰陳哀寵其庶子資以强輔而濟之權以亂太子使之失職至于亂作躬受其禍惟其暱愛法不勝私也悲夫叔弓如晉賀虒祁也游吉相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相䝉也可弔也而又賀之子太叔曰若何弔也其非唯我賀將天下實賀高氏曰前年楚成章華之臺召諸侯落之至是晉成虒祁之宫而諸侯遂皆往賀之晉之效尤如此霸業之不振宜哉許氏曰當楚之隆勢専諸夏而晉弗慮圖唯宫室之崇以為安榮平公其可謂志卑矣叔弓如晉之所以志也楚人執陳行人干徴師殺之陳公子畱出奔鄭干徴師赴于楚且告有立君公子勝愬之于楚楚人執而殺之公子畱奔鄭謝氏曰陳世子遇難哀公繼卒陳人以國難告楚楚子以招之亂執陳行人殺之行人以命通于邦國而已招之亂非行人之罪也執非其執殺非其殺故楚子貶爵稱人蘇氏曰楚將討陳故畱出奔畱既為君矣不曰陳君而曰公子畱何也畱立于招耳未成為君也高氏曰偃師曰世子畱曰公子辨適庶也春秋眀微大率如此家氏曰陳人作亂殺其太子致其君死不以正命罪在一招楚不能討而縱之于越干徵師何罪而為首戮乎盖楚靈因陳亂以為利賊殺不辜欲以震怖陳國而墟其宗社殺人以行其詐者也春秋先書招之罪繼書干徵師之死繼書孔奐之死言當討者縱無罪者死傷亂政之行乎中原莫得而正也秋蒐于紅大蒐于紅自根牟至于商衛革車千乘公羊氏曰蒐者何簡車徒也臨江劉氏曰曷為不言公公不得與于蒐爾陳氏曰蒐于紅也自根牟至商衛革車千乘皆三家之師也自是而屢蒐三家所以耀武焉爾是故桓莊之狩必言公昭定之蒐不言公矣胡氏曰蒐春事也秋興之則違天時有常所矣其于紅則易地利三家専行公不與焉而兵權在臣下則悖人理此亦直書其事不待貶絶而自見者也凡亂臣之欲竊國命必先為非禮以動民而後上及于君父昭公至是民食于他不恤其所昧于履霜之戒甚矣陳人殺其大夫公子過陳公子招歸罪于公子過而殺之高氏曰招専歸罪于過而殺之以説于楚其不書招殺而書陳人者過亦可罪故稱人以殺招雖殺過不足以贖然楚人竟受其欺放之而已家氏曰過與招同為亂招其首也春秋既于今年春正招首惡之罪今招委罪于過而殺之春秋復于此而正過同為亂之罪招與過皆當有罪但首從之不同耳過以從而死招以首而放著荆楚之失刑也愚按過不去大夫公子春秋所以眀招之為首使招不得以過説于楚以掩其罪也大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐葬陳哀公九月楚公子棄疾帥師奉孫吳圍陳宋戴惡會之冬十一月壬午滅陳輿嬖袁克殺馬毁玉以葬楚人將殺之請寘之既又請私私于幄加絰于顙而逃使穿封戌為陳公晉侯問于史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也嵗在鶉火是以卒滅陳將如之今在析木之津猶將復由且陳氏得政于齊而後陳卒亡自幕至于瞽瞍無違命舜重之以眀徳寘徳于遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛徳必百世祀虞之世數未也繼守將在齊其兆既存矣高氏曰春秋之書滅者惡之甚也稱師者見其恃衆也榖梁氏曰楚師滅陳執陳公子招放之于越殺陳孔奐惡楚子也泰山孫氏曰陳公子招殺世子之賊也楚子執而放之陳孔奐無罪之人也楚子殺之吁楚靈暴虐無道滅人之國又為淫刑也如此又曰楚師滅陳葬陳哀公如不滅之辭者楚子葬之也不言楚子葬之者不與楚子滅陳葬哀公故以陳人自葬為文所以存陳也愚按孔奐以為有罪則傳無其文以為無罪則經去其官然以經所書文勢詳之恐只謂招以首惡而得放奐以黨與而被殺譏荆楚用刑之頗耳然無所考證姑闕之以俟知者九年春叔弓會楚子于陳叔弓宋華亥鄭游吉衛趙黶會楚子于陳高氏曰楚既滅陳威震諸夏是以無所號召而諸侯之大夫自往會之夫中國諸侯而為荆蠻所滅中國既不能救亦宜同心疾之奈何反使大夫往聘問耶陳氏曰諸夏之大夫旅見于楚于是始舉魯以見其餘也凡舉魯以見其餘者則天下之辭也許遷于夷二月庚申楚公子棄疾遷許于夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人于陳以夷濮西田益之遷方城外人于許高氏曰此楚遷之也許以畏鄭復求遷于楚故以自遷為文陳滅許遷皆中國無霸之禍也夏四月陳災四月陳災鄭禆竈曰五年陳將復封封五十二年而遂亡子產問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年公羊氏曰陳已滅矣其言陳災何存陳也胡氏曰凡外災告則書今楚已滅夷于屬縣使穿封戍為公矣必不遣使告于諸侯言亡國之有天災也何以書于魯國之策乎當是時叔弓與楚子會于陳則目擊其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之耳或曰國史所書必承赴告豈有憑使人之言而載之于史者曰周景王崩有尹單猛朝之變固無赴告矣叔鞅至自京師言王室之亂也春秋承其言遂書于策亦此類耳仲尼作經存而弗革者盖興滅國繼絶世以堯舜三代公天下之心為心異于孤秦罷侯置守欲私一人以自奉者所以歸民心合天徳也家氏曰春秋于陳之亡書法深致其嚴謹自去年春書陳招殺世子夏書楚殺陳行人秋書畱奔過死冬遂書楚滅陳放招殺奐葬陳哀公一年之間専書陳事夫陳已亡而猶葬之者示陳之未亡也及是陳已為楚所縣而猶書陳災者以盛徳之後見翦于楚特著義存之不與楚得陳也秋仲孫貜如齊孟僖子如齊殷聘冬築郎囿季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎家氏曰桓四年公狩于郎莊三十一年築臺于郎今復築郎以為囿其以為游觀之地乎其以為講武之處乎謝氏曰于是時外有强楚可憂内有權臣可慮上有雨雹日食之變下有兵民彫耗之弊捨此不恤而築囿于郎迷之至也然則築郎囿非獨罪其勞民而已十年春王正月夏齊欒施來奔襄三十一年齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故夏五月子尾殺閭丘嬰以説于我師工僂灑渻竈孔虺賈寅出奔莒出羣公子八年七月甲戌齊子尾卒子旗欲治其室丁丑殺梁嬰八月庚戌逐子成子工子車皆來奔而立子良氏之宰其臣曰孺子長矣而相吾室欲兼我也授甲將攻之陳桓子善于子尾亦授甲將助之或告子旗子旗不信則數人告將往又數人告于道遂如陳氏桓子聞之而還游服而逆之請命對曰聞彊氏授甲將攻子子聞諸曰弗聞子盍亦授甲無宇請從子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之其若先人何子盍謂之周書曰恵不恵茂不茂康叔所以服𢎞大也桓子稽顙曰頃靈福子吾猶有望遂和之如初至是齊恵欒高氏皆耆酒信内多怨彊于陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏子良曰先得公陳鮑焉往遂伐虎門晏平仲端委立于虎門之外四族召之無所往其徒曰助陳鮑乎曰何善焉助欒高乎曰庸愈乎然則歸乎曰君伐焉歸公召之而後入公卜使王黒以靈姑銔率吉請斷三尺焉而用之五月庚辰戰于稷欒高敗又敗諸莊國人追之又敗諸鹿門欒施高彊來奔陳鮑分其室晏子謂桓子必致諸公讓徳之主也讓之謂懿徳凡有血氣皆有爭心故利不可强思義為愈義利之本也藴利生孽姑使無藴乎可以滋長桓子盡致諸公而請老于莒桓子召子山私具其幄幕器用從者之衣屨而反棘焉子商亦如之而反其邑子周亦如之而與之夫于反子成子公公孫㨗而皆益其禄凡公子公孫之無禄者私分之邑國之貧約孤寡者私與之粟公與桓子莒之旁邑辭穆孟姬為之請高唐陳氏始大高氏曰欒施與高彊以兵攻君宫欲挾君以伐陳鮑遂與君戰不勝而出奔此罪大矣春秋不書高氏非卿故也魯方通聘而受其奔亡之臣非義甚矣秋七月季孫意如叔弓仲孫貜帥師伐莒平子伐莒取郠獻俘使用人于亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義家氏曰鞌之戰四卿俱書譏季氏以其私怒出而諸卿奔走後先惟命之承非但誅其伐國誅其無君也胡氏曰前已舎中軍矣曷為猶以三卿並將乎季氏毁中軍四分公室擇其二三家各有其一至是季孫身為主將二子各率一軍為之副則三軍固在其曰舍之者特欲中分魯國之衆為已私耳以為復古則誤矣襄公以來既作三軍地皆三家之土民皆三家之兵每一軍出各將其所屬而公室無與焉是知雖舍中軍而三卿並將舊額固存矣高氏曰三卿並將大夫始張自鞌之役而卒極于此是時間晉之衰故三卿帥師同伐莒見疾莒之甚欲一舉滅之而三卿擅以為己功也戊子晉侯彪卒九月叔孫婼如晉葬晉平公戊子晉平公卒鄭伯如晉及河晉人辭之游吉遂如晉九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也鄭子皮將以幣行子産曰喪焉用幣用幣必百兩百兩必千人千人至將不行不行必盡用之幾千人而國不亡子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聴叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之夫子知之矣我則不足書曰欲敗度縱敗禮我之謂矣夫子知度與禮矣我實縱欲而不能自克也十有二月甲子宋公成卒杜氏曰無冬史闕文十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而饗蔡侯于申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問于叔向曰楚其克乎對曰克哉蔡侯獲罪于其君而不能其民天將假手于楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫呉以討于陳曰將定而國陳人聴命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緍以喪其國紂克東夷以隕其身楚小位下而亟暴于二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振高郵孫氏曰蔡侯般弑父之賊楚子以義討之則無不可乃詐誘而殺之又滅其國而有之春秋以楚子之志不在于討賊徒殺人之君而利人之國故書曰楚子䖍誘蔡侯般殺之陸氏纂例曰兩罪之故兩書名也陳氏曰楚子假大義以號于天下放陳公子殺蔡侯于是滅陳蔡是之謂討賊歟殺中國之君大夫歟高氏曰不曰戕而曰殺者又見般之罪宜死也胡氏曰此討賊也雖誘殺之疑若無罪春秋深惡楚子貶而稱名何也世子般弑其君諸侯與通會盟十有三年矣是人類變為禽獸而莫之覺也楚子若以大義倡天下奉辭致討執般于蔡討其弑父之罪而在官者無赦焉討其弑君之罪而在官者無赦焉殘其身瀦其宫室謀于蔡衆置君而去雖古之征暴亂也不越此矣又何惡乎今䖍本心欲圖其國不為討賊舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒于後棄疾以是殺戎蠻商鞅以是紿魏將秦人以是劫懐王傾危成俗天下大亂劉項之際死者十九聖人深惡楚䖍而名之其慮逺矣後世誅討亂臣賊子者或畏其强或幸其弱不以大義興師至用詭謀詐力徼倖勝之若事之㨗反側皆懼苟其不㨗適足長亂如代宗之圖思眀憲宗之紿王弁昧于春秋垂戒之㫖矣五月甲申夫人歸氏薨謝氏曰歸氏襄公妾昭公母胡女歸姓家氏曰妾母僣夫人自成風以來春秋皆有譏至是始無譏非無譏也僣禮之罪在僖宣後之子孫率循弊典有不足責焉耳然直書其事而無隠乃所以責之也大蒐于比蒲胡氏曰大蒐越禮也君有重喪國不廢蒐不忌君也三綱君政之本君執此以御其下臣執此以事其上政之大本于是乎在君有三年之戚而國不廢一日之蒐則無本矣然則君有重喪喪不貳事以簡車徒為非禮也乃有身從金革而無避者獨何歟曰喪不貳事大比而簡車徒則廢其常可也有門庭之冦而宗廟社稷之存亡係焉必從權制而無避矣伯禽服喪淮夷並興至于東郊出戰之師與築城之徒同日並舉惟審于緩急輕重之宜斯可矣仲孫貜會邾子􅉀于祲祥修好家氏曰喪不貳事前既蒐于比蒲此復為祲祥之會春秋皆繫之五月之下所以貶也師氏曰為君者舍母喪而用蒐禮為臣者舍國喪而從􅉀誓子母君臣之道如此以孝治其國者然乎高氏曰魯雖與邾盟以修好然而魯人之志必欲滅邾而後已此􅉀豈可信耶秋季孫意如會晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人把人于厥憖楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡物以無親晉之不能亦可知也已為盟主而不恤亡國將焉用之秋會于厥憖謀救蔡也鄭子皮將行子產曰行不逺不能救蔡也蔡小而不順楚大而不徳天將棄蔡以壅楚盈而罰之蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣晉人使狐父請蔡于楚弗許許氏曰蔡能嬰城堅不下楚此易助也而厥憖合天下之兵畏不敢救遣使請命示之不能使狄益驕有以量中國之力而卒取之此韓起之罪也卿不足書而書者中國不競苟有善意斯存之矣盖自是而後春秋之譏世益畧謝氏曰方是時楚人益强中國益弱故大夫將欲救蔡而卒無成功而會不書救罪之也家氏曰般可討而蔡不可滅也今般已死而䖍之兵猶頓于蔡城下必欲乘其危亂而取之此盜賊之兵中國諸侯共起而擊逐之義之所得為也為晉君者當使人諭之楚責以違載書擅興兵滅與國之罪彼䖍雖頑冥不靈國中猶有人豈不畏義而止而晉之用事者庸猥無能乃使人卑辭為蔡請益為夷所侮辱而蔡遂滅矣九月己亥葬我小君齊歸公不慼晉士之送葬者歸以語史趙史趙曰必為魯郊侍者曰何故曰歸姓也不思親祖不歸也叔向曰魯公室其卑乎君有大喪國不廢蒐有三年之喪而無一日之慼國不恤喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之十一月楚子滅蔡用隠大子于岡山申無宇曰不祥五牲不相為用况用諸侯乎王必悔之楚子城陳蔡不羮使棄疾為蔡公王問于申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而寘子元焉使昭公不立齊桓公城榖而寘管仲焉至于今頼之臣聞五大不在邊五細不在庭親不在外羈不在内今棄疾在外鄭丹在内君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯宋蕭亳實殺子游齊渠丘實殺無知衛蒲戚實出獻公若由是觀之則害于國末大必折尾大不掉君所知也泰山孫氏曰諸侯在喪稱子此言世子有者有未立按四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡十有一月丁酉楚師滅蔡執蔡世子有以歸用之有窮迫危懼以至于死此未立可知也胡氏曰内入國而以其君來外入國而以其君歸皆服而以之易辭也既書滅蔡矣又書執蔡世子有者世子無降服之狀强執以歸而虐用之也然世子者繼世有國之稱必以此稱蔡有者父母之讐不與共天下與民守國效死不降至于力屈就禽虐用其身而不顧也則有之為世子之道得矣陳氏曰均之為滅國也嘗臣之矣書曰以沈子嘉歸殺之未嘗臣之也書曰執蔡世子有以歸用之高氏曰蔡本中國之諸侯乃背中國而即楚人必以楚人為可恃也今蔡侯既為楚人所誘而殺之又從而滅其國其世子有又為所執而虐用之以絶其世然則楚人何補于蔡哉此萬世人君之戒也徐氏曰君以此始亦以此終陳蔡首倡列國甘心從楚可謂不義不旋踵間皆為楚滅亦以此終者也十有二年春齊高偃帥師納北燕伯于陽因其衆也榖梁氏曰納者内不受也杜氏曰不言于燕未得國都大東萊吕氏曰北燕不名劉質夫以謂與襄二十五年衛侯入于夷儀同盖國其國非臣下所當逐入于夷儀納于陽不名以正其君臣之分也三月壬申鄭伯嘉卒鄭簡公卒將為葬除及游氏之廟將毁焉子大叔使其除徒執用以立而無庸毁曰子產過女而問何故不毁乃曰不忍廟也諾將毁矣既如是子產乃使辟之司墓之室有當道者毁之則朝而塴弗許則日中而塴子大叔請毁之曰無若諸侯之賓何子產曰諸侯之賓能來會吾喪豈憚日中無損于賓而民不害何故不為遂弗許毁日中而葬君子謂子產于是乎知禮禮無毁人以自成也夏宋公使華定來聘通嗣君也公如晉至河乃復齊侯衛侯鄭伯如晉朝嗣君也公如晉至河乃復取鄭之役莒人愬于晉晉有平公之喪未之治也故辭公晉侯享諸侯子産相鄭伯辭于享請免喪而後聽命晉人許之晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坁寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂穆子曰子失辭吾固師諸侯矣壺何為焉其以中儁也齊君弱吾君歸弗來矣穆子曰吾軍帥强禦卒乘競勸今猶古也齊將何事公孫傁趨進曰日旰君勤可以出矣以齊侯出五月葬鄭簡公楚殺其大夫成熊楚子謂成虎若敖之餘也遂殺之或譛成虎于楚子成虎知之而不能行左氏曰書楚殺其大夫成虎懐寵也家氏曰䖍以猜忌殺無罪之大夫故以累上書成熊懐寵耽禄見幾不作以及于難亦有責焉秋七月冬十月公子憖出奔齊季平子立而不禮于南蒯南蒯謂子仲吾出季氏而歸其室于公子更其位我以費為公臣子仲許之南蒯語叔仲穆子且告之故季悼子之卒也叔孫昭子以再命為卿及平子伐莒克之更受三命叔仲子欲構二家謂平子曰三命踰父兄非禮也平子曰然故使昭子昭子曰叔孫有家禍殺適立庶故婼也及此若因禍以斃之則聞命矣若不廢君命則固有著矣昭子朝而命吏曰婼將與季氏訟書辭無頗季孫懼而歸罪于叔仲子故叔仲小南蒯公子憖謀季氏憖告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊南蒯之將叛也其鄉人或知之過之而歎且言曰恤恤乎湫乎攸乎深思而淺謀邇身而逺志家臣而君圖有人矣哉南蒯枚筮之遇坤之比曰黄裳元吉以為大吉也示子服恵伯曰即欲有事何如恵伯曰吾嘗學此矣忠信之事則可不然必敗外强内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三徳為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黄上美為元下美則裳參成可筮猶有闕也筮雖吉未也將適費飲鄉人酒鄉人或歌之曰我有圃生之杞乎從我者子乎去我者鄙乎倍其鄰者恥乎已乎已乎非吾黨之士乎平子欲使昭子逐叔仲小小聞之不敢朝昭子命吏謂小待政于朝曰吾不為怨府髙氏曰季氏之臣南蒯將去季氏而立憖不克而以費叛遂奔齊是以君子譏其妄而哀其志也陳氏曰季氏之出其君有以也則憖有奔焉爾楚子伐徐楚子狩于州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出僕析父從右尹子革夕王見之去冠被舍鞭與之語曰昔我先王熊繹與吕伋王孫牟燮父禽父並事康王四國皆有分我獨無有今吾使人于周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山篳路藍縷以處草莽䟦涉山林以事天子唯是桃弧棘矢以共禦王事齊王舅也晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪頼其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者専足畏也又加之以楚敢不畏君王哉工尹路請曰君王命剥圭以為鏚秘敢請命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何子革曰摩厲以須王出吾刃將斬矣王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其志周行天下將皆必有車轍馬跡焉祭公謀父作祁招之詩以止王心王是以獲沒于祗宫臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭徳音思我王度式如玉式如金形民之力而無醉飽之心王揖而入饋不食寢不寐數日不能自克以及于難髙氏曰徐呉姻國也楚人疾吳故遷怒于徐既執其君又伐其國晉伐鮮虞晉荀吳偽會齊師者假道于鮮虞遂入昔陽秋八月壬午滅肥以肥子綿臯歸至是晉伐鮮虞因肥之役也陳氏曰内晉也晉主諸夏之盟春秋之外秦以晉故也外鄭亦以晉故也則其内晉何晉之君卿無中國之志也楚䖍弑君之賊也而執齊慶封放陳招殺蔡侯般假討賦之名以盟諸夏而晉連年有事于狄鮮虞吳之入郢於越入吳晉猶圍鮮虞也詳于狄事而不詳于楚則晉無中國之志也于是狄晉蘇氏曰楚滅陳蔡而晉不救力誠不能君子不罪也能伐鮮虞而不救陳蔡非力不足也棄諸侯也故春秋貶之胡氏曰楚奉孫吳討陳因以滅陳誘蔡般殺之因以滅蔡晉人視其殘虐莫能救則亦已矣而效其所為以伐人國是名盟主而實寇亂也人之所以為人亦以信義而已矣一失則為禽獸而不齒於列邦禽獸逼人人將相食自春秋末世至于六國亡秦變詐並興傾危成俗河决魚爛皆失信棄義之眀驗也此春秋制治未亂之意愚按晉之不競久矣春秋至此望晉亦淺矣不應責之如是深也疑有闕文春秋闕疑卷三十五
