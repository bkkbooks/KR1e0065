body:
  text: 春秋闕疑卷八元鄭玉撰十有三年春齊侯宋人陳人蔡人邾人㑹于北杏㑹于北杏以平宋亂遂人不至齊侯榖梁作齊人陳氏曰春秋非主兵皆序爵于是序齊于宋之上豫齊以伯也自是無特相㑹者矣朴鄉吕氏曰方霸圖之未興也列國諸侯更相吞噬間有若鄭莊齊僖之流雖能雄長于一時而卒未能執霸主之柄天下紛紛莫之統一亦可嘆矣雖然人心猶知有周也及霸圖之既興也列國諸侯向之紛紛而無統者今則翕然惟霸主之為聽下以號令諸侯上以致天王之狩一時氣𫝑聲焰赫奕中國賴以少事然自是王命浸微矣聖人之于春秋也固未嘗不豫霸主之功亦未嘗喜霸主之盛據事直書而善惡自見矣胡安定先生曰桓公徒有尊周之名無尊周之實觀其貪土地之廣恃甲兵之衆驅逐迫脅强制諸侯納之以㑹要之以盟臨之以兵制之以力其有不狥者小則侵之伐之甚則執之滅之其實假尊周之名以自封殖爾胡氏曰春秋之世諸侯而主天下之㑹盟自北杏始其後宋襄晉文楚莊秦穆交主㑹盟跡此而為之者也桓非受命之伯諸侯自相推戴以為盟主是無君矣故四國稱人以誅首亂正王法也齊侯稱爵其與之乎上無天子下無方伯有能㑹諸侯安中國而免民于左袵則雖與之可也誅諸侯者正也與桓公者權也家氏曰若如胡氏之說是權與正判然為二其首者豫爵其從者有誅春秋略其首而治其從必不然也愚謂此當從榖梁作齊人蓋皆貶也王降而霸此古今之大變治亂之幾微也自是功利之習興而詐力之謀勝二帝三王之澤不復及于天下仁義道德之說不復聞于後世矣况桓公五霸之首北杏又圖伯之始聖人于此安得不致謹乎蓋霸者在春秋衰世固為有功在商周盛時則為有罪何則九合諸侯不以兵車誠足以暫息當時之亂然擅盟㑹侵伐之權天下但知有霸主而不知有王室實啓後世之亂聖人于霸圖之興方喜天下之有霸猶憂後世之無王也然則聖人之豫霸蓋亦甚不得已也故其豫之也必以漸其始也貶之其中也進之其末褒之矣北杏之㑹聖人安得遽與之乎至于葵丘之盟首止之㑹聖人雖欲不豫有不可得也春秋進霸以漸進楚以漸進吳以漸皆古今之大變也然其始也進霸其中也進楚其末也進吳亦可以見聖人之不得已也嗚呼讀春秋而至此可以見世道之降矣故曰五霸三王之罪人也仲尼之門五尺之童羞稱五伯豈不信然哉然使桓公因宋萬弒君之始即舉天王之師修方伯之職討宋萬以正其罪立宋公以定其國其功烈蓋不止此今宋萬以醢宋公以立乃托平宋之亂以合諸侯而為霸圖之舉宜其功烈如是其卑也嗚呼惜哉夏六月齊人滅遂滅而戍之髙氏曰北杏之㑹諸侯猶有未服者桓公于是滅遂以示威夫藉小國以示威以脅大國此齊侯之術也然齊侯未見其救中國之功而先恃强以滅人之國使其宗社無所歆享人民無所依歸故聖人深責之胡氏曰滅國之與見滅罪孰為重取國而書滅奪人土地使不得有其民人毁其宗廟使不得奉其祭祀非至不仁者莫之忍為見滅而書滅亡國之善辭上下之同力也其亦不幸焉爾家氏曰霸者假公義以濟私欲滅談矣又滅遂此不過拓土開疆之計先王之有天下以興滅繼絶為事而霸者滅國不忌是之謂無王春秋于三年之間連書二滅以著齊桓之功過不相掩也愚謂天子之于諸侯一不朝則貶其爵再不朝則削其地三不朝則六師移之其爵之固有輕重而施之又有先後也今齊與遂均為天子之諸侯㑹而不至告之以辭命懷之以德禮可也而遽然恃强大以滅之使有拒違王命悖慢王室者則將何罪以加之乎桓公此舉豈惟不能盡尊王之義蓋將有無王之心矣秋七月冬公㑹齊侯盟于柯始及齊平也髙氏曰北杏之㑹遂人不至而齊滅之魯雖不至而齊無以加之者齊自知有負于魯也齊既滅遂乃為柯之㑹獨㑹魯而不㑹他國者度魯之必從故也此亦齊善圖霸之術也胡氏曰始及齊平也世讐而平可乎于𫝊有之敵惠敵怨不在後嗣魯于襄公有不共戴天之讐當其身則釋怨不復而主王姬狩于禚㑹伐衛同圍郕納子糾聖人備書以著其忘親之罪今易世矣而桓公始合諸侯安中國攘夷狄尊天子乃欲修怨怒鄰而危其宗社可謂孝乎家氏曰敵怨不在後嗣者謂疆場小事以釋怨于易世之後若不共戴天之讐無時而可釋愚按所謂不共戴天之讐者誓不與之共生于天地之間必欲報而殺之也讐人已死則非不共戴天矣讐人子孫豈復可謂之不共戴天乎自魯侯而論之忘其父之殺吾父而與其子通婚姻盟㑹之好固為不可以其父之殺吾父而欲報其子則過矣聖人于此必有等降固不以為不共戴天之讐而必欲殺之亦不與之通盟㑹婚姻之好如他鄰國也但柯之盟齊桓霸業方興魯雖欲不與之盟又懼有滅亡之患聖人以其情為可恕也故以尋常盟㑹之辭書之而無所褒貶焉至于忘父之讐結親其國則罪不容誅矣十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋十三年宋人背北杏之㑹諸侯伐宋其稱人將卑師少也隱公四年諸侯伐鄭翬帥師㑹伐則再舉宋陳蔡衛四國之名今諸侯伐宋而單伯㑹伐不復再舉三國之名何也宋人背北杏之㑹合諸侯而伐之者齊桓公也㑹伐者無貶焉故其辭平主謀伐鄭而欲求寵于諸侯以定其位者州吁也㑹之者黨逆賊矣故其辭繁而不殺左氏曰諸侯伐宋齊請師于周夏單伯㑹之取成于宋而還按左氏于單伯逆王姬誤為送至是欲附成其說故以為齊請師而單伯王臣㑹之也程子曰齊自管仲為政莊十一年而後未嘗興大衆也其賦于諸侯亦寡矣終管仲之身息養天下厚矣至于秦晉使之不競而已不强致也是以其功卑而易成秋七月荆入蔡楚子以蔡侯滅息遂伐蔡秋七月楚入蔡髙郵孫氏曰荆自敗蔡師始通中國今又入蔡其𫝑將盛欲令中國備之于始盛之時制之猶易至其漸盛將不可制矣朴鄉吕氏曰觀荆楚方始而蔡首受其禍未嘗不嘆中國之不振使楚人暴橫而莫之能制也入春秋以來蔡嘗從王伐鄭則猶修勤王之職也㑹鄧盟折則猶交諸侯之玉帛也伐鄭伐衛伐戴則猶同諸侯兵車之㑹也自敗莘以來五年兩被荆師哀侯蒙塵不反而蔡之臣子甘為楚屬齊桓稱霸蔡僅一從北杏之㑹自是折而從楚召陵加師僅足以得楚人之屈服而不能革蔡人從楚之心齊桓終不得置蔡于盟㑹齊桓既沒晉文未興楚或抗行北方則蔡必與至于城濮之戰楚既大創蔡亦改圖晉之三㑹黽勉周旋文公既沒而中國之盟㑹蔡復不與厥貉之次遂執干戈挾楚穆為窺宋之謀晉悼之興列國悚然以聽命而蔡且安于楚之宇下終悼公之世不能得蔡于盟㑹也晉悼卒而楚之役蔡嘗從之是中國之諸侯折而從楚者莫如蔡之先其堅于事楚者莫如蔡之甚也昭十一年楚子䖍誘蔡侯般殺之于申矣楚子棄疾帥師圍蔡矣其冬楚師滅蔡執世子有以歸用之矣楚䖍既沒而蔡廬復封則蔡之存亡興廢皆寄于楚而中國安得有之乎蔡朱東國之廢置以楚費無忌之一言而廢君立君楚之小臣得制之矣蔡昭抱纍世之憾以一裘一佩之微遭三年拘止之辱沉玉璧以絶楚質愛子以請晉氣憤而情激亦既轉而從夏矣而召陵之役晉人求貨而辭蔡諸侯侵楚之師不出而楚人圍蔡之師反至柏舉之戰遂使蔡人假手于吳以釋憾楚禍雖深蔡憂未已迄于春秋以後而蔡終為楚所并是則中國諸侯之蒙禍于楚亦未如蔡之甚也向使當荆敗蔡師荆入蔡之時而齊桓即能從簡書以救蔡人則蔡不折而入于楚矣向使踐土之後晉霸常如文公之盛則蔡必不舍中國而從楚人矣向使當蔡昭絶楚從晉之際晉之君能守其先緒而不奪于求貨之臣則蔡必不至于假吳以釋憾而卒致州來之遷矣故其始背中國也在于荆入蔡而齊桓不能救其再背中國也在于晉文沒而晉霸不能競其終背中國而歸吳也在于晉霸既衰而不能有蔡也讀春秋者寧不為是三嘆哉冬單伯㑹齊侯宋公衛侯鄭伯于鄄宋服故也髙郵孫氏曰諸侯伐宋宋已服罪故齊侯㑹諸侯于鄄以與宋平而魯之單伯嘗往㑹之故同鄄之㑹也十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄復㑹焉齊始霸也張氏曰齊始霸者蓋指諸侯始定而言然魯未信服自是之後宋人猶或主兵衛鄭未免復叛蓋齊之霸業駸駸向定而諸侯之心猶未一也髙氏曰至是諸侯始㑹而霸體定矣齊侯未主諸侯也明年同盟于幽自幽之㑹齊侯常在諸侯之上矣許氏曰齊侯三合而不以盟以示重慎是以盟而衆信莫敢渝也愚按桓公管仲果有尊王之心及此諸侯未合請于天王用周召分陜故事擇諸侯之賢者與已分東西而治之是亦二伯而已矣何至為三王之罪人哉不知出此而重㑹以結諸侯斯末矣夏夫人姜氏如齊髙郵孫氏曰聖人制禮惟父母存者得歸寧其父母沒雖兄弟不往也所以預為之嫌而防逆亂之將萌也齊桓雖無齊襄之惡然春秋書之與齊襄等蓋非禮之迹同也張氏曰文姜不如齊者八年矣至是復如齊者蓋鄄之㑹魯莊不與此行殆出于文姜之意齊侯欲求魯好以定霸而莫之拒也許氏曰鄄之㑹魯侯尚未從桓以其未能比近無以示逺務在求好于魯是以于此受文姜而弗逆以昭親親而齊魯之交卒合然而禮防一弛則夫人復啓越境之恣而遂成如莒之姦使人倫失正而風俗相化此先王之興所以貴道謹法而不言利也家氏曰姜氏曩以如齊之故遺禍于魯齊桓當逺嫌弗即以示儀于諸侯乃猶聽其來歸置往愆而弗問姜不足責齊桓可責甚矣愚謂齊桓能因姜氏之越禮來歸討其弒夫之罪明正而誅之則家刑國治天下諸侯知所畏而亂亦庶幾乎息矣何憂魯之不㑹哉今欲來魯之㑹而容文姜之姦是謀其利不正其義也何以示天下哉亦何以服天下諸侯之心哉此霸之所以為霸而不可以入王道也秋宋人齊人邾人伐郳胡氏曰霸者之先諸侯専征也非霸者而先諸侯主兵也此齊桓之師何以序宋下猶未成乎霸也二十七年同盟于幽天下與之然後成乎霸鄭人侵宋諸侯為宋伐郳鄭人閒之而侵宋張氏曰閒諸侯伐郳而侵宋不誠于服齊而背二鄄之㑹鄭之反覆于齊楚之間蓋始于此髙氏曰蓋自此舉之後鄭國不寧矣冬十月十有六年春王正月夏宋人齊人衛人伐鄭宋故也許氏曰中國諸侯宋為大既為之服郳又為之報鄭宋自是與齊為一宋親而中國諸侯定矣家氏曰鄭昭以適子君國突與强臣合而篡之昭得反國突又與强鄰合而撓之據櫟之堅以號召凶黨昭以弒死突之為也齊桓始霸謂當聲突前罪請于王而正其戮今為宋伐之非名也秋荆伐鄭髙氏曰齊既與宋衛伐鄭鄭服中國而荆又伐之此鄭自取之也蓋楚與中國爭鄭自是干戈不已張氏曰自桓二年鄭已懼楚而㑹鄧至此三十餘年而後受兵楚之威不輕用蓋如此自是始為中國患矣髙郵孫氏曰前年荆嘗入蔡于是又伐鄭焉所以見楚人之强而中國之衰也不早備之將橫行于天下故二十三年來聘遂稱荆人僖元年伐鄭遂稱楚人于此書荆言其尚可禦也冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽鄭成也公羊㑹上有公字家氏曰是㑹也既褒其能同必不以公與為諱當從公羊作公㑹公羊氏曰同盟者何同欲也程子曰上無明王下無方伯諸侯交爭齊桓始霸天下與之故書同杜氏曰齊桓始霸楚亦始强陳介于二國之間而為三恪之客故齊桓因而進之遂班衛上髙氏曰許男先于滑伯滕子者是時霸主用事輒以其意之向背以為升降或諸國自以其强弱而相上下聖人因而書之以見先王之制不復行于當時也陳氏曰諸侯之初合盟也齊桓之初主盟也舉天下而聽于一邦王者不作舉天下而聽于一邦古未之有也于其始書曰同盟同衆辭也猶未豫以専主是盟也再盟于幽之後天下知有齊桓而已矣張氏曰夫子所謂桓公九合諸侯不以兵車此蓋其衣裳大㑹之始也朴鄉呂氏曰盟而書同蓋同于諸侯之同欲無可疑者以經考之惟再盟于幽皆書同若葵丘牡丘之㑹則不書同晉文踐土翟泉之盟則不書同至于趙盾新城之盟而後書同自是而後不書同者寡矣蓋齊桓為幽之盟實在荆入蔡伐鄭之後中國諸侯同于懼楚倚桓公以為重故兩盟于幽皆書同焉若葵丘踐土之盟則桓文之盛也主是盟者蓋出于桓文之意而諸侯從之故不書同晉文卒而楚益强新城之盟同于懼楚自是而後楚日以强中國之霸業日以不振故凡中國諸侯之相與為盟㑹者皆倚晉以為重凡皆諸侯之同欲也惟澶淵之盟不書同則平齊晉也臯鼬之盟不書同則劉子不與盟也故有以主是盟則不書同是桓文主霸之盛也二幽之盟而書同則桓公霸業未盛之時新城以後皆書同則晉人霸業漸衰之際凡書同者衆欲之也衆欲之則猶未純乎専主盟也家氏曰又有天王崩不奔喪而為盟與王人下與于列國之盟及其他義不應盟而為盟者皆以同盟書則同盟之變例也學者隨事而觀可以得聖人之意朱子曰若桓公不為尊王室無事自召諸侯則魯莊不赴可也今桓公名為尊王室若魯莊不赴非是叛齊乃是叛周也若欲復讐則當襄公殺其父之時能以不共戴天之故告之周天子方伯連帥必以復讐為事殺得襄公方快人意况桓公入國自在襄公被殺之後與魯桓之弒無相干涉或曰若莊公能殺襄公復與桓公為㑹可乎曰既殺襄公則自家之責已了與桓㑹亦何妨但莊公若能殺襄公則九合諸侯一匡天下之功將在莊公而不在齊桓矣惟其不能所以屈服于人也邾子克卒張氏曰克儀父名稱子者蓋齊桓請王命以為諸侯故曰子于是始列于諸侯也臨江劉氏曰未成國曰邾儀父既成國曰邾子克成國而後書其卒記其葬未成則否十有七年春齊人執鄭詹鄭不朝也謝氏曰拘而不殺曰執執之將以服之也春秋之亂諸侯擅作刑威以强凌弱而執人之君者有之以上虐下而執人之臣者有之凡執春秋皆奪爵稱人以王法治之也惟晉執曹伯歸京師執得其罪故書晉侯許氏曰宋大鄭小桓公懷宋以德威鄭以刑文王之興大邦畏其力小邦懷其德而桓反之是以為霸道也愚按左氏以為鄭不朝公榖則以詹為鄭佞人然以經考之齊鄭同盟于幽在去年之十二月至是才踰月爾安得便責其不朝也若以為佞人文無所據况鄭之佞人齊何緣執之當是以事來聘應對失辭或禮貌悖慢而見執爾夏齊人殱于遂遂因氏領氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉謝氏曰齊人被殺無遺故曰殱春秋不以責遂而歸咎于齊者以其禍由齊發也書曰齊人殱于遂罪其自取也凡禍出于自為者春秋上不以委命下不以責人胡氏曰殱盡也春秋書此者見齊人滅遂恃强凌弱非伐罪弔民之師遂人書滅乃亡國之善辭上下之同力也夫以亡國餘民能殱强齊之戍則申胥一身可以存楚楚雖三户可以亡秦固有是理足為强而不義之戒而弱者亦可省身而自立矣陳氏曰桓公伯諸侯而喪師于亡國之餘自取之也許氏曰齊師滅談談子奔莒著其君之不詘也齊人滅遂齊人殱于遂著其民之不歸也孟子以謂霸者以力服人非心服也力不贍也觀桓之興如此則所謂以力服人者非耶家氏曰魯莊以千乘之國甘于事讐而不恥遂之遺民鼓其餘勇猶足以殱滅齊戍春秋特為之書義之也亦可以為忘親事讐者之愧秋鄭詹自齊逃來榖梁氏曰逃義曰逃謝氏曰詹以國卿見執不能辨是非明曲直以解國憂乃若匹夫逃難之為臣子事君不可奪之節掃地盡矣春秋以逋竊待之而謂之逃賤之也臨江劉氏曰譏也以為義死制云乎以為不義死道云乎君子不曰幸而免蘇氏曰詹之義當身受其責以紓國難而逃遁自免故不書來奔而書逃來賤之也常山劉氏曰齊桓始霸同盟于幽魯首叛盟受其逋逃虧信義矣張氏曰執列國大夫逾歷三時不令其服而去致防間懈弛國囚亡逸齊之罪也奉命以使霸國有罪不能即刑奉身逃竄同于匹夫失節辱國詹之罪也同幽之盟守信不篤為逋逃主以取伐于霸主魯之罪也片言而三罪定春秋簡嚴于此可見冬多麋胡氏曰麋魯所有也多則為異以其又害稼也害稼則及人矣故書春秋闕疑卷八
