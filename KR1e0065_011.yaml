body:
  text: 春秋闕疑卷十一元鄭玉撰二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績初王姚嬖于莊王生子頺子頺有寵蒍國為之師及惠王即位蒍國邊伯石速詹父子禽祝跪作亂因蘇氏十九年秋五大夫奉子頺以伐王王不克出奔溫蘇子奉子頺以奔衛衛師燕師伐周冬立子頺二十年夏鄭伯遂以王歸秋王及鄭伯入于塢遂入成周取其寶器而還二十一年春鄭伯虢叔殺王子頺及五大夫二十七年王使召伯廖賜齊侯命且請伐衛至是齊侯伐衛戰敗衛師數之以王命取賂而還愚按子頺之事使誠有之乃王室之大變春秋何故不書齊人奉王命以討衛不王之罪春秋亦當特書以著其美而無一辭及之何也况子頺之事乃衛侯朔之所為已厯十年之久朔又死矣不應至是始命齊侯討其子也况取賂而還亦非齊侯始霸之事皆不可信泰山孫氏曰前年公及齊侯宋公陳侯鄭伯同盟于幽衛侯不至故齊人伐衛謝氏曰齊人伐衛以衛有可伐之罪也衛人有辭不服故與齊人戰焉衛人力不勝齊故敗績桓公威力可謂盛矣然伐國不以道則雖小國有至舉兵相敵終於卒伍敗衄而後退焉者也故孟子曰以力假仁者霸以力服人者非心服也桓公以仁義用兵特假之而已安能使人心服哉故齊之伐衛也上書伐下書戰以著衛人無服齊之志也春秋戰分主客戰而為主者其罪大戰而為客者其罪輕以戰由主起故也齊人以兵來伐我茍直焉以義辨吾之直而勿與之校可也謹邊陲嚴備守需其變而勿與之爭可也上訴天王下告列國求為之助以解其危可也若夫不恤民命而以戰為心則曲反在我而不在人罪反在此而不在彼矣然則春秋以齊人主伐而以衛人主戰者以明兩國之戰由衛人欲戰所致也戰之為禍大矣原野厭人之肉川谷流人之血皆戰之由也故仁者之兵有征無戰邦國有罪以兵誅罪而已服則舍焉未嘗以戰為事也邦國有亂以兵定亂而已順則止焉未嘗以戰為事也用兵而至於戰者皆好功嗜殺而輕民命也故春秋以大罪歸於首戰之人夏四月丁未邾子瑣卒秋荆伐鄭公會齊人宋人救鄭楚令尹子元欲蠱文夫人為館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎僃也今令尹不尋諸仇讐而於未亡人之側不亦異乎御人以告子元子元曰婦人不忘襲讐我反忘之秋子元以車六百乘伐鄭入于桔秩之門衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁秋申公鬬班殺子元鬬穀於莵為令尹自毁其家以紓楚國之難穀梁氏曰善救鄭也謝氏曰文公與諸侯同盟故荆伐鄭聘稱人進之也伐復稱荆外之也荆人陵犯中國久矣天子不能制方伯不能卻小國困于水火亦久矣方是時荆以不仁伐鄭而三國能出力救之三國與鄭同盟而復能與之同患小國有息肩之地矣胡氏曰桓公主兵鋤強救弱之事見矣冬築郿胡氏曰郿邑也凡用工大曰城小曰築故館則書築臺則書築囿則書築郿邑而書築者創作邑也其志不視歲之豐凶而輕用民力於其所不必為也則非人君之心矣大無麥禾臧孫辰告糴于齊冬飢臧孫辰告糴于齊胡氏曰麥熟于夏禾成于秋而書於冬者莊公惟臺榭是崇是飾費用浸廣調度不充有司會計歲入之多寡虛實然後知倉廩之竭也故于歲杪而書曰大無麥禾劉敞謂不言如齊告糴而曰告糴于齊者言如齊則其情緩告糴于齊則其情急也古者三年耕餘一年之食九年耕餘三年之食今莊公享國二十八年當有九年之積而虛竭如此所謂寄生之君也蘇氏曰是歲未嘗有水旱蟲螟之災而書大無麥禾者劉向春秋説曰土氣不養稼穡不成也沈約宋志言孫皓時嘗有之苗稼豐美而實不成百姓以飢合境皆然連歲不已則所謂大無麥禾也愚謂春秋書此見莊公不用心于民事歲之凶豐食之有無皆所不問及冬民飢始知大無麥禾急遣臧孫辰告糴于齊也茍非齊桓有救災恤鄰之義則魯民之不為飢殍者幾希矣他日葵丘之會申嚴遏糴之禁豈非自此而推之乎然則堯有九年之水湯有七年之旱而其民無菜色者以其備之有素也有國有家者其可不知所務而預為之僃乎二十有九年春新延廄公羊氏曰新延廄修舊也修舊何以書凶年不修穀梁氏曰冬築􅔛春新延廄以其用民力為已悉矣臨江劉氏曰延廄者天子之廄非諸侯之廄也髙氏曰魯侯僭乘天子之車僃十二間之馬聖人不敢斥言之是以特因其修舊而書以譏之且去冬大無麥禾今又新延廄所謂廄有肥馬民有飢色何以為民父母乎謝氏曰廄以安馬而已亦惡舊而新之莊公好治宫室可知也冬方告糴春又興工民困之不憂廄陋之為恤與孔子問傷人不問馬異矣夏鄭人侵許許氏曰許以近楚自齊之霸未會諸侯故鄭侵之自是而後許從中國矣秋有蜚公羊曰記異也何氏曰蜚者臭惡之蟲南越盛暑所生非中國之所有書有言本無也家氏曰洪範五行傳云蜚荒徼之物越之所生其為蟲臭惡能害人獨劉原父云蜚狀若牛而白首一目蛇尾行水則竭行草則死見則國大疫與傳注所言蓋兩物也髙氏曰此亦逺人亂中國之象自此中國不以為怪故一書而不復書如鸜鵒之類中原皆有之故始于春秋之時自春秋以來鄋瞞陸渾雜居中原豈此數物為之兆乎古者橘逾淮而化枳今淮宋之間橘大如柑乃知物理之變殆不可測後世之事古人不能知者衆矣冬十有二月紀叔姬卒髙郵孫氏曰內女歸為諸侯夫人無他惡行即書卒猶不書葬其賢行之著者則書卒書葬以旌之異于他女也紀叔姬為紀侯之媵法不當書而春秋書歸于紀歸于酅而卒葬皆詳書之者特賢之也胡氏曰紀已滅矣其卒之何見紀侯去國終不能自立異于古公亶父之去故特書叔姬卒而不卒紀侯以明其不爭而去則可能使其民從而不釋則微矣家氏曰以此防民猶有儷體宸居國亡不能死委身於仇讐如晉之惠后者可為痛哭流涕矣城諸及防謝氏曰諸防二邑諸役才已防役又興書及著其不恤民力也凡土工茍害于民雖時勿興可也三十年春王正月夏師次于成穀梁氏曰次止也有畏也欲救鄣而不能不言公耻不能救鄣也趙氏曰魯蓋欲會齊圍鄣至成待命聞鄣已降故不行耳然疑事無質但當存而勿解愚謂是時齊桓正霸齊魯方睦決無爭鄣之事當以趙説為是然不可考矣秋七月齊人降鄣公穀皆以鄣為紀之遺邑杜氏以為紀之附庸啖氏曰鄣自是小國爾愚按紀亡已久遺邑將安所屬以至于今啖氏之説近是齊人降鄣於以見桓公霸業之成兵威之盛也降者有以得其心而使之屈服詩云我心則降是也古之善為兵者不陳善陳者不戰今齊人臨鄣兵刃未接而能使之屈服服則舍之而不復加之以罪亦可謂善為兵矣五霸桓公為盛豈不信哉先儒以為齊恃強凌弱使之降故書齊人降鄣以罪齊者過矣入月癸亥葬紀叔姬九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟謀山戎也以其病燕故也杜氏曰濟水厯齊國界在齊界為齊濟在魯界為魯濟愚按濟之遇左氏以為謀伐山戎然伐戎之役魯實不與獨髙氏以為齊將伐山戎道由魯濟公于是乎出迓之故書曰遇若邂逅相值理或然也齊人伐山戎胡氏曰齊人者齊侯也其稱人譏伐戎也自管仲得政至是二十年未嘗命大夫為主將亦未嘗興大衆出侵伐故魯莊十一年而後凡用兵皆稱人者將卑師少爾今此安知其非將卑師少而獨以為齊侯也以來獻戎捷稱齊侯則知之矣夫北戎病燕職貢不至桓公內無因國外無從諸侯越千里之險為燕闢地可謂能修方伯連帥之職何以譏之乎桓不務德勤兵逺伐不正王法以譏其罪則將開後世之君勞中國以事邊陲捨近政而貴逺略困吾民之力爭不毛之地其患有不可勝言者故特貶而稱人以為好武功而不修文德者之戒髙氏曰以此為防而後世猶有開邉拓境好大喜功如秦皇漢武甘心徼外者實萬世之龜鑑也三十有一年春築臺于郎胡氏曰天子有靈臺以候天地諸侯有時臺以候四時去國築臺于逺而不緣占候是為遊觀之所厲民以自樂也厲民自樂而不與民同樂則民欲與之偕亡雖有臺其能獨樂乎夏四月薛伯卒髙郵孫氏曰薛伯卒經無其名舊史失之築臺于薛杜氏曰薛魯地六月齊侯來獻戎捷穀梁氏曰軍得曰捷公羊氏曰獻戎捷威我也左氏曰凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘髙氏曰始伐稱人此其稱爵者方其伐戎過我固已貶之此獻捷而稱人則疑若微者故特書爵以誅齊侯矜功威魯之罪謝氏曰軍以捷為功故勝敵為捷詩曰一月三捷是已以功告上為獻獻臣子之禮也詩云在泮獻馘是已齊之克山戎也齊侯躬以戎捷耀魯將以震動小國而威之也春秋退抑齊侯而書曰來獻黜其強也黜其強者不與大國以威諸侯也齊大國也來獻戎捷卑者之事也以卑者屈辱齊侯而春秋抑強扶弱之心見矣夫構禍邀功使生民陷于荼毒以好戰者為之患也沮直害忠使柔良困于沉溺以恃強者為之患也故春秋紀兵不美戰功其為道也不與強凌弱愚謂春秋之所謹王霸中外之辨也書齊侯來獻戎捷所以抑霸也書楚人使宜申來獻捷所以抑戎也是舉也自齊侯誇示則為榮自聖人書之則為辱妍醜見鑑而後明輕重經衡而後定也舜之告禹曰女惟不矜天下莫與女爭能女惟不伐天下莫與女爭功固聖人之明訓及觀夫子稱孟之反不伐抑齊侯之獻捷則人之處軍旅之間勝敗之際亦有道矣秋築臺于秦謝氏曰害民以興土功耗財以供不急放心以事盤遊作非法以遺後世乃一歲三築臺而不已莊公之過也張氏曰一歲築三臺正所謂及時般樂怠傲者則其治國治家之當務荒廢多矣髙氏曰當是時慶父執國政而通乎夫人故數築臺于逺地以為公遊觀之娛公亦為其所惑而不自知也可為後世戒冬不雨程子曰一歲三築臺明年春城小穀故冬書不雨閔之湥也不雨亦旱也謂之不雨者逺近傒雨咨嗟之辭也髙氏曰一時不雨未為災也書之以見公暮年興役不已而災異數至也髙郵孫氏曰易之象隂陽和者曰雨暌之上九曰往遇雨則吉其不和者則曰不雨小過之六五曰密雲不雨然則凡雨皆隂陽和也不雨者皆隂陽不和也書不雨記隂陽不和之異也人與物在天地間仰隂陽以生也隂陽不和則所以仰之者不遂矣故春秋之法一時不雨亦書不以其為災不災也三十有二年春城小穀為管仲也髙氏曰小穀魯邑今曲阜西北有小穀城先儒以為齊邑魯為管仲城之若然聖人亦當異其文而繫之齊矣且公雖感齊侯之私豈肻為管仲城邑乎彼殆見昭十一年傳云齊桓城穀而置管仲焉故有此説殊不知齊自有穀如文十七年公及齊侯盟于穀宣十四年公孫歸父會齊侯于穀此齊穀也非魯之小穀薛氏曰莊公自六年之後無麥苗大無麥禾螟麋􅈮蜚相繼而有大水者三中君之性尚當少警而公之侈心日起因娶而觀社丹楹刻桷告糴之後有築􅔛之役次年新延廄城諸防去年不雨而三築臺今歲又城小穀平歲猶曰不可况薦飢而輕用民力乎夏宋公齊侯遇于梁丘齊侯為楚伐鄭之故請會于諸侯宋公請先見于齊侯夏遇于梁丘髙郵孫氏曰宋公序齊侯上者宋為之志也髙氏曰梁丘宋地宋序齊上者地主也秋七月癸巳公子牙卒初公築臺臨黨氏見孟任從之閟以夫人言許之割臂盟公生子般焉公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待於針巫氏使針季鴆之曰飲此則有後于魯國不然死且無後飲之歸及逵泉而卒立叔孫氏髙氏曰傳載季友殺叔牙之事考之於經全不寓微意且公既有子何必問後而叔牙輒以慶父對若公以為不當立則自不立矣何至於殺叔牙耶殺叔牙而反使慶父執國政此又何理耶况此去公薨尚逺豈公臨終之事耶公羊氏以為將弒莊公此又無謂之甚者以此言之公子牙蓋自卒耳髙郵孫氏曰季友遏惡于未萌乃春秋之所重春秋既不以骨肉相殘責之當變文以見意不當但書卒也二傳但見公子牙魯之大惡者而卒于莊公之前又季友方用事于魯疑其為季殺之爾且當據經為正八月癸亥公薨于路寢子般即位次于黨氏穀梁氏曰路寢正寢也寢疾居正寢正也謝氏曰公薨必書其所謹凶變也遇弒則不地故也莊公宣公成公薨于路寢正也僖公薨于小寢文公薨于臺下襄公薨于楚宫定公薨于髙寢不正也隱公閔公不地以明不得其死也桓公薨于齊以明遇禍于齊也昭公薨于乾侯以明客死于晉也趙氏曰君必終于正寢以就公卿也大位姦之窺也危病邪之伺也若蔽于隱是使小人女子得行其志也故宗嗣素定之兵權散主之閨闈嚴飾之小人女子不尸重任賢良受託鼎足交輔則篡弒之禍曷由而至哉胡氏曰莊公以世嫡承國不為不貴周公之後奄有龜蒙不為不強即位三十有二年不為不久薨于路寢不為不正而嗣子受禍幾至亡國何也大倫不明而宗嗣不定兵權不分而主威不立得免其身幸矣冬十月己未子般卒共仲使圉人犖賊殺子般于黨氏成季奔陳立閔公公羊氏曰此其稱子般卒何君存稱世子君薨稱子某既葬稱子踰年稱公子般卒何以不書葬未踰年之君也髙氏曰子般卒三傳皆以為慶父所殺考之于經全不寓微意而所書正與襄三十一年子野同若以子般為被弒則子野亦豈被弒乎惟文十入年書子卒而不名者乃被弒也何則既書子卒即書夫人薑氏歸于齊蓋文公既薨子赤為宣公襄仲所殺而弒君之賊又自立矣薑氏不能容自歸于父母之國聖人不名子赤者以其被弒不忍名之與成君同也若書其名則與自卒者無别矣或以為先君未葬則名文十八年書子卒而不名者以先君既葬故爾是不然景王既葬矣王子猛之卒何為而名乎豈有天子未踰年則名之而諸侯反不名乎以此驗之子般子野皆非被殺而子般特以哀薑慶父之故疑若為其所弒耳公子慶父如齊髙氏曰若以慶父弒君而出奔則聖人豈不著其出奔之罪乎乃知此非出奔也蓋莊公既薨子般又卒繼嗣未定慶父雖有僥幸之心而身為國卿加以公子之貴寧無嫌疑之避於是如齊告難蓋桓公始霸謀定其君及自齊歸魯已立閔慶父始有篡弒之意故明年齊侯使仲孫湫來省難而仲孫謂不去慶父魯難未巳也愚謂聖人書子般之卒子野之卒無異文而不同于子赤諱名之例則般以正卒明矣書慶父如齊異于慶父弒閔奔莒之文則般之死非慶父所殺亦明矣况以事言之是時齊桓方霸專以誅叛討逆為事慶父既弒其君安敢奔齊以自投于憲網齊桓聞之必執以為已功矣故弒閔公之後則不敢奔齊而奔莒也豈當時見莊公既薨子般又死故以疑似而有是説耶抑因慶父弒閔之後遂傅會以成其文耶子舊讀而疑之及觀髙氏之説湥有契于豫心最為得經之旨故特取之以明棄經任傳之弊學者于此等處所宜潛心詳玩參考互訂以明其是非曲直而不為傳注所惑庶于經有得也狄伐邢髙氏曰此為齊侯救邢而書亦見中國之衰張氏曰狄北狄前此雖未見于經然自伐邢而滅衛三年之間塗炭兩國首以伐書著其強也小東萊吕氏曰桓公始霸之初狄滅衛又伐邢見得當時中國衰微至于如此之甚向非桓公封衛遷邢則諸姬之盡豈獨在漢陽矣此孔子作春秋所以於齊桓公之霸多與辭也許氏曰春秋戎先見荆次之狄又次之而荆暴于戎狄又暴于荆當惠王世戎狄荆楚交伐諸夏使無齊桓攘服以定之豈復有周天子哉春秋闕疑卷十一
