body:
  text: 春秋闕疑卷三十六元鄭玉撰十有三年春叔弓帥師圍費叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之饑者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏十四年南蒯之將叛也盟費人司徒老祁慮癸僞廢疾使請于南蒯曰臣願受盟而疾興若以君靈不死請待間而盟許之二子因民之欲叛也請朝衆而盟遂劫南蒯曰羣臣不忘其君畏子以及今三年聽命矣子若弗圖費人不忍其君將不能畏子矣子何所不逞欲請送子請期五日遂奔齊蒯侍飲酒于景公公曰叛夫對曰臣欲張公室也子韓晳曰家臣而欲張公室罪莫大焉司徒老祁慮癸來歸費齊侯使鮑文子致之陸氏微㫖曰凡家臣以邑叛悉不書叛之人名何也曰家臣微賤名不合登于史册也但書大夫圍之則邑叛可知矣且罪大夫無政而使家臣得專邑而叛也克之不書本非它國之邑也胡氏曰費內邑也命正卿為主將舉大衆圍其城若敵國然者家臣强大夫弱也語不云乎有一言而可以終身行之者乎己所不欲勿施于人所惡于下者母以事上也所惡于上者母以使下也然後家齊而國治矣季孫意如以所惡于下者事其上而不忠于其君以所惡于上者使其下而不禮于其臣出乎爾者反乎爾宜南蒯之及此也春秋之法不書內叛反求諸已而已矣其書圍費欲著其實不沒之也謝氏曰周之衰也其始諸侯制天子其次大夫制諸侯又其次家臣制大夫劉氏意林曰使周之王母廢文武之法母過失之道諸侯雖大國孰敢慢其上諸侯必母僭天子其大夫孰陵大夫必母脅其君其陪臣孰叛魯之不正相承非一日之積矣衆人之治則以謂茍君君臣臣焉可矣王者之術必將曰君不君則臣不臣父不父則子不子正已而物正此之謂王者之術夏四月楚公子比自晉歸于楚弒其君䖍于乾溪楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵于王王之滅蔡也其父死焉王使與于守而行申之㑹越大夫戮焉王奪鬭韋龜中犨又奪成然邑而使為郊尹蔓成然故事蔡公故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常壽過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情强與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇于蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊陳蔡欲為名故請為武軍蔡公知之曰欲速且役病矣請藩而已乃藩為軍蔡公使須務牟與史禆先入因正僕人殺太子祿及公子罷敵公子比為王公子黑肱為令尹次于魚陂公子棄疾為司馬先除王宫使觀從從師于乾溪而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投于車下曰人之愛子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待于郊以聽國人王曰衆怒不可犯也曰若入于大都而乞師于諸侯以聽大國之圖君也王曰大福不再祗取辱焉然丹乃歸于楚王沿夏將欲入鄢芋尹無宇之子申亥曰吾父再奸王命王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸夏五月癸亥王縊于芋尹申亥氏申亥以其二女殉而葬之初楚子之為令尹也為王旌以田芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之無宇之閽人入焉無宇執之有司弗與曰執人于王宫其罪大矣執而謁諸王王將飲酒無宇辭曰天子經略諸侯正封古之制也封略之內何非王土食土之毛誰非君民故詩曰普天之下莫非王土率土之濵莫非王臣天有十日人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事今有司曰女胡執人于王宫將焉執之周文王之法曰有亡荒閲所以得天下也吾先君文王作僕區之法曰盜所隱器與盜同罪所以封汝也若從有司是無所執逃臣也逃而舍之是無陪臺也王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪故夫致死焉君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣王曰取而臣以往盜有寵未可得也遂赦之穀梁氏曰自晉晉有奉焉爾薛氏曰比以䖍出歸而弒䖍則其歸為篡也高氏曰雖棄疾脅比而立靈王自縊而死若比不從棄疾之脅則靈王未必死以此言之棄疾不得比之勢則無以濟其亂比見利而動遽欲為君則成楚靈之弒者乃比也蓋是時比當效死不立而既立矣又烏得避是名哉若使人受其名已享其利則後世姦人苟有藉口以濟其私者莫不皆置其力焉故聖人正名比之弒君所以絶後世姦人之禍也雖然比之歸也䖍猶在楚其不言入何也觀從召之楚人與之楚人不拒則比之歸無難也陳氏曰靈王之弒棄疾為之也比立而弒君則比蒙首惡之名胡氏曰昭元年楚䖍弒立比出奔晉十三年比歸而䖍縊于棘圍則比未嘗一日北面事䖍為之臣䖍又弒立固非比之君而書曰比弒其君䖍何也凡去國出奔而君不以為臣則晉于欒盈是也臣不以為君則公子鱄于衛是也若去國雖久而爵祿有列于朝出入有詔于國不掃其墳墓不收其田里不係纍其宗族即君臣之分猶在也比雖奔晉而晉人以羇待比以國底祿固楚之亡公子也楚又未嘗錮之如晉之于欒盈比又未嘗不向楚而坐如子鮮之于衛安得以為比非楚臣而䖍非比之君乎春秋書比弒其君䖍明于君臣之義也家氏曰䖍非篡國之賊乎始䖍之篡有能仗大義而殺之求郟敖之後立之則殺者為義篡者為賊從州吁無知之討例可也及今而後殺之又代君其處其得謂之討賊乎蓋賊可討而不可代也代之則與之俱為篡弒之人春秋之義必有所不容矣楚公子棄疾殺公子比觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玊曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣乙卯夜棄疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺丙辰棄疾即位名曰熊居葬子干于訾實訾敖殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗為令尹平王封陳蔡復遷邑致羣賂施舍寬民宥罪舉職召觀從王曰唯爾所欲對曰臣之先佐開卜乃使為卜尹他年芋尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸初共王無冡適有寵子五人無適立焉乃大有事于羣望而祈曰請神擇于五人者使主社稷乃遍以璧見于羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧于大室之庭使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐鬬韋龜屬成然焉且曰棄禮違命楚其危哉子干歸韓宣子問于叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無德五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羇終世可謂無民亡無愛徴可謂無德王虐而不忌楚君子干涉五難以弒舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉苛慝不作盜賊伏隱私欲不違民無怨心先神命之國民信之芉姓有亂必季實立楚之常也獲神一也有民二也令德三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣民無懷焉國無與焉將何以立宣子曰齊桓晉文不亦是乎對曰齊桓衛姬之子也而有寵于僖有鮑叔牙賔須無隰朋以為輔佐有莒衛以為外主有國高以為內主從善如流下善齊肅不藏賄不從欲施舍不倦求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵于獻好學而不二生十七年有士五人有先大夫子餘子犯以為腹心有魏犨賈他以為股肱有齊宋秦楚以為外主有欒郤狐先以為內主亡十九年守志彌篤惠懷棄民民從而與之獻無異親民無異望天方相晉將何以代文此二君者異于子干共有寵子國有奧主無施于民無援于外去晉而不送歸楚而不逆何以冀國胡氏曰棄疾立比為王而已為司馬固君比矣而又殺之則宜書曰棄疾弒其君比而曰殺公子比何也初子干歸自晉觀從假棄疾命而召之來則來坎牲加書而强之盟則盟帥四族衆而使之入楚則入殺太子祿而立之為王則王周走而呼于國中謂衆怒如水火而逼之自殺則自殺其行止遲速去就死生皆觀從與國人所為而比未嘗可否之也安得為棄疾之君乎謝氏曰比國之逆臣也殺不以討賊之辭棄疾與比同惡相濟者也比既據國害君棄疾復爭位殺比二人者其逆同其罪均故棄疾殺比不以討賊之辭與之也比䖍之弟棄疾比之弟棄疾比皆稱公子以明楚靈之禍起于宗族也秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘晉成虒祁諸侯朝而歸者皆有二心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徵㑹告于吳秋晉侯㑹吳子于良水道不可吳子辭乃還七月丙寅治兵于邾南甲車四千乘羊舌鮒攝司馬遂合諸侯于平丘子産子太叔相鄭伯以㑹叔鮒求貨于衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦曰諸侯事晉未敢攜二况衛在君之宇下而敢有異志芻蕘者異于他日敢請之叔向受羮反錦曰晉有羊舌鮒者瀆貨無厭亦將及矣為此役也子若以君命賜之其已客從之未退而禁之胡氏曰方是時楚人橫暴陵蔑中華在宋之盟爭晉先歃及虢之㑹仍讀舊書遂召諸侯為申之舉遷賴于鄢縣陳滅蔡此乃敵國外患臨深履薄恐懼省戒之時其君當倚于法家拂士以德修國政其臣當急于責難陳善以禮格君心內結夏盟外攘僣亂復悼公之業若弗暇也今乃施施然安于不競無憤恥自强之志惟宫室臺榭是崇是飾及諸侯皆二顧欲示威徵㑹而以兵甲耀之不亦末乎春秋之法制治于未亂保邦于未危貴事之豫恥以茍成而不要諸道者也是以深惡此㑹如下文所貶云陳氏曰晉之合諸侯由是止鄟陵之㑹參盟復作晉非盟主矣八月甲戌同盟于平丘公不與盟晉人將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君苟有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速唯君叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋叔向曰國家之敗有事而無業事則不經有業而無禮經則不序有禮而無威序則不共有威而不昭共則不明不明棄共百事不終所由傾覆也是故明王之制使諸侯歲聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業于好講禮于等示威于衆昭明于神自古以來未之或失也存亡之道恆由是興晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有唯君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聽從既聞命矣敬共以往遲速唯君叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之甲戌同盟于平丘齊服也令諸侯日中造于除癸酉退朝子産命外僕速張于除子太叔止之使待明日及夕子産聞其未張也使速往乃無所張矣及盟子産爭承曰昔天子班貢輕重以列列尊貢重周之制也卑而貢重者甸服也鄭伯男也而使從公侯之貢懼弗給也敢以為請諸侯靖兵好以為事行理之命無月不至貢之無藝小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣自日中以爭至于昏晉人許之既盟子太叔咎之曰諸侯若討其可瀆乎子産曰晉政多門二偷之不暇何暇討國不競亦陵何國之為邾人莒人訴于晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟今寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之欣以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨于豚上其畏不死南蒯子仲之憂其庸可棄乎若奉晉之衆用諸侯之師因邾莒杞鄫之怒以討魯罪間其二憂何求而弗克魯人懼聽命甲戌同盟于平丘齊服也公不與盟胡氏曰書同盟者劉子與盟也㑹與盟同地再書平丘者書之重辭之復其中必有美惡焉見行事之深切著明故辭繁而不殺也主盟中國奉承齊犧而矜其威力恐迫諸侯求逞私忿間其憂疑如此盟者流及戰國強衆相誇恫疑恐喝恣行陵暴死者十九積習所至有自來矣詞繁不殺則惡其競力不道為後世鑒也臣子之于君父隱諱其恥禮也十二國㑹于平丘公獨見辭不得與盟斯亦可恥矣曷為直書其事而不隱也晉主此盟德則不競而矜兵甲之威肆挾持之術以諸侯上要天子之老而㰱血無禮義忠信誠慤之心而以威詐涖之得不與焉幸也愚按平丘之盟晉政不競霸業遂衰中國之恥也故魯以不得與盟為幸若夫邾莒之訴則魯亦不能無罪焉故程子曰辭公不使與盟雖欲辱公然得不與同盟之罪實為幸也晉人執季孫意如以歸晉人執季孫意如以幕蒙之使狄人守之司鐸射懷錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從胡氏曰稱人以執非霸討也自文公以來公室微弱三家專魯而季氏罪之首也宿及意如尤為强逼元年伐莒疆鄆十年伐莒取郠中分魯國以自封殖而使其君民食于家其不臣甚矣何以為非霸討乎晉人若按邾莒所訴有無之狀䆒南蒯子仲奔叛之因告于諸侯以其罪執之請于天子以大義廢之選于魯卿更意如之位收斂私邑為宫室之民使政令在君三家臣順則方伯之職修矣徒以邾莒之言曰我之不共魯故之以遂辭魯君而執意如則是意在貨財而不責其無君臣之義也何得為霸討乎稱人以執罪晉之偷也公至自㑹蔡侯廬歸于蔡陳侯吳歸于陳楚之滅蔡也靈王遷許胡沈道房申于荆焉平王即位既封陳蔡而皆復之隱大子之子廬歸于蔡悼大子之子吳歸于陳謝氏曰二嗣前非諸侯至此始立故書名胡氏曰歸者順辭也陳蔡昔皆滅矣不稱復歸者不與楚䖍之得滅也其稱歸于者國其所宜歸也廬與吳皆亡世子之子也而棄疾封之可謂有奉矣不言自楚者不與楚子之得封也其稱侯者位其所固有也陳列聖之後蔡王室之親見滅于楚䖍而諸侯不能救復封于棄疾而諸侯不能與是以夷狄制諸夏也聖人至是懼之甚蓋有不得已焉制春秋為後法大要皆天子之事也其義則以公天下為心興滅國繼絶世異于自私其身欲擅而有之者也故書法如此為天下國家而不封建欲望先王之治難矣冬十月葬蔡靈公公如晉至河乃復公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河吳滅州來楚師還自徐吳人敗諸豫章獲其五帥至是吳滅州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之蘇氏曰州來楚之附庸高氏曰成六年吳入州來蓋本楚屬也至是取之盡殺其吏民無道之甚故稱滅焉春秋詳楚伐吳略吳伐楚而志其甚者滅州來是也十有四年春意如至自晉季孫猶在晉子服惠伯私于中行穆子曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳于晉親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二吾豈無大國穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠于㑹宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰昔鮒也得罪于晉君自歸于魯君微武子之賜不至于今雖獲歸骨于晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館于西河其若之何且泣平子懼先歸惠伯待禮高氏曰魯大夫執則致行父之不至從公也意如不書族前見也夫晉之始執季孫為乏邾莒之供而非有扶弱擊強之義也及其歸之又以土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣故平丘之㑹深加貶斥自是而後諸侯不合二十餘年至于召陵又以賄敗以十有八國諸侯之衆而書侵楚以陋之于是晉日益衰外攜內叛不復振矣夫利之能敗人國家一至于此春秋之所深戒而季氏富于周公遂能以利幸脫之禍尤聖人之所深疾也家氏曰春秋書公如晉至河乃復繼書意如至自晉見魯君與意如相出入于晉也傳謂意如譖其君使不得遂于晉此其實也如晉昭辭公于㑹而執意如人猶冀其明正強臣專兵之討俄而得釋季氏愈張魯君愈削乾侯之禍作矣三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒冬莒殺其公子意恢秋八月莒著丘公卒郊公不戚國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善于庚輿郊公惡公子鐸而善于意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿于齊齊隰黨公子鉏送之有賂田家氏曰郊公以子代父正也庚輿以弟繼兄篡也蒲餘侯首亂者也公子意恢君之黨必莒之舊臣也蒲餘侯與公子鐸比而為亂殺意恢逐郊公逆庚輿于齊而立之意恢之死為君故耳春秋不書郊公之奔庚輿之入郊公不能君庚輿由是篡也繼莒子卒而書意恢死意恢受託孤之寄而不能其事者也君在喪而已為政國之安危休戚于是乎寄郊公居喪不戚而不能正之以禮蒲餘與鐸謀為亂而不能豫為之防身雖為國而死何益哉故不書死難而書見殺曹莒無大夫故不書大夫愚謂公子鐸鼓禍之尤也十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事胡氏曰案曾子問君在祭不得成禮者夫子語之詳矣而無有及大臣者是知祭而去樂不可也有事于宗廟遭大夫之變則以聞可乎案禮衛有太史栁莊寢疾君曰若疾革雖當祭必告是知祭而以聞不可也禮莫重于當祭大夫有變而不以聞則內得盡其誠敬之心于宗廟外得全其隱恤之意于大臣是兩得之也然則有事于宗廟大臣涖事籥入而卒于其所則如之何禮雖未之有可以義起也有事于宗廟大臣涖事籥入而卒于其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視已設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書茍以為可則春秋何書乎此記禮之變而書之者也夏蔡朝吳出奔鄭楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子于蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及于難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也胡氏曰朝吳蔡之忠臣雖不能存蔡而能復蔡其從于棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠于舊君而信之使居舊國可謂知所信矣則曷為出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪大子建殺連尹奢屛王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎然朝吳身居舊國處危疑之地苟有讒之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語之曰子亦長矣而在下位辱也欲為之請以名利動其心而莫之覺不知亦甚矣故特書其出奔以罪吳為後戒也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞十三年鮮虞人聞晉師之悉起也而不警邊且不修備晉荀吳自著雍以上軍侵鮮虞大獲而歸至是荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而不取勤民而頓兵何以事君穆子曰吾所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊賈怠無卒棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子鳶鞮歸二十二年晉之取鼓也既獻而反鼓子焉又叛于鮮虞六月荀吳略東陽使師僞糴者負甲以息于昔陽之門外遂襲鼓滅之以鼓子鳶鞮歸使涉他守之胡氏曰晉滅潞氏甲氏及再伐鮮虞皆用大夫為主將而或稱人或稱國或稱其名氏何也以殄滅為期而無矜惻之意則稱人見利忘義而以詭譎欺詐行之則稱國以正兵加敵而不納其叛臣則稱名氏夫稱其名氏非褒之也才免于貶耳而春秋用兵禦亂之略咸見矣冬公如晉平丘之會故也十有六年春齊侯伐徐二月丙申齊師至于蒲隧徐人行成徐子及郯人莒人㑹齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方㑹之有成而還莫之亢也無伯也夫高氏曰景公之時吳楚方爭晉又不能逺略以齊之强修其政刑紏合諸侯復霸可也而區區助楚伐徐以懼吳人師至蒲隧徐人賂以甲父之鼎而還嗚呼志亦卑矣斥言齊侯罪在齊侯也楚子誘戎蠻子殺之楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏既而復立其子焉公羊氏曰楚子何以不名夷狄相誘君子不疾也若不疾乃疾之也蘇氏曰楚子誘蔡侯般殺之名而書地以南蠻害中國疾之也誘殺戎蠻不名不地其類相殘略之也謝氏曰誘蔡侯般殺之楚靈之詐謀也誘戎蠻子殺之楚平之詐謀也楚平殺蠻子不名者以詐相誘相殺外域之常也外域以詐殺外域不名著其常也以其為行彼此一也然則䖍名所以著其惡于前棄疾不名所以著其常于後著其惡以明在所當絶著其常以明在所當賤夏公至自晉春王正月公在晉晉人止公夏公至自晉子服昭伯語季平子曰晉之公室其將遂卑矣君幼弱六卿彊而奢傲將因是以習習實為常能無卑乎平子曰爾幼惡識國左氏曰止公不書諱之也胡氏曰昭公數朝于晉三至于河而不得入兩得見晉侯又欲討其罪而止旃其困辱甚矣在易之困曰困亨者因困窮而致亨也夫困于心衡于慮而後得徵于色發于聲而後喻此正憤悱自强之時而夏少康衛文公越勾踐燕昭王此四君子者由此其選也今昭公安于危辱無激昂勉勵之志即所謂自暴自棄不可與有為而人莫之告矣不亦悲乎秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝小邾穆公來朝公與之燕季平子賦采菽穆公賦菁菁者莪昭子曰不有以國其能久乎夏六月甲戌朔日有食之六月甲戌日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝禮也平子禦之曰止也唯正月朔慝未作日有食之于是乎有伐鼓用幣禮也其餘則否大史曰在此月也日過分而未至三辰有災于是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰弗集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皥氏以龍紀故為龍師而龍名我高祖少皥摯之立也鳯鳥適至故紀于鳥為鳥師而鳥名鳯鳥氏歷正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也自顓頊以來不能紀逺乃紀于近為民師而命以民事則不能故也仲尼聞之見于郯子而學之既而告人曰吾聞之天子失官學在四夷猶信家氏曰夫所謂夷非以斥其人言周魯俱衰典章闕壞而逺方小國之君乃知前古官名之沿革蓋録之也所謂夷者如孟子所謂舜為東夷之人文王為西夷之人夷之為言逺也或者遂以郯子為夷國失之矣八月晉荀吳帥師滅陸渾之戎晉侯使屠蒯如周請有事于雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦于楚必是故也君其備之乃警戎備九月丁卯晉荀吳帥師涉自棘津使祭史先用牲于雒陸渾人弗知師從之庚午遂滅陸渾數之以其二于楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘于文宫胡氏曰林父之于潞氏士㑹之于甲氏荀吳之于陸渾戎皆滅之也而林父士㑹稱人荀吳舉其名氏何哉夷不亂華陸渾之戎密邇王室而縱之雜處則非膺戎狄别內外之義也與闢土服逺以圖強霸則異矣然舉其名氏非褒辭也才得無貶耳則窮兵于逺虛內事外者可知矣家氏曰僖二十五年秦晉遷陸渾之戎于伊川蓋以二強國之力迫而遷之非戎人侵犯王略自外而竊居于內也然則將存之乎曰徙而逺之不使混于華斯可矣無罪而滅之則過矣冬有星孛于大辰有星孛于大辰西及漢申須曰彗所以除舊布新也天事恆象今除于火火出必布焉諸侯其有火災乎梓慎曰往年吾見之是其徵也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出于夏為三月于商為四月于周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言于子産曰宋衛陳鄭將同日火若我用瓘斝玊瓚鄭必不火子産弗與許氏曰星孛大辰大災應之天地之符也大辰明堂宋之分故王室亂宋亦亂衛陳鄭災氣所溢也衛亂君奔陳敗卿獲惟鄭有令政而無後災是知禍福之可轉矣胡氏曰大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛于東方不言宿者不加宿也當是時吳人僭亂憑陵上國日敝于兵暴骨如莽其厲氣所感固將壅吳而降之罰也故氛浸所指在于東方假手越人吳國遂亡天之示人顯矣史之有占明矣大東萊吕氏曰日月星辰之謫見于天雪霜風雨之不時以為民害皆政事之失常有以取之也故君觀其變以思戒察其祥以改行則災害可息而無危亡之禍其漠然不以為意則禍及之非不幸也聖人詳書以為世戒焉人君觀春秋所書其可不致懼乎楚人及吳戰于長岸吳伐楚陽丐為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇使徐人與後至者守之環而塹之及泉盈其隧炭陳以待命吳公子光請于衆曰喪先王之乘舟豈惟光之罪衆亦有焉請藉取之以救死衆許之使長鬛者三人潛伏于舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸高氏曰人楚而國吳吳之惡甚于楚也書楚之及又以罪楚也勝負相敵故不書敗績家氏曰以其為兵首故書吳胡氏曰楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而策士竒才為敵國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔幾于亡滅吳日益強而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末強弱之由其為後世戒明矣春秋闕疑卷三十六
