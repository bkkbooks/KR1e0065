body:
  text: 春秋闕疑卷三十九元鄭玊撰二十有八年春王三月葬曹悼公公如晉次于乾侯公如晉將如乾侯子家子曰有求于人而即其安人孰矜之其造于竟弗聽使請逆于晉晉人曰天禍魯國君淹恤在外君亦不使一個辱在寡人而即安于甥舅其亦使逆君使公復于竟而後逆之高郵孫氏曰公久于鄆以事齊求齊之納已而齊竟不能于是又如晉將以求助焉至于乾侯而晉辭公不見納徒次于乾侯焉高氏曰公之奔也不知先晉而連年如齊皆不見禮乃始如晉此晉所以不納公也泰山孫氏曰公如齊者再皆不見禮故如晉其言次于乾侯者不得入于晉也公既不見禮于齊又不得入于晉其窮辱若此大東萊吕氏曰公如齊不得入如晉又不得入當世諸侯如是然後知無霸之害也夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆齊侯使高張來唁公公如晉次于乾侯公至自乾侯處于鄆齊侯使高張來唁公稱主君子家子曰齊卑君矣君祗辱焉公如乾侯平子每歲賈馬具從者之衣屨而歸之于乾侯公執歸馬者賣之乃不歸馬衛侯來獻其乘馬曰啓服塹而死公將為之櫝子家子曰從者病矣請以食之乃以幃裹之公賜公衍羔裘使獻龍輔于齊侯遂入羔裘齊侯喜與之陽穀公衍公為之生也其母偕出公衍先生公為之母曰相與偕出請相與偕告三日公為生其母先以告公為為兄公私喜于陽穀而思于魯曰務人為此禍也且後生而為兄其誣也久矣乃黜之而以公衍為大子胡氏曰遣使來唁淺事也亦書于經者罪齊侯不能修方伯連率之職也昔狄人迫逐黎侯黎侯寓于衛衛人弗恤黎之臣子勸其君以歸而賦式微其一章曰微君之故者以事求人而人不有其事也若昭公見逐出奔而齊莫之討淹恤日久而齊莫之納微君之故矣其二章曰微君之躬者以身下人而人不有其身也若齊侯設醴以享而使宰獻遣使來唁而稱主君微君之躬矣諸侯失國託于諸侯禮也諸侯失國諸侯納之正也齊之先世嘗主夏盟而太公受先王五侯九伯之命矣魯為鄰境甥舅之國也昭公朝夕立于其朝曾不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎謝氏曰晉辭之矣又如晉次于乾侯窘迫之至也許氏曰書次于乾侯復不見受也家氏曰晉之諸大夫亦齊之梁丘據晉頃之懦而無立視齊景有過之去齊而之晉去晉而復適諸侯必無有為魯君討賊者矣此春秋之叔世降而愈下桓文之轍跡掃地無餘豈惟魯之病之天下之人皆病之矣夏四月庚子叔詣卒穀梁傳曰叔倪卒季孫意如曰叔倪無病而死此皆無公也是天命也非我罪也愚按亂臣賊子其忍于為惡如此昭公雖欲反國其可得乎秋七月冬十月鄆潰穀梁氏曰潰之為言上下不相得也上下不相得則惡矣亦譏公也昭公出奔民如釋重負大東萊吕氏曰易蹇之象曰君子以反身修德固處蹇之道也盡處蹇之道則有出蹇之期昔大王去國徒者如歸市昭公所至而民潰其亦不知自反甚矣胡氏曰民逃其上曰潰自是昭公削迹于魯尺地一民皆非其有矣公之出奔處鄆四年民不見德亡無愛徵至于潰散豈非昏迷不返自納于罟獲陷穽之中其從者又皆艾殺其民視如土芥其下不堪所以潰歟然則去宗廟社稷出奔而猶不惕然恐懼蘄改過以補前行之愆也自棄甚矣欲不亡得乎故書以為後世戒三十年春王正月公在乾侯穀梁氏曰存公故也臨江劉氏曰曷為存公公在外也公在外久矣曷為于此乎存公居于鄆有魯也在乾侯無魯也公雖無魯魯不可無公也劉氏意林曰向曰居今曰在向也魯而今也晉一民莫得使焉尺地莫得有焉人固曰乾侯之君耳而春秋則以為猶吾君也故君雖不君臣不可以不臣父雖不父子不可以不子古今之大義常山劉氏曰君失其居在于乾侯而不得歸故因朝正之時而書公所在則存君父罪臣子譏諸侯之意具見胡氏曰公去社稷于今五年每歲首月不書公者在魯四封之內則無適而非其所也至是鄆潰客寄乾侯非其所矣歲首必書公之所在者蓋以存君不與季氏之專國也師氏曰鄆之書居乾侯書在內外之别也夏六月庚辰晉侯去疾卒秋八月葬晉頃公鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬今吾子無二何故對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命字小在恤其所無以敝邑居大國之閒共其職貢與其備御不虞之患豈忘共命先王之制諸侯之喪士弔大夫送葬唯加好聘饗三軍之事于是乎使卿晉之喪事敝邑之閒先君有所助執紼矣若其不閒雖士大夫有所不獲數矣大國之惠亦慶其加而不討其乏明底其情取備而已以為禮也靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也今大夫曰女盍從舊舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰冬十有二月吳滅徐徐子章羽奔楚吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙使監馬尹大心逆吳公子使居養莠尹然左司馬沈尹戌城之取于城父與胡田以與之將以害吳也子西諌曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至吾又彊其讐以重怒之無乃不可乎吳周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文將自同于先王不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不逺矣我盍姑億吾鬼神而寧吾族姓以待其歸將焉用自播揚焉王弗聽吳子怒冬十二月吳子執鍾吾子遂伐徐徐子章禹斷其髮攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚楚沈尹戍帥師救徐弗及遂城夷使徐子處之胡氏曰春秋國滅而君出奔者皆存其爵而不名謂無可滅之罪特為橫逆所加耳獨徐子章羽奔而書名者章羽斷其髮攜其夫人以逆吳子巳無興復之志矣以此見春秋大義雖在于抑强扶弱又責弱者之必自强于為善也高氏曰徐本徐夷自齊桓時自附于中國而爵為子今背中國而即吳楚故楚人以為二于吳而執之吳人以為二于楚而滅之夫附中國則與于中國之盟㑹而附吳楚則遂至于執其君而滅其國然則背中國者可不戒哉三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歷晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如㑹晉荀躒于適歷荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行伏而對曰事君臣之所不得也敢逃刑命君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心陸氏微旨曰季孫逐君之臣也晉不罪之而反與之為㑹書曰意如㑹晉荀躒于適歷晉侯之為盟主可見矣荀躒之為臣可知矣此不待貶絶而惡見者也胡氏曰或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晉使不納公禱于煬宫求君不入及其復也猶欲絶其兆域加之惡諡安在乎事君如在國猶曰未知其罪乎齊晉不能誅亂禁姦悖君臣之義不知其徒自及也陳氏曰公如晉次于乾侯公在乾侯季孫意如㑹晉荀躒于適歷公薨于乾侯皆罪晉之辭也朴鄊吕氏曰齊大國也鄟陵之㑹四國同之伐季氏以納昭公何不可之有而所以不克納公者則以梁丘據之受賂也晉盟主也扈之㑹六國同之伐季氏以納公尤易為力而所以不克納者則以士鞅之取貨也自其為義之心不勝其貪利之心而後其為義者始不勇矣此齊晉納公之謀所以姑為之名而卒之悠緩不克歟三軍在途諸侯在㑹是區區者乃能劫而奪之衄而止之此亂臣賊子所以接跡于後世歟雖然抑不但以其貨利之行而已也觀晉侯欲以師納公而士鞅使人私于意如則其互為唇齒相為囊槖久矣當是時晉之六卿猶意如也晉君亦昭公也其肯并心一意以誅其臣而納其君哉宜晉侯之不得行其志也夏四月丁巳薛伯穀卒晉侯使荀躒唁公于乾侯夏四月季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討于意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人己所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復于寡君退而謂季孫君怒未怠子姑歸祭子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸高氏曰荀躒既㑹季孫子適歷復以晉侯之命唁公于乾侯必使荀躒然後意如之意得通乎君夫不恤見逐之君而信不臣者之言則晉侯之不明隂交其臣陽唁其君空言無實抑可知矣謝氏曰賊臣不討而荀躒㑹之危君不救而荀躒唁之何以撥魯國之亂而反之正哉大東萊吕氏曰齊侯唁公于野井晉侯使荀躒唁公于乾侯言大國盟主皆不能討亂無助順向正之意也愚謂國家之禍至此極而不可解矣君父之身至此危而不可救矣為之臣子者尚復何言哉蓋責之于內昭公既不能有所為責之于外齊晉又不能有所救則內外之望絶矣昭公之死將在旦夕子家之言豈不知以一乘從季孫之歸為不可亦不過欲昭公一見宗廟卒于正寢猶得謂之魯君而薨爾豈更望其有所為哉從者不從明年昭公遂死于乾侯同于逆旅然後知子家之言為不得已也秋葬薛獻公冬黑肱以濫來奔杜氏曰黑肱邾大夫不書邾史闕文許氏曰邾快黑肱相繼來奔季孫當國以類至也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞謝氏曰公旅寄乾侯久矣非有兵力可以得邑也所以取闞者魯人以闞與公而公取之也愚按昭公失國于今八年一民皆非其有矣以何兵力而取闞乎謝氏雖謂魯人以闞與公而公取之然昔也齊侯取鄆公即居于鄆今魯人以闞與公公何故不居于闞而猶在乾侯經年始死乎此疑季孫在國所取不然則外取內邑上有闕文耳夏吳伐越始用師于越也史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶高氏曰前此越與楚子伐吳故吳始用師于越家氏曰此著南蠻之迭為盛衰也吳方抗衡荆楚睥睨中夏而越己議其後矣自是吳楚越鼎立不相為下乃中國自治之時而齊晉二大國皆為強臣所操中國之患不在外域而在強臣矣秋七月冬仲孫何忌㑹晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周秋八月王使富辛與石張如晉請城成周天子曰天降禍于周俾我兄弟並有亂心以為伯父憂我一二親昵甥舅不皇啓處于今十年勤戍五年余一人無日忘之閔閔焉如農夫之望歲懼以待時伯父若肆大惠復二文之業弛周室之憂徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉今我欲徼福假靈于成王修成周之城俾戍人無勤諸侯用寧蝥賊逺屛晉之力也其委諸伯父使伯父實重圖之俾我一人無徵怨于百姓而伯父有榮施先王庸之范獻子謂魏獻子曰與其戍周不如城之天子實云雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對曰天子有命敢不奉承以奔告于諸侯遲速衰序于是焉在冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周魏子南面衛彪徯曰魏子必有大咎干位以令大事非其任也己丑士彌牟營成周計丈數揣高卑度厚薄仭溝洫物土方議逺邇量事期計徒庸慮財用輸餱糧以令役于諸侯屬役賦丈書以授帥而效諸劉子韓簡子臨之以為成命穀梁氏曰天子微諸侯不享覲天子之在者惟祭與號故諸侯之大夫相帥以城之此變之正也胡氏曰天子有道守在四夷今至于城王都可以不書乎大東萊吕氏曰周室雖微諸侯猶勤之若此先王之德澤猶有存焉者也高氏曰古人三月無君則弔公之出也今八年矣公為旅人而何忌不能從季孫逐君而何忌不能去雖受晉命城成周然不告于公而自往㑹之此實覩文知罪不待貶絶而自見也愚按敬王避子朝之黨居于成周今因其地而城之遂定都焉使成周為京師之舊則不假乎再城矣十有二月己未公薨于乾侯十二月公疾遍賜大夫大夫不受賜子家子雙琥一環一璧輕服受之大夫皆受其賜己未公薨子家子反賜于府人曰吾不敢逆君命也大夫皆反其賜趙簡子問于史墨曰季氏出其君而民服焉諸侯與之君死于外而莫之或罪也對曰物生有兩有三有五有陪二故天有三辰地有五行體有左右各有妃耦王有公諸侯有卿皆有二也天生季氏以二魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世修其勤民忘君矣雖死于外其誰矜之社稷無常奉君臣無常位自古以然故詩曰高岸為谷湥谷為陵三后之姓于今為庶主所知也在易卦雷乘乾曰大壯天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之既而有大功于魯受費以為上卿至于文子武子世增其業不廢舊績魯自文公薨而東門遂殺適立庶魯君于是乎失國政在季氏于此君也四公矣民不知君何以得國是以為君慎器與名不可以假人胡氏曰諸侯失國出奔者衆矣鄭伯突為祭仲所逐而出奔入于櫟而復國衛侯衎為孫寧所逐而出奔入于夷儀而復國昭公在外八年終以客死為天下笑何也祭仲雖專而世權不重于季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯自季友受費以為上卿至于意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也而昭公有一子家駒言不見聽計不行也不能復國宜矣故春秋詳録其所因為後世之戒公雖失國然每歲之首月必書公在乾侯誅意如也書齊侯取鄆公圍成鄆潰絶昭公也為人臣者觀每歲必書公所在必不敢萌跋扈不臣之心為人君者觀春秋所書圍成鄆潰知社稷之無常奉也亦必少警矣嗚呼可謂深切著明矣春秋闕疑卷三十九
