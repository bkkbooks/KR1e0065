body:
  text: 春秋闕疑卷二十五元鄭玉撰成公公名黒肱宣公之子定王十七年即位諡法安民立政曰成元年春王正月公即位二月辛酉葬我君宣公無氷泰山孫氏曰周之二月夏之十二月也謝氏曰月建丑而無氷冬傷温也胡氏曰寒極而無氷者常燠也按洪範𫝊曰豫恒燠若此政事舒緩紀綱廢弛之象成公幼弱政在三家公室不張其象己見故當涸隂沍寒而常燠應之二月作丘甲為齊難故謝氏曰作興建之名成公初易舊制使丘出甲故書曰作財用不足初税畝軍旅不足作丘甲書初書作皆以著其所起也杜氏曰周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乗戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重斂故書胡氏曰唐太宗問李靖楚廣與周制如何靖曰周制一乗步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乗耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣則未知所作者三甸而増一乗乎毎乗而增一甲乎魯至昭公時嘗蒐于紅革車千乗則計甸而増乗未可知也楚人二廣之法一乘至用百有五十人則魯毎乘而増一甲亦未可知也賦雖不同其實皆為益兵其數皆増三之一耳先儒或言甲非人人之所能為又以為丘出甸賦加四倍者誤矣陳氏曰大司馬之制上地家可三人中地二家五人下地家二人皆勝兵也必四丘之甸也而後備一卒出長轂一乘則是從征少而休多也作丘甲兵休少而從征多矣吕氏曰哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足君子為政民力屈則用竭則亦反其本而已矣宣公初税畝成公作丘甲當是之時事其君者皆不知反本之為務而以取救目前為急下至戰國皆用之而以反本之説為迂濶不切之論也而其國家亦從而顚覆矣有若之對哀公固世之急務而初税畝作丘甲則聖人所甚戒也夏臧孫許及晉侯盟于赤棘聞齊將出楚師盟于赤棘臧宣叔令脩賦繕完具守備曰齊楚結好我新與晉盟晉楚爭盟齊師必至晉人伐齊楚必救之是齊楚同我也知難而有備乃可以逞髙氏曰許曷為而及晉侯盟齊怨成矣晉援不可緩也何者宣公使公孫歸父如晉欲因晉以去三桓俄而公薨臧孫許於是為三桓逐歸父之族而歸父遂奔齊是齊怨之所以成也故汲汲焉求為此盟然而晉為霸主不治其罪乃遽自屈而與之盟故書臧孫許及晉侯以譏之秋王師敗績于茅戎文十七年秋周廿歜敗狄于邥垂乗其飲酒也至是春晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎三月癸未敗績于徐吾氏秋王人来告敗榖梁氏曰不言戰莫之敢敵也胡氏曰程子曰王師於諸侯不言敗諸侯不可敵王也於外域不言戰外域不能抗王也不可敵不能抗者理也其敵其抗王之失道也桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公徼戎伐之敗績於徐吾氏而經不書戰辨内外之分立中國之防也是皆聖人筆削非魯史舊文然筆于經者雖以尊君父懲僣亂為義而君父所以尊僣亂所以息則有道矣桓王不以討賊興師而急于伐鄭康公不以惇信持國而輕于徼戎是失其所以君天下禦四方之道也書敗績于茅戎言自敗也其自反亦至矣劉氏意林曰不言戰而言敗此王術也以謂天下莫之敢亢故不可言戰而有天下者一失其道則人能奪之故不耻言敗是以王者修已而不責於人髙氏曰一書王師敗績于茅戎而尊王之義與王自取之義及諸侯不勤王之義咸得而見矣冬十月二年春齊侯伐我北鄙齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及巢丘胡氏曰初魯事齊甚謹雖易世而聘㑹不絶也及與晉侯盟于斷道而後怨隙成再盟于赤棘而後伐吾北鄙齊侯之興是役非義矣魯人為鞌之戰豈義乎同曰憤兵務相報復不待貶而罪自見矣夏四月丙戌衞孫良夫帥師及齊師戰于新築衞師敗績衞侯使孫良夫石稷甯相向禽將侵齊與齊師遇石子欲還孫子曰不可以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也夏有石成子曰師敗矣子不少湏衆懼盡子䘮師徒何以復命皆不對又曰子國卿也隕子辱矣子以衆退我此乃止且告車来甚衆齊師乃止次于鞫居新築人仲孫于奚救孫桓子桓子是以免既衞人賞之以邑辭請曲縣繁纓以朝許之胡氏曰齊師侵虐而以衞主此戰何也衞侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣今又使孫良夫石稷將侵齊及與師遇石稷欲還良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故以衞主之也春秋善解紛貴逺怨而惡以兵刃相接故書法如此六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衞孫良夫曹公子首及齊侯戰于鞌齊師敗績孫桓子還于新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘獻子曰此城濮之賦也有先君之明與先大夫之肅故㨗克于先大夫無能為役請八百乗許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衞臧宣叔逆晉師且道之季文子帥師㑹之及衞地韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以狥告其僕曰吾以分謗也師從齊師于莘六月壬申師至于靡笄之下齊侯使請戰曰子以君師辱于敝邑不腆敝賦詰朝請見對曰晉與魯衞兄弟也来告曰大國朝夕釋憾于敝邑之地寡君不忍使羣臣請于大國無令輿師淹于君地能進不能退君無所辱命齊侯曰大夫之許寡人之願也若其不許亦將見也齊髙固入晉師桀石以投人禽之而乘其車繫桑本焉以狥齊壘曰欲勇者賈余餘勇癸酉師陳于鞌邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而後朝食不介馬而馳之郤克傷于矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼔進退從之此車一人殿之可以集事若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥夢子輿謂己曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中綦毋張䘮車從韓厥曰請寓乗從左右皆肘之使立于後韓厥俛定其右逢丑父與公易位將及華泉驂絓于木而止丑父寢于轏中蛇出于其下以肱擊之傷而匿之故不能推車而及韓厥執縶馬前再拜稽首奉觴加璧以進曰寡君使羣臣為魯衞請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隠且懼奔辟而忝兩君臣辱戎士敢告不敏攝官承乏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一于此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之胡氏曰大國三軍次國二軍魯雖大國而四卿並將是四軍也當此時舊制猶存尺地皆公室之土也一民皆公室之兵也上卿行父與僑如嬰齊各帥一軍㑹戰而臧孫許如晉乞師又逆晉師為之道本不將兵特往来晉魯兩軍之間預謀議耳成公初立主幼國危為季孫一怒掃境内興師而四卿並出肆其忿慾雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥略其副屬辭之體也四卿皆書豈特為詳内錄哉堅氷之戒亦明矣經之大例受伐者為主而以此四國及之者以一笑之微殘民毒衆幾獲其君而怒猶未怠故以四國主之為忿兵之大戒見諸行事深切著明矣秋七月齊侯使國佐如師己酉及國佐盟于袁婁晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命于諸侯而曰必質其母以為信其若王命何且是以不孝令也詩曰孝子不匱永錫爾類若以不孝令于諸侯其無乃非徳類也乎先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕四王之王也樹徳而濟同欲焉五霸之霸也勤而撫之以役王命今吾子求合諸侯以逞無疆之欲詩曰布政優優百祿是遒子實不優而棄百祿諸侯何害焉不然寡君之命使臣則有辭矣曰子以君師辱于敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子恵徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衞諫曰齊疾我矣其死亡者皆親暱也子若不許讐我必甚唯子則又何求子得其國寳我亦得地而紓于難其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿以為魯衞請茍有以藉口而復于寡君君之恵也敢不唯命是聽禽鄭自師逆公秋七月晉師及齊國佐盟于袁婁使齊人歸我汶陽之田公㑹晉師于上鄍賜三帥先路三命之服司馬司空輿師侯正亞旅皆受一命之服晉師歸范文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉晉侯使鞏朔獻齊㨗于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻㨗王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略王命伐之告事而己不獻其功所以敬親暱禁淫慝也今叔父克遂有功于齊而不使命卿鎮撫王室所使来撫余一人而鞏伯實来未有職司于王室又奸先王之禮余雖欲于鞏伯其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也寧不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對王使委于三吏禮之如侯伯克敵使大夫告慶之禮降于卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍三年十二月甲戌晉作六軍韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞌之功也齊侯朝于晉將授玉郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也胡氏曰齊國佐如師與楚屈完来一也然陘之役則曰来盟于師盟于召陵鞌之戰則曰及國佐盟于袁婁何也荆楚横暴憑陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人帖服其書来盟于師者楚人自服而求盟也盟于召陵者桓公退舍禮與之盟也在春秋時斯為善矣若夫袁婁則異于是齊雖侵虐未若荆楚之暴也諸國大夫含忿積怒至于殺人盈野非有擊强扶弱之心國佐如師特以賂免非服之也晉大夫又不以徳命使齊人盡東其畝而以齊君之母為質則亦悖矣由是國子不可請合餘燼背城借一揖而去之郤克借魯衛之使以其詞為之請逮乎袁婁而與之盟則汲汲欲盟者晉也故反以晉人及之若此類見曲直之繩墨矣是故制敵莫如仗義天下莫大于理而強有力不與焉陳氏曰齊桓合九國之師以臨楚屈完来盟于師桓不欲以臨楚盟屈完也退而盟召陵齊侯使國佐如師進師于袁婁而後盟國佐且夫屈完不言使而國佐言使屈完不言使而退盟之于召陵以禮于楚子國佐言使而進盟之于袁婁以偪齊君桓公之所不敢而四國之臣敢為之甚矣鞌戰之忿也愚按齊侯竭一國之衆而卒取鞌之敗國佐以一言之善而退四國之師盖得受命不受辭之義故能以一言而使四國之大夫汲汲與之盟也惜其如師為齊行賂而非義服故不得如屈完之見羙于春秋然自春秋中年以来吐情實以紓國難如宋華元仗大義以懾強禦如齊國佐亦可謂臨事善變不失其幾能利社稷者矣八月壬午宋公鮑卒庚寅衛侯速卒晉三子自役弔焉哭于大門之外衞人逆之婦人哭于門内送亦如之遂常以葬取汶陽田公羊曰汶陽田者何鞌之賂也胡氏曰汶陽之田本魯田也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請于天王以正疆理則取之不以其道與得非其有奚異乎髙氏曰春秋之義以治易亂不以亂易亂所正者本而已凡取人之有其惡易見而取已之舊不以其道者其惡難知聖人所書亦正名曰取所以顯微也樸鄉吕氏曰歸者其意也取者我也非其志也于後齊復事晉故八年使韓穿来言歸之于齊然此年齊歸我田書曰取八年齊取我田乃曰歸者取之自晉歸之自晉以見魯國之命制于晉而已故雖我田也而不得偃然有之其猶寄爾故齊歸我田書曰取猶若取之于外也齊取我田書曰歸猶若齊之所有也冬楚師鄭師侵衛胡氏曰魯衛受盟于晉從于伐齊故楚為陽橋之役令尹子重曰師衆而後可于是王卒盡行二國稱師著其衆也髙氏曰鄭伯背中國之盟反從楚人以入中國而首伐衛䘮是授戈與冦而攻其親戚也罪不勝誅矣春秋並楚稱師而列鄭于下所以深罪之也董仲舒曰伐䘮無義叛盟無信無義無信故惡之十有一月公㑹楚公子嬰齊于蜀胡氏曰侵衛則書侵我師于蜀致賂納質没而不書非諱也書其重者則莫重乎其以中國諸侯降班失列下與荆蠻之大夫㑹也季孫行父為國上卿當使其君尊榮其民免于侵陵之患而危辱至此特起于忿忮肆其褊心而不知制之以禮也髙郵孫氏曰春秋之義公及大夫則没大夫而稱人不與大夫而敵公也公之罪則書公書大夫之名言公之為彼敵者有以取之也嬰齊荆楚之大夫而公親與之㑹盖公將去中國而從荆蠻也書公㑹楚公子嬰齊罪公也家氏曰晉以魯衛之故大舉伐齊以治其憑陵之罪晉可謂有徳于魯轍未及息遽為此行成公幼無所知凡皆季氏所為耳書公㑹楚公子嬰齊著其棄晉即楚以望國之君而屈于楚之公子也衛猶以被兵而服魯直為虚聲所脅是故春秋責之深不復為之諱髙氏曰公子嬰齊荆蠻之種類僣稱王子者也至是楚已強盛交政中國聖人從列國之例稱公子陳氏曰自屈完以来楚大夫皆無氏族也而書公子自嬰齊始丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀宣公使求好于楚莊王卒宣公薨不克作好公即位受盟于晉㑹晉伐齊衛人不行使于楚而亦受盟于晉從于伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寧夫文王猶用衆况吾儕乎且先君莊王屬之曰無徳以及逺方莫如恵恤其民而善用之乃大户已責逮鰥救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右二君弱皆強冠之冬楚師侵衛遂侵我師于蜀使臧孫往曰楚逺而乆固將退矣無功而受名臣不敢楚侵及陽橋孟孫請往賂之以執斵執鍼織絍皆百人公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀于是乎畏晉而竊與楚盟楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴以棄魯國國將如之何誰居後之人必有任是夫國棄矣是行也晉辟楚畏其衆也程子曰楚為强盛陵轢中國諸侯茍能保固疆圉要結鄰好豈有不能自存之理乃懼而服從與之盟約故皆稱人責諸侯則魯可知也胡氏曰盟而魯與必先書公尊内也次書主盟者衆所推也此書公及楚人則知主盟者楚也經于魯君盟㑹不信則諱公而不書不臣則諱公而不書棄中國從僣亂則諱公而不書蜀之盟棄晉從楚書公不諱何也事同而既貶則從同同正始之義也從荆楚而與盟既諱公于僖十九年齊之盟矣是以于此不諱而人諸國之卿以見意謝氏曰蜀魯地盟在魯地雖外為主亦書及賓主之辭也家氏曰前此晉敗于邲楚莊猶不得以號召諸侯今晉勝于鞌楚共乃能㑹十一國之君大夫而為蜀之盟何也夷狄之憑陵中國未有無釁而動者也晉以郤克季孫之怒大舉伐齊敗之鞌盟之袁婁少伸前日屈辱之憾而齊頃遂與楚合導之以為此来晉欲禦楚懼齊人之議其後欲更伐齊懼楚人之乗其間坐是莫如之何楚既入中原侵衛脅魯大㑹諸侯莫敢不至是以為此盟正由得齊故也春秋此㑹責魯罪齊徧責中國之諸侯為其甘從僣亂而不以為悔也故魯與于夷㑹而不為之諱責之深矣齊霸國也毎序亞晉今降于衞鄭之下罪之深矣髙氏曰蔡許不列者先己屬楚失位不君又不可人之于大夫之間故没而不書也蘇氏曰楚自城濮之敗不競于晉莊王雖入陳圍鄭及宋而未嘗合諸侯及蜀之盟諸侯從之者十一國晉不敢爭然諸侯猶畏晉而竊與之盟耳其後四十三年晉趙武楚屈建合諸侯于宋然後晉楚之從得交相見又八年楚靈王求諸侯于晉晉人許之然後諸侯始得從楚皆蜀之盟啔之也三年春王正月公㑹晉侯宋公衞侯曹伯伐鄭諸侯伐鄭次于伯牛討邲之敗也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戌如楚獻㨗髙氏曰宋魯曹衞雖盟于蜀猶不敢背晉故罷盟而遂㑹晉伐鄭以鄭罪為當討故春秋正諸國之爵以示義謝氏曰蜀盟之後晉侯伐鄭而四國復從則晉力之猶足以合諸侯而用之也景公能明信義以懐服邦國則楚安有今日之暴哉蜀盟之後繼書晉侯伐鄭與之也先君未葬而宋共衞定以成君㑹伐書爵著其惡也家氏曰三國之大夫方盟楚于蜀而其君乃㑹晉伐鄭盟楚伐鄭事之不得兼者春秋不以為貶何哉存晉霸也春秋為盟國主不為楚人謀也楚横行中原脅從諸夏秦齊宋魯皆與盟盛矣而非春秋之所與晉㑹諸侯三國僅從弱矣而春秋嘉之為中國喜也伐鄭所以攘楚攘楚所以尊中國魯宋衞去强盛之楚而從衰弱之晉以伐有罪之國是春秋所以嘉也觀前之㑹十有一國之君大夫皆與一以人書此四國僅從而書爵見春秋之權衡矣辛亥葬衞穆公二月公至自伐鄭甲子新宫災三日哭常山劉氏曰春秋宗廟之事得禮不書凡書著其失也廟災而哭于禮合矣此何以書廟災所以哭者為神靈之所止而遭變焉斯人情之所宜哀也新宫者宣公也不曰宣宫者神主未遷也知然者丹楹刻桷皆稱桓宫此不舉諡故知其未遷也宫成而主未入遇災而哭何禮哉宣公薨至是二十八月緩于遷主可知矣言災而不恭之意亦自見矣謝氏曰書新宫災著其不敬也書三日而哭著其非禮也成公之不得于親宣公之不祐于天其義皆見于此矣乙亥葬宋文公始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂舉于是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑死又益其侈是棄君于惡也何臣之為胡氏曰考于經未有以驗其厚也數其葬之月則信然矣天子七月諸侯五月大夫三月士踰月以降殺遲速為禮之節不可亂也文公之卒國家安靖外無危難曷為越禮踰時逮乎七月而後克襄事哉故知華元樂舉之棄君于惡而益其侈無疑矣夫禮之厚薄稱人情而為之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚葬其君親此非有所不忍于死者特欲誇耀無知之人耳世衰道微禮法既壊無以制其侈心至于秦漢之間窮竭民力以事丘壠其禍有不可勝言者春秋據事直書其失自見豈不為永戒哉夏公如晉拜汶陽之田髙氏曰著魯受田之重如此而晉輕奪之有以知晉之無以令天下亦見魯之土地不能自保也鄭公子去疾帥師伐許許恃楚而不事鄭鄭子良伐許陳氏曰鄭初書大夫將也髙氏曰鄭自荀林父敗績之後不復與諸夏通然許亦事楚耳而鄭反伐之者以其恃楚而弗附已也張氏曰晉方怒鄭之不服其為國未有底止也乃怒許之不事已而使大夫動大衆以伐之特書大夫専伐之罪所以見其興兵之不度徳量力也公至自晉胡氏曰宣公薨至是三年之䘮畢矣宜入朝京師見天子受王命然後歸而即政可也不朝于周以拜汶陽田之故而往朝于晉其行事悖矣此春秋所為作也秋叔孫僑如帥師圍棘取汶陽之田棘不服故圍之胡氏曰復故地而民不聽至于命上將用大師環其邑而攻之何也魯于是時初税畝作丘甲税役日益重矣棘雖復歸故國所以不願為之民也歟成公不知薄税歛輕役力修徳政以来之而肆其兵力雖得之亦必失之矣大雩晉郤克衞孫良夫伐廧咎如討赤狄之餘焉廧咎如潰家氏曰克與良夫得志于鞌不知自戢更為此舉春秋書之誅善戰也楚方躏藉中原晉人不務修明霸業圖其逺者大者既滅赤狄又伐留吁以為未快復興此役春秋惡之屢書皆所以貶冬十有一月晉侯使荀庚來聘衞侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟十一月晉侯使荀庚來聘且尋盟衞侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之于晉也其位在三孫子之于衞也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衞在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衞陳氏曰聘而遂盟之于是始謝氏曰公如晉故荀庚来聘公為衞伐鄭故孫良夫来聘聘而後盟我及之盟也故二盟皆書及魯與二卿各為盟故盟不同日盟在國則公為主可知故不書公家氏曰先書晉侯使荀庚来聘衞侯使孫良夫来聘其聘皆君命也繼書丙午及荀庚盟丁未及孫良夫盟其盟者魯人求與之為盟也高氏曰二國既以禮来聘宜相親信乃反疑忌至于歃血盟誓此非講信修睦之道劉氏意林曰荀庚良夫不務引其君當道而生事専命為非禮不信以干先王之典非人臣之操也樸鄉吕氏曰明魯不當要盟諸大夫不當自盟也何以知之桓十四年鄭伯使弟語来盟宣七年衞侯使孫良夫来盟則是来盟者其君使之也今但曰使来聘則是其君之所使者来聘而已非来盟也魯之為要盟可知矣鄭伐許程子曰鄭附楚于一年而再伐許故夷之胡氏曰稱國以伐外之也晉楚爭鄭鄭兩事焉及邲之役于是乎専意事楚不通中華晉雖加兵終莫之聽至此一嵗而再伐許甚矣利在中國則從中國利在荆蠻則從荆蠻而不擇于義之可否以為去就其不同于異類者幾希春秋之法知利而不知義者則外之所以懲惡也以為告辭略而從告乃實録耳一字為褒貶義安在也家氏曰鄭襄怙楚人為己之覆以兵加許嵗至于再是必欲覆其宗社而後己許卒為鄭所併襄實啟之春秋狄鄭良以是故陳氏曰外秦而後外鄭微秦鄭中國無大亂矣四年春宋公使華元来聘通嗣君也三月壬申鄭伯堅卒杞伯来朝歸叔姬故也夏四月甲寅臧孫許卒公如晉晉侯見公不敬季文子曰晉侯必不免謝氏曰公此年如晉以㑹楚嬰齊及楚人盟于蜀故也人君所舉不可不謹葬鄭襄公秋公至自晉公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇于我諸侯聽焉未可以貳史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止家氏曰魯成始與晉人連兵伐齊以有鞌之勝謂當與晉為睦曽未幾日率先諸侯受盟于楚猶幸晉人之無討也去年如晉今年又如晉正所以救目前之過一不為所禮又將叛而即楚不能自治其國使在我者隠然可恃故楚之強足以動之晉之慢足以移之春秋于公從楚適晉備書而無所諱貶也冬城鄆家氏曰此為齊備春秋譏魯人不務安静而輕于用民力鄆雖城何益哉鄭伯伐許冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉欒書將中軍荀首佐之士燮佐上軍以救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉皇戌攝鄭伯之辭子反不能決也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成髙氏曰鄭伯䘮未踰年而興師伐許春秋以其薄恩于父失其子心有速成君之意故不復稱子如其意稱伯胡氏曰前此鄭襄公伐許既外之矣今悼公又伐許乃復稱爵何也䘮未踰年稱爵所以著其惡也薛氏曰去嵗比鄭于楚今嵗新䘮稱爵為亂甚于楚也五年春王正月杞叔姬来歸穀梁氏曰婦人之義嫁曰歸反曰来歸胡氏曰前書杞伯来朝左氏以為歸叔姬也此書杞叔姬来歸則出矣家氏曰春秋之世倫分廢缺夫婦之道乖矣然亦有歸而未絶者見之經𫝊可考也聖人立教有以出而允于義者有以出而悖于禮者未嘗不開其改過遷善之門夫豈以遂非而不復者為是乎杞伯来朝之明年而後叔姬乃歸此與他悖義之出不可同日語矣必叔姬自不安于杞或以疾而求歸非杞絶之也故其卒杞復逆䘮以葬見同穴之義有以知其非悖義之絶故其歸也卒也猶繫之杞至其逆䘮又許之以逆而無貶辭愚按叔姬之歸非絶于杞家氏説是矣然婦人既嫁非歸寧父母無歸道今叔姬非歸寧而歸魯則歸不以道矣以杞夫人而死于魯則死非其所矣此春秋所以以為非常事而書之也歟仲孫蔑如宋報華元也夏叔孫僑如㑹晉荀首于榖晉荀首如齊逆女故宣伯餫諸穀愚按穀齊地他國之大夫非過吾境而使大夫野饋以㑹之非禮也若僑如自以私情出境而㑹他國之大夫則尤専恣之甚者也故春秋謹而書之梁山崩梁山崩晉侯以𫝊召伯宗伯宗辟重曰辟𫝊重人曰待我不如㨗之速也問其所曰綘人也問綘事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之公羊氏曰外異不書此何以書為天下記異也髙郵孫氏曰春秋災異及于天下者不以國書許氏曰山崩之歳定王崩周室日微又二年吴兵始犯中國卒與晉爭盟于黄池王霸道盡家氏曰周自東遷頼二霸以存齊既衰獨有晉在而比歳以来君庸臣貪坐隳霸業晉之削中國之憂也意舊史必書晉梁山崩春秋削之惟書梁山崩實為天下記異也胡氏曰絳人之語于禮文備矣而未及其實也夫降服乗縵徹樂出次祝幣史辭六者禮之文也古之遭變而外為此文者必有恐懼修省之心主于内若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至于崩竭當時諸侯未聞有戒心而修徳也故自是而後六十年間弑君十有四亡國三十有二其應亦憯矣春秋不明著其事應而事應且存其可忽諸秋大水冬十有一月己酉天王崩十有二月己丑公㑹晉侯齊侯宋公衞侯鄭伯曹伯邾子杞伯同盟于蟲牢許靈公愬鄭伯于楚六月鄭悼公如楚訟不勝楚子執皇戌及子國故鄭伯歸使公子偃請成于晉秋八月鄭伯及晉趙同盟于垂棘冬同盟于蟲牢鄭服也宋公子圍龜為質于楚而歸華元享之請鼔譟以出鼓譟以復入日習攻華氏宋公殺之諸侯謀復㑹宋公使向為人辭以子靈之難程子曰天王崩而㑹盟不廢書同見其皆不臣家氏曰于幽之盟喜其同也新城斷道而書同幸其猶同乎中國也至是書同則例之變也天王崩告命已行于天下而諸侯不戚不奔相與為此盟無王之罪大矣春秋于王崩之後繼書同盟貶也六年春王正月公至自㑹鄭伯如晉拜成二月辛巳立武宫季文子以鞌之功立武宫公羊氏曰武宫者武公之宫也立者不宜立也髙氏曰武公伯禽之𤣥孫獻公之子胡氏曰䘮事即逺有進而無退宫廟即逺有毁而無立故二昭二穆與太祖之廟而五者諸侯之廟制也武公至是歴十一世其毁已乆而輙立焉非即逺有終之意劉氏意林曰魯諸侯也僭天子之禮雖欲尊其祖鬼神不享也而學者習于魯之故明堂位更侈大而稱之曰魯公之廟文世室武公之廟武世室人之迷固乆矣夫其以僭為典此春秋所為作取鄟胡氏曰鄟微國也書取者滅之也滅而書取為君隠也項亦國也其書滅者以僖公在㑹季孫所為故直書其事而不隠此春秋尊君抑臣以辨上下謹于微之意也人倫之際差之毫釐謬以千里故仲尼特立此義以示後世臣子使以道事君而無朋附權臣之惡衞孫良夫帥師侵宋三月晉伯宗夏陽說衞孫良夫甯相鄭人伊雒之戎陸渾蠻氏侵宋以其辭㑹也師于鍼衞人不保説欲襲衞曰雖不可入多俘而歸有罪不及死伯宗曰不可衞唯信晉故師在其郊而不設備若襲之是棄信也雖多衞俘而晉無信何以求諸侯乃止師還衞人登陴愚按𫝊稱晉衞鄭人與伊雒陸渾之戎侵宋而經獨書衞孫良夫者豈此舉衞志也歟杜氏謂經唯書衞獨衞告未知是否夏六月邾子来朝公孫嬰齊如晉子叔聲伯如晉命伐宋壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋晉命也胡氏曰魯遣二卿為主將動大衆有事于宋而以侵書者潛師侵掠無名之意盖陋之也于衞孫良夫亦然上三年嘗㑹宋衞同伐鄭矣次年宋使華元来聘通嗣君矣又次年魯使仲孫蔑報華元矣是年冬鄭伯背楚求成于晉而魯衞與宋又同盟于蟲牢矣今而有事于宋上卿授鉞大衆就行而師出無名可乎故特書侵以罪之後二年宋来納幣請伯姬焉則此師為晉而舉非魯志明矣兵戎有國之重事邦交人道之大倫聽命于人不得已焉將能立乎春秋所以罪之也楚公子嬰齊帥師伐鄭鄭從晉故也陳氏曰楚初書大夫將也自是必圍滅也而後貶人之胡氏曰荆楚僭號稱王聖人比諸叛亂而不赦者大一統以存周使明著于君臣之義也鄭能棄逆効順是遷善改過出幽谷而遷喬木也嬰齊為是帥師因其䘮而伐之不義甚矣經所以深惡之也書卿帥師伐鄭于文無貶辭何以知其深惡楚也下書欒武子帥師救鄭則知之矣凡書救者未有不善之也而伐者之罪著矣冬季孫行父如晉晉人謀去故絳諸大夫皆曰必居郇瑕氏之地沃饒而近盬國利君樂不可失也韓獻子將新中軍且為僕大夫公揖而入獻子從公立于寢庭謂獻子曰何如對曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁則墊隘于是乎有沉溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡且民從教十世之利也夫山澤林盬國之寳也國饒則民驕逸近寳公室乃貧不可謂樂公説從之夏四月丁丑晉遷于新田冬季文子如晉賀遷也許氏曰仲孫蔑叔孫僑如公孫嬰齊季孫行父有如必書相望于春秋大夫張也晉欒書帥師救鄭與楚師遇于繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請于武子武子將許之知莊子范文子韓獻子諌曰不可吾来救鄭楚師去我吾遂至于此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也乃遂還于是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆子為大政將酌于民者也子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎胡氏曰晉楚遇于桑隧軍帥之欲戰者八人武子遂還則無功也亦何善之有曰此欒書之所為善也兩軍相加兵刃既接折馘執俘計功受賞非仁人之心王者之事故次于陘而屈完服者齊桓也㑹于蕭魚而鄭不叛者晉悼也武子之能不遷戮而知還亦庶幾哉愚按晉人救鄭與楚遇于繞角楚師已還則鄭無事于救矣晉又從而侵蔡是遷怒耳遇楚救而不戰善改過也故春秋書救鄭無貶辭春秋闕疑卷二十五
