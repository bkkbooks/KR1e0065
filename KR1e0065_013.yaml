body:
  text: 春秋闕疑卷十三元鄭玉撰僖公公名申莊公之子閔公庶兄惠王十八年即位諡法小心畏忌曰僖元年春王正月齊師宋師曹伯次于聶北救邢諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉曹伯公穀作曹師以下文城邢書曹師則此當從公穀公羊氏曰救不言次此其言次何不及事也程子曰齊未嘗興大衆此稱師責其衆可救而徒次以為聲援致邢之不保其國也胡氏曰春秋大義伐而書次其次為善遂伐楚次于陘美之也救之書次其次為貶救邢次于聶北譏之也聖人之情見矣故救患分災於禮為急而好攻戰樂殺人者于罪為大夏六月邢遷于夷儀齊師宋師曹師城邢邢遷于夷儀諸侯城之救患也公羊氏曰遷者何其意也胡氏曰書邢遷于夷儀見齊師次止緩不及事邢以自遷為文而再書齊師宋師曹師城邢者美桓公志義卒有救患之功也謝氏曰與其次而後救不若不次之為善也與其遷而後城不若不遷之為善也力足以討暴折難而遷延後時故聶北之師書救書城以著其善書次書遷以著其惡髙氏曰始不能救邢過也卒能城邢功也聖人不以功掩過亦不以過掩功功過不相掩是之謂王法秋七月戊辰夫人姜氏薨于夷齊人以歸閔二年哀姜孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之公羊氏曰桓公召而縊殺之穀梁氏曰夫人薨不地地故也愚謂哀姜與聞弒君罪在不赦齊人明其罪而誅之義也召而縊之豈所謂義乎古者刑人於市與衆棄之弒君之賊殺而歸之豈所謂刑乎故經書夫人薨以明其不能討夫人之為賊書齊人以歸以明其不能絶夫人之為親其曰薨于夷則夫人之不以善終亦明矣所以使魯人卒請哀姜之喪葬以小君之禮者皆齊侯不明乎義而用刑之失也然魯自桓公之弒文姜得以幸免濁亂魯國三四十年遂成再弒之禍至此齊桓能舉方伯之職慶父哀姜皆以死誅不赦然後三綱稍明人倫粗正則於世道亦不為無功矣按以歸者歸于齊也或謂歸魯非也觀後書夫人之喪不曰至自夷而曰至自齊則知此為歸齊明矣楚人伐鄭鄭即齊故也家氏曰荆革號為楚有自來矣及是始聞于中國舊史書之聖人因而存之著楚人漸盛為中國憂也常山劉氏曰楚自此浸强矣故稱人焉然終齊桓之世只稱人而不得與中國之㑹盟者為齊桓能制其强也至十七年齊桓卒楚于是乎始橫十九年則已盟于齊矣書曰冬㑹陳人蔡人楚人鄭人盟于齊二十一年春宋人齊人楚人盟于鹿上用此見中國衰微楚人方張耳至于秋之㑹則書宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋楚于是大張位列于陳蔡之上而書爵矣胡氏曰來聘書人伐鄭復以號舉至是又伐鄭亦書人者豈許其伐國而人之乎㑹中華執盟主朝諸侯長齊晉其所由來者漸矣八月公㑹齊侯宋公鄭伯曹伯邾人于柳盟于犖謀救鄭也張氏曰楚人伐鄭桓公不遽救而㑹諸侯謀之蓋楚方强而公謀制楚十全之策也家氏曰經言其㑹傳言其盟蓋其㑹也謀所以救鄭其盟也與諸侯定要束將伐楚以問憑陵之罪召陵之師權輿于此矣九月公敗邾師于偃虛丘之戍將歸者也胡氏曰柳人之㑹謀救鄭而公與邾人咸與焉則是志同而謀協也今既㑹邾于柳又敗邾師于偃于此責公無攘冦難安中國之誠矣凡此皆直書其事而義自見也詐戰曰敗敗之者為主張氏曰書敗邾于㑹柳之後非特者魯僖無保邦之道亦見桓公伯威之不立也冬十月壬午公子友帥師敗莒師于酈獲莒拏莒人來求賂公子友敗諸酈獲莒子之弟拏公賜季友汶陽之田及費謝氏曰列國大夫皆王臣也以戰為事而獲人之卿公子友之罪也度德量力用師之道也不義不智而身獲于人莒拏之罪也酈之敗曲在莒已明故不書伐胡氏曰罪在莒而以季友主此戰何也抑鋒止鋭喻以詞命使知不縮而引去則善矣今至于兵刃既接又用詐謀擒其主將此强國之事非王者之師春秋之志故以季友為主而書敗獲責僃之也十有二月丁巳夫人氏之喪至自齊髙氏曰秋七月齊人殺哀姜而以之歸今厯二時魯不迎其喪者以夫人與弒閔公義欲絶之故也僖公新立外欲固齊以居厚內存母子不絶之義故請而葬焉此所以喪至自齊也劉氏意林曰哀姜安可復配宗廟復臨羣臣齊以公義誅之魯以私意請之是魯之不忍也而不可通於春秋愚按夫人之喪至自齊去姜而書氏說者以文姜弒夫哀姜弒子罪固有輕重也信如此言是天下有可弒之君而弒君有輕重之刑也蓋哀姜之喪至自齊去姜所以明齊既殺之則義已絶存氏所以使若不知其為誰氏之女起問者以發其疑而知其為弒君之賊也此春秋之微意非聖人孰能修之二年春王正月城楚丘諸侯城楚丘而封衛焉胡安定先生曰按閔二年狄入衛衛國君死民散齊侯視之不救至此年方始城之怠于救患可知與其亡而存之不若未亡而救之之善也張氏曰此書城楚丘蓋分板築之役于諸侯而魯往城之也家氏曰公羊氏曰城衛也曷為不言城衛滅也孰滅之狄滅之曷為不言狄滅之為桓公諱也曷為為桓公諱上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公之耻也然則孰城之桓公城之曷為不書桓公城之不與諸侯專封也公羊于城邢城楚丘皆曰天下諸侯有相滅亡者而桓不能救乃桓之耻其責望伯主之意甚大得春秋之意但以城邢城衛為專封則愚之所未喻夫邢衛皆周家之建國今為狄所滅而周之封爵則自若夷儀楚丘乃邢衛故土齊桓城而遷之此乃方伯職分之所當舉奚專封之有哉城楚丘不曰衛楚丘衛未遷也邢遷而城衛城而遷故書法不同大東萊吕氏曰先儒以為諸侯之義不得專封夫所謂專封者以此地封此人則謂之專封固不可也如同時諸侯有相滅亡天子不能令方伯不能救天下諸侯力能救而復之則是蹈仁而踐義也而以是為專封是嫂溺援之以手而以為罪也愚按齊桓公城夷儀以安邢城楚丘以遷衛皆全之于傾危奔潰之餘不失興滅繼絶之義非有專封無王之事也以經考之既無封衛之迹以詩木瓜考之亦不過言其欲報之厚而未嘗有封之之語先儒特因詩之小序有齊桓救而封之之說遂起專封之論今只當以經為正論其城築之是非不當經外立意言其專封之有罪也夏五月辛巳葬我小君哀姜愚按魯人請之齊人歸之至是葬之聖人亦書曰葬我小君哀姜而已蓋孫邾薨夷夫人之罪已著至是典禮已定復何譏焉書其實而已矣虞師晉師滅下陽晉荀息請以屈産之乘與垂棘之璧假道于虞以伐虢公曰是吾寶也對曰若得道于虞猶外府也公曰宫之竒存焉對曰宫之竒之為人也懦而不能强諫且少長于君君昵之雖諫將不聽乃使荀息假道于虞曰冀為不道入自顛軨伐鄍三門冀之既病則亦唯君故今虢為不道保于逆旅以侵敝邑之南鄙敢請假道以請罪于虢虞公許之且請先伐虢宫之竒諫不聽遂起師夏晉里克荀息帥師㑹虞師伐虢滅下陽虢公敗戎于桑田晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒而益其疾也必易晉師而不撫其民矣不可以五稔公羊氏曰虞微國也曷為序乎大國之上使虞首惡也穀梁氏曰非國而曰滅重下陽也胡氏曰案孟子晉人以垂棘之璧屈産之乘假道于虞以伐虢宫之竒諫百里奚不諫然則晉人造意以虞首惡何也貪得重賂遂其强暴滅兄弟之國以及其身而亡其社稷所以為首乎春秋聖人律令也觀此義可以見法矣國而曰滅下陽邑爾其書滅何也下陽虞虢之塞邑猶秦有潼關蜀有劍嶺皆國之門户也潼劍不守則秦蜀破下陽既舉而虞虢亡矣許氏曰書鄭伯突入于櫟不書入鄭書虞師晉師滅下陽不書滅虢觀物有要矣秋九月齊侯宋公江人黃人盟于貫服江黃也穀梁氏曰江人黃人逺國之詞也張氏曰惟宋與盟不煩諸侯也胡氏曰荆楚天下莫强焉江黃者其東方之與國也二國來定盟則楚人失其右臂桓公服荆楚之慮周矣其同惡相恤以從簡書之義著矣師氏曰齊宋國之至大而近者江黃國之至小而逺者皆能合而與之盟足以明天下之諸侯無一不尊盟主矣冬十月不雨穀梁氏曰不雨者勤雨也師氏曰十月不雨未甚為災而書之者于以見人君謹天時以重其事髙郵孫氏曰一時不雨則憂其災及于物春秋據舊史書之以見其有志于民也楚人侵鄭鬬章囚鄭聃伯髙氏曰貫澤之㑹江黃皆至則齊已强而楚人失援矣此書侵鄭楚之懼也懼而侵鄭者何楚失江黃矣能爭鄭猶可抗齊也唯不得鄭是以服齊也家氏曰周自東遷至今歷四王外冦內侵莫之能禦齊桓奉王命伸伯討孳孳以伐楚為務可謂天下之所難謹之又謹必萬全而後動此伯業所以為獨優也明年楚人伐鄭齊乃出師春秋不以緩救為譏矜其難也三年春王正月不雨夏四月不雨胡氏曰穀梁氏曰不雨者勤雨也每時而一書閔雨也閔雨者有志乎民者也厯時而總書不憂雨也不憂雨者無志乎民者也按詩稱僖公儉以足用寬以愛民務農重穀則誠賢君也其有志乎民審矣故冬不雨而書春不雨而書夏不雨而書以著其勤也文公以練祭則緩于作主以宗廟則太室屋壞以賦政則四不視朔以邦交則三不㑹盟其無志乎民亦審矣故自十二月不雨至于秋七月而書以著其慢也徐人取舒趙氏曰得國不書滅者不絶其祀也髙郵孫氏曰舒者楚附庸之國服屬于楚徐人取之使服屬于徐也家氏曰荆與舒比而為中國患其來久矣徐人伐舒為中國撓楚也十五年楚伐徐齊桓帥諸侯之師救之以是知徐人蓋受命于齊齊之制楚其用力難矣其為謀審矣算無遺策而後動髙氏曰徐人欲與中國之盟故取舒以自效厥後齊桓為牡丘之㑹蓋為是也六月雨穀梁氏曰雨云者喜雨也喜雨者有志乎民者也胡氏曰閔雨與民同其憂喜雨與民同其樂此君國子民之道也觀此義則知春秋懼天災恤民隱之意矣劉氏意林曰不獨書六月雨而已又先書四月不雨所以見有志乎民汲汲之甚也有志乎民汲汲之甚未足為聖人之法也然而春秋取之者凡南面而治有國家天下者患不與民同憂茍不與民同憂則亦不與民同樂矣唯有道者不然己未嘗有憂也民之所憂不可不憂己未嘗有樂也民之所樂不可不樂若是者所謂無常心而以百姓之心為心是故與民同憂者王事之始也與民同樂者王事之成也此春秋所為貴非得雨之謂其義則近矣秋齊侯宋公江人黃人㑹于陽穀謀伐楚也張氏曰去年盟以定其交矣今歲再㑹申伐楚之約也胡氏曰或曰侵蔡次陘之師諸侯皆在江黃獨不與焉則安知其為謀伐楚乎曰兵有聚而為正亦有分而為竒諸侯之師同次于陘所謂聚而為正也江人黃人各守其地所謂分而為竒也次陘大衆厚集其陳聲罪致討以震中國之威江人黃人各守其境按兵不動以為八國之援此克敵制勝之謀也退于召陵而盟禮定循海以歸而濤塗執然後及江人黃人伐陳則知侵蔡次陘而二國不㑹自為掎角之𫝑明矣此大㑹而末言者善是謀也冬公子友如齊涖盟齊侯為陽穀之㑹來尋盟冬公子友如齊涖盟謝氏曰齊將伐楚故季友適齊涖盟涖盟者我往受盟于彼也來盟者彼來受盟于我也盟在彼而我往受之故書涖楚人伐鄭楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄德不祥髙氏曰楚恃其強連三歲加兵于鄭欲與中國抗衡則中國之衰可知已齊桓豈可已乎于是明年諸侯大舉伐楚也四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘三年齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之至是齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之涉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯女實征之以夾輔周室賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢包茅不入王祭不共無以縮酒寡人是徵昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濵師進次于陘公羊氏曰潰者下叛上也穀梁氏曰遂繼事也臨江劉氏曰次于陘止師以修文告之命也泰山孫氏曰桓之病楚也久矣故元年㑹于柳二年盟于貫三年㑹于陽穀以謀之是時楚方强盛勢陵中國不可易也蔡楚與國故先侵蔡俟其兵震威行然後大舉蔡既潰遂進師次于敵境按元年桓公救邢城邢皆書某師某師此合魯衛陳鄭七國之君侵蔡遂伐楚書爵者以其能服强楚尊王室救中國之功始著也陳氏曰桓公始有志于夷夏之分于是伐楚而以侵蔡召諸侯書曰遂伐楚言志不在蔡也胡氏曰潛師掠境曰侵侵蔡者竒也聲罪致討曰伐伐楚者正也楚貢包茅不入王祭不共無以縮酒桓公是徵而楚人服罪師則有名矣孟子何以獨言春秋無義戰也譬諸殺人者或曰人可殺與曰可孰可以殺之曰為士師則可以殺之矣國可伐與曰可曰孰可以伐之曰為天吏則可以伐之矣楚雖暴橫慿陵上國齊不請命擅合諸侯豈可謂為天吏以伐之乎楊龜山曰桓公責楚以包茅不入固非有夾輔王室之誠心而其事則正矣尹和靖曰責包茅不入昭王不反所謂假仁以行其伯家氏曰齊桓公自北杏始㑹至是二十有六年所以安中夏尊王室功之大事之偉者惟服楚而已矣夫子發微管仲之嘆亦專為是而傳謂以蔡姬之故㑹諸侯侵蔡蔡潰遂伐楚然則齊桓之侵蔡為私怒而發其伐楚乃侵蔡之遂事殆不然也蓋齊距楚南北相望數千里摟諸侯動大衆跋履險阻久而後涉其境楚得以為僃勝負未可知也故桓公先侵蔡道蔡以及楚所謂兵從天而下楚欲聚而保險已無及矣欲出而求戰知弗敵矣乃使屈完如師乞盟未戰而氣已索于是齊桓兵不血刃坐收攘楚之功此桓公管仲所以熟謀豫圖萬全而後動非因蔡潰而僥幸萬一以為此舉也張氏曰楚自桓二年蔡鄭㑹鄧已懼其為中國患又積五十年富强吞並之力今比年伐鄭氣陵中國所幸齊自桓公入國舉管仲治民訓兵至此方能率諸侯之師正其罪而討之使其君臣震恐遣使如師可謂有功于中國矣然其與屈完觀師恃力驕矜形于辭色遂來方城漢水之對屈完之歸卒踐此言不純屈服時出干紀滅弦救鄭故曾西得以鄙其功烈之甚卑也夏許男新臣卒胡氏曰劉敞曰諸侯卒于外者在師則稱師在㑹則稱㑹今許男一無稱者此去師與㑹而復歸其國之驗也召陵地在頴川是以許男復焉古者國君即位而為椑歲一漆之出疆必載椑卒于師曰師卒于㑹曰㑹正也許男新臣卒非正也其為人君不知命者也不知命則必畏死畏死則必貪生貪生則必亂于禮矣而後有容身茍免之耻而後有淫祀非望之惑此說是也夫知生死之說通晝夜之道者亦豈有異于人哉茍得正而斃則無求矣楚屈完來盟于師盟于召陵楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乘而觀之齊侯曰豈不穀是為先君之好是繼與不穀同好如何對曰君惠徼福於敝邑之社稷辱收寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟穀梁氏曰楚無大夫其曰屈完何也以其來㑹桓成之為大夫也髙郵孫氏曰春秋大夫來盟者必書君使屈完之來不書使者屈完受命不受辭得專使之宜故不曰使也先書來盟以見楚人之服從又書盟于召陵以見諸侯之退師春秋之盛莫盛于齊桓齊桓之功莫大于召陵之盟也許氏曰楚之未服則侵蔡次陘以威之其既服也則退師召陵以禮焉胡氏曰來盟于師嘉服義也盟于召陵序桓績也于此見齊師雖强桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕張氏曰于是見齊桓之討楚進退以禮雖不足以盡王者之義而夫子所謂一匡天下民到于今受其賜實二百四十二年甚盛之舉也陳氏曰春秋之褒貶詞不足以盡意而後見于文書曰次于陘楚屈完來盟于師盟于召陵斯其為文也美矣愚謂孟子所謂春秋無義戰彼善于此則有之矣正謂此也桓公之功莫大于伐楚荆蠻之罪亦莫大于僭王召陵之役使桓公能禀天子命號召諸侯申明大義以告當世然後竭天下之力挫强楚之鋒豈惟周室是賴萬世綱常實由以定惜乎桓公徒欲逞伯主之虛聲無尊王室之實意始也既不禀命天王終也又不申明大義諸侯次陘屈完來師乃責以包茅不入問以昭王不反取盟而還蓋伯者之心急于功利之近習昧于道義之逺圖方其糾合諸侯之時未嘗正明强楚之罪如成湯亳都之誓武王孟津之㑹也及屈完之至有不虞君之涉吾地也之言管仲倉卒乃以包茅不入昭王不反為辭以對爾故其功僅足以暫安中夏于一時不足以永尊周室于後曰也或者謂若問其僭王之罪楚必不服召陵之役不能成功人心天理初無夷夏之殊私情曲說乃起是非之辨但以當時應對之辭觀之即可見矣管仲問以包茅不入屈完即云寡君之罪及云昭王不反乃云問諸水濵蓋包茅之罪實而難逃昭王之事昧而易辨故也桓公問以繼好屈完即云寡君之願及云以此衆戰誰能禦之乃云漢水方城雖衆無以用之蓋繼好以德衆戰以力故也以此觀之當時問其僭王之罪其將何辭以自解而不服乎使桓公果知仁義道德之說君臣上下之分以王者之師討不臣之罪合九國之衆臨乎方城漢水之上喻以天子之命責其僭王之罪則楚之君臣無所逃于天討將見楚子肉袒牽羊求哀請命然後貶爵削地終守臣節不敢僭踰則中國永安而王室且復興矣豈止屈完來盟于師而尋有滅弦之耻伐鄭之勞哉桓公無湯武帝王之學管仲非伊尹周公輔相之才遂使其功烈如此其卑也嗟夫齊人執陳轅濤塗陳轅濤塗謂鄭申侯曰師出于陳鄭之間國必甚病若出于東方觀兵于東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出于東方而遇敵懼不可用也若出于陳鄭之間共其資糧屝屨其可也齊侯說與之虎牢執轅濤塗公羊氏曰濤塗之罪何辟軍之道也濤塗謂桓公曰君既服南夷矣何不還師濵海而東服東夷且歸桓公曰諾于是還師濵海而東大陷于沛澤之中顧執濤塗執者曷為或稱侯或稱人稱侯而執者伯討也稱人而執者非伯討也此執有罪何以不得為伯討古者周公東征則西國怨西征則東國怨桓公假塗于陳而伐楚則陳人不欲其反由已者師不正故也不修其師而執濤塗古人之討則不然也愚按如左氏所載則師終由陳鄭反如公羊所載則師從東海反誠如公羊之說濤塗用計誣罔致陷諸侯之師其罪大矣齊侯執當其罪不當貶而稱人今既貶而稱人當從左氏之說然公羊所論書人之法則當矣秋及江人黃人伐陳討不忠也髙氏曰此書及者非魯及之也蒙上齊人執轅濤塗之文乃齊及之耳齊所以及江黃伐陳者討其誤軍道之罪也雖然伐陳非義也陳人亦未肯服故十有二月再㑹諸侯伐之八月公至自伐楚葬許穆公冬十有二月公孫兹帥師㑹齊人宋人衛人鄭人許人曹人侵陳叔孫戴伯帥師㑹諸侯之師侵陳陳成歸轅濤塗髙氏曰書公孫兹帥師則知諸侯皆大夫帥師以㑹之矣諸侯皆貶而人之則公孫兹之貶可知矣齊之首惡罪不勝誅也師氏曰秋嘗以濤塗之故及江人黃人伐陳是罪其臣以及其君罪其君以及其國逞干戈以示威而不顧政刑之顛倒已為不仁矣况不以前伐為非冬又㑹七國以侵陳耶春秋書伐蓋罪齊猶以濤塗藉口曰我有辭非無故也及此書侵則見齊侯辭窮無以藉口無故侵陳陳直而齊曲非所以為盟主矣胡氏曰揚子法言或問為政有幾曰思斁昔在周公征于東方四國是皇其思矣夫齊桓公欲徑陳陳不果納執轅濤塗其斁矣夫桓公識明而量淺管仲器不足而才有餘方楚人未帖而齊以為憂也何其念之深禮之謹也存此心以進善則桓有王德而管氏為王佐矣惜乎楚方受盟志已驕溢陳大夫一謀不協其身見執其國見伐見侵而怒猶未怠也桓德于是乎衰矣行有不得皆反求諸已其身正而天下歸之曾可厚以責人而不自反乎原其失在于量淺而器不宏也春秋稱人以執罪齊侯也稱侵陳者湥責之也故孟子曰仲尼之徒無道桓文之事者管仲曾西之所不為也而子為我願之乎張氏曰桓公于此慙德多矣大兵之後復以師出重困諸侯故楚終不服鄭伯逃盟以致弦不能救坐視其滅皆怒陳之過致之也愚謂春秋于伐楚序齊桓之功于侵陳著齊桓之罪邵子曰春秋孔子之刑書功過不相掩五伯者功之首罪之魁也其是之謂乎五年春晉侯殺其世子申生莊二十八年晉獻公娶于賈無子蒸于齊姜生秦穆夫人及太子申生又娶二女于戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言于公曰曲沃君之宗也蒲與二屈君之疆也不可以無主若使太子主曲沃而重耳夷吾主蒲與屈則可威民而懼戎且旌君伐晉侯說之夏使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦晉侯使太子申生伐東山臯落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事也將焉用之且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見太子太子曰吾其廢乎對曰告之以臨民教之以軍旅不共是懼何故廢乎且子懼不孝無懼弗得立修已而不責人則免于難及將立奚齊既與中大夫成謀姬謂太子曰君夢齊姜必速祭之太子祭于曲沃歸胙于公公田姬置諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城公殺其傅杜原欵或謂太子子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎太子曰君實不察其罪被此名也以出人誰納我十二月戊申縊于新城姬遂譖二公子曰皆知之重耳奔蒲夷吾奔屈至是晉侯使以殺太子申生之故來告初晉使士蒍為二公子築蒲與屈不慎置薪焉夷吾訴之公使讓之士蒍稽首而對曰臣聞之無喪而戚憂必讐焉無戎而城讐必保焉寇讐之保又何慎焉守官廢命不敬固讐之保不忠失忠與敬何以事君詩云懷德惟寧宗子惟城君其修德而固宗子何城如之三年將尋師焉焉用慎退而賦曰狐裘尨茸一國三公吾誰適從及難公使寺人披伐蒲重耳曰君父之命不校乃狥曰校者吾讐也踰垣而走披斬其袪遂出奔翟六年春晉侯使賈華伐屈夷吾不能守盟而行將奔狄郤芮曰後出同走罪也不如之梁梁近秦而幸焉乃之梁公羊氏曰殺世子母弟稱君甚之也穀梁氏曰晉侯斥殺惡晉侯也師氏曰于申生書世子所以明非失子道也於晉侯書爵愧其為一國之君乃聽讒不能容一子于其厚者如此則無所不薄矣胡氏曰內寵並后嬖子配嫡亂之本也驪姬寵奚齊卓子嬖亂本成矣尸此者其誰乎是故目晉侯斥殺專罪獻公使後世有欲紊妃妾之名亂嫡庶之位縱人欲滅天理以敗其國家者知所戒焉以此防民猶有以堯母名門使姦臣逆探其意有危皇后太子之心以成巫蠱之禍者朴鄉吕氏曰董仲舒曰有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權然則若獻公者其所謂前有讒而不見者邪此所以蒙首惡之名若申生者其所謂遭變事而不知其權者耶此所以陷父于不義謝氏曰世子君之二國之本也信讒邪而殺世子則是為人君而滅國本也君道于此絶矣父子之道天性也信讒邪而殺世子則是為父而滅天性也父道于此絶矣故申生死書殺書世子以著獻公之惡也甚哉嬖寵之為患也體莫重于世情莫親于子嬖寵得志于內讒言得行于外則雖其重為吾世其親為吾子人心之所繫屬而不可解者亦且視之為寇讐棄之如糞土矣有國家者其于嬖寵可不為之防哉故春秋明申生之死為天下戒也髙氏曰使申生能自直獻公慨然知自反雖居不安食不飽君子以為孝也直而不勝逃而免難俟其自悔父子之恩猶可全也申生不知出此二者而為臧獲之計其不知甚矣家氏曰申生處人道之變雖欲不死不可得也論者惑于左氏傳語謂其愛父以姑息而陷之不義以為小仁者大仁之賊過矣晉獻殘忍不君溺于內嬖所與朝夕潛圖密慮不過樹建庶孽以為身後之計天倫之愛已泯沒矣夫豈聞申生之訴幡然為之悔而致姬于罪者乎髙郵孫氏曰舜之事瞽叟瞽叟亦允若而免于禍申生之于獻公也獻公聽讒而申生死之春秋舉重者言之斥言晉侯而申生未免有罪也愚謂家氏之說是以衆人望申生故無可為之理孫氏之說是以聖人責申生蓋無不可為之事然申生能為衆人之事而不能為聖人之事立教之言必當以聖人為法而不當以申生為法嗚呼申生往矣後之學者又可不求其所以至于聖人而如舜顧乃以自暴自棄安于小成而為申生乎張子曰無所逃而待烹申生其恭也斯言論之當矣杞伯姬來朝其子髙氏曰杞伯姬來者不宜來也朝其子者不當朝也先王之制諸侯未冠而即位謂之童子侯童子侯不朝蓋不可以成人之禮接之也伯姬歸杞方十三年如其有子必尚幼稚又未嗣位如之何而勝朝乎若伯姬歸寧而與其子皆來則亦常事不書矣今特書杞伯姬來而係之以朝其子蓋無故而來以朝其子為名也師氏曰杞伯姬一來朝其子而所失者四杞伯不能禦其室家不夫也伯姬不能以順為正而妄動于外不婦也子方幼而使僭行其父禮于所不當行之國不母也魯僖坐視人子行人父之禮不君也互書而僃責之夏公孫茲如牟公孫茲如牟娶焉髙氏曰按桓十五年牟人來朝蓋小國也魯必不使大夫往聘此書公孫茲如牟直著其託聘使以圖昏蓋大夫非君命不越境今以聘行則其出有名矣公孫茲雖可逃責于一身適自取卑辱耳公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止㑹王太子鄭謀寧周也杜氏曰惠王以惠后故將廢太子鄭而立王子帶張氏曰齊桓公以其廢長立幼將起亂階遂率諸侯㑹王世子于首止示天下戴之以為天王之二所以尊國本絶亂階也髙氏曰凡魯與一二國盟伐則有稱㑹稱及之異以辨起意之主若大㑹諸國盟伐皆盟主所召而往就之故悉不書及此書及者非內為主也殊㑹王世子故不言㑹齊侯而書及也天王將廢世子鄭而立王子帶齊侯以謂議之于朝覲責之于諫詞從則王子安不從則廢之是從違未可知也莫如為㑹以見世子使天下諸侯曉然皆知世子之為鄭而共尊之吾從而與之盟則雖有惠后之愛天王不能行其私則世子終不可易矣此齊侯之志也胡氏曰以王世子而下㑹諸侯則陵以諸侯而上與王世子㑹則抗春秋抑强臣扶弱主撥亂世反之正特書及以㑹若曰王世子在是諸侯咸往㑹焉示不可得而抗也後世論其班位有次于三公宰臣之下亦有序乎其上者則將奚正自天王而言欲屈逺其子使次乎其下示謙德也自臣下而言欲尊敬王世子則序乎其上正分義也天尊地卑而其分定典敘禮秩而其義明使羣臣得伸其敬則貴有常尊上下辨矣經書宰周公祗與王人同序于諸侯之上而不得與殊㑹同書此聖人尊君抑臣之㫖也而班位定矣秋八月諸侯盟于首止鄭伯逃歸不盟諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安鄭伯喜于王命而懼其不朝于齊也故逃歸不盟孔叔止之曰國君不可以輕輕則失親失親患必至病而乞盟所喪多矣君必悔之弗聽逃其師而歸髙氏曰此復舉諸侯者尊王世子不敢與之盟也㑹者辨上下之禮修和好之道而王世子與焉猶之可也盟者以不相信故也若王世子亦與焉則是以所不信者加之王世子與約束諸侯無異故齊侯不敢盟世子而以㑹世子為名可謂知尊王矣謝氏曰㑹王世子以尊周盟諸侯以崇大義春秋㑹盟未有善于此者也鄭文公從夷棄夏以即楚之心背盟竊歸是以匹夫之行逃中國之義也書逃歸賤之也書不盟罪其違命也胡氏曰㑹盟同地再言首止者書之重辭之復其中必有大美惡焉首止之盟美之大者也王將以愛易世子桓公有憂之控大國扶小國㑹于首止以定其位太子踐祚是為襄王一舉而君臣父子之道皆得焉故夫子稱之曰管仲相桓公一匡天下民到于今受其賜微管仲吾其被髮左袵矣中國之為中國以有父子君臣之大倫也一失則為夷狄矣事有惡者不與為幸其善者不與為貶平丘之盟惡也請魯無勤是以為幸故直書曰公不與盟首止之盟善也犯衆不盟是以為貶故直書曰鄭伯逃歸逃者匹夫之事以諸侯之尊下行匹夫之事雖悔于終病而乞盟如所喪何其書逃歸不盟湥貶之也或曰首止之㑹非王志也王惡齊侯定世子而使周公召鄭伯鄭伯喜于王命而畏齊故逃歸不盟然則何罪乎曰春秋道名分尊天王而以大義為主夫義者權名分之中而當其可之謂也諸侯㑹王世子雖衰世之事而春秋與之是變之中也鄭伯雖承王命而制命非義春秋逃之是亦變之中也天下之大倫有常有變舜之于父子湯武之于君臣周公之于兄弟皆處其變者也賢者守其常聖人盡其變㑹首止逃鄭伯處父子君臣之變而不失其中也噫此春秋之所以為春秋而非聖人莫能修之者矣朴鄉吕氏曰桓之㑹有天子之事三于洮則序王人于諸侯之上而同盟焉王人微者也雖同盟而無嫌于葵丘則序周公于諸侯之上而不敢同盟焉天子之宰異于微者也于首止則不但不同盟也而殊㑹世子不敢以世子夷諸侯以世子之尊非特天子之宰比也桓公于是知所節矣陳氏曰厥貉之㑹麋子逃歸不書厲之役鄭伯逃歸不書蓋逃楚也必若鄭文公逃齊陳哀公逃晉而後書所以示夷夏之辨嚴矣愚謂殊㑹王世子聖人之大法也不盟王世子桓公之大義也首止之事以分言之固于理為不順以事言之則其功莫大焉春秋舍首止之盟而不美之斯無可美之事矣然以王使周公召鄭伯之事觀之惠王特迫于諸侯之𫝑衆人之情而不敢易太子耳若諫之以禮必欲禀命王命未必可得而太子之位易矣是蓋權其輕重不得已而為之處變事而不失其常者也吁惠王之昏愚固未易以覺悟亦桓公之誠心未至不足以感動之也此春秋之世所以不及成周五伯之卑所以不可為三王也漢用張良計召四皓奉太子八見髙祖指以語戚夫人曰此四人者羽翼成矣太子不可易矣其權輿蓋出于此歟楚人滅弦弦子奔黃楚鬬穀於莬滅弦弦子奔黃于是江黃道柏方睦于齊皆弦姻也弦子恃之而不事楚又不設僃故亡髙郵孫氏曰春秋國滅而其君之死者但書曰滅以其君歸者書名其君出奔者書奔奔者非無罪也校之隨軍歸者則輕國滅而身死者非可褒也校之不死而奔者則善故滅人之國其罪則一而見滅之君其例有三也奔而不名罪輕于以歸者也權氏學曰凡諸侯為人滅其國或見伐出于已非其罪則于國未宜絶于其奔也則皆不名彼其義未虧故可直于天子而求復也焉可遂絶之哉泰山孫氏曰楚人滅弦惡桓不能救也家氏曰使齊人是時能出偏師合江黃以為之聲援弦必不亡而江與黃亦無後日之患張氏曰桓公不能救弦以啓救鄭圍許之紛紛蓋楚之滅弦已出于迅雷不及掩耳之計矣公于此時因弦子之奔而率諸侯以討楚復弦豈不足以立中國之威而制楚之橫歟故詳書之以罪桓公之失此機㑹也九月戊申朔日有食之冬晉人執虞公晉侯復假道于虞以伐虢宫之竒諫曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩一之為甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也公曰晉吾宗也豈害我哉對曰大伯虞仲大王之昭也大伯不從是以不嗣虢仲虢叔王季之穆也為文王卿士勳在王室藏于盟府將虢是滅何愛于虞且虞能親于桓莊乎其愛之也桓莊之族何罪而以為戮不唯逼乎公曰吾享祀豐潔神必據我對曰臣聞之鬼神非人實親惟德是依故周書曰皇天無親惟德是輔又曰黍稷非馨明德惟馨又曰民不易物惟德繄物神所馮依將在德矣若晉取虞而明德以薦馨香神其吐之乎弗聽許晉使宫之竒以其族行曰虞不臘矣在此行也晉不更舉矣八月甲午晉侯圍上陽十二月丙子朔晉滅虢虢公醜奔京師師還館于虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬而修虞祀且歸其職貢于王胡安定先生曰稱人以執惡晉侯也公羊氏曰虞已滅矣其言執之何不與滅也滅者國亡之善詞上下之同力也穀梁氏曰執不言所于地緼于晉也髙郵孫氏曰春秋于虢之滅也序虞于晉上而以下陽當之于虞之亡也不言其遷滅但書執虞公蓋虞之所依者虢也貪賂首惡虢亡則虞亡下陽之滅虞已見滅而晉已取虞虞之亡也四年于兹矣于是但執虞公焉謝氏曰虞公以一國之君主而見執于人者特以無後慮而已百里奚宫之竒去而虞國空虛虢亡虞國單弱方是時外無鄰國之援內無忠臣之輔虞公措身于國勢若匹夫故獻公還師館虞而虞公執矣有國家者其可以無藩垣之蔽股肱之助哉書執虞公所以為後世戒也劉氏意林曰虞之滅自下陽始下陽滅則虞亡矣宫之竒舟之僑之徒皆知之獨其君不知故春秋因大見釁于滅下陽而湥沒其迹于執虞公使天下之為人君者可以戒於此矣故曰家有既亡國有既滅由别之不别也可不大哀乎人君莫不惡亡而好存莫不能因亡而保存是何也嗜欲之習近而憂患之來逺也胡氏曰書滅下陽于始記執虞公于後可以見趨利棄義瀆貨無厭之能亡國敗家審矣髙氏曰虢保逆旅以侵晉之南鄙猶可以為罪賄虞而虞從之何罪而滅之人晉而爵虞非聖人孰能别之此之謂明微張氏曰書滅下陽于前書執虞公于後晉獻無道絶滅虢叔虞仲之祀與夫虞公之自取滅亡片言具見所以戒後世者可謂深切著明矣六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城以其逃首止之盟故也髙氏曰去年齊侯㑹王世子于首止而鄭伯逃歸不盟遂與楚通是啓諸侯之伐七年齊又伐之八年寧母之㑹遂不敢與盟而令世子聽命九年㑹于洮遂乞盟也新城實新密鄭人新造之邑也鄭伯逃歸蓋王之意也從王之意不可伐也乃以其非時城邑為罪從而圍之許氏曰圍而不舉則亦服之而已有餘力者矣秋楚人圍許諸侯遂救許楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子于武城許男面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而袚之焚其櫬禮而命之使復其所楚子從之謝氏曰諸侯伐鄭之諸侯也楚之圍許也諸侯自鄭反兵救許得救之道也薛氏曰救許之書遂善桓公急人之難不窮兵于鄭也胡氏曰凡書救者未有不善之者也其曰遂救許善之尤者也家氏曰伐鄭義也救許亦義也移伐鄭之師而救許所謂權時之宜而合乎義者也故書諸侯遂救許美其救之速而許賴以存也齊桓前日驕心一萌而以私怒侵陳諸侯之合者幾散今而救許伐鄭伐其所當伐救其所當救夫然後大服人心是以復有葵丘之㑹朴鄉吕氏曰許男降楚楚子赦之無是事也諸侯救許許圍已解何苦降于楚哉又自後許男嘗與諸侯㑹知其初不降于楚也冬公至自伐鄭春秋闕疑卷十三
