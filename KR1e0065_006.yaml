body:
  text: 春秋闕疑卷六元鄭玉撰莊公公名同桓公之子莊王四年即位諡法勝敵克亂曰莊元年春王正月三月夫人孫于齊公羊氏曰孫猶遜也內諱奔謂之孫夫人何以不稱氏與弒公也左氏曰不稱薑氏絶不為親胡氏曰夫人文薑也桓公之弒薑氏與焉為魯臣子者義不共戴天矣嗣君夫人所出也恩如之何徇私情則害天下之大義舉王法則傷母子之至恩此國論之難斷者也經書夫人孫于齊而恩義之輕重審矣梁人有繼母殺其父者而其子殺之有司欲當以大逆孔季彥曰文薑與弒魯桓春秋去其薑氏傳謂絶不為親夫絶不為親者即凡人爾宜以非司寇而擅殺當之不得以逆論也人以為允故通于春秋然後能權天下之大事矣孫者順讓之辭使若不為人子所逐以全恩也髙郵孫氏曰文薑之孫則去其氏哀薑之孫則不去氏文薑殺其夫桓公哀薑殺其子閔公姦惡之迹同而殺君之罪等然其氏或去或不去者聖人之意也文薑之惡可見矣其孫于齊是宜見絶于齊也不稱薑氏所以許齊絶之也齊侯則是與夫人為惡者矣然許齊絶之者非為齊襄設也以明骨肉之親罪惡之大至其害義雖其親得絶之也哀薑之惡可知矣其孫于邾邾非哀薑之國非所宜往也特曰薑氏所以明邾得絶之也文薑齊女齊絶之則有疏骨肉之嫌聖人辨其嫌使之得絶也故不稱薑氏而書曰夫人孫于齊哀薑孫于邾邾非其族以明邾不當受異姓之女他國之夫人來則絶之爾故書曰夫人薑氏孫于邾愚按胡氏謂絶不為親蓋謂魯非謂齊也若云謂魯當去夫人之號而存薑氏之姓不當去姓而存號也蓋文薑弒桓魯人當絶不待春秋之文惟齊人當絶則非聖人察見至微斷以大義不能識也故其書法若此以哀薑不去氏而互觀之則可見矣夏單伯逆王姬左作送公榖作逆榖梁氏曰單伯者何吾大夫之命乎天子者也命大夫故不名也其不言如何也其義不可受于京師也其義不可受于京師何也曰吾君弒于齊使之主婚姻與齊為禮其義固不可受也公羊氏曰何以不稱使天子召而使之也逆之者使我主之也曷為使我主之天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之髙郵孫氏曰單伯于此見經之後莊十四年書齊人陳人曹人伐宋單伯會伐宋冬又會諸侯于鄄春秋王臣而會諸侯俱序諸侯之上亦不若內臣而書會也惟內臣會諸侯則曰會某由此觀之則單伯內臣非王臣也王姬未至于魯不當稱送此當從二傳作逆張氏曰單伯果以天子大夫送王姬必俟館成之後方至魯豈得預書之愚按文十五年經書單伯至自齊單伯為魯請叔姬故書其至使為王臣則安得告至于魯其為內臣明矣秋築王姬之館于外胡氏曰魯于王室為懿親其主王姬亦舊矣館于國中必有常處今特築之于外者榖梁子以為仇讐之人非所以接婚姻也衰麻非所以接辨冕也知其不可故特築之于外也築之于外得變之正乎曰不正有三年之喪天王于義不當使之主有不戴天之讐莊公于義不可為之主築之于外之為宜不若辭而不主之為正也是以君子貴端本焉春秋于此事一書再書者其義以復讐為重示天下不可忘君親之意故雖築館于外不以為得禮而書之也髙氏曰使不知而為之猶可恕也知其非是而猶且為之又築館于外以自誣此聖人所以深誅而詳著之也冬十月乙亥陳侯林卒王使榮叔來錫桓公命家氏曰錫命之禮在春秋屢見而其事不同或即位而見錫或歷年乃加錫或以死而追錫魯桓衛襄死而錫者也襄之歿也王使成簡公追命之曰叔父陟恪在我先王之左右以佐事上帝豫敢忘髙圉亞圉策書之辭也魯桓錫命亦當倣此謝氏曰悖逆之人王法在所誅絶乃反生而來聘死而錫命逆天之大也來聘稱天王以明王者當若天道也錫命稱王以明周王弗克若天也憲天理物王之德也臣不能相之于始王不能若之于終由是所為背天而天理不復見矣故王之聘錫桓公也始則名其宰以宰不能相王于始也終則去其天以王不能若天于終也愚按桓公既死王來錫命聖人猶去其天以示貶者所以見古今之惡一也罪人雖死猶當追廢以示誅絶使後之為惡者知懼而不敢為况可錫命而褒寵之乎其誅討之法巖矣王姬歸于齊胡氏曰魯主王姬舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讐之義明矣家氏曰堯之女舜也書曰釐降二女于溈汭詩序言王姬適諸侯曰下嫁于諸侯曰降曰下猶有自上而下之意至春秋垂法則曰王姬歸于齊與列國女嫁諸侯者無異詞此出於聖人之特筆所以見隂從陽夫倡婦乃天地之大義不以天子女至貴而紊居室之大倫其慮後世逺矣由秦漢以來務在尊君抑臣列侯尚主夫屈于婦甚至降其父母下從弟昆不使以尊行而臨帝女失春秋之教矣齊師遷紀郱鄑郚謝氏曰齊將滅紀故遷其三邑而有之胡氏曰邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人強暴用大衆以迫之為已屬也凡書遷者自是而滅矣春秋興滅國繼絶世則凡遷國邑者不再貶而罪已見矣二年春王二月葬陳莊公夏公子慶父帥師伐于餘丘榖梁氏曰于餘丘邾之邑也胡氏曰國而曰伐此邑爾其曰伐何也志慶父之得兵權也莊公幼年即位首以慶父主兵卒致子般之禍于餘丘法不當書聖人特書之以志亂之所由為後戒也魯在春秋中見弒者三君其賊未有不得魯之兵權者公子翬再為主將専會諸侯不出隱公之命仲遂擅兵兩世入把伐邾會師救鄭三軍服其威令之日久矣故翬弒隱公而寪氏不能明其罪慶父弒子般而成季不能遏其惡公子遂殺惡及視而叔仲惠伯不能免其死夫豈一朝一夕之故哉春秋所書為戒逺矣秋七月齊王姬卒謝氏曰齊告王姬之喪魯莊公為之服大功故書卒或曰由魯嫁故為之服禮者稱情而為之文也親非姊妹而為之服其服非禮也齊吾之世讐也其始為之主其婚其終為之服其喪非孝也胡氏曰莊公于齊王姬厚矣如不共戴天之念何此所謂不能三年之喪而緦小功之察特卒王姬以著其罪冬十有二月夫人薑氏會齊侯于禚左氏曰書姦也榖梁氏曰婦人既嫁不踰竟踰竟非正也婦人不言會言會非正也饗甚矣胡氏曰婦人無外事送迎不出門見兄弟不踰域在家從父出嫁從夫夫死從子今會齊侯于禚是莊公不能防間其母失子道也故趙氏曰薑氏齊侯之惡著矣亦所以病公也曰子可以制母乎夫死從子通乎其下况于國君君者人神之主風教之本也不能正家如正國何若公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至矣愚按夫人之孫既去其氏矣此復其氏者所以著其為齊侯之妹示之以别而討其亂倫之罪也乙酉宋公馮卒三年春王正月溺會齊師伐衛榖梁氏曰此公子溺也其不稱公子何也惡其會仇讐伐同姓故貶而名之也公羊氏曰溺者何吾大夫之未命者也胡氏曰有父之讐而釋怨罪大矣况與合黨興師伐人國乎夏四月葬宋莊公五月葬桓王左氏曰緩也胡氏曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至王崩至是蓋七月矣先儒或言天子不志葬又以為不言葬者常也夫事孰有大于葬天子者而可以不志乎死生終始之際人道之大變豈以是為常事而不書也陳氏曰文公使公子遂葬晉侯叔孫得臣葬襄王是均周晉也昭公使叔弓葬宋公滕侯叔鞅葬景王是均周宋滕也均猶可也晉景公卒成公弔喪而定王不書葬楚康王卒襄公送喪而靈王不書葬不臣於周而詘于晉楚春秋詳之是故春秋不徒志葬也秋紀季以酅入于齊紀于是乎始判朴鄉吕氏曰春秋之法凡人臣竊地以逃者必書奔今酅不書奔則非奔也凡人臣竊地以自恣者必書叛今酅不書叛則非叛也不書奔不書叛而直書以酅入于齊則是以酅入于齊求存其宗祀而已胡氏曰不書名者天下無道強衆相陵天子不能正方伯不能伐屈已事齊請後五廟其亦不得已而為之者非其罪也髙氏曰析地而去國降志而事讐此非紀季之心也以宗國為寄矣愚按紀季當紀之危能與其君效死勿去以守社稷者正也至于力不能守奉兄之命以酅入齊求存宗祀蓋亦其情之甚不得已者然視賣國忘君棄親事讐者有間矣故聖人不曰以酅叛亦不曰以酅奔而曰紀季以酅入于齊所以恕季而罪齊然非褒季也冬公次于滑將會鄭伯謀紀故也鄭伯辭以難榖梁氏曰次止也有畏也欲救紀而不能也胡氏曰春秋紀兵伐而書次以次為善救而書次以次為譏次于滑譏之也魯紀有婚姻之好當恤其患于齊有父之讐不共戴天茍能救紀抑齊一舉而兩善并矣見義不為而有畏也春秋之所惡故書公次于滑以譏之也四年春王二月夫人薑氏享齊侯于祝丘謝氏曰享兩君相見之禮也享禮在廟尚敬也夫人出享齊侯黷禮之大也人無耻畏則無所不為故文薑初會齊侯于禚次享齊侯于祝丘張氏曰夾谷之會齊侯欲享魯君夫子猶以犧象不出門嘉樂不野合拒之豈齊侯文薑可以行之于祝丘乎假先王之禮而為禽獸之行大亂之道也三月紀伯姬卒泰山孫氏曰內女不卒此卒者為夏紀侯大去其國齊侯葬紀伯姬起也程氏曰伯姬卒而紀國亡魯為父母兄弟之國反使齊侯葬之書此所以罪魯是謂文見于此義起在彼者也或曰齊侯迫逐紀侯取其國而葬其妻義豈在此乎曰齊侯之惡不待貶絶而可知若魯之罪則聖人之所以明微也家氏曰內女嫁于諸侯而書卒者凡七人其間復有出而歸者焉至于卒葬皆書則紀伯姬及叔姬與宋共姬三人爾伯姬以國亡為齊所葬愍而書之叔姬伯姬之娣國亡夫死守節于酅特録其葬非例也共姬則遇災而終節行顯著是以卒葬皆書之夏齊侯陳侯鄭伯遇于垂襄陵許氏曰齊與陳鄭遇垂蓋謀取紀是以紀侯見難而去也紀侯大去其國紀侯不能下齊以與紀季夏紀侯大去其國違齊難也程子曰紀侯大去其國大名責在紀也常山劉氏曰大者紀侯之名生名之著失地也髙氏曰按齊之圖紀固非一日先以兵遷其三邑志固在于滅矣紀量力之不支無以為計遂使季以酅事之夫紀地不過百里而去四邑則地幾盡矣今齊方與陳鄭遇垂兵未加于其國紀侯不暇葬其妻遽委之而去此何理哉夫為國君死社稷不以難去今紀無內難但為齊所逼而敵猶未至境也借使齊以兵臨我猶當勵其臣民固其禦備而為之守上訴于天子近赴于鄰國求為之援不幸而力不足則亦死之可也惡有先自委其國而去之者哉先儒以太王之事擬之過矣胡安定先生曰紀侯自去國為齊有不言滅者非滅也齊未嘗加兵于紀之都城不言奔者非奔也奔者身雖奔而國家在焉陳氏曰紀侯大去其國未知紀之自亡歟人之亡之歟曰齊侯葬紀伯姬則齊亡之也六月乙丑齊侯葬紀伯姬胡氏曰葬紀伯姬不稱齊人而目其君者見齊襄迫逐紀侯使之去國雖其夫人在殯而不及葬然後襄公之罪著矣愚按凡葬者皆彼來告而此往會之也紀既亡矣必不來告也齊侯葬之魯必不會也聖人所以録伯姬之葬罪魯且罪齊也罪魯者以其不能救婚姻之國至于滅亡雖其姊妹之喪亦不能葬而使讐人得以葬之也罪齊者以其既滅人之國乃葬人之妻大暴而小慈以欺世盜名也秋七月冬公及齊人狩于禚公羊氏曰公及齊侯狩其稱人何諱與讐狩也前此有事矣曷為獨于此焉譏莫重乎與讐狩也胡氏曰夫狩者馳騁田獵其樂下主乎已一為乾豆其事上主乎宗廟以為有人心者宜于此焉變矣故齊侯稱人而魯公書及以著其罪五年春王正月夏夫人薑氏如齊師薛氏曰齊帥者軍旅之間也髙郵孫氏曰不曰其地師之次止無常也謝氏曰孫于齊猶有畏心焉會于禚享于祝丘則無所畏矣曰會曰享猶有恥心焉如齊師則無恥矣會非夫人事享又甚焉享非夫人事如齊師又甚焉胡氏曰曰會曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣春秋書此以戒後世謹禮于微慮患于早之意也秋郳黎來來朝胡氏曰郳國黎來名諸侯之附庸未受爵命書名例也程氏曰郳黎來來修朝禮故書曰朝且其後數從中國諸侯之會王命以為小邾子蓋于此已能自進于禮矣冬公會齊人宋人陳人蔡人伐衛納惠公也榖梁氏曰是齊侯宋公也其曰人何人諸侯所以人公也其人公何逆天王之命也髙氏曰衛朔譖其兄使至于死而盜其位其罪至大天王治其舊惡而廢之斯得宜矣諸侯舉兵強納之悖抗王命不臣之甚也謝氏曰內無貶公之道故上書公以見諸侯下書人以示貶六年春王正月王人子突救衛胡氏曰王人微者子突其字也以下士之微超從大夫之例而書字褒救衛也髙氏曰善子突則以尊王命故尊王命所以重諸侯之罪也家氏曰救固善也而王師不言救諸侯相攻而諸侯救之夷狄內侵而方伯連帥救之可以言救今諸侯擅兵伐國王不能令以兵救之救非所以施于王也蓋伐之為言天子事也而諸侯以之救之為言諸侯事也而天子以之用見當時諸侯之無王而名分幾于掃地矣聖人作經垂訓于諸侯之伐則削其爵而人之于子突之救則正其名而字之所以明君臣之分而正五國無王之戮其義精矣夏六月衛侯朔入于衛衛侯入放公子黔牟于周放寧跪于秦殺左公子泄右公子職乃即位公羊氏曰衛侯朔何以名犯命也其言入篡辭也榖梁氏曰入者內弗受也出入名以王命絶之也程子曰朔搆其兄而使至于死其罪大矣然父立之諸侯莫得而治也王治其舊惡而廢之宜也胡氏曰朔藉諸侯之力連五國之師拒王官之微者以復歸于衛其勢宜無難矣而書入者逆王命也朴鄉吕氏曰春秋之初惟桓之五年書衛人陳人蔡人從王伐鄭是天王猶能舉征伐之權也惟莊之五年書魯齊宋陳蔡伐衛六年春王人子突救衛是天王猶能執廢置諸侯之權也夫三國從王伐鄭而鄭服則諸侯無有不臣者矣惟其伐鄭而鄭不服然後王命不行于天下夫使王人子突救衛而黔牟立則諸侯無敢不稟命而自立者矣惟其救衛而朔得以自立然後王命益不行于天下春秋之初天王之能舉政刑者惟此二事而僅止于此然則鄭寤生之抗王五國之納朔擢髮不足數其罪矣秋公至自伐衛髙郵孫氏曰人君一出或行數事不可並告擇一事之重者而告之春秋因舊史書之爾螟冬齊人來歸衛俘胡氏曰俘者二傳以為寶按商書稱遂伐三朡俘厥寶玉則俘者正文也寶者釋辭也言齊歸衛寶則知四國皆受朔之賂矣春秋特書此事結正諸侯之罪也夫以弟弒兄臣弒君篡居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援之甚力則未有以驗其喪心失志迷惑之端也及至齊人歸寶然後知其有欲貨之心而動于惡也世衰道微暴行交作徇于貨寶賄賂公行使君臣父子兄弟終去仁義懷利以相與不至于篡攘則不厭也春秋結正諸侯之罪垂戒明矣髙郵孫氏曰齊為主兵又分賂焉不著齊人之歸則無以見齊主其賂家氏曰聖人為魯諱故于郜鼎則曰取之宋言宋人以歸于魯非魯取之于衛寶則曰齊人來歸言齊人以歸于魯非魯取之皆諱賂之辭所以存其羞惡之心而垂戒于後世也春秋闕疑卷六
