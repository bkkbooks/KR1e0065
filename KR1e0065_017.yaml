body:
  text: 春秋闕疑卷十七元鄭玉撰二十有四年春王正月夏狄伐鄭鄭之入滑也滑人聽命師還又即衞鄭公子士洩堵俞彌帥師伐滑王使伯服游孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衞滑也故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之太上以德撫民其次親親以相及也昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衞毛聃郜雍曹滕畢原鄷郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也召穆公思周德之不類故糾合宗族于成周而作詩曰棠棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟鬩于牆外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢徳之大者也即聾從昧與頑用嚚姦之大者也棄德崇姦禍之大者也鄭有平惠之勲又有厲宣之親棄嬖寵而用三良于諸姬為近四徳具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之其懐柔天下也猶懼有外侮扞禦侮者莫如親親故以親屛周召穆公亦云今周德既衰于是乎又渝周召以從諸姦無乃不可乎民未忘禍王又興之其若文武何王弗聽使頽叔桃子出狄師夏狄伐鄭取櫟家氏曰如傳所言鄭實叛也不聽王命而復執其使非叛而何王怒而討之亦理所當然而春秋但書狄伐鄭不書鄭之叛狄之所以伐何哉曰鄭當伐也王命方伯連帥董師以問鄭人之罪齊魯宋衞豈無為王敵愾者今乃命狄人出其師以伐同姓之國失所以表正中國之道矣故春秋書狄伐鄭繼書天王出居于鄭以見禍本亂源實在于此許氏曰鄭執王使是無王也王啓狄師是無中國也天下何恃不亂近世如唐人資回紇之力以定中國蓋不講于春秋戒襄王之所以出也秋七月冬天王出居于鄭王徳狄人將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭狄固貪惏王又啟之女德無極婦怨無終狄必為患王又弗聽初甘昭公有寵于惠后將立之未及而卒昭公奔齊王復之又通于隗氏王替隗氏頹叔桃子曰我實使狄狄其怨我遂奉太叔以狄師攻王王御士將禦之王曰先后其謂我何寜使諸侯圖之王遂出及坎欿國人納之秋頹叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰王出適鄭處于汜大叔以隗氏居于温冬王使来告難曰不穀不德得罪于母弟之寵子帶鄙在鄭地汜敢告叔父臧文仲對曰天子蒙塵于外敢不奔問官守王使簡師父告于晉使左鄢父告于秦鄭伯與孔將鉏石甲父侯宣多省視官具于汜而后聽其私政二十五年秦伯師于河上將納王狐偃言于晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣于諸侯今為可矣使卜之曰吉遇黄帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之筮之遇大有曰吉遇公用享于天子之卦也戰克而王饗吉孰大焉晉侯辭秦師而下三月甲辰次于陽樊右師圍温左師逆王四月丁巳王入王城取大叔于温殺之于隰城戊午晉侯朝王王饗醴命之宥請隧弗許曰王章也未有代德而有二王亦叔父之所惡也與之陽樊温原欑茅之田髙氏曰此著天王啟狄師以召禍失其所居且罪諸侯之不赴其難也夫周公位冡宰而羣弟流言挟武庚以叛周公不以為吾弟而不討也今王子帶以狄兵犯王其罪大矣襄王乃以先后之故不忍討而往避之非所出而出非所居而居其衰弱甚矣且鄭者楚與國也始既使狄伐鄭今又避狄居鄭此又見其輕舉妄動春秋不敢斥言奔而特書出以為萬世戒穀梁氏曰天子無出出失天下也居者居其所也雖失天下莫敢有也髙郵孫氏曰天王而出居于外則是天王自絶于位也自絶其位則天下非其所有不能有天下矣猶曰出居于鄭天王雖不有天下而鄭不可無天王也春秋之義自取之者以自取為文君雖不君臣不可以不臣天王出居于鄭是也樸鄉吕氏曰襄王所以待子帶者則失其道矣舜之于象也封之有庳天子使吏治其政而象不得以有為于其國富貴之爾親愛之爾此待之之道也觀仲孫湫之言曰王怒未怠不十年王弗召也則既非不宿怨不藏怒之心及既復之必當處之有道而又使之得以通隗氏起狄師則又非不得以有為于其國之義處之者既失其道矣鄭伯不王而以狄伐鄭富辰諫不聽又德狄以其女為后諫又不聽子帶以狄師攻王王御士將禦又弗聽于是適鄭由是言之是亦王之自出而已矣書曰天王居于鄭言非叔帶所能出之也晉侯夷吾卒二十三年九月晉惠公卒懐公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召執狐突使召之對曰父教子貳何以事君乃殺之初晉公子重耳之及于難也晉人伐諸蒲城遂奔狄狄人伐廧咎如獲其二女叔隗季隗納諸公子公子取季隗生伯儵叔劉以叔隗妻趙衰生盾處狄十二年而行過衞衞文公不禮焉及齊齊桓公妻之有馬二十乘公子安之從者以為不可乃行及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰吾觀晉公子之從者皆足以相國子盍蚤自貳焉乃饋盤飱寘璧焉公子受飧返璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉及楚楚子享之子玉請殺之楚子曰晉公子廣而儉文而有禮其從者肅而寛忠而能力吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之乃送諸秦秦伯納女五人懐嬴與焉至是秦伯納之濟河圍令狐入桑泉取臼衰二月甲午晉師軍于廬栁秦伯使公子縶如晉師師退軍于郇辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫戊申使殺懐公于髙梁吕郤畏偪將焚公宫而弑晉侯寺人披請見以難告三月晉侯潛㑹秦伯于王城己丑宫中火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸秦伯送衞于晉三千人實紀綱之僕狄人歸季隗于晉而請其二子樸鄉吕氏曰傳稱去年九月晉惠公卒懐公子圉立今年春秦伯納重耳殺懐公于髙梁而經于今年冬始書晉侯夷吾卒何也春秋之所據者魯史也左氏之所據者他書也其年月固有不同若果有懐公立而後秦納文公之事史所不書聖人亦不得而書之矣二十有五年春王正月丙午衞侯燬滅邢衞人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕至是衞人伐邢二禮從國子巡城掖以赴外殺之正月丙午衞侯燬滅邢禮至為銘曰余掖殺國子莫余敢止樸鄉吕氏曰衞侯燬何以名曰黎氏言之矣黎曰燬書名者蓋燬卒于下因下文書名故此誤爾如桓十二年連書丙戌者二皆冗文爾説者見燬滅邢書名遂以為滅同姓故貶求之于經虞滅虢晉滅虞楚滅夔皆同姓也三國之君皆不名而衞侯何獨名耶且書滅邢則衞侯之惡已著安用更書名耶朱子曰諸侯滅國未嘗書名衞侯燬滅邢説者以為滅同姓之故今經文只隔夏四月癸酉一句便書衞侯燬卒恐是傳寫之誤夏四月癸酉衞侯燬卒宋蕩伯姬来逆婦髙氏曰此伯姬乃魯女而嫁于宋蕩氏者今自為其子来逆婦是夫不親迎而姑来逆也魯不能以禮正之是棄其親戚也劉氏意林曰伯姬之嫁也固不見經今其来也且何為見經吾以此觀之内女雖親體不敵則不書于策不書于策所以尊君也今君失其禮以愛易典主大夫之昏是卑朝廷而慢宗廟非安上治民之節也宋殺其大夫許氏曰凡不稱名姓義在殺大夫也秋楚人圍陳納頓子于頓秦晉伐鄀楚鬬克屈禦寇以申息之師戍商密秦人偽與子儀子邊盟者商密人懼曰秦取析矣戍人反矣乃降秦師秦師囚申公子儀息公子邊以歸楚令尹子玉追秦師弗及遂圍陳納頓子于頓髙郵孫氏曰春秋書法繼事書遂楚人圍陳納頓子于頓而不言遂者圍陳所以納頓子也常山劉氏曰王政不綱天下大亂國君世子大夫歸復廢立不由天子之命唯諸侯之强有力者專之非所謂天吏而擅命興師槩有罪焉然其間善惡淺深則各存乎其文矣頓子迫于陳而出奔故楚人圍陳以納之楚人之近義可見也胡氏曰納之者不與納也諸侯失國諸侯納之正也何以不與乎夫陳先代之後不能以禮安靖鄰國保䘏寡小中國諸侯又不能修方伯連帥之職而使楚人納之是楚人仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正本自治之意也陳氏曰齊桓公卒楚始與諸夏盟于齊盟于鹿上執宋公納頓子侈然欲廢置諸侯矣葬衞文公冬十有二月癸亥公㑹衞子莒慶盟于洮衞人平莒于我盟于洮修衞文公之好且及莒平也髙氏曰平莒怨也孰平之自元年酈之役魯不與莒通至是衞侯新立欲結援焉莒人請之故為此盟以平之髙郵孫氏曰春秋之義不以我公敵大夫以我公而㑹外大夫則皆降而稱人人㣲者逺尊則不嫌其敵也莒慶小國之大夫而得與公盟者衞子在不嫌也衞侯稱子者衞文公卒未逾年也二十有六年春王正月己未公㑹莒子衞甯速盟于向尋洮之盟也髙氏曰莒請衞以平于我遣大夫以嘗之慶盟而誠故請為此盟謝氏曰三國兩月再盟詩所謂屢盟是也齊人侵我西鄙公追齊師至酅弗及齊師侵我西鄙討是二盟也穀梁氏曰弗及者弗與也可以及而不敢及也劉氏意林曰向曰齊人今曰齊師因是而知所謂弗及非弗能及也弗敢及也弗敢及者畏也故諸侯之恥莫甚乎以一國畏矣寇至不能禦去又不敢及是舉百姓而棄之者也豈為民父母之道哉趙氏曰寇至不知追而不及言内之無戒警胡氏曰書人書侵書師罪齊也書追書至酅弗及罪魯也潛師入境曰侵少則稱人衆則稱師前書齊人是見其弱以誘魯也後書齊師是伏其衆以邀魯也其為諼明矣凡書追者在境内則譏其不預追戎于濟西是也在境外則譏其深入追齊師至酅是也酅者齊地至者言逺也弗者遷辭也有畏而弗敢及之也齊魯皆私憤之兵而非正也故交譏之夏齊人伐我北鄙家氏曰春而侵我西鄙公追之而不敢及蓋為齊人所侮故又興北鄙之師魯之君臣專事畏縮國之不競良有以也衞人伐齊洮之盟故也公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱于敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如懸罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還髙氏曰衞人伐齊之䘮助少陵長遷怒于邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衞也齊人以是加兵于魯至是衞以齊嘗與邢狄謀已故乘其勞困而伐之亦所以救魯也公子遂如楚乞師東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也張氏曰僖公初年頗有意于治國務農閔雨國以殷富中年以来漸肆荒怠初附齊桓浸失政于大臣齊桓既没不及閒暇修明政刑民事既荒國僃不立齊人再伐已不能支而逺乞師于楚人春秋特書如楚乞師深罪為國之無謀也泰山孫氏曰齊再伐我故公子遂如楚乞師夫國之大小師之衆寡皆有王制不可乞也書之惡魯不能内修戒僃而外乞師于楚人髙氏曰楚南蠻也齊中國也中國而相侵伐不過以禮義相責亷耻相厲耳魯君見侵于齊不治其禮義之所不至而使之不來乃使其臣乞師于夷狄是不有天子而導楚人以伐中國也以亂常僣號之楚人而伐中國此天下之大變春秋之所謹也聖人不敢斥言公而以公子遂如楚乞師者罪遂之乞師乃所以湥罪公也秋楚人滅夔以夔子歸夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉楚成得臣鬬宜申帥師滅夔以夔子歸劉氏意林曰國滅而虜無不名者國滅罪也虜服辱也而夔何以獨不名夔之所以取滅者乃非其罪故假之也夔曰我先君熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉者楚祖鬻熊夔祖熊摯是不得祀者也諸侯之祀無過其祖者夔子可謂若于義矣而楚反以是滅之春秋以謂非其罪也故黜楚而伸夔夔雖不幸而實無負于義有王者作興滅國繼絶世則夔庶幾矣冬楚人伐宋圍緡宋以其善于晉侯也叛楚即晉楚令尹子玉司馬子西帥師伐宋圍緡髙氏曰魯乞師于楚楚自謂可以得志于中國欣然為之出師于是滅夔過宋境則又伐宋而圍緡也楚于是輕用其師矣魯一乞師而二國先受其害如此夫宋自泓之敗不復與楚争衡今楚以其不附已而又討之故書伐書圍以見楚人之恣横公以楚師伐齊取榖公至自伐齊寘桓公子雍于穀易牙奉之以為魯援楚申公叔侯戍之桓公之子七人為七大夫于楚髙氏曰齊人加兵于魯魯欲報之當請命于天子㑹諸侯以同討其罪夫楚豺狼也安可逺召其師来入華夏以伐親隣之國乎胡氏曰楚强魯弱而能用其師進退在已故特書曰以以者不以者也夫背親即疎取人之邑為已有失正甚矣患之起必自此始謝氏曰以楚師伐齊以僣亂之衆伐甥舅也以楚師取穀以奪邑之利示僣亂之衆也使中國宼攘日滋必始于此矣無晉文復興于後則中國將胥為楚也二十有七年春把子来朝公卑杞杞不共也髙氏曰杞子魯甥也自莊二十七年来朝後不復與我通自城緣陵之後亦莫與諸侯㑹蓋習于淮夷甚矣家氏曰二十三年杞子卒書曰杞子夷也杜氏謂成公始行夷禮故于其卒貶之今而来朝則成之子也亦書子傳又曰用夷禮故曰子秋而入之又曰責無禮也用夷禮而夷之固春秋垂世之法杞二王後公也入春秋稱侯莊二十七年稱伯至此又貶而稱子百年之間凡四貶爵獨于一杞見之此經疑也姑存以俟攷夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入把責無禮也髙氏曰責其朝禮之不共豈不愈于不朝乎又豈可以其来朝而反用師以報之乎况把魯乃舅甥之國而伯姬在焉魯人不義甚矣張氏曰人方来朝而帥師入之以怨報徳所謂欲加之罪何患無辭冬楚人陳侯蔡侯鄭伯許男圍宋十有二月甲戌公㑹諸侯盟于宋楚子將圍宋使子文治兵于暌終朝而畢不戮一人子玉復治兵于蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蔿賈尚幼後至不賀子文問之對曰不知所賀子之傳政于子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣茍入而賀何後之有楚子及諸侯圍宋穀梁氏曰楚人者楚子也其曰人何也人楚子所以人諸侯不正其信楚人而伐中國也髙氏曰夫楚以僣竊恣豺狼之强来犯中國而陳蔡鄭許皆中國之諸侯反㑹楚人同伐之伸楚人之强屈中國之義故書楚與四國之君圍宋以罪之若書楚子則四國之惡不著故書楚人于四君之上則四國從楚人圍中國之罪昭然可見矣胡氏曰公與楚結好故往㑹盟其地以宋者宋方見圍無嫌于與盟而公之罪亦著矣張氏曰猶曰㑹諸侯不曰㑹楚使公從楚之罪必待考而後見聖人之忠厚春秋之㣲婉也家氏曰此楚伐也而中國諸侯與之俱伐楚㑹也而中國之諸侯皆與于㑹中國之耻也春秋之法盟主爵而諸侯人者有矣未有盟主人而諸侯爵者也人楚子而爵諸侯不與楚子以主中夏之盟也亦以正諸侯從楚之罪也雖然楚始㑹諸侯伐國而晉文之霸業興矣蓋泓敗之明年而文公入于晉楚圍陳之明年而文公以兵勤王威聲氣焰已動于海内楚之君臣頑㝠不靈猶謂霸功可以力致遂㑹諸侯圍宋以為宋亡而海内無復可霸之國孰知宋圍方急晉救旋至反以是開文公之霸業乎嗚呼周室不競天開二霸以整齊中原脫斯民于左袵齊桓基之于前晉文繼之于後天實為之豈人力所能致哉二十有八年春晉侯侵曹晉侯伐衞二十七年宋公孫固如晉告急先軫曰報施救患取威定霸于是乎在矣狐偃曰楚始得曹而新昬于衞若伐曹衞楚必救之則齊宋免矣于是乎蒐于被盧作三軍謀元帥乃使郤縠將中軍郤溱佐之使狐偃將上軍讓于狐毛而佐之命趙衰為卿讓于欒枝先軫使欒枝將下軍先軫佐之荀林父御戎魏犫為右晉侯始入將用其民于是乎出定襄王以懐民生伐原以示之信大蒐以示之禮作執秩以正其官民聽不惑而後用之出穀戍釋宋圍一戰而霸文之教也至是將伐曹假道于衞衞人弗許還自南河濟侵曹伐衞正月戊申取五鹿二月晉郤縠卒原軫將中軍胥臣佐下軍上徳也晉侯齊侯盟于歛盂衞侯請盟晉人弗許衞侯欲與楚國人不欲故出其君以説于晉衞侯出居于襄牛胡氏曰初公子重耳之出亡也曹衞皆不禮焉至是侵曹伐衞再稱晉侯譏復怨也樸鄉吕氏曰晉文初見即書晉侯予霸之辭也先是晉文公過曹衞曹衞不禮焉則侵曹伐衞者所以討無禮也然觀春秋書此曰晉侯侵曹曰晉侯伐衞特出晉爵而不厭其辭之繁則知其予霸之辭也若是修怨之辭聖人必畧其事矣家氏曰侵曹伐衞以救宋也不言救宋其事闗係乎中國甚大非特救宋而存宋也愚謂純乎天理之公而絶無人欲之私者王者之道也假乎天理之公而雜以人欲之私者霸者之事也况晉文又霸之譎而不正者乎今以傳考之方宋人告急狐偃言于文公曰楚始得曹而新昬于衞若伐曹衞楚必救之齊宋免矣則是舉也為霸討明矣然以衞侯請盟晉人不許觀之則報怨之心亦不能無焉蓋因侵曹伐衞以成救宋之功而曹衞之不禮亦因以報焉所謂假乎天理之公而雜以人欲之私者也雖然春秋所書蓋以事功言之而許其為霸爾非原其事而貶其修怨也故予其爵而重書之所謂其中有大美者也或曰齊桓公亦霸也春秋書人乆之伐楚之後始進而書爵今晉一舉即予其爵何也齊桓創霸故其事難成晉文繼霸故其功易就春秋因其事功之成就而予之豈計其難易先後哉公子買戍衞不卒戍刺之公羊氏曰内諱殺大夫謂之刺也杜氏曰内殺大夫皆書刺言用周禮三刺之法示不枉濫也劉氏權衡曰傳謂公懼于晉殺子叢以説焉然則魯妄以罪惡誣殺買耳非買之實不戍也則春秋曷為遂從其誣辭直以不卒戍罪買哉疑買見機設權不卒戍事而公貪與楚歡遂以不卒戍罪買不復計其權也按此經殺公子買畢楚人乃救衞而傳云楚人救衞不克公乃殺子叢與經相背其言詎可信哉意林曰買貴矣率師以戍諸侯何以不書耶然則買自不得書者也買受命而出在疆外矣進退得專之欲權宜以避晉難故不卒戍也可謂識變矣而魯反誅之魯之脅於强楚不察忠臣之心甚矣故春秋憫而進之以此不然買之往何以不書耶胡安定先生曰公叛晉與楚故使公子買戍衞且晉之兵力非買之所抗也故不卒戍而歸公聞楚人救衞懼其見討故殺買以悦楚僖公内殘骨肉外悦强楚其惡可知胡氏曰刺未有書其故者而以不卒戍刺之則知買為無罪矣孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙今乃殺無罪之士將以茍悦于强國于是乎不君矣故特書其故以貶也楚人救衞陳氏曰楚嘗救鄭矣不書于是始書救為晉人之霸楚欲救之而不能也家氏曰書救有二有善其能救者有不與之以救者中國諸侯見侵于强暴盟主救之春秋之所善也中國諸侯叛而黨外盟主伐之其黨救之非春秋所善也楚自去年帥諸侯圍宋將為必取之計晉文公起而圖之侵曹伐衞皆所以救宋也春秋不以救宋書者為文公此舉闗乎中夏存亡盛衰救宋不足以盡之耳晉不書救而楚之于衞乃以救書夫豈善楚之能救衞乎愚按春秋書救未有不善之者也故議者謂救者在外則罪中國今楚救衞所謂救者在外者也獨以為非善之何也蓋救者善則伐者惡伐者善則殺者惡矣晉伐衞討其從楚之罪也所謂伐之善也楚人救之黨其從楚之人耳非有救災恤患之心也安得為救之善乎然則春秋何以書其救所以見晉之伐其必救制之得其道能致城濮之戰而成服楚之功也豈可與其他書救例觀哉故曰屬辭比事春秋教也三月丙午晉侯入曹執曹伯畀宋人晉侯圍曹門焉多死曹人尸諸城上晉人患之聽輿人之謀曰稱舍于墓師遷焉曹人凶懼為其所得者棺而出之因其凶也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也魏犨顛頡怒曰勞之不圖報于何有爇僖負羈氏魏犨傷于胷公欲殺之而愛其材使問且視之病將殺之魏犨束胷見使者曰以君之靈不有寜也距躍三百曲踊三百乃舍之殺顛頡以狥于師立舟之僑以為戎右宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衞之田以賜宋人楚愛曹衞必不許也喜賂怒頑能無戰乎公説執曹伯分曹衞之田以畀宋人髙氏曰十九年宋襄公圖霸首㑹諸侯于曹南而曹先背之襄公自是不得志于諸侯及盂之㑹楚人執宋公以伐宋而曹伯實與焉故晉侯行霸而首先為宋加兵于曹既入其國遂執曹伯以畀宋人畀宋人者亦所以致楚師且以宋連年困于楚欲連宋兵使之同致力于楚也張氏曰自晉侯侵曹至此皆春秋著文公致楚與戰之由也謝氏曰凡執諸侯及大夫皆奪爵稱人晉侯因入書執而不曰人者文繼上事不可復稱某人故也晉文之侵曹也曹人不服故文公入曹執共公以畀宋人楚嘗伐宋圍宋曹嘗與楚執宋公然則以共公畀宋將以激楚也入其國執其君執不以罪而以激楚執之不以歸王而以畀宋書執曹伯著其服人以力也書畀宋人著其譎而不正也胡氏曰曹伯羸者未狎晉政莫知所承晉文不修辭令遽入其國既執其君又分其田暴矣欲致楚師與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主夏盟舉動不中乎禮亦多矣其功雖髙道不足尚也故曰五伯三王之罪人仲尼之徒無道桓文之事者夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績楚子入居于申使申叔去穀使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難僃嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎軍志曰允當則歸又曰知難而退又曰有徳不可敵此三志者晉之謂矣子玉使伯棼請戰曰非敢必有功也願以閒執讒慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告于晉師曰請復衞侯而封曹臣亦釋宋之圍子犯曰子玉無禮哉君取一臣取二不可失矣先軫曰子與之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何楚有三施我有三怨怨讐已多將何以戰不如私許復曹衞以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春于衞且私許復曹衞曹衞告絶于楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在乆乎微楚之惠不及此退三舍辟之所以報也背惠食言以亢其讐我曲楚直其衆素飽不可謂老我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憗次于城濮楚師背酅而舍晉侯患之聽輿人之誦曰原田毎毎舍其舊而新是謀公疑焉子犯曰戰也戰而㨗必得諸侯若其不㨗表裏山河必無害也公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之思小惠而忘大耻不如戰也晉侯夢與楚子搏楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏其罪吾且柔之矣子玉使鬬勃請戰曰請與君之士戲君慿軾而觀之得臣與寓目焉晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣敢煩大夫謂二三子戒爾車乘敬爾君事詰朝相見晉車七百乘韅靷鞅靽晉侯登有莘之墟以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉侯陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而偽遁楚師馳之原軫郤溱以中軍公族横擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館穀及癸酉而還壬午濟河舟之僑先歸士㑹攝右秋七月丙申振旅愷以入于晉獻俘授馘飲至大賞徵㑹討貳殺舟之僑以狥于國民于是大服胡安定先生曰往者齊桓既死楚人復張猖狂不道欲宗諸侯與宋並爭欲取宋者數矣天下諸侯無敢與楚抗者晉文一出討逆誅亂以三國之師敗得臣于城濮自是楚人逺屏不犯中國十五年從簡書救中國之功可謂不旋踵而見春秋最美文公以其有城濮之戰也師氏曰晉書爵貴善圖霸也于齊宋秦書師明晉侯之善得衆而来助者不一也胡氏曰楚稱人貶也戰而言及主乎是戰者也當此時晉師避楚三舍請戰者得臣也而經之書及何以在晉得臣雖從晉師然初告于晉曰請復衞侯而封曹臣亦釋宋之圍是未有必戰之意也及先軫獻謀許復曹衞以攜其黨拘宛春以激其怒而得臣之意决矣故楚雖請戰而及在晉侯誅其意也荆楚恃强慿陵諸夏滅黄而霸主不能恤敗徐于婁林而諸侯大夫不能救執中國盟主而在㑹諸侯不敢與之爭今又戍穀逼齊合兵圍宋戰勝中國威動天下非有城濮之敗則周鼎且遷于楚宜有美辭以揚其績而春秋所書如此其畧何也仁人明其道不計其功正其義不謀其利文公一戰勝楚遂主夏盟以功利言則髙矣語道義則三王之罪人也仲尼雖老于行而不悔其有以夫髙氏曰楚子知得臣不可使也而不能不使知晉侯不可敵也而不能不敵是恃其强衆自取其敗績也董仲舒曰戰不若不戰然而有所謂善戰盟不若不盟然而有所謂善盟故城濮之戰召陵之盟皆春秋之所許者以其俱有尊中國之功也樸鄉吕氏曰齊桓之楚雖曰猾夏然未至偃然與中國並驅争先也故齊桓猶可以徐為之謀晉文之楚則執中國盟主而在㑹者不敢與之争故晉文不得不速與之戰召陵之盟一得屈完之盟而退師城濮之役不致于楚師敗績不已蓋桓公之所為將以服强楚之心而文公之舉事所以挫强楚之氣也二公所遇之敵不同故其用計亦異而立功之緩急亦如之其有功于中國則一也然嘗思之則有以見齊桓之正而晉文之譎何也召陵之師規模既定區處既當聲其罪而伐之楚亦屈服而不敢校此正也晉文欲救宋而侵曹伐衞此固兵計之所當然又懼楚之遽退師也于是為之執曹伯以畀宋人楚方愛曹而惡宋其肯遽退師乎迨子玉使宛春告晉以釋曹衞則又私許復曹衞而執其使者楚怒于使者之見執也能不請戰乎及其將戰則又避楚三舍名曰報施實則示怯以誘子玉也子玉剛而無禮喜晉之怯能不進戰乎一致師之間而其詭計如此孔子斷以一言而謂之譎豈不信哉然則城濮之戰春秋固與其功而無取其道也齊桓公三十年而後有召陵之盟葵丘之㑹晉文公霸者之事為之畧盡皆在十一年之間故齊桓猶有近正之意晉文則太譎矣齊桓猶有近厚之心晉文則太迫矣朱子曰文公伐衞以致楚隂謀以取勝其譎甚矣楚殺其大夫得臣子玉既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連穀而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉已而已不在民矣臨江劉氏曰稱國以殺大夫罪累上也此殺有罪其以累上之辭言之何惡楚子也楚子知其不可使也而不能勿使知其不可敵也而不能勿敵是亦棄其師之道也師氏曰書師敗績繼書殺大夫得臣以著楚子不能自責全歸過于得臣不勝其忿也髙氏曰晉文公聞其死而後喜可知曰莫余毒也已蓋其為中國之害如此今以敗績自殺則中國之害除其一矣然聖人以公恕待天下豈若樂禍幸災者哉故以諸侯專殺大夫之例書之以待吾中國諸侯者而待楚人是乃所以正其狂僭之罪也胡氏曰夫得臣信有罪矣而楚子知其不敵不能使之勿敵而少與之師又以一敗殺之是以師為重而棄其將以與之也是晉再克而楚再敗也故稱國以殺而不去其官以仲尼書鄭棄其師與楚得臣之事觀之可為來世之永鑒矣衞侯出奔楚衞侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟胡氏曰諸侯失國出奔未有不名者衞侯何以不名著文公之罪也衞侯失守社稷背華即夷于文公何罪乎衞之禍文公為之也初齊晉盟于歛盂衞侯請盟晉人不許是塞其向善之心雖欲自新其道無由也向使文公釋怨許衞結盟南向諸侯棄楚而歸晉矣忿不思難惟怨是圖必使衞侯竄身無所奔于荆蠻歸于京師兄弟相殘君臣交訟誰之咎也夫心不外者乃能統大衆智不鑿者乃能處大事文公欲主夏盟取威定霸而舉動煩擾若不勝任惟鑿智自私而心不廣也春秋于衞侯失國出奔不以其罪名之重文公之咎蓋端本議刑責僃賢者之意也五月癸丑公㑹晉侯齊侯宋公蔡侯鄭伯衞子莒子盟于踐土甲午至于衡雍作王宫于踐土鄉役之三月鄭伯如楚致其師為楚師既敗而懼使子人九行成于晉晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍丁未獻楚俘于王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎内史叔興父策命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受策以出出入三覲癸亥王子虎盟諸侯于王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而𤣥孫無有老幼謝氏曰衞子成公弟叔武晉文既逐成公乃立叔武主衞叔武稱子以未逾年君目之成公義不絶於國文公以私忿逐之立衞子非正也書衞子罪其專廢立也胡氏曰踐土之㑹天王下勞晉侯削而不書何也周室東遷所存者號與祭耳其實不及一小國之諸侯晉侯之爵雖曰侯伯而號令天下幾于改物實行天子之事此春秋之名實也與其名存實亡猶愈于名實俱亡是故天王下勞晉侯于踐土則削而不書去其實以全名所謂君道也晉侯以臣召君則書天王狩于河陽正其名以統實所謂臣道也而天下之大倫尚存不滅矣張氏曰聖人于易坤五爻繫之辭曰黄裳元吉謂必得中居下則大善之吉也文公于勝楚之後即帥諸侯朝天子然後受侯伯錫命對揚之䇿大輅戎輅彤弓虎賁之賜乃合于在師中吉而當三錫之命以懐服萬邦即所謂黄裳元吉得坤徳之正矣文公負震主之威不帥諸侯朝王而致天子屈尊下勞失正位居體之道非所以正天下大分若書天王下勞而列踐土之盟則尊卑倒置綱常易矣故即其可書者記之而天王下勞没而不書以示天下之大訓也陳侯如㑹公羊氏曰其言如㑹何後㑹也杜氏曰来不及盟故曰如㑹師氏曰謂之如㑹言出于自然非晉强之也謝氏曰晉文却强楚尊王室諸侯皆聽命于晉故八國㑹踐土為盟陳雖與楚以王命之重諸侯畢至穆公不待徵召亦如㑹從盟書陳侯如㑹以示人心樂於從王也使文公有尊周之實則王室安有不興者哉公朝于王所穀梁氏曰朝不言所言所非其所也謝氏曰天王所在曰王所踐土之㑹襄王往勞文公晉為王築宫踐土因率諸侯朝焉故踐土稱王所踐土密邇王室朝于王所而不于京師文公失事王之道也陳氏曰外朝王不書書魯以見其餘也髙氏曰天子不下堂而見諸侯今乃出王畿以從諸侯之㑹尊卑倒置不可以訓故但書公朝于王所而知天子之在是矣程子曰古者諸侯以時朝聘于天子天子以時聘問于諸侯故上下交泰尊卑有禮而天下治春秋之世王室㣲弱諸侯莫有事君以禮者矣以二百四十二年之間書公如京師者一公朝于王所者二而已且所書成公十有三年春晉侯使郤錡来乞師三月公如京師五月公自京師遂㑹晉侯伐秦七月公至自伐秦蓋成公之行實㑹晉伐秦因道京師而名曰朝王聖人于魯事有君臣之義常遷就而為之辭然不書曰朝且考其前後所書亦以見意也僖公二十八年天王勞晉侯於踐土晉侯召王之河陽兩書公朝于王所不書諸侯而獨書公又曰朝于王所則不成朝可知矣魯既無朝王之禮而臣如京師者又止有五書不曰聘則不成聘亦可知僖三十年公子遂之行復遂如晉非專使也天王使宰周公来聘而使遂往又遂如晉不敬莫大焉魯之于王皆不足以成朝聘之禮而天王使来聘者反有七焉王者微弱諸侯不臣舉魯一國則天下諸侯可見也胡氏曰古者天王巡狩于四方有常時諸侯朝于方嶽有常所其宫室道途可以預修故民不勞其供給調度可以預僃故國不費今天王下勞晉侯公朝于王所則非其時與地矣自秦而後巡逰無度至有長吏以倉卒不辦被誅民庻以煩勞不給生厭蓋春秋之義不行故也然則天子在是可以不朝乎天子在是而諸侯就朝禮之變也春秋不以諸侯就朝為非而以王所非其所為貶正其本之意也六月衞侯鄭自楚復歸于衞衞元咺出奔晉或訴元咺于衞侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衞侯甯武子與衞人盟于宛濮曰天禍衞國君臣不協以及此憂也今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也明神先君是糾是殛國人聞此盟也而後不貳衞侯先期入公子歂犬華仲前驅叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之歂犬走出公使殺之元咺出奔晉樸鄉吕氏曰書歸之義有二書其所自者著之也不書其所自者畧之也衞侯自楚歸于衞言歸自楚則棄順效逆之罪見矣胡氏曰衞侯名以殺叔武也初歸稱復再歸不稱復此春秋立法甚嚴而待人以恕鄭初歸殺叔武既名之猶意其或出于誤而能革也及其再歸又殺元咺及公子瑕則是終以争國竟不悛矣故不稱復諸侯嗣故稱復者繼之也不稱復者絶之也而國非其國矣師氏曰晉㑹諸侯盟于踐土元咺嘗奉衞子以與㑹盟及衞侯復歸元咺慮以奉衞子之故得罪衞侯于是出奔以避之然不奔他國必奔于晉者以前奉衞子之事告于晉髙氏曰夫為臣而訴其君可乎晉人執衞君歸之于京師為是故耳陳侯欵卒秋把伯姬来胡安定先生曰無故而来書之以著其非禮公子遂如齊髙氏曰晉侯既霸諸侯皆通好故復與齊平也許氏曰志伐齊之讐解也齊自孝公之立與魯好絶比相侵伐昭公元年復與公同踐土之盟故公遣大夫聘之修舊好焉冬公㑹晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于温討不服也髙氏曰温之㑹晉侯實以朝王為名而合諸侯然不能朝于京師乃召王以就諸侯故先為此㑹以待天王之至于是秦人始與中國之㑹故序在諸侯之下陳共公未葬先公而出㑹故稱子獨衞侯不與㑹者晉聽元咺之訟不使之與㑹也天王狩于河陽是㑹也晉侯召王以諸侯見且使王狩程子曰晉文公欲率諸侯以朝也懼其不能而召王就見之人見其召王之罪不明其欲朝之本心是以譎之掩其正也聖人伐其心迹顯晉文覲王之志且使後世之君知所行之不正則無以明其心當慎其所行也程氏學曰河陽之行非巡狩也晉文召之也而聖人特書天王狩于河陽所以伸天子之勢抑晉侯之不臣也胡氏曰踐土之㑹王實自往非晉罪也故為王諱而足矣温之㑹晉則有罪而其情順也故既為王諱之又為晉觧之于以見春秋忠恕也愚謂使王狩者晉侯譎詐之舉所以為不臣之罪天王狩于河陽者春秋正大之辭所以明尊君之義家氏曰齊桓㑹王世子于首止猶曰吾以尊王室也孰知繼桓而霸者遂至屈天王之尊就而朝焉蓋㑹世子不已必至召王積習之漸使之然耳壬申公朝于王所穀梁氏曰日繫于月月繫于時壬申公朝于王所其不月失其所繫也以為晉文之行事已傎矣杜氏曰壬申十月十日有日無月史闕文晉人執衞侯歸之于京師髙氏曰衞侯背華即夷雖曰有罪然晉侯既勝楚則宜招攜撫貳以崇大徳反聽元咺之訟執人之君于天子側直其臣而曲其君此非所以宗諸侯也故貶而人之程子曰歸于者順易之辭歸之于者强歸之辭也古者君臣無獄而文公惡衞侯使與元咺辨曲直衞侯不勝遂刑其大夫執其君其聽頗矣雖歸于王而實强致之故曰歸之于京師也謝氏曰衞成復歸殺衞子叔武大夫元咺以叔武訟于晉故晉文執衞侯然成公非有虐民大罪也非有不可容之大惡也晉文遽以兵威逼而絶之其出奔也即以衞子為君其復歸也即以元咺之訟執之衞子主國非正也元咺訟君非忠也逐人之君而立其臣黨人之臣而執其君失方伯治罪之義矣雖曰執而歸王何以服諸侯之心哉故成公雖失國出奔不名見執復不名以示義不當絶也衞元咺自晉復歸于衞衞侯與元咺訟衞侯不勝執衞侯歸之于京師寘諸深室甯子職納槖饘焉元咺歸于衞立公子瑕髙氏曰為人臣而訟其君雖直亦曲矣晉侯聽其臣子之訟而執其君非霸者所以靖亂之義也書曰自晉晉侯之罪亦已明矣衞侯執而元咺歸故書復歸以見其罪何則諸侯失國而復歸正也諸侯世也大夫失位而復歸非正也大夫不世也故大夫復者位已絶矣謝氏曰元咺以臣訟君衞之大逆也晉文不道使咺復以臣子歸國書復歸明其罪大以絶于國為天吏者在所誅絶也自晉侯伐衞君以逐臣見執臣以訟君復歸使君臣相抗更主衞國誅釋廢置之柄亂矣衞之禍晉為之也故元咺出書衞歸書衞以著咺之專國也出奔書晉歸書自晉以著晉之病衞也師氏曰先書晉人執衞侯繼書元咺自晉歸似言晉之執衞侯止為元咺設耳豈有為人臣来奔而執其君以歸其臣耶諸侯遂圍許胡安定先生曰此㑹温之諸侯也公羊氏曰遂繼事也謝氏曰晉文以尊周之命率諸侯朝王臣子之大義也許獨違命不從罪矣為盟主而不以禮信結諸侯許再不至奉辭伐之可也乃恃衆挟𫝑圍以迫之諸侯之失于是乎在故書遂圍以譏其甚焉曹伯襄復歸于曹遂㑹諸侯圍許晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為㑹而封異姓今君為㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衞偕命而不與偕復非信也同罪異罰非刑也禮以行義信以守禮刑以正邪舍此三者君將若之何公説復曹伯遂㑹諸侯圍許師氏曰曹伯方執不名而復歸書名原始要終或譏晉侯或罪曹伯各有攸當也曹伯復歸之後欲革前此背中國之非鋭意從諸侯以圍許書遂㑹諸侯圍許著曹伯畏晉不敢後也陳氏曰執君不名歸然後名之執書曹伯歸書曹伯襄名之者亦失國之辭也謝氏曰衞侯出奔不名歸國稱名稱復歸曹伯見執不名歸國稱名稱復歸其義一也胡氏曰曹伯以賂歸國春秋名之比于失地滅同姓之罪以此知聖人嚴性命之理其説行而天下定矣豈曰小補之哉春秋闕疑卷十七
