body:
  text: 春秋闕疑卷三十四元鄭玉撰昭公公名裯襄公之子景王四年即位諡法威儀恭明曰昭元年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱宋向戌衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢楚公子圍聘于鄭且娶于公孫段氏伍舉為介將入館鄭人惡之使行人子羽與之言乃館于外既聘將以衆逆子産患之使子羽辭曰以敝邑褊小不足以容從者請墠聽命令尹命大宰伯州犂對曰君辱貺寡大夫圍將使豐氏撫有而室圍布几筵告于莊共之廟而來若野賜之是委君貺于草莽也是寡大夫不得列于諸卿也不寧唯是又使圍蒙其先君將不得為寡君老其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪將恃大國之安靖已而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼不然敝邑館人之屬也其敢愛豐氏之祧伍舉知其有備也請垂櫜而入許之正月乙未入逆而出遂會于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志于晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱于諸侯猶詐晉而駕焉况不信之尤者乎楚重得志于晉晉之恥也子相晉國以為盟主于今七年矣再合諸侯三合大夫服齊狄寧東夏平秦亂城淳于師徒不頓國家不罷民無謗讟諸侯無怨天無大災子之力也有令名矣而終之以恥午也是懼吾子其不可以不戒文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕于晉也今武猶是心也楚又行僭非所害也武將信以為本循而行之譬如農夫是穮是蓘雖有飢饉必有豐年且吾聞之能信不為人下吾未能也詩曰不僭不賊鮮不為則信也能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而已晉人許之三月甲辰盟楚公子圍設服離衛叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宫有前不亦可乎楚伯州犂曰此行也辭而假之寡君鄭行人揮曰假不反矣伯州犂曰子姑憂子晳之欲背誕也子羽曰當璧猶在假而不反子其無憂乎齊國子曰吾代二子愍矣陳公子招曰不憂何成二子樂矣衛齊子曰茍或知之雖憂何害宋合左師曰大國令小國共吾知共而已晉樂王鮒曰小旻之卒章善矣吾從之退會子羽謂子皮曰叔孫絞而婉宋左師簡而禮樂王鮒字而敬子與子家持之皆保世之主也齊衛陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之三大夫兆憂憂能無至乎言以知物其是之謂矣髙氏曰宋之盟齊人不與今齊又從楚矣中國微弱可知也莒人弒君諸侯不共討之者是時楚人方聽莒人之訴而欲執魯大夫是不以莒人為可討也春秋不書莒人蓋斥之爾家氏曰春秋為中國惜不使夷得以僭華是故長晉三月取鄆季武子伐莒取鄆莒人告于會楚告于晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子相趙文子欲求貨于叔孫而為之請使請𢃄焉弗與梁其脛曰貨以藩身子何愛焉叔孫曰諸侯之會衛社稷也我以貨免魯必受師是禍之也何衛之為人之有牆以蔽惡也牆之隙壞誰之咎也衛而惡之吾又甚焉雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也謀主三者義也有是四者又何戮乎乃請諸楚曰魯雖有罪其執事不避難畏威而敬命矣子若免之以勸左右可乎若子之羣吏處不辟汚出不逃難其何患之有患之所生汚而不治難而不守所由來也能是二者又何患焉不靖其能其誰從之魯叔孫豹可謂能矣請免之以靖能者子會而赦有罪又賞其賢諸侯誰不欣焉望楚而歸之視逺如邇疆場之邑一彼一此何常之有王伯之令也引其封疆而樹之官舉之表旗而著之制令過則有刑猶不可一于是乎虞有三苗夏有觀扈商有姺邳周有徐奄自無令王諸侯逐進狎主齊盟其又可一乎恤大舍小足以為盟主又焉用之封疆之削何國蔑有主齊盟者誰能辨焉吳濮有釁楚之執事豈其顧盟莒之疆事楚勿與知諸侯無煩不亦可乎莒魯爭鄆為日久矣茍無大害于其社稷可無亢也去煩宥善莫不競勸子其圖之固請諸楚楚人許之乃免叔孫叔孫歸曾天御季孫以勞之旦及日中不出曾夭謂曾阜曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其內焉用之阜曰數月于外一旦于是庸何傷賈而欲贏而惡囂乎阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之家氏曰鄆有東西之異文十二年城諸及鄆者魯鄆也成九年楚人入鄆襄十二年季孫宿救台入鄆者莒鄆也蓋救台入鄆之時欲取之而未得至是遂取之程子曰乘莒之亂而取之故隱避其辭胡氏曰不曰伐莒取鄆為內諱也髙氏曰魯乘莒之亂而取鄆聖人直言之其辭雖略而惡有餘也夏秦伯之弟針出奔晉秦后子有寵于桓如二君于景其母曰弗去懼選五月癸卯針適晉其車千乘后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問曰子之車盡于此而已乎對曰此之謂多矣若能少此吾何以得見女叔齊以告公且曰秦公子必歸臣聞君子能知其過必有令圖今圖天所贊也后子見趙孟趙孟曰吾子其曷歸對曰針懼選于寡君是以在此將待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也國于天地有與立焉不數世淫弗能斃也趙孟曰天乎對曰有焉趙孟曰其幾何對曰針聞之國無道而年榖和熟天贊之也鮮不五稔五年秦后子復歸于秦景公卒故也榖梁氏曰諸侯之尊兄弟不得以屬通其弟云者親之也親而奔之惡也公羊氏曰有千乘之國而不能容其母弟故君子謂之出奔也胡氏曰后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶沒身敬之不衰况兄弟乎兄弟翕而後父母順矣謝氏曰景公有千乘之國而不能庇一弟者失親親之道也若舜焉親之使貴愛之使富又使不得有為于其國則又安有母弟出奔之患哉家氏曰夫以千乘之國而區區母弟以車多伉其君針之汰亦甚矣書秦伯之弟出奔晉不惟譏秦伯亦貶針也其母使之奔母亦智矣使如叔段之母則亂作于內誅不旋踵其所以卒得反國由母賢故爾六月丁巳邾子華卒晉荀吳帥師敗狄于大鹵晉中行穆子敗無終及羣狄于大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍荀吳之嬖人不肯即卒斬以徇為五陳以相離兩于前伍于後專為右角參為右角偏為前拒以誘之翟人笑之未陳而薄之大敗之胡氏曰大鹵太原也按六月宣王北伐之詩其詞曰薄伐玁狁至于太原而詩人美之者謂不窮追逺討及封境而止也然則太原在禹服之內而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘狄人而敗之非王者之師耳使後世車戰法亡崇尚步卒爭以變詐相髙日趨茍簡皆此等啓之矣秋莒去疾自齊入莒莒展輿出奔吳莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔吳程子曰去疾假齊之力以入莒討展輿之罪正也故稱莒遂自立無所稟命故不稱公子展輿為弒君者所立而以國氏者罪諸侯之與其立也謝氏曰展輿為弒人所立受弒人立展輿之罪也故出奪爵稱名展輿雖有罪然非去疾可逐去疾以王命討逆則可以爭國逐展輿則不可為去疾者非有臣子討逆之心也特以公子當立恃齊威力起而爭位故反國奪公子稱人入稱自齊責去疾之亂也叔弓帥師疆鄆田因莒亂也趙氏曰凡疆田而有帥師者皆有難也趙氏曰帥師疆鄆田則魯人以不道侵莒封疆亦可知矣師氏曰取鄆不書帥師而疆田書之于以見取出于莒人之不意故得之也易慮莒人既悟而有復爭之心故疆之也難夫以非分之田而已則出人之不意以取之既得而又恃徒衆以疆之天下又安得有一定之經界豈不紛紛大亂耶書之者為名分以致其嚴也葬邾悼公冬十有一月己酉楚子麇卒楚公子比出奔晉楚公子圍使公子黑肱伯州犂城犨櫟郟子産曰不害令尹將行大事而先除二子也禍不及鄭何患焉冬楚公子圍將聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而殺之遂殺其二子幕及平夏右尹子干出奔晉宫廄尹子晳出奔鄭殺大宰伯州犂于郟葬王于郟謂之郟敖使赴于鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長子干奔晉從車五乘叔向使與秦公子同食皆百人之餼趙文子曰秦公子富叔向曰底祿以德德鈞以年年同以尊公子以國不聞以富且夫以千乘去其國強禦已甚詩曰不侮鰥寡不畏強禦秦楚匹也使后子與子干齒辭曰針懼選楚公子不獲是以皆來亦唯命且臣與羇齒無乃不可乎大東萊吕氏曰經書楚子麇卒而左氏以為公子圍弒之至誅慶封則左氏榖梁又載慶封稱圍弒君之語後世緣楚王汰侈遂以為實甚矣三傳之為經害也家氏曰麇疾革圍聞其將死自外急歸乘君之殯戕其子而篡其位是亦弒也而非弒麇當時諸國傳聞之誤有以為弒麇者耳不然圍之罪當顯著于春秋何以不正其弒君之戮而以卒書乎二年春晉侯使韓起來聘晉侯使韓宣子來聘且告為政而來見禮也觀書于太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也公享之季武子賦綿之卒章韓子賦角弓季武子拜曰敢拜子之彌縫敝邑寡君有望矣武子賦節之卒章既享宴于季氏有嘉樹焉宣子譽之武子曰宿敢不封殖此樹以無忘角弓遂賦甘棠宣子曰起不堪也無以及召公宣子遂如齊納幣小東萊吕氏曰此可見君弱臣強之漸春秋時諸侯即位則告政于鄰國且繼舊好也宣子晉之大夫為政之初乃行諸侯朝聘之禮禮樂自諸侯出故夫夫得以僭諸侯夏叔弓如晉報宣子也晉侯使郊勞辭曰寡君使弓來繼舊好固曰女無敢為賓徹命于執事敝邑𢎞矣敢辱郊使請辭致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也辭不忘國忠信也先國後己卑讓也詩曰敬慎威儀以近有德夫子近德矣秋鄭殺其大夫公孫黑元年鄭徐吾犯之妹薑公孫楚聘之公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請于二子請使女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也乃執子南而數之曰國之大節有五女皆姦之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也姦國之紀不聽政也子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪五月庚辰鄭放遊楚于吳將行子南子産咨于大叔大叔曰吉不能亢身焉能亢宗彼國政也非私難也子圖鄭國利則行之周公殺管叔而蔡蔡叔夫豈不愛王室故也吉若獲戾子將行之何有于諸遊鄭為遊楚亂故六月丁巳鄭伯及其大夫盟于公孫段氏罕虎公孫僑公孫段印段遊吉駟帶私盟于閨門之外實薰隧公孫黑強與于盟使大史書其名盟且曰七子子産弗討至是公孫黑將作亂欲去遊氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司冦將至七月壬寅縊尸諸周氏之衢加木焉臨江劉氏曰黑有罪其以纍上言何惡鄭伯不能討有罪以放乎亂也公孫黑伐良霄而逐之君弗誅也以為大夫又與公孫楚爭娶徐吾氏徐吾氏歸于楚君放楚也而盟諸大夫黑于是自以為卿又將為亂疾作而卧子産使吏數諸其家則幸而勝爾冬公如晉至河乃復季孫宿如晉夏四月晉韓須如齊逆女齊陳無宇送女致少薑晉侯謂無宇非卿執諸中都少薑為之請曰送從逆班畏大國也猶有所易是以亂作晉少薑卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉叔向言陳無宇于晉侯曰彼何罪君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共而執其使君刑已頗何以為盟主且少薑有辭冬十月陳無宇歸十一月鄭印段如晉弔三年春鄭遊吉如晉送少薑之葬梁丙與張躍見之梁丙曰甚矣哉子之為此來也子大叔曰將得已乎昔文襄之霸也其務不煩諸侯令諸侯三歲而聘五歲而朝有事而會不協而盟君薨大夫弔卿共葬事夫人士弔大夫送葬足以昭禮命事謀闕而已無加命矣今嬖寵之喪不敢擇位而數于守適唯懼獲戾豈敢憚煩少薑有寵而死齊必繼室今兹吾又將來賀不唯此行也張躍曰善哉吾得聞此數也然自今子其無事矣譬如火焉火中寒暑乃退此其極也能無退乎晉將失諸侯諸侯求煩不獲二大夫退子大叔告人曰張躍有知其猶在君子之後乎齊侯使晏嬰請繼室于晉曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲不腆先君之適以備內官焜耀寡人之望則又無祿早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福于大公丁公照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之內主豈惟寡君舉羣臣實受其貺其自唐叔以下實寵嘉之既成昏晏子受禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸于陳氏齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之山木如市弗加于山魚鹽蜃蛤弗加于海民參其力二入于公衣食其一公聚朽蠧而三老凍餒國之諸市屨賤踊貴民人痛疾而或燠休之其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝而宫室滋侈道殣相望而女富溢尤民聞公命如逃寇讐欒郤胥原狐續慶伯降在皂𨽻政在家門民無所依君曰不悛以樂慆憂公室之卑其何日之有晏子曰子將若何叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族唯羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之于臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤于是景公繁于刑有鬻踊者故對曰踊貴屨賤既已告于君故與叔向語而稱之景公于是省于刑及晏子如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之晉韓起如齊逆女公孫蠆為少薑之有寵也以其子更公女而嫁公子人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而逺其寵寵將來乎秋七月鄭罕虎如晉賀夫人且告曰楚人日徴敝邑以不朝立王之故敝邑之往則畏執事其謂寡君而固有外心其不往則宋之盟云進退罪也寡君使虎布之宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君茍思盟寡君乃知免于戾矣君若不有寡君雖朝夕辱于敝邑寡君猜焉君實有心何辱命焉君其往也茍有寡君在楚猶在晉也張躍使謂大叔曰自子之歸也小人糞除先人之敝廬曰子其將來今子皮實來小人失望大叔曰吉賤不獲來畏大國尊夫人也且孟曰而將無事吉庶幾焉泰山孫氏曰公如晉至河乃復者六唯二十三年書有疾明有疾而反餘皆譏公數如晉見拒不能以禮自重大取困辱也胡氏曰舉動人君之大節賢哲量之以行藏其道姦邪窺之以作止其惡四鄰視之以厚薄其情故有國者必謹于禮而後動此守身之本保國之基也禮雖自卑而尊人亦不妄悅人以自辱昭公既不能據經守正失禮而妄動又不能從權適變無故而輕復終于失國出奔客死他境蓋始諸此行矣或曰禮者明微正于未動之前可也已至于河而見郤雖欲勿反將得已乎曰以周公之胄千乘之國輕身以修鄰好乃郤而不納夫何敢若曰敝邑褊小敬事大國唯恐獲戾聞陳無宇見執于中都謂少薑之數于守適信也用是不遑寧處跋涉山川來修弔事今若不獲進見剪為仇讐他國誰敢朝夕在廷修事大之禮乎夫小國之去就從違聽大國之令也若非伉儷齊人請陳無宇之罪何以令之也茍有二命又何以為盟主如此晉人其將謝過之不暇敢不納乎昭公習儀以亟而不明乎禮其及也宜經書公如晉至河乃復季孫宿如晉而昭公失國之因季氏逐君之漸晉人下比之迹不待貶絶而皆見矣三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公秋小邾子來朝小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之八月大雩冬大雨雹北燕伯欵出奔齊燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊左氏曰書北燕伯欵出奔齊罪之也胡氏曰大夫國君之陪二以公心選之而不可私也以誠意委之而不可疑也以隆禮待之而不可輕也以直道馭之而不可辱也否則是忽其陪二以自危也故人主不尊陪二而與賤臣圖柄臣者事成則失身而見弒不成則失國而出奔此有國之大戒也春秋凡見逐于臣者皆以自奔為文正其本之意也而垂戒逺矣家氏曰嬖寵固不可任羣卿有若齊田魯季衛孫氏者其必任之可乎曰是所謂權臣非所謂公卿大夫也所貴乎國君者選賢拔能布在有位信之任之與之共圖國政近習不得間也國有公卿大夫而以近習間之亂也若夫控御權姦固自有道亦不可與近習謀四年春王正月大雨雹大雨雹季武子問于申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒于是乎取之其出之也朝之祿位賓食喪祭于是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿氷皆與焉大夫命婦喪浴用氷祭寒而藏之獻羔而啓之公始用之火出而畢賦自命夫命婦至于老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之夫氷以風壯而以風出其藏之也周其用之也遍則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無災霜雹厲疾不降民不夭札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為災誰能禦之七月之卒章藏氷之道也髙氏曰自去年冬至今春正月連大雨雹故前以時紀此以月紀天道如此人事可知胡氏曰隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚于朝歸咎藏氷之失夫山谷之氷藏之也周用之也遍亦古者本末備舉燮調之一事耳謂能使四時無愆伏凄苦之變雷出不震無災霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏氷之道合于豳風七月之詩其將能乎夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申三年十月鄭伯如楚子産相楚子享之賦吉日既享子産乃具田備王以田江南之夢四年春許男如楚楚子止之遂止鄭伯復田江南許男與焉使椒舉如晉求諸侯二君待之椒舉致命曰寡君使舉曰日君有惠賜盟于宋曰晉楚之從交相見也以歲之不易寡人願結歡于二三君使舉請間君若茍無四方之虞則願假寵以請于諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相不可與爭君其許之而修德以待其歸若歸于德吾猶將事之况諸侯乎若適淫虐楚將棄之吾又誰與爭公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬是三殆也四嶽三塗陽城大室荆山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以享神人不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇若何虞難齊有仲孫之難而獲桓公至今賴之晉有里丕之難而獲文公是以為盟主衛邢無難敵亦喪之故人之難不可虞也恃此三者而不修政德亡于不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見諸侯君實有之何辱命焉椒舉遂請昏晉侯許之楚子問于子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼于齊而親于晉唯是不來其餘君之所及也誰敢不至王曰然則吾所求者無不可乎對曰求逞于人不可與人同欲盡濟夏諸侯如楚魯衛曹邾不會鄭伯先待于申六月丙午楚子合諸侯于申椒舉言于楚子曰臣聞諸侯無歸禮以為歸始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮于左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男會公之禮六君子謂合左師善守先代子産善相小國王使椒舉侍于後以規過卒事不規王問其故對曰禮吾所未見者有六焉又何以規宋太子佐後至王田于武城久而弗見椒舉請辭焉王使往曰屬有宗祧之事于武城寡君將墮幣焉敢謝後見楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之會有緍叛之商紂為黎之搜東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄善亦如之德逺而後興程子曰晉平公不在諸侯楚於是強為霸者之事髙氏曰是會上主楚子下不殊淮夷是在會之諸侯皆狄也何者楚虔殺其世子自立而求諸侯於晉晉人許之諸侯從之未有以為賊而討之者反推為盟主相與朝事之以順聽其所為而不怪是在會之諸侯皆反中國以為外裔之行也蓋中國自晉平始衰齊靈莊背之平公屢合諸侯以討焉襄二十五年莊公遇弒始與晉平晉侯自是不復出與盟會其大夫趙武為政不在諸侯故諸侯少安然而晉日益衰政在六卿自宋之會諸侯不見者十年楚子始求合諸侯而未定問于子産曰晉其許我乎又曰諸侯其來乎則楚靈固自以為不足以服諸侯而期必從矣當時使晉稍強其誰敢爭晉強而諸侯從之則楚亦不能肆其志也而晉方溺于嬖寵而用司馬侯之言故楚偃然得專諸侯諸侯舍晉無所附則亦不得已而從楚此書楚子諸侯淮夷于申者外裔為主而合諸侯也外裔得以大合諸侯而為盟主者以中國喪亂日甚幅裂橫潰故敢肆然強為霸者之事也自是天下之事中國之政皆外裔迭制之矣則堂家氏曰楚合夷夏之君十有三國而為此會夷主夏盟會盟之一大變也趙武韓起叔向無以辭其責矣魯以時祭辭衛以疾辭曹邾以難辭皆不至惟鄭伯先至于申宋世子後至宋向戌鄭子産又從而獻禮焉嗚呼曹邾魯衛猶有羞惡之心子産鄭國之良伍于夷而不自以為恥豈非利害所迫失其本心與師氏曰春秋之初天王始失威權春秋之中操執天下之柄無非諸侯諸侯陵夷亦一委政于大夫及兹春秋之末又失而歸之夷雖每流愈下遞皆倒持太阿而授人以柄則然也探其本非諸侯先僭天子則大夫無由僭諸侯外裔無由僭中國天子一失操柄末流之弊遂至此不可支持也楚人執徐子徐子吳出也以為二焉故執諸申謝氏曰徐子聽命于會而楚子以猜疑執之外裔之不常其德也髙氏曰楚子亦欲效桓文之舉以示威于諸侯耳不書以歸者申楚地且因以伐吳也陳氏曰以外裔執外裔不書書執徐子危會申之諸侯也是故外裔相執不志為中國危之故志秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳七月楚子以諸侯伐吳宋太子鄭伯先歸宋華費遂鄭大夫從使屈申圍朱方八月甲申克之髙氏曰中國之所以為中國謂有理也義也理義人心之所同蓋不待驅而後從也舍中國而從楚人豈人心之所欲哉迫于不得已耳申之會楚靈不修德而求諸侯諸侯畏楚之強守宋之盟而從之然猶不能致魯衛曹薛把邾至伐吳之役則中國諸侯皆去惟楚屬從之耳人心之向背可知也夫中國不競然後楚人得肆其志有天下國家者茍知自強于理義以固人心其憂有不從耶執齊慶封殺之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從于戮乎播于諸侯焉用之王弗聽負之斧鉞以徇于諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之榖梁氏曰慶封其以齊氏何也為齊討也慶封弒其君而不以弒君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也家氏曰楚虔弒嗣君而篡有其國賊之未討者也今伐吳執齊慶封而聲其弒君之罪是以謂之賊討賊陳氏曰此執有罪也則曷為不再言楚子不與楚以討齊慶封之辭也猶曰諸侯執之然爾申之會中外之大變也宋虢之事猶曰二霸至是而楚始專合諸侯訖于厥憖諸夏無會同者十年而楚執齊慶封放陳招殺蔡般假討賊之義以號于天下由是而滅賴滅陳滅蔡矣遂滅賴遂以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造于中軍王問諸椒舉對曰成王克許許僖公如是王親釋其縛受其璧焚其櫬王從之遷賴于鄢楚子欲遷許于賴使鬭韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也冬吳伐楚入棘櫟麻以報朱方之役楚沈尹射奔命于夏汭針尹宜咎城鍾離薳啓疆城巢然丹城州來東國水不可以城彭生罷賴之師榖梁氏曰遂繼事也髙氏曰見楚人肆禍于中國假義為利以惡終也家氏曰齊桓公侵蔡蔡潰遂伐楚為中國攘僣亂遂事之正也今楚虔怙其強大劫中國之諸侯而滅無罪之國書遂所以誅之也遂之為義要當隨事而觀以求經意執一例則拘矣九月取鄫莒亂著丘公立而不撫鄫鄫叛而來家氏曰魯人嘗請屬鄫于晉鄫故魯附庸其後莒以子而後于鄫視鄫為彼之私屬魯莒既有積憾乘晉霸之不綱而遂取之前日莒人繼鄫鄫之廟社猶存今為魯所取而鄫于是始滅春秋書取鄫責魯也冬十有二月乙卯叔孫豹卒初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶于國氏生孟丙仲壬夢天壓已弗勝顧而見人黑而上僂深目而猳喙號之曰牛助余乃勝之旦而皆召其徒無之且曰志之及宣伯奔齊饋之宣伯曰魯以先子之故將存吾宗必召女召女何如對曰願之久矣魯人召之不告而歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎有寵長使為政公孫明知叔孫于齊歸未逆國薑子明取之故怒其子長而後使逆之田于丘蕕遂遇疾焉豎牛欲亂其室而有之強與孟盟不可叔孫為孟鐘曰爾未際享大夫以落之既具使豎牛請日入弗謁出命之日及賔至聞鐘聲牛曰孟有北婦人之客怒將往牛止之賔出使拘而殺諸外牛又強與仲盟不可仲與公御萊書觀于公公與之環使牛入示之入不示出命佩之牛謂叔孫見仲而何叔孫曰何為曰不見既自見矣公與之環而佩之矣遂逐之奔齊疾急命召仲牛許之而不召杜泄見告之飢渴授之戈對曰求之而至又何去焉豎牛曰夫子疾病不欲見人使置饋于個而退牛弗進則置虛命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之公使杜泄葬叔孫豎牛賂叔仲昭子與南遺使惡杜泄于季孫而去之杜泄將以路葬且盡卿禮南遺謂季孫曰叔孫未乘路葬焉用之且冡卿無路介卿以葬不亦左乎季孫曰然使杜泄舍路不可曰夫子受命于朝而聘于王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之使三官書之吾子為司徒實書名夫子為司馬與工正書服孟孫為司空以書勳今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬五年叔仲子謂季孫曰帶受命于子叔孫曰葬鮮者自西門季孫命杜泄杜泄曰卿喪自朝魯禮也吾子為國政未改禮而又遷之羣臣懼死不敢自也既葬而行仲至自齊季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭司宮射之中目而死豎牛取東鄙三十邑以與南遺昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從殺適立庶又披其邑將以赦罪罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外投其首于寧風之棘上仲尼曰叔孫昭子之不勞不可能也周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之五年春王正月舍中軍四年季孫謀去中軍豎牛曰夫子固欲去之至是舍中軍卑公室也毁中軍于施氏成諸臧氏初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公以書使杜泄告于殯曰子固欲毁中軍既毁之矣故告杜泄曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢受其書而投之帥士而哭之左氏曰舍中軍卑公室也髙氏曰季氏因叔孫豹之死欲乘其弱而去之名曰復古實欲自強耳自是公室有貢而已無復民矣胡氏曰初作三軍三分公室而各有其一及其舍之也四分公室季氏擇其二二子各一皆盡征之而貢于公然則三軍作舍皆自三家公不與焉公室益卑而魯之兵權悉歸于季氏矣兵權有國之司命三綱軍政之本原書其作舍而公孫于齊薨于乾侯定公無正必至之理也已則不臣三綱淪替南遺叛陽虎專季孫囚而三桓之子孫微矣亦能免乎書曰舍中軍微辭以著其罪家氏曰兵有常制今季氏專魯作之未幾旋復舍之春秋書作于前書舍于後季氏變更軍制之罪不待貶斥而見矣楚殺其大夫屈申楚子以屈申為二于吳乃殺之以屈生為莫敖家氏曰楚以屈申為二于吳而殺之殺之不以其罪也臨江劉氏曰屈申之纍上奈何楚人讐吳而疑屈申謂屈申二于吳也而殺之然則屈申之罪何屈申之為人臣也君弒而不能討國亂而不能去北面而事冦讐足以殺其身而已矣許氏曰春秋惡以疑罪殺人簡易之道也公如晉公如晉自郊勞至于贈賄無失禮晉侯謂女叔齊曰魯侯不亦善于禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈弗能用也姦大國之盟陵虐小國利人之難不知其私公室四分民食于他思莫在公不圖其終為國君難將及身不恤其所禮之本末將于此乎在而屑屑焉習儀以亟言善于禮不亦逺乎夏莒牟夷以牟婁及防兹來奔榖梁氏曰以者不以者也莒無大夫其曰牟夷何也以其地來也公羊氏曰其言及防兹來奔何不以私邑纍公邑也胡氏曰書來奔是接我以利而我入其利兩譏之也為國以義不以利如以利則上下交征而國必危矣為已以義不以利如以利則患得患失亦無所不至矣薛氏曰襄二十一年公如晉邾庶其以漆閭丘來奔今公如晉莒牟夷以牟婁及防兹來奔取邑大事也納叛大惡也公不在而大夫行之多見其無忌憚也其書何君臣交惡也秋七月公至自晉莒人訴于晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉乃歸公秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也謝氏曰既取其邑又敗其師罪魯人無悔責之心也師氏曰莒則無備魯不能謝過書之者譏莒而罪魯也愚按晉人方以納牟夷之故欲止公而叔弓又敗莒師以逞其忿不顧霸討乃成君禍以遂其專比事而觀罪可見矣秦伯卒謝氏曰秦伯不名史失之冬楚子蔡侯許男頓子沈子徐人越人伐吳十月楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師會于夏汭越大夫常夀過帥師會楚子于瑣聞吳師出薳啓疆師從之遽不設備吳人敗諸鵲岸楚子以馹至于羅汭吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵于敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若歡焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電馮怒虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺楚師濟于羅汭沈尹赤會楚子次于萊山薳射帥繁揚之師先入南懷楚師從之及汝清吳不可入楚子遂觀兵于坁箕之山是行也吳早設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命于巢薳啓疆待命于雩婁十九年令尹子瑕言蹶由于楚子曰彼何罪諺所謂室于怒市于色者楚之謂矣舍前之忿可也乃歸蹶由髙氏曰不會宋鄭滕邾者不從令也見楚之不能霸矣家氏曰越始見而書人蓋人之于夷之會非進中國之會若中國之會盟則決無可進之理薛氏曰楚之用越猶中國之用吳也六年春王正月把伯益姑卒葬秦景公夏季孫宿如晉拜莒田也晉侯享之有加籩武子退使行人告曰小國之事大國也茍免于討不敢求貺得貺不過三獻今豆有加下臣弗堪無乃戾也韓宣子曰寡君以為歡也對曰寡君猶未敢况下臣君之𨽻也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨葬把文公宋華合比出奔衛宋寺人栁有寵大子佐惡之華合比曰我殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣公使視之有焉遂逐華合比合比奔衛于是華亥欲代右師乃與寺人栁比從為之徴曰聞之久矣公使代之見于左師左師曰女夫也必亡女喪而宗室于人何有人亦于女何有髙氏曰合比使太子殺君之嬖臣非所以安太子也故以自奔為文然宋公信閽寺殺太子痤而父子之恩絶逐華合比而君臣之義廢刑人之能敗國亦可畏矣以此為防後世猶有任趙髙以亡秦信恭顯以亡漢寵王守澄田令孜以亡唐者秋九月大雩楚薳罷帥師伐吳徐儀楚聘于楚楚子執之逃歸懼其叛也使薳泄伐徐吳人救之令尹子蕩帥師伐吳師于豫章而次于乾溪吳人敗其師于房鍾獲宫廄尹棄疾子蕩歸罪于薳泄而殺之髙氏曰三書伐吳者見楚終不得志于吳也許氏曰敗楚師者非薳泄也而泄伏其誅故書薳罷伐吳以正之楚再不競于吳乃弭兵鋒有事陳蔡復伐徐而國亂吳蓋自是休兵息民國始浸強冬叔弓如楚且弔敗也髙氏曰楚恃強暴雖敗猶諱之魯豈敢弔乎蓋四年公不會申巳而震楚兵威將朝楚而不能故以叔弓先聘明年而躬繼之也齊侯伐北燕十一月齊侯如晉請伐北燕也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也七年正月癸巳齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪公孫晳曰受服而退俟釁而􅏒可也二月戊午盟于濡上燕人歸燕姬賂以瑶甕玉櫝斚耳不克而還髙氏曰將納欵也故書其爵然受賂而還君子弗豫也春秋闕疑卷三十四
