body:
  text: 春秋闕疑卷二十六元鄭玉撰七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛穀梁氏曰郊牛日展斛角而知傷展道盡矣所以備災之道不盡也改卜牛鼷鼠又食其角則亡乎人矣非人之所能也所以免有司之過也家氏曰春秋魯郊或譏失禮或以紀異僖之始卜譏失禮也宣成定哀之牛傷則以紀異也許氏曰小害大下賊上食而又食三桓子孫相繼之象宣公有虞三桓之志至成始弗戒矣吳伐郯吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫胡氏曰稱國以伐外之也吳本太伯之後以族屬言則周之伯父何以外也為其僭天子之大號也按國語云命圭有命固曰吳伯不曰吳王然則吳本伯國後雖益熾浸與中國會盟進而書爵不過曰子亦不以本爵與之故紀于禮書曰四夷雖大皆曰子此春秋之法仲尼之制也而以為不敢擅進退諸侯亂名實者誤矣許氏曰吳自夀夢得申公巫臣而為楚患夷狄相攻不志也伐郯之役兵連上國于是始見于春秋夏五月曹伯來朝不郊猶三望髙氏曰免牛則不郊矣復書不郊者以吳曹事隔其文故以三望起也秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵鄭子良相成公以如晉見且拜師秋楚子重伐鄭師于汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉八月同盟于馬陵尋蟲牢之盟且莒服故也晉人以鍾儀歸囚諸軍府程子曰諸侯同心病楚胡氏曰楚人軍旅數起頻年伐鄭以其背已而從諸夏也與楚莊之討徴舒而入陳異矣書大夫之名氏書帥師書伐而無貶辭者所謂不待貶絶而罪自見者也晉合八國之君親往救鄭則攘冦亂安中國之師也欲著其善故特書救鄭以美之言救則楚罪益明而鄭能去逆效順善亦著矣前此晉遣上將諸國不與此則其君自行而會合諸國則楚人暴橫憑陵諸夏之勢益張亦可見矣故盟于馬陵而書同盟者同病楚也家氏曰爵諸侯而書救鄭褒之也春秋為中國慮晉人稍能自振則動色以褒之楚人盛兵憑陵則屢書以斥之是役也不書戰而言盟楚避晉也重以吳入州來故楚人奔命自救不暇亦中國自治之機公至自會吳入州來二年楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也王乃止子反欲取之申公巫臣不可而止巫臣自聘諸鄭及共王即位將為陽橋之役使屈巫聘于齊且告師期及鄭以夏姬行奔晉為邢大夫子重亦怨巫臣以取申吕為賞田于是子重子反殺巫臣之族分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使吳晉侯許之吳子夀夢説之乃通吳于晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人于吳吳始伐楚伐巢伐徐子重奔命馬陵之會吳入州來子重自鄭奔命子重子反于是乎一嵗七奔命蠻夷屬于楚者吳盡取之是以始大通吳於上國陳氏曰吳楚交兵不書至是始書之吳之為蠻久矣其不敢自列于諸夏而晉求之急將以罷楚也楚罷晉亦不復伯矣入州來不可以不録其始也家氏曰州來楚邑或以為楚之附庸直書州來以其要害之地吳楚所必爭吳得之可以制楚亦猶諸侯城鄭虎牢不書鄭以為中國要害之地城之而鄭服楚不敢爭也冬大雩衛孫林父出奔晉衛定公惡孫林父冬孫林父出奔晉衛侯如晉晉反戚焉家氏曰春秋中年諸侯之大夫外交強國以抗其君衛之孫魯之季其尤也林父自結于晉之權臣為日久矣至是奔晉挾盟主以控其上未幾反國值衛衎繼世不能君林父乘而作亂稱兵犯上逐其君而立己之所善公子卒之入戚以叛為衛患者幾四十年晉實主之衛事晉無違晉之昏君強大夫黨其叛臣為之羽翼何以勸人臣之事君者衛獻魯昭所以失國晉實為之也八年春晉侯使韓穿來言汶陽之田歸之于齊季文子餞之私焉曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師于齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大諫行父懼晉之不逺猶而失諸侯也是以敢私言之髙氏曰汶陽之田魯國之舊嘗為齊所取矣鞍之戰齊請盟晉命齊反魯衛侵地故我得復而取之今齊事晉晉乃使韓穿來命魯復歸之齊夫魯國之分地先君受之于天子晉不當為齊請于魯齊不當求之于晉韓穿為晉卿不當為齊言于魯魯不當以晉侯之命遂以先祖之分地與齊陸氏曰參譏齊魯晉也謝氏曰齊之害我封境也晉命歸我侵田齊之聽命于晉也晉復命我歸齊以汶陽與齊為不順故晉使韓穿來言來言者諭魯之辭也以汶陽與齊非魯所欲故云歸之于齊歸之于齊者不得已之辭也歸于直辭以其歸以其道也歸之于曲辭以其不得已而歸之也魯之分地天子所封也或取或歸一出于晉則天子與奪之柄晉國専之矣書來言書歸之于齊著景公之罪也汶陽田魯之舊也袁婁之盟齊歸我田也書曰取罪魯得之非其道也得之非其道者以其假兵力也馬陵之盟齊取我田也書曰歸者罪魯與之非其道也與之非其道者以其不能拒也始以爭奪取于齊終以其地歸之齊前書取後書歸著魯之失也家氏曰汶陽之田先為齊所侵晉挾魯衛伐齊取其侵地以歸之于魯魯之舊物本非齊有也晉既已歸之于魯復命魯人反之於齊不知晉侯之使韓穿何以為辭也春秋書晉侯使韓穿來言汶陽之田歸之于齊見其名不正言不順難乎其為言也晉欒書帥師侵蔡遂侵楚獲申驪楚師之還也晉侵沈獲沈子揖初從知范韓也是行也鄭伯將會晉師門于許東門大獲焉髙氏曰晉得齊之後冀盡得夫諸侯也蔡乃畏楚終不與晉自文十五年晉郤克入蔡之後蔡人不與中國盟會者又幾三十年至是欒書復加兵以侵之家氏曰晉人侵蔡攻楚之與國亦可以報其伐鄭也師氏曰陳蔡鄭比嘗從楚而鄭已復歸晉獨陳蔡迷而未復誠可罪也為晉侯之計糾合諸侯明其政刑奉辭行伐何所不可而乃以大夫侵之見其畏蔡者所以畏楚也公孫嬰齊如莒聲伯如莒逆也髙氏曰因馬陵之盟復與莒通嬰齊因聘而自逆婦是以春秋志之宋公使華元來聘聘共姬也夏宋公使公孫夀來納幣胡氏曰納幣不書此何以書公孫夀卿也納幣使卿非禮也禮不可略亦不可過惟其稱而已矣略則輕大倫過則溺私愛宋公之請伯姬魯侯之嫁其女皆致其厚者也而不知越禮踰制豈所以重大婚之禮哉經悉書之為後法也晉殺其大夫趙同趙括四年晉趙嬰通于趙莊姬五年原屏放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能舍我何害弗聽至是趙莊姬為趙嬰之亡故譖之于晉侯曰原屏將為亂欒郤為徴六月晉討趙同趙括武從姬氏畜于公宫以其田與祁奚韓厥言于晉侯曰成季之勳宣孟之忠而無後為善者懼矣三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也乃立武而反其田焉胡氏曰同括無罪為莊姬所譛而欒郤害之也故稱國以殺而不去其官見晉之失政刑矣秋七月天子使召伯來賜公命胡氏曰諸侯嗣立而入見則有賜已修聘禮而來朝則有賜能敵王所愾而獻功則有賜成公即位服喪已畢而不入見既更五服一朝之嵗矣而不朝京師又未嘗敵王所愾而有功也何為而來賜命乎召伯縣內諸侯為王卿士者也書來賜公命罪邦君之不王譏天子之僣賞也臨諸侯曰天王君天下曰天子蓋一人之通稱啖氏曰稱天子蓋誤矣冬十月癸卯杞叔姬卒陳氏曰內女為夫人恆書卒其不言卒者出也杞叔姬嘗出矣則曷為書卒以杞伯之來逆喪則不可以不卒也晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯晉士燮來聘言伐郯也以其事吳故公賂之請緩師文子不可曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師會伐郯師氏曰晉侯使士燮來聘禮也就來聘之使而遂會伐乃因禮以用刑于聘于伐且皆不専謂之懷魯亦既不足以為恩謂之威郯又不足以為畏二者胥失之况聘以致物魯因受物而出師則是師因貨出非諸侯助盟主之禮亦非盟主令諸侯之事也胡氏曰前書來聘下書會伐晉侯之為盟主可見矣魯既知其不可從大國之令而不敢違其不能立亦可知矣河東薛氏曰吳伐郯而不能救服吳則伐之諸侯無所措手足矣家氏曰先書吳伐郯此書三國會伐郯不能救之又伐之著晉之罪所以貶也衛人來媵胡氏曰媵者何諸侯有三婦嫡夫人行則娣姪從二國來媵亦以娣姪從凡一娶九女所以廣繼嗣也謝氏曰媵惟一姓所以致親睦也同姓不足然後以義起程子曰媵小事不書伯姬之嫁諸侯皆來媵之故書以見其賢女子之賢尚聞于諸侯况君子乎或曰魯女之賢豈能聞于逺曰古者庶女與非敵者則求為媵固為擇賢小君則諸國之賢女當自聞也愚按媵常事不書而春秋于伯姬之媵書之之詳若是者非特賢伯姬也書衛媵所以起晉齊之媵而明其越禮踰制也九年春王正月杞伯來逆叔姬之喪以歸左氏曰杞桓公來逆叔姬之喪請之也穀梁曰夫無逆出妻之喪而為之也胡氏曰凡筆于經者皆經邦大訓杞叔姬一女子爾而四書于策何也有男女然後有夫婦有夫婦然後有父子故春秋謹男女之配重大婚之禮以是為人倫之本也夷考杞叔姬之行雖賢不若宋共姬亦不至如鄫季姬之越禮也杞伯初來朝魯然後出之卒而復逆其喪以歸者豈非叔姬本不應出故魯人得以義責之使復葬乎愚按叔姬之歸葬于杞以人情言之或因叔姬之行本不應出故魯人得以責杞使之歸葬以禮法言之叔姬既出而歸于魯矣豈可死而復葬于杞春秋書之蓋明魯不當以叔姬之喪歸杞杞不當迎叔姬之喪歸葬而叔姬之行因可見爾故書曰以歸以者不宜以也穀梁之説蓋得之矣公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲為歸汶陽之田故諸侯二于晉晉人懼會于蒲以尋馬陵之盟季文子謂范文子曰德則不競尋盟何為范文子曰勤以撫之寬以待之堅強以御之明神以要之柔服而伐二德之次也是行也將以會吳吳人不至胡氏曰夫盟非固結之本也衛獻言于寧喜求復國喜曰必子鮮在不然必敗小邾射以句繹來奔曰使季路要我吾無盟矣夫信在言前者不言而自喻誠在令外者不令而自行晉初下令于齊反魯衛之侵地而齊不敢違者以其順也齊既從之魯君親往拜其賜矣復有二命俾歸諸齊一與一奪信不可知無惑乎諸侯之解體也晉人不知反求諸己惇信明義以補前行之愆而又欲刑牲歃血要質鬼神以御之是從事於末而不知本也特書同盟所以罪晉也髙氏曰晉不足以宗諸侯矣既為此盟而諸侯皆二于是鄭叛不服莒潰莫救故書同盟以著其惡公至自會三月伯姬歸于宋髙氏曰內女歸不書此書者譏宋公不親迎也杜氏曰為致女復命起也范氏曰逆者非卿故不書劉氏權衡曰諸侯逆女而不書者君自迎也君自逆則常事不書矣王姬歸于齊齊侯實來而不見于經是其明驗也家氏曰伯姬歸宋自始至成禮七見之經貴之也彼與鄫子遇使來請已者春秋不以其汚簡册而猶書之賤之也此貴之彼賤之所以垂法于後焉夏季孫行父如宋致女季文子如宋致女復命公享之賦韓奕之五章穆薑出於房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入程子曰女既嫁父母使人安之謂之致女古者三月而廟見始成婦也伯姬賢魯國重之使卿致也胡氏曰致女常事爾何以書致女使卿非禮也經有因褒以見貶者初獻六羽之類是也亦有因貶以見褒者致女來媵之類是也伯姬賢行著于家故致女使卿特厚其嫁遣之名賢名聞于逺故諸侯爭媵信其無妒忌之行晉人來媵髙氏曰伯姬已嫁而晉始來媵蓋譏其不及事且為齊媵起也秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭楚人以重賂求鄭鄭伯會楚公子成于鄧秋鄭伯如晉晉人討其二于楚也執諸銅鞮欒書伐鄭鄭人使伯蠲行成晉人殺之楚子重侵陳以救鄭髙氏曰鄭伯既受盟于蒲楚人以重賂誘之復會楚公子成于鄧秋鄭伯如晉晉人執之然經不書鄭伯會鄧者所以恕鄭而罪晉也鄭伯雖與楚會旋即悔過而躬朝于晉以此言之是知前日之失而自服其罪矣晉人捨其前日之失而答之以禮可也乃因其來朝而執之豈有以禮來朝而反蒙執辱者哉且中國自文宣以來晉楚爭盟而伐鄭自泌之戰鄭之從楚者十年蟲牢馬陵之會然後鄭伯受盟于蒲之會所以尋前日之盟也而晉人乃執辱鄭伯又使欒書伐之明年使衛侵鄭又會諸侯伐鄭方是時楚適備吳未暇爭鄭故鄭之在晉者亦五年及楚一求成于鄭鄭伯甘心于楚者蓋追怒晉之不德弗恤小國之難而輕辱其君故與楚伐許侵宋同撓中國凡二十年實晉有以啓之也胡氏曰鄭稱人而執者既不以王命又不歸諸京師則非霸討也殺伯蠲不書者既執其君則行人為輕亦不足紀也楚子重侵陳與處父救江何異削而不書鄭亦有罪焉夫背楚即晉正也今以重賂故又與楚會則是為利之從而不要諸義也故鄭無可救之善楚不得有能救之名許氏曰向使晉能制楚使之不能危鄭討鄭可也今楚潰莒入鄆晉不能救而禁鄭之二於楚鄭獨能無懲於牽牛銜璧之禍乎師氏曰執人之君伐人之國與楚執宋公以伐宋無異則又一楚也何以為盟主哉冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆八年晉侯使申公巫臣如吳假道于莒與渠丘公立于池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也謝氏曰莒城惡而不修國陋而不備一日楚師加國民衆不守而奔書莒潰罪莒之取禍也莒子既同盟于馬陵又同盟于蒲楚之伐莒也諸侯無一出救以致莒人潰焉書莒潰罪晉之不能衛同盟也胡氏曰莒恃其陋而不修城郭浹辰之間楚克其三都信無備矣然兵至而民逃其上不能使民效死而不去則昧於為國之本也雖隆莒之城何益乎髙氏曰楚人非有意伐鄆特以鄆莒連邑莒潰而遂以兵入之直以為一事而已一事而先書楚公子帥師者著其専且暴衆也再書楚人貶之也杜氏曰楚偏師入鄆故書人秦人白狄伐晉髙氏曰晉為盟主既執鄭伯又不救莒故諸侯攜二而秦人連白狄以伐之且見晉景公之不能霸矣胡氏曰經所謹者內外之辨也晉嘗與白狄伐秦今秦又與白狄伐晉族類不復分矣其稱人貶辭也武王伐商誓師牧野庸蜀羌髳微盧彭濮皆與焉豈亦不謹乎除天下之殘賊而出民于水火之中雖逺方之國以義驅之可也亦慮其同惡相濟貽患于後也中國友邦自相侵伐已為不義又與非我族類者共焉不亦甚乎薛氏曰結援外冦未有不自戕也家氏曰前人秦晉交兵自為其私曲直猶有所在今楚人爭鄭正急出師潰莒以撓晉而秦乃帥白狄戰其東欲使晉人不知所備置鄭以去其為楚謀善矣然捨中國而甘為荆蠻之役秦之所以自處者卑陋甚矣鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君張氏曰君在外而興師以復怨大臣之罪也家氏曰以是為君歸之謀則可以是為事君之道則不可城中城家氏曰定公六年又書城中城曰三家張也以是觀之城中城者城國中之城耳魯人以楚潰莒之故不無震鄰之憂故城中城以自固胡氏曰經世安民視道之得失不以城郭溝池以為固也穀梁氏謂凡城之志皆譏其説是矣城非春秋所貴而書城中城者為警守益微矣王公設險以守其國非歟曰百雉之城七里之郭設險之大端也謹于禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵僣限隔上下者乃體險之大用也獨城郭溝池之足恃哉十年春衛侯之弟黑背帥師侵鄭晉命也某氏曰黑背定公母弟以同母之愛得位専政故稱弟公孫剽黑背之子也其後孫林父背君立剽亦以君寵弟子致之也然則黑背稱弟著其兆禍與公子年來聘稱弟同意家氏曰以弟帥師責衛也以諸侯伐諸侯責晉也是之謂一書而兩貶夏四月五卜郊不從乃不郊師氏曰卜至于五其瀆甚矣五月公會晉侯齊侯宋公衛侯曹伯伐鄭鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立太子州蒲以為君而會諸侯伐鄭鄭子罕賂以襄鍾子然盟于修澤子駟為質辛巳鄭伯歸討立君者戊申殺叔申叔禽謝氏曰欒書伐鄭不服于是衛黑背侵鄭黑背侵不服于是諸侯伐鄭自鄭伯見執之後再書伐鄭一書侵鄭以明不信之生禍也髙氏曰鄭伯復歸不書所以咎晉也晉既敗人之國使其君臣變亂而後伐之而歸其君春秋惡其首亂不以舍服與之也劉氏權衡曰左氏謂晉侯方疾立太子州蒲以為君而會諸侯按經但言晉侯無以明其為州蒲也家氏曰君在而立君者鄭也非晉也左傳所記因魯史傳聞之誤耳父在而爵其子春秋必不然齊人來媵公羊氏曰三國來媵非禮也高氏曰伯姬嫁已久諸侯以其賢猶來媵之然諸侯夫人唯二媵今晉衛已備其數豈可復加乎春秋所急者禮也所制者欲也以禮制欲則治以欲敗禮則亂三國來媵是以欲敗禮矣故備書之以為後世戒謝氏曰同姓不患不足而以異姓來媵非禮也丙午晉侯獳卒公疾病求醫于秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之秋七月公如晉晉人止公使送葬于是糴茷未反冬葬晉景公公送葬諸侯莫在魯人辱之髙氏曰公昔不奔天王之喪今乃奔晉侯之喪又為晉人所止使之送葬故聖人于景公之葬沒而不書臨江劉氏曰曷為不言葬不與葬晉侯也天子之喪動天下屬諸侯諸侯之喪動通國屬大夫大夫之喪動一國屬修士士之喪動一鄉屬朋友庶人之喪動州里屬黨族公之葬晉侯非禮也以為唯天子之事可也冬十月十有一年春王正月公至自晉三月公至自晉晉人以公為二于楚故止公公請受盟而後使歸薛氏曰公之在晉九月春秋不書在者在夏也家氏曰在晉在楚均為強國所止而有夷夏之異見止而在中國猶為內也見止而在外夷則外矣書不書其以是歟晉侯使郤犨來聘己丑及郤犨盟薛氏曰郤犨來聘而盟我盟之而託于晉也夏季孫行父如晉報聘且涖盟也張氏曰按公之至自晉也既受盟矣及季文子之聘也又涖盟焉春秋皆不書而獨書郤犨之盟何也蓋成公自汶陽歸齊之後欲二晉而不果然嫌隙竟彰無以自明晉因公之朝而止之數月公請受盟而後使歸又使郤犨來聘既聘而涖盟魯使行父往則又從而盟之據強大之勢要君臣之盟皆魯之恥也惟犨聘而盟春秋以荀庚孫良夫之例書之若成公之受盟豈能得晉君而盟之乎亦大夫盟之耳故諱之而不書也秋叔孫僑如如齊以修前好薛氏曰由齊之媵始交好于齊也髙氏曰自鞍之役而齊魯絶至是乃復通許氏曰魯蓋激晉之德禮不施將二于齊而未能者歟張氏曰僑如之聘蓋謝戰案之師捐歸田之忿迫于晉之欲而不能已者也家氏曰魯昔者不堪齊之陵暴借力于晉以紓一時之忿至是受侮于晉君臣日奔走于庭而猶懼不免于是介然以悔惕然以思將尋舊好于齊故行父如晉僑如適齊事同而情異者也春秋比而書之俾後之有國家者務自強以立其國無若魯人左右望于齊晉求所以自全而不可得也冬十月十有二年春周公出奔晉周公楚惡惠襄之逼也且與伯輿爭政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉公羊氏曰周公者天子之三公也左氏曰凡自周無出周公自出故也師氏曰春秋季世為諸侯者不復知有周室自視列國若已固有而晉于是時主盟中國天下惟知有盟主是以周公奔晉以謂盟主可以庇其身而無敢誰何也書曰出奔不特罪周公自絶于周抑亦罪諸侯之絶周也髙郵孫氏曰春秋之義自周無出天下一周也天王居鄭周公奔晉特異之者孔子之意也王之所以為王以有其位而天下皆其有也王得言出則是自絶其位而不能有天下也天下非其所有則雖居鄭不可不言出也周公之所以為公以左右天王而與王共治也為三公而得罪天王至于奔晉則是絶于王而不能有三公之位也三公之位非其所有則雖止奔于晉猶若出于四海之外也謝氏曰天王在鄭書出居以明王室下同列國也周公奔晉書出奔晉明王臣下同列國大夫也家氏曰周公王朝大臣與強族爭政王不能裁則引而退可也今以爭不能勝怒而出王既復之與之盟盟而入入而又奔是其心欲挾霸國以脅天子春秋書出書奔絶之王朝其為誅斥也大矣夏公會晉侯衛侯于瑣澤九年晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也名其二卿尊君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟君盍歸之使合晉楚之成公從之重為之禮使歸求成十二月楚子使公子辰如晉報鍾儀之使請修好結成十年晉侯使糴茷如楚報太宰子商之使也十一年宋華元善于令尹子重又善于欒武子聞楚人既許晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成至是宋華元克合晉楚之成夏五月晉士燮會楚公子罷許偃癸亥盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成會于瑣澤成故也晉郤至如楚聘且涖盟楚子享之子反相為地室而縣焉郤至將登金奏作于下驚而走出子反曰日云莫矣寡君須矣吾子其入也賓曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂寡君須矣吾子其入也賓曰若讓之以一矢禍之大者其何福之為世之治也諸侯間于天子之事則相朝也于是乎有享燕之禮享以訓共儉宴以示慈惠共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕此公侯之所以扞城其民也故詩曰赳赳武夫公侯干城及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民略其武夫以為己腹心股肱爪牙故詩曰赳赳武夫公侯腹心天下有道則公侯能為民干城而制其腹心亂則反之今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫冬楚公子罷如晉聘且涖盟十二月晉侯及楚公子罷盟于赤棘劉氏權衡曰瑣澤之會本以合楚鄭也今楚鄭不止魯衛是盟何也合晉楚者宋也宋亦不與又何耶凡晉楚為平則應大合諸侯以申成好今三國會而已又何耶然則傳之未足信也朴鄉吕氏曰愚意瑣澤之會為伐秦起文爾今年會于瑣澤明年春使郤錡來乞師而後五月暨諸侯伐秦比事而觀可見矣秋晉人敗狄于交剛狄人間宋之盟以侵晉而不設備秋晉人敗狄于交剛師氏曰書敗狄而不書戰不以狄人敵中國幸中國振立則因以尊之也書人而不著名猶以微者敗之大中國之勢雖微者亦足以敗冦亂諸侯何畏而長冦亂之惡哉陳氏曰中國敗外域不書唯晉特書之特書晉者病晉也楚方聘魯平宋合諸侯之大夫于蜀討陳夏徴舒觀兵于雒矣而區區爭于羣狄是故宣成之春秋晉有事于秦楚或略而不書而甚詳于滅狄以是為晉衰也晉之衰諸夏之憂也冬十月春秋闕疑卷二十六
