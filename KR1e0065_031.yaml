body:
  text: 春秋闕疑卷三十一元鄭玉撰十有七年春王二月庚午邾子牼卒宋人伐陳宋莊朝伐陳獲司徒卬卑宋也家氏曰陳叛中國久矣晉不能治而宋興師伐之為中國撓楚也十一年楚鄭伐宋以撓晉今宋人伐陳亦以撓楚髙氏曰書伐許伐陳亦著楚之絀夏衛石買帥師伐曹衛孫蒯田于曹隧飲馬于重丘毁其瓶重丘人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹取重丘曹人訴于晉秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防齊人以其未得志于我故秋齊侯伐我北鄙圍桃髙厚圍臧紇于防師自陽關逆臧孫至于旅松郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之齊人獲臧堅齊侯使夙沙衛唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮于士以杙抉其傷而死髙氏曰見齊之君臣同來伐我而分兵以圍二邑蓋甚之又甚也髙厚不稱齊者繫齊侯也齊君仍世婚姻之國而侵伐不已見魯之衰有以致伐矣泰山孫氏曰三年之中君臣加兵于魯者四齊之不道亦可知也九月大雩宋華臣出奔陳宋華閲卒華臣弱臯比之室使賊殺其宰華吳賊六人以鈹殺諸廬門合左師之後左師懼曰老夫無罪賊曰臯比私有討于吳遂幽其妻曰畀余而大璧宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之左師為已短策苟過華臣之門必騁十一月甲午國人逐瘈狗瘈狗入于華臣氏國人從之華臣懼遂奔陳髙氏曰華臣暴其宗室而亂宋國之政不有國討失政刑矣震駭而奔懷慝之禍也夫陳乃宋讐而奔焉意尤可誅冬邾人伐我南鄙為齊故也髙氏曰邾之先君以伐魯而為晉所執既歸而卒嗣子在喪而復興兵伐我者叛晉也與齊也齊人使之修先君之怨也師氏曰魯鄙有四而莒每伐其東齊每伐其北邾每伐其南非惟魯不能睦四鄰亦足以見齊莒邾之非善鄰矣十有八年春白狄來白狄始來髙郵孫氏曰春秋非列侯來朝者但書曰來不曰朝也介葛盧白狄是也臨江劉氏曰蕃服于中國無事焉其于天子世一見則諸侯雖有善其交際不得通也是以春秋不與其朝不與其朝者懲淫慝一內外也周公致太平越裳氏重九譯而獻其白雉公曰君子德不及焉不享其贄此乃天子之讓也况列國之君乎守藩之臣乎家氏曰春秋之世如允姦姜戎多錯居九服之內又自以為先代之後明德之裔莫不負恃强大有陵犯上國之心魯之盟戎㑹戎苟求無事而已今白狄慕義順朝固非周制之所許拒而絶之有不可得故春秋之義㑹戎盟戎則有譏介葛盧來白狄來之類則直著其事不與其朝辨分而無絶也夏晉人執衛行人石買晉人執衛行人石買于長子執孫蒯于純留為曹故也愚按經書晉人執衛行人石買而𫝊云晉人執衛行人石買于長子執孫蒯于純留夫晉之執石買雖因其伐曹之故然所以執之則因其來聘而遂執之耳非以其罪而執之于其國也故經以行人書之石買既為行人至晉孫蒯何緣與之同行而亦被執乎蓋𫝊因伐曹之事實孫蒯石買之所為故附㑹而為此言耳謝氏曰以衛不直而執之則罪不在行人以買伐曹而執之則不當執于行人臨江劉氏曰晉稱人以執非霸討也此其為非霸討奈何衛孫蒯淫獵于曹曹人閉門詬之孫蒯怒使石買帥師以伐曹曹人訴諸晉石買以君命聘于晉晉人執之晉能知石買之伐曹為惡矣而未能知孫蒯逐君之為惡也蒯者曷為者也孫林父之子也張氏曰石買之執有三失焉舍大而治小一也行人非所執二也不歸于京師三也三者有一不得為霸討而况無之乎秋齊師伐我北鄙許氏曰四年之中六伐鄙而四圍邑又從邾莒以助其虐諸侯之陵暴未有若此者也是以動天下之兵幾亡其國冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊晉侯伐齊將濟河獻子以朱絲係玉二瑴而禱曰齊環怙恃其險負其衆庶棄好背盟陵虐神主曾臣彪將率諸侯以討焉其官臣偃實先後之苟捷有功無作神羞官臣偃無敢復濟唯爾有神裁之沈玉而濟冬十月㑹于魯濟尋湨梁之盟同伐齊齊侯禦諸平陰塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右僞以斾先輿曵柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁邢伯告中行伯曰有班馬之聲齊師其遁叔向告晉侯曰城上有烏齊師其遁十一月丁卯朔入平陰遂從齊師夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也子姑先乎乃代之殿衛殺馬于隘以塞道晉州綽及之射殖綽中肩兩失夾脰曰止將為三軍獲不止將取其𠂻顧曰為私誓州綽曰有如日乃弛弓而自後縛之其右具丙亦舍兵而縛郭最皆襟甲面縛坐于中軍之鼓下晉人欲逐歸者魯衛請攻險己卯荀偃士丐以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之荻范鞅門于雍門其御追喜以戈殺犬于門中孟莊子斬其橁以為公琴己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭范鞅門于揚門州綽門于東閭左驂迫還于門中以枚數闔齊侯駕將走郵棠大子與郭榮扣馬曰師速而疾略也將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劍斷鞅乃止甲辰東侵及濰南及沂啖氏曰諸侯同心圍齊特書同圍程子曰書同圍見諸侯之惡齊許氏曰環而攻之焚其四郭故謂之圍胡氏曰凡侵伐圍入未有書同者而獨于此書同圍齊何也齊環背盟棄好陵虐神主肆其暴橫數伐鄰國觀加兵于魯則可見矣諸侯所共惡疾故同心而圍之也愚按邾莒嘗病魯矣滕薛小邾嘗屬齊矣今皆與于圍齊之役而莫敢有不同者晉人以大義馳之也霸主所舉皆如圍齊天下諸侯豈有異議哉亦可以見人心天理好善惡惡無不同也曹伯負芻卒于師楚公子午帥師伐鄭鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使揚豚尹宜告子庚曰國人謂不穀主社稷而不出師死不從禮不穀即位于今五年師徒不出人其以不穀為自逸而忘先君之業矣大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦于晉臣請嘗之若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵于汾于是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢㑹楚師楚師伐鄭次于魚陵右師城上棘遂涉潁次于旃然蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁右回梅山侵鄭東北至于蟲牢而反子庚門于純門信于城下而還涉于魚齒之下甚雨及之楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競多死聲楚必無功董叔曰天道多在東北南師不時必無功叔向曰在其君之德也愚按午之伐鄭雖子孔召之然實晉楚安危之所係而中國治亂盛衰之幾也涉于魚齒甚雨及之楚師多凍役徒幾盡豈非天未欲啓夷狄以禍中國乎十有九年春王正月諸侯盟于祝柯晉人執邾子諸侯還自沂上盟于督揚曰大毋侵小執邾悼公以其伐我故髙郵孫氏曰諸侯已圍齊而為祝柯之盟不序諸侯前目後凡也陳氏曰申言諸侯間有事也師氏曰諸侯圍齊鄭伯亦與楚乃伺隙伐鄭為諸侯之計拒楚救鄭以尊中國可也祝柯之盟意其在是而執邾子斯為下矣家氏曰諸侯同怒齊而伐邾子身與戎馬驅馳之間又與于祝柯之盟縱有罪亦當少損其罰况邾魯以疆事搆爭晉既討而執之矣今自齊來反當敘勤閔勞之時乃執其君而取其地晉之用事者狂恣甚矣髙氏曰不書以歸者旋即舍之也蓋執其君以劫其地得其地即舍之下書取邾田自漷水則知其脅人之君而奪其地此平公之霸政也公至自伐齊臨江劉氏曰此圍也其以伐至何也以伐告也取邾田自漷水次于泗上疆我田取邾田自漷水歸之于我晉侯先歸公享晉六卿于蒲圃賜之三命之服軍尉司馬司空輿尉候奄皆受一命之服賄荀偃束錦加璧乘馬先吳壽夢之鼎杜氏曰取邾田以漷水為界也泰山孫氏曰諸侯土地受之天子不可取也言取惡內也蘇氏曰魯以晉命取田于邾故書曰取邾田自漷水言非魯地也謝氏曰邾小國也其伐我南鄙正以疆界不明故圍齊之後晉人執其君魯人取其田春秋正其曲直而田稱邾邾田書取則疆界不明曲乃在魯矣邾田自漷水著其取田之多也圍齊義也取邾田不義也以義討齊之暴復以不義侵邾之疆以亂繼亂而已故晉執邾子書人邾以田與魯書取所以正其亂也愚按經書取邾田而𫝊稱疆我田蓋魯人以正疆為名而妄取邾田春秋誅其心故沒其疆田之說而正其取田之罪直書曰取邾田季孫宿如晉拜師晉侯享之范宣子為政賦黍苗季武子興再拜稽首曰小國之仰大國也如百穀之仰膏雨焉若常膏之其天下輯睦豈唯敝邑賦六月季武子以所得於齊之兵作林鍾而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彞器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸于大國而昭所獲焉以怒之亡之道也葬曹成公夏衛孫林父帥師伐齊晉欒魴帥師從衛孫文子伐齊髙氏曰晉人以未卒事于齊復使欒魴帥師從衛孫林父伐齊此獨書衛伐之者蓋十四年林父逐衛侯衎奔于齊林父欲除之故耳然則林父逐君之罪與衛侯受逐者所立霸主所當討而反與之㑹伐則晉平公之霸業可知也已秋七月辛卯齊侯環卒齊侯娶于魯曰顏懿姬無子其姪鬷聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為大子許之仲子曰不可廢常不祥間諸侯難光之立也列于諸侯矣今無故而廢之是専黜諸侯而以難犯不詳也君必悔之公曰在我而已遂東大子光使髙厚傅牙以為大子夙沙衛為少傅齊侯疾崔杼微逆光疾病而立之光殺戎子尸諸朝夏五月壬辰晦齊靈公卒莊公即位執公子牙于句瀆之丘以夙沙衛易已衛奔髙唐以叛齊慶封圍髙唐弗克冬十一月齊侯圍之見衛在城上號之乃下問守備焉以無備告揖之乃登聞師將𫝊食髙唐人殖綽工僂㑹夜縋納師醢衛于軍二十一年齊侯使慶佐為大夫復討公子牙之黨執公子買于句瀆之丘公子鉏來奔叔孫還奔燕家氏曰齊靈廢嫡于兵敗國危之時齊光篡父于病篤垂死之際靈之暴光之逆所謂凶德參㑹萃于一時者也然迹其事之所從來正由髙厚崔杼貪于得權以成此禍耳厚贊其君伐本幹樹疣蘖已為之傅思久于其位也孰知崔杼陰拱其傍為謀更深一朝輔光以篡殺厚而兼其室遂相齊而志猶未饜復殺光以自媚于晉亂臣賊子苟以患失為心其禍至于殺身喪邦覆其家而後已晉士丐帥師侵齊至穀聞齊侯卒乃還公羊氏曰還者何善辭也何善爾大其不伐喪也此受命乎君而伐齊則何大其不伐喪大夫以君命出進退在大夫也陸氏曰聞齊侯卒乃還不當更往臨江劉氏曰古之為師也不伐喪大夫以君命出境有可以安社稷利國家者則専之可也穀者齊地也其曰至穀而後還稱其義也非齊地則勿復乎曰止師而請之君曰可而後止不可則復之期可而後止臣之事君也凡在國無専焉子之事親也凡在家無専焉蘇氏曰將在軍君命有所不受有善而専之君與有焉常山劉氏曰天下無王諸侯擅命征伐各自已出利人之難以成其私故伐人之喪者比比皆是而士丐乃有惻隱之心還師不侵豈非善乎髙氏曰春秋之義事畢書還未畢書復此以畢事之辭書之何也士丐所以興師而往者為齊靈公也靈公既卒于是遂反春秋以為得事畢之義故書還朱子曰春秋分明處如晉士丐侵齊至穀聞齊侯卒乃還分明是與之也八月丙辰仲孫蔑卒齊殺其大夫髙厚齊崔杼殺髙厚于灑藍而兼其室左氏曰書齊殺其大夫從君于昏也張氏曰殺髙厚者崔杼也杼雖擅生殺之權亦莊公之所欲也以纍上之辭言之可謂著明矣鄭殺其大夫公子嘉鄭子孔之為政也専國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西帥國人伐之殺子孔而分其室鄭人使子展當國子西聽政立子産為卿胡氏曰不稱鄭人者嘉則有罪矣而子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意冬葬齊靈公城西郛懼齊也叔孫豹㑹晉士丐于柯髙氏曰齊及晉平魯猶懼齊故為柯之㑹以自固許氏曰書仲孫蔑㑹齊髙固于無婁書叔孫僑如㑹晉荀首于穀書叔孫豹㑹晉士丐于柯以見政在大夫動則列國事之如此城武城齊及晉平盟于大隧故穆叔㑹范宣子于柯穆叔見叔向賦載馳之四章叔向曰肸敢不承命穆叔歸曰齊猶未也不可以不懼乃城武城家氏曰城西郛城武城皆所以備齊也晉為魯大舉伐齊齊雖困而未服故魯所以為備者如此或曰春秋其與之乎曰不與也國不能用賢紀綱陵遲百度廢弛寇有不至至則危矣雖多城何益二十年春王正月辛亥仲孫速㑹莒人盟于向及莒平孟莊子㑹莒人盟于向督揚之盟故也髙氏曰莒數伐魯前年諸侯盟于祝柯以和解之故二國復自為盟以結好自是十七年莒魯不交兵夏六月庚午公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵齊成故也薛氏曰齊之無道諸侯圍之而不服以晉士丐之不伐喪也遂㑹于澶淵修文來逺不誣也哉秋公至自㑹仲孫速帥師伐邾邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之許氏曰祝柯之㑹既執邾子又取其田報亦足矣而復伐之譏已甚矣且澶淵在彼何以盟為家氏曰此譏魯之叛盟伐國而晉不討也蔡殺其大夫公子燮蔡公子履出奔楚蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚初蔡文侯欲事晉曰先君與于踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死胡氏曰公子燮謀國之合于義者也國人乃不順焉而殺燮此何罪矣故稱國而不去其官履其母弟也進不能正國退不能逺害懼禍而奔從于夷狄書者罪之也陳侯之弟黃出奔楚陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討公子黃出奔楚將出奔呼于國曰慶氏無道求専陳國暴蔑其君而去其親五年不滅是無天也穀梁氏曰諸侯之尊兄弟不得以屬通其弟云者親之也親而奔之惡也陸氏曰稱弟者罪其兄也非兄之罪則曰公子謝氏曰罪哀公不能全其弟也家氏曰黃不奔他國而奔楚甘于從楚者也書奔楚亦以貶叔老如齊齊子初聘于齊杜氏曰齊魯有怨朝聘禮絶今始復通冬十月丙辰朔日有食之季孫宿如宋報向戍之聘也二十有一年春王正月公如晉拜師及取邾田也邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜于其從者于是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑于邾以來子以姬氏妻之而與之邑其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬其小者衣裳劍帶是賞盜也賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度其信可明徵也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎胡氏曰庶其邾大夫也春秋小國之大夫不書其姓氏微也其以事接我則書謹之也莒慶以大夫即魯而圖昏接我不以禮者也邾庶其以地叛其君而來奔接我不以義者也以欲敗禮則身必危以利棄義則國必亂春秋禮義之大宗故小國之大夫接我以利欲則特書其姓氏謹之也此叛臣也經何以不書叛書名書地而竊邑叛君之罪見矣臨江劉氏曰漆一邑閭丘一邑曷為不言及公邑言及私邑不言及私邑者所受于君而食之者也公邑者非食之者也薛氏曰納人之叛而疾人之叛己不可與言理矣朴鄉吕氏曰人臣之奔必適讐國魯之于邾既執其君取其田又伐其國而又納其叛人甚矣陳氏曰公猶在晉季孫宿納之也向者莒太子僕弒其君以其寶玉來奔納諸宣公矣季文子使司冦出諸境則不書公猶在晉而季孫宿納庶其則何以書春秋誅叛人君臣之責也是故苟不納之雖有公命不書苟納之雖無君命必謹而書之謝氏曰納叛非所以安吾國失信非所以服鄰國家氏曰善乎臧孫之言知庶其之為盜知季氏為受盜之主其言有合于夫子異日所以語季康子者是可併書也夏公至自晉秋晉欒盈出奔楚初士鞅奔秦秦伯問于士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之德在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未能及人武子所施沒矣而黶之怨實章將于是乎在欒桓子娶于范宣子生懷子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能欒祁與其老州賔通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂以范氏為死桓主而専政矣曰吾父逐鞅也不怒而以寵報之又與吾同官而専之吾父死而益富死吾父而専于國有死而已吾蔑從之矣其謀如是懼害于主吾不敢不言范鞅為之徵懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚宣子殺箕遺黃淵嘉父司空靖邴豫董叔邴師申書羊舌虎叔羆囚伯華叔向籍偃人謂叔向曰子離于罪其為不知乎叔向曰與其死亡若何樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向叔向曰必祁大夫室老聞之曰樂王鮒言于君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讐內舉不失親其獨遺我乎晉侯問叔向之罪于樂王鮒對曰不失其親其有焉于是祁奚老矣聞之乘馹而見宣子曰詩曰惠我無疆子孫保之書曰聖有謨勳明徵定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興伊尹放大甲而相之卒無怨色管蔡為戮周公右王若之何其以虎也棄社稷子為善誰敢不勉多殺何為宣子說與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝初叔向之母妒叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懷子嬖之故羊舌氏之族及于難欒盈過于周周西鄙掠之辭于行人曰天子陪臣盈得罪于王之守臣將逃罪罪重于郊甸無所伏竄敢布其死昔陪臣書能輸力于王室王施惠焉其子黶不能保任其父之勞大君若不棄書之力亡臣猶有所逃若棄書之力而思黶之罪臣戮餘也將歸死于尉氏不敢還矣敢布四體唯大君命焉王曰尤而效之其又甚焉使司徒禁掠欒氏者歸所取焉使候出諸轘轅劉氏意林曰不以范丐逐之為文而以盈之自出為說使盈無可逐之釁則丐不得逐矣丐之罪易見盈之失難知此春秋所以深探其情而大正其本也道莫難于治天下而天下之治在國國之治在家家之治在身身之不治國家不可得治也詩之首周召書之首堯舜皆從此生矣春秋述堯舜者也是以謹于人道之始閨門之內易曰間有家悔亡家之不間悔不亦宜乎髙氏曰既取奔亡復有作亂之志故奔于楚以其强大今日可恃以逃難他日可挾以復歸也家氏曰盈之奔也雖無可坐之罪盈欲防間其母豈無其道今使其母以淫故而覆夫氏之宗盈所以事其親者必有未至焉耳春秋去爵書奔㫖或如是九月庚戌朔日有食之冬十月庚辰朔日有食之許氏曰比年食之又比月食蓋自是八年之間而日食七禍變重矣石氏曰春秋二百四十二年日食才三十六也有頻交而食者此年及二十四年三年之內連月而食者再也諸儒以為歷無此法或𫝊寫之誤然漢髙之時亦有頻食者二年十月十一月天道至逺不可得而知後世執推步之術按交㑹之度而求之亦已難矣曹伯來朝始見也公㑹晉侯齊侯衛侯鄭伯莒子邾子于商任錮欒氏也師氏曰欒盈晉大夫出奔于楚將倚楚以報晉晉侯㑹諸侯于商任將以備楚而拒欒盈耳蘇氏曰錮欒氏非禮也古者大夫去國君使人導之出疆又先于其所往許氏曰欒氏之出非其罪也徒以權門私相忌惡何有于國而平公受其敵怨勤動諸侯以逞范鞅之積憾必欲使盈無所容于世故盈發憤卒興禍亂此皆以私敗公足為古今之至戒春秋闕疑卷三十一
