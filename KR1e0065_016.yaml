body:
  text: 春秋闕疑卷十六元鄭玉撰十有九年春王三月宋人執滕子嬰齊髙氏曰此宋襄求霸也求霸而執滕子春秋之俗也俗者何雖齊桓亦滅談滅遂降鄣皆無名也特兼弱以威而已滕子何以名執而名之者不反之辭也莊十六年幽之㑹齊桓始霸滕子與焉既而背之自此之後至齊侯卒凡三十七年衣裳兵車之㑹未嘗列于其間故此年宋襄既有圖霸之心而首執滕子以令諸侯也然宋襄圖霸當以德懷來之今乃肆已之强擅執國君以凌轢諸夏執而不反亦以甚矣此春秋所以人宋也夏六月宋公曹人邾人盟于曹南臨江劉氏曰曹南曹之南也謝氏曰宋襄內無逺略而欲隆霸業以紹齊桓于是首為曹南之盟從之者曹人邾人而已諸侯不服可知也與北杏之㑹異矣髙郵孫氏曰曹邾皆稱人者蓋宋襄威德未著曹邾但使其臣㑹之鄫子㑹盟于邾己酉邾人執鄫子用之宋公使邾文公用鄫子于次雎之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一㑹而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸劉氏意林曰曹南之㑹雖有邾人即非邾子今此㑹盟于邾者詳驗經文是邾國自為盟㑹非復向者曹南之盟也若宋公使邾人執鄫子而春秋越宋治邾是為首惡者不誅而脅從者見討也春秋原心定罪豈其若是哉吾固曰宋不使邾用鄫子也家氏曰槩觀宋襄公平日則好名而畏義者也方其為太子以讓國聞其後與楚人戰欲以不禽二毛不鼓不成列而取仗義之名豈有今日而用同盟國君于淫昏之社無道若此者乎髙郵孫氏曰邾之與鄫世讐之國故宣十八年又戕鄫子于其國都但邾鄫小國其相讐之迹不能悉見經惟紀其無道之甚者爾用之之說三傳不同左氏以為用之于次雎之社公穀皆以為叩其鼻血至昭十一年楚人執蔡世子友以歸用之杜預以為祭山公羊則以為築防趙子之徒又以為用為盟歃之牲皆不同也然考之于經但曰用之不云所用之迹蓋春秋之時有用人為牲者大亂之極聖人所不忍言但曰用之則知以人為用也不必以正其名所重者用之而已愚按劉氏之說與傳文雖異於經為合然無所據又㑹盟于邾之文他無此例不敢以為决然姑著其疑以俟知者秋宋人圍曹討不服也子魚言于宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動陳氏曰諸夏之書圍國自此始胡氏曰盟于曹南口血未乾今復圍曹者討不服也愛人不親反其仁治人不治反其智襄公不能內自省德而急于合諸侯執嬰齊非霸討不足以示威盟曹南非同志不足以示信卒于兵敗身傷不知反求諸已欲速見小利之過也張氏曰齊桓之霸屈意去忿盟魯平宋以致諸侯先近故也今襄公欲圖諸侯近于宋者莫如曹滕滕既執矣曹又被圍宜其不遂霸也家氏曰當是時鄭入滑狄侵衛魯伐邾以中國無霸而動也宋襄苟能治其所當治則義聲暢而霸業成矣此春秋所望于宋襄者故比事以見義衛人伐邢秋衛人伐邢以報莵圃之役于是衛大旱卜有事于山川不吉寧莊子曰昔周饑克殷而年豐今邢方無道諸侯無霸天其或者欲使衛討邢乎從之師興而雨髙氏曰衛不伐狄而伐邢是以人之左氏謂師興而雨不亦誣哉薛氏曰非王命而擅征伐怨以報怨而已冬㑹陳人蔡人楚人鄭人盟于齊陳穆公請修好于諸侯以無忘齊桓之德冬盟于齊修桓公之好也杜氏曰地于齊齊亦與盟胡氏曰盟㑹皆君之禮也微者盟㑹不志于春秋凡所志者必有君與貴大夫居其間也然則為此盟者乃公與陳蔡楚鄭之君或其大夫曷為內則沒公外則人諸侯與大夫諱是盟也楚人之得與中國㑹盟自此始也莊十年荆敗蔡師始見于經其後入蔡伐鄭皆以號舉夷狄之也僖公元年改而稱楚經亦書人于是乎浸强矣然終桓公世皆止書人而不得與中國㑹盟者以修霸業能制其强故也桓公既沒中國無霸鄭伯首朝于楚其後遂為此盟故春秋沒公人陳蔡諸侯而以鄭列其下者蓋深罪之也又二年復盟于鹿上至㑹于盂遂執宋公以伐宋而楚于是乎大張列位于陳蔡之上而書爵矣聖人書此豈與之乎所以著夷狄之强傷中國之衰莫能抗也故深諱此盟一以外夷狄二以惡諸侯之失道三以謹盟㑹之始也梁亡十八年梁伯益其國而不能實也命曰新里秦取之至是春遂城而居之初梁伯好土功亟城而弗處民罷而弗堪則曰某寇將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁左氏曰梁亡不書其主自取之也公羊氏曰此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也穀梁氏曰湎于酒淫于色心昏耳目塞上無正長之治大臣背叛民為寇盜梁亡自亡也陸氏微㫖曰梁伯亟用其民自取滅亡其罪當矣秦人肆其强暴取人之國沒而不書其義安在曰乘人之危其惡易見也滅人之國其罪易知也自取滅亡其意微矣春秋之作聖人所以明微也胡安定先生曰大抵邦國用賢則存失賢則亡賢既不用上下放恣百度頽圮何止于土工刑法淫威而已哉故梁之自亡失賢而亡也胡氏曰天行健君子以自强不息古之諸侯朝修其禁令晝考其國職夕省其典刑夜警百工無使慆淫而後即安故克勤于邦荒度土工者禹也栗栗危懼檢身若不及者湯也自朝至于日中昃不遑暇食用咸和萬民者文王也凡有國家者土地雖廣人民雖衆兵甲雖多城郭雖固而不能自强于政治則日危月削如火銷膏以至滅亡而莫覺也而况好土工輕民力湎于酒淫于色心昏而出惡政者乎其亡可立而待也二十年春新作南門髙郵孫氏曰春秋之法言新則有舊也言作則有加也因其舊而制度有加焉所謂新作也胡氏曰書新作南門譏用民力于所不當為也魯人為長府閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中春秋凡用民力得其時制者猶書于䇿以見勞民為重事而况輕用于所不當為者乎然僖公嘗修泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂戒之意湥矣髙氏曰諸侯宫城之門皆有定制輒更舊制而增大之罪不止于勞民而已夏郜子來朝五月乙巳西宫災公羊氏曰西宫者小寢也有西宫則有東宫矣穀梁氏曰以是為閔宫也胡安定先生曰若是閔宫則明書新宫不得謂之西宫也此西宫蓋公之别宫也家氏曰小寢人君燕私之地災見于是警戒湥矣人君之過不在朝路臨蒞之時而常在于深宫燕處之際天之示譴豈徒然哉鄭人入滑滑人叛鄭而服于衛夏鄭公子士泄堵寇帥師入滑家氏曰自齊桓公沒諸侯動兵相侵弱小漸被其毒宋襄茍欲踵霸當禀王命㑹諸侯伸要束而懲之如鄭人入滑皆當糾也舍是不為而執滕圍曹强人從已烏能有成秋齊人狄人盟于邢齊狄盟于邢謀衛難也于是衛方病邢家氏曰甚哉齊昭之愚無知也桓公征楚而服之己乃與之盟于國桓公攘狄而却之己乃與之盟于邢反常逆理抑至于是傳曰厥父菑厥子乃不肯播厥父基厥子乃弗肯堂其齊昭之謂乎春秋俱書曰人亦所以外齊也亷耻道喪而以狄病衛齊不競矣冬楚人伐隨隨以漢東諸侯叛楚冬楚鬬榖於莵帥師伐隨取成而還襄陵許氏曰楚既服隨則將爭衡上國矣而宋欲盟之其能絀乎師氏曰楚在齊桓之世雖未至于竄伏然亦未至于太甚今齊桓既死乃敢與諸侯盟于齊以萌圖霸之心又肆征伐以示可畏之威諸侯無能為者明年遂有鹿上之盟及秋又有盂之㑹于是執宋公以伐宋先書齊之盟繼書隨之伐所以明楚之幾微已動于此而宋不悟也二十有一年春狄侵衛張氏曰因邢之盟也孝公不能嗣父之業楚狄皆因之以為中國患此齊邢之盟所以兩書而邢衛並受其禍也許氏曰中國無霸則諸侯力政四方衡决民被其災此書伐衛伐邢入滑伐隨侵衛著無霸之患也家氏曰為中國患者狄與楚也楚强大未易治狄悍而微自桓公之沒再侵衛彼謂衛人失霸國之援而可欺也宋襄與其盟楚而求諸侯盍若伐狄以寧諸夏能治狄而霸政舉矣顧乃舍其力之所可及義之所當為而為其所不可為狂躁害之也宋人齊人楚人盟于鹿上二十年宋襄公欲合諸侯臧文仲聞之曰以欲從人則可以人從欲鮮濟至是宋人為鹿上之盟以求諸侯于楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗師氏曰齊侯圖伯惟以尊中國為辭故能假仁義以為盟主凡與諸侯㑹盟或主王人或主王世子或主宰周公不然則中國五等之諸侯而止耳今宋欲圖霸乃與楚人為鹿上之盟以求諸侯不知何以令諸侯而成霸業乎小東萊吕氏曰宋襄欲霸乃求楚所㑹之諸侯蓋楚子有意執之故許之也齊晉所以霸皆先弱楚楚與中國其勢不兩立桓公有葵丘之㑹晉文有城濮之戰所以攘僣亂安中國而成霸業也宋襄欲霸反求諸侯于楚是與亂同事也安能與齊晉並霸乎宜其見辱于楚也張氏曰霸中國者宋之欲也亂中國者楚之欲也欲霸中國而求之于淫名亂常之楚與之同盟此春秋所以列序而人之以著襄公之自取敗辱也陳氏曰齊桓卒宋襄欲繼之而霸而求諸侯于楚楚于是爭長于宋則是盟也莫適為主人自為盟而已矣夏大旱公欲焚巫尫臧文仲曰非旱僃也修城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗也饑而不害髙郵孫氏曰春秋之記災異有曰不雨者旱不為災隂陽不和之異也有曰大雩者旱未為災非時而雩也有曰大旱者旱而為災非常也旱而為災則不雨矣不雨淺于旱也旱則雩矣言雩未見其災也春秋書大旱者二非常為災之辭也師氏曰不月以見其經時焉髙氏曰以二百四十二年而兩大旱何其少也曰所謂大旱者非特吾國也舉天下言之也秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之于是楚執宋公以伐宋陳氏曰宋楚初爭長也是故楚稱子而序陳蔡鄭許曹之上不知諸侯之從楚與從宋與不豫宋以霸也公羊氏曰易為不言楚子執之不與楚子之執諸侯也髙氏曰執宋公者楚也而繫于在㑹諸侯執之之辭何也所以深罪在㑹之諸侯也南面之君兵非不多而力非不足也而聽楚人執辱中國主盟之君而莫之敢違其不勇于為義亦甚矣雖宋德不足懷慮不及逺力求諸侯以及于難而諸侯甘心事楚人以致楚人侵凌中國此罪不可貸故以諸侯共執為文不使楚人專執中國諸侯也張氏曰按公羊傳曰宋公與楚子期以乘車之㑹公子目夷諫曰楚夷國也强而無義請以兵車往㑹宋公曰不可吾與之約為乘車之㑹自我為之自我墮之不可楚人果伏兵車執宋公以伐宋夫孔子相定公㑹齊侯乃甥舅之國猶以為文事不可無武僃請司馬以行楚南蠻也而可信其詐僞之約徒手出㑹之是輕以其身溷于虎狼之羣也不免宜矣胡氏曰春秋為賢者諱宋公見執不少隱之何也夫盟主者所以合天下之諸侯攘僣亂尊王室者也宋公欲繼齊桓之烈而與楚盟㑹豈攘僣亂尊王室之義乎故人宋公于鹿上之盟而盂之㑹直書而不隱所以深貶之也家氏曰春秋正名之書也楚自熊通以來妄自尊大遂僭王者之隆名春秋每以號舉不使之得與中國諸侯齒今楚益强盛合諸侯詐以執宋公中國一大變也春秋以楚子書夫豈進而爵之乎蕃服雖大曰子彼革號僭王以兵猾夏春秋序以子爵所以正其始封之名辨中外之分孰云其漸進楚人乎自是而後楚始書子正名也或曰如子所言始何以書荆人今何以書楚子乎曰始其來聘僭號于國中耳春秋姑以號舉今㑹于齊盟于鹿上諸侯畏其强大有以事王者而事之春秋于是正其始封之名書之曰子示天王之尊乃天下共主非僣竊所得干也自是而後楚之慿陵無不書子何爵之有哉髙郵孫氏曰春秋因㑹而執諸侯惟二處盂之㑹楚人執宋公而不言楚人溴梁之㑹晉侯執莒子邾子而斥言晉人二事略同而書之異辭者聖人之意也盂之㑹中國之諸侯隨盟主而㑹楚子楚子執宋公以伐宋又代楚子而伐之罪不責于楚子諸侯實同之也溴梁之㑹晉侯以大義帥諸侯而㑹焉執莒邾之君者晉侯也以信㑹而以詐執之可責者晉侯也蓋春秋之輕重與奪惟義所在爾冬公伐邾髙氏曰是舉也不為無義至明年伐邾取須句則魯之情可見矣不書邾滅須句者罪公聽婦人之言而興兵以伐婚姻之國因以為已利也楚人使宜申來獻捷穀梁氏曰捷軍得也其不曰宋捷何也不與楚捷於宋也髙氏曰中國于外域則有捷諸侯于天子則有獻捷今所獻者宋捷也所使宜申者楚子也楚子所以來獻捷者致公也聖人不豫外域反捷乎中國故書楚人來獻而不云宋捷也楚與諸侯同伐宋而魯不與焉及得宋捷特使宜申來誇示以威魯蓋欲致魯侯來聽盟也髙郵孫氏曰春秋書獻捷者二齊稱戎捷捷山戎也山戎則可捷矣而獻有罪焉不得沒戎捷而不言也宋襄求霸而不果至于見執而伐之宋中國也而荆蠻捷之荆蠻安得捷吾中國乎不曰宋捷不以中國而捷于荆蠻也中國無見捷于荆蠻之理也無其理則不言焉所以護中國而法後世也陳氏曰盂㑹不稱子無以見楚宋之爭長獻捷于魯不人之則是遂豫楚也胡氏曰諸侯從楚伐宋而魯獨不與故楚來獻捷以脅魯為魯計者拒其使而不受可也請于天王而討之可也宋公先代之後作賓王家方修盟㑹而伏兵車執之于壇坫之上又以軍獲遺獻諸侯其橫逆甚矣拒其使而不受聲其罪而致討何患無辭家氏曰當是時舉中國之大無有能辨斯事者晉文不興楚之禍中國亦何所不至乎十有二月癸丑公㑹諸侯盟于薄釋宋公㑹于薄以釋之子魚曰禍猶未也未足以懲君公羊氏曰執未有言釋者此其言釋之何公與議爾也穀梁氏曰不言楚不與楚專釋也髙氏曰公本不附楚因宜申來獻宋捷之故不敢不與楚㑹而書㑹諸侯者以諸侯皆在是故前目後凡且見公之續至也執宋公釋宋公皆楚子耳前之執宋公既以諸侯共執為文此又蒙上諸侯共釋為文者聖人抑制僣竊不使楚子得以專執釋中國之諸侯懲荆舒之意也蘇氏曰凡諸侯見執而不失國者于歸名之書曰某侯某歸于某此其不名而言釋何也以為執之釋之皆在諸侯也若是而尚可求諸侯乎師氏曰盂之㑹宋為主而楚次之諸侯皆居其中今執宋公伐宋之後乃有薄之盟也是此盟也楚為主矣不序以惡之且著㑹盟之濫不復有上下尊卑焉春秋扶持中國而攘却僭竊之意不亦嚴乎胡氏曰㑹未有言其所為獨㑹于稷書成宋亂者為受郜鼎立華督也㑹于澶淵言宋災故者為葬蔡侯不討般也盟不書所為而盟于薄言釋宋公者宋方主㑹楚人執而伐之以其俘獲來遺是萋苴追琢之嘉賓幾殄于僣竊亂賊之手此正天下大變春秋之所謹也魯既不能申大義以抑其强暴使宋公見釋出自天王與中國而顧與歃血要言求楚子以釋之是操縱大權自楚人出其事已傎甚矣故書㑹盟書釋皆不言楚子謝氏曰襄公為宗廟社稷人民主始也諸侯㑹于盂若罪人執之于㑹終也諸侯盟于薄若罪人釋之于盟其危辱至此者皆以不量力不度德取之而已有國家其動可不戒耶二十有二年春公伐邾取須句任宿須句顓臾風姓也實司大皡與有濟之祀以服事諸夏二十一年邾人滅須句須句子來奔因成風也成風為之言于公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皡濟而修祀紓禍也至是伐邾取須句反其君焉胡安定先生曰僖公伐邾非伐其罪但利其土地而已陳氏曰春秋嚴義利之辨苟以為利一以取書之是故雖邾人滅須句須句子來奔伐邾取須句反其君焉書取須句夏宋公衛侯許男滕子伐鄭三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣髙氏曰齊桓既沒楚又强大鄭伯比楚以圖自安宋襄雖被執見釋而圖霸之心未已鄭伯度宋之不霸首背中國而改事楚故宋率衛許滕四國共伐之春秋皆與其爵以明討得其正也愚謂宋襄有志無才卒于自敗其伐鄭也亦異于齊桓矣惜哉秋八月丁未及邾人戰于升陘邾人以須句故出師公卑邾不設僃而禦之臧文仲曰國無小不可易也無僃雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰又曰敬之敬之天惟顯思先王之明德猶無不難也無不懼也况我小國乎君其無謂邾小蜂蠆有毒而况國乎弗聽八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門謝氏曰不書公與敗諱之也升陘之戰由須句所致曲皆在我故以內為戰主而惡之也胡氏曰魯既敗績邾亦幾亡輕用師徒害及兩國亦異于誅暴禁亂之兵矣張氏曰存心茍公臨事必懼觀此則知春取須句非有存亡繼絶之公心審矣薛氏曰以魯而為邾敗大不足恃兵不可窮也如此冬十有一月己巳朔宋公及楚人戰于泓宋師敗績楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已弗聽冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有于二毛明耻教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也師氏曰前乎宋公齊桓嘗圖霸矣與諸侯㑹盟養威近三十年而後伐楚後乎宋公晉文嘗圖霸矣與賢臣謀議作三德以示民然後伐楚此無他定而後發發期必中自度不辱于楚人而後可動故齊桓晉文既服楚而霸業遂定今宋公欲圖霸未見如何養威如何作德既嘗失計而與楚㑹盟又無僃而為楚所執如是而欲圖霸不亦難乎復不自悟懷忿不平及楚人而與之戰則是忿兵也徒知楚自㑹盂叛信以來我曲彼直獨不念動非其念誰與為援姑恃理直而可以必成功耶自謂可成功而卒為楚所敗故書曰宋師敗績謝氏曰不書楚人侵伐者楚來救鄭而襄公與之戰也戰由宋起故以宋人主戰而罪之選賢才緝政治親內睦外以振國綱服楚之道也襄公乃於危難之中逞復讐之怨率破傷之衆以當强楚之鋒襲古人陳迹以待楚之變詐是以衆敗身傷終以取亡前書伐鄭後書戰敗罪其不知反也隕石于宋六鷁退飛過宋異之大者也襄公不知恐懼修省且又輕舉妄動以遂私欲而禍不旋踵及身然則上天變異其可不畏耶胡氏曰宋襄公不扼人于險不鼓不成列公羊以謂至仁大義雖文王之戰不能過也而春秋不與何哉物有本末事有終始順事恕施者王政之本也襄公伐齊之喪奉少奪長使齊人有殺無虧之惡有敗績之傷此晉獻公之所以亂其國者罪一也桓公存三亡國以屬諸侯義士猶曰薄德而一㑹虐二國之君罪二也曹人不服盍姑省德無闕然後動而興師圍之罪三也凡此三者不仁非義襄公敢行而愛重傷與二毛則亦何異盜跖之以分均出後為仁義陳仲子以避兄離母居於陵為亷乎夫計末遺本飭小名妨大德者春秋之所惡也故辭繁不殺而宋公書及以湥貶之也髙郵孫氏曰孔子曰我戰則勝非謂能戰而勝也勝之道素修而無敵于天下也豈若宋襄之道不修而茍拘小信乎公羊殆未知文王之戰爾胡安定先生曰襄公無桓公之資欲紹桓公之烈以宗諸侯以致强楚故盂之㑹被執受伐今復與楚爭鄭衆敗身傷喪師泓水七月而死為中國羞惜哉蓋有善志無其才取辱強楚而羞及中國也二十有三年春齊侯伐宋圍緡以討其不與盟于齊也胡安定先生曰宋伐齊使殺無虧而立孝公今齊侯反伐之是宋自召其伐之之禍然齊伐人之國又圍其邑其惡甚矣故聖人僃志之胡氏曰齊霸國之餘業也宋襄公既敗于泓荆楚之𫝑益張矣齊侯既無尊中國攘夷狄恤患災畏簡書之意又乘其弱而伐之此尤義之所不得為者也故書伐國而言圍邑以著其罪然則桓公伐鄭圍新城何以不為貶乎鄭與楚合慿陵中國桓公伐之攘夷狄也宋與楚戰兵敗身傷齊侯伐之殘中夏也其事異矣美惡不嫌同辭家氏曰齊昭非宋襄之力則齊之一亡公子耳宋襄不忘齊桓臨終之託為昭盡力昭所以有國甗一戰之功也今乘其敗而伐之蓋以是諂于夷楚求為自全之計以怨報德刑戮之民或曰何以猶爵曰春秋有書爵以褒者有目其人之身而書某公某侯以著其罪者若齊昭之書侯謂其身受宋公之大德而忍于為不義故目其人而誅之夏五月庚寅宋公兹父卒傷于泓故也謝氏曰智小而謀大力少而任重未有不終于敗者也襄公以庸暗之才貪逺大之業方其盟于鹿上志欲合諸侯朝齊楚豈知後之勢敗身亡為天下笑哉故君子動必度德進必量力愚按宋襄公自齊桓之末年即有圖霸之心雖桓公君臣亦望之以繼霸之事故屬之以其子卒之師敗身傷幾至亡國霸業無成抑鬱以死者由其徒慕仁義之名而不識仁義之實以至于是也夫齊桓公知仁義之為美假之而未能有者猶取仁義之功宋襄公聞仁義之為美慕之而不能識者反為仁義之賊于是冥行妄作以殘暴為義以姑息為仁非特不能至乎仁義而遂陷于不仁不義矣故其始也齊桓方卒而伐其喪滕人來㑹而執其君曹人不服而圍其國是蓋以殘暴為義也其終也不以兵車雜乘車不鼓不成列不重傷不禽二毛則以姑息為仁矣所為顛倒繆亂若此得保首領以沒幸矣尚何望其能霸乎是以大學之道其始也必先之以格物致知則無宋襄之失其後也必本之以誠意正心則無齊桓之弊斯其所以為聖賢之學帝王之道也與秋楚人伐陳楚成得臣帥師伐陳討其二于宋也遂取焦夷城頓而還子文以為之功使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾家氏曰陳穆公請修好于齊以無忘桓公之德而齊之㑹楚人亦得列于其間名為修齊桓舊好其實自結于强楚今楚人乃以其二于宋而伐之何耶蓋楚人僣亂諸夏實恥從之而迫于凶威有不容自己者陳也介于二者之間猶欲自附于宋不忍遽從僣亂是以楚疑而伐之若蔡若鄭則甘于從楚而不悔無復羞惡之心矣冬十有一月杞子卒春秋闕疑卷十六
