body:
  text: 春秋闕疑春秋類提要臣等謹案春秋闕疑四十五卷元鄭玉撰其書采左氏傳列於前公榖二家以下合於理者則取之其或經有脫誤無從質證則闕之間附己論如開卷夏正周正其事易明存而不論慎之至也其序謂春秋有魯史之舊文聖人之特筆不可字求其義亦不可謂全無其義持論至為平允至於朱子綱目體例本仿春秋經傳而作序乃謂以經為綱以傳為目仿朱子之體例則所言不免倒置耳玉字子美歙縣人元末除翰林待制以疾辭明兵入徽州守將要致之玉不屈死學者稱師山先生所著有師山集今亦别著於録云乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋闕疑原序嗚呼夫子集羣聖之大成春秋見夫子之大用蓋體天地之道而無遺具帝王之法而有徵其於事也可以因則因可以革則革其於人也可以褒則褒可以貶則貶其為綱也則尊王而賤霸尊內而攘外其為目也則因講信修睦救災恤患之事而為朝覲聘問會盟侵伐之文其主意也則在於誅亂臣討賊子其成功也則遏人欲於橫流存天理於既滅撥亂世反之正損益四代之制著為不刋之典也故曰知我者其惟春秋乎罪我者其惟春秋乎知之者知其與天為一罪之者罪其以匹夫而行天子之事又曰我欲托之空言不如見之行事之深切著明也故易詩書言其理春秋載其事有易詩書而無春秋則皆空言而已矣是以明之者堯舜湯武之治可復昧之者桀紂幽厲之禍立至有天下國家而不知春秋之道其亦何以為天下國家也哉然在當時遊夏已不能贊一辭至于三家之傳左氏雖若詳於事其失也誇公穀雖或明於理其失也鄙及觀其著作之意則若故為異同之辭而非有一定不可易之説兩漢專門名家之學則又泥于災祥徵應而不知經之大用唐宋諸儒人自為説家自為書紛如聚訟互有得失程子雖得經之本旨惜無全書朱子間論事之是非又無著述為今之計宜博採諸儒之論發明聖人之旨經有殘闕則考諸傳以補其遺傳有訛舛則稽諸經以證其謬使經之大旨粲然復明於世昭百王之大法開萬世之太平然後足以盡斯經之用而玉也非其人也間不自揆嘗因朱子通鑑綱目之例以經為綱大字揭之於上復以傳為目而小字疏之於下敘事則專於左氏而附以公穀合於經者則取之立論則先於公穀而參以歷代諸儒之説合於理者則取之其或經有脫誤無從質證則寧闕之以俟知者而不敢強為訓解傳有不同無所考據則寧兩存之而不敢妄為去取至於誅討之事尤不敢輕信傳文曲相附會必欲獄得其情事盡其實則以經之所作由於斯也其他常事則直書而義自見大事須變文而義始明蓋春秋有魯史之舊文有聖人之特筆固不可字求其義如酷吏之刑書亦不可謂全無其義如史官之實録也聖人之經辭簡義奧固非淺見臆説所能窺測重以歲月滋久殘闕維多又豈懸空想像所能補綴與其強通其所不可通以取譏於當世孰若闕其所當闕以俟知於後人程子謂春秋大義數十炳如日星豈無可明之義朱子謂起頭一句春王正月便不可解固有當闕之疑玉之為是書也折衷二説而為之義例所以辭語重復不避繁蕪者蓋以常人之心窺測聖人之意雖費辭説猶不能達其意也況敢略於言乎然將以備遺忘便檢閲而已非敢謂明經旨傳後世也觀者幸恕其僭至正十五年秋九月朔新安鄭玉序
