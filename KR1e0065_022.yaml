body:
  text: 春秋闕疑卷二十二元鄭玉撰宣公公名倭一名接又作委文公之子匡王五年即位諡法善問周達曰宣元年春王正月公即位高氏曰宣公受弑賊之立而不復討賊是與聞乎弑此不夭無王之甚者而書春王正月公即位者以天道王法正其自即位之罪也公子遂如齊逆女胡氏曰魯秉周禮喪未期年遣卿逆女何亟乎太子赤齊出也仲遂殺子赤及其母弟而立宣公懼于見討故結婚于齊爲自安計越典禮以逆之如是其亟而不顧者必敬嬴仲遂請齊立接之始謀也高氏曰逆女親者也使大夫非正也公子遂蓋公族之尊者尤不可也家氏曰書即位書逆女書遂以夫人婦姜至自齊書齊人取濟西田著魯人結齊之援以弑其君著齊人輔魯之篡俾弑其君蓋明王法以治齊魯之罪二國皆有討也嗟夫如齊禀命而歸弑其君者公子遂也如齊逆女亦公子遂也如齊割地以賂者亦公子遂也春秋備書以見請婚割地弑君篡國始終其事者此一賊之所爲誅齊也治魯也誅襄仲也治宣公也學者備觀前後書法而識春秋之㫖所謂不加誅斥而義自見者也三月遂以夫人婦姜至自齊公羊曰遂何以不稱公子一事而再見者卒名也陳氏曰夫人婦姜氏有姑之恒稱也若妾姑也則不書氏是故有成風則出姜不氏有敬嬴則穆姜不氏所以别嫡姑也胡氏曰凡稱婦者其辭雖同立義則異逆婦姜于齊病文公也以婦姜至自齊責敬嬴也敬嬴嬖妾私事襄仲以其子屬之殺世適兄弟出主君夫人援成風故事即以子貴爲國君母斬焉在衰服之中請婚納婦而其罪隱而未見也故因夫人至特稱婦姜以顯之此乃春秋推見至隱著妾毋當國用事爲後世鑒也高氏曰不直書夫人婦姜至自齊而稱遂以者明公子遂不當以夫人歸也婚禮莫重于親迎豈容他人得以歸之哉家氏曰此一齊也受人之出母而與之以妻此一魯也棄母于齊而娶齊女以爲之婦絶滅天理敗亂倫教遂使周公太公之國胥爲無禮無義之歸此春秋中年魯國一大變也是以聖人于文宣之際特書屢書十見之經誅魯之君臣而必及于齊也夏季孫行父如齊季文子如齊納賂以請㑹高氏曰公既婚矣然後季文子如齊納賂請列于㑹蓋春秋時凡國君不以其道立茍得一與于諸侯之㑹則他國不得復討其罪所以季文子不憚自行者欲假大國之權以定宣公之位也昔人稱季文子三思而後行今當魯國喪禍之際而舉動乖錯如此安在其爲三思哉是必思之過多而方寸亂矣故孔子曰再思可矣蓋譏之也胡氏曰經有不待傳而著者比事以觀斯得矣下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請以賂也雖㣲傳其事著矣晉放其大夫胥甲父于衛晉人討不用命者放胥甲父于衛而立胥克先辛奔齊胡氏曰秦晉戰于河曲撓臾駢之謀者趙穿也若討其不用命則當以穿爲首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也桃園之罪其志固形于此矣謝氏曰放屏棄之辭放驩兠于崇山是也誅罰王之事也諸侯擅命其上專殺大夫其次專放大夫書放胥甲父罪之也古者大臣有罪放之幽遠之地者擯之不使得爲民病也衛晉之隣也以甲父不忠于晉而放之于衛是以晉之禍移于隣國也書放胥甲父于衛著其失也劉氏意林曰使晉之君臣因胥甲父之言推而廣之修已而不責人隣國將來服奚患秦哉不耻政之不修而疾戰之不勝不憂德之不仁而忿民之不爲用不責已之不中義而疾人之爲謀不忠未有用此而保其國者也公㑹齊侯于平州㑹于平州以定公位胡氏曰春秋以來弑君篡國者已列于諸侯之㑹則不復致討夫篡弑之賊毁滅天理無所容于天地之間身無存没時無古今其罪不得赦也以列于㑹而不復討是等倫紀於弁髦棄人類爲禽獸此仲尼所爲懼春秋所以作也然欲定其位者魯宣也宜稱及齊而曰㑹者討賊之法也凡討亂臣賊子必㴱絶其黨而後爲惡者孤矣公子遂如齊東門襄仲如齊拜成高氏曰齊惠公新遭弑逆之變而助成殺嫡之謀不念出姜之戚而繼爲喪婚之好貪取濟西之賂而遂定篡者之位廢君臣兄弟夫婦之義是謂以亂濟亂者也胡氏曰遂及行父一再見于經矣如齊拜成雖削之可也又再書于䇿者于以著其始終成就篡立之謀以戒後世人臣或内交宫禁以固其寵或外結藩鎭以爲之援至于殺生廢置皆出其手而人主不悟者其慮㴱矣六月齊人取濟西田爲立公故以賂齊也程氏曰宣公不義得國賂齊以求助齊受之以助不義故書取不義不能保其土故不云我非爲彼强取故不諱胡氏曰魯人致賂以免討而書齊人取田者所以著其罪春秋討賊尤嚴于利其爲惡而助之者所以孤其黨夫齊魯隣國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寧魯亂首與之㑹是利其爲利而助之也弑君篡國人道所不容而貨賄公行免于諸侯之討則倫紀等於弁髦人類化爲禽獸其禍乃自不知以義爲利而以利之可以爲利而爲之也孟子爲梁王極言利國者必至于弑奪而後饜蓋得經書取田之意秋邾子來朝楚子鄭人侵陳遂侵宋宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又㑹諸侯于扈將爲魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉秋楚子侵陳遂侵宋師氏曰于楚書子著其强盛于鄭書人罪其從楚胡氏曰鄭伯本以宋人弑君晉不能討受賂而還以此罪晉爲不足與也遂受盟于楚今乃附楚以亟病中國何義乎書侵陳遂侵宋見潛師掠境肆爲侵暴非能聲宋罪而討之也既正此師爲不義然後中國之師可舉矣陳氏曰後十五年而宋楚平後十五年而晉趙武楚屈建同盟于宋諸夏之君分爲晉楚之從矣南北之勢于是始故謹書之也晉趙盾帥師救陳晉趙盾帥師救陳宋胡氏曰鄭在王畿之内而附夷蠻陳先代帝王之後而見侵逼此門庭之寇利用禦之者也晉能救陳則存諸夏攘冦亂之師故特褒而書救傳稱師救陳宋經不書宋此非闕文乃聖人削之也前方以不能討宋上卿貶而稱人諸侯㑹而不序今若書救宋則典刑紊矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭㑹于棐林以伐鄭也楚蔿賈救鄭遇于北林囚晉解揚晉人乃還泰山孫氏曰此晉趙盾帥師救陳致宋公陳侯衛侯曹伯于棐林伐鄭也經言宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭者不與趙盾致四國之君也高氏曰夫征伐自天子出非諸侯可得而專也諸侯專之猶不可况大夫乎自隱桓以來諸侯無大小皆專而行之及宣成而下大夫無内外皆專而行之棐林之㑹天下之事中國之政皆在趙盾矣冬晉趙穿帥師侵崇晉欲求成于秦趙穿曰我侵崇秦急崇必救之吾以求成焉冬趙穿侵崇秦弗與成薛氏曰崇秦之與國也河曲之戰七年干此秦未嘗出越險阻以攻其與國致明年之伐耳胡氏曰晉欲求成于秦不以大義動之而伐其與國則爲諼已甚比諸伐楚以救江異矣而傳謂設此謀者趙穿也意者趙穿已有逆心欲得兵權託于伐國以用其衆乎不然何謀之迂而當國者亦不裁正而從之也晉人宋人伐鄭晉人伐鄭以報北林之役于是晉侯侈趙宣子爲政驟諫而不入故不競于楚張氏曰晉受宋賂不行天討鄭以是叛中國而晉人復與宋伐之不能服鄭反致明年之敗家氏曰今年秋諸侯㑹伐鄭春秋爵之今晉及宋復伐鄭春秋人之何哉宋負弑君之大惡不能討而楚討之爲趙盾者當内知自愧乃更率弑賊以伐鄭春秋是以有貶蓋鄭可伐也爲宋而伐鄭則不可也故伐鄭則爵之爲宋而伐鄭則人之此一事而有先後褒貶之異者也胡氏曰以貶書伐者若曰聲罪致討而已有瑕則何以伐人二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元鄭公子歸生受命于楚伐宋宋華元樂呂御之二月壬子戰于大棘宋師敗績囚華元獲樂呂及甲車四百六十乘俘二百五十人馘百人狂狡輅鄭人鄭人入于井倒㦸而出之獲狂狡將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子爲政今日之事我爲政與入鄭師故敗宋人以兵車百乘文馬百駟以贖華元于鄭半入華元逃歸立于門外告而入張氏曰宋以弑君致寇而不服罪故書宋及猶曰華元爲志乎此戰也胡氏曰此明大夫雖貴與師等也故將尊師少稱將不稱師師衆將卑稱師不稱將將尊師衆並書于䇿者示人君不可輕役大衆又重將帥之選其義㴱矣陳氏曰戰未有書大夫于是書宋華元鄭公子歸生大夫初主戰也自是戰皆書大夫戰不書大夫者吳也吳無大夫也秦師伐晉以報崇也遂圍焦胡氏曰晉用大師于崇乃趙穿私意而無名也故書侵秦人爲是興師而報晉則問其無名之罪也故書伐世豈有欲求成于强國而侵其所與可得成者乎穿之情見矣宣子當國筭無遺䇿獨懵于此哉其從之也而盾之情亦見矣春秋筆削因革必有以也一侵一伐而不書圍焦所以誅晉卿上侵之意其所由來者漸矣夏晉人宋人衛人陳人侵鄭晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之胡氏曰師之老壯在曲直晉主夏盟盾既當國合諸侯之師何畏乎楚何避乎鬭椒然力非不足而去之者以理曲也故卿不氏而稱人書侵而不言伐秋九月乙丑晉趙盾弑其君夷臯晉靈公不君厚歛以彫牆從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也㑹請先不入則子繼之三進及溜而後視之曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣賴之又曰衮職有闕唯仲山甫補之能補過也君能補過衮不廢矣猶不改宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一于此不如死也觸槐而死秋九月晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何爲鬭且出提彌明死之初宣子田于首山舍于翳桑見靈輙餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而爲之簟食與肉寘諸槖以與之既而與爲公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也乙丑趙穿攻靈公于桃園宣子未出山而復太史書曰趙盾弑其君以示于朝宣子曰不然對曰子爲正卿亡不越竟反不討賊非子而誰宣子曰烏乎我之懷矣自詒伊慼其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也爲法受惡惜也越竟乃免宣子使趙穿逆公子黑臀于周而立之壬申朝于武宫愚按經但書弑初無不討賊之文自左氏託爲孔子之言二傳從而和之趙盾弑君之情始晦而諸儒議論之辭起矣今去之千載以其事實考之趙盾弑君之情尚可見也晉靈公欲殺趙盾盾乃謀弑靈公遂使趙穿攻于桃園者情也謀既定則出奔以待其舉事既遂則復國以成其亂者蹟也盾蓋出謀穿特從之耳故太史書曰趙盾弑其君誅首惡也盾以其非親弑可以自掩欲爭以茍免于是史狐對曰子爲正卿亡不越境反不討賊非子而誰所以爲之辭而證其主謀乎弑也况趙盾反國非惟不能討賊既聞狐語之後又使趙穿迎公子黒臀而立之情跡益彰露矣左氏但泥其不越境不討賊之辭而不察其非子而誰之語故謂狐直以盾不討賊而加以弑君之罪又從而託爲孔子之説二傳從之姦臣賊子之情跡始晦而幸免矣冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望葬匡王胡氏曰四月而葬王室不君其禮畧也㣲者往㑹魯侯不臣其情慢也楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之方有德也遠方圖物貢金九牧鑄鼎象物百物而爲之備使民知神姦故民入川澤山林不逢不若魑魅魍魎莫能逢之用能協于上下以承天休桀有昬德鼎遷于商載祀六百商紂暴虐鼎遷于周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也高氏曰僖三十二年秋秦晉遷陸渾之戎于伊川使雜居中國而天子置之不問至是楚子興兵來討故稱伐以見中國之不自正也師氏曰楚居南而陸渾在北今以楚望北長驅來自南土綿亘數千里以伐陸渾之戎其蔑視中國横行天下也可見矣楚子書爵蓋著其强盛齒于五等以辱中國之諸侯也薛氏曰楚伐陸渾此何以書爲逼京師也戎居王畿之内天子諸侯不能斥使相攻以震王室春秋之所懼也胡氏曰陸渾在王都之側逼近京畿族類之不分也楚又至洛觀兵于周疆問鼎之大小輕重焉故特書于策以謹中外之辨禁冦亂之階夏楚人侵鄭春晉侯伐鄭及郔鄭及晉平士㑹入盟夏楚人侵鄭鄭即晉故也胡氏曰晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊爲不足與似也而往從楚非矣今晉成公初立背僭竊而歸諸夏則是反之正也春秋書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪耳鄭既見侵于楚則及晉平可知矣秋赤狄侵齊孔氏疏云謂之赤狄白狄者俗尚赤衣白衣也宋師圍曹文十八年宋武氏之族道昭公子將奉司城須以作亂十二月宋公殺母弟須及昭公子使戴莊桓之族攻武氏于司馬子伯之館遂出武穆之族使公孫師爲司城公子朝卒使樂吕爲司寇以靖國人武穆之族以曹師伐宋至是宋師圍曹報武氏之亂也胡氏曰宋文公即位盡逐武穆之族二族以曹師伐宋然不書于經者二族以見逐而舉兵非討罪也及宋師圍曹報武氏之亂而經書之者端本清源之意也武穆二族與曹之師奚爲至于宋哉不能反躬自治恃衆强以報之兵革何時而息也宋惟有不赦之罪莫之治也故書法如此冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肻公伐莒取向師氏曰郯莒戰爭于經無見然公及齊侯以平之則其戰爭可知矣高氏曰及齊侯者以公爲主及郯者以莒爲主公既無以得莒後書郯伯姬來歸則郯亦不能固其好也張氏曰以宣公而平二小國若出于公不必假齊一言而彼已服今挾齊爲重而莒尚不肻伐莒而齊不復與復取向以自益春秋㴱以著宣公此心之不公而終之以爲利也劉氏傳曰君子之道猶射射者正已而後發發而不中不怨勝已者反求諸已而已矣左氏曰以亂平亂何治之有秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷楚人獻黿于鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指于鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之夏弑靈公書曰鄭公子歸生弑其君夷權不足也鄭人立子良辭曰以賢則去疾不足以順則公子堅長乃立襄公襄公將去穆氏而舍子良子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何爲乃舍之皆爲大夫十年鄭子家卒鄭人討幽公之亂斵子家之棺而逐其族改葬幽公諡之曰靈陸氏㣲㫖曰子公弑君之賊也其惡易知子家縱其爲逆罪莫大焉書之以爲首惡所以教天下之爲人臣者乎高氏曰春秋之作常施于可疑而不施于所不疑宋之罪無疑也歸生或疑于可免故治歸生則宋罪自見非重歸生而輕宋也以此爲防後世猶有失身爲逆賊所制如司馬亮沈慶之軰者樸鄉吕氏曰子公欲弑而不敢先發以語子家則子家必有以制其可否之勢可否之勢在子家而輕以狥人其爲首惡宜矣陳氏曰歸生爲正卿而宋有無君之心非歸生孰禁之于歸生乎謀先然而弗禁則賊由歸生而已矣愚謂凡人同惡相濟非同有是心則不敢同謀是事惟歸生已有無君之心故宋以無君之事謀之畜老猶憚殺之之言不過懼事不成而及于禍爾及宋譖之于公歸生知已不免即與之同舉是事矣觀左傳懼而從之之語則歸生蓋與宋同弑不但不阻之而已也蓋宋之初心尚有所疑故謀之歸生歸生以爲不可則不成弑矣歸生不但不阻之而又從之遂成此弑故春秋舍宋之始謀而以歸生爲首惡及觀宣公十年左傳謂子家卒鄭人討幽公之亂斵子家之棺而逐其族改葬幽公諡之曰靈則當時通鄭國之人皆以歸生爲首惡矣又何必孔子推見至隱而後歸獄歸生哉蓋讀左氏傳者習熟見聞而不知察耳赤狄侵齊秋公如齊公至自齊高氏曰狄在齊境而公往朝之公之無政又可知矣胡氏曰宣公以篡弑謀于齊而取國以土地賂齊而請㑹以卑屈事齊而求安上不知有天王下不知有方伯惟利交是奉而可保乎家氏曰自是公五如齊春秋皆備書之所以正齊侯黨篡受地脅婚之罪冬楚子伐鄭鄭未服也張氏曰楚自去年至十年侵伐鄭者凡五至十一年盟鄭于辰陵而鄭又徼事晉于是十二年圍鄭入之遂敗晉于邲而後鄭服楚晉人之不振有自來矣五年春公如齊高固使齊侯止公請叔姬焉夏公至自齊秋九月齊高固來逆子叔姬齊高固來逆女自爲也程子曰子者言是公女其他則姊妹之類也穀梁曰諸侯之嫁子于大夫主大夫以與之來者接内也不正其接内故不與夫婦之稱也胡氏曰夫以鄭國褊小楚公子圍之貴驕强大來娶于鄭子産辭而卻之使館于外欲野賜之幾不得撫有其室而宣公以魯國周公之後逼于高固請婚其女强委禽焉而不能止惟不知以禮爲守身之幹是以得此辱也春秋詳書爲後世鑒欲人之必謹于禮以定其位不然卑巽妄説不近于禮奚足遠耻辱哉叔孫得臣卒張氏曰不書日闕文也冬齊高固及子叔姬來冬來反馬也胡氏曰左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則高固親來非禮也又禮女子有行遠父母者歲一歸寧今見逆逾時未易歲也而叔姬亟來亦非禮也故書及書來以著齊罪也凡婚姻常事不書而書此者則以爲非常爲後世戒也楚人伐鄭楚子伐鄭陳及楚平晉荀林父救鄭伐陳家氏曰書楚伐不書晉救者鄭歸生弑君晉當爲鄭出師討賊不當救也六年春晉趙盾衛孫免侵陳陳即楚故也胡氏曰按傳稱陳及楚平荀林父伐陳經皆不書者以下書晉衛加兵于陳即陳及楚平可知矣以趙盾孫免書侵即林父無辭可稱亦可知矣晉嘗命上卿帥師救陳又再與之連兵伐鄭今而即楚無乃于已有闕盍亦自反可也遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟者非其道也夏四月秋八月螽胡氏曰傳謂螽爲穀災虐取于民之效也先是公伐莒取向後再如齊伐萊軍旅數起賦歛既繁戾氣應之矣夫善惡之感萌于心而災祥之應見于事宣公不知舍惡遷善以補前行之愆而用兵不息災異數見年穀不豐國用空乏卒至于改助法而稅民蓋自此始矣經于蟲螟一物之變必書于䇿示後世天人感應之理不可誣當慎其所感也冬十月楚人伐鄭取成而還杜氏曰九年十一年傳所稱厲之役蓋在此春秋闕疑巻二十二
