body:
  text: 秦秋闕疑卷十八元鄭玉撰二十有九年春介葛盧来舍于昌衍之上公在㑹饋之芻米髙氏曰介東方之國葛盧其名髙郵孫氏曰春秋之法自外至者書来介葛盧白狄也蓋聖人之意凡曰来者皆以不来為善也陳氏曰公猶在㑹不見何以書介入春秋未通于上國一歳再至意將安在乎故亟書之介人侵蕭譏有以来之也公至自圍許夏六月㑹王人晉人宋人齊人陳人蔡人秦人盟于翟泉公㑹王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憗盟于翟泉尋踐土之盟且謀伐鄭也程子曰晉文連年㑹盟皆在王畿之側而此盟復迫王城又與王人盟强逼甚矣胡氏曰翟泉近在洛陽王城之内而王子虎于此下與列國盟是謂上替諸侯大夫入天子之境雖貴曰士而于此上盟王子虎是謂下陵而無君之心著矣故以為大惡諱公而不書諸國之卿貶稱人而王子亦與焉者此正本之義也陳氏曰晉初以大夫盟王子也向也踐土之役王子虎不書涖盟也今以大夫盟王子文公之志荒矣以大夫交政于是始文公為之也劉氏意林曰揚子雲曰節莫差于僭此之謂矣善為天下者于此乎防之安有失哉秋大雨雹胡氏曰正蒙曰凡隂氣凝聚陽在内者不得出則奮激而為雷霆陽在外者不得入則周旋不舍而為風和而散則為霜雪雨露不和而散則為戾氣隂霾隂常散緩受交于陽則風雨調寒暑正雹者戾氣也隂脅陽臣侵君之象當是時僖公在位日乆季氏世卿公子專權政在大夫萌于此矣冬介葛盧来以未見公故復来朝禮之加燕好三十年春王正月夏狄侵齊春晉人侵鄭狄閒晉之有鄭虞也夏侵齊胡氏曰詩云用戒戎作用逷蠻方蠻方交侵所當攘斥晉文公若移圍鄭之師以伐之則方伯連帥之職修矣上書狄侵齊下書圍鄭此直書其事而義自見者也秋衞殺其大夫元咺及公子瑕衞侯鄭歸于衞晉侯使醫衍酖衞侯甯俞貨醫使薄其酖不死公為之請納玉於王與晉侯皆十瑴王許之秋乃釋衞侯衞侯使賂周歂冶厪曰茍能納我吾使爾為卿周冶殺元咺及子適子儀公入穀梁氏曰稱國以殺罪累上也衞侯在外其以累上之辭言之何也待其殺而後入也常山劉氏曰殺二大夫以上不書及者其事同殺之志均故也殺其大夫某及某者以某之故而延及某也胡氏曰公子瑕未聞有罪而殺之何也元咺立以為君故衞侯忌而殺之也然不與衞剽同者是瑕能拒咺辭其位而不立也不與陳佗同者是瑕能守節不為國人之所惡也故以公子冠瑕而稱及見瑕無罪事起元咺以咺之故延及于瑕而衞侯忌克專殺濫刑之惡著矣樸鄉吕氏曰衞侯之出奔楚也其㑹盟書衞子則是叔武嘗在位也故其歸也書曰衞侯鄭復歸于衞衞侯之被執也書公子瑕無異辭則是公子瑕未嘗在位也故其歸也但書曰衞侯鄭歸于衞書復則是失位也書歸則是未嘗失位也謝氏曰觀春秋不名于前稱名于後而晉文迫逐衞成衞成屈辱失國其罪由此見矣觀春秋稱復歸于前稱歸于後而晉文已絶衞成衞成未絶于衞其曲直由此見矣愚謂衞侯曹伯于其執也而即名之則無以著晉侯恃强凌弱廢置由已之暴于其歸也終不名之則無以見二君失國甘心忍辱不能振勵自新之罪况為國君而為人所執則無復諸侯之尊而同于匹夫矣故聖人哀之不生名之使存其諸侯之貴及其歸也則復為諸侯矣而委靡無恥猶為匹夫之行故聖人責之特生名之使儕于匹夫之賤此又輕重之權衡曲直之繩墨也晉人秦人圍鄭春晉人侵鄭以觀其可攻與否九月甲午晉侯秦伯圍鄭以其無禮于晉且貳于楚也晉軍函陵秦軍汜南佚之狐言于鄭伯曰國危矣若使燭之武見秦君師必退公從之辭公曰吾不能用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪隣隣之厚君之薄也若舍鄭以為東道主行李之往来共其乏困君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也夫晉何厭之有既東封鄭又欲肆其西封若不闕秦將焉取之闕秦以利晉唯君圗之秦伯説與鄭人盟使把子逢孫揚孫戍之乃還子犯請擊之公曰不可㣲夫人之力不及此因人之力而敝之不仁失其所與不知以亂易整不武吾其還也亦去之初鄭公子蘭出奔晉從于晉侯伐鄭請無與圍鄭許之使待命于東鄭石甲父侯宣多逆以為太子以求成于晉晉人許之髙氏曰此晉侯秦伯也曷為人之非霸討也初晉侯之亡也過鄭而鄭不禮焉及晉文之霸也既與同盟㑹矣而于此復修怨焉名以貳楚而加之兵秦人中變師卒無功故貶稱人也謝氏曰徳義馭國之大柄也晉文侵曹伐衞皆不以徳執曹伯執衞侯皆不以義是以令不行于許而圍許信不行于鄭而圍鄭故王者先徳義後兵革垂衣拱手而天下歸之胡氏曰孟子曰有人于此待我以横逆則君子必自反也我必不仁無禮與不忠歟仁且有禮而忠矣其横逆猶是也此亦妄人耳而君子蓋終不之校也故行有不得者皆反求諸已而已矣今鄭伯之于晉公子特不能厚將迎贈送之禮而未嘗以横逆加之也坐此見圍為列國者不亦難乎晉人以私忿勤民動衆圍人之國秦伯惟利為向背從燭之武之言不以義舉二國結釁連兵暴骨原野自此始也介人侵蕭謝氏曰介葛盧兩至魯乘蕭無僃侵蕭前書来後書侵為邦國不虞者戒也髙氏曰介人數来而我不以禮義正之致敢稱兵犯吾附庸之國而無忌憚吾國之恥也冬天王使宰周公来聘王使周公閱来聘饗有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有僃物之饗以象其徳薦五味羞嘉穀鹽虎形以獻其功吾何以堪之張氏曰天子三公兼冡宰而使来聘魯用見周室陵夷大臣失職也薛氏曰書周公之聘何非三公之事不有行人乎以宰周公而躬行人之事則天子之使非所使也師氏曰三公之職論道經邦燮理隂陽若外此而躬細務已為非矣况下聘于列國乎樸鄉吕氏曰自莊二十三年祭叔来聘之後不書王臣下聘者四十餘年蓋齊桓之霸尊王人殊王世子不盟宰周公其尊周之意明故王臣無下聘之文至僖公三十年而後宰周公来聘者蓋晉文之霸兩致天王盟王子其伉周之跡著故王臣行下聘之事于魯如此則于齊晉也可知矣又至宣十年而後書王季子之聘者豈其間悉無王臣下聘之事哉或恐如南季家父之類皆不見于經爾必于王季子而後見于經也觀此則齊桓晉文之優劣可見矣公子遂如京師遂如晉東門襄仲將聘于周遂初聘于晉穀梁氏曰以尊遂乎卑此言不敢叛京師也髙郵孫氏曰聖人之法不與其以卑及尊故先京師而後晉也胡氏曰冡宰上兼三公其職任為至重而来聘于魯王之禮意莫重焉魯侯既不朝京師而使公子遂往又以二事出夷周于列國此大不恭之罪履霜堅氷之漸春秋之所誅而不以聽者也有不待貶絶而罪惡見者三十有一年春取濟西田取濟西田分曹地也使臧文仲往宿于重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟盡曹地也髙氏曰凡取田必繫國許田邾田是也此不繫國本我田也公羊氏曰晉侯執曹伯班其所侵地于諸侯也髙郵孫氏曰左氏以為晉侯以曹地分諸侯而魯取濟西之田然按經書之與取汶陽田無異文此蓋晉侯執曹伯而反諸侯之侵地魯濟西之田嘗見侵入于曹魯于是而取之取其所嘗有之田于曹非取曹田故不繫之曹也常山劉氏曰凡力得之曰取不當取也不是其專奪雖取本邑復無異辭案此取濟西田成二年取汶陽田先本魯地而皆書取若此義例據經為合蓋春秋之義以治易亂而不以亂易亂所正者本而已凡取人之有其惡易見而取已之舊不以其道者其罪難知聖人所書亦正名曰取以顯微也家氏曰此本魯地不曰復不曰歸而謂之取者蓋魯自以兵力復其故疆是之謂復曹以義而歸之于魯是之謂歸魯不能復曹不能歸晉人自以兵力取之于曹當禀命于王分正疆理示有所尊今取之曹歸之魯惟所欲為春秋不與魯以歸疆不與晉以霸討是故書取蓋貶也公子遂如晉拜曹田也愚謂魯知遣使如晉拜分田之賜而不知請命于周正疆理之復但知有霸而不知有王但知有利而不知有義此春秋所以于濟田之復而書取也夏四月四卜郊不從乃免牲猶三望何氏曰郊者天人相接之意也郊特牲云于郊故謂之郊郊者所以祭天也天子所祭莫重于郊于南郊就陽位也范氏曰全曰牲傷曰牛禮曰帝牛必在滌三月穀梁氏曰猶者可以已之辭也公羊氏曰譏不郊而望祭也左氏曰望郊之細也不郊亦無望可也三望穀梁以為泰山河海杜氏以為分野之星國中山川皆因郊祀望而祭之鄭氏以為海岱淮也未知孰是胡氏曰成王以周公有大勲勞于天下命魯侯世世祀周公以天子之禮樂是故魯君孟春乘大輅載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也以人臣而用天子之禮可乎是成王過賜而魯公伯禽受之非也揚子曰天子之制諸侯庸節節莫差于僭僭莫重于祭祭莫重于地地莫重于天諸侯祀天其僭極矣春秋欲削之則無以志其失悉書之則歳事之常有不勝書者是故因禮之變而書于䇿或以卜或以時或以望或以牲或以牛于變之中又有變焉者悉書其事又曰天子有方望而無所不通諸侯非名山大川在其封内者不祭魯得用重禮視王室則殺故望止于三比諸侯則隆故河海不在其封内亦祭然非諸侯之所得為也程子曰始亂周公之法度者是賜也人臣安得用天子之禮樂哉記曰魯郊非禮也周公其衰聖人常譏之矣説者乃云周公有人臣不能為之功業因賜以人臣所不得用之禮樂則妄也人臣豈有不能為之功業哉借使功業有大于周公亦是所當為爾人臣而不當為誰當為之豈不見孟子言事親若曾子可也曾子之孝亦大矣孟子纔言可也臣之于君猶子之于父也假如功業大如周公而謂人臣所不能為可乎使人臣恃功而懐怏怏之心者必此言矣又曰魯用天子禮樂成王之賜伯禽之受皆非也其因襲之弊遂使季氏僭八佾三家僭雍徹仲尼于此著之秋七月冬把伯姬来求婦師氏曰婚姻之禮以媒妁之言將父母之命則可矣世豈有姑躬行求婦之禮耶以匹婦而為之亦不免於失禮况國君之夫人乎胡氏曰蕩伯姬来逆婦而書者以公自為主失其班列書也杞伯姬敵矣其来求婦曷為亦書見婦人之不可預國事也王后之詔令不施于天下夫人之教令不施于境中婚姻大事也把獨無君乎而夫人主之也故特書于䇿以為婦人亂政之戒此義行無吕武之禍矣狄圍衞十有二月衞遷于帝丘狄圍衞衞遷于帝丘卜曰三百年衞成公夢康叔曰相奪予享公命祀相甯武子不可曰鬼神非其族類不歆其祀杞鄫何事相之不享于此乆矣非衞之罪也不可以閒成王周公之命祀請改祀命胡氏曰帝丘東郡濮陽顓頊之墟亦衞地也狄嘗迫逐黎侯寓于衞而衞不能修方伯連帥之職戎嘗伐凡伯于楚丘而衞不能救王臣之患其後遂為狄人所滅東徙渡河矣齊桓公攘狄人而封之而衞國忘亡今又為狄所圍其遷于帝丘避狄難也而中國衰微狄人强盛衞侯不能强于政治晉文無却外冦安諸夏之功莫不見矣謝氏曰狄侵齊晉不能討故圍衞狄圍衞晉不能救故衞避狄于帝丘邢衞之遷皆自遷也二國之遷自弱之道也或曰太王何以去豳遷岐曰豳之遷也其民樂衞之遷也其民憂豳之遷也其民安衞之遷也其民危故豳之遷也周以興衞之遷也衞以弱三十有二年春王正月夏四月己丑鄭伯㨗卒衞人侵狄秋衞人及狄盟狄有亂衞人侵狄狄請平焉衞人及狄盟胡氏曰不地者盟于狄也再書衞人而稱及者所以罪衞也盟㑹中國諸侯之禮衰世之事已非春秋所貴况于圍困遷徙之餘從而刑牲㰱血以要之哉冬十有二月己卯晉侯重耳卒晉文公卒庚辰將殯于曲沃出絳柩有聲如牛卜偃使大夫拜曰君命大事將有西師過軼我擊之必大㨗焉樸鄉吕氏曰蓋嘗考論重耳之行事而質諸齊小白之所為然後知聖人譎正之辨小白二十餘年蓄威養晦始得召陵之盟重耳一駕而城濮之功多于召陵小白屢盟屢㑹遲囘晩歳始得宰周公重耳一年再致天王而温之事敏于葵丘小白終身與諸侯周旋㑹鄄失魯盟幽失衞首止失蔡葵丘失陳重耳三㑹則大侯小伯莫敢不至其得諸侯又盛乎小白者也然重耳之功多于小白事速于小白而義尤乖于小白者也小白殊㑹世子不敢盟宰周公所以重王室而重耳兩致天王盟王子虎則悖矣小白首止之㑹為定世子而首止衞地無逼尊之嫌重耳盟于翟泉洛陽城内地也則逼矣小白凡大盟㑹未嘗使大夫與盟而重耳翟泉之盟使大夫主之則大夫交政自是始矣小白之霸也諸侯未服不過伐其國執其臣未嘗執諸侯也重耳則執曹伯復曹伯執衞侯復衞侯惟己所恣矣小白寜不得鄭不納子華之請懼其奬臣抑君不可以訓也重耳為元咺執衞侯使元咺得以自恣則三綱五常廢矣小白得江黄不用以伐楚蓋但使之為吾聲援耳重耳謂非致秦不可與楚争楚之抑而秦之興矣小白之霸王臣無下聘諸侯者重耳之霸則宰周公下聘列國矣小白之霸伐戎三救諸侯四城國三猶以中國諸侯為念重耳之霸則狄侵齊而不救衞遷帝丘而不之恤矣大抵小白緩于圗事重耳急于成功小白猶志于尊王室重耳乃敢于致天王小白猶有救災恤隣之心重耳獨以立威為己念城濮之役其所以折楚人之氣者正欲以争諸侯耳豈真有從簡書尊周室之誠心哉然則聖人譎正之辨可謂深切著明也家氏曰齊桓優游不迫猶有周家盛時氣象晉文則淺狹迫急漸有戰國秦漢之風蓋申商之萌蘖也小東莱吕氏曰齊桓成霸業却無迹晉文成霸業便有迹桓公霸業緩成文公霸業速就此晉文所以不如齊桓然桓公霸業不繼而文公雖死霸業不絶者管仲一身任事不為齊求人材而晉專務收人材狐趙之徒倡推賢讓能之風于上一國所以皆有此風至臼季見冀缺于田野之間其夫婦敬相待如賔臼季歸即薦之文公文公以為下軍大夫以此見非特朝廷如此相遜而田野亦莫不皆然直至景公時范宣子讓其下皆讓波流之及至于如此故晉之霸業所以長乆桓公之霸業所以不永也三十有三年春王二月秦人入滑三十二年杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以来國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主僃之無乃不可乎師之所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必于殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間余收爾骨焉秦師遂東至是秦師過周北門左右免胄而下超乘者三百乘王孫满尚幼觀之言于王曰秦師輕而無禮必敗輕則寡謀無禮則脫入險而脱又不能謀能無敗乎及滑鄭商人弦髙將市于周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出于敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則僃一夕之衞且使遽告于鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉曰吾子淹乆于敝邑唯是脯資餼牽竭矣為吾子之將行也鄭之有原圃猶秦之有具圃也吾子取其麋鹿以間敝邑若何杞子奔齊逢孫揚孫奔宋孟明曰鄭有僃矣不可冀也攻之不克圍之不繼吾其還也滅滑而還髙氏曰三十年晉與秦之圍鄭也鄭使燭之武見秦伯而説之秦伯反使三大夫戍鄭而去今秦大夫之戍鄭者請于秦伯使潛師而来可得鄭國于是秦人興師厯晉踰天子之都將以襲鄭鄭有僃而遂入滑蓋秦伯之反覆如此髙郵孫氏曰傳載秦出師之迹以為滅滑而還然經但書入而不書滅蓋未嘗滅傳之説非齊侯使國歸父来聘自郊勞至于贈賄禮成而加之以敏臧文仲言于公曰國子為政齊猶有禮君其朝焉臣聞之服于有禮社稷之衞也家氏曰前日宰周公下聘公當朝于京師以拜天子之寵命文仲曽不一言及之今國歸父修交聘之常事遽勸其君以朝以是為諂可也乃曰服于有禮社稷之衞豈非欺乎夏四月辛巳晉人及姜戎敗秦師于殽晉原軫曰秦違蹇叔而以貪勤民天奉我也奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為吾聞之一日縱敵數世之患也謀及子孫可謂死君乎遂發命遽興姜戎子墨衰絰梁宏御戎莱駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉于是始墨文嬴請三帥曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國墮軍實而長寇讐亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之惠不以纍臣釁鼔使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一𤯝掩大徳髙氏曰晉文公以敗楚城濮霸中國今卒未逾年而秦輙興兵以加中國既以入滑又伐鄭不蚤治之則秦亦張矣楚患未已而加之秦中國則殆矣襄公墨縗行師而敗之直書曰敗秦者所以惡秦而與晉之勝也然而背殯興師外連姜戎忘親背惠結怨召寇兵連不解者數十年使兩國之民疲于報復死于戰陳者因襄公此舉之暴也故貶稱人凡諸國行師皆以主兵為首未有言及者然外域不分君臣常在中國之下若不加及則嫌晉人為未命之卿例序于姜戎之上故特加及字明以尊及卑以晉人及姜戎則所為晉人者非卑也晉侯也樸鄉吕氏曰晉父䘮在殯而結姜戎以伐婚姻又且厄人于險晉之惡可知秦客人之館而謀其主利人之危而襲其國越人之境而不虞其棄師秦之惡可知書曰晉人及姜戎敗秦師于殽則晉人結戎狄用詐戰厄人險之罪著矣先書秦人入滑繼書敗秦師于殽則秦人勞師襲逺越境棄師之罪著矣又書于晉侯卒之後則秦人間晉之䘮而越其境晉人背殯出兵之罪又皆著矣癸巳葬晉文公狄侵齊因晉䘮也薛氏曰無霸也許氏曰晉文未暇攘服要荒是以方其霸也則狄且侵齊圍衞使天假文公以年則必將有討矣公伐邾取訾婁秋公子遂帥師伐邾公伐邾取訾婁以報升陘之役邾人不設僃秋襄仲復伐邾髙郵孫氏曰夏公伐邾取其邑秋又使其臣伐之春秋一切志之用見天下無王而諸侯暴横侵伐無已也胡氏曰此皆不勝忿欲報怨貪得恃强凌弱不義之兵也直書其事而罪自見矣家氏曰晉霸國也魯望國也望國當以德義為重豈待霸國率之而後正乎齊桓之末宋楚争霸魯于是乘之而伐邾歲至于再今晉文方殁秦晉交兵魯復于是乘之而伐邾歲至于再望國之不能望職此故也晉人敗狄于箕狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子先軫曰匹夫逞志于君而無討敢不自討乎免胄入狄師死焉狄人歸其元靣如生初臼季使過冀見冀缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民君請用之臣聞之出門如賓承事如祭仁之則也公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也詩曰采葑采菲無以下體君取節焉可也文公以為下軍大夫反自箕襄公以三命命先且居將中軍以再命命先茅之縣賞胥臣曰舉郤缺子之功也以一命命郤缺為卿復與之冀亦未有軍行襄陵許氏曰自三十年狄始侵齊晋未暇討自是中國乃嵗有狄患至敗於此而後懲艾不復犯畧乃知不震曡以威武未易以徳懐也陳氏曰中國敗外域不書惟晉特書之病晉也故晉侯貶稱人晉率天下諸侯以攘㓂亂存中國也前年狄侵齊去年狄侵衞衞為之遷帝丘而晉不能救于是伐晉蓋僅而後勝也髙氏曰兩書晉人之勝亦以見襄公在䘮一年之間敗秦敗狄威聲四振不墜文公之業故諸侯畏之而不敢叛異乎齊桓死而諸侯共起伐之者矣冬十月公如齊十有二月公至自齊公如齊朝且弔有狄師也家氏曰三十年天王使宰周公来聘公不往朝而使公子遂如京師遂如晉無王之罪大矣今年二月齊侯使國歸父来公乃躬如齊報謝其施于天王者甚慢所以事大國者則過乎恭積之漸使之然耳春秋僃書其事不加貶而義自見矣乙巳公薨于小寢反薨于小寢穀梁氏曰小寢非正也左氏曰即安也胡氏曰周制王宫六寢路寢一小寢五君日出而眂朝退適路寢聽政使人眂大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寢魯子以諸侯有三宫則列國之制蓋降于王其以路寢為正則一爾君終不于路寢則非正矣曽子曰吾得正而斃又何求哉古人貴于得正乃如此凡此直書而義自見矣家氏曰當春秋之世先王禮教漸壊而君殁不以其地史臣猶謹而志之此古意之猶存者是故春秋因之隕霜不殺草李梅實髙郵孫氏曰隂陽四時之氣天地所以生殺萬物者也雨露生之霜雪殺之天地自然之氣而四時之常也皇極之道行而和氣塞于天地之間則隂陽之氣有常而生殺以時也彝倫攸斁而干遏于隂陽則當生者不生當殺者不殺雖天地之大無窮而隂陽之氣無形然以其小可以騐其大以其近可以推其逺春秋之十二月夏時之十月也十月隕霜而草不死李梅實皆異之大者也春秋之法為災而及于民物者則書為異而反常者則書十月之霜草當殺而不殺十月之李梅不當實而反實天地隂陽之異非常可怪者也胡氏曰哀公問于仲尼曰春秋隕霜不殺草何為記之也曰此言可殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而况君乎是故以天道言四時失其序則其施必悖無以統萬象矣以君道言五刑失其用則權必䘮無以服萬民矣其論隕霜不殺草則李梅冬實蓋除惡于微慮患于早之意也晉人陳人鄭人伐許討其貳于楚也師氏曰許嘗不與晉文之盟㑹而晉文圍許蓋以背盟主而有即夷狄之心為可罪矣然春秋猶不取其圍以其恃勢也今晉襄茍有意于不墜文公之業則修其所以為盟主之徳政㑹盟諸侯以結其恩信俟霸有漸而許不至從而伐之猶不為過豈有不紹晉文之徳而先紹晉文圍許以伐許乎人之宜矣春秋闕疑卷十八
