body:
  text: 春秋闕疑卷二十四元鄭玉撰十有三年春齊師伐莒莒恃晉而不事齊故也夏楚子伐宋以其救蕭也謝氏曰楚子既滅蕭于是伐宋以宋師伐陳故也秋螽冬晉殺其大夫先縠赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪于先縠而殺之盡滅其族胡氏曰先縠違命大敗晉師元帥不能用鉞已失刑矣今又重有罪焉晉人治其罪而戮之義也曷爲稱國以殺而不去其官夫兵者安危所係有國之大事也將非其人則敗雖得其人使親信間之則敗以剛愎不仁者參焉而莫肻用命則敗凡此三敗君之過也林父初將中軍乃以先縠佐之使敵國謀臣知其從政者新未能行令誰之過歟故稱國以殺不去其官罪累上也十有四年春衛殺其大夫孔達十三年清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰茍利社稷請以我説罪我之由我則爲政而亢大國之討將以誰任我則死之至是春孔達縊而死衛人以説于晉而免遂告于諸侯曰寡君有不令之臣達構我敝邑于大國既伏其罪矣敢告衛人以爲成勞復室其子使復其位愚按衛之于晉始則遣其臣背盟救陳以干大國之討終則殺其臣致辭取説以免大國之討且使之自縊而死又非正名其罪失刑政矣稱國以殺不去其官罪累其上宜哉夏五月壬申曹伯壽卒晉侯伐鄭爲邲故也告于諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚鄭伯如楚謀晉故也鄭以子良爲有禮故召之楚子使申舟聘于齊曰無假道于宋亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投𬒮而起屨及于窒皇劍及于寢門之外車及于蒲胥之市高氏曰晉救鄭而敗于邲鄭遂即楚夫鄭背晉即楚討之正也故稱晉爵然文公之澤浸微干戈日尋積而至于蜀之盟中國盡從楚矣豈特失鄭而已乎至此而後知齊桓晉文之有功于中國也秋九月楚子圍宋胡氏曰宋人要結盟誓欲以禦楚已非持國之道輕舉大衆𠞰民妄動又非恤患之兵特書救陳以著其罪明見伐之由也國必自伐然後人伐之凡事其作始也簡其將畢也必巨易于訟卦曰君子以作事謀始始而不謀必至于訟訟而不竟必至于師若宋是矣始謀不臧至于見伐見圍幾亡其國則自取之也春秋端本責宋爲㴱若楚不當圍宋則亦明矣葬曹文公冬公孫歸父㑹齊侯于穀張氏曰以歸父㑹齊侯蓋魯素事齊而宣公之立公子遂主之故其父子常使于齊而齊亦不復計等列之不班而與之㑹也非禮甚矣胡氏曰夫禮别嫌明微制治于未亂自天子出者也列國之君非王事自相㑹聚是禮自諸侯出矣以國君而降班失列下與外臣㑹以外臣而抗尊出位上與諸侯㑹是禮自大夫出矣君若贅旒陪臣執命豈一朝一夕之故其所由來漸矣故易于坤之初六曰馴致其道至堅氷也易言其理春秋見諸行事若合符節可謂㴱切著明矣十有五年春公孫歸父㑹楚子于宋十四年孟獻子言于公曰臣聞小國之免于大國也聘而獻物于是有庭實旅百朝而獻功于是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公説至是公孫歸父㑹楚子于宋家氏曰楚自伐宋于魯無與而魯人震懼若禍之已至者正由宣公以篡弑得國未有能討之者見楚人戮陳夏徵舒懼而往㑹將以逭弑君之討也胡氏曰楚子不假道于宋以啟釁端而圍之陵蔑中華甚矣諸侯縱不能畏簡書䘏患難存先代之後嚴兵固圉以爲聲援猶云可也乃以周公之裔千乘之國謀其不免至于薦賄不亦鄙乎若此類聖人不徒筆之于經也比事以觀則知當日強弱盛衰之由春秋經世之畧矣高氏曰直以宋地者罪魯見夷狄在宋境而反與之交聘也夏五月宋人及楚人平宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之强能違天乎諺曰高下在心川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也君其待之使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命爲義臣能承命爲信信載義而行之爲利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以出有死無霣又可賂乎臣之許君以成命也死而受命臣之禄也寡君有信臣下臣獲考死又何求楚子舍之以歸夏五月楚師將去宋申犀稽首于王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聽命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以㸑雖然城下之盟有以國斃不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元爲質盟曰我無爾詐爾無我虞穀梁氏曰平者成也人者衆辭平稱衆上下欲之也程氏學曰宋人及楚人平宋及之也謝氏曰宋人見圍凡九月其告急于晉也外無隻輪匹馬之援内有析骸易子之變宋人知怨之不可以結也故請和于楚以求平楚人知忿之不可以恃也故受宋之和而與之平陳氏曰外平不書必關于天下之故也而後書有與楚平者矣于陳不書于鄭不書至宋始書之宋嘗及楚平矣至莊王始書之必宋從楚必莊王得宋天下將有南北之勢春秋特致意焉樸鄉呂氏曰向也晉與楚爭陳其後也陳有少西氏之亂晉不能討而楚能討之縣陳封陳在其掌握而陳在楚宇下矣向也晉與楚爭鄭其後也鄭有皇門之入晉不能救已而爲邲之戰則晉師敗績而鄭又在楚宇下矣向也晉宋衛猶爲一黨及宋師伐陳而衛救之則衛又貳于晉向也晉楚之爭而中國之望如魯國者猶未嘗即楚今則公孫歸父㑹楚子于宋而魯又即于楚矣當是時中國霸主之後則晉也先代之後則宋也鄭及楚平則伐鄭者晉與宋也邲既敗則同爲清丘之盟者晉與宋也清丘之盟陳人不至則爲之伐陳者又宋也今也楚子圍宋者九月宋之國人至于易子而食析骸而㸑矣楚之圍宋者亦軍敝食盡而將去矣而宋人告急之時晉不能一出力以援之一懲于邲之戰而中國之氣索然矣宋及楚平豈得已哉書曰宋人及楚人平以見中國之無霸也以見楚人之恣横也以見諸侯之畏于楚而莫有能救之者也然則宋楚之平豈小故哉六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸六年秋赤狄伐晉圍懷及邢丘晉侯欲伐之中行桓子曰使疾其民以盈其貫將可殪也七年赤狄侵晉取向陰之禾至是潞子嬰兒之夫人晉景公之姊也酆舒爲政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也虐我伯姬四也傷其君目五也怙其雋才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命若之何待之夫恃才與衆亡之道也商紂由之故滅天反時爲災地反物爲妖民反德爲亂亂則妖災生故文反正爲乏盡在狄矣晉侯從之六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之晉侯賞桓子狄臣千室亦賞士伯以𤓰衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣晉侯使趙同獻狄俘于周胡氏曰上卿爲主將畧而稱師者著其暴也滅而舉號及氏者减見滅之罪著滅者之不仁也潞嬰兒不死社稷比于中國而書爵者免嬰兒之責辭也夫伐國之要討其罪人斯止矣按左氏潞子夫人晉景公之姊也酆舒爲政而殺之又傷潞子之目則酆舒者罪之在也爲晉計者執酆舒轘諸市立黎侯安定潞子改紀其政而返則諸狄服疆域安矣今乃利狄之土滅潞氏以其君歸何義乎春秋所以責晉而畧狄也樸鄉呂氏曰白狄屢侵中國晉景滅之似也然楚之圍宋厯三時而不解晉不能一引手以救之而徒能加兵于狄今年書晉師滅赤狄潞氏以嬰兒歸明年書晉人滅赤狄甲氏及留吁觀宋之告急也晉侯欲救之而伯宗方以納汙藏疾匿瑕含垢自諉及晉侯之欲伐狄諸大夫皆以爲不可而伯宗乃曰後之人或者將敬奉德義以事神人而申固其命若之何待之嗚呼是誠何心哉不得志于楚乃求得志于狄晉侯以是賞桓子又以是賞士伯又使趙同獻俘于周君臣之間矜然德色志得意滿矣何暇謀及楚哉聖人備書于䇿義自見矣秦人伐晉秋七月秦桓公伐晉次于輔氏壬午晉侯治兵于稷以畧狄土立黎侯而還及雒魏顆敗秦師于輔氏獲杜回秦之力人也薛氏曰報八年之役也王札子殺召伯毛伯王孫蘇與召氏毛氏爭政使王子㨗殺召戴公及毛伯衛卒立召襄十六年爲毛召之難故王室復亂王孫蘇奔晉晉人復之冬晉侯使士㑹平王室定王享之原襄公相禮殽烝武子私問其故王聞之召武子曰季氏而弗聞乎王享有體薦宴有折爼公當享卿當宴王室之禮也武子歸而講求典禮以修晉國之法杜氏曰王札子王子札也泰山孫氏曰王札子文誤倒爾穀梁氏曰此其志何也矯王命以殺之也爲天下主者天也繼天者君也君之所存者命也爲人臣而侵其君之命而用之是不臣也爲人君而失其命是不君也君不君臣不臣天下所以傾也家氏曰左傳謂王孫蘇與毛召爭政使札子殺毛召則首亂者孫蘇然非札子則無以成其亂非王寵札子而假之以權則札子亦無以爲亂故書王札子殺召伯毛伯譏在王也胡氏曰邢侯專殺雍子于朝叔向以殺人不忌爲賊請施邢侯君子以爲義王札子之罪當服此刑而天王不能施之無政刑矣何以保其國而不替也秋螽胡氏曰人事感于此則物變應于彼宣公爲國虚内以事外去實而務華故戾氣應之六年螽七年旱十年大水十三年又螽十五年復螽府庫匱倉廪竭言利尅民之事起矣仲孫蔑㑹齊高固于無婁胡氏曰禮之始失也諸侯非王事而相㑹也無以正之不自天子出矣然後諸侯與大夫㑹又無以正之然後大夫與大夫㑹禮亦不自諸侯出矣田氏篡齊六卿分晉三家專魯理固然也不能早辨後雖欲正之其將能乎初税畆左氏曰初税畆非禮也穀出不過藉以豐財也公羊氏曰初者何始也税畆者何履畆而税也古者什一而藉什一天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一行而頌聲作矣穀梁氏曰古者什一藉而不税初税畆非正也家氏曰八家同井其中爲公田一夫授田百畆耕公田十畆餘公田二十畆爲廬舍及場圃民出其力以耕公田是之謂藉杜氏曰公田之法十取其一今又履其餘畆復十取其一遂以爲常故曰初謝氏曰公田之外又取私田計畆而税之故曰税畆朱子曰周制一夫受田百畆而與同溝共井之人通力合作計畆均収大率民得其九公取其一魯自宣公税畆又逐畆什取其一則爲什而取二矣薛氏曰方里而井八家皆私百畆中爲公田而同治之所謂什一也履畆而税税私田之什一是什二之初税也冬蝝生謝氏曰蝝螽子冬非蝝生育之時冬而蝝生異之大也胡氏曰始生曰蝝既大曰螽秋螽未息冬又生子災重及民也而詳志之如此者急民事謹天災仁人之心王者之務也遇天災而不懼忽民事而不修又爲繁政重賦以感之國危無日矣饑師氏曰方秋螽時民憂乏食望其上之所取爲之蠲薄可也宣公乃不顧而履畆以税之田畆所有盡歸于公乏絶五穀不饑奚爲春秋書之所以譏上之人有以致之而莫之恤也謝氏曰上則税畆而奪其食下則螽蝝賊其稼故饑胡氏曰春秋饑歲多矣書于經者三而宣公獨有其二何也古者三年耕餘一年之蓄九年耕餘三年之食雖有凶旱民無菜色是歲螽蝝而遽至于饑者宣公爲國務華去實虚内事外煩于朝㑹聘問賂遺之末而不敦其本府庫竭倉廪匱水旱螽蝝天降饑饉亦無以賑業貧之矣經所以獨兩書饑以示後世爲國者不可不敦本也十有六年春王正月晉人滅赤狄甲氏及留吁晉士㑹帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晉侯請于王戊申以黻冕命士㑹將中軍且爲大傅于是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人遠此之謂也夫胡氏曰董是役者士㑹也上將主兵其稱人貶辭也甲氏潞之餘種留吁其殘邑也春秋于外域攘斥之不使亂中夏則止矣伯禽征徐夷東郊既開而止宣王伐玁狁至于太原而止必欲盡殄滅之無遺種豈仁人之心王者之事乎夏成周宣榭火公羊氏曰成周者何東周也高氏曰國語曰先王之爲臺榭也臺不過望氛氣榭不過講軍實成周宣榭宣王之榭也宣王中興講武于此書其災者蓋傷之也厲王板蕩中國微矣宣王嗣之南征北伐除叛亂以復文武之境土天下喜于王化復行今周復衰僣竊横行平惠以降皆庸暗齷齪無能以王道興起者聖人思周室中興仰止宣王故因其災以傷王者之不作使功烈不得著見于天下而其跡又從而煨燼之蓋痛乎王道陵遲之甚也秋郯伯姬來歸出也胡氏曰内女出書之䇿者男女居室人之大倫也婚姻之禮廢則夫婦之道苦淫辟之罪多矣春秋内女出夫人歸凡男女之際詳書于䇿所以正人倫之本也高氏曰不寧乎舅姑之國而爲夫所出此罪伯姬也罪伯姬者乃所以罪其父母失教也冬大有年穀梁氏曰五穀大熟爲大有年胡氏曰程子曰大有年記異也宣公弑立逆理亂倫水旱螽蝝饑饉之變相繼而作史不絶書宜也獨于是冬乃大有年所以爲異乎夫有年大有年一爾古史書之則爲祥仲尼筆之則爲異此言外微㫖非聖人莫能修之也高郵孫氏曰春秋書有年者二又皆在于桓宣之時聖人之意可知矣十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己未公㑹晉侯衛侯曹伯邾子同盟于斷道春晉侯使郤克徵㑹于齊齊頃公帷婦人使觀之郤子至婦人笑于房獻子怒出而誓曰所不此報無能渉河郤子先歸使欒京廬待命于齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使高固晏弱蔡朝南郭偃㑹及歛盂高固逃歸夏㑹于斷道討貳也盟于卷楚辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于温苖賁皇使見晏桓子歸言于晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮舉言羣臣不信諸夏皆有貳志齊君恐不得禮故不出而使四子來左右或沮之曰君不出必執吾使故高子及歛盂而逃夫三子者曰若絶君好寧歸死焉爲是犯難而來吾若善逆彼以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又久之以成其悔何利之有哉使反者得辭而害來者以懼諸侯將焉用之晉人緩之逸秋八月晉師還范武子將老召文子曰燮乎吾聞之喜怒以類者鮮易者實多詩曰君子如怒亂庶遄沮君子如祉亂庶遄已君子之喜怒以己亂也弗己者必益之郤子其或者欲已亂于齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子唯敬乃請老郤獻子爲政穀梁氏曰同者同外楚也樸鄉呂氏曰宣公以來凡晉㑹諸侯齊未嘗與也衛嘗同晉矣清丘之盟辭曰討貳而陳貳于楚宋人伐之衛乃救陳晉以衛之救陳也討焉衛殺其大夫孔達以説于晉斷道之盟衛人在焉故曰同外楚也家氏曰同盟春秋之所貴也而晉景清丘斷道兩盟皆以同盟書何哉聖人幸中國之猶能自振喜諸侯不忍遂從于楚特書同盟以褒之既書同盟而五國之君並著其爵是時楚莊氣焰大張晉景之孱弱日甚聖人于清丘斷道兩盟㴱致其嘉奬拳拳于望晉幸其猶能同也陳氏曰同盟至新城而再見斷道之後不曰同盟者寡矣秋公至自㑹冬十有一月壬午公弟叔肸卒穀梁氏曰其曰公弟叔肸賢之也其賢之何也宣弑而非之也非之則胡爲不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是爲通恩也以取貴乎春秋泰山孫氏曰不曰公子而曰公弟叔肸者以見叔肸無祿而卒也陳氏曰公弟者何非見大夫也非見大夫不卒而卒叔肸賢之也賢之所以惡宣公也家氏曰大夫卒而書者以其爲大夫而得書也叔肸不爲大夫其卒也特見書以其人而書也自入春秋母弟名氏登于簡冊率以驕盈致亂惟叔肸以節行見稱卓然榮利之外而不廢親親之恩也胡氏曰稱弟得弟道也稱字賢也或以爲叔肸寵弟在宣公有私親之愛故生而賜氏俾世其卿與季友仲遂比則其説誤矣誠使叔肸有寵生而賜氏則貴戚用事之卿勢必與聞政事執國命矣豈有不見于經者况宣公之時煩于聘問㑹朝之禮遂蔑季孫歸父交于隣國衆矣而獨叔肸不與焉其非生而賜氏俾世其卿明矣十有八年春晉侯衛世子臧伐齊至于陽穀齊侯㑹晉侯盟于繒以公子疆爲質于晉晉師還蔡朝南郭偃逃歸家氏曰楚方爲中國患而晉率衛以伐齊春秋無貶何哉齊自昭懿以來比世再篡怙其强大猖狂妄行漁獵小國其罪亞于夷楚莫有能治之者晉景一旦發憤躬履戎行偕衛人以爲此役伐其所當伐也春秋何貶焉公伐杞高氏曰杞自文十六年來朝而不復至故伐之稱公專罪公之陵小國也已不修德而欲人之朝不思之甚也陳氏曰自伐邾取繹而下凡取不書其人自公伐杞而下凡伐皆不書公夏四月秋七月邾人戕鄫子于鄫穀梁曰戕猶殘也公羊曰戕賊而殺之也范氏曰于鄫惡其臣子不能拒難高氏曰僖十九年邾人執鄫子用之是時天子方伯不復討其罪故此肆然復戕鄫子于鄫也夫邾人肆無道之强戕同等之君罪固大矣鄫子爲國君而見戕于人必有以致之也國君必有卿大夫侍衛之臣今鄫子之于邾乃不共戴天之讐又使得造其國都戕弑其君而鄫國臣子恬然坐視無動心者故聖人書曰戕鄫子于鄫以見鄫無守備且惡鄫之臣子不能拒難與自弑其君無異也甲戌楚子旅卒夏公使如楚乞師欲以伐齊楚莊王卒楚師不出既而用晉師楚于是乎有蜀之役高氏曰前此不書楚子之卒者外楚人也此書之者以楚入爲中國之害甚于前日故錄其卒以見中國不能自正乃與楚人相通問好故春秋自此得以詳錄其卒也公羊氏曰吳楚之君不書葬避其號也胡氏曰楚僭稱王降而稱子仲尼筆之也不書葬者恐民之惑而避其號仲尼削之也家氏曰楚入春秋以來迨今百年武文成穆更起旋仆未有窺周室之心至楚莊觀兵中原睥睨周鼎挾智任詐欲遂其僭王之夙心故春秋書法至此爲之一變方其存也正其始封之爵㑹盟侵伐一書之曰子抑之也迨其没也復正其始封之爵卒之曰子而不與之以葬亦抑之也抑楚人之僭號示天下共主在周夷雖盛强欲僭而莫得也公孫歸父如晉公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之胡氏曰宣公因齊得國故刻意事之雖易世猶未怠也及頃公不能謹禮怒晉魯上卿而郤克當國决意討之晉方强盛齊少懦弱于是背齊而事晉其于邦交以利爲嚮背無忠信誠一之心者也且歸父欲去三桓以張公室與公謀而聘于晉欲以晉人去之夫輕于背與國易于謀大家而不知其本未有能成而無悔也然則公室不可張乎務引其君當道正心以正朝廷禮樂刑政自己出也其庶幾乎必欲倚外援以去之是去疥瘍而得腹心之疾也庸愈乎冬十月壬戌公薨于路寢穀梁氏曰路寢正寢也歸父還自晉至笙遂奔齊公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命于介既復命袒括髪即位哭三踊而出遂奔齊穀梁氏曰捐殯而奔其父之使者是亦奔父也公羊氏曰還者何善辭也何善爾歸父使于晉還自晉至檉聞君薨家遣墠帷哭君成踊反命乎介自是走之齊高氏曰歸父以襄仲之立公欲去三桓以張公室與公謀而聘于晉冬還至笙聞宣公薨而新君與三桓謀逐之以是奔齊夫先君未殯而逐其臣是死其君而忘其父也歸父既畢使事盡哀而奔是知死亡之免而能不失度于顛沛造次之時異乎他大夫之奔也故其辭繁而不殺則歸父之善自著矣雖然人臣之正受命而出雖君薨猶當致命于殯前若其有罪待命于新君可也今歸父未及魯境遽即奔齊則有惡于新君矣故書遂書奔以著其逃刑之罪春秋闕疑巻二十四
