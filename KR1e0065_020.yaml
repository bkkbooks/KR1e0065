body:
  text: 春秋闕疑卷二十元鄭玉撰七年春公伐邾三月甲戌取須句遂城郚公伐邾間晉難也三月甲戌取須句寘文公子焉高氏曰僖二十二年公伐邾取之以歸須句子矣後復爲邾所取今公又取之寘文公子焉先書公伐邾而后書取須句者以見始則擅興兵以伐人之國既又奪取其地寘人之叛臣重其罪也城郚所以備邾自伐邾至取須句兵之在外非一日又因而城郚勞民甚矣夏四月宋公王臣卒宋人殺其大夫宋成公卒于是公子成爲右師公孫友爲左師樂豫爲司馬鱗矔爲司徒公子蕩爲司城華御事爲司冦昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則根本無所庇廢矣葛藟猶能庇其本根故君子以爲比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之親之以德皆股肱也誰敢擕貳若之何去之不聽穆襄之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室樂豫舍司馬以讓公子卬昭公即位而葬謝氏曰殺書人或以衆棄言之或以國亂言之施于惡逆則衆棄之辭也施于公子大夫則國亂之辭也胡氏曰書宋人者國亂無政非君命而衆人擅殺之也大夫不名義繫于殺大夫而其名不足紀也戊子晉人及秦人戰于令狐晉先蔑奔秦秦康公送公子雍于晉曰文公之入也無衛故有呂郤之難乃多與之徒衛穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉寘此出朝則抱以適趙氏頓首于宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之歩招御戎戎津爲右及堇陰宣子曰我若受秦秦則賓也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師于令狐至于刳首已丑先蔑奔秦士㑹從之先蔑之使也荀林父止之曰夫人太子猶在而外求君此必不行子以疾辭若何不然將及攝卿以往可也何必子同官爲寮吾嘗同寮敢不盡心乎弗聽爲賦板之三章又弗聽及亡荀伯盡送其帑及其器用財賄於秦曰爲同寮故也八年夏秦人伐晉取武城以報令狐之役程子曰晉始逆立公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肻已而擊之故書晉及常山劉氏曰秦敗不書者晉曲甚故也何者晉使先蔑召公子雍于秦秦為之送晉乃背約禦秦師而敗之故不書秦敗所以甚晉人之惡也胡氏曰晉秦稱人晉書及其貶之如此者使後世臣子愼于廢立之際不可忽也治亂存亡係國君之廢立事莫重于此矣而可以有誤乎奕者舉棋不定不勝其偶况置君而可以不定乎泰山孫氏曰先蔑不言出者明自軍而去也樸鄉吕氏曰或疑左氏載先蔑逆公子雍之事謂先蔑既是逆公子雍不應又為下軍將以禦送雍之師然按杜預注左氏謂先蔑逆公子雍前還晉晉人始以逆雍出軍卒然變計立靈公以拒秦如此則亦無疑于先蔑既逆公子雍而又爲下軍將也狄侵我西鄙公使告于晉趙宣子使因賈季問鄷舒且讓之舒問于賈曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也許氏曰狄懲箕之敗四年間一侵齊而未敢肆至是始復侵魯侵齊侵宋侵衛晉襄既没莫之忌矣高氏曰魯間晉難而伐邾狄亦間晉難而侵魯聖人書此罪魯之不自正也秋八月公㑹諸侯晉大夫盟于扈齊侯宋公衛侯陳侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也高氏曰凡盟㑹皆列序諸國惟文公之世再盟一㑹但云諸侯者中國無盟主也何則晉自文公以來世主諸夏之盟襄公既没趙盾既背秦約而立靈公懼諸侯之討已故不以靈公㑹諸侯而已臨之諸侯知靈公年少政在大夫而靡然甘心俛首而與晉大夫盟故春秋内斥言公外統言諸侯而不列序者示無盟主且見趙盾之專也何以不斥趙盾盾而置君廢君居然晉大夫而已晉㑹諸侯而大夫臨盟是大夫㑹之也盾之專施于靈公可也施于諸侯而諸侯皆聽之亦所以慚諸侯爾許氏曰大夫而主盟諸侯自扈之㑹始也君子惡之師氏曰此晉趙盾始專政而出㑹諸侯將以修盟主之事也㑹之意實自趙盾不名之者不與盾之專不可一趙盾而敵衆諸侯止書大夫猶曰晉之大夫皆在此云耳不序諸侯者此㑹實大夫主之若序諸侯則疑于首序者主盟矣雖然此乃晉襄死後趙盾始㑹諸侯故猶可存諸侯而不名大夫及其擅朝既久㑹盟不一則雖欲存之末由也已至已甚則不得已而明書盾以貶之焉樸鄉呂氏曰按此年公㑹諸侯晉大夫盟于扈十五年諸侯盟于扈十七年諸侯㑹于扈皆畧之而不序嘗摭其事實而考之然後知春秋之所以不序諸侯者蓋莫有主是盟之辭也桓文之盛皆序齊晉于諸侯之上霸主之辭也齊桓之未盛與晉霸之不競也則雖序齊晉于諸侯之上而必書曰同盟者未純乎主霸之辭也此年之盟與是後一盟一㑹皆不序諸侯者莫有主是盟之辭冬徐伐莒公孫敖如莒涖盟穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則爲襄仲聘焉冬徐伐莒莒人來請盟穆伯如莒涖盟且爲仲逆及鄢陵登城見之美自爲娶之仲請攻之公將許之叔仲惠伯諫曰臣聞之兵作于内爲亂于外爲寇寇猶及人亂自及也今臣作亂而君不禁以啓寇讐若之何公止之惠伯成之使仲舍之公孫敖反之復爲兄弟如初從之高氏曰徐本戎也厥後自進于中國數與中國諸侯㑹盟至是興兵伐莒蓋以中國無盟主是以敢爾故聖人于是役不書人師氏曰莒魯之隣國有輔車之勢唇齒之相依魯見徐伐莒㑹不一引手以拯之及莒求援以請盟公孫敖然後往涖焉是莒素不能結援于魯及被伐方且請盟魯坐視鄰國被伐及請盟而後往書之者所以併莒魯而譏之也八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴晉人以扈之盟來討冬襄仲㑹晉趙孟盟于衡雍報扈之盟也遂㑹伊雒之戎胡氏曰春秋記約而志詳其書公子遂盟趙盾及雒戎何辭之贅乎曰聖人謹華夷之辨所以明族類别内外也雒邑天地之中而戎醜居之亂華甚矣再稱公子各日其㑹正其名與地以㴱别之者示中國夷狄終不可雜處也許氏曰春秋之所謹如此而晉唐得戎與之雜居晉既大亂不救唐亦幾危而侮此爲國謀者不學春秋之過也愚謂扈之盟春秋既書公㑹諸侯晉大夫盟矣謂公不得與盟不可也今而公子遂復爲此盟此自爲其私計耳魯大夫締交强國之卿以專魯國而抗其君自公子遂始春秋不與也公孫敖如京師不至而復丙戌奔莒穆伯如周弔喪不至以幣奔莒從己氏焉胡安定先生曰弔天王之喪廢命不行中道而止如公孫敖之罪不容誅矣文公不能誅之致使自恣出奔文公之失政又可誅矣不書至某地而復者以京師爲重也家氏曰襄王于僖公母子之䘮拳拳用情王人將命者絡繹于道而魯侯于天王之喪漫不加意國中豈無一介臣可使而以淫大夫尸其事敖當誅文公亦當誅春秋書法見矣螽宋人殺其大夫司馬宋司城來奔宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死司城蕩意諸來奔效節于府人而出公以其官逆之皆復之程子曰宋王者後得自命官故獨宋卿書官家氏曰大夫司馬司城皆國之柄臣穆襄之族連歳怙亂固昭公有以致之然嘗殺大夫而免于討爲大夫司馬司城者當思所以爲防患之計乃置之弗戒彼負罪自疑乘釁再作大司馬死司城來奔朝廷爲之一空由昭公信任非人蕩意諸公子卬等軰以私暱寵臣布在列位既不能慮患于平日復不能制變于臨時雖握節以死委節以奔而不勝其任甚矣是故春秋不與之死節死者奔者皆書官而不名其義明白而易見矣胡氏曰以官舉者見主兵者不能其官至于見殺守土者不能其官至于出奔而其君不免失身見弑之禍宜矣愚按公子卬之死蕩意諸之奔雖若無罪然司馬之職在于主兵而人得以殺之司城之職在于捍守而至出奔則不能其官甚矣使司馬足以遏亂司城足以禦敵宋之禍何由興乎春秋書其官所以著官非其人致國之亂不書其名氏所以見其人之所爲皆不足紀也九年春毛伯来求金公羊氏曰毛伯來求金何以書譏何譏爾王者無求求金非禮也穀梁氏曰求車猶可求金甚矣胡氏曰毛伯天子大夫何以不稱使當喪未君也踰年矣何以言未君古者諒隂三年百官總己以聽于冢宰則是冢宰獨專國政之時託于王命以號令天下夫豈不可而不稱使春秋之㫖㣲矣非特謹天下之通喪所以示後世大臣當國秉政不可擅權之法戒也䟦扈之臣假仗主威脅制中外凡有所行動以詔書從事蓋未有以春秋此義折之耳夫人姜氏如齊高氏曰夫人出境唯歸寧及奔父母之喪耳皆常事不書也非此二者則書之此憫出姜之失位而志之也二月叔孫得臣如京師辛丑葬襄王高氏曰天子所以七月而葬者欲使諸侯畢來㑹也高郵孫氏曰春秋天土書葬者五君往者三臣往者二君往不書公臣往者悉書其人以爲天王之喪君不自往而使臣焉則是無君父之恩而廢臣子之禮也胡安定先生曰按六年晉侯驩卒冬公子遂如晉葬晉襄公前年天王崩今年叔孫得臣如京師葬襄王晉諸侯也襄王天子也魯皆使臣㑹則是諸侯天子可得而齊也故書以惡之晉人殺其大夫先都夷之蒐晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田于堇陰故箕鄭父先都士縠梁益耳蒯得作亂至是使賊殺先克乙丑晉人殺先都梁益耳高氏曰稱人以殺者國亂無政衆人擅殺之辭也先都以作亂見殺而稱人者晉政不自其主出而趙盾專生殺之權故也二月夫人姜氏至自齊樸鄉呂氏曰夫人與君敵體者也出必告行反必告至則書于䇿此魯史之辭也夫子之修春秋于君出則書至于夫人出則不書至此降殺之等也獨于此書至者爲歸于齊起也始書夫人姜氏如齊夫人姜氏至自齊卒書曰子卒夫人姜氏歸于齊然則出姜之不安于魯也舊矣文公私嬖敬嬴之罪著矣異時襄仲殺惡及視之兆已萌于此時矣聖人詳錄其往來豈特爲告至與不告哉家氏曰姜氏始歸于魯不氏不以夫人至貶也今歸寧于齊書夫人姜氏如齊又書夫人姜氏至自齊始正其夫人之體繫之以氏既貶之于前復正之于後皆所以垂法也夫人與國君儷體其出其至皆書者辨上下之分示衆妾不與夫人等因歸寧而見義非爲歸寧而得書也胡氏曰此書至者以見小君之重也夫承祭祀以為宗廟主一國之母儀而可以動揺乎故至而特書以示防㣲杜漸之意其爲後世慮㴱矣晉人殺其大夫士縠及箕鄭父三月甲戌晉人殺箕鄭父士縠蒯得程氏學曰殺二大夫已上不書及者其事同殺之之志均故也書曰殺其大夫某及某者以某之故而延及于某也胡氏曰殺先都士縠國也其稱人以殺者國亂無政衆人擅殺之稱也何以知其非討賊之辭書殺其大夫則知之矣三大夫皆强家也求專晉政不得挾私怨以作亂而使賊殺其中軍佐則固有罪矣曷爲不去其官當是時晉靈公初立主㓜不君政在趙盾而中軍佐者盾之黨也若獄有所歸則此三人者獨無可議從末减乎而皆殺之是大夫專生殺而政不自人主出也故不稱國討不去其官而箕鄭父書及示後世司賞罰者必本忠恕無有偏黨之意其義精矣楚人伐鄭范山言于楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭因公子堅公子尨及樂耳鄭及楚平泰山孫氏曰楚復强也楚自城濮之敗不敢加兵于鄭今伐鄭者晉文既死中國不振故也胡氏曰楚師貪得無故憑陵諸夏故楚子親將貶而稱人公子遂㑹晉人宋人衛人許人救鄭公子遂㑹晉趙盾宋華耦衛孔達許大夫救鄭不及楚師左氏曰卿不書緩也以懲不恪家氏曰書救未有不善此則書救而譏之也楚自莊公之中世入侵蔡鄭漸有憑陵諸夏之心齊桓遏其方張之萌晉文撲其燎原之焰中國以尊王室以安文公雖没楚人猶不敢褻視及趙盾秉政自爲怙權之計不復以救灾卹難爲己任范山覘知其無能有爲首勸楚商臣興狼淵之師其志不在小而盾也徐合諸侯之大夫具文往救無及于事威望頓挫不數年間諸侯皆服從于楚而晉之霸業隳矣文公以救宋而興趙盾以緩于救鄭而屈春秋人四國貶其救之緩也夏狄侵齊師氏曰春楚伐鄭夏狄侵齊用見外域盛强中國衰弱視天下若無主之者在周室固已無足觀而主盟于諸侯以令天下者晉能無愧乎秋八月曹伯襄卒九月癸酉地震任氏曰前此踰百年未有書地震也而自此至哀公書地震者五地道以静爲體以順爲正安于承天者也逆其常理而不得其節焉則震而不安其所承矣師氏曰地屬乎陰至静莫之動者今此地震是失其常爲已甚矣以分言之地位乎下凡在下者不安其分也以道言之地道積陰凡屬陰者不常其道也在人則爲臣者不安其分以犯君爲小人者不常其道以陵君子爲蕃服者踰分非道以侵中國故有地之震以應之經書地震不在春秋之始而在春秋之末蓋是時不止諸侯僭天子而大夫僭諸侯亦已久矣不止大夫僭諸侯而陪臣僭大夫亦已有日矣况自齊桓死後楚人爭主中國㑹盟晉文死後呉楚伐于列國亦已非一年矣地以之震無足怪者然則天地之變未有不由人召之凡欲消天地之變請强其在我者可也冬楚子使椒來聘楚子越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也高郵孫氏曰莊二十三年書荆人來聘不言君使又不言其臣之名荆時尚㣲春秋欲中國早爲之禦不使之浸盛而侵漁中國也于是來聘君稱爵臣稱名非楚能自同于中國也所以見中國之㣲而荆蠻之盛聘問往來中外一爾家氏曰春秋于楚使之三至每書輒異者著荆蠻之漸盛將必爲中國患也先書荆人來聘疑其所以來也繼書楚人使宜申來獻㨗憂其遂爲中國患也今書楚子使椒來聘著荆蠻之禍已廹中國之人猶有未悟者也椒去未幾孟諸之田繼之五國之君奔走受命僅而獲免先儒以爲有悔過慕義之心春秋進之悔過者固如是乎慕義者固如是乎或有重難予者曰楚本明德之後介在南蠻與荒服異子爲是説無廼絶之已甚乎曰春秋所以外楚爲其僭王大號有窺伺中原之心耳楚有賢君削去僭號自同于中國之諸侯共奬王室夫然後可進春秋豈絶之哉若彼身行大不義而錄其來使之小謹以是進之必不可也秦人來歸僖公成風之禭程子曰過時始至故云來歸書秦人不云君使以失禮夷之也胡氏曰秦人歸禭而曰僖公成風者非兼襚也亦猶平王來賵仲子而謂之惠公仲子爾然則寵愛仲子以妾爲妻者惠公也故書惠公仲子所以正後世爲人夫者當明夫道不可亂嫡妾之分以卑其身尊崇風氏立爲夫人者僖公也故書僖公成風所以正後世爲人子者當明子道不可行僭亂之禮以賤其父聖人垂戒之義明矣樸鄉呂氏曰成風薨今六年矣而後秦人來歸禭則其非禮明矣殆秦人之借此名以交魯國乎師氏曰成風死六年秦人方來歸禭侮禮侮人甚矣在秦人雖不足責在魯何禮以受之衣服曰禭贈喪葬以及死者之禮既已受之何以致之中國禮義之邦所爲若此欲望夷狄之不陵侮也難矣愚按成風薨葬聖人以魯之臣子不敢違其國制皆以夫人書之此因魯史之舊也及秦人歸禭乃始變文書曰僖公成風所以正其嫡妾之分而明其夫人之非此修春秋之文也學者合而觀之則聖人筆削之意可見而春秋垂世之義明矣葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉十年春晉人伐秦取少梁夏秦伯伐晉取北徴程子曰晉舍嫡嗣而外求君罪也既而悔之正也秦不顧義理之是非惟以報復爲事狙獪之道也張氏曰康公不紹其父悔過之謀報復無已故外之愚按如傳所載晉先伐秦秦乃報之則經當並書而曲直自見今舍晉不書而獨罪秦則傳之所云未可信也楚殺其大夫宜申初楚范巫矞似謂成王與子玉子西曰三君皆將强死城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶王使適至遂止之使爲商公沿漢泝江將入郢王在渚宫下見之懼而辭曰臣免于死又有讒言謂臣將逃臣歸死于司敗也王使爲工尹又與子家謀弑穆王穆王聞之五月殺鬭宜申及仲歸胡氏曰宜申與仲歸謀弑穆王而誅則是討弑君之賊也曷爲稱國以殺又書其官而不曰楚人殺宜申乎曰穆王者即楚世子商臣也而春秋之義㣲矣陳氏曰宜申之罪爲欲弑商臣若此而同之他亂臣之列則溢罰矣家氏曰商臣負覆載不容之罪凡楚國之人皆得而誅之而未有能討之者宜申于楚成爲弟其爲此謀安知不爲先君討賊事不獲成以死史遂以爲弑君春秋原其有討賊之心不以無將之罪罪之是故稱國以殺此聖人之特筆非因乎舊史者也自正月不雨至于秋七月及蘓子盟于女栗頃王立故也師氏曰前王喪葬而公未嘗㑹後王新立而公未嘗朝乃及天王之大夫而與之盟其蔑視天王不知臣子之分甚矣家氏曰蘓子周卿士也今來盟于魯王命也而不書王使公及之盟而不書公及爲天王諱過亦爲魯諱惡也諸侯盟于王庭旅盟也天子上公出盟諸侯涖之而不與之偕盟也此乃名分之所係未聞王遣使出盟諸侯者也今頃王即位諸侯莫有朝京師者王命蘇子來盟文公儻知事君之道當躬拜王命之辱辭不敢盟朝于京師而請職焉可也今及蘇子盟于女栗不共甚矣或疑蘇子外交恐不然外交者如祭伯來是也何以盟爲冬狄侵宋楚子蔡侯次于厥貉九年夏楚侵陳克壺丘以其服于晉也秋楚公子朱自東夷伐陳陳人敗之獲公子茷陳懼乃及楚平至是陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先爲之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命遂道以田孟諸宋公爲右盂鄭伯爲左盂期思公復遂爲右司馬子朱及文之無畏爲左司馬命夙駕載燧宋公違命無畏扶其僕以徇或謂子舟曰國君不可戮也子舟曰常官而行何彊之有詩曰剛亦不吐柔亦不茹毋縱詭隨以謹罔極是亦非辟彊也敢愛死以亂官乎師氏曰狄侵宋諸侯不能救楚又與蔡次于厥貉以伺之將觀宋之弊而乘之也胡氏曰當是時陳鄭宋皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不及陳獲公子茷而懼宋方有狄難蓋有不得已者蔡無四境之虞則是得已不已志在從夷矣故削三國書蔡侯見其棄諸夏之惡也高郵孫氏曰厥貉之次遂稱楚子明年伐麇又以爵書蓋自是與中國等矣楚僣亂之邦與中國等則王政不行而中國之衰益甚矣家氏曰前日越椒之來諸儒謂春秋褒其來聘魯進之而書爵今厥貉之㑹麇之伐皆以楚子書亦謂進之而書爵可乎凡書楚子皆辨分也彼僭號爲王憑陵中夏春秋懼其擬于王也故自盂以後多書楚子所以削其僭名而辨中外之分奚其爲進乎十有一年春楚子伐麇厥貉之㑹麇子逃歸至是楚子伐麇成大心敗麇師于防渚潘崇復伐麇至于錫宂許氏曰楚侵伐書爵始此中國日替矣陳氏曰自是楚師必圍滅也而後貶人之家氏曰麇㣲國也猶恥從孟諸之田宋先代之後廼與鄭伯分左右盂夙駕載燧而不以爲恥由是言之楚人伐麇麇之榮也夏叔仲彭生㑹晉郤缺于承筐謀諸侯之從於楚者師氏曰主盟于中國者政刑不修而霸業不振則僣竊窺伺欲有所肆焉今晉靈紹文襄再世之業威令不行政刑不立大夫擅盟㑹内不能令諸侯外不能服冦亂是以諸侯背中國而從楚晉之大夫不自知其弊由已作復出㑹諸侯之大夫以謀治從楚者此郤缺所以會彭生于承筐也家氏曰楚伐麇叔彭生㑹晉比事而觀見聖人意矣楚商臣次于厥貉宋陳鄭望風欵附麇獨逃之春秋書楚子伐麇褒麇也晉郤缺爲㑹于承筐諸侯之大夫莫有至者魯獨遣彭生如㑹不以楚人盛强而替于從晉春秋書叔彭生㑹晉郤缺于承筐亦褒魯也此不待褒貶而見者也其後諸侯再合卒藉魯之力夫楚非驟强晉非卒弱也使趙盾能于此時禀王命合諸侯討貳國楚豈不知所懼乎彼次厥貉而三國奔走聽命盾坐視不顧廼徐遣郤缺爲此㑹具文應敵而諸侯自是散矣秋曹伯來朝即位而來見也公子遂如宋襄仲聘于宋且言司馬蕩意諸而復之因賀楚師之不害也狄侵齊冬十月甲午叔孫得臣敗狄于鹹鄋瞞侵齊遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔緜房甥爲右富父終甥駟乘冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首于子駒之門以命宣伯初宋武公之世鄋瞞伐宋司馬皇父帥師禦之敗狄于長丘獲長狄緣斯晉之滅潞也獲僑如之弟焚如齊襄公之二年鄋瞞伐齊齊王子成父獲其弟榮如埋其首于周首之北門衛人獲其季弟簡如鄋瞞由是遂亡高郵孫氏曰齊與魯相比之國也狄既侵齊而復加兵于魯叔孫得臣追而敗之不言帥師將尊師少也高氏曰春秋書敗狄者四皆不書戰不待戰而敗之喜中國之勝也喜中國之勝者不與外域之抗中國也師氏曰外域之犯中國非彼自能强盛也實由中國衰㣲有以致之耳書叔孫得敗狄所以著僑如之勇猶不免埋首于子駒之門乃知尊攘之業亦在人所自為而已十有二年春王正月郕伯來奔十一年郕太子朱儒自安于夫鍾國人弗狥至是郕伯卒郕人立君太子以夫鍾與郕邽來奔公以諸侯逆之髙郵孫氏曰春秋之法諸侯失地則名郕伯來奔獨不書名若郕伯父死不葬以此來奔而春秋爲魯以諸侯逆之而書爲郕伯則是寵其能叛也何以示勸戒乎泰山孫氏曰諸侯播越失地皆名者皆自失國也案莊八年師及齊師圍郕郕降于齊師自是入齊爲附庸此又來奔齊所偪爾故不名杞伯來朝始朝公也且請絶叔姬而無絶昏公許之此左氏之誤蓋成八年脱簡二月庚子子叔姬卒趙氏曰時君之女故曰子以别非先君之女也薛氏曰其卒何公主其喪也國君喪未昏之女非禮也夏楚人圍巢楚令尹太孫伯卒成嘉爲令尹羣舒叛楚夏子孔執舒子平及宗子遂圍巢師氏曰楚來聘而書子傷中國㣲著楚人盛也今圍巢而又人之罪其爲日已甚也秋滕子來朝始朝公也秦伯使術來聘秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也三辭賓對曰寡君願徼福于周公魯公以事君不腆先君之敝器以爲瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之高郵孫氏曰術不言氏未氏者也謝氏曰秦康公始遣使來修聘故與中國同辭冬十有二月戊午晉人秦人戰于河曲秦爲令狐之役故冬秦伯伐晉取覊馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師于河曲臾駢曰秦不能久請㴱壘固軍以待之從之秦人欲戰秦伯謂士㑹曰若何而戰對曰趙氏新出其屬曰臾駢必實爲此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不在軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可秦伯以璧祈戰于河十二月戊午秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸吾何以報乃皆出戰交綏秦行人夜戒晉師曰兩軍之士皆未憗也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人于險無勇也乃止秦師夜遁復侵晉入瑕胡氏曰秦伯親將晉上卿趙盾禦之其稱人何爲令狐之役故也秦納不正遂非積怨晉不謝秦潛師禦之是以暴兵連禍至此極也張氏曰不書及蓋言二國曲直之無相尚而黷兵殘民其罪均也不書敗績秦伯伐晉而趙盾帥師禦之欲待秦敝而趙穿沮其謀秦師遂遁無勝敗也季孫行父帥師城諸及鄆張氏曰所謂莒魯爭鄆蓋始于此前此莒未嘗與魯有爭且未嘗有事于鄆今行父首帥師城二邑以啟爭端魯自此與莒爲讐而爭由鄆始書帥師城罪行父也家氏曰魯之患不在莒而魯人每詳于備莒者睥睨弱小以爲侵漁之計耳城一邑已爲勞民今一朝城二邑其勞甚矣高氏曰春秋書城二十九而帥師城之者二此及哀三年城啟陽是也必帥師者畏也畏非城之道也夫勞民而城且不可况帥師以出乎春秋闕疑卷二十
