body:
  text: 春秋闕疑卷三元鄭玉撰桓公公名軌惠公之子隱公之弟史記世家名允桓王九年即位諡法辟土服遠曰桓元年春王正月穀梁氏曰桓無王其曰王何也謹始也桓弟弒兄臣弒君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也程子曰桓弒君而立不天無王之極也而書春王正月以天道王法正其罪也髙郵孫氏曰元年書王者以為弒君之賊將而必誅已弒君矣其能免於誅乎元年書王所以誅桓也二年書王必以為王室微弱弒君之賊力不能即時誅之二年而後誅之亦已晚矣然亦足以為王誅也十年書王者教政之出不可以一日無之十年無王則王道將絶于天下也十八年有王者桓公之終也弒君之賊無可赦之理不見誅于一時當見誅于歲月不見誅于其生當見誅于將死不見誅于終身當見誅于萬世愚按桓公不書王而宣公書王者桓公弒君而自立宣公為弒君者所立事固不同也胡氏曰古者諸侯不再娶于禮無二嫡惠公元妃既卒繼室以聲子則是攝行內主之事矢仲子安得為夫人母非夫人則桓乃隱之庶弟安得為嫡子謂當立乎桓不當立國乃隱公之國其欲授桓乃實讓之非攝也然則公羊所謂桓幼而貴隱長而卑子以母貴之説非與此徇惠公失禮而為之辭非春秋法也仲子有寵惠公欲以為夫人母愛者子抱惠公欲以桓為嫡嗣禮之所不得為也惠公縱其邪心而為之隱公探其邪志而成之公羊又肆為邪説而傳之漢朝又引為邪議而用之夫婦之大倫亂矣春秋明著桓罪以示王法正人倫存天理訓後世不可以邪汨之也公即位胡氏曰即位者告廟臨羣臣也國君嗣位定于初喪必踰年而後改元書即位者緣始終之義一年不二君緣民臣之心不可曠年無君按書載舜禹受終傳位之事在舜則曰月正元日格于文祖在禹則曰正月朔旦受命于神宗率百官若帝之初夫于文祖神宗則告廟也率百官若帝之初則臨羣臣也自古通喪三年其以凶服則不可入宗廟其以吉服則斬焉在衰絰之中不可既成而又易之也君薨百官總已以聽于冡宰三年則告廟臨羣臣固有攝行之事矣按啇書稱太甲元祀伊尹祠于先王則攝而告廟之證也百官總已以聽冡宰則攝而臨羣臣之證也至三祀十有二月伊尹以冕服奉嗣主則免喪從吉之證也朱子曰胡文定説春秋公即位終是不通且踰年即位凶服如何入廟文定却説是冡宰攝行他事可攝即位豈可攝想古時此等大事必有權宜如借吉之例愚按所謂即位者天子則就天子之位諸侯則就諸侯之位豈可使人攝也且古者人子於父人臣於君皆服斬衰三年若謂其君斬焉在衰絰之中不可以去服從吉告廟臨羣臣其臣獨可以去服從吉行之乎蓋此事本是凶禮嗣子定位於柩前未正君臣之分故因踰年改元年以凶服臨羣臣臣以凶服朝其君以正君臣之分豈有去服從吉之理至於告廟亦只是凶服此是告而非祭也蓋祭是吉禮此告自是凶禮且如儀禮奉柩朝于祖非以凶服入朝乎施之于朝祖既可施之于告廟獨不可乎所謂凶服不可入廟者國家祭祀臣有私喪則不可與祭爾非謂此等也按書伊訓惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在則太甲親告廟臨羣臣矣非伊尹攝行之也百官總已以聽冡宰謂庶政之聽于冡宰者爾傳者曲謂伊尹奉太甲以即位改元之事祗見厥祖則攝而告廟也侯甸羣后咸在百官總已之職以聽冡宰則攝而臨羣臣也遂失經意然今禮文殘闕無從考證不敢妄以臆説著為定論姑記所見以俟知者又按凡人君嗣世改元行即位之禮則書即位不行即位之禮則不書即位皆因其實而已然或行或不行又各有義隱公稱攝讓國故不行即位之禮以明其心桓公弒君自立故特行即位之禮以掩其惡莊公閔公僖公則立于君弒國亂之時不暇行即位之禮也三月公會鄭伯于垂鄭伯以璧假許田公即位修好于鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也髙氏曰會者外為主甚矣鄭伯之無道也知公之篡逆不自安特為好會將以求賂焉度魯亟于會諸侯必從所欲故也夫弒君之賊人得而討之況鄭伯與隱公同盟和好固非一日今見其罪不能討反有所邀求欲以定其位是誠何心哉先言會于垂繼言假許田見鄭伯貪利妄義之甚也夫璧者飢不可食寒不可衣非若土地人民之重而魯亦何用璧為哉特以桓既弒立懼諸侯之討也鄭伯得其情姑以璧藉口而實欲得許田耳聖人若書魯以許田賂鄭則無以顯鄭伯之罪故書鄭伯以璧假許田而魯之罪自見矣此春秋微闡顯幽之道也先儒謂鄭伯以祊易許田若果爾則祊初入魯許田即當入鄭又安得數年不報必待鄭伯更以璧假之然後與邪先儒但見鄭先歸魯祊今來假許田遂以為相易殊不知鄭始結魯以拒敵故歸祊以市魯魯今篡君以求援故賂田以償鄭其地雖若相易而其事不相涉也謝氏曰君薨百官總已以聽于冡宰三年孝子疾痛在心思慮未能接事也隱即位三月而盟于蔑桓即位三月而會于垂春秋諸侯無三年之喪可知也春秋于即位三月書盟書會而惡自見矣楊龜山曰宋督弒其君而公成亂取郜大鼎以歸公弒隱而鄭伯會于垂以璧假許田則魯之亂鄭伯成之也不書為內諱也夫鄭伯之假田與公之取鼎其求賂一也而書之異辭內外之分然也夏四月丁未公及鄭伯盟于越結祊成也盟曰渝盟無享國冬鄭伯拜盟胡氏曰垂之會鄭為主也故稱會越之盟魯志也故稱及鄭人欲得許田以自廣是以為垂之會桓公欲結鄭好以自安是以為越之盟程子曰桓公欲納鄭好以自安故既與許田又為盟也弒君之人凡民罔不懟而鄭與之盟以定之其罪大矣家氏曰三月會于垂可以盟矣而未之盟歸未一月乃為此盟春秋繼假田而書及盟譏賂之以田求為此盟也魯桓割地與人以逭篡逆之討鄭莊受地與盟而庇其篡弒之罪春秋比書其事不加貶斥而義自見矣秋大水公羊氏曰災也家氏曰書大者變常之辭傷民害物而後書程子曰君德修則和氣應而雨暘若桓行逆德而致陰沴乃其宜也胡安定先生曰聖王在上五事修而彛倫序則休徵應之聖王不作五事廢而彜倫斁則咎徵應之大水者常雨也傷禾稼壞廬舍故曰大水胡氏曰天非為堯有洪水之災至禹而後水由地中行爾後世有人為不善感動天變召水溢之災者必引堯為解誤矣冬十月二年春王正月戊申宋督弒其君與夷及其大夫孔父元年宋華父督見孔父之妻于路目逆而送之曰美而豔至是宋督攻孔氏殺孔父而取其妻公怒督懼遂弒殤公家氏曰傳謂督慕孔妻之美而殺其夫公怒督懼因是弒君杜氏從而為之説曰孔父內不能正其家外取怨于百姓禍及其君是以春秋名之此以書名書字為拘而強求其説雖排陷死節而不顧失之遠矣公羊氏曰及者何纍也弒君多矣舍此無纍者乎曰有仇牧荀息皆纍也有則何以書賢也何賢乎孔父孔父可謂義形于色矣其義形于色奈何督將弒殤公孔父生而存則殤公不可得而弒也孔父可謂義形于色矣程子曰人臣死君難書及以著其節父名也稱大夫不失其官也臨江劉氏曰春秋賢者不名孔父者所賢也則其名之何父前子名君前臣名薛氏曰相國而不能弭亂至于君弒身死雖賢乎孔父猶非輔相之道也髙郵孫氏曰易大過上六曰過涉滅頂凶無咎象曰過涉之凶不可咎也蓋死者人之所難一奮其身死而不避而好事者以其事之不成而咎之多矣聖人于易特設其象而解之曰不可咎也所以勉進忠義之士有為于不可為之時必救于無可救之際以冀幸于萬一也胡氏曰華督欲弒君而憚孔父劉安欲叛漢而憚汲黯曹操欲禪位而憚孔融此數君子者義形于色皆足以衛宗社而忤邪心姦臣之所以憚也不有君子其能國乎春秋賢孔父示後世人主崇奬節義之臣乃天下之大間有國之急務也滕子來朝愚按滕本侯爵在隱公時書卒書朝皆稱侯矣今乃降而書子終春秋之世不復稱侯杜氏范氏謂為時王所黜是時王室微弱安能黜諸侯也趙氏謂居喪稱子滕之嗣君豈終春秋之世皆居喪乎胡氏謂以其首朝魯桓當時諸侯黨惡者多矣何獨于滕而貶其爵乎程子謂以其服于楚當時諸侯服屬楚者多矣未聞貶其爵也胡安定先生謂或以侯禮來朝沙隨程氏謂以侯禮見則所供者多故自降以子禮見夫五等之爵天子所封諸侯所受各有定分縱使當時紊亂春秋于名分至嚴夫子安得不正乎大東萊呂氏曰春秋以後杞或稱侯或稱伯或稱子滕或稱侯或稱子薛或稱侯或稱伯皆不可得而詳考殆後之録春秋者文誤也大國顯也故不誤小國微也故誤然亦不應誤者如是之多也今姑闕之三月公會齊侯陳侯鄭伯于稷以成宋亂會于稷以成宋亂為賂故立華氏也宋殤公立十年十一戰民不堪命孔父嘉為司馬督為太宰故因民之不堪命先宣言曰司馬則然已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂公齊陳鄭皆有賂故遂相宋公穀梁氏曰以者內為志焉爾公為志乎成是亂也高氏曰桓弒君而立方懼諸侯之討也乃因宋督弒君特會諸侯以成其亂春秋深嫉之故以宋亂之成歸罪于公公若會諸侯以討宋宋亂不成矣惟公以亂助亂是以成也家氏曰宋亂已成而春秋書會于稷以成宋亂者何哉蓋督雖弒君而馮之位未定也今三國為此會將以謀宋而徼利而馮之位于是始定督之罪始得無討故成宋亂者三國也所以使三國之成此亂者魯也陳氏曰會未有言其所為者其曰成宋亂弒君之禍接迹于天下于是焉始也向也合五國之君大夫以定州吁而州吁訖于討今也合四國之君以立華督督遂相宋莊弒君之禍接迹于天下四君為之也春秋之褒貶至于變文嚴矣向也五國之君大夫書之復書之終春秋僅再見焉以變文為猶未也而直書其所為舍此無復見者矣胡氏曰邾定公時蓋有弒其父者而定公瞿然失席曰是寡人之罪也嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在宮者殺無赦殺其人壞其室汙其宮而瀦焉蓋君踰月而後舉爵華督弒君之賊凡民罔不憝也而桓與諸侯會而受賂以立華氏使相宋公甚矣故特書其所為夫臣為君隱子為父隱禮也其目言之何桓惡極矣臣子欲盡隱之而不可以欺後世其曰成宋亂而不書立華氏為有隱乎爾此與澶淵各書其事者桓弒隱華督弒殤般弒景皆天下大惡聖人所為懼春秋所以作也一則受宋賂而立華氏一則謀宋災而不能討故特書其事所以示貶也然澶淵之會欲謀宋災而不討弒君之賊雖書曰宋災故而未能表其誅責之意也必深諱魯卿而重貶諸國之大夫然後足以啓問者見是非也稷之會前有宋督弒君後有取宋鼎之事書曰成宋亂其責已明不必諱公與貶諸侯爵次然後見其罪也華督有不赦之罪魯鄭齊陳同會于稷以成其亂受賂而歸咸自以為利也不知百官象之齊大不利焉未幾陳有五父之亂齊有無知之亂鄭有祭仲子突亹儀之亂魯有叔牙慶父般閔之亂數十年間四國舛逆幾至喪亡則以昧于履霜堅氷之戒不能辨之于早也夏四月取郜大鼎于宋戊申納于太廟取郜大鼎于宋納于太廟臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羮不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲遊纓昭其數也火龍黼黻昭其文也五色比象昭其物也鍚鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官百官于是乎戒懼而不敢易紀律今滅德立違而置其賂器于太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况將昭違亂之賂器于太廟其若之何公不聽穀梁氏曰桓內弒其君外成人之亂受賂而退以事其祖非禮也郜鼎者郜之所為也曰宋取之宋也家氏曰廟者祖宗神靈之所宅周公魯公之典章法制于是乎在郜之鼎宋之賂胡為乎至哉髙氏曰公不知納鼎之為惡又欲誇於神明置其器於周公之廟夫宋督賂四國以免誅而以郜鼎歸公不曰宋使來歸而曰取于宋以見公乃自以為功而取之專罪公也胡氏曰取者得非其有之稱納者不受而強致之謂弒逆之賊不能致討而受其賂器置於太廟以明示百官是教之習為滅德亂紀之行也公子牙慶父仲遂意如之惡又何誅焉聖人為此懼而作春秋故直載其事垂訓後世使知寵賂之行保邪廢正能敗人之國家也亦或知戒矣秋七月把侯來朝把侯來朝不敬把侯歸乃謀伐之胡氏曰公穀程氏皆以把為紀桓弟弒兄臣弒君天下之大惡紀侯來朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之援非為桓立而朝之也張氏曰左氏謂把侯來朝不敬把侯歸乃謀伐之未知孰是蔡侯鄭伯會于鄧始懼楚也胡氏曰其地以國鄧亦與焉楚自西周已為中國患宣王蓋嘗命將南征矣及周東遷僭號稱王憑陵江漢此三國者與之為鄰是以懼也後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大於禮莫強於信義循天理惇信義以自守其國荆楚雖大何畏焉不知本此地醜德齊莫能相尚則以地之大小力之強弱分勝負矣觀諸侯會盟離合之迹而天下盛衰之由可考也觀春秋進退豫奪抑揚之旨則知安中國禦外患之道也九月入把討不敬也程氏曰將卑師少則稱人內則止曰入某伐某大東萊呂氏曰入把微者何以書天子在上諸侯擅相攻伐入人之國罪之大者聖人以為無王春秋所由作也公及戎盟于唐修舊好也冬公至自唐胡氏曰凡為人子者出必告反必面事亡如事存故君行必告廟反必奠而後入禮也謝氏曰春秋諸侯出入無時會盟征伐繼踵不息至而不復告廟者衆矣春秋因其告廟則書其不告則不書以示不敬也諸侯宗廟社稷之主也政治不以時修祭祀不以時舉臣民不以時省則國事隳矣故魯侯之出春秋謹其至而書之所以為之戒也凡書至八十二觀其所至時月而諸侯委社稷人民槃樂自縱久廢于外其失見矣左氏曰特相會往來稱地自參以上則往稱地來稱會愚按或以前事至或以後事至或不以本事至則各因其告辭若夫文公以前書至者少文公以後書至者多其殆因世有遠近故史有詳略也歟三年春正月胡氏曰桓公弒君而立至于今三年而諸侯之喪事畢矣是入見受命天子之時也而王朝之司馬不施殘執之刑鄰國之大夫不聞有沐浴之請魯之臣子義不戴天反面事讐曾莫之耻使亂臣賊子肆其凶逆無所忌憚人之大倫滅矣故自是而後不書王者見桓公之無王與天王之失政而不王也公會齊侯于嬴成婚于齊也髙郵孫氏曰婚禮有六惟逆女自行餘皆父兄之命以遣使者所以養亷遠耻示萬世之嗣不可輕也今桓公與齊謀婚而不由介紹之命媒妁之言身至齊境以與齊謀已之婚醜惡見矣齊侯衛侯胥命于蒲不盟也穀梁氏曰胥之為言猶相也相命而信諭謹言而退以是為近古也程子曰二國為會約言相命而不為盟詛近於理也故善之高郵孫氏曰當是之時齊衛二國期命於蒲約言而信諭不盟而好成終二君之身未嘗渝言而侵伐是由胥命之言而二國和好十數年之間也夫子安得不少進之以見屢盟數會而侵伐隨之者之罪乎胡氏曰古者不盟結言而退人愛其情私相疑二以成傾危之俗其所由來漸矣有能相命而信諭豈不獨為近正乎故特起胥命之文於此有取焉謝氏曰命王之事也二國胥命非正也雖然聖王不作諸侯小大猜疑盟約並起公正之道衰而信義不復見矣方是時二國以書相命而不以歃血為盟有貴信之心焉可謂近正矣春秋書其胥命然命必有主之者謂之胥命不與諸侯得專也六月公會把侯于郕把求成也髙郵孫氏曰去年之秋魯嘗入把把於此恐懼而求成于公故為郕之會也程子曰桓公篡立無歲不與諸侯盟會結外援以自固也許氏曰姻大國服小國著得意也天下無王而後人得意如此秋七月壬辰朔日有食之既穀梁氏曰既者盡也有繼之辭也程子曰食盡為異大也楊龜山曰日月之變有常數焉此巧歷所能窮也而春秋書以為異者蓋先王克謹天戒因以正嚴厥事則日月有變豈徒然哉必有以也故書曰有食之而其辭若有食之者蓋所以歸咎於人事而不以常數為不足畏也髙郵孫氏曰言盡則無復生之理言既則見既而復生也方曰之食但見其食之盡安知其既而復生然聖人以復生之意書之者此其深意也聖人之為道惟陽之勝則君父常尊而臣子常卑君子常強而小人常弱至于陰盛而勝陽聖人所不與也陰雖盛必為之戒陽雖衰必為之助奈何天下之為陽常至于衰而為陰所勝天下之為陰常至于盛以淩陽凡為陰之類者亦何足道焉所為陽者有罪爾高氏曰經書日食三十六而食之既者二此年與宣八年是也天變之甚獨於二公見孰謂無天道乎家氏曰常聞長老言日食既京師不之見以為君德時政之所感至乙亥丁丑二歲親見食之既先是太史定為食五六分已而食之晝晦星見及有自四方遠外來者乃云食及五六分不既不晦然後知天文示異巧歷有不能知者公子翬如齊逆女穀梁氏曰逆女親者也使大夫非正也高郵孫氏曰公子翬在隱公時嘗再見經而無氏蓋隱自稱攝不命大夫桓公弒君自立而翬為謀主即位未幾遂加爵命故曰公子翬也謝氏曰翬卒不書絶之也姦臣以大惡行乎亂世而刑戮不及其身者春秋以法誅之所以著其罪於天下也九月齊侯送薑氏于歡穀梁氏曰禮送女父不下堂母不出祭門諸母兄弟不出闕門送女踰境非禮也髙郵孫氏曰女以嫁為歸義當適外者也以義割恩而已故男子生則主其祭祀以傳於世女子則一適於外終身不反男子而去父母則為不孝女子而大歸其家則為至惡故閨門之內以義割恩男女之事正夫婦之道成齊侯以諸侯之尊不能割愛以從義而眷眷於男女之情越禮犯義送女出境至于魯地失禮甚矣高氏曰禮諸侯之娶女入境則稱夫人歡我地也而薑氏不稱夫人者以齊侯身送之有父之親未可繫而稱夫人也公會齊侯于歡程子曰齊侯出疆送女公往會之皆非義也胡氏曰古者婚禮必親迎則授受明後世親迎之禮廢於是有父母兄弟越境而送其女者以公子翬往逆則既輕矣為齊侯來乃逆而會之于歡是公之行其重在齊侯而不在薑氏豈禮也哉高氏曰歡之會實受薑氏于齊以歸而但以會歡為文者以為萬世之嗣已則輕之而公子逆之齊侯之強已則畏之而親之會是公之行其所重在齊侯而不在薑氏也若齊侯不送則公亦不至于歡故書公會齊侯于歡以罪之也夫人薑氏至自齊程子曰告于廟也穀梁氏曰不言翬之以來公親受之于齊也泰山孫氏曰此齊侯送薑氏公受之于歡也公受薑氏于歡不與公受薑氏于歡也故曰夫人薑氏至自齊以正其義薛氏曰書至不與公俱至也桓公夫婦之道終始乎不正矣胡氏曰不能防間于是乎在敝笱之刺兆矣禮者所以别嫌明微制治于未亂不可不謹也高氏曰春秋之時婚姻失道鮮有賢女輔佐君子故文薑亂魯驪姬惑晉南子傾衛夏姬喪陳上下化之滔滔皆是故自隱而下內女夫人之迹聖人謹而書之以懲以戒為萬世法冬齊侯使其弟年來聘致夫人也有年穀梁氏曰五穀皆熟為有年程子曰書有年記異也人事順於下則天氣和於上桓弒君而立逆天理亂人倫天地之氣為之繆戾水旱凶災乃其宜也今乃有年故書其異宣公為弒君者所立其惡有間故大有年則書之謝氏曰桓之世書有年宣之世書大有年志異也志幸也行之惡莫大於桓宣桓而有年宣而大有年異之大者也國以民為本民以食為命桓而有年宣而大有年幸之大者也高郵孫氏曰春秋二百四十二年之久而書有年大有年者二處而已其一桓公其一宣公桓宣大惡行何道而有年乎書者不宜也胡氏曰舊史災異與慶祥並記故有年大有年得見于經然十二公多歷年所亦有務農重穀閔雨而書雨者豈無豐年而獨不見於經是仲尼於他公皆削之矣獨桓宣存而不削者緣此二公獲罪於天宜得水旱凶災之譴今乃有年則是反常也故以為異特存爾然則天道亦僭乎桓宣享國十有八年獨此年書有年他年之歉可知也而天理不差信矣此一事也在不修春秋則為慶祥君子修之則為變異是聖人因魯史舊文立興王之新法也故史文如畫筆經文如化工嘗以是觀非聖人莫能修之審矣四年春正月公狩于郎公羊氏曰常事不書此何以書譏遠也諸侯曷為必田狩一曰乾豆二曰賔客三曰充君之庖程子曰公出動衆皆當書于郎遠也何氏曰禽獸多則傷五穀因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武備又因以為田除害啖氏曰搜狩合禮者常事不書非時及越禮而為之則書以示譏也趙氏曰四時之田其事各殊其名亦異春以閲武擇材故以搜為稱夏以為苗除害故以苗為名秋則順天時以殺物故以獮為義冬則守禽獸以習戰故以狩為目以謂微事不謹則大事不立故每慎於微而後王德全矣胡氏曰戎祀國之大事狩所以講大事用民以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下故中春教振旅遂以搜中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩然不時則傷農不地則害物可不謹乎夏天王使宰渠伯糾來聘胡氏曰宰冡宰也渠氏伯爵糾其名也糾位六卿之長降從中士之例而書名貶也於糾何貶乎在周制大司馬九伐之法諸侯而有賊殺其親則正之放弒其君則殘之桓公之行當此二者舍曰不討而又聘焉失天職矣操刑賞之柄以馭下者王也論刑賞之法以詔王者宰也乃為亂首承命以聘弒君之賊乎故特貶而書名以見宰之非宰也程子曰桓公弒其君而立天子不能治天下莫能討而使其宰以聘之示加尊寵天理滅矣人道亡矣書天王言當奉天矣而其所為如此名糾言尊卑貴賤之義亡矣人理既滅天運乖矣陰陽失序歲功不能成矣故不具四時尹氏曰天道不成不記於元年而記於此因天王使宰渠伯糾來聘記之尤有深意五年春正月甲戌己丑陳侯鮑卒陳侯鮑卒於是陳亂文公子他殺太子免而代之程子曰五年春正月甲戌下文缺高郵孫氏曰傳於此經之下記陳亂文公子他殺太子免而代之明年之秋經書蔡人殺陳他趙氏以為甲戌之下當記其事而簡編脫之按春秋之經自相照驗未有始卒不相會者若明年但書殺陳他而今年不載陳亂之迹則陳他者何人殺之又以何罪本此而推故甲戌之下載陳他之事趙説是也夏齊侯鄭伯如紀齊侯鄭伯朝于紀欲以襲之紀人知之程子曰齊為諸侯而欲為賊於鄰國不道之甚鄭伯助之其罪均矣高郵孫氏曰春秋之時齊鄭強大而紀最小宜紀侯朝事之不暇而齊鄭反往朝焉則朝者非實朝也有以窺之也故桓十三年至于戰而莊元年遷其郱鄑郚二年以酅入齊而紀亡矣是朝之者安得心服而朝乎將圖其地名朝而實襲之也事既不果遂行朝禮而還孔子疾其懷詐以圖人之國故特書曰如紀也胡氏曰如者朝辭此外相如爾何以書紀人主魯故來告其事魯史承告故備書于䇿夫子修經存而不削者以小國恃大國之安靖已乃包藏禍心以圖之亦異於興滅國繼絶世之義矣天王使仍叔之子來聘公羊氏曰譏父老子代從政也穀梁氏曰録父以使子也胡氏曰仍叔之子云者譏世官非公選也帝王不以私愛害公選故仕者世祿而不世官任之不以其賢使之不以其能也卿大夫子弟以父兄故而見使則非公選而政由是敗矣上世有自耕野釣渭擢居輔相人莫不以為宜伊陟象賢復相太戊丁公世美入掌兵權不以世故疑之也崇伯殛死禹作司空蔡叔既囚仲為卿士亦不以父故廢之也惟其公而已矣及周之衰小人得政視朝廷官爵為己私援引親黨分據要塗施及童稚賢人退處於蓽門老身而不用公道不行然後冦盜侵凌國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者戒後世人主徇大臣私意而用子弟之弱者居夫公選之地以敗亂其國家也高郵孫氏曰父在而使子非君道也已在而使子代非臣道也己之父在而代父受命非臣子也天王仍叔與仍叔之子皆有罪矣葬陳桓公城祝丘秋蔡人衛人陳人從王伐鄭隱三年鄭武公莊公為平王卿士王二于虢鄭伯怨王故周鄭交質王崩周人將畀虢公政四月鄭祭足帥師取溫之麥秋取成周之禾周鄭交惡六年鄭伯如周始朝桓王王不禮焉八年夏虢公忌父始作卿士于周八月鄭伯以齊人朝王九年鄭伯為王左卿士以王命伐宋十一年王取塢劉蒍邘之田于鄭而與鄭人蘇忿生之田溫原絺樊隰郕欑茅向盟州陘隤懷至是王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭子元請為左拒以當蔡人為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不支固將先奔既而萃於王卒可以集事從之曼伯為右拒祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫戰于繻葛命二拒曰旝動而鼓蔡衛陳皆奔王卒大敗祝𥅆射王中肩王亦能軍祝𥅆請從之公曰君子不欲多上人况敢陵天子乎茍自救也社稷無殞多矣夜鄭伯使祭足勞王且問左右公羊氏曰從王正也謝氏曰君行而臣從君臣之大義也周衰諸侯不遵王命久矣桓王伐鄭三國乃能為王出師以討不庭勤王之道至矣春秋書曰從王所以明君臣之大義也以君臣大義書三國從王而大國之不能從王其罪見矣三國出兵蓋卿行也鄭莊公以手足之親出為王室仇敵諸侯所以致討也三國雖以卿出而侯伯無躬親夾輔之勳三國從王書人而諸侯事王不盡忠力其失見矣程子曰王師於諸侯不言敗諸侯不可敵王也於夷狄不書戰夷狄不能抗王也此理也其敵其抗王道之失也大雩公羊氏曰大雩者何旱祭也何以不言旱言雩則旱見言旱則雩不見劉氏意林曰雩常事爾遇旱則雩非常也謝氏曰諸侯不得祭天祈穀行於社稷雩禮行於境內之山川而已雩祈雨之祭也大雩祭天而雩天子之禮也夏百穀需雨之時故雩以孟夏秋大雩失天時也然則大雩書僭也秋大雩書怠也家氏曰郊禘亦僭何以不書大郊禘一而已矣故不書大若雩則諸侯之雩與天子之雩為禮各異是故書大以譏其僭螽公羊氏曰記災也程子曰蝗也既旱又蝗飢不待書也冬州公如曹淳于公如曹度其國危遂不復程子曰州公嘗為王三公故稱公謝氏曰諸侯以王命主社稷撫人民其有難矣明忠信嚴守備與民以死守之保國之義也州公以小國間於大國度其國危而不能守乃至於不畏王命不恤社稷人民私以一身避難適曹然則州公非朝曹也亦非奔曹也其行欲以免禍而已春秋書曰如曹而州公不能保守其國其惡見矣穀梁氏曰外相如不書此何以書過我也六年春正月實來自曹來朝愚按舊説或謂實是也猶曰是人來蓋謂州公也此承上文去年冬州公如曹書之也若上書州公如曹之下即書實來則是州公也今州公如曹在五年之冬實來在六年之春經隔一年安可謂承上文書實來也春秋之文如化工生物春秋之義如日星在天決不如是之晦昧也或又謂實州公名去年如曹未失國故不名今來魯不復其國則是匹夫也故名之使果州公也於去年如曹宜以失國之例書曰州公實如曹則今年實來乃州公也去年不書其名今年不書其國安知實之為州公乎蓋闕文也夏四月公會紀侯于郕紀來咨謀齊難也秋八月壬午大閲簡車馬也公羊氏曰大閲者簡車徒也程子曰為國之道武備不可廢必於農隙講肄保民守國之道也盛夏大閲妨農害人失政之甚無事而為之妄動也有警而為之教之不素何以保其國乎胡安定先生曰書八月非時也書大閲非禮也按大閲天子之禮魯諸侯而行之其僭可知蔡侯殺陳他莊二十二年陳厲公蔡出也故蔡人殺五父而立之髙郵孫氏曰陳他弒君之賊然其迹不見於經惟趙氏推而謂在五年甲戌之下己丑陳侯鮑卒之前而左氏傳文亦載其事趙氏之説是也朱子曰陳他文公之子桓公之弟公疾病殺其太子免而代之公卒而他立明年為蔡人所殺此墓門之詩刺他而追咎先君不能為他置良師傅以至此也胡氏曰他殺太子而代其位至是踰年不成之為君者以賊討也書蔡人以善蔡書陳他以善陳也善蔡者以蔡人知他之為賊善陳者以陳國不以他為君知其為賊故稱人稱人者討賊之辭也不以為君故稱名稱名者當討之賊也魯桓弒君而鄭伯與之盟宋督弒君而四國納其賂則不知其為賊矣齊商人弒君者及其見殺則稱位蔡般弒父者及其見殺則稱爵是齊蔡國人皆以為君矣聖人於此抑揚豫奪遏人欲於橫流存天理於既滅見諸行事可謂深切著明矣篡弒之賊外則異國皆欲致討而不赦內則國人不以為君而莫之與誰敢動於為惡故曰孔子成春秋而亂臣賊子懼使鄰國明討賊之義與國絶輔篡之姦則亂賊何自而作雖作無以成其亂此春秋所以書也九月丁卯子同生子同生以太子生之禮舉之接以大牢卜士負之士妻食之公與文薑宗婦命之公問名於申繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空先君獻武廢二山是以大物不可以命公曰是其生也與吾同物命之曰同程子曰冡嗣之生國之大事故書髙郵孫氏曰王者之法立子以嫡所以杜爭奪之患而正嫡庶之分也嫡長乏生必舉以禮而史書之册嫡庶有定分少長有定日一著於史則少不得陵長庶不得加嫡爭奪之患消而愛憎之心息也春秋十二公二百四十二年未有書子生者而子同之生特書之所以明史書之常法而示嫡庶之有分也餘公之生或非嫡或舉不備禮或舊史不書春秋載一可以見二著是可以明非者此之謂也胡氏曰適冡始生即書于策與子之法也唐虞禪夏后殷周繼春秋兼帝王之道賢可禪則以天下為公而不拘於世及之禮子可繼則以天下為家而不必於讓國之義萬世之通道也與賢者貴於得人與子者定於立嫡傳子以嫡天下之達禮也故有君薨而世子未生之禮植遺腹朝委裘而天下不亂者以名分素明而民志定也經書子同生所以明與子之法正國家之本防後世配嫡奪正之事垂訓之義大矣此世子也其不曰世子何也天下無生而貴者誓於天子然後為世子愚按生即書之所以見名分之已定而明父子之親誓於天子然後稱世子所以見爵秩之貴而明君臣之義與賢與子雖帝王之達道然與子易與賢難與子而專於立嫡決不至乎亂與賢而或非其人則必至乎亂且以春秋言之曹之子臧吳之季札非不賢也父兄知其賢也舉國以讓之二子之識不足以及此辭而不受卒亂二國賢可輕與乎然則與賢之事不可行於後世歟賢也必舜禹而後可舜禹不世出也茍非舜禹也徒讓以生亂耳故春秋主於立嫡憂天下之生亂也然以當時之事觀之非禁與賢之法而不書也蓋亦無與賢之事可書也故但書與子之法以為萬世之常經使世復生舜禹也在上者又有堯與舜也則必舉天下以授受矣何待春秋之書乎書與子之法以教當時存與賢之法以待來世是則夫子之微意而亦春秋之大權也冬紀侯來朝請王命以求成于齊公告不能程子曰紀侯不能上訴天子近赴諸侵和輯其民人效死以守而欲求援於魯桓不能保其國宜矣愚按魯桓弒君之賊一夫倡義即得誅之身且不保安能敵大國庇小國而救人之急乎紀侯主之以求援其何能國春秋備書之雖曰小事大弱事強亦必有道也春秋闕疑卷三
