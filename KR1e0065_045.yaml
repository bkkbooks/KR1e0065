body:
  text: 春秋闕疑卷四十五元鄭玉撰十有一年春齊國書帥師伐我齊為鄎故國書髙無􅊭帥師伐我及清季孫謂其宰冉求曰齊師及清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之閒季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也魯之羣室衆于齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列于諸侯矣季孫使從于朝俟于黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子强問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而搜乘孟孺子泄帥右師顔羽御邴泄為右冉求帥左師管周父御樊遲為右季孫曰須也弱有子曰就用命焉季氏之甲七千冉有以武城人三百為已徒卒老幼守宫次于雩門之外五日右師從之公叔務人見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰于郊齊師自稷曲師不踰溝樊遲曰非不能也不信子也請王刻而踰之如之衆從之師入齊師右師奔齊人從之陳瓘陳莊涉泗孟之側後入以為殿抽矢策馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐步而死師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫不許孟孺子語人曰我不如顔羽而賢于邴泄子羽鋭敏我不欲戰而能默泄曰驅之公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛于齊師故能入其軍孔子曰義也謝氏曰凡諸侯來伐不至國都則書某鄙至國都則書伐我皆婉其辭以父母國故也愚按郊之戰論語稱孟之反不伐奔而殿將入門䇿其馬曰非敢後也馬不進也所謂門者必魯之城門也則齊師逐魯師已至魯之城下矣故云伐我也是戰也魯得不亡者賴有孔門諸弟子耳許氏曰以魯之微搆怨大國郊之戰非其風俗禮義正勝則國幾于亡此仲尼之徒也以是知君子居人之國雖曰其道不行猶蒙其福焉夏陳轅頗出奔晉初轅頗出為司徒賦封田以嫁公女有餘為己大器國人逐之故出道渴其族轅咺進稻醴梁糗腵脯焉喜曰何其給也對曰器成而具曰何不吾諫對曰懼先行許氏曰春秋書陳轅頗之奔若曰為人臣而刻下以附上託公而營以私者其亡乎家氏曰聚斂媚上固當有討然國不能自討致衆怒而逐之是衆為政也而可哉五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書十年冬吳子使來復警師至是為郊戰故公㑹吳子伐齊五月克博壬申至于嬴中軍從王胥門巢將上軍王子姑曹將下軍展如將右軍齊國書將中軍髙無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志宗子陽與閭丘明相厲也桑掩胥御國子公孫夏曰二子必死將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉公孫揮命其徒曰人尋約吳髮短東郭書曰三戰必死于此三矣使問弦多以琴曰吾不復見子矣陳書曰此行也吾聞鼓而已不聞金矣甲戌戰于艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于公將戰吳子呼叔孫曰而事何也對曰從司馬王賜之甲劍鈹曰奉爾君事敬無廢命叔孫未能對衛賜進曰州仇奉甲從君而拜公使大史固歸國子之元置之新篋褽之以𤣥纁加組帶焉置書于其上曰天若不識不衷何以使下國秋季孫命修守僃曰小勝大禍也齊至無日矣愚按何休注公羊傳謂魯與伐而不與戰然則魯師雖在行是日未出戰故經止書及吳戰也家氏曰兩年之閒書公㑹吳伐齊者再責魯深矣當闔廬之世春秋嘗進吳書子自夫差之立逮今十有三年春秋皆以號舉之為其用兵不戢而夷之也或曰吳伐齊國書禦之敗而書獲何也曰責國書不能討內賊以伐魯而召吳師也國書齊之世卿為中軍元帥國之存亡係于掌握而坐視陳氏弒君專國而不能討又從而受令焉其亦可鄙甚矣及乎艾陵歌虞殯具含玉未戰而魄先褫兵敗于外賊乘于內簡公之弒齊國之亡自兹以始不責而誰責歟秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋冬衛大叔疾出奔宋初疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣置于犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州外州人奪之軒以獻恥是二者故出衛人立遺使室孔姞文子之將攻大叔也訪于仲尼仲尼曰胡簋之事則嘗學之矣甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥文子遽止之曰圉豈敢度其私訪衛國之難也將止魯人以幣召之乃歸家氏曰世叔齊之奔不足紀也春秋所以書譏在孔文子春秋之義每責僃賢者孔文子衛之賢大夫論語所謂敏而好學不恥下問者也而于世叔有二大過焉既使之出其妻而妻之又以其通于初妻之娣奪其妻而逐之復使世叔之弟遺蒸于嫂瀆倫亂教至于再三夫子為是而去衛書齊出奔齊不足多責責在文子十有二年春用田賦十一年季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私于冉有曰君子之行也度于禮施取于厚事舉其中斂從其薄如是則以丘亦足矣若不度于禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽胡氏曰哀公問于有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足古者公田什一助而不稅魯自宣公初稅畝後世遂以為常而不復矣至是二猶不足故又以田賦也夫先王制土藉田以力而底其逺邇賦里以入而量其有無今用田賦軍旅之征非矣田以出粟為主而足食賦以出軍為主而足兵周制宅不毛者有里布無職事者征夫家漆林之稅二十而五則弛力薄征當以農民為急而增賦竭作不使末業者獨幸而免也今二猶不足而用田賦是重困農民而削其本何以為國書曰用田賦用者不宜用也近世議弛商賈之征逹于時政者欲先省國用首寬農民後及商賈知春秋譏田賦之意矣夏五月甲辰孟子卒五月昭夫人孟子卒公羊氏曰孟子者昭公之夫人其稱孟子何諱娶同姓蓋吳女也愚按論語陳司敗問昭公知禮乎孔子曰知禮孔子退揖巫馬期而告之曰吾聞君子不黨君子亦黨乎君娶于吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸茍有過人必知之春秋常法凡書夫人薨葬必著其氏若著其氏則知其同姓而不可諱矣此孟子所以不書薨葬而深諱之也然魯事多因諱而後顯聖人對陳司敗以昭公為知禮而司敗因言昭公同姓之為不知禮春秋書孟子卒而不稱其氏讀者因知孟子歸昭公之為同姓觀知禮之對既足以見聖人尊君親上忠厚之心觀茍有過人必知之之語又可以見聖人無欺天下後世之意然則對司敗之言即作春秋之㫖也凡人所為一違于道雖以聖人為之掩覆回互而終不可諱也越禮亂倫者當知所以為戒云公㑹吳于槖臯吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之神明以要之寡君以為茍有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟秋公㑹衛侯宋皇瑗于鄖吳徵㑹于衛初衛殺吳行人且姚而懼謀于行人子羽子羽曰吳方無道無乃辱吾君不如止也子木曰吳方無道國無道必棄疾于人吳雖無道猶足以患衛往也長木之斃無不摽也國狗之瘈無不噬也而況大國乎秋衛侯㑹吳于鄖公及衛侯宋皇瑗盟而卒辭吳盟吳人藩衛侯之舍子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮于衛而藩其君舍以難之子盍見大宰乃請束錦以行語及衛故大宰嚭曰寡君願事衛君衛君之來也緩寡君懼故將止之子貢曰衛君之來必謀于其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衛君是墮黨而崇讐也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讐而懼諸侯或者難以霸乎大宰嚭說乃舍衛侯宋向巢帥師伐鄭宋鄭之閒有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕逹救嵒丙申圍宋師冬十有二月螽十有三年春鄭罕逹帥師取宋師于嵒宋向魋救其師鄭子賸使狥曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成歡郜延以六邑為虛謝氏曰宋師伐鄭屯于嵒鄭罕逹扼其師而陷之書宋師著其禍之大也鄭師不戒入宋雍丘而宋皇瑗取之宋師不戒入鄭嵒邑而鄭罕逹取之用兵寡謀則有至全師覆沒而不反者可不畏耶髙氏曰師出而不設僃者皆棄師之道故春秋著之以為伐國者之戒家氏曰春秋書取師誅取者之不仁以多殺為功也先書宋取鄭師于雍丘責宋也今書鄭取宋師于嵒責鄭也責在取師則兵端有不論也夏許男成卒公㑹晉侯及吳子于黃池夏公㑹單平公晉定公吳夫差于黃池秋七月辛丑盟吳晉爭先吳人曰于周室我為長晉人曰于姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎大子死乎且夷德輕不忍久請少待之乃先晉人吳人將以公見晉侯子服景伯對使者曰王合諸侯則伯帥侯牧以見于王伯合諸侯則侯帥子男以見于伯自王以下朝聘玉帛不同故敝邑之職貢于吳有豐于晉無不及焉以為伯也今諸侯㑹而君將以寡君見晉君則晉成為伯矣敝邑將改職貢魯賦于吳八百乘若為子男則將半邾以屬于吳而如邾以事晉且執事以伯召諸侯而以侯終之何利之有焉吳人乃止既而悔之將囚景伯景伯曰何也立後于魯矣將以二乘與六人從遲速唯命遂囚以還及户牖謂大宰曰魯將以十月上辛有事于上帝先王季辛而畢何世有職焉自襄以來未之改也若不㑹祝宗將曰吳實然且謂魯不共而執其賤者七人何損焉大宰嚭言于王曰無損于魯而祗為名不如歸之乃歸景伯公羊氏曰吳何以稱子主㑹也髙氏曰黃池之㑹不主晉侯而主吳子者晉侯不能主諸侯故也吳自柏舉之戰勢橫中國諸侯大小震栗皆宗于吳晉侯不見者二十四年此不能主諸侯可知也元年書齊侯衛侯伐晉見霸統之絶已受諸侯之伐故黃池之㑹吳子主焉不言公㑹吳子晉侯者不與夷狄主中國也不與夷狄主中國者存中國也故以晉侯及吳子為文稱吳之爵所以見中國之衰書晉之及所以抑夷狄之橫春秋謹嚴其義甚微故首止先及而后㑹所以尊王世子黃池先㑹而後及所以外吳子也謝氏曰鍾離柤向之㑹皆殊㑹吳者以中國主㑹也以中國主㑹是以殊㑹吳而外之黃池之㑹以晉及吳者以吳人主㑹也以吳人主㑹故先晉後吳而抑之此主㑹則外之彼主㑹則抑之聖人尊中國賤僣亂其心見于此矣胡氏曰定公以來晉失霸業不主夏盟夫差暴橫勢傾上國自稱周室于己為長蓋大伯之後以族屬言之則伯父也而黃池之㑹聖人書法如此訓後世治中國御四夷之道也明此義則知漢宣帝待單于位在諸王上蕭傅之議非矣唐髙祖稱臣于突厥倚以為助劉文靖之䇿失矣況于以父事之如石晉者將欲保國而免其侵暴可乎或曰苟不為此至于亡國則如之何曰存亡者天也得失者人也不可逆者理也以人勝天則事有在我者矣必若顛倒冠履而得天下其能一朝居乎故春秋撥亂反正之書不可以廢焉者也愚謂春秋之初隱桓之世周室雖衰天下猶知有王也北杏之㑹齊桓倡伯天下之事諸侯專之不復知有王矣至于㑹溫晉侯遂以諸侯召天王矣春秋之中晉霸奕世以攘僣亂為事天下猶知有中國也宋之㑹楚人如晉分主夏盟楚人爭先不知有中國矣至于黃池吳子主之晉魯皆聽命矣然則天下之壞齊晉吳楚壞之也三代盛時禮樂征伐自天子出未聞有霸主之權也中國四夷各安其分未聞有夷狄之橫也自齊晉既霸而王者之澤竭吳楚强盛而中國之勢微孔子為是而作春秋專以尊王而賤霸尊內而賤外然齊晉猶假尊周之名以行攘亂之事聖人以其雖有無王之罪終有攘亂之功故始也抑之中也進之終也與之矣然非聖人之得已也與之者所以救一時之亂抑之者所以杜萬世之亂也至于吳楚既有僭王之罪又有荐食之惡聖人所以終絶之而莫之與也此黃池之㑹所以序晉吳上而書及以終春秋之盟㑹也歟革霸從王正春秋之所以望于後世居中御外又春秋之所以望于後王也知此則知春秋所作雖終于獲麟實終于黃池之㑹也楚公子申帥師伐陳於越入吳十一年吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諫曰越在我心腹之疾也壤地同而有欲于我夫其柔服求濟其欲也不如早從事焉得志于齊猶獲石田也無所用之越不為沼吳其泯矣使醫除疾而曰必遺類焉未之有也盤庚之誥曰其有顛越不共則劓殄無遺育無俾易種于兹邑是商所以興也今君易之將以求大不亦難乎弗聽使于齊屬其子于鮑氏為王孫氏反役王聞之使賜之屬鏤以死將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也至是越子伐吳為二隧疇無餘謳陽自南方先及郊吳大子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也大子曰戰而不克將亡國請待之彌庸不可屬徒三千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗吳師獲大子友王孫彌庸夀於姚丁亥入吳吳人告敗于王王惡其聞也自剄七人于幕下冬吳及越平髙氏曰吳方為黃池之㑹爭權上國而於越又乘其無僃而入之自是吳不復振而越亦僭號稱王遂入于中國而天下相安于僣亂不復知有周室矣原周之衰自幽厲失道三綱紊亂而禮樂征伐猶自出于天子諸侯尚不敢肆也及平王東遷王室不競諸侯國自為政周道凌遲夷于列國逮隱之世習以成俗而楚遂潛竊王號無所忌憚然而文武成康之德猶在民未忘周也故齊桓晉文相繼而起莫不秉大義以攘僣竊而尊王室其盟㑹征伐必以王命為首諸侯順之者存逆之者亡世雖無王而法猶立故春秋推王法以繩之以天下猶知有周也及定哀以來齊晉既衰政出于大夫吳楚橫行于中國以勢相吞滅自於越入吳之後吳楚又衰天下愈亂禮義無所復施政刑無所復加諸侯習于凶亂不可告語靡然入于戰國不復知有周而皆稱王矣胡氏曰夫以力勝人者人亦以力勝之矣吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣吳侵中國而越滅之越又不鑒而楚滅之楚又不鑒而秦滅之秦又不鑒而漢滅之春秋初書於越入吳在柏舉之後再書於越入吳在黃池之後皆因事屬辭垂戒後世不待貶絶而見深切著明之義也而可廢乎秋公至自㑹晉魏曼多帥師侵衛家氏曰此春秋霸國侵伐之終事也晉之盛威令行于天下不待加兵而人知服從今其衰也趙鞅魏曼多更迭用兵侵伐小國數修怨于衛衛卒不服豈其力之不足耶鞅多志不在于求諸侯霸中國志于怙權自私而已矣春秋書黃池之㑹繼以楚伐陳於越入吳閔夏盟之無主僣亂迭興周室日微桓文之功遂熄天下日趨于亂是故于鞅多之用師深注意焉葬許元公九月螽冬十有一月有星孛于東方公羊氏曰其言于東方何見于旦也何以書記異也家氏曰平旦衆星皆沒孛乃見孛彗也邪惡之氣鍾而為彗彗者掃故置新之象前此入于北斗孛于大辰見以夜也今書孛于東方天欲旦太陽將升而孛見焉太陽升于東孛見于東妖星干太陽駭常之變也春秋降而戰國世道至此大變七國並興而天下遂為秦矣盜殺陳夏區夫髙氏曰凡書盜者以人皆可得而執之也盜殺蔡侯申盜殺陳夏區夫當春秋之季世變之甚至于盜興而專殺國君卿大夫則亂已極矣十有二月螽許氏曰自用田賦而比年三書螽貪殘無已之應也十有四年春西狩獲麟西狩于大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之公羊氏曰麟仁獸也有王者則至無王者則不至程子曰始隱周之衰也終麟感之始也世衰道不行有述作之意舊矣但因麟而發耳麟不出春秋亦須作也愚謂因獲麟而作春秋故春秋止于獲麟麟為聖人出也世有聖人而麟出理之常也麟出而見獲聖人不得位之象理之變也聖人因麟出而見獲知其道之終不行也于是取其欲為治于當世者垂之萬世此春秋所由作也雖然鳯鳥不至河不出圖吾已矣夫之嘆夫子固已知其道之不行未欲恝然忘于斯世故為之兆也至于麟出而見獲則知其道之決不可行也于是無復有望于斯世矣此聖人可以行則行可以止則止所以為聖之時也鳴呼聖人之出處關世運之盛衰天不欲用聖人于一時者乃所以用于萬世也歟春秋闕疑卷四十五
