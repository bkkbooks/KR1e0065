body:
  text: 十一世伯祖子美公學者稱師山先生當元之末著春秋闕疑四十五卷稿藏於家未經授梓四方學者雖知有其書以無板本購鈔不易始余求得稿本中闕者十三卷未為全書既而族孫經學以其父旼所藏全本來歸蓋嘉靖中宗人獻文所手録者得之喜不自勝思廣其傳因急付之削氏念是書之成已三百餘年展轉收藏皆在族人之所幸未至於零落則先公精神所寄必嘿庇其間而宗人後先鈔傳䕶惜之功俱有不可没者刻成爰識其歲月大端如此若夫先公致命大節則具於元史生平行履之詳則見於同郡汪環谷先生所為狀中可無贅云康熙辛卯秋九月歙鄭肇新謹識
