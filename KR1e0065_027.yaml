body:
  text: 春秋闕疑卷二十七元鄭玉撰十有三年春晉侯使郤錡來乞師十一年秦晉為成將會于令狐晉侯先至焉秦伯不肯涉河次于王城使史顆盟晉侯于河東郤犨盟秦伯于河西范文子曰是盟也何益齊盟所以質信會所信之始也始之不從其何質乎秦伯歸而背晉成至是晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為穀梁氏曰乞重辭也髙氏曰自齊桓以來霸者征伐召兵諸侯蓋以是為王者事故與天下公之至於晉景始使士燮來聘以濟伐郯之役厲公承之始乞師霸體貶矣胡氏曰聖人作春秋無不重內而輕外至於乞師則內外同辭者蓋皆有報怨復讐貪得之心是以如此若夫誅亂臣討賊子請於天王以大義驅之誰不拱手以聽命何至於乞哉噫此聖人所以垂戒後世見諸行事之深切著明者矣師氏曰九年秦嘗與白狄伐晉今晉欲伐秦以報之將糾合諸侯以同其力慮諸侯有厭心而未必遣師故使郤錡卑辭盡禮以乞為言不憚自屈而未可必之意也陳氏曰外乞師不書必盟主也而後書乞卑辭也見晉之無以令與國矣三月公如京師夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦三月公如京師公及諸侯朝王遂從劉康公成肅公會晉侯伐秦成子受脤於社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反乎夏四月戊午晉侯使吕相絶秦曰昔逮我獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如秦無祿獻公即世穆公不忘舊德俾我惠公用能奉祀於晉又不能成大勳而為韓之師亦悔於厥心用集我文公是穆之成也文公躬擐甲胄跋履山川踰越險阻征東之諸侯虞夏商周之胤而朝諸秦則亦既報舊德矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭秦大夫不詢於我寡君擅及鄭盟諸侯疾之將致命於秦文公恐懼綏靜諸侯秦師克還無害則是我有大造於西也無祿文公即世穆為不弔蔑死我君寡我襄公迭我殽地姦絶我好伐我保城殄滅我費滑散離我兄弟撓亂我同盟傾覆我國家我襄公未忘君之舊勳而懼社稷之隕是以有殽之師猶願赦罪於穆公穆公弗聽而即楚謀我天誘其衷成王隕命穆公是以不克逞志于我穆襄即世康靈即位康公我之自出又欲闕剪我公室傾覆我社稷帥我蟊賊以來蕩搖我邉疆我是以有令狐之役康猶不悛入我河曲伐我涑川俘我王官剪我羈馬我是以有河曲之戰東道之不通則是康公絶我好也及君之嗣也我君景公引領西望曰庶撫我乎君亦不惠稱盟利我有狄難入我河縣焚我箕郜芟夷我農功虔劉我邉陲我是以有輔氏之聚君亦悔禍之延而欲徼福于先君獻穆使伯車來命我景公曰吾與女同好棄惡復修舊德以追念前勳言誓未絶景公即世我寡君是以有令狐之會君又不祥背棄盟誓白狄及君同州君之仇讐而我之婚姻也君來賜命曰吾與女伐狄寡君不敢顧婚姻畏君之威而受命于吏君有二心于狄曰晉將伐女狄應且憎是用告我楚人惡君之二三其德也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王曰余雖與晉出入余唯利是視不穀惡其無成德是用宣之以懲不一諸侯備聞此言斯是用痛心疾首䁥就寡人寡人帥以聽命唯好是求君欲惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退豈敢徼亂君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦于晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒針為右孟獻子曰晉帥乘和師必有大功五月丁亥晉侯以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父程子曰不書朝王因會伐而行也故不成其朝又以伐秦為遂事明朝為重髙氏曰公如京師専行之辭也然公之此行蓋會晉伐秦道出王畿不得不朝也其以専行之辭書之何也舉其可道焉者志敬也然上書晉來乞師下書公自京師遂會諸侯伐秦則是挾他事以往而非専行者矣乃志其不敬也蓋聖人于魯乃父母之國有君臣之義特遷就而為之辭故直以如京師為文先明君臣之大義若専以朝事言者而不言朝王以著實因會伐而行不成乎朝也其辭若志敬實志不敬此春秋微辭也主人習其讀而問其傳則以謂公如京師固美志也而不知春秋以是譏之胡氏曰古者諸侯即位服喪畢則朝小聘大聘終則朝巡狩于方嶽則朝觀春秋所載天王遣使者屢矣十二公之述職蓋闕如也獨此年書公如京師又不成朝禮不敬莫大焉君臣人道之大倫而至于此極仲尼所為懼春秋所以作也謝氏曰公子遂之聘也書如京師而不書聘以其遂如晉非専于聘也成公之朝也書如京師而不書朝以其遂會伐秦不専于朝也以朝聘王室為名而其終繼以遂事則魯無朝聘之實于此見矣伐秦書遂著其惡也師氏曰不謂之朝不以諸侯事天子之禮行均謂之如蓋與列國之禮同京師列國視為等夷失禮甚矣張氏曰春秋以諸侯事周之禮久闕而因行于伐秦之役若沒而不書是以廢其僅存之禮若書以為朝則是舉百年之墜典亦非其實故書如京師而不言朝以見其行禮之不専書自京師會諸侯伐秦以見諸侯之行止為伐秦而不為京師也髙郵孫氏曰不言遂如京師而言遂會諸侯者蓋聖人之意以謂成公之如京師非其誠心法當罪之春秋萬世君臣之法不以成公非禮而遂亂之也必曰如京師然後會諸侯則成公之罪無所逃而君臣之法愈久愈正也陳氏曰自狄秦以來秦晉之相加兵皆略之是故戰于麻隧秦師敗績但書伐秦戰于櫟晉師敗績不書伐晉以為不足詳焉爾曹伯盧卒于師曹宣公卒于師師遂濟涇及侯麗而還迓晉侯于新楚成肅公卒于瑕穀梁氏曰公大夫在師曰師在會曰會髙郵孫氏曰諸侯之卒不地有常地也其有會盟侵伐而卒者必謹志之所以見卒非其常而國家危殆也秋七月公至自伐秦泰山孫氏曰不以京師至者明夲非朝京師愚謂上書公如京師明春秋以朝王為重使不違于禮而世道有所防此書公至自伐秦明諸侯為伐秦而出使不失其實而後人有所考蓋上句乃聖人之特筆下句乃魯史之舊文也冬葬曹宣公曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其大子而自立也諸侯乃請討之晉人以其役之勞請俟他年冬葬曹宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑十有四年春王正月莒子朱卒愚按莒不書葬其義未詳徐邈謂莒行夷禮其君無諡故從吳楚例不書葬豈其然乎夏衛孫林父自晉歸于衛衛侯如晉晉侯強見孫林父焉定公不可夏衛侯既歸晉侯使郤犨送孫林父而見之衛侯欲辭定薑不可曰是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈于亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之許氏曰人臣不唯義之即安而介恃大國使之反已此能為逐君之惡者也唯其辨之不早是以衛獻至於出奔禍兆此矣歸易辭自晉奉之故也泰山孫氏曰衛大夫由晉侯而得歸則衛國之事可知也謝氏曰書自晉罪晉之容惡也書歸衛罪衛之失刑也若蔡季書歸所以正法林父書歸所以著亂家氏曰臣抰大國之援以干其君君以大國之故而忌其臣下陵而上忌亂之道也張氏曰此非特罪衛之不早辨晉之政在大夫亦自此矣秋叔孫僑如如齊逆女鄭公子喜帥師伐許鄭子罕伐許敗焉鄭伯復伐許入其郛許人平以叔申之封髙氏曰此著許之所以遷亦見晉厲之不霸也夫許鄭之怨久矣三年再伐四年伐九年圍之而今又伐焉使厲公而霸鄭人怒鄰兼弱敢如是乎明年遷于葉避鄭以依楚明晉不足恃也九月僑如以夫人婦薑氏至自齊穀梁氏曰大夫不以夫人以夫人非正也刺不親迎也胡氏曰娶于他邦道里或逺必親迎乎以封壤則有大小以爵次則有尊卑以道途則有逺近或迎之于其國或迎之于境上或迎之于所館中禮之節可也髙氏曰成公得以宣公元年公子遂之例藉口而行之也然則人君所以貽子孫者可不慎乎冬十月庚寅衛侯臧卒衛侯有疾使孔成子寧惠子立敬姒之子衎以為大子冬十月衛定公卒夫人薑氏既哭而息見大子之不哀也不內酌飲嘆曰是夫也將不唯衛國之敗其必始于未亡人嗚呼天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器于衛盡置于戚而甚善晉大夫秦伯卒十有五年春王二月葬衛定公三月乙巳仲嬰齊卒胡氏曰嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也于是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非禮矣癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師春會于戚討曹成公也執而歸諸京師諸侯將見子臧于王而立之子臧辭曰前志有之曰聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋蘇氏曰稱侯以執執有罪也歸之于京師禮也春秋之書執諸侯者多矣惟是為得禮謝氏曰去逆治亂以正大義聽命王室以正天刑得侯伯討罪之道矣凡諸侯無罪見執皆不名以其義不當絶也成公執得其罪亦不名者明厲公以貶絶之罪聽命于王所以善厲公也張氏曰先執曹伯以會諸侯然後盟之乃盡善也觀曹人請君于晉曰若有罪則君列諸會矣夫一舉措之不當遂開釋姦之門此豈小失哉或者謂負芻殺大子而自立于經無所見疑晉人之執不當其罪愚按世子之死豈曹人以亂故不暇赴告故魯史不書聖人懼其迹之泯也幸有戚會之執故詳書之以著其罪使亂臣賊子不得幸免然則殺大子而不書者魯史之闕文執曺伯而詳書者聖人之微意讀春秋者可不致察于隱微之間而求其旨意之所歸乎公至自會夏六月宋公固卒楚子伐鄭楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰薛氏曰楚伐鄭何鄭服于晉也東萊吕氏曰鄭逼許困楚鄭以國大小兵力強弱更相吞噬中外一道而人理盡矣秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚秋八月葬宋共公于是華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇鱗朱為少司寇向帶為大宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣官不能治敢賴寵乎乃出奔晉二華戴族也司城莊族也六官者皆桓族也魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師茍獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀于宋也右師討猶有戌在桓氏雖亡必偏魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山魚石向為人鱗朱向帶魚府出舍于睢上華元使止之不可冬十月華元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之則決睢澨閉門登陴矣左師二司寇二宰遂出奔楚華元使向戌為左師老佐為司馬樂裔為司寇以靖國人髙氏曰再書華元善華元也蓋元之志非奔也欲挾晉自重以攻蕩氏之黨爾孔氏曰書之重辭之復其中必有美惡焉不可不察陳氏曰殺稱國有司法守之辭也左氏曰書宋殺其大夫山言背其族也程子曰山去族害公族也蘇氏曰元將討山知力之不能故奔晉而國人許之討故歸故其討山也雖其族人莫敢救之者書曰宋華元出奔晉宋華元自晉歸于宋言其出入之正是以能討山也使元懷祿固寵重于出奔則不能討山矣常山劉氏曰蕩山宋公族也乘君之喪作亂以弱公室殺世子肥是背其族也背其族者伐其夲也故去族以示法陳氏曰于是魚石向為人鱗朱向帶魚府出奔楚則其但書魚石何凡奔必有罪也衆不可以勝罪則罪其甚焉者爾以楚師伐宗國入彭城為宋患之日久是以甚魚石也家氏曰左氏謂華元行未及晉魚石追而復之討為亂者故桓氏殺蕩山逐其黨國乃定何氏謂宋公卒子幼華元以憂國之故為大夫山所譖出奔晉晉人理其罪宋人反華元誅山觀經書華元奔晉自晉而復何氏之説為正冬十有一月叔孫僑如會晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離始通吳也公羊氏曰殊會吳外吳也春秋內諸夏而外夷狄高氏曰吳未嘗與中國會今始來通是時中國病楚而吳敢與之敵故諸侯亦欲與吳通晉于是為合諸國之大夫以會之然諸國大夫不敢致吳子也因吳子伐楚在鍾離故相與會之程子曰吳益強大求會于諸侯諸侯之衆往而從之故諸國往與之會以見南蠻盛而中國衰也胡氏曰殊會有二義會王世子于首止意在尊王室不敢與世子抗也會吳于鍾離于柤于向意在外吳人而罪諸侯不能與之敵也夫以太伯至德是始有吳以族言之則周之伯父也至其後世遂以號舉者以其僭竊稱王不能居中國之爵號而成襄之間中國無霸齊晉大國亦皆俯首東向而親吳聖人蓋傷之故特殊會可謂深切著明矣朴鄉吕氏曰蘇氏謂勾吳未嘗與中國會晉為之合諸侯而會之特書曰會吳于鍾離以吳為會也蓋戚之會乃諸侯會而吳人來會故序吳于諸侯之下鍾離之會乃吳求中國而晉欲會吳故特以會吳為文然則曷為不與會首止之文同義首止之文曰公及齊侯會王世子于首止若世子在此而諸侯往會之然尊世子也會吳之文曰叔孫僑如會晉士燮會吳于鍾離是其會晉士燮也為會吳爾愚按春秋雖美惡不嫌同辭然聖人亦必有微意寓於其間首止之會書及書會見公及諸侯同往會之如臣朝君使諸侯不得以干世子鍾離之會書會又書會若諸侯外吳不與同會故再書會使吳人不得以亂中國此則聖人微意不可不察許遷于葉許靈公畏逼于鄭請遷于楚辛丑楚公子申遷許于葉髙氏曰畏鄭而南依楚故以自遷為文而鄭人之罪著矣陳氏曰楚公子申遷許于葉其曰許遷于葉何以其從夷狄雖楚遷之猶自遷也家氏曰春秋中年以後陳蔡與許専意從楚彼謂夷可恃以存而不知非我之類其心實異卒之陳蔡為楚所滅許四遷自葉而白羽實楚人迫而遷之已而又遷容城遂為鄭滅棄中國而從夷狄許陳蔡自有以取焉十有六年春王正月雨木氷公羊氏曰雨著木而氷也何以書記異也髙氏曰雨著木而成氷是上溫而下寒也與隕霜不殺菽相反夏四月辛未滕子卒鄭公子喜帥師侵宋春楚子自武城使公子成以汝隂之田求成于鄭鄭叛晉子駟從楚子盟于武城鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍于夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也衛侯伐鄭至于鳴鴈為晉故也髙氏曰楚求成于鄭鄭服中國五年矣至是始叛晉附楚加兵中國諸侯之兵無寧歲矣六月丙寅朔日有食之晉侯使欒黶來乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績楚殺其大夫公子側晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若惟鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之郤錡將上軍荀偃佐之韓厥將下軍郤至佐新軍荀罃居守郤犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣戊寅晉師起鄭人聞有晉師使告于楚姚句耳與往楚子救鄭司馬將中軍令尹將左右尹子辛將右過申子反入見申叔時曰師其何如對曰德刑詳義禮信戰之器也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正用利而事節時順而物成上下和睦周旋不逆求無不具各知其極故詩曰立我蒸民莫匪爾極是以神降之福時無災害民生敦龎和同以聽莫不盡力以從上命致死以補其闕此戰之所由克也今楚內棄其民而外絶其好瀆齊盟而食話言姦時以動而疲民以逞民不知信進退罪也人恤所底其誰致死子其勉之吾不復見子矣姚句耳先歸子駟問焉對曰其行速過險而不整速則失志不整喪列志失列喪將何以戰楚懼不可用也五月晉師濟河聞楚師將去范文子欲反曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之耻也子亦見先君之事矣今吾辟楚又益耻也文子曰吾先君之亟戰也有故秦狄齊楚皆強不盡力子孫將弱今三強則服矣敵楚而已唯聖人能內外無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳軍吏患之范丐趨進曰塞井夷竈陳于軍中而疏行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂合而加囂各顧其舊莫有鬭心舊必不良以犯天忌我必克之楚子登巢車以望晉軍子重使大宰伯州犂侍于王後王曰騁而左右何也曰召軍吏也皆聚于中軍矣曰合謀也張幕矣曰虔卜于先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也皆乘矣左右執兵而下矣曰聽誓也戰乎曰未可知也乘而左右皆下矣曰戰禱也伯州犂以公卒告王苖賁皇在晉侯之側亦以王卒告皆曰國士在且厚不可當也苖賁皇言于晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃于王卒必大敗之公筮之史曰吉其卦遇復曰南國蹙射其元王中厥目國蹙王傷不敗何待公從之有淖于前乃皆左右相違于淖步毅御晉厲公欒針為右彭名御楚共王潘黨為右石首御鄭成公唐茍為右欒范以其族夾公行陷于淖欒書將載晉侯針曰書退國有大任焉得専之且侵官冒也失官慢也離局姦也有三罪焉不可犯也乃掀公以出于淖癸巳潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣如此何憂于戰王怒曰大辱國詰朝爾射死藝吕錡夢射月中之退入于泥占之曰姬姓日也異姓月也必楚王也射而中之退入于泥亦必死矣及戰射共王中目王召養由基與之兩矢使射吕錡中項伏韜以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗注君子也識見不穀而趨無乃傷乎郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間蒙甲胄不敢拜命敢告不寧君命之辱為事之故敢肅使者三肅使者而退晉韓厥從鄭伯其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止郤至從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下郤至曰傷國君有刑亦止石首曰衛懿公唯不去其旗是以敗于熒乃內旌于韜中唐茍謂石首曰子在君側敗者一大我不如子子當以君免我請止乃死楚師薄于險叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷欒針見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使于楚也子重問晉國之勇臣對曰好以衆整曰又何如臣對曰好以暇今兩國治戎行人不使不可謂整臨事而食言不可謂暇請攝飲焉公許之使行人執榼承飲造于子重曰寡君乏使使針御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言于楚必是故也不亦識乎受而飲之免使者而復鼓旦而戰見星未巳子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苖賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之召子反謀穀陽竪獻飲于子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀范文子立于戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰唯命不于常有德之謂晉侯使郤至獻楚捷于周楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒范文子反自鄢陵使其祝宗祈死曰君驕侈而克敵是天益其疾也難將作矣愛我者惟祝我使我速死無及于難范氏之福也謝氏曰鄢陵之戰楚師輕窕而鄭成恃楚敵晉故楚子鄭師敗績楚子傷目而退故敗不言師舉重也鄭伯反覆違盟叛晉即楚其罪在所討矣厲公不能明大義以行伐務以攻戰為心故以晉侯主戰胡氏曰當是時兩軍相抗未有勝負之形晉之捷也亦幸焉爾楚師雖敗其勢益張晉遂怠矣卒有欒氏之譛而誅三郤國內大亂聖人備書以見行事之深切著明也小東萊吕氏曰鄢陵之戰以兵家曲直論之楚新與晉盟而背之用師是晉直楚曲勝敗之勢顯然可見晉元帥憤然興師却欲討楚獨范文子不欲戰曰若逞吾願諸侯皆叛晉可以逞及臨陳又曰惟聖人能內外無患自非聖人外寧必有內憂欒書之徒徒能外觀晉楚之曲直不能內察其君之昏明惟知背盟棄好討之必勝不知厲公驕縱遂致滅亡大抵天下之事有當作而不作惟知義之君子能隨時輕重權衡隆殺而不失其宜今以一時之事觀之如射共王中目見楚之大敗晉師三日館穀見晉之大勝然楚大敗之後君臣戒懼兢兢守國終始保全厲公一勝之後殺郤錡郤犨郤至又欲殺欒書中行偃君臣相賊文子雖見之明憂之深立于戎馬之前而言之其拳拳之忠懇懇之意可謂深切而終不救厲公之驕至使祝宗祈死但以不及見禍為幸文子之志固亦可哀矣然亦有可責者蓋文子雖有區區之意養未充于已信未孚于人威望不足以壓羣臣是以終無所濟處于衆邪之間事窮計迫徒欲避禍而死耳使其加之講學而無憤爭之禍必將見幾而作或出或處不至于臨事徒欲速死也有志之士規模狹小者可不戒哉家氏曰是時楚共叛盟空國以出俾鄭人侵宋以致晉師晉若不出宋將無以自存楚師長驅而來晉衛諸國皆從風而靡中國之存亡安危未可知也故鄢陵一勝關係甚重而晉厲公者量褊不𢎞志得旋驕反以是速其死良可惜夫嗚呼城濮之戰文公勝而益懼懼而增修其德故以是霸鄢陵之戰厲公勝而益驕驕而務逞其志故以是亡觀乎百年二大戰或以之興或以之亡有國家者知所警矣秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公戰之日齊國佐髙無咎至于師衛侯出于衛公出于壞隤宣伯通于穆薑欲去季孟而取其室將行穆薑送公而使逐二子公以晉難告曰請反而聽命薑怒公子偃公子鉏趨過指之曰女不可是皆君也公待于壞隤申宫警備設守而後行是以後使孟獻子守于公宫秋會于沙隨謀伐鄭也宣伯使告郤犨曰魯侯待于壞隤以待勝者郤犨將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公于晉侯晉侯不見公髙氏曰鄢陵之戰晉獨敗之諸侯之師皆未至蓋非特魯而已胡氏曰臣子之于君父揚其美不揚其惡為尊者諱為親者諱禮也聖人假魯史以示王法其于魯事有君臣之義故臣弒君則書薨易地則書假滅國則書取出奔則書遜屈已以與強國之大夫盟則書及叛盟失信而莫適守則沒公而書會凡此類雖不沒其實示天下之公必隱避其辭以存臣子之禮然則沙隨之會晉不見公是魯侯之大辱深可耻焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪榮義不榮勢正已而無恤乎人以仁禮存心而不憂橫逆之至者也沙隨之至魯有內難師出後期所當恤者晉人聽叔孫僑如之譛怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎也于公何歉乎公至自會公會尹子晉侯齊國佐邾人伐鄭七月公會尹武公及諸侯伐鄭將行薑又命公如初公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食于鄭郊師逆以至聲伯四日不食以待之食使者而後食諸侯遷于制田知武子佐下軍諸侯之師侵陳至于鳴鹿遂侵蔡未反諸侯遷于潁上戊午鄭子罕宵軍之宋齊衛皆失軍髙氏曰楚師既敗而鄭猶不服見晉政之不懌于人矣陳氏曰會伐未有書王人者此其書尹子初以王卿士與伐也陽處父之救江也王叔桓公不書雖前年伐秦之役劉子成子猶不書也于是厲公恣矣初以尹子與齊國佐邾人序甚矣厲公之無道也家氏曰尹子單子三以伐鄭出皆與諸侯序譏晉人數勤天子之老輕用王師亦譏王朝公卿不當為霸討而數出也曹伯歸自京師曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸會矣君唯不遺德刑以霸諸侯豈獨遺諸敝邑敢私布之曹人復請于晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出謝氏曰成公身負不可容之大罪晉侯執歸京師方伯之義也天王不加大刑使之復國失順天討逆之道矣故曹伯之歸也爵而不書以明天王不絶其位也書自京師以明天王釋亂容逆也蔡季賴陳以歸衛侯賴楚以歸故蔡書自陳歸蔡衛書自楚歸衛曹伯非有所賴也天王赦之而已故曹書歸自京師曹伯雖在京師王不加絶非失國也故書伯歸不書國胡氏曰善不蒙賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也負芻殺世子而自立不能因晉之執置諸刑典而使復國則無以為天下之共主矣愚謂節者制其事宜使之不失乎中者也故于禮曰莭文于財曰莭用于行曰莭義于軍曰莭制而事之合宜者謂之中莭聖人之贊易于莭之彖曰天地莭而四時成于莭之象曰君子以制數度議德行聖逹莭則自然而合乎此賢守莭則固執而不敢失乎此也夫豈拘拘謭謭循常守故若子臧之為而後謂之莭哉子臧之于莭猶尾生白公之于信也豈惟不能制亂適以生亂耳蓋由其資質雖美而不知學故其見道未明擇義未精以至于此按曹伯廬卒于師公子負芻殺大子而自立子臧曹之鎮國賢公子所宜上告天王下告方伯如孔子之沐浴而朝顧乃舍此不舉已為失莭及諸侯執負芻歸之京師將見子臧于王而立之使子臧從諸侯之請鎮撫其民以安社稷則罪人斯得負芻自然無所逃于其誅猶未晚也而乃區區守匹夫之末莭出而奔宋坐視宗國禍亂養之以至于成然後復國以待負芻之歸然則使負芻幸免復君曹國三綱五常為之掃地是果誰之罪哉聖人書曹伯歸自京師固可以見天王之釋有罪亦可以見曹國之無人矣九月晉人執季孫行父舍之于苕丘宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令于是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志于魯請止行父而殺之我斃蔑矣而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季孫文子于苕丘某氏曰此晉之惡也故貶而人之謝氏曰行父吾國股肱之臣也執而舍之苕丘幽之使不得通也公之會沙隨也晉侯不見公公之會伐鄭也晉人執行父魯以一出師後期君則黜而不得進卿則閉而不得通晉之逼辱魯國甚矣書不見書執書舍纍其惡而罪之冬十月乙亥叔孫僑如出奔齊公還待于鄆使子叔聲伯請季孫于晉郤犨曰茍去仲孫蔑而止季孫行父吾與子國親于公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讐亡而為讐治之何及郤犨曰吾為子請邑對曰嬰齊魯之常𨽻也敢介大國以求厚焉承寡君之命以請若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫于魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私謀國家不二圖其身不忘其君若虗所請是棄善人也子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊杜氏曰公未歸國命國人逐之十有二月乙丑季孫行父及晉郤犨盟于扈髙郵孫氏曰行父見執于苕丘于是始盟而釋之不書釋而書晉大夫與之盟則釋之可知矣公至自會髙氏曰沙隨之會既不見公伐鄭之會又不得與而國之宗卿于是見執公倣徨于外以求自明于晉僅能使僑如見逐季孫受盟而公免難焉方秋而出盡冬而歸始以伐鄭出會而不得與乎其事君辱臣執國之深耻也及公之歸不可以伐鄭至故託曰至自會以見其不果與伐鄭也乙酉刺公子偃十二月季孫及郤犨盟于扈歸刺公子偃召叔孫豹于齊而立之杜氏曰偃與鉏俱為薑所指而獨殺偃偃與謀陸氏曰偃直書刺者有罪不當赦也陳氏曰刺公子偃殺有罪之辭也公子買戍衛不卒戍刺之殺無罪之辭也十有七年春衛北宫括帥師侵鄭鄭子駟侵晉虛滑衛北宫括救晉侵鄭至于髙氏夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭夏五月鄭大子髠頑侯獳為質于楚楚公子成公子寅戌鄭公會尹武公單襄公及諸侯伐鄭自戲童至于曲洧師氏曰晉之伐鄭至于再三以天子一卿為未足乃使單子同尹子以行而鄭終不服昔齊桓之時鄭嘗不服齊伐之一再至洮之盟齊侯方盟諸侯而鄭伯自來乞盟暨晉文主盟陳嘗不服乃敗楚之後晉方會諸侯盟于踐土陳侯則自來如會此無他齊桓晉文先有攘楚之威足以服陳鄭之心故二國之君所以不敢從楚而來乞盟如會皆出于自然不可後也與今晉侯之伐鄭豈不萬萬相逺乎書之用見天王與盟主皆無足畏矣六月乙酉同盟于柯陵尋戚之盟也楚子重救鄭師于首止諸侯還陸氏曰不重言諸侯譏尹子單子與盟尊周也柯盟之會尹子單子始與諸侯之盟自是習以為常非禮也陳氏曰書同盟其尹子之盟歟抑厲公之盟歟莫適為主之辭也薛氏曰前此征伐未嘗出王官也未嘗盟卿士也去年王官出今年卿士盟三伐鄭而鄭不至無益于事徒以為亂而已尹單俱會于外王政之不一也秋公至自會齊髙無咎出奔莒齊慶克通于聲孟子與婦人蒙衣乘輦而入于閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以會髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛齊人來召鮑國而立之許氏曰齊靈不公其聽自沈帷牆奔其世臣以長禍亂九月辛丑用郊公羊氏曰用者不宜用也九月非所用郊也髙氏曰魯自每歲僭郊之後聖人以為常事不書也其書之者或因卜不從或因牛傷死有變則書耳今無他變故而書之者以其自出己意非時之郊而不知卜遂不疑而用之是無天也其不宜用未有甚于此者故特書用愚謂僭者亂之階也魯託以成王之賜僣用郊禘之禮末流之弊至于作兩觀乘大輅車服器用一與天子無異其僣竊之罪奚以賢于吳楚之君哉然則天子之事魯僣其器吳楚僣其名其為僣王則一也當時不知罪者以為成王之命故也及春秋之作也夫子又魯人凡魯之惡必須為尊者諱又不得而加貶斥焉寧無微意寓于其間乎蓋讀者未之察耳夫郊禘既以為常事而不勝書失禮之中又失禮焉則書之自僖三十一年至成十年皆不成郊聖人無以寓其意至十七年九月辛丑郊乃始書曰用郊以見其譏焉用者不宜用也蓋以諸侯而用天子之禮也用之一字所以誅其僣王之罪乎至定十五年哀元年只書郊而不書用者從同同也嗚呼魯君僣用天子禮樂季氏遂舞八佾三家以雍徹陪臣執國命徒啓臣下僣竊以危其國以滅其身至于孫齊入于陽州寓于乾侯死于境外雖有天子儀衛亦何以震讋姦臣之心而保全魯君之身哉後世不安分義而僣竊名器者亦可以為戒矣晉侯使荀罃來乞師師氏曰晉請命于天子主單子而受其節制是宜糾合諸侯之師同心協力以尊王命奉辭以往無敢或後可也乃使大夫乞師于魯耶以盟主而乞師已為屈辱况奉天子之辭以伐有罪以王卿主伐乃言乞師其卑王室以寵諸侯也甚矣夫欲仗天子之威靈以討叛伐二而乃先為此卑辱欲望鄭畏威得乎冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭諸侯伐鄭十月庚午圍鄭楚公子申救鄭師于汝上十一月諸侯還謝氏曰以蕞爾之鄭晉以王命三合諸侯出伐而不能服以強楚為之援也鄭大子為質于楚楚公子成戍鄭夏之伐鄭楚子重師于首止而諸侯還冬之伐鄭楚公子申師于汝上而諸侯還然則諸侯伐鄭不若先楚之為利也能若齊桓修政事輯人民和邦國以王命伐楚而攘之則鄭不待干戈及境而求服矣諸侯比年伐鄭秋起兵冬而息夏起兵秋而息冬起兵十有一月而息內外疲苦甚矣孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內也十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤臨江劉氏曰十一月無壬申其以壬申卒之何春秋故史也有所不革子曰其事則齊桓晉文其文則史其義則某竊取之矣蘇氏曰嬰齊從于伐鄭還而道卒大夫卒不地其地在外也十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犨郤至晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖于厲公郤錡奪夷陽五田五亦嬖于厲公郤犨與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖于厲公欒書怨郤至以其不從已而敗楚師也欲廢之使公子蔑告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人張孟奪之郤至射而殺之公曰季子欺余厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失茲三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉壬申胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結袵而偽訟者三郤將謀于榭矯以戈殺駒伯苦成叔于其位溫季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃于朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄公使辭于二子曰寡人有討于郤氏郤氏既伏其罪矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣于死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊于匠麗氏欒書中行偃遂執公焉召士丐士丐辭召韓厥韓厥辭曰昔吾蓄于趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也泰山孫氏曰君之卿佐是謂股肱厲公不道一日而殺三卿此自禍之道也誰與處矣故列數之以著其惡張氏曰春秋罪厲公之殺三卿而卒于自及其示後世御臣之法至矣家氏曰三郤晉之能臣嘗有功于其國其臨敵慮勝晉諸卿未有能出其右者藉其有罪猶當在議功議能之科今以左右之浸潤殺之并及其族厲之強暴抑亦甚矣欲無亡得乎楚人滅舒庸舒庸人以楚師之敗也道吳人圍巢伐駕圍釐虺遂恃吳而不設備楚公子槖師襲舒庸滅之薛氏曰舒庸舒蓼舒鳩之滅荆舒一于楚矣十有八年春王正月晉殺其大夫胥童髙氏曰胥童謀殺三郤而晉國遂亂于是欒書中行偃先殺胥童然後弒厲公或曰宋督殺孔父而弒殤公春秋書曰及其大夫孔父書偃殺胥童而弒厲公而書晉殺其大夫胥童何哉孔父忠于殤公者也胥童嬖于厲公者也嬖臣道君為不道亡其君以及其身故春秋兩治之以為萬世戒庚申晉弒其君州蒲正月庚申晉欒書中行偃使程滑弒厲公葬之于翼東門之外以車一乘使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不唯命是聽庚午盟而入館于伯子同氏辛巳朝于武宫逐不臣者七人二月乙酉朔晉悼公即位于朝始命百官施舍已責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾莭器用時用民欲無犯時使魏相士魴趙武為卿荀家荀會欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為太傅使修范武子之法右行辛為司空使修士蒍之法辨糾御戎校正屬焉使訓諸御知義荀賔為右司士屬焉使訓勇力之士時使卿無共御立軍尉以攝之祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄鐸遏寇為上軍尉籍偃為之司馬使訓卒乘親以聽命程鄭為乘馬御六騶屬焉使訓羣騶知禮凡六官之長皆民譽也舉不失職官不易方爵不踰德師不陵正族不逼師民無謗言所以復霸也穀梁氏曰稱國以弒其君君惡甚矣謝氏曰厲公不道數誅大臣由此臣下離心身罹不測故弒稱國以明禍發于國也陳氏曰楚商臣殺鬭勃而後弒君晉欒書中行偃殺胥童而後弒君春秋不列于孔父以是為不能與其君存亡者也然則書晉殺胥童不書楚殺鬭勃何也書殺胥童以纍州蒲也不書殺鬭勃不以纍頵也州蒲稱國以殺而弒頵斥商臣二君所以異也愚按稱國以弒其義有二一則歸惡于遭弒之君一則歸罪于當國之臣晉弒其君蒲州此歸惡其君者也孟子曰無罪而殺士則大夫可以去又曰君之視臣如犬馬則臣視君如寇讐晉厲公欲盡去羣大夫而立其左右至于一朝而尸三卿又執欒書中行偃欲殺之宜其臣之凛凛不自保茍非有比干之操守死而不易有伊尹之德處變而不疑則必起而為亂以求自免矣厲公雖欲不死其可得乎且弒逆之賊其罪顯而易見遭弒之君其惡晦而難明故稱國以弒使人因書之法異知其所以得弒之由至于弒逆之賊則國史具載不待特書而罪惡著矣拔本塞源之意也使後世人君而知此所以御其臣下者不失其道則弒逆之禍庶幾乎息矣齊殺其大夫國佐十七年齊侯使崔杼為大夫慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以穀叛齊侯與之盟于徐關而復之十二月盧降使國勝告難于晉待命于清至是齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐于內宫之朝師逃于夫人之宫使清人殺國勝國弱來奔王湫奔萊慶封為大夫慶佐為司寇既齊侯反國弱使嗣國氏許氏曰慶克作慝濁亂中闈譛害大臣不誅不詰使國佐無所發其忠憤起而殺之顧與俱靡而已于是因以為國佐罪罪纍上矣張氏曰國佐仕危亂之朝不能見幾而去以邑叛君身死宫闈非不幸矣家氏曰齊靈公不能防間其母使之以淫亂著又受其母之譛而致高鮑于戮靈之不君甚矣而國佐不忍一旦之忿誅克據穀以抗其君専殺之罪猶可言據穀不得謂之非叛矣然原其本心則在于為其君正家法而施之無序以及于此是可憫也公如晉朝嗣君也愚按晉有弒君之賊而不之討鄰國諸侯不思聲罪致伐而魯君率先朝之烏在其為國也傳稱晉悼復霸之由斯所云云末矣夏楚子鄭伯伐宋宋魚石復入于彭城六月鄭伯侵宋及曹門外遂會楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乘戍之而還宋人患之西鉏吾曰何也若楚人與吾同惡以德于我吾固事之也不敢二矣大國無厭鄙我猶憾不然而收吾憎使贊其政以間吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼吳晉吾庸多矣非吾憂也且事晉何為晉必恤之七月宋老佐華喜圍彭城老佐卒焉臨江劉氏曰伐宋以納魚石則其不曰納宋魚石于彭城何不與納也諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也蘇氏曰公孫寧儀行父言納而魚石不言納蓋楚莊誅陳之罪人疑若無罪故書納以正其罪魚石之書復入而先言鄭之伐已著其納亂臣矣故不言自楚而特書復入髙郵孫氏曰魚石奔楚為楚卿道誘楚鄭以伐宋楚于是取宋彭城之邑復魚石于彭城明年華元與諸侯之大夫圍宋彭城已魚石復入而叛也然則魚石之仕宋嘗食邑于彭城十五年出奔楚于是藉楚取之而復入焉書曰復入明魚石之嘗有彭城也魚石入彭城而宋圍之則是入以叛也經不曰叛書楚鄭伐宋而魚石入魚石入而宋圍彭城不待書而義可見也公至自晉晉侯使士丐來聘公至自晉晉范宣子來聘且拜朝也許氏曰公朝始至而聘使紹至晉悼之下諸侯速矣此列國之所以睦而叛國之所服也髙氏曰在喪書晉侯與宣十年書齊侯同義秋杞伯來朝勞公且問晉故公以晉君語之杞伯于是驟朝于晉而請為昏八月邾子來朝即位而來見也築鹿囿髙郵孫氏曰春秋興作皆書雖城池之固門廄之急無遺焉重其德不及民而徒勞民力也况耳目之玩一身之娛哉己丑公薨于路寢冬楚人鄭人侵宋十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師于台谷以救宋遇楚師于靡角之谷楚師還髙氏曰晉侯救宋何為不書蓋未足為悼公烈也春秋之法存著小善者不足之辭也簡棄小善者有餘之辭也晉悼之烈在圍宋彭城絀楚而服鄭自楚鄭徵之而晉崇矣晉侯使士魴來乞師晉士魴來乞師季文子問師數于臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之許氏曰悼公之時霸業復興而乞師以救宋猶遵厲公故事元年以後遂無乞師則召兵而已矣愚謂成公初薨嗣子幼弱斬然在衰絰之中霸主遣使乞師豈無他國略不吾恤非所以令諸侯也十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虗朾謀救宋也宋人辭諸侯而請師以圍彭城孟獻子請于諸侯而先歸會葬髙氏曰諸侯師至而楚鄭之師已退故宋人辭諸侯而請其師以圍彭城而先為此盟也謝氏曰病惡恤患諸侯所同欲也虗朾之盟諸侯協謀救宋故書同盟葬我君成公春秋闕疑卷二十七
