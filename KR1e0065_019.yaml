body:
  text: 春秋闕疑卷十九元鄭玉撰文公公名興僖公之子襄王二十六年即位諡法慈惠愛民曰文元年春王正月公即位二月癸亥日有食之天王使叔服來會葬髙氏曰葬者臣子之事會葬者諸侯相送終之辭也天子唯有弔贈含禭之禮耳今使叔服來會葬是自同于諸侯則天王之微弱可知矣髙郵孫氏曰春秋卒葬之見于經者十一公天王使人會之者僖公而已春秋十三王公會葬者三臣會葬者二不會其葬者九春秋一切著之用見周之不君而魯之不臣也夏四月丁巳葬我君僖公天王使毛伯來錫公命公羊氏曰錫者何賜也命者何加我服也穀梁氏曰禮有受命無來錫命錫命非正也髙氏曰凡諸侯之世子必請命于天子及諸侯之薨必告于天子天子命立其世子為諸侯世子喪畢乃見于京師以士服見天子于廟而受命焉未受命不敢服其服已見天子錫之韍冕圭璧然後服之歸設奠于祖廟然後臨其臣民焉蓋諸侯不命于天子則不成為君故世子雖有世繼之義必待天子爵命乃得為君也今文公未畢喪而天王先使人即命之非禮甚矣晉侯伐衛晉文公之季年諸侯朝晉衛成公不朝使孔達侵鄭伐綿訾及匡晉襄公及祥使告于諸侯而伐衛及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于溫先且居胥臣伐衛五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子愚按晉侯伐衛及南陽朝王于溫使先且居從師則伐衛者晉侯也先且居特代之行師耳故不書先且居帥師晉侯為伐衛而行故書晉侯伐衛不為朝王而行故不書晉侯朝王皆探其本之意也叔孫得臣如京師王使毛伯衛來錫公命叔孫得臣如周拜髙氏曰公初即位在衰絰中未嘗朝王而王遽使卿來錫公命公于是使陪臣如周拜焉天王之使毛伯來錫文公之使得臣往拜皆非禮焉家氏曰是時諸侯在喪不能躬拜使其臣往猶之可也及除喪之後當以士服朝王受黻冕之賜然後于禮為盡而文公循習舊事卒不能往是之謂不臣厥罪當削春秋僃書其事不待貶而義見衛人伐晉衛人使告于陳陳共公曰更伐之我辭之衛孔達帥師伐晉髙氏曰衛孔達為政不共盟主興兵鄰國受討喪邑貶而人之不亦宜乎且晉師未退而孔達遽報其伐雖曰有辭失事大之禮矣晉師于是入戚而疆其田秋公孫敖會晉侯于戚秋晉侯疆戚田故公孫敖會之薛氏曰戚之會卿始會諸侯也大夫而專會于諸侯政不在公室矣朴鄉吕氏曰春秋之初蓋亦有以大夫而會諸侯者矣然未有若公孫敖之専會也公孫敖會晉侯于戚禮樂自大夫出也陵遲至于雞澤溴梁之盟天下之政盡歸大夫不復有諸侯可勝嘆哉冬十月丁未楚世子商臣弒其君頵初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恆在少者且是人也蜂目而豺聲忍人也不可立也弗聽既又欲立王子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芉而勿敬也從之江芉怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊諡之曰靈不瞑曰成乃瞑穆王立以其為太子之室與潘崇使為太師使掌環列之尹胡氏曰書世子弒君有父之親有君之尊而至於弒逆此天理大變人情所深駭春秋詳書其事欲以起問者察所由示懲戒也唐世子𢎞受左氏春秋至此廢書嘆曰經籍聖人垂訓何書此耶郭瑜對曰春秋義存褒貶以善惡為勸戒故商臣千載而惡名不滅也𢎞曰非惟口不可道故亦耳不可聞願受他書瑜請讀禮世子從之嗚呼聖人大訓不明於後世皆腐儒學經不知其義者之罪耳夫亂臣賊子雖陷穽在前斧鉞加于頸而不避顧謂身後惡名足以係其邪志而懲于為惡豈不繆哉持此曉人可謂茅塞其心意矣若語之曰為人君父而不通于春秋之義者必蒙首惡之名為人臣子而不通于春秋之義者必陷篡弒誅死之罪聖人書此者使天下後世察于人倫知所以為君臣父子之道而免于首惡之名誅死之罪也則世子𢎞而聞此必將􅋏然畏懼知春秋之不可不學矣學于春秋必明臣子之義不至于奏請怫旨而見鴆矣傳者案也經者斷也考于傳之所載可以見其所由致之漸豈隱乎嫡妾必正而楚子多愛立子必長而楚國之舉恆在少者養世子不可不慎也而以潘崇為之師侍膳問安世子職也而多置宫甲降而不憾憾而能聄者鮮矣乃欲黜兄而立其弟謀及婦人宜其敗也而使江芈知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僭王慿陵中國戰勝諸侯毒被天下然昧于君臣父子之道禍發蕭墻而不之覺也不善之積豈可掩哉君不君則臣不臣父不父則子不子春秋書世子弒其君者推本所由而著其首惡為萬世之大戒也然則商臣無貶矣曰弒父與君之賊其惡猶待于貶而後著乎謝氏曰商臣書世子著其絶尊親之道也州吁不稱公子無知不稱公孫黜其親而誅其惡以杜世子公孫世寵之心也商臣稱世子商人稱公子顯其親而著其逆以示大禍發于骨肉之間春秋或立例于初以示法或變例于終以起義州吁無知去公子公孫所謂立例于初也商臣商人存世子公子所謂變例于終也子之愛父臣之愛君天性也為世子為公孫者耳不接善言目不接善行友順日消凶忍日積由是良心化為逆惡而德性沉于豺狼之域矣禍害之發豈復顧君父之重哉商臣書世子以為君父之戒也公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績殺之役晉人既歸秦帥秦大夫及左右皆言于秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政至是秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師戰于殽也梁宏御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與女為難瞫曰周志有之勇則害上不登于明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師秦伯猶用孟明孟明增修國政重施于民趙成子言于諸大夫曰秦師又至將必避之懼而增德不可當也程子曰越國襲人秦罪也忘親背惠晉惡也秦經人之國以襲人雖忿無以為辭矣故其來不稱伐晉不諭秦而與戰故書晉及忿以取敗故書敗績胡氏曰孟明帥師伐晉報殽之役此所謂忿兵疑罪之在秦也而以晉主之何哉處已息爭之道逺怨之方也然則敵加于己縱其侵暴將不得應乎曰敵加于己而已有罪焉引咎責躬服其罪則可矣己則無罪而不義見加諭之以辭命猶不得免焉亦告于天子方伯可也若遽然興師而與戰是謂以桀攻桀何愈乎故以晉侯為主者處已息爭之道寡怨之方王者之事也丁丑作僖公主公羊曰虞主用桑練主用栗用栗者藏主也作僖公主何以書譏不時也謝氏曰親既葬孝子迎神而反諸室乃立木主以依亡者之神而承事之是故既葬之後有虞主既期之後有練主上以附祖考之神而下以繫子孫懷慕之心焉禮曰先王既葬設虞祭必于是日也接不忍一日末有所歸也僖之葬十有一月公始作主而安之失孝子寧親之道矣胡氏曰僖公薨至是十有五月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去至于惡積而不可掩所以謹之也家氏曰是時逆祀有萌論議未定故緩於作主及是羣下並從邪議乃始作主而依神于是大事於太廟遂躋僖于閔之上而行祔廟之禮故春秋先書作主次書逆祀言緩于作主乃逆祀之端耳三月己巳及晉處父盟晉人以公不朝來討公如晉晉人使陽處父盟公以耻之謝氏曰朝聘禮事之吉者也君在而使大夫盟恥之大者也大喪未畢而出朝惡之大者也盟為公諱朝為公諱而公之恥惡由此見矣胡氏曰盟不地於晉也諱不書公抑大夫之伉不使與公為敵正君臣之分也適晉不書反國不至為公諱恥存臣子之禮也凡此類筆削魯史舊文衆矣家氏曰是時魯君未除喪而晉責之以朝魯君當執禮以拒之嚴兵以待之不當畏威而動冒喪而朝所以愈受欺于強國晉襄驟勝而驕用事者多粗暴小人所以僭上春秋去處父之族非特為魯諱實責晉也夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴公未至六月穆伯會晉司空士縠盟于垂隴晉討衛故也陳侯為衛請成于晉執孔達以説三年衛侯如陳拜晉成也七年晉郤缺言于趙宣子曰日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德無德何以主盟子為正卿以主諸侯而不務德將若之何宣子説之八年春晉侯使解揚歸匡戚之田于衛且復致公壻池之封自申至于虎牢之竟許氏曰元年衛人伐晉至是諸侯會盟而明年衛人會晉伐沈則知衛服于垂隴之會矣陳氏曰晉遂以大夫盟諸侯也大夫而與諸侯敵于是始故書大夫專盟自士縠始也然則士縠主是盟也則曷為序士縠于諸侯之下春秋不以大夫主盟也師氏曰晉襄不躬會而會諸侯以大夫失在晉襄也諸侯不使大夫往會而自行失在諸侯也失在晉襄故士縠不可序于會上仍正名分以别之于下使若宋主會然失在諸侯故皆存其爵以敵晉魯二大夫所以湥愧之也向使諸侯果皆不親會而盡會大夫雖是一時之匹敵不失尊卑之分要之盟會皆出于大夫亦不免於非禮較之主盟在晉大夫而諸侯聽之為尤甚焉家氏曰晉襄挾其屢勝之威倨坐國中使其臣出盟公侯自是遂為例春秋書之以懲僭自十有二月不雨至于秋七月穀梁氏曰厯時而言不雨文不憂雨也不憂雨者無志乎民者也胡氏曰書不雨至于秋七月而不曰至于秋七月不雨者蓋後言不雨則是冀雨之辭非文公意也夫書不雨至于秋七月而止即八月嘗雨矣然而不書八月雨者見文公之無意于雨不以民事繫憂樂也其怠于政事可知而魯衰自此始矣八月丁卯大事于太廟躋僖公於是夏父弗忌為宗伯尊僖公公羊氏曰躋者升也杜氏曰僖公閔公庶兄繼閔而立廟坐宜次閔下今升在閔上師氏曰僖公繼閔之後是為人後也文公乃任情謂僖實閔之兄而躋僖位于閔之上以兄弟一家之私恩忘繼世天下之大統其踰制失禮孰甚焉書曰躋僖公躋之義自下而上之謂也所以著本在下而乃在上矣一言之中其意甚明此春秋之旨微而顯胡氏曰閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也君子不以親親害尊尊故左氏則曰祀國之大事逆之可乎子雖齊聖不先父食久矣公羊則曰其逆祀先禰而後祖也穀梁則曰逆祀則是無昭穆也無昭穆即是無祖也閔僖非祖禰而謂之祖禰者何臣子一例也夫有天下者事七世諸侯事五世説禮者曰世指父子非兄弟也然三傳同以閔公為祖而臣子一例是以僖公父視閔公為禮而父死子繼兄亡弟及名號雖不同其為世一矣髙氏曰僖公雖閔公之兄然閔實先立僖公嘗北面而事之義已定矣及其傳繼則父子之義又定矣臣不可以先君子不可以先父今文公欲自尊其父而躋于閔公之上則紊亂宗廟顛倒禮經先親後祖昭穆失序謂之逆祀不亦宜乎父子有相繼此禮之常也至于傳之兄弟則亦不得已焉耳既授之以天下國家則所傳者雖非其子亦猶子道也傳之者雖非其父亦猶父道也以天下國家為重矣漢儒例以兄弟不相為後不當以昭穆格之則天下受之誰乎凡人君以兄弟為後必非有子者也引而為嗣臣子一體矣而當嗣者反以為兄弟之故不繼所受國而繼先君則是所受國者竟莫有嗣之者一不可也生則以臣子事之死則以兄弟治之忘生倍死二不可也已實受之後君不受之先君今乃自繼先君則不唯棄後君命已之意又廢先君傳已之命三不可也天下國家則歸之已父子之禮則恥不為四不可也徐邈曰若兄弟六人為君自為昭穆則後世當祀不及祖禰此又妄之甚者禮有所極義有所斷為之後者為之子所以正授受重祖統也兄弟六人相代為君亦六代祀祖禰矣假非兄弟相代而其祖亦當遷耳豈得故存哉即如邈言使有兄弟六人各自稱昭是有十三廟又其最後一君自上繼其父則五君終無後也豈其所以傳重受國之意乎凡言禮者惡其諂時君之意茍曰廣宗廟大孝之本而不詳授受之道使當傳國者不忍以其國與其宗曰非吾子也當受國者又不肯以臣子之禮事其君曰非吾父也至令宗廟猥衆昭穆駢積而鬼有不祀者皆不知春秋大義故也冬晉人宋人陳人鄭人伐秦冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役程子曰秦以憤取敗晉可以已矣而復伐秦報復無己殘民結怨故貶稱人家氏曰晉襄敵父之惠與秦屢戰殽之役晉不克避秦而勝之彭衙之役晉復不能避秦而再勝之為晉襄者茍有禮義之心則引咎于秦以求息肩可也乃更率三國之師以為此役忘父之德逞巳之憾春秋誅斥之矣公子遂如齊納幣公羊氏曰納幣不書此何以書譏喪娶也娶在三年之外則何譏乎喪娶三年之內不圖婚三年之恩疾矣非虛加之也以人心為皆有之娶者大吉也非常吉也其為吉者主乎已以為有人心者宜于此焉變矣三年春王正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰莊叔會諸侯之師伐沈以其服于楚也沈潰髙郵孫氏曰暴中國者楚耳沈何罪乎春秋書之以諸侯為失所伐矣家氏曰翦除凶逆以伸大義于天下霸者所當身其責也楚商臣負弒逆滔天之罪于今二年天人之望咸屬于晉使晉襄仗義而前師壯辭直天下諸侯孰不鼓勇而從縱未能汙瀦其宫楚人必以商臣為戮更立君而聽會于中國晉之霸業有光于前人矣乃視非已事使楚之為逆者得以樹其羽翼脅從諸小國以抗衡中夏懷二者豈獨一沈哉而襄公舍其大而議其細以諸侯伐沈而潰之置逆商之大惡議弱沈之微罪避豺狼而獵狐兔雖潰百沈何益于成敗之數乎故春秋自晉以下五國皆書人以貶之髙氏曰文公三年之間書公子遂公孫敖叔孫得臣纍見于盟會則知魯之政刑盡在諸臣矣魯卒以是亡故春秋見微于濫觴書以為戒齊桓公九合諸侯不以兵車管仲之力也而管仲之姓名不見于春秋是乃湥明管仲知為臣之義有其功而名不在已春秋不褒管仲之功其旨甚微非達誠者孰能知之夏五月王子虎卒髙郵孫氏曰春秋王臣不書卒書卒者譏之也人臣無外交之禮王臣之卒而赴告諸侯則是外交也春秋因其告卒而書之以見其外交之罪胡氏曰或曰禮稱情而為之節文者也叔服新使乎我則宜有恩禮矣夫以新使乎我致恩禮焉是以私情害公義失輕重之權矣秦人伐晉秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也胡氏曰聖人作易以懲忿窒欲為損卦之象其辭曰損德之修也春秋諸侯之知德者鮮矣穆公初聽把子之請違蹇叔之言其名為貪兵是欲而不能窒也及敗于殽歸作秦誓庶幾將窒其欲矣復起彭衙之師殽函之役其名為憤兵是忿而不能懲也今又濟河取郊人之稱斯師也何義哉晉人畏秦而不出穆公逞其忿而後悔自是見伐不報始能踐自誓之言矣是故于此貶而稱人僃責之也楊龜山曰或曰書之終秦誓以見聖人之樂人悔過也故凡過而能悔者取其悔而不追其過可也今有殺人而被刑者臨刑而曰吾惟殺人以至此也仁者于此亦必哀而取之夫書之有秦費二誓以志帝王之誥命于是絶故也其大意則言有國者不可廢誓于誓之中其事又有可取者則秦之罪已而不責人是也若曰取其悔而已不咎其過其既悔而有過也亦不當罪乎聖人以恕待人于人之悔也嘉之可也如以悔為是而不問其改與不改則改過者鮮矣故君子之取人也取其改不取其悔且殺人至于被刑而自狀其過蓋傷其死之不善也使殺人而不必死其肯悔乎殽之戰不敗則秦自以為功矣何以知之抑以濟河之師知之也朴鄉吕氏曰始書秦人入滑明秦人之犯中國也繼書晉人及薑戎敗秦師于殽明晉之背喪用戎以薄人于險也二年書晉侯及秦師戰于彭衙用見秦之不悔而伐晉晉之志戰而敵秦也冬書晉人宋人秦人鄭人伐秦用見晉人再勝而猶用師也三年書秦人伐晉用見秦人再敗而不知悔也四年書晉侯伐秦用見彼此報復結怨連兵之無已也然自是而後秦穆不復報晉蓋知悔也向也殽函之役秦伯向師而哭作秦誓之書以自警蓋其一經喪師之後深懲力創好惡向背從是一變方寸既改羣動皆移充此心也帝王何逺之有惟其能懲創于師徒方喪之初而不能堅定于瘡痍僅瘳之日未及數年又興彭衙之師蓋其積怨湥憤務欲得報而後已本其僻處西陲與戎狄雜居好攻戰而事詐力其俗然也其臣如孟明等又冒戰不已此所以頓忘前日自誓之言與彭衙之役不得志而去未肯已也至三年濟河焚舟取王官及郊封殽尸而還然後秦人之憾得逞矣四年晉人圍邧新城以報王官之役而秦不復報此則秦穆之雄也彼其蓄憾特在于殽函一敗之恥故自取王官雪殽恥之後而不復求以報晉所以全其勝也程子曰結怨連禍殘民以逞晉人畏之而不出秦人極其忿而後悔過聖人取其能終改耳愚謂夫子於秦穆公録其悔過之辭于書所以為後世法著其窮兵之禍於春秋所以為後世戒猶化工之于物生殺並行而不相悖斯其所以為聖人也與故小東萊吕氏曰秦穆在春秋中朝譏暮貶左瑕右玷雖擢髮不足以數其罪及入于書溫然粹然不見微隙是典謨誓誥之秦穆而非春秋之秦穆也然則學者當合而觀之秋楚人圍江晉先僕伐楚以救江薛氏曰報沈之役也髙氏曰江近楚自齊桓貫澤之盟已服從中國而楚自城濮之役亦絶不敢侵伐今復圍之者蓋晉文既沒襄公不復討楚人弒逆之惡故楚人輕視中國復有窺諸侯之意而先圍江以試之也雨螽于宋髙郵孫氏曰雨自上而下者也螽不見其所從來自上而下衆多如雨而適在宋之四境故曰雨螽于宋也冬公如晉十有二月己巳公及晉侯盟晉人懼其無禮于公也請改盟公如晉及晉侯盟晉侯饗公賦菁菁者莪莊叔以公降拜曰小國受命于大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂謝氏曰比年再朝再盟晉之不道文之不立可知也家氏曰自桓文之霸威力雖足以控制諸侯而會盟不于其地不欲諸侯旅至其國懼僭王也晉襄襲父餘威志得而驕前日垂隴之盟以大夫會諸侯今焉自知處父盟公為無禮則當會于魯晉之間以救前日之失乃復邀公親至其國而為此盟長傲遂非罪莫大焉小東萊吕氏曰晉國盛時天下畏其強不敢與之較故襄公雖以大夫之卑盟國君之尊魯之君臣熟視不敢較至于改盟魯亦唯命是聽在當時雖未見其害馴至衰世平公襲其迹而為之欲改衛盟盟即叛而不從遂至兵連禍結數年不解此所以後世蹈之乃有其害也晉陽處父帥師伐楚以救江冬晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還胡氏曰以者不以者也救江善矣其書以何楚嘗伐鄭矣齊桓公逺結江黃合九國之師于召陵然後伐鄭之謀敗又嘗圍宋矣晉文公許復曹衛會四國之師于城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衛盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討命秦甲出武關齊以東兵略陳蔡而南處父等軍方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻強國豈能濟乎故書伐楚以救江言救江雖善而所救之者非其道矣此春秋紀用兵之法也張氏曰楚商臣無父無君乃欲致患于江是禽獸逼人甚矣以中國諸侯為己任者豈得安居而以伐楚之任付之大夫而已乎此春秋特書以正其不能奉天討也師氏曰今年冬伐楚救江乃所以成明年秋楚人滅江之禍也陽處父之帥師果何補于晉亦何加於楚乎然則滅江非楚也實晉也髙氏曰伐不目事聖人特繫之以救者譏其徒取救患之名非仗大義之師此聖人湥惜晉襄之不能有為也嗚呼其旨逺哉且春秋之義莫大乎伐楚而正書伐楚者二齊桓伐楚先之以侵蔡此年伐楚繫之以救江學春秋者宜致思焉四年春公至自晉大東萊吕氏曰自是公朝強國皆至者事近得詳事逺則不得詳也夏逆婦薑于齊穀梁氏曰其曰婦薑為其成禮乎齊也其逆者誰也親迎而稱婦或者公與何其速婦之也其不言公非成禮于齊也其不言氏貶也何為貶之夫人與有貶也髙郵孫氏曰春秋夫人之至者必書于經婦薑書逆而不書至不與先配而後祖也夫人之至告廟矣春秋非之故不書爾髙氏曰公之圖婚喪制尚未終今之娶也又成禮于齊故沒不言公而直曰婦薑者見夫人之位不明也夫人之位不明是不可為小君而奉祭祀也是以去其氏究觀夫人不終其位國亂子弒強國擅命蓋由文公不能正其始也家氏曰魯君前乎此嘗講親迎之禮逆于齊則書公如齊逆女逆于境則書公會齊侯于某今而親往亦親迎耳而春秋變文書逆婦薑于齊不書公逆為其配不以禮變文而書以存其羞惡之心凡以垂法于後焉耳狄侵齊許氏曰狄自箕之敗至是始復侵齊間晉有秦楚之難也秋楚人滅江楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也薛氏曰詳楚之滅江惡晉之不能救也家氏曰江黃楚之與也而志在中國齊桓之霸慕義請盟楚人憾之黃坐是滅齊不能救也及晉文繼興江人不以黃之既覆楚之方盛猶事晉不倦視陳蔡衛鄭朝晉暮楚靡焉而從于強令者有間矣今為楚所攻自去年秋迄今首尾一年晉僅遣偏師以赴之而江又滅矣春秋志二國之初從中國與于會盟侵伐以致為楚所滅而晉不能救書法詳而不厭所以褒二國去逆效順之死不悔亦以愧陳蔡衛鄭之君而責齊晉為甚矣嗟夫黃以齊故亡江以晉故亡江黃不負齊晉齊晉實負江黃可為悲慨也夫晉侯伐秦圍邧新城以報王官之役程子曰秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也稱晉侯不復加譏見秦宜得報而自悔不復修怨乃其善也胡氏曰襄公忘親背惠大破秦師敗狄伐許怒魯侯之不朝也而以無禮施之是專尚威力先事加人莫知省德而後動也今又報秦不足罪矣穆公初敗于殽悔過自誓增修德政宜若過而知悔悔而能改又有濟河之役則非誓言之意所以僃責之也然晉襄見伐而報猶無譏焉秦穆至是伐而不報善可知矣不譏晉侯所以湥善秦伯春秋大改過嘉釋怨王者之事也故仲尼定書列秦誓于百篇之末以見悔過能改而不責人雖聖賢誥命不越此矣衛侯使寧俞來聘衛寧武子來聘公與之宴為賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為肄業及之也昔諸侯朝正于王王宴樂之于是乎賦湛露則天子當陽諸侯用命也諸侯敵王所愾而獻其功王于是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今陪臣來繼舊好君辱貺之其敢干大禮以自取戾髙氏曰文公之時僖公之烈猶在故以同姓則使寧俞來聘異姓則秦使術來聘逺狄則楚使椒來聘惜乎文公不能繼其業此其可責也冬十有一月壬寅夫人風氏薨髙氏曰再娶不得稱夫人而况妾乎故庶子為君則為其母無服不敢二尊者也自惠公仲子以再娶始僭然尚未敢同嫡也今風氏乃莊公之妾雖于僖公為母而直以夫人之禮薨之者魯禮之變自此始而嫡妾之分亂矣聖人實書之以示僭亂之由且見其無君父之惡何則彼乃吾君父之妾也今背死而強使之配此非尊事君父之道後世不知此乃有母以子貴之説凡妾母皆稱太后甚至于妾死而加以皇后之諡此皆不知春秋之旨者也胡氏曰語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君蓋敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其沒亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎五年春王正月王使榮叔歸含且賵公羊氏曰含者何口實也穀梁氏曰含一事也賵一事也其曰且志兼之也胡氏曰珠玉曰含車馬曰賵歸含且賵者厚禮妾母也不稱天王者不克若天也春秋繫王于天以定其名號也所履則天位也所治則天職也所勑而登之者則天之所敘也所自而庸之者則天之所秩也所賞所刑者則天之所命而天之所討也夫婦人倫之本王法所尤謹者今成風以妾僭嫡王不能正又使大夫歸含賵焉而成之為夫人則王法廢人倫亂矣是謂弗克若天而悖其道非小失耳故特不稱天以謹之也髙氏曰含不及殯故言歸明知其不及事而特使歸之以示恩故不書來陳氏曰賵常事不書唯賵仲子成風特書之則遂命為夫人也春秋之初猶以是事為非常也宣之敬嬴襄之定姒昭之齊歸雖命之為夫人不復書矣孟子卒則不赴于京師孔子曰夫人之不命于天子自魯昭公始也三月辛亥葬我小君成風髙氏曰既以夫人之禮薨之復以小君之禮葬之又别為之諡焉實書以示譏也胡氏曰仲子雖聘非惠公之嫡也春秋之初尚以為疑故别為立宫而羽數特異此雖非禮之正然不祔于姑猶有辨焉至是成風書葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也王使召伯來會葬杜氏曰召伯天子卿也召采地伯爵胡氏曰王臣下聘桓公冡宰書名示貶而大夫再聘則無譏焉或以為從同同也或以為同則書重也成風薨王使榮叔歸含且賵既不稱天矣及使召伯來會葬又與貶焉何也歸含且賵施于妾母已稠疊矣又使卿來會葬恩數有加焉是將祔之于廟也而致禮于成風盡矣聘一也含且賵而又葬則其事益隆亂人倫廢王法甚矣再不稱天者聖人于此尤謹其戒而不敢略也陳氏曰莊僖之際天下知有盟主而已而襄王之季年更有事于諸侯于是叔服會葬毛伯錫命尤汲汲于魯也尤汲汲于魯而何為乎成風一人賵含之一人葬之以是懷諸侯吾見周之益陵夷也夏公孫敖如晉髙氏曰捨天王而謹事晉不待貶而見也秦人入鄀初鄀叛楚即秦又二于楚夏秦人入鄀髙氏曰鄀楚屬國也初叛楚即秦既又叛秦歸楚故秦人入之聖人書秦之入鄀所以湥罪晉襄之棄秦也秋楚人滅六六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚公子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉師氏曰六乃臯陶之國有德之後楚輒滅之非強暴之甚何以至此良由中國之盟主不能同惡相恤致然也晉襄其能無愧乎冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳臧文仲以陳衛之睦也欲求好于陳夏季文子聘于陳且娶焉秋季孫行父如晉季文子將聘于晉使求遭喪之禮以行其人曰將焉用之文子曰僃豫不虞古之善教也求而無之實難過求何害杜氏曰聞晉侯有疾故愚按凶事不預聞疾而求遭喪之禮以行既不仁且不知矣八月辛亥晉侯歡卒晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近于秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四德者難必抒矣賈季曰不如立公子樂辰嬴嬖于二君立其子民必安之趙孟曰辰嬴賤班在九人其子何震之有且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故讓逼姞而上之以狄故讓季隗而已次之故班在四先君是以愛其子而仕諸秦為亞卿焉秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士會如秦逆公子雍賈季亦使召公子樂于陳趙孟使殺諸郫冬十月公子遂如晉葬晉襄公髙郵孫氏曰春秋之法常事不書失禮非常則書之葬諸侯不言某人往者得禮也公子遂如晉葬晉襄公失禮非常也古者大國不過三卿而諸侯之葬輒往一卿則國之事無闕乎故春秋譏之以為強者脅弱而弱者畏強也晉殺其大夫陽處父晉狐射姑出奔狄春晉搜于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜于董易中軍陽子成季之屬也故黨于趙氏且謂趙盾能曰使能國之利也是以上之宣子于是乎始為國政制事典正法罪辟獄刑董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授太傅陽子與太師賈他使行諸晉國以為常法賈季怨陽子之易其班也而知其無援于晉也九月賈季使續鞫居殺陽處父十一月丙寅晉殺續簡伯賈季奔狄宣子使臾駢送其帑夷之搜賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵惠敵怨不在後嗣忠之道也夫子禮于賈季我以其寵報私怨無乃不可乎介人之寵非勇也損怨益讐非知也以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟愚按射姑怨處父之易其班也以私忿殺之晉之君大夫坐視而不能討則處父之死乃晉國殺之而已故殺書晉以罪其國不去其官以見死于其職繼書射姑出奔狄則處父之死為射姑之殺明矣閏月不告月猶朝于廟左氏曰閏以正時時以作事事以厚生生民之道于是乎在矣不告閏朔棄時政也何以為民髙郵孫氏曰古者天子頒朔諸侯而藏之祖廟每月之首受朔于廟而告之國中遂行朝廟之禮焉所以尊正朔重天時也文公怠于政事以閏月為歲之餘月忽棄而不告然不敢廢朝廟之禮猶往朝焉胡氏曰不告月者不告朔也不告朔則曷為不言朔也因月之盈虧而置閏是主乎月而有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政于朝庶民服其事于野則主乎是焉耳矣閏不可廢乎曰迎日推䇿則有其數轉璣觀衡則有其象歸竒于扐以象閏數也斗指兩辰之間象也象數者天理也非人之所能為也故以定時成歲者唐典也以詔王居門終月者周制也班告朔于邦國不以是為附月之餘而弗之數也猶朝于廟者幸其不已之辭子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮春秋闕疑卷十九
