body:
  text: 春秋闕疑卷十元鄭玉撰二十有三年春公至自齊張氏曰至者告于廟也莊公忘父讐而娶其女冒母䘮而往納幣以此告廟以為有人心者宜于此焉變矣此與他日書至不可同日語也祭叔来聘穀梁氏曰祭叔天子之内臣不正其私交故不與使也臨江劉氏曰祭者何邑也叔者何字也曷為邑而字天子之大夫也謝氏曰祭叔天子内臣祭公也祭公比外諸侯以聘禮至魯故奪爵書字張氏曰祭叔祭公之臣為祭公而聘魯愚按祭叔當是祭伯之弟為祭伯来聘也胡氏曰祭伯来朝而不言朝祭叔来聘而不言使尹氏王子虎劉卷来訃而不書其爵秩皆所以正人臣之義也人君而明此不容下比之臣人臣而明此不為私交之計黨錮之禍息矣夏公如齊觀社曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡狩以大習之非是君不舉矣君舉必書書而不法後嗣何觀髙氏曰齊社與魯社同爾又何足觀觀公之行事如此而春秋所書之意蓋可見矣張氏曰襄公二十四年齊社蒐軍實使客觀之其廢禮典而夸愚俗兆于此矣故左氏外傳載曹劌之言曰齊棄太公之法觀民于社君為是舉而往觀之非故業也天子祀上帝諸侯㑹之受命焉諸侯祀先公卿大夫佐之受事焉不聞諸侯之相㑹祀也君舉必書書而不法後嗣何觀程子曰婚議尚疑故以觀社再往請議後一年方逆蓋齊難之公至自齊荆人来聘公羊氏曰荆何以稱人始能聘也謝氏曰聘問之禮通于中國故荆進稱人陳氏曰聘未有書人者其稱人荆未有大夫也聘未有不稱使者其不稱使荆未有君也荆未有君大夫也而稱人于是始蓋進之也進之也者憂之也髙郵孫氏曰畧之曰荆人猶言其微尚可禦也至文九年使椒来聘其國已盛而交通諸夏諸夏與之等矣春秋不復外之用見楚人之盛中國不能外之也家氏曰書荆書楚子毎書輒異者著其漸盛與中國爭衡非進之也公及齊侯遇于穀髙氏曰及者公意也婚議猶未定故公往見齊侯于穀無諸侯相見之禮故曰遇此見公不恤國家之事惟婚姻是務家氏曰莊公之為此遇繼納幣觀社而書著其急于得偶而求之惟恐其未至也説者謂穀之遇齊人要魯以盟而後與魯為婚故是冬復為扈之盟明年乃以姜氏歸孟子謂無羞惡之心非人也其莊公之謂與或曰如强弱弗敵何曰齊桓之始入柯之未盟未嘗一往㑹齊亦無責乎魯意者齊桓猶知義之所在念其父讐未雪而不敢責之以常人之禮及髙傒来盟以大夫伉君公反因是以納幣而請婚焉齊人愈傲而公愈卑自是受欺于齊益甚蓋有以自取之蕭叔朝公薛氏曰蕭叔附庸之君也朝公何因公出而朝乎外胡氏曰穀齊地為禮必當其物與其所而後可以言禮大夫宗婦覿用幣則非其物也蕭叔朝公在齊之穀則非其所也嘉禮不野合而朝公于外是委之于野矣故禮非其所君子有所不受必反之于正此亦春秋撥亂之意也秋丹桓宫楹髙氏曰莊公不能為桓復讐而反娶其女以奉祭祀其無父之心夫人皆知之而莊公惡人之譏已也故丹楹刻桷以示孝心之不忘甚矣其無父甚矣其行詐也夫宗廟之飾國有彝典而妄肆奢麗加于禰宫亂王制瀆先君不恭莫大焉聖人直書其事具文見意故凡加非禮于先君之廟者皆春秋之所誅也後世人君崇侈廟宇踰禮越制自謂吾嚴奉之勤而臣子一有敢議者則指以為不忠不孝而加罪焉是皆不知春秋所書之㫖也冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈程子曰遇于穀盟于扈皆為要結姻好也髙氏曰此離盟齊已霸矣復為離盟者婚議雖定齊猶疑之故為盟此盟齊志也齊侯以公求婚之急甘心卑下恐有心報齊不憚屈辱為可憂也于是致公于扈以盟冀絶婚後悔吝云爾二十有四年春王三月刻桓宫桷御孫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎胡氏曰公將逆姜氏丹桓宫之楹刻其桷為盛飾以誇示之自常情而觀丹楹刻桷宜若小失而春秋詳書于䇿御孫以為大惡何也桓公見殺于齊則不能復而盛飾其宫誇示仇人之女乃有亂心廢人倫悖天道而不知正者也御孫知為大惡而不敢盡言春秋謹禮于微正後世人主之心術者也故詳書于䇿為後世鑒家氏曰禽獸知有母而不知有父人知有父而復沿其父之所從出而知有其祖有曾有髙焉又沿其曾髙之所從出而有始祖焉皆為之廟以祀之禮自天子至諸侯公卿大夫士隆殺有等夫然後盡其禮不以踰禮而為榮也不以僭禮而為孝也今莊公忘父之讐狥母之欲娶讐女以為夫人知有母而不知有父既又自知其非丹桓宫之楹而刻其桷是悖禮也以悖禮施之親廟不足以榮其親適足以悖其祖知有母而不知有父無父也隆于父而薄于祖無祖也無父無祖禽獸之道也葬曹莊公夏公如齊逆女穀梁氏曰親迎恒事不志此其志何也不正其親迎于齊也秋公至自齊入月丁丑夫人姜氏入穀梁氏曰入者內弗受也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人子弟以薦舍于前其義不可受也泰山孫氏曰公親迎于齊不俟夫人而至失夫之道也婦人從夫者也不從公而入失婦之道也髙郵孫氏曰夫人之至嘗告廟矣然聖人不與莊公以讐人之女而見其父也特變文而書曰夫人姜氏入以明仇讐之女無時而可與通況取其女以事先君之廟乎髙氏曰夫婦正始之道王化之基也夫人淫于二卿殺其二子幾䘮魯國而終見討于父母之邦由其始之不正也是以春秋盡其辭焉胡氏曰莊公不勝其母越禮踰時俟讐人之女薦舍于宗廟以成好合卒使宗嗣不立弑逆相仍幾致亡國故春秋詳書其事以著不孝之罪家氏曰自納幣為始至用幣為卒春秋僃書以責之彼愚人何足責哉彼魯莊公亦何足責哉實僃書以責齊桓也桓為盟主方將秉法以示諸夏謂魯莊不當請婚襄女則明義以斥絶之孰曰不然茍欲鎮撫魯國而許之則當謹于用禮飭齊女以行婦道母使為二國羞今也不然納幣未幾要以觀社觀社未幾而有穀之遇扈之盟最後逆女姜乃不與公偕歸是孰使之然哉不責齊桓而誰責哉及哀姜驕淫不婦以害其君然後取而戮之亦已晩矣戊寅大夫宗婦覿用幣御孫曰男贄大者玉帛小者禽獸以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎公羊氏曰宗婦者何大夫之妻也覿者何見也用者何不宜用也胡氏曰公事曰見私事曰覿見夫人禮也曷為以私言之夫人不可見于宗廟則不可以臨諸臣故以私言之也髙郵孫氏曰聖人罪莊公娶讐人之女而又侈之至于失禮故書曰大夫宗婦覿用幣所以見幣非婦人之贄也大水冬戎侵曹曹羈出奔陳赤歸于曹杜氏曰羈蓋曹之世子即位踰年而不穪爵不能君也赤不繫國不稱公子蓋庻孽也謝氏曰戎之侵曹也羈微弱不能保其位故羈棄國出奔羈之出也赤為所納而人心從之故赤歸曹春秋首書戎侵曹而繼以羈出赤歸者以明曹國廢立之命皆制于戎也莊公之卒也羈以世子嗣位已逾年矣稱名不稱國以其絶于國人也赤以公子入國非正也非正而稱歸以罪羈失人心而國人歸赤也其于羈也稱國以明正去爵以示絶其于赤也去國以明非正稱歸以明得國而羈之䘮失君道赤之進不由正于此見矣胡氏曰宋人執鄭祭仲而忽出突歸權在宋也戎侵曹而羈出赤歸制在戎也使鄭忽曹羈明而能斷雖有宋戎之衆突赤之孽何緣而起以國儲君副不能自定其位于誰責而可故雖以國氏皆不書爵為居正者之戒張氏曰赤以庻逐適戎以逆間順而天子方伯不能正比事屬辭簡明之㫖可見亦以累齊也髙氏曰按史記世家自曹莊公之後僖公夷昭公班各立九年今考經文自赤歸至班卒共十八年合之于史則各據九年疑赤即僖公而世家誤作夷也郭公上下必有闕文誤字或曰郭亡亦强通之也當傳疑二十有五年春陳侯使女叔来聘始結陳好也女叔三傳皆以為字獨劉朔以為陳大夫名陳氏曰前乎此非王室若姻隣無聘者矣于是交聘齊桓公為之也自女叔之後諸侯之㑹數而朝聘皆之盟主矣春秋所以作也夏五月癸丑衞侯朔卒六月辛未朔日有食之鼓用牲于社穀梁氏曰天子救日置五麾陳五兵五鼔諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充陽也樸鄉吕氏曰聲陽類也鼓所以作陽而助聲也書曰乃季秋月朔辰弗集于房鼓奏鼔嗇夫馳庻人走而周官救日月則有鼓人以詔王鼓有太僕以贊王鼔詳于用鼓者急于助陽也天子伐鼓于社者社隂之神也日食則隂勝陽也天子尊諸侯卑天子責神諸侯自責而已諸侯而鼓于社則失正矣復用牲非禮也凡天災有幣無牲薛氏曰禮天子伐鼓于社諸侯用幣于社伐鼔于朝胡氏曰譏不鼔于朝而鼔于社又用牲也伯姬歸于杞穀梁氏曰其不言逆何也逆之道微胡氏曰逆者非卿其姓氏不登于史册則書歸以志禮之失也髙氏曰若時君之女則加子字以别之此伯姬若桓公末年所生之女則于今殆二十餘歳蓋已失時公既娶而後嫁之也秋大水鼓用牲于社于門左氏曰凡天災有幣無牲非日月之𤯝不鼓髙郵孫氏曰日食必鼓者必隂侵陽其驗甚逺而為災未見大水則災及于物其驗已明其災已著其災未見則聖人為伐鼓之法以救陽且以警于人君也驗已著者則無事于鼔也謝氏曰社主土門主出入大水之為患也魯人欲以聲駭變故鼓欲以土勝水故用牲于社欲以門禦水故用牲于門凡天地之變先王責諸已求諸人而已猶以為未也又以隂陽象類致力乎祈禳祭享之間所以盡救災之道也方是時莊公君道不脩國事不治乆矣魯人不知所以消變而一切求之祈禳之間其祈禳一切以意而不以禮夫救災之道逺矣大水漂蕩而欲以鼓駭之不亦愚乎大水出為國害而欲以社勝之以門禦之不亦惑乎冬公子友如陳杜氏曰魯出朝聘皆書如謝氏曰友莊公弟以公子為卿故書公子樸鄉吕氏曰公子母弟一也或稱弟或稱公子者禮諸侯絶朞而臣諸父昆弟君臣者分之别也昆弟者恩之屬也禮不可以無分異貴賤則禮法嚴臣不可以敵君申私恩則公義廢然則春秋之書公子乃其常也其書弟者變之正也友如陳報女叔之聘也二十有六年春公伐戎夏公至自伐戎樸鄉吕氏曰莊十八年公追戎于濟西必以乘閒而侵我也二十年而齊人伐之必以姦紀而為暴也今又侵曹以出羈因亂以納赤其𫝑浸盛矣許氏曰齊魯伐戎而中國崇隱桓以来世有戎盟至于莊公戎始變渝我是以有濟西之役于此伐戎義以勝矣曹殺其大夫髙郵孫氏曰禮曰刑不上大夫者一國之選而人君之所尊任者也選之得其人而任之當其才故君臣相與而國家以治不幸其選之非人而任之不見其功則放之而已蓋大夫有罪而放之為之君者已有罪矣況刑之乎故曰刑不上大夫也張氏曰諸侯雖專一國之權而卿大夫非大罪極惡不得擅加以刀鋸必以聞于天子此王制之所甚謹蓋視為一體則恩意之篤自足以感其忠敬之心于無窮視猶土芥無罪而殺之則宼讐之視有所必至此春秋于殺大夫所以詳書而謹之上下相殺之變至于定哀而極也胡氏曰稱國以殺者國君大夫與謀事不請于天子而擅殺之也義繫于殺則止書其官曹殺其大夫宋人殺其大夫是也義繫于人則兼書其名氏楚殺其大夫得臣陳殺其大夫洩冶之類是也所謂義繫于殺者罪在于專殺而見殺者之是非有不足紀也故止書其官而不復錄其名氏也古者諸侯之卿大夫士命于天子而諸侯不敢專命也其有罪則請于天子而諸侯不敢專殺也及春秋時國無大小卿大夫士皆專命之而不以告于王朝有罪無罪皆專殺之而不以歸于司宼無王甚矣五伯三王之罪人而葵丘之㑹猶曰無專殺大夫故春秋明書于䇿僃天子之禁也凡諸侯之大夫方其交政中華㑹盟征伐雖齊晉上卿止錄其名氏至于見殺雖曹莒小國亦書其官或抑或揚或奪或與聖人之大用也明此然後可以司賞罰之權矣陳氏曰凡殺大夫恒名之此其不名何惡君也莊公卒有戎難羈出奔陳赤于是篡曹篡而殺其大夫則必不義其君者也宋杵臼之弑也始不書賊而曰宋人以是為君無道也無道而殺大夫則亦不義其君者也是故曹僖公之大夫不名宋昭公之大夫不名秋公㑹宋人齊人伐徐胡氏曰按書伯禽嘗征徐戎則戎在徐州之域為魯患舊矣是年春伐戎秋又伐徐必戎與徐合兵表裏為魯國之患也故雖齊宋將卑師少而公獨親行十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮家氏曰杜氏以伯姬為莊公之女即二十五年歸于杞者陸氏謂春秋時有子叔姬者三皆謂時君之女穪子者以别先君之子公穀以為同母姊妹非也則此伯姬未必是莊公之女藉是莊公女于洮亦非歸寜之地春秋書公㑹杞伯姬于洮非歸寜之義也謝氏曰伯姬魯女洮魯地女有歸寜于國無出㑹于境洮之㑹在魯有敗禮之愆在杞失正家之道陸氏微㫖曰參譏之也公及杞侯伯姬俱失正矣夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽陳鄭服也愚按十六年㑹于幽始書同盟至是再㑹于幽復書同盟然前盟㑹者九國今止五國特以陳鄭反覆至是始服故齊侯㑹公及宋望國而盟之不再盟他國也程子曰同志而盟非率之也謝氏曰明年荆伐鄭公㑹二國救鄭然則鄭苦于楚欲與中國同盟可知也髙氏曰齊侯九合諸侯此其二也十三年北杏之㑹穪人十五年鄄之㑹不穪公而去年伐徐之役猶以宋主兵故穀梁氏謂此盟授之諸侯授之諸侯齊桓得衆也胡氏曰同盟之例有惡其反覆而書同盟此盟鄭伯之所欲而書同盟者也凡盟皆小國受命于大國不得已而從焉者也其有小國願與之盟非出于勉强者則書同盟所以志同欲也前此鄭伯嘗貳于齊矣至是齊桓强盛有伯中國攘夷狄之勢諸侯皆歸之鄭伯于是焉有畏服之心其得與于盟所欲也故特書同秋公子友如陳葬原仲原仲季友之舊也髙氏曰大夫不交諸侯諸侯不行使乎大夫今公子友往㑹他國大夫之葬蓋私行也魯人聽其出故同出使之文而繫之葬原仲以重其罪謝氏曰諸侯相葬禮也人臣無境外之交卿非君命不越境公子友以私事出境葬大夫其專命僭制不待貶絶而自見矣愚按春秋書人臣出境未有著其事者此獨書葬原仲何也蓋不著其事則嫌于出聘故特書其事以明其以私事出境而更不加譏貶之詞所謂直書其事而義自見也冬杞伯姬来歸寜也趙氏曰合禮者常事不書豈有二百四十二年內女惟兩度歸寜乎蓋知非禮而来故書髙郵孫氏曰春秋內女適諸侯者多矣于其歸寜未嘗曰子某歸寜常事無書也伯姬非莊公子義不當歸故書曰杞伯姬来也薛氏曰非公之子不歸寜非公之子而歸故曰来也陳氏曰内女為夫人凡八見于經未有書公者而㑹自伯姬始由是来朝其子由是来求婦伯姬之為皆未之前聞也是故終伯姬之世但書来莒慶来逆叔姬髙氏曰叔姬者伯姬之妹皆非莊公女也穀梁氏曰諸侯之子嫁于大夫主大夫以與之程子曰人臣之禮無外交故大夫非君命不越境以莒慶國卿而與魯為婚是外交也不書逆女而云逆叔姬以别卿為君逆也臨江劉氏曰莒慶非有君命叔姬非適諸侯也何以得書以公之自為之主敵則書也胡氏曰諸侯嫁女于大夫而自主之非禮也杞伯来朝謝氏曰伯姬在魯故杞伯来朝愚按杞二王之後爵本上公在桓公時猶稱侯至是稱伯其後遂稱子或曰為時王所黜或曰齊桓之伯以弱强為次或曰以其用夷禮或曰自侯而伯自伯而子蓋浸以微弱或曰滕薛杞爵號不同皆口授傳寫小國多誤衆論紛紜闕之可也公㑹齊侯于城濮春秋闕疑卷十
