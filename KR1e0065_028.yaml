body:
  text: 春秋闕疑卷二十八元鄭玉撰襄公公名午成公之子簡王十四年即位諡法因事有功曰襄辟土有德曰襄元年春王正月公即位仲孫蔑㑹晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城於是為宋討魚石彭城彭城降晉晉人以宋五大夫在彭城者歸置諸瓠丘齊人不㑹晉人以為討二月齊太子光為質于晉謝氏曰楚以兵入魚石于彭城魚石以彭城附楚然則彭城已入楚矣列國之師為宋討魚石于彭城而圍之圍彭城書宋所以明彭城宋之分地也春秋正彭城歸宋以著楚子之罪則列國之圍彭城得討國之義矣胡氏曰書圍彭城魯史之舊文也曰圍宋彭城者仲尼親筆也楚已取彭城封魚石戍之三百乘矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖専其地君子不登叛人所以正疆域固封守謹王度也髙氏曰魚石既奔荆蠻復藉荆蠻之力自伐其國宋不能討而晉悼合諸侯大夫共圍討之春秋以來諸侯自相侵伐推而言之孟子所謂彼善于此也夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵于洧上于是東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援髙氏曰彭城之圍既解而晉遂以西諸侯之師伐鄭故但書韓厥帥師而已韓厥已足以當鄭故使東諸侯之師次于鄫以震鄭心且備楚師之出謝氏曰韓厥伐鄭列國大夫出次于鄫備楚而為晉援然則諸侯惡鄭可知矣秋楚公子壬夫帥師侵宋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘胡氏曰楚子辛救鄭而經不書者鄭本為楚以其君之故親集矢于目是以與楚而不二也棄中國而從楚不能以大義裁之惟私欲之從則鄭無可救之善楚不得有能救之名經所以削而不言救也九月辛酉天王崩邾子來朝愚按襄公時方四歲且在衰絰之中邾子之來因其父喪而弔之可也朝之豈其時乎非惟不可以朝禮相接蓋不能也况不奔天王之喪而朝鄰國之君亦可謂不知務矣冬衛侯使公孫剽來聘晉侯使荀罃來聘胡氏曰簡王崩赴告已及藏在諸侯之䇿矣則宜以所聞先後而奔喪今邾衛晉方來修朝聘之事于王喪若越人視秦人之肥瘠曽不與焉此何禮乎泰山孫氏曰天王崩邾子來朝衛侯使公孫剽來聘晉侯使荀罃來聘皆不臣也二年春王正月葬簡王鄭師伐宋楚令也夏五月庚寅夫人姜氏薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬六月庚辰鄭伯睔卒鄭成公疾子駟請息肩于晉公曰楚君以鄭故親集矢于其目非異人任寡人也若背之是棄力與言其誰䁥我免寡人唯二三子鄭伯睔卒于是子罕當國子駟為政子國為司馬晉師宋師衛寧殖侵鄭諸大夫欲從晉子駟曰官命未改髙郵孫氏曰晉宋稱師將卑師衆也寧殖稱名將尊師少也家氏曰伐喪春秋之所甚惡也他人伐喪猶欲盟主仗義以正之而况為盟主而伐人之喪乎或謂晉欲得鄭固無問其伐喪此以後世權謀智詐而律春秋矣愚謂三年無改于父之道如其非道何待三年鄭成公背晉即楚天下之所共棄今而易世諸侯之師臨乎境上正鄭去夷就華之機也諸大夫欲從晉子駟乃以官命未改而遂其非子駟固為罪首諸大夫見善不明守正不固卒從子駟之言以勤諸侯之師益重鄭伯之過亦不為無罪也秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復于寡君而請于齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君賴之己丑葬我小君齊姜叔孫豹如宋通嗣君也冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成髙郵孫氏曰虎牢鄭拒楚之邑而僻險之地諸侯患楚之侵陵其國于是使其大夫㑹而城之虎牢鄭地經不繫之鄭者蓋諸侯將以安中國推公心與天下共之非一己之私故但曰城虎牢明非私有而取之也張氏洽曰虎牢所以不繫鄭者鄭去順效逆黨楚為中國患悼公動天下之諸侯以討之而負固自善故從孟獻子之謀城其巖邑以制之以伯主討不服之國地非鄭之所可私此春秋明王制以示豫奪之正也趙氏曰晉楚爭鄭五十年乍叛乍服今晉率十國之大夫取其巖邑城之故雞澤之盟不伐自至天下無兵車者六年愚按遂者繼事之辭㑹畢而城之也蓋前㑹于戚孟獻子已有是謀知武子善之而未敢専也謂孟獻子曰將復于寡君而請于齊得請而告吾子之功也若不得請事將在齊于是歸而告于晉侯言之于齊崔杼又帥諸小國而為此故再㑹于戚遂舉是役非大夫之専事也楚殺其大夫公子申楚公子申為右司馬多受小國之賂以逼子重子辛楚人殺之許氏曰嬰齊壬夫躬執楚政惡申之逼以故殺之故稱國焉罪纍上也三年春楚公子嬰齊帥師伐吳楚子重伐吳為簡之師克鳩茲至于衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重曰是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒家氏曰吳楚交兵久矣春秋不書至是始書此著吳楚迭為盛衰中國安危存亡俱係此楚自成穆始慿陵諸夏至于莊而焰益煽晉之霸業至是乃衰幸而吳日以大為楚內梗諸夏得以小康以吳故也晉悼公之興適當斯時以服鄭而楚不敢爭者非畏晉也以吳人之議其後也陳氏曰楚伐吳吳人伐楚取駕則其但書伐吳何春秋于晉楚之際嚴矣于吳楚未嘗無差等也是故楚伐吳悉書之吳伐楚必若遏也門于巢卒而後書師氏曰楚見中國稍衰屢肆猖獗及吳師一入其州來楚乃喪氣于吳者十數年至此而復命公子嬰齊一帥師以伐吳終亦無所成功用知中國為楚所陵誠自取也公如晉夏四月壬戌公及晉侯盟于長樗公至自晉公如晉始朝也盟于長樗孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表密邇仇讐寡君將君是望敢不稽首蘇氏曰晉悼公修禮于諸侯故去其國而與公盟于長樗張氏曰孟獻子魯之賢大夫尚不知君臣之義以相其君所謂不知先立乎其大者六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟於雞澤陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟晉為鄭服故且欲修吳好將合諸侯使士丐告于齊曰寡君使丐以歲之不易不虞之不戒寡君願與一二兄弟相見以謀不協乃盟于耐外六月公㑹單頃公及諸侯己未同盟于雞澤晉侯使荀㑹逆吳子于淮上吳子不至楚子辛為令尹侵欲于小國陳成公使𡊮僑如㑹求成晉侯使和組父告于諸侯秋叔孫豹及諸侯之大夫及陳𡊮僑盟陳請服也程子曰楚强諸侯皆畏之而修盟故書同謝氏曰自鄭背戚盟列國凡四伐鄭再侵鄭不能制鄭而服之及城虎牢然後鄭國恐懼而從雞澤之㑹陳雖與楚成公不待徵召亦遣大夫如㑹從盟書陳𡊮僑如㑹以明中國威力之盛也諸侯能以義服鄭如城虎牢則疑二之國安有不服者哉張氏曰晉悼公始合諸侯尊王室而盟單子與桓公首止葵丘異矣故書諸侯㑹而己未同盟于雞澤所以譏其儕王官于諸侯其事不足揚故不再言雞澤家氏曰是㑹鄭服而陳亦來㑹之盛者也而其失有二盟王人也盟大夫也盟大夫大夫張也盟王人諸侯僭也故雖盛㑹而有貶辭諸侯盟于雞澤既盟而陳侯使𡊮僑如㑹受而禮之需其君至而及之盟雖後㑹可也乃以一𡊮僑之故命諸侯之大夫别為之盟君盟于前臣盟于後不足以結𡊮僑實開大夫伉君之漸穀梁謂雞澤之盟大夫張諸侯始失正得經意矣東萊吕氏曰諸侯已盟大夫無所用盟今以袁僑故叔孫豹及諸侯之大夫盟是政在大夫也至于溴梁之㑹則曰戊寅大夫盟又無故而然也言大夫浸强也至宋之㑹則大夫自盟而諸侯不往矣言君臣之失其所也秋公至自㑹冬晉荀罃帥師伐許許靈公事楚不㑹于雞澤冬晉知武子伐許張氏曰荀罃偶見陳人之服不能輔悼公益修德以保陳陳固則許自至而遽興師以問罪于許宜其併陳不能保也四年春王三月己酉陳侯午卒三年楚司馬公子何忌侵陳陳叛故也至是楚師為陳叛故猶在繁陽韓獻子患之言于朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉三月陳成公卒楚人將伐陳聞喪乃止陳人不聽命臧武仲聞之曰陳不服于楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳陳無禮故也夏叔孫豹如晉報知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰子以君命辱于敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨于周臣聞之訪問于善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜秋七月戊子夫人姒氏薨定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎初季孫為己樹六檟于蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御杜氏曰成公妾襄公母家氏曰自齊姜卒而定姒始僣夫人之稱先君夫人一而已矣春秋既于前年書夫人姜氏薨葬我小君齊姜今復書夫人姒氏薨葬我小君定姒以明成公廟有兩夫人著襄躋妾母配先君之罪不加貶而義自見矣葬陳成公八月辛亥葬我小君定姒許氏曰𫝊載季文子欲不以夫人禮葬定姒志復古也而不得已于人言卒夫人之觀此踰月而葬蓋禮略也冬公如晉公如晉聽政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之密邇于仇讐而願固事君無失官命鄫無賦于司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晉侯許之冬十月邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘國人逆喪者皆髽魯于是乎始髽國人誦之曰臧之狐裘敗我于狐駘我君小子侏儒是使侏儒侏儒使我敗于邾陳人圍頓楚人使頓閒陳而侵伐之故陳人圍頓髙氏曰自僖二十五年楚人圍陳納頓子于頓陳侯畏楚而不敢討頓子恃楚而不事陳今陳復從中國而頓為楚閒故圍之自雞澤之㑹而書伐許圍頓著晉興而楚絀也五年春公至自晉夏鄭伯使公子發來聘通嗣君也叔孫豹鄫世子巫如晉穆叔覿鄫大子于晉以成屬鄫臨江劉氏曰此鄫世子巫也曷為與叔孫豹如晉鄫請于魯為之附庸故相與往見于晉也鄫曷為附庸于魯鄫不勝莒魯之患求為附庸以自定諸侯死社稷正也不能守其國以卑其宗廟鄫失正矣天子建附庸非天子命而魯私有之魯失正矣臣不能以矯其君子不能以正其父故曰叔孫豹鄫世子巫如晉猶吾大夫然交譏之仲孫蔑衛孫林父㑹吳于善道吳子使壽越如晉辭不㑹于雞澤之故且請聽諸侯之好晉人將為之合諸侯使魯衛先㑹吳且告㑹期故孟獻子孫文子㑹吳于善道髙氏曰晉人將為吳合諸侯故使魯衛先與吳㑹且告㑹期二國俱受命于晉故不言及吳先在善道而二國大夫往㑹之故曰㑹吳方是時晉楚爭衡權之在吳故晉急吳如此張氏曰悼公初立風聲所及逺人慕之故吳有志于親中國辭謝雞澤之不㑹而請聽後㑹之期悼公告以㑹戚之期而聽其自來足矣至使魯衛特往㑹之則是以中國大邦而為蠻夷屈此二大夫㑹吳之所以特書也秋大雩楚殺其大夫公子壬夫楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之臨江劉氏曰壬夫之纍上奈何前此陳鄭去楚即晉楚人伐之不服媾之不可楚子怒曰壬夫實侵欲焉乃殺之是遷也然則壬夫之罪何壬夫之為人臣也怙勢而懷利足以殺其身而已矣家氏曰前日殺公子申曰多受小國之賂今日殺公子壬夫又以侵欲于陳而使之叛楚猶有政二大夫不得為無罪但連歲殺大夫用刑過慘春秋不與也故皆稱國以殺乃若晉景之殺同括晉厲之殺三郤皆為讒邪所陷而殺殺雖多而晉國日趨于削殺非其罪也楚之用刑慘而國猶能强豈非權出于上猶有辭于殺歟公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚九月丙午盟于戚㑹吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命于㑹胡氏曰吳何以稱人吳子使夀越如晉請聽諸侯之好晉人將為之合諸侯使魯衛大夫㑹吳于善道且告㑹期然則戚之事乃吳人來㑹不為主也來㑹諸侯而不為主則進而稱人諸侯往與之㑹而主吳則貶而稱國聖人之情見矣春秋之義明矣髙氏曰吳與楚類也而中國諸侯與之㑹者為其能病楚也殊不知彼能病楚則亦能病中國也觀吳自敗楚之後伐齊伐魯伐衛伐陳以至與晉爭盟則其病中國可知矣按𫝊戚蓋盟而經不書者殷㑹之盟春秋所重而僣亂參焉沒而不志所以崇中國也公至自㑹冬戍陳公羊曰孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也陳氏曰戍不書晉悼公之戍陳鄭也特書之君子以悼公之霸業桓文之所不屑為也桓公不戰而屈楚文公戰而屈楚悼公通吳以制楚矣㑹于戚于向于柤皆東境也而又戍陳鄭以守之楚誠强而晉亦誠下䇿矣楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳楚子囊為令尹范宣子曰我喪陳矣楚人討二而立子囊必改行而疾討陳陳近于楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳子囊伐陳十一月甲午㑹于城棣以救陳謝氏曰戚之㑹諸侯受盟于晉矣今也楚人犯陳而晉率諸侯救之中國之義也書救陳善之也十有二月公至自救陳辛未季孫行父卒季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠于公室也相三君矣而無私積可不謂忠乎黃氏曰行父怨歸父謀去三家至掃四大夫之兵以攻齊公子遂弒君立宣行父再為之如齊納賂又帥師城莒之諸鄆自殖其為妾馬金玉也多矣六年春王三月壬午杞伯姑容卒夏宋華弱來奔宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝平公見之曰司武而梏于朝難以勝矣遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也專戮于朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從子罕善之如初髙氏曰不言逐而以自奔為文者朝廷尚敬而弱瀆如此所以罪弱也家氏曰亦逐樂轡春秋不書轡奔著宋公用刑之不能平也秋葬把桓公滕子來朝始朝公也莒人滅鄫鄫恃賂也劉氏權衡曰五年夏叔孫豹鄫世子巫如晉鄫始屬魯也其秋穆叔以屬為不利使鄫人聽命于㑹則魯已辭鄫矣今鄫之滅非魯之責也晉人何以來討魯已絶鄫鄫無賦于魯尚何恃賂而取滅耶𫝊言不實胡氏曰榖梁子曰莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也公羊亦云莒女有為鄫夫人者蓋欲立其出也或曰鄫取莒公子為後罪在鄫子不在莒人春秋應以梁亡之例而書鄫亡不當但責莒人也高郵孫氏曰立異姓為後而經遂書滅不惟于義不足亦何以為後訓乎此蓋莒人因鄫不順立異姓之君而滅之爾非謂異姓為君而遂書滅也公羊皆得其一偏爾家氏曰周衰倫教不競有以他姓為繼嗣者滅人之國而人自以為非滅聖人特于此垂訓焉髙氏曰春秋書莒人滅鄫以為立異姓之戒而後世猶有不知本宗立後之義疏忌同族輒取異姓如五代郭太祖無後而以柴世宗為嗣者有國有家者其可不知春秋書滅之義哉東萊吕氏曰莒鄫小國自相滅亡晉悼公為時盟主亦莫之恤蓋當時禮義衰絶滅國殺君世所謂大惡者皆日見之熟不以為甚異故晉悼雖號賢君為諸侯宗亦莫能正也冬叔孫豹如邾聘且修平髙氏曰初公即位邾子來朝四年乃有狐駘之戰而經不書者魯人髽而弔自敗于狐駘始于是國人誦之曰我君小子侏儒是使侏儒侏儒使我敗于邾魯人之怨其上如此故聖人不敢斥言也至是叔孫豹往聘且修平以無忘舊好季孫宿如晉晉人以鄫故來討曰何故亡鄫季武子如晉見且聽命謝氏曰宿行父子父卒未期而自出聘許氏曰魯既世卿而大夫無復三年之喪哀典廢于下矣十有二月齊侯滅萊二年春齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還夏齊侯使諸姜宗婦來送葬召萊子萊子不㑹故晏弱城東陽以逼之至是齊侯滅萊萊恃謀也于鄭子國之來聘也四月晏弱城東陽而遂圍萊甲寅堙之環城傅于堞及杞桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器于襄宫晏弱圍棠十一月丙辰而滅之遷萊于郳髙厚崔杼定其田師氏曰左氏謂滅萊萊恃謀也其意以滅之為宜又曰十一月丙辰滅之遷萊于郳如此則經當書十一月遷萊豈可誣齊侯以十二月滅萊學者宜以經為正髙氏曰滅國目齊侯也齊圖萊久矣自宣七年伐萊至是而遂滅之不言萊君出奔國滅君死也夫萊與齊同姓衛文公滅邢名齊靈公滅萊不名何也衛文公可責齊靈公不足責故以文公一見法焉何氏曰不書殺萊君舉滅國為重春秋闕疑卷二十八
