body:
  text: 春秋闕疑卷三十元鄭玉撰十有二年春王二月莒人伐我東鄙圍台季孫宿帥師救台遂入鄆髙氏曰善救台惡入鄆也入鄆以報圍台也夫衆人所以為衆人者彼以不義加己巳以不義報之彼以不仁遇己己以不仁復之釁于勇而嗇于禍雖死而不避欲以為快惟君子則不然彼以不義來我以義正之彼以不仁來我以仁正之因于禮固不遷怒止于當故不貳過此君子所以服人也春秋豈以此望于季孫宿哉因季孫宿之事而達此義耳况季孫宿受命救台不受命入鄆因救台而入鄆是自専也是無君也君不得為政矣故書遂以貶之夏晉侯使士魴來聘且拜師秋九月吳子乗卒吳子壽夢卒臨于周廟十四年吳子諸樊既除喪將立季札季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也誰敢奸君有國非吾節也札雖不才願附于子臧以無失節固立之棄其室而耕乃舎之冬楚公子貞帥師侵宋楚子囊秦庶長無地伐宋師于楊梁以報晉之取鄭也髙氏曰秦人與焉而削之者楚人帥秦故専罪楚也公如晉且拜士魴之辱十有三年春公至自晉夏取邿邿亂分為三師救邿遂取之髙氏曰邿小國也魯乗其亂而滅之以為附庸不言滅者内大惡故婉其辭秋九月庚辰楚子審卒楚子疾告大夫曰不穀不徳少主社稷生十年而喪先君未及習師保之教訓而應受多福是以不徳而亡師于鄢以辱社稷為大夫憂其𢎞多矣若以大夫之靈獲保首領以歿于地唯是春秋窀穸之事所以從先君于禰廟者請為靈若厲大夫擇焉莫對及五命乃許秋楚共王卒子囊請諡大夫曰君有命矣子囊曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之冬城防于是將早城臧武仲請俟畢農事髙氏曰城防以備齊厥後髙厚困防趙曰防有二一近宋此近齊十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人㑹吳于向十三年吳侵楚養由基奔命子庚以師繼之養叔曰吳乗我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師獲公子黨君子以吴為不弔至是告敗于晉㑹于向為吴謀楚故也范宣子數吴之不徳也以退吳人執莒公子務婁以其通楚使也將執戎子駒支范宣子親數諸朝曰來姜戎氏昔秦人迫逐乃祖吾離于𤓰州乃祖吾離被苫蓋蒙荆棘以來歸我先君我先君恵公有不腆之田與女剖分而食之今諸侯之事我寡君不如昔者蓋言語漏洩則職女之由詰朝之事爾無與焉與將執女對曰昔秦人負恃其衆貪于土地逐我諸戎恵公蠲其大徳謂我諸戎是四嶽之裔胄也毋是翦棄賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不貳昔文公與秦伐鄭秦人竊與鄭盟而舎戍焉于是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免自是以來晉之百役與我諸戎相繼于時以從執政猶殽志也豈敢離逷今官之師旅無乃實有所闕以攜諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不達何惡之能為不與于㑹亦無瞢焉賦青蠅而退宣子辭焉使即事于㑹成愷悌也于是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使許氏曰四卿帥師自成公始二卿列㑹自襄公始大夫張也胡氏曰季孫宿以卿為介而不使之免叔老介于宿而不敢避蓋兩失之雖晉人輕其幣而敬其使于君命使人之體豈為得哉家氏曰自是吳雖與晉疎然其于楚也兵連已久勢不得為之下更勝迭負四十五年楚無一日之寧居晉所以服鄭而楚不能與之爭者實陰受吳之賜愚按晉數㑹吳實欲倚吳以弱楚鄭方新服楚勢尚强晉亦豈敢數㑹于吳乎𫝊稱數吳而經書㑹吳𫝊稱執莒公子務婁而經書莒㑹𫝊稱將執戎子駒支范宣子辭焉使即事于㑹而經不書戎㑹此皆當以經為正二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦諸侯之大夫從晉侯伐秦以報櫟之役也晉侯待于竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人莒人先濟鄭子蟜見北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子説二子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死司馬子蟜帥鄭師以進師皆從之至于棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之左史謂魏莊子曰不待中行伯乎莊子曰夫子命從帥欒伯吾帥也吾將從之從帥所以待夫子也伯游曰吾今寔過悔之何及多遺秦禽乃命大還晉人謂之遷延之役欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位于戎路敢不恥乎與士鞅馳秦師死焉士鞅反欒黶謂士匄曰余弟不欲徃而子召之余弟死而子來是而子殺余之弟也弗逐余亦將殺之士鞅奔秦秦伯為之請于晉而復之師歸自伐秦晉侯舎新軍于是知朔生盈而死盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舎之陳氏曰諸侯之大夫從晉伐秦而悼不自將諸侯之師及涇不濟荀偃欒黶二帥争而大還晉人謂之遷延之役是故伐秦之役不書晉侯志晉侯之怠也師氏曰以中國之盟主命諸侯以伐有罪之師猶有疑貳不一必待同盟以申誠信伐至再四方見其服况晉之㑹諸國以伐秦初非為中國以禦外域寔由攄宿恨以報私怨使諸侯㑹亦未可保其成功况委之于諸國之大夫乎謝氏曰晉士匄春㑹列國大夫㑹吳晉荀偃夏㑹列國大夫伐秦諸侯委任大夫益重而列國之權皆大夫専之矣家氏曰秦晉交兵五六十年出師無紀未有甚于此者晉悼待于境上而諸帥略無所稟姑息之弊也晉自是始不能軍日趨于削奚其為霸己未衛侯出奔齊衛獻公戒孫文子甯恵子食皆服而朝日旰不召而射鴻于囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使太師歌巧言之卒章太師辭師曹請為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑于戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆將如之何對曰君制其國臣敢奸之雖奸之庸知愈乎遂行從近闗出公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行于孫子孫子又殺之公出奔齊孫氏追之敗公徒于阿澤鄄人執之初尹公佗學射于庾公差庾公差學射于公孫丁二子追公公孫丁御公子魚曰射為背師不射為戮射為禮乎射兩鉤而還尹公佗曰子為師我則逺矣乃反之公孫丁授公轡而射之貫臂子鮮從公及境公使祝宗告亡且告無罪定姜曰無神何告若有不可誣也有罪若何告無舎大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔以同盟之故使瘠敢私于執事曰有君不弔有臣不敏君不赦宥臣亦不帥職增淫𤼵洩其若之何衛人使太叔儀對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之敢拜君命之辱重拜大貺厚孫歸復命語臧武仲曰衛君其必歸乎有大叔儀以守有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲寄衛侯及其復也以郲糧歸右宰榖從而逃歸衛人將殺之辭曰余不説初矣余狐裘而羔袖乃赦之衛人立公孫剽孫林父甯殖相之以聴命于諸侯衛侯在郲臧紇如齊唁衛侯衛侯與之言虐退而告其人曰衛侯其不得入矣其言糞土也亡而不變何以復國子展子鮮聞之見藏紇與之言道臧孫説謂其人曰衛君必入夫二子者或輓之或推之欲無入得乎師曠侍于晉侯晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君將賞善而刑淫養民如子盖之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神乏祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳使師保之勿使過度是故天子有公諸侯有卿卿置側室大夫有貳宗士有朋友庶人工商皂𨽻牧圉皆有親暱以相輔佐也善則賞之過則匡之患則救之失則革之自王以下各有父兄子弟以補察其政史為書瞽為詩工誦箴諫大夫規誨士𫝊言庶人謗商旅于市百工獻藝故夏書曰遒人以木鐸徇于路官師相規工執藝事以諫正月孟春于是乎有之諫失常也天之愛民甚矣豈其使一人肆于民上以從其淫而棄天地之性必不然矣髙氏曰其不名者乃所以罪林父也人臣逐君而専罪其君則是臣可逐其君矣不可以訓故不名衛侯所以抑强臣存大義也鄭伯突衛侯朔皆以不勝强臣而出奔而名者盖逐君之惡未有若林父者鄭厲公衛恵公猶以禮去者也謝氏曰臣無逐君之道故君雖見逐春秋亦以自出奔為文胡氏曰衛甯殖將死語其子曰吾得罪于君名在諸侯之策曰衛孫林父甯殖出其君夫所謂諸侯之䇿則晉之乗魯之春秋是也今春秋書衛侯出奔齊而不曰孫林父甯殖出其君者盖仲尼筆削不同舊史之文也欲知經之大義深考舊文筆削之不同其得之矣家氏曰春秋于弑君賊則明著其誅死之罪于逐君賊則每垂人君失馭之戒故多以自奔為文只以衛事而言林父者自衛定公時以罪奔晉挾盟主之令而反其國跋扈之萌已兆于此衛獻繼世不深思按御之道防患于未萌又從而激之方其命師曹歌巧言卒章吾謂其必有為先事之備及林父稱兵犯上一朝殺四公子衛獻請盟不從遂委宗社以出其不能君甚矣春秋以自奔為文者著人君失御之戒非以林父所為為是而歸過其君略賊氏名而不書也春秋自林父歸衛至入戚以叛具書不遺皆所以討也非謂林父有可原之情也莒人侵我東鄙髙氏曰報入鄆也莒自滅鄫之後凡四伐我是無晉也楚公子貞帥師伐吳楚子為庸浦之役故子囊師于棠以伐吳吳不出而還子囊殿以吳為不能而弗儆吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜榖楚子囊還自伐吳卒將死遺言謂子庚必城郢髙氏曰吳數㑹中國以議楚楚人病吳伐强以自存在兵法所謂以攻為守者也夫惟吳楚正相攻此中國所以小寧也冬季孫宿㑹晉士匄宋華閲衛孫林父鄭公孫蠆莒人邾人于戚晉侯問衛故于中行獻子對曰不如因而定之衛有君矣伐之未可以得志而勤諸侯君其定衛以待時乎冬㑹于戚謀定衛也家氏曰觀春秋經而知晉悼心術之㣲矣邢丘之㑹國君在而奬其臣彼謂諸國之權皆在大夫故以是諂其大夫而陵替之漸遂徧于中國至戚之㑹而其心術之㣲者著于事矣孫林父逐君賊也乃使之得與于㑹是奬其逐君而教諸侯之大夫俾胥而為逆吁其險哉自悼用師于鄭衛衎無㑹不在無戰不從今為其臣所逐晉當㑹諸侯納衛君罪孫甯以伸霸討乃盟主職分之所宜為既不能然反聴賊立君已為㑹以定其位隳壊名檢苟以悦人世未有若晉悼君臣之所為也髙氏曰是嵗諸國之大夫凡三出㑹或每㑹各一卿或一卿三與㑹各隨其國而已十有五年春宋公使向戍來聘且尋盟二月己亥及向戍盟于劉泰山孫氏曰劉魯地許氏曰不盟于國而盟于劉以崇向戌公弱甚矣髙氏曰凡因來聘而盟者必在國内如成三年晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟十一年晉侯使郤犨來聘己丑及郤犨盟襄七年衛侯使孫林父來聘壬戌及孫林父盟是也劉蓋王畿采地豈有來聘魯而逺盟于劉者乎蓋下文有劉夏因𫝊者以為春夏之夏與文四年夏逆婦姜于齊同文故誤增于劉二字耳二説未知孰是劉夏逆王后于齊十二年靈王求后于齊齊侯問對于晏桓子桓子對曰先王之禮辭有之天王求后于諸侯諸侯對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人齊侯許昬王使陰里結之十四年王使劉定公賜齊侯命曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海王室之不壊繄伯舅是賴今余命女環兹率舅氏之典纂乃祖考無黍乃舊敬之哉無廢朕命至是官師從單靖公逆王后于齊穀梁氏曰過我故志之也任氏曰天子之公書公宰周公是也卿書伯召伯毛伯是也大夫書字宰渠伯糾是也劉夏書名士也髙氏曰劉夏何以不稱使不與天王之使夏也婚姻人倫之本王后天下之母天子不親迎必使三公逆之劉夏士也士而迎后是不重人倫之本不尊天下之本禮義何由而興風化何由而成乎夫合二姓之好以繼先聖之後以為天地宗廟社稷之主其可輕耶自漢而後皇后見天子則降階而朝自稱曰妾敗壊禮義莫甚于此天子總陽教后總陰教以共成天下之治而輕其人是輕宗廟社稷天地也胡氏曰或曰天子必親迎信乎天子無敵于天下雖諸父昆弟莫不臣適四方諸侯莫敢有其室若屈萬乗之尊逺行親迎之禮則何無敵于天下之有或曰王后所與共事天地宗廟繼萬世之重者其禮當何如使同姓諸侯主其辭命卿徃逆公監之父母之國諸卿皆送至于京師舎而止然後天子親迎以入其納王后之禮乎官師從單靖公逆王后于齊書劉夏而不書靖公是知卿徃逆公監之禮也春秋婚姻常事得禮者不書髙郵孫氏曰春秋二百四十二年周王十三其逆后者惟二足知非禮則書之也夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛夏齊侯圍成貳于晉故也于是乎城成郛髙郵孫氏曰齊圍成而公救之至遇而不進于經可以言次也然而但曰至遇而不曰次蓋春秋不責人以所不能原襄公之情失之于前故不加之于後也書救成至遇以見其不敢抗强齊而自取危亡也家氏曰前書齊侯圍成公救成至遇言救之之緩而成為齊所毁也後書二大夫帥師城成郛于既毁之之後也冦之未至也無先事之備及其見圍救之又緩逮其亡去乃帥師而城之魯之所以自治其國者于此可見矣秋八月丁巳日有食之邾人伐我南鄙使告于晉晉將為㑹以討邾莒晉侯有疾乃止髙氏曰邾將貳于晉以與齊故來伐我許氏曰政在君則民一民一則國强政在臣則民二民二則國弱魯自成襄失政大夫並竊國靈齊邾莒交伐其國不競甚矣無他民分于三桓故也冬十有一月晉侯周卒朱子曰晉悼公幼年聰恵似周世宗厲公弑晉室大段費力及悼公歸恰如久雨積陰忽遇大晴光景為之一新東萊吕氏曰晉恵公未入之初許賂中大夫惟恐不得入悼公先與羣臣要約而後入是知霸業之所以興者一則明要約如悼公初入之言曰二三子用我今日否亦今日等言是也二則立威令如逐不臣者七人是也三則布恩恵施舎己責是也四則定規模如命荀家等使訓卿之子弟恭儉孝弟是也五則舉賢才如六官之長舉不失徳是也晉悼公之所以霸其規模根本在此樸鄉吕氏曰甚矣悼公再霸之難也晉楚所争者二其一陳也其一鄭也悼公紹文襄之烈凡有盟㑹諸侯麇至向也鄭從楚城虎牢而鄭始服向也陳從楚盟雞澤而陳來㑹自是陳鄭即中國矣而楚人仇于陳鄭者亦如之是故再㑹于戚為戍陳也而楚子貞為是伐陳諸侯于是有救陳之師又明年公子貞圍陳諸侯于是有鄬之㑹凡以爭陳也鄭侵蔡而獲公子燮則楚伐鄭鄭受盟于楚則晉伐鄭鄭同盟于戲則楚伐鄭鄭為楚伐宋則晉又伐鄭諸侯戍鄭虎牢則楚救之鄭公孫舎之侵宋則晉伐之鄭同盟于亳城北則楚師至楚子鄭伯伐宋則晉師來凡以争鄭也然而陳卒從楚而晉不能争鄭則從晉而楚不能爭何也無他鄭近晉陳近楚也觀范宣子之言曰楚人討貳而立子囊必改行而疾討陳陳近于楚民朝夕急能無徃乎有陳非吾事無之而後可吁此晉之所以不能爭陳歟觀子展之謀曰吾與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晋能驟來楚將不能吾乃固與晉吁此楚之所以不能争鄭歟夫惟陳近于楚而民朝夕急也故其望于晉也緩夫惟晉能驟來而楚將不能也故其從于晉也急自鄬之㑹陳侯逃歸而中國之㑹盟不復有陳自蕭魚之㑹鄭伯實與而楚之威令不能行于鄭者二十年由此故也夫以悼公再伯之烈其所可稱道者不過蕭魚之㑹而止以盟則不能如屈完之來以服其心以戰則不能如城濮之師以讋其氣然以荆楚方强子囊為政而凛然有憚晉之心雖或時帥師徒以示不怯而卒不敢以陵駕中國者豈無故哉觀子囊之言今吾不能與晉争晉君類能而使之舉不失選官不易方其卿遜于善其大夫不失守其士競于教其庶人力于農穯商工皂𨽻不知遷業君明臣忠上遜下競當是時也晉不可敵然則晉悼之所以服楚固有道矣然嘗評悼公之伯而獨于㑹吳之事深不滿焉悼公之所以急于㑹吳者固將以撓楚也然吳猶楚也急于撓楚之謀而不知適以啟吳人之釁楚患雖㣲吳憂方大異時駸駸强盛以致黃池之㑹儼然為两伯以臨諸侯而春秋終矣是悼公之為也不亦可惜也哉抑悼公之所以為大失者尤在于大夫之専也雞澤之㑹諸侯寔在而使大夫盟甚至于邢丘之㑹大夫得以㑹諸侯而向之㑹則直以大夫而已以悼公之賢而不能抑大夫之専又從而張之是將誰咎哉至于鄫嘗預㑹而聴莒人之滅鄫莒魯同盟而不恤莒人之仇魯進齊世子光于諸侯之上而不知班序之亂者無他急于得陳不暇恤鄫魯之怨喜齊世子之先朝則雖躋之諸侯之上不顧也盖其設心措慮全在制楚而其他皆未之及此所以不能如桓文之盛歟十有六年春王正月葬晉悼公愚按諸侯五月而葬國有常典夫欲㑹諸侯而速葬其親于所厚者薄矣背禮違道莫斯為甚世有王者將致討焉又何以為盟主而令諸侯乎宜晉覇之不競也三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于湨梁戊寅大夫盟晉人執莒子邾子以歸平公即位羊舌肸為𫝊張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乗馬御改服修官烝于曲沃警守而下㑹于溴梁命歸侵田以我故執邾宣公莒黎比公且曰通齊楚之使晉侯與諸侯宴于温使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸于是叔孫豹晉荀偃宋向戌衛甯殖鄭公孫蠆小邾人之大夫盟曰同討不庭髙氏曰為討邾莒也邾莒連伐魯魯使告于晉悼公將為㑹以討之遇疾而止平公即位遂成父志夫居䘮而出㑹失盟主之禮矣公羊氏曰諸侯皆在而言大夫盟徧刺天下之大夫也君若贅旒然穀梁氏曰諸侯失正矣諸侯㑹而曰大夫盟政在大夫也諸侯在而不曰諸侯之大夫大夫不臣也胡氏曰上二年春正月㑹于向十有四國之大夫也夏四月㑹伐秦十有三國之大夫也冬㑹于戚七國之大夫也此三事皆國之大事也而使大夫皆専之而諸侯不與焉是列國之君不自為政禮樂征伐已自大夫出矣况悼公既沒平公初立無先公之明也君若贅旒而大夫張夫豈一朝一夕之故哉謝氏曰溴梁之㑹二國受盟非違命也平公首令諸侯而不以其罪執之失政刑矣晉侯奪爵書人貶之也二子罪非在所絶也執以歸則非屈辱于晉也故雖失位不名家氏曰執諸侯不以歸京師而執以自歸是無王也陳氏曰凡霸在焉而但書諸侯者無霸也君在焉而但書大夫者無君也是故自文而下則有斥言諸侯而不序自襄而下則有斥言大夫而不序愚按邾莒數為魯患故晉人為溴梁之盟當申以文告之辭使之救災恤患以相親睦毋背盟失信而相侵伐至于不悛然後興師問罪以大義責之可也夫既列于㑹矣又使大夫盟矣而執二君以歸至于髙厚逃歸齊人伐魯則置而不敢問豈霸主所以令諸侯乎宜諸國之解體也齊侯伐我北鄙廣陵髙氏曰齊既叛晉聞公在㑹將討邾莒故復來伐北鄙是時齊侯益强自柯陵之㑹遂不復出但使大夫聴命使世子抗禮出㑹盖有輕諸侯之心矣故前年北鄙之役為莒伐我邾附齊故亦伐我南鄙晉患齊之益驕于是為溴梁之㑹以討貳焉邾莒畏晉不敢不㑹而齊獨不至故晉人乃執二君以歸齊知二君之執為我之故乃益伐我二年之間齊師五至魯城之下則其强暴可知夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衛甯殖宋人伐許許男請遷于晉諸侯遂遷許許大夫不可晉人歸諸侯鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公齊子帥師㑹晉荀偃夏六月次于棫林庚寅伐許次于圅氏晉荀偃欒黶帥師伐楚以報宋揚梁之役楚公子格帥師及晉師戰于湛阪楚師敗績晉師遂侵方城之外復伐許而還髙氏曰許既棄楚請遷于晉既而不果故晉㑹諸侯大夫同伐之鄭與許有宿怨故其君親行鄭序晉上者卿不先諸侯尊國君也宋之稱人蓋㣲者宋在諸國之上今列衛甯殖之下故知其㣲者焉張氏曰許男有從中國之志而大夫阻之足以見一時之俗矣家氏曰始晉人謀遷許將以安全之也今而伐之又聴鄭人以其師從鄭與許為讐晉以鄭師伐許將安全之乎抑覆亡之乎越後十年許卒報鄭秋齊侯伐我北鄙圍成孟孺子速徼之齊侯曰是好勇去之以為之名速遂塞海陘而還大雩冬叔孫豹如晉且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾于敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶㡬乎比執事之間恐無及也見中行獻子賦圻父獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此見范宣子賦鴻雁之卒章宣子曰匄在此敢使魯無鳩乎愚按邾莒伐魯魯人來告則速葬為㑹以執二國之君齊人伐魯魯人來告則以未禘為辭而不敢問晉之畏强欺弱無能抑至于此而望其為霸不亦難乎家氏曰春秋于齊侯圍成之後書叔孫豹如晉著魯人不為自治之計事急則求于晉以是而存亡定傾亦甚可鄙矣春秋闕疑卷三十
