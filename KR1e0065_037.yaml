body:
  text: 春秋闕疑卷三十七元鄭玊撰十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈曰不用吾言鄭又將火鄭人請用之子産不可太叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信遂不與亦不復火鄭之未災也里析告子産曰將有大祥民震動國幾亡吾身泯馬弗良及也國遷其可乎子産曰雖可吾不足以定遷矣及火里析死矣未葬子産使輿三十人遷其柩火作子産辭晉公子公孫于東門使司冦出新客禁舊客勿出于宫使子寬子上巡羣屛攝至于大宫使公孫登徙大龜使祝史徙主祏于周廟告于先君使府人庫人各警其事商成公警司宫出舊宫人置諸火所不及司馬司寇列居火道行火所焮城下之人伍列登城明日使野司冦各保其徵郊人助祝史除于國北禳火于玄冥回祿祈于四鄘書焚室而寬其征與之材三日哭國不市使行人告于諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也公羊氏曰何以書記異也何異爾異其同日而俱災外異不書此何以書為天下記異也胡氏曰禆竈所言蓋以象推非妄也而鄭不復火者子産當國方有令政此以德銷變之驗矣是知吉凶禍福固有可移之理古人所以必先人事而後言命也家氏曰星孛之應逺者十年近者數歲示人以象使之知所驚懼安可指一事之偶應而遂謂上天譴告止于是而已哉是時諸夏亂亡已兆世卿強族脅制其上胥為不軌周室浸微大亂將作春秋降為戰國此其兆也夫豈四國火災之謂歟如申須梓慎禆竈之言將使人主以火災塞天變無復恐懼修省之實矣六月邾人入鄅六月鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑于邾邾莊公反鄅夫人而舍其女秋葬曹平公冬許遷于白羽楚左尹王子勝言于楚子曰許于鄭讐敵也而居楚地以不禮于鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專于楚鄭方有令政許曰余舊國也鄭曰余俘邑也葉在楚國方城外之蔽也土不可易國不可小許不可俘讐不可啓君其圖之楚子説冬楚子使王子勝遷許于析實白羽家氏曰楚人以晉鄭方睦恐以許召冦迫而遷之自是又遷容城不二十年許為鄭所滅楚固大不義許棄中國而從夷狄卒以是亡其亦有以自取矣十有九年春宋公伐邾鄅失人宋向戌之女也故向寧請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘邾人郳人徐人會宋公乙亥同盟于蟲胡氏曰宋公伐邾圍蟲取之而經不書圍與取何也所謂聲罪執言之兵歸鄅之俘其意善也故書伐邾而釋其取邑之罪此亦善善長惡惡短之義家氏曰是時晉已失霸強陵弱大侵小莫之或禁邾蕞爾小國間鄅人之不備襲入其國執其君據有其土晉不能治而宋治之春秋是以與之夏五月戊辰許世子止弒其君買許悼公瘧五月戊辰飲太子止之藥卒大子奔晉左氏曰書曰弒其君君子曰盡心力以事君舍藥物焉可也故先儒以為止不嘗藥加以大惡而不得辭今愚以傳考之飲止藥而卒則是進毒以鴆其父矣父死而奔則是弒君而避討矣茍非其弒父死之後居喪即位自有常禮豈有棄父之喪而奔他國者乎左氏因史無弒父之文而有飲藥之語又從而推之曰盡心力以事君舍藥物可也于是公羊穀梁益得以肆其支離之説而許止弒父之迹幾泯矣永嘉薛氏曰止以藥弒蓋得之矣乙卯地震秋齊高發帥師伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託于紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀冬葬許悼公朴鄊吕氏曰傳例弒君而賊不討者不書葬通于經則不可被弒之君多不書葬者或彼國方有事變雖葬我畏其亂無使往會之豈有賊未討則不書葬耶此二傳妄為之説也且蔡世子般弒其君固何般未討而固亦書葬耶觀許悼公弒而書葬非他蓋變生于內而不及國又般止欲沒其弒逆之迹具禮葬其父我有使往會故書葬焉二十年春王正月夏曹公孫會自鄸出奔宋穀梁氏曰自鄸者專乎鄸也曹無大夫其曰公孫何也言其以貴取之而不以叛也劉氏曰會者子臧之子鄸其采邑也凡奔未有言自者此其言自鄸蓋大夫有罪自歸其邑以待放也凡大夫待罪于邑君賜之環則還賜之玦則去然春秋之時臣能專其邑無不叛其國能使其衆無不要其君以臧武仲之知猶據防以求後于魯是以孔子譏之以為大亂之道也故深察夫公孫會之自鄸奔宋以其賢于臧武仲逺矣故春秋因其奔而書自鄸以别之秋盜殺衛侯之兄縶衛公孟縶狎齊豹奪之司冦與鄄有役則反之無則取之公孟惡北宫喜禇師圃欲去之公子朝通于襄夫人宣薑懼而欲以作亂故齊豹北宫喜褚師圃公子朝作亂初齊豹見宗魯于公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子而歸死于公孟其可也丙辰衛侯在平夀公孟有事于蓋獲之門外齊子氏帷于門外而伏甲焉使祝蛙置戈于車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘二車及公宫鴻駵魋駟乘于公公載寶以出褚師子申遇公于馬路之衢遂從過齊氏使華寅肉袒執蓋以當其缺齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥析朱鉏宵從竇出徒行從公齊侯使公孫青聘于衛既出聞衛亂使請所聘公曰猶在竟內則衛君也乃將事焉遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賔曰寡君命下臣于朝曰阿下執事臣不敢二主人曰君若惠顧先君之好照臨敝邑鎮撫其社稷則有宗祧在乃止衛侯固請見之不獲命以其良馬見為未致使故也衛侯以為乘馬賔將掫主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賔曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也臣懼不免于戾請以除死親執鐸終夕與于燎齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟于彭水之上秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玊霄子高魴出奔晉閏月戊辰殺宣薑衛侯賜北宫喜諡曰貞子賜析朱鉏諡曰成子而以齊氏之墓豫之衛侯告寧于齊且言子石齊侯將飲酒遍賜大夫曰二三子之教也苑何忌辭曰與于青之賞必及于其罰在康誥曰父子兄弟罰不相及况在羣臣臣敢貪君賜以于先王琴張聞宗魯死將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉君子不食姦不受亂不為利疚于回不以回待人不蓋不義不犯非禮胡氏曰左氏以為齊豹殺之其書為盜所謂求名而不得者也切以為仲尼書斷此獄罪在宗魯宗魯孟縶之驂乘也于法應書曰盜非求名而不得者也天下豈有欲求險危大人之惡名而聖人又靳此名而不與者哉然則齊豹首謀作亂宗魯雖預聞行事又以身死之矣今乃釋豹不誅而歸獄于宗魯不亦頗乎曰豹之不義夫人皆知之也若宗魯欲周事豹而死于宗孟蓋未有知其罪者故琴張聞其死將往弔之仲尼曰齊豹之盜孟縶之賊汝何弔焉非聖人發其食姦受亂蓋不義犯非禮之罪書于春秋則齊豹所畜養之盜孟縶所見殺之賊其大惡隱矣師氏曰鶺鴒羽族也詩人取以况兄弟之急難唐棣百卉也詩人取以喻兄弟之依托今衛侯身享一國之權寵而不能保一兄俾盜得以殺之能無愧于鶺鴒唐棣乎雖然自政刑論之在衛侯可愧矣向使其兄不為非禮而小人不能近則盜亦無從殺之經書衛侯之兄縶兩譏之也冬十月宋華亥向寧華定出奔陳宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈于死先諸華亥偽有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行于其廪公如華氏請焉弗許遂劫之癸卯取太子欒與母弟辰公子地為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質公子城公孫忌樂舍司馬疆向宜向鄭楚建郳申出奔鄭其徒與華氏戰于鬼閻敗子城子城適晉華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請于華費遂將攻華氏對曰臣不敢愛死無乃求去憂而滋長乎臣是以懼敢不聽命公曰子死亡有命余不忍其詬冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇牼以歸曰子之齒長矣不能事人以三公子為質必免公子既入華牼將自門行公遽見之執其手曰余知而無罪也入復而所陳氏曰于是公子城公孫忌奔鄭華亥向寧華定奔陳則其但書三子何凡奔罪也衆不可以勝罪則書其甚焉者爾入南里以叛乞師于楚為宋患之日久是以甚三子也城忌公之黨也十有一月辛卯蔡公廬卒二十有一年春王三月葬蔡平公蔡大子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子嘆曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈今蔡侯始即位而適卑身將從之夏晉侯使士鞅來聘晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢許氏曰禮好不結而財求無度則聘義亡矣蓋自是聘不復志宋華亥向寧華定自陳入于宋南里以叛宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人亟言之公曰司馬以吾故亡其良子死亡有命吾不可以再亡之對曰君若愛司馬則如亡死如可逃何逺之有公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之公飲之酒厚酬之賜及從者司馬亦如之張丐尤之曰必有故使子皮承宜僚以劍而訊之宜僚盡以告張丐欲殺多僚子皮曰司馬老矣登之謂甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩殺多僚劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之穀梁氏曰自陳陳有奉焉爾入者內弗受也以者不以者也胡氏曰凡書叛有入于戚者而不言衛有入于朝歌者而不言晉有入于蕭者而不言宋此獨稱宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居盧門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君已甚之辭也謝氏曰三卿雖以大罪出奔然華氏蟠踞要職者皆在費遂為大司馬貙為少司馬多僚為御士皆華氏之內應也華向之奔也上無討賊之師下有援賊之黨欲使奔者不復為亂難矣此三卿所以鬬于腹心之地也秋七月壬午朔日有食之八月己亥叔輒卒冬蔡侯朱出奔楚費無極取貨于東國而謂蔡人曰朱不用命于楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴于楚楚子將討蔡無極曰平侯與楚有盟故封其子有二心故廢之靈王殺隱大子其子與君同惡德君必甚又使立之不亦可乎且廢置在君蔡無他矣師氏曰甚矣朱之無知也自楚犯中國而蔡侯從之非一日既而蔡侯般為楚子所殺其世子有又被其毒蔡由是中滅幸乘公子棄疾亂楚蔡侯廬得歸而蔡國復立及蔡侯廬死而朱立朱幾又不容于其國不得已而出奔奔之他國猶可也豈有奔于不共戴天之國乎其無知甚矣公如晉至河乃復公如晉及河鼓叛晉晉將伐鮮虞故辭公二十有二年春齊侯伐莒春王二月甲子齊北郭啓帥師伐莒莒子將戰苑羊牧之諫曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師于夀餘齊侯伐莒莒子行成司馬竈如莒涖盟莒子如齊涖盟盟于稷門之外莒于是乎大惡其君宋華亥向寧華定自宋南里出奔楚二十一年冬十月華登以吳師救華氏齊烏枝鳴戍宋厨人濮曰軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師于鴻口獲其二帥公子苦雂偃州員華登帥其餘以敗宋師公欲出厨人濮曰吾小人可藉死而不能送亡君請待之乃徇曰揚徽者公徒也衆從之公自揚門見之下而巡之曰國亡君死二三子之恥也豈專孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍華氏北復即之厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏于新里翟僂新居于新里既戰説甲于公而歸華姓居于公里亦如之十一月癸未公子城以晉師至曹翰胡會晉荀吳齊苑何忌衛公子朝救宋丙戌與華氏戰于赭丘鄭翩願為鸛其御願為鵝子祿御公子城莊堇為右于犨御吕封人華豹張丐為右相遇城還華豹曰城也城怒而反之將注豹則關矣曰平公之靈尚輔相余豹射出其間將注則又關矣曰不狎鄙抽矢城射之殪張丐抽殳而下射之折股扶伏而擊之折軫又射之死于犨請一矢城曰余言女于君對曰不死伍乘軍之大刑也干刑而從子君焉用之子速諸乃射之殪大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣貙曰子無我迋不幸而後亡使華登如楚乞師華貙復入楚薳越帥師將逆華氏大宰犯諌曰諸侯唯宋事其君今又爭國釋君而臣是助無乃不可乎王曰而告我也後既許之矣至是楚薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞寡君請受而戮之對曰孤不佞不能媚于父兄以為君憂抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不𠂻以奬亂人孤之望也唯君圖之楚人患之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已救宋而除其害又何求乃固請出之宋人從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚宋公使公孫忌為大司馬邊卬為大司徒樂祁為司城仲幾為左師樂大心為右師樂挽為大司寇以靖國人胡氏曰華向誘殺羣公子又劫其君取其太子母弟為質又求助于吳楚使之入披其國都以叛此必誅不赦之罪也宋宜竭力必討之于內諸侯冝竭心必救之于外楚子冝執叛臣之使而戮之于境今楚人釋君而臣是助諸侯之戍怠于救患固請逸賊而宋又從之則皆罪也故晉荀吳齊苑何忌衛公子朝曹大夫皆略而不書其曰自宋南里者譏宋之縱釋有罪不能致討出奔楚者不待貶絶而亢不𠂻奬亂人之惡自見矣大搜于昌間胡氏曰昭公之時凡三書搜或以非其時或以非其地而大意在權臣專行公不與也三綱軍政之本古者春搜夏苗秋獮冬狩皆于農隙以講事而所主者明貴賤辨等列順少長習威儀則皆納民于軌物而非馳射擊刺之末矣今魯君則設兩觀乘大輅其臣則八佾舞于庭旅泰山以雍徹其宰則據大都執國命而軍政之本亡矣何以搜為此春秋所書為後戒之意也夏四月乙丑天王崩六月叔鞅如京師葬景王泰山孫氏曰以天子之尊三月而葬此諸侯之不若也王室亂十五年六月王太子夀卒秋八月王穆后崩十二月晉荀躒如周葬穆后籍談為介既葬除喪以文伯宴樽以魯壺王曰伯氏諸侯皆有以鎮撫王室晉獨無有何也文伯揖籍談對曰諸侯之封也皆受明器于王室以鎮撫其社稷故能薦彜器于王晉居深山戎狄之與鄰而逺于王室王靈不及拜戎不暇其何以獻器王曰叔氏而忘諸乎叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也闕鞏之甲武所以克商也唐叔受之以處參虛匡有戎狄其後襄之二路鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田撫征東夏非分而何夫有勳而不廢有績而載奉之以土田撫之以彜器旌之以車服明之以文章子孫不忘所謂福也福祚之不登叔父焉在且昔而高祖孫伯黶司晉之典籍以為大政故曰籍氏及辛有之二子董之晉于是乎有董史女司典之後也何故忘之籍談不能對賓出王曰籍父其無後乎數典而忘其祖歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉于是乎以喪賔宴又求彜器樂憂甚矣且非禮也彜器之來嘉功之由非由喪也三年之喪雖貴遂服禮也王雖弗遂宴樂以早亦非禮也禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將焉用之至是王子朝賔起有寵于景王王與賔孟説之欲立之劉獻公之庶子伯蚠事單穆公惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異于是犧者實用人人犧實難已犧何害王弗應夏四月王田北山使公卿皆從將殺單子劉子王有心疾乙丑崩于榮錡氏戊辰劉子摯卒無子單子立劉蚠五月庚辰見王遂攻賔起殺之盟羣王子于單氏丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂帥郊要餞之甲以逐劉子壬戌劉子奔揚單子逆悼王于莊宫以歸王子還夜取王以如莊宫癸亥單子出王子還與召莊公謀曰不殺單旗不捷與之重盟必來背盟而克者多矣從之樊頃子曰非言也必不克遂奉王以追單子及領大盟而復殺摯荒以説劉子如劉單子亡乙丑奔于平畤羣王子追之單子殺還姑發弱鬷延定稠子朝奔京丙寅伐之京人奔山劉子入于王城辛未鞏簡公敗績于京乙亥甘平公亦敗焉叔鞅至自京師言王室之亂也閔馬父曰子朝必不克其所與者天所廢也臨江劉氏曰何言乎王室亂亂自內作者也謝氏曰太子天下之本也建儲立嫡所以正太子之位也太子之位正則嫡庶之分明而爭亂之源塞矣古者朝委裘而天下不亂者此道素明也王子猛王之嫡子也王子朝王之庶子也猛以嫡當繼而王不正其位朝以庶怙寵而王不制其失以致儲宫不定而姦臣異心故景王之葬方畢而王室爭奪之亂作矣劉單以公義輔正而尊猛尹氏以私心黨庶而尊朝內外出入戰鬭五年而後定春秋書王室亂以明亂自景王為之也胡氏曰其言王室亂譏國本之不正也春秋書子同生于前而記王室亂于後其為來世法戒明矣高氏曰春秋記事必指其實下書王猛子朝之事自足以見王室之亂而聖人乃于此不隱其辭直云爾何哉前此王室衰微猶未至于亂也故聖人每扶而尊之言王則曰天王不混稱于吳楚也言周則曰京師不下同于列國也王敗于鄭而書蔡人衛人陳人從王伐鄭以諸侯不可敵王故明君臣之大義也王與戎戰而書王師敗績于茅戎以夷狄不可敵王故以自敗為文也以至襄王出奔而書天王出居于鄭晉侯召王而書天王狩于河陽王臣雖微者亦序于諸侯之上則所以嚴其名分者至矣故凡王室可譏可貶者皆遷就其辭而為之隱避今景王不能正其家而致諸子之爭立于是尹氏召伯毛伯欲立子朝而劉子單子欲立王猛二子相爭遂以干戈相向迭勝迭負五年之間國無定主王室之亂莫此為甚故特書之然莊二十年惠王有子頺之亂僖二十四年襄王有子帶之亂春秋不書王室亂何獨于此乎書惠襄二王亂不在已今景王之亂乃自取之是王室自亂蓋有甚于惠襄者嗚呼王室者諸夏之本也聖人于此所以特書王室亂者深悼周之不復興且罪諸侯之不一救也豈特識叔鞅之言而已哉劉子單子以王猛居于皇單子欲告急于晉秋七月戊寅以王如平畤遂如圃車次于皇劉子如劉單子使王子處守于王城盟百工于平宫辛卯鄩肸伐皇大敗獲鄩肸壬辰焚諸王城之市八月辛酉司徒醜以王師敗績于前城百工叛己巳伐單氏之宫敗焉庚午反伐之辛未伐東圉高氏曰皇畿內之邑不言出而言居者猛所得有也未踰年而稱王示當立也其名之明雖有當立之義未能自定也君前臣名劉單不名而王名不嫌于倒置乎曰君前臣名常禮也禮當其變臣有不名而名其君不嫌者矣惟可與權者能變而不越乎中許氏曰其稱王猛未即位也顧命康王當喪稱王而猛以王繫之者書志事春秋書法也胡氏曰凡稱以者不以者也師而曰以能左右之也地而曰以能取與之也人而曰以能死生之也尊不以乎卑貴不以乎賤大不以乎小劉蚠單旗臣也曷為能以王猛乎猛無寵于景王不能自定其位制在劉單其曰以者能廢立之也按景王大子壽以昭十五年卒至是八年矣猛與丐皆其母弟無疑于當立然久而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子爭欲立以正則有猛以寵則有朝猛雖正而無寵其威不足以懾羣下朝雖寵而不正其分不足以服人心二子廢立皆恃大臣強弱而後定者也故特書曰以而景王之弱其後嗣輕其宗社之罪亦著矣秋劉子單子以王猛入于王城冬十月丁巳晉籍談荀躒帥九州之戎及焦瑕溫原之師以納王于王城庚申單子劉蚠以王師敗績于郊前城人敗陸渾于社高氏曰入者難辭子朝之黨在焉故言入愚按再書劉子單子以王猛入于王城書之重辭之復所以責景王寵庶亂嫡致使其子廢立之權在于臣下身死國亂幾亡社稷為後世戒也夫王猛嫡也子朝庶也猛當立而朝不當立無可議者猛既入于王城為劉單者所宜告之宗廟號召諸侯數子朝篡立之故明尹氏為亂之由聲其罪而誅之則王室定矣今徒能挾王猛而與之爭不能明大義以致其討斯則劉單之失計也不曰京師而曰王城者言京師則徒見其為衆大之稱而已未見其為王者之居也故曰王室曰王猛曰王城皆所以明其當為王也然則言京師者婉辭也不敢斥言之也言王城者直辭也所以尊言之也冬十月王子猛卒敬王即位館于子旅氏十二月庚戌晉籍談荀躒賈辛司馬督帥師軍于隂于侯氏于溪泉次于社王師軍于汜于解次于任人閏月晉箕遺樂徵右行詭濟師取前城軍其東南王師軍于京楚辛丑伐京毁其西南泰山孫氏曰其曰王子猛者言王所以明當嗣之人也言子所以見未踰年之君也言猛所以别羣王子也不崩不葬者降成君也蘇氏曰猛既稱王猛矣于其卒也稱王子猛何也春秋書名嚴于卒葬于其卒不得不正其本名也所謂非葬非薨名有所不必盡也陳氏曰王猛矣則其曰王子猛何于其卒從其恆稱爾春秋之義茍廢立也足以亂名實則不可不辨茍非廢立也無亂于名實則弗辨也是故成之為君稱王猛于其卒也從其恆稱為王子猛謝氏曰劉子單子以立正為心可謂忠于王室矣然下不能合師旅以除逆惡上不能伸社稷大義以正王位乃以王子乘間入于王城終不得其志而辛可見二子無定難之才也十有二月癸酉朔日有食之春秋闕疑卷三十七
