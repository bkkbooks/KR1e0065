body:
  text: 春秋闕疑卷二十九元鄭玉撰七年春郯子來朝始朝公也夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也榖梁氏曰夏四月不時也乃者亡乎人之辭家氏曰魯人僭郊初無定時卜吉而後舉行是以羣公之郊有先後早晚之不同春秋因其卜之不吉書之以示戒云耳小邾子來朝亦始朝公也城費南遺為費宰叔仲昭伯為隧正欲善季氏而求媚于南遺謂遺請城費吾多與而役故季氏城費胡氏曰文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠于公室而不顧其所食之私邑也及行父卒宿之不忠遂専魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至于帥師墮費其越禮不度可知矣然則書城費乃履霜堅冰之戒強私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉秋季孫宿如衛報子叔之聘且辭緩報非二也八月螽冬十月衛侯使孫林父來聘壬戌及孫林父盟衛孫文子來聘且拜武子之言而尋孫桓子之盟公登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子無辭亦無悛容楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬楚子囊圍陳會于鄬以救之謝氏曰楚師圍陳三月矣而諸侯方會于鄬以諸侯畏楚出救之緩也不書救陳著救陳之不力也鄭伯髠頑如會未見諸侯丙戌卒于鄵鄭僖公之為太子也于成之十六年與子罕適晉不禮焉又與子豐適楚亦不禮焉及其元年朝于晉子豐欲訴諸晉而廢之子罕止之及將會于鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯簡公生五年奉而立之八年春鄭羣公子以僖公之死也謀子駟子駟先之夏四月庚辰辟殺子狐子熙子侯子丁孫擊孫惡出奔衛公羊氏曰鄭伯會諸侯于鄬其大夫諫曰中國不足歸也則不若與楚鄭伯曰不可其大夫曰以中國為義則伐我喪以中國為強則不若楚于是弒之不言大夫弒之為中國諱也穀梁氏曰鄭伯將會中國其臣欲從楚不勝其臣弒而死不言弒不使夷狄之民加乎中國之君也愚謂君臣人道之大倫弒逆古今之大變討賊國家之大刑黨賊臣子之大惡使鄭僖公而遭弒春秋乃以卒書不幾于黨惡乎弒而以瘧疾赴當時諸侯固可欺也仲尼亦可欺乎謂弒為卒是欺天下後世也欺天下後世之事聖人為之乎魯君之弒臣子之所當諱而不忍言者猶且不地以存其實况他國之君乎設使如公穀之説鄭之諸臣欲從楚是去順效逆惡莫加焉者也僖公而欲從晉是去逆效順善莫加焉者也為善而不幸死于為惡之手聖人正當表其善使後世為善者知勸誅其惡使後世為惡者知懼豈可沒善者之迹使不彰諱惡者之事使幸免乎况春秋為誅亂臣賊子作也不曰春秋成而亂臣賊子懼今以左傳考之謂不禮其臣而遭弒以公穀二傳考之謂欲從中國而遭弒豈當時鄭伯欲從晉諸大夫欲從楚所見既已不同鄭伯又不禮其臣如會未至倉卒而卒故或者疑其遇弒聽者不察又從而傳之魯史遂書之至于聖人則是非已定知其決非弒也故從實而書卒觀聖人所書曰如會曰未見諸侯曰卒于鄵蓋深惜其有向善之心而卒不能遂其志也按諸侯卒其國都不地在師曰師在會曰會未至于師于會則地而卒亦書法之常耳陳侯逃歸陳人患楚慶虎慶寅謂楚人曰吾使公子黃往而執之楚人從之二慶使告陳侯于會曰楚人執公子黃矣君若不來羣臣不忍宗廟社稷懼有二圖陳侯逃歸謝氏曰救難之師如解焚溺以死力率諸侯赴楚救陳之道也楚之圍陳也諸侯書會鄬鄭伯書如會陳侯書逃歸晉失救陳之道由此見矣其不能保陳可知也胡氏曰穀梁子曰逃義曰逃逃者匹夫之事上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申警備立太子以固守親聽命于諸侯謀禦敵之策當是時晉君方明八卿和睦諸侯聽命必能致力于陳矣不此之顧棄儀衛而逃歸此匹夫之事耳故書逃歸以罪之八年春王正月公如晉且聽朝聘之數夏葬鄭僖公鄭人侵蔡獲蔡公子燮鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣謝氏曰蔡楚之屬也鄭不恤楚難既以不道侵蔡又以不道獲其大夫取禍之道也不書戰及敗者非敗掩不備而獲之也季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘五月甲辰會于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戍衛寧殖邾大夫會之鄭伯獻捷于會故親聽命髙氏曰邢丘之會公在晉也晉侯不與公會而與大夫會者以公幼弱政在季氏故也陪臣専而公微弱此魯之失政也晉為盟主棄其君而與臣會雖欲修文襄之業改命朝聘之數俾從儉約亦何以宗諸侯胡氏曰大夫稱人貶之也昔周公戒成王以繼自今我其立政立事夫不自為政而委于臣下是以國之利器示人而不知寶也朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人而不由德乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴梁之會悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事貶而稱人謹其始也髙郵孫氏曰所以見公之不君宿之不臣而晉侯無霸主之義公至自晉莒人伐我東鄙以疆鄫田許氏曰莒人恃逺滅鄫伐魯以姦齊盟而霸討弗及間晉方患秦楚故也秋九月大雩冬楚公子貞帥師伐鄭楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰周詩有之曰俟河之清人壽幾何兆云詢多職競作羅謀之多族民之多違事滋無成民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待于二竟以待強者而庇民焉冦不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五會之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺糧食將盡必將速歸何患焉舍之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道請從楚騑也受其咎乃及楚平使王子伯駢告于晉曰君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦以討于蔡獲司馬燮獻于邢丘今楚來討曰女何故稱兵於蔡焚我郊保馮陵我城郭敝邑之衆夫婦男女不遑啓處以相救也翦焉傾覆無所控告民死亡者非其父兄即其子弟夫人愁痛不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止不敢不告知武子使行人子員對之曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之胡氏曰齊宣王問于孟子交鄰國有道乎孟子曰唯智者為能以小事大故太王事獯鬻勾踐事吳以小事大畏天者也畏天者保其國鄭介大國之間困強楚之令而欲息肩于晉若能信任仁賢明其刑政經畫財賦以禮法自守而親比四鄰必能保其封境荆楚之大何畏焉而子耳子國加兵于蔡獲公子燮無故怒楚所謂不修文德而有武功者也楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉以晉楚爭鄭自兹弗得寧矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書以見鄭之屈服于楚而不信也犧牲玉帛待於境上以待強者而請盟其能國乎晉侯使士丐來聘且拜公之辱告將用師于鄭公享之宣子賦摽有梅季武子曰誰敢哉今譬于草木寡君在君君之臭味也歡以承命何時之有武子賦彤弓九年春宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戍討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯警宫二師令四卿正敬享祝宗用馬于四墉祀盤庚于西門之外髙郵孫氏曰春秋于天下之事有特書之者齊晉宋鄭數大國而已其來告者書之所以戒君之深使之反身以思其變也髙氏曰宋自昭文以來亂敗相屬三書宋災見人事之不修也夏季孫宿如晉報宣子之聘也五月辛酉夫人薑氏薨穆薑薨于東宫始往而筮之遇艮之八史曰是謂艮之隨隨其出也君必速出薑曰亡是于周易曰隨元亨利貞元善之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與于亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死于此弗得出矣秋八月癸未葬我小君穆薑家氏曰穆薑始與僑如謀去季氏事不克為行父所幽在廢宫十餘年與鄭莊之母武薑居于城潁無異鄭莊雖有黃泉之誓未幾復為母子如初成襄父子以暗庸相踵穆薑終不得出以逮于死魯國之大曾無有如潁考叔之悟其君者畏季氏也傳謂行父取穆薑之喪具以葬齊薑虧姑而成婦其用心為可誅矣嗟夫行父幽穆薑宿取卞意如逐昭公自後世而言懿師昭之類也有國家者以是為戒冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士丐門于鄟門衛北宫括曹人邾人從荀偃韓起門于師之梁滕人薛人從欒黶士魴門于北門杞人郳人從趙武魏絳斬行栗甲戌師于汜令于諸侯曰修器備盛餱糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之鋭以逆來者于我未病楚不能矣猶愈于戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也將盟晉士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趍進曰天禍鄭國使介居二大國之間大國不加德音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與強可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃于鄭乃盟而還晉人不得志于鄭以諸侯復伐之次于陰口而還子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下苟有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭公送晉侯晉侯以公宴于河上問公年季武子對曰會于沙隨之嵗寡君以生晉侯曰生十二矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉家氏曰不能救人之災恤人之患惟欲強其我從今日而會明日而盟又明日而伐或一嵗而再會再伐諸侯疲于奔命自文襄以來所未有也盟于戲鄭實未嘗服其載書曰自今既盟之後鄭國而不惟有禮與強可以庇民者是從亦如之鄭固侮其無能矣師未出境楚人伐鄭鄭及楚平所幸吳子來會有以壯中國之威而裭鄭人之魄不然晉楚交兵殆未有已也劉氏權衡曰武子言君冠必具禮樂可矣言及兄弟之國假具而冠無乃亟乎衛魯壤地相接能冠于衛不能冠于魯乎衛君之廟非先君之祧也楚子伐鄭楚子伐鄭子駟將及楚平子孔子蟜日與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯強是從今楚師至晉不我救則楚強矣盟誓之言豈敢背之且要盟無質神弗臨也所臨唯信信者言之瑞也善之主也是故臨之明神不蠲要盟背之可也乃及楚平公子罷戎入盟同盟于中分楚莊夫人卒王未能定鄭而歸髙氏曰楚以爵稱非罪鄭也師氏曰鄭以小國而介于晉楚之間晉不能振盟主之職楚恃􅍮尸二廣之強爭致鄭以服已者四十餘年鄭從楚則晉問其罪鄭從晉則楚加以兵前年冬被楚公子貞之伐不得已而從楚今年被晉侯十二國之伐不得已而歸晉及是楚子又從而伐之所以為鄭者不亦難乎要之盟主果能興聲罪致討之師如齊桓召陵之盟晉文城濮之役則楚豈復陵中國而鄭豈復從楚人耶十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤會于柤會吳子壽夢也三月癸丑齊髙厚相大子光以先會諸侯于鍾離夏四月戊午會于柤髙氏曰諸侯將救鄭鄭已服楚而吳人在柤諸侯因往與吳會以謀楚焉師氏曰晉為盟主不能合諸侯以圖楚乃會諸侯從吳以謀之是資僣亂以禦僣亂愈示弱于四方何以自強而尊中國乎若得志于楚亦已失勢于吳矣張大強吳難以保其無患也家氏曰序會于戚吳以人進殊會于柤吳以號舉此春秋垂世之法也夏五月甲午遂滅逼陽晉荀偃士丐請伐逼陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克諸侯之師久于逼陽荀偃士丐請于荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出于其間曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之五月庚寅荀偃士丐帥卒攻逼陽親受矢石甲午滅之以與向戌向戍辭曰君若猶辱鎮撫宋國而以逼陽光啓寡君羣臣安矣其何貺如之若専賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃豫宋公以逼陽子歸獻于武宫謂之夷俘逼陽妘姓也使周內史選其族嗣納諸霍人髙氏曰因會于柤而滅他人之國聖人惡之故以諸侯共滅為文則唱其謀而受其利者不待貶絶矣許氏曰中國諸侯往與吳會宜示以禮義明以王制以同奬周室遂滅逼陽不道甚矣謝氏曰強吳入為中國冦害必始于此矣滅逼陽而書遂罪其因會而滅國也罪其因會強吳而示之虐也陳氏曰以逼陽子歸不書宥逼陽子也悼公合十三國之衆為衣裳之會而遂滅逼陽于逼陽子何譏焉夫子之刪詩也存邶鄘于國風之首而繫檜曹于末録小國也春秋尤録小國也是故滅君有奔而不言奔以歸而不言歸者以是為非其罪也公至自會楚公子貞鄭公孫輒帥師伐宋六月楚子囊鄭子耳伐宋師于訾母庚午圍宋門于桐門衛侯救宋師于襄牛鄭子展曰必伐衛不然是不與楚也得罪于晉又得罪于楚國將若之何子駟曰國病矣子展曰得罪于二大國必亡病不猶愈于亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也衛人追之孫蒯獲鄭皇耳于犬丘秋七月楚子囊鄭子耳伐我西鄙還圍蕭八月丙寅克之九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競己甚髙氏曰以宋公受逼陽故也師氏曰宋亦界于鄭楚之鄰故楚欲窺中國不伐鄭則伐宋在楚固不足怪彼鄭以中國之諸侯既不知恥而從楚人又助之伐宋其辱中國也不亦甚乎鄭宋相讐近二百年大抵盟主盛則二國莫得而相侵盟主衰則鄭既從楚必共伐宋方宋伐鄭是以諸侯伐諸侯固己不可然猶愈于鄭之助楚人以伐諸侯也書之者實罪鄭謝氏曰鄭介晉楚之間事晉則有楚難事楚則有晉難為鄭計者一心協中國鑿池築城以備楚修政輯民以死守則楚雖強暴亦不可以為吾患矣今乃反覆二心晉至則受命從晉楚至則受命從楚子孔為晉計則子駟為楚計子孔欲守盟則子駟欲背盟徒使禍連兵結春秋前書盟戲後書伐宋著其反覆生禍也陳氏曰國自為帥自楚公子貞衛公孫輒始自是雖圍滅亦並稱帥師矣晉師伐秦九年秦景公使士雃乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之舉不失選官不易方其卿讓于善其大夫不失守其士競于教其庶人力于農穯商工皂𨽻不知遷業韓厥老矣知罃稟焉以為政范丐少于中行偃而上之使佐中軍韓起少于欒黶而欒黶士魴上之使佐上軍魏絳多功以趙武為賢而為之佐君明臣忠上讓下競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋楚子師于武城以為秦援秦人侵晉晉飢弗能報也至是晉荀罃伐秦報其侵也髙氏曰晉方帥諸侯會吳滅逼陽又越千里而伐秦可謂虐用其民矣為晉計者莫若修文公之業與秦通和庶因秦之兵力共攘強楚可以少安中國不此之圖反以秦資楚此晉之失也家氏曰春秋于楚鄭伐宋之後繼書晉師伐秦責晉也諸侯惟宋事晉最謹是以為楚所疾今宋人受兵晉不能急救猶可諉曰力之不給乃更出師伐秦秦雖與晉有憾孰若宋人受兵之為急乎置宋之急而治已之私春秋所以責也不書大夫帥師微之也秋莒人伐我東鄙莒人間諸侯之有事也故伐我東鄙髙氏曰去年同盟于戚今年又會于柤又方同伐鄭退受莒兵而不能禦魯必有以取之也公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭齊崔杼使大子光先至于師故長于滕己酉師于牛首東萊吕氏曰齊世子光序諸侯之上主會者為之也春秋不改所以示譏言上下之無禮文専以強弱事勢為先後也冬盜殺鄭公子騑公子發公孫輒初子駟與尉止有爭將禦諸侯之師而黜其車尉止獲又與之爭子駟抑尉止曰爾車非禮也遂弗使獻初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂于是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政于西宫之朝殺子駟子國子耳劫鄭伯以如北宫子孔知之故不死子西聞盜不警而出尸而追盜盜入于北宫乃歸授甲臣妾多逃器用多喪子産聞盜為門者庀羣司閉府庫慎閉藏完守備成列而後出兵車十七乘尸而攻盜于北宫子蟜帥國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋子孔當國為載書以位序聽政辟大夫諸司門子弗順將誅之子産止之請為之焚書子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎子産曰衆怒難犯専欲難成合二難以安國危之道也不如焚書以安衆子得所欲衆亦得安不亦可乎専欲無成犯衆興禍子必從之乃焚書于倉門之外衆而後定十五年鄭尉氏司氏之亂其餘盜在宋鄭人以子西伯有子産之故納賂于宋以馬四十乘與師茷師慧三月公孫黑為質焉司城子罕以堵女父尉翩司齊與之良司臣而逸之託諸季武子武子置諸卞鄭人醢之三人也師慧過宋朝將私焉其相曰朝也慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相而易淫樂之矇必無人焉故也子罕聞之固請而歸之程子曰盜殺三卿不稱大夫失卿職也泰山孫氏曰盜者微賤之稱盜一日而殺三卿故列數之惡鄭伯失刑政胡氏曰卿大夫者國君之陪二政之本也本強則精神折衝聞有偃息談笑而郤敵國之兵勝千里之難者矣乃至于身不能保盜得殺之于朝安在其為陪二乎張氏曰鄭之從楚以勞中國皆公子騑之罪也鄭成公卒之初諸大夫欲從晉矣公子騑曰官命未改止之及楚子囊伐鄭子展欲堅守以待晉而騑請從楚以任其咎故公子騑者從夷之人也而公子發公孫輒惟騑是從惡積而不可掩鄭不能討而盜得殺之所謂上慢下暴而致冦至孔子以為盜之招也此所以不稱殺其大夫也歟戍鄭虎牢諸侯之師城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平公羊氏曰戍鄭虎牢諸侯戍之曷為不言諸侯戍之離至不可得而序故言我也愚謂書城虎牢聖人與霸之辭也書戍鄭虎牢聖人責霸之辭也何以知其然也春秋中年桓文既沒鄭常道荆楚為中國之患幸而晉悼復興知武子能用孟獻子之言會諸侯之大夫于戚城虎牢以逼鄭于是鄭人不敢南通夷狄楚人不敢北犯中原諸侯得免于侵伐戰爭之苦者七年于此故虎牢不繫之鄭若曰虎牢之城所以安中國豈特扼鄭而已哉既而鄭伯卒于鄵其君既死于中國諸侯之役矣蔡不與于中國之會盟鄭人侵之其臣又勤于中國諸侯之事矣楚人來伐討其侵蔡也諸侯皆不能救而晉師入鄭楚人乃能救之則是霸主之于諸侯不如荆蠻之于鄰國中國何事于虎牢之戍諸侯何賴于霸主之會之盟哉故戍虎牢復繫之鄭若曰戍虎牢特以保鄭爾豈足以安中國哉然則奈何知武子之言曰我之不德民將棄我豈唯鄭若能休和逺人將至何恃于鄭使晉侯能守是言則天下諸侯皆將俯首聽命于衣裳之會鄭必不俟告命如會請盟雖無虎牢之戍可也惜乎晉侯不能終用其言既盟而還以不得志于鄭復以諸侯之師伐之明年乃有虎牢之戍而中國諸侯復有侵伐戰爭之苦卒之蕭魚之會赦鄭囚納斥堠禁侵掠遂成復霸之功鄭不敢叛晉者二十四年未聞有資于虎牢之再城再戍聖人于此不特與之蓋美之矣然則春秋曲直之繩墨輕重之權衡非聖人孰能修之楚公子貞帥師救鄭楚子囊救鄭十一月諸侯之師還鄭而南至于陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也丁未諸侯之師還侵鄭北鄙而歸楚人亦還師氏曰向也鄭歸晉而楚伐鄭晉與諸侯不能救致使鄭無助而復從楚今也鄭從楚而晉伐鄭楚則能救之致使鄭歸晉之心猶豫而未決觀此則楚雖僣亂而所以誘鄭人之術不為不善較之中國盟主反不若楚計之為得矣愚按凡書救蓋善之也書外國之救所以愧中國書逺國之救所以愧鄰國然又當觀其所救之事如何伐者曲受伐者直則救為善伐者直受伐者曲則救非善公子貞之救鄭蓋長其背華之志而堅其從楚之心以植已之黨爾非為天下之公也豈可以他救例觀哉然則春秋書此非善楚也責晉也公至自伐鄭許氏曰書楚救鄭致公知諸侯之避楚也十有一年春王正月作三軍季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舍髙郵孫氏曰周禮萬二千五百人為軍天子六軍大國三軍次國二軍小國一軍魯侯次國也而作三軍蓋三桓之族欲弱公室而強私家不量其力之可否而頓作一軍春秋以其亂王制竭民力罪之書曰作三軍家氏曰魯頌所云公徒三萬公車千乘者出于詩人歌頌之辭當時未必果備三軍之制至此季氏乘襄公之幼弱盜竊兵權始作三軍盡改舊制以魯國丘甸卒乘為孟叔孫之私有春秋書作三軍著季氏犯上作亂之漸實始作也蓋古者三軍每遇出征則大夫帥之以行事已則歸之于甸大夫不得而私也今析三軍以為三而三家者各有其一為國君者僅擁虛器于上國非其國矣乾侯之禍權輿于此春秋書城費于前作三軍于後所以垂人臣負固擁強之戒髙氏曰所謂大國三軍次國二軍小國一軍乃兵數之大率其實皆藏于農嵗役不過三日此先王之法也魯次國也雖合二軍必天子以牙璋起之然後取之于農耳亦何事于作哉三桓外取強富之名以諛其君而實奪其民以弱公室于是三分公室各取其一而作為三軍亂先王之制而以攻戰為心王法所不容也故不書作中軍而云作三軍所以罪三桓也夏四月四卜郊不從乃不郊鄭公孫舍之帥師侵宋鄭人患晉楚之故諸大夫曰不從晉國幾亡楚弱于晉晉不吾疾也晉疾楚將辟之何為而使晉師致死于我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之使疆場之司惡于宋宋向戍侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告于楚楚師至吾又與之盟而重賂晉師乃免矣夏鄭子展侵宋愚謂兵凶器戰危事不得已而後用之鄭諸大夫既知楚弱于晉不從晉國幾亡則當勇于從晉堅于却楚鑿池築城以死守之晉人雖不吾疾吾何懼焉而乃妄興大衆侵犯大國萬一事有不然輕則喪失師徒重則覆亡邦國豈所以為計哉春秋書之所以見鄭之無謀而罪其大夫之過舉也公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北四月諸侯伐鄭己亥齊世子光宋向戍先至于鄭門于東門其莫晉荀罃至于西郊東侵舊許衛孫林父侵其北鄙六月諸侯會于北林師于向右還次于瑣圍鄭觀兵于南門西濟于濟隧鄭人懼乃行成七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民墜命亡氏踣其國家程子曰鄭服而同盟也隨復同楚伐宋書同見其反覆陳氏曰隱桓之諸侯皆序爵霸者作而後小國或序大國之上有以子男長于伯者矣于是以世子長于小國之君則悼公為之也髙氏曰凡世子代父與盟會當在諸侯之下齊光代君出會十年在滕薛上已為僭矣此會又在邾莒上于是為甚見世子益驕而主會者亦莫能制公至自伐鄭楚子鄭伯伐宋楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋髙氏曰晉師方還而楚子伐鄭鄭伯逆之遂同伐宋蓋用公孫舍之之謀以伐宋自信于楚而數致晉使楚道敝而固與晉以託國焉愚謂此亂世詭譎姦詐之所為小人行險僥幸之事也幸而楚弱晉強吳人又擬楚人之後而晉人無怒鄭人之心卒致晉師以成蕭魚之會不然則墜命亡氏踣其國家如載書之所云矣若子展之所謀春秋之所甚惡也故書同盟亳城北于前繼書楚子鄭伯伐宋于後不待貶絶而罪惡見矣公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚九月諸侯悉師以復伐鄭觀兵于鄭東門鄭人使王子伯駢行成甲戍晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯十二月戊寅會于蕭魚庚辰赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告于諸侯公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣鄭人賂晉侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鍾二肆及其鎛磬女樂二八先是四年無終子嘉父使孟樂如晉因魏莊子納虎豹之皮以請和諸戎晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服將觀于我我德則睦否則攜二勞師于戎而楚伐陳必弗能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿公曰后羿何如對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯因熊髠尨圉而用寒浞寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于內而施賂于外愚弄其民而虞羿于田樹之詐慝以取其國家內外咸服羿猶不悛將歸自田家衆殺而烹之以食其子其子不忍食諸死于窮門靡奔有鬲氏浞因羿室生澆及豷恃其讒慝詐偽而不德于民使澆用師滅斟灌及斟尋氏處澆于過處豷于戈靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼滅豷于戈有窮由是遂亡失人故也昔周辛甲之為大史也命百官官針王闕于虞人之針曰芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處德用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞針如是可不懲乎于是晉侯好田故魏絳及之公曰然則莫如和戎乎對曰和戎有五利焉戎狄薦居貴貨易土土可賈焉一也邊鄙不聳民狎其野穯人成功二也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也鑒于后羿而用德度逺至邇安五也君其圖之公説使魏絳盟諸戎修民事田以時至是晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂只君子殿天子之邦樂只君子福祿攸同便蕃左右亦是帥從夫樂以安德義以處之禮以行之信以守之仁以厲之而後可以殿邦國同福祿來逺人書曰居安思危思則有備有備無患敢以此規公曰子之教敢不承命抑微子寡人無以待戎不能濟河夫賞國之典也藏在盟府不可廢也子其受之魏絳于是乎始有金石之樂陳氏曰伐鄭會于蕭魚序績也胡氏曰悼公能謀于魏絳以息民聽于知武子而不與楚戰故三駕而楚不能與之爭雖城濮之績不越是矣程子曰諸侯數月之間再伐鄭鄭之反覆可知鄭又服而請會不書鄭會謂其不可信也而晉悼推至誠以待人信之不疑自此鄭不敢叛晉者二十四年至哉誠之能感人也愚觀鄭非不欲從晉而畏楚之強晉本不欲伐鄭不過欲得鄭之服故晉之伐鄭也不至于黷武鄭之背晉也不至于負固然鄭欲以詭謀致晉晉乃以誠心待鄭此鄭之所以終服于晉也方蕭魚之未會也晉固知鄭之必服于此行矣方諸侯之臨鄭也鄭固知晉之不我伐矣蓋晉鄭相孚之心已見于言意之表故蕭魚之會晉不復疑鄭而鄭亦甘心于從晉不待刑牲歃血要質鬼神而無或有叛之者矣然則蕭魚之會推誠心待人不疑于人而人亦不疑之其功烈已如此况于聖賢之學帝王之道真能以至誠感人者乎公至自會楚人執鄭行人良霄鄭人使良霄大宰石㲋如楚告將服于晉曰孤以社稷之故不能懷君君若以玉帛綏晉不然則武震以懾威之孤之願也楚人執之十三年鄭良霄大宰石㲋猶在楚石㲋言于子囊曰先王卜征五年而嵗習其祥祥習則行不習則增修德而改卜今楚實不競行人何罪止鄭一卿以除其逼使睦而疾楚以固于晉焉用之使歸而廢其使怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之髙氏曰此聖人著晉之所以得鄭也鄭伯使良霄告絶于楚楚人怒而執之雖執之不殺良霄亦不伐鄭勢分于吳而不能得鄭矣故執良霄以舒其憤怒不平之氣而已自是不復出師以與晉爭斯見楚力之盡鄭于是堅從晉也謝氏曰行人所通兩國之信事有不直罪在國不在行人執非其罪也凡執行人皆稱人貶之也陸氏曰稱行人而執以其事執也不稱行人而執以己執也冬秦人伐晉秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴禦之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也家氏曰士魴禦之為秦所敗春秋略敗不書不與秦人之為楚而救鄭也春秋闕疑卷二十九
