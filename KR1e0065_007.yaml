body:
  text: 春秋闕疑卷七元鄭玉撰七年春夫人薑氏會齊侯于防髙氏曰防魯地齊侯來而夫人出會之也夏四月辛卯夜恆星不見夜中星隕如雨胡氏曰恆星者列星也如雨者言衆也人事感於下則天變動於上前此者五國連衡旅拒王命後此者齊桓晉文更伯中國政歸盟主王室遂虛其為法度廢絶威信陵遲之象著矣秋大水無麥苗張氏曰周之秋今五月也麥熟苗秀因水漂盡民食乏絶有國之大事故書髙氏曰秋大水而無麥苗與隕霜殺菽同義因水災而無也胡氏曰書大水畏天災也無麥苗重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣春秋所以謹之也冬夫人薑氏會齊侯于穀胡氏曰防魯地榖齊地初會于禚次享于祝丘又次如齊師又一嵗而再會焉其為惡益逺矣明年無知弒諸兒其禍淫之明驗也八年春王正月師次于郎以俟陳人蔡人榖梁氏曰次止也俟待也杜氏曰期共伐郕陳蔡不至故駐師于郎以待之胡氏曰伐而次者有整兵慎戰之意其次善之也遂伐楚次于陘是也救而次者有緩師畏敵之意其次譏之也次于匡于聶北于雍榆是也俟而次者有無名妄動之意次于郎以俟陳人蔡人是也甲午治兵謝氏曰以陳蔡不至故擇日治兵志于攻郕故也國君治兵有時事起而後治兵兵不素習故也胡氏曰此治兵于郎也俟而不至暴師露衆役久不用則有失伍離次逃亡潰散之虞故復申明軍法以整齊之其志非善之譏黷武也夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由胡氏曰書及齊師親仇讐也圍郕者伐同姓也郕降于齊師者見伐國無義而不能服也于是莊公之惡著矣秋師還胡氏曰書師還譏久役也按左氏仲慶父請伐齊師莊公不可是國君上將親與圍郕之役也然其次其及其還皆不稱公者重衆也春秋正例君將不稱師則以君為重今此不稱公又以為重衆何也輕舉大衆妄動久役俟陳蔡而陳蔡不至圍郕而郕不服歷三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣義繫于師故不書公以著勞民毒衆之罪為後戒也春秋王道輕重之權衡此類是矣常山劉氏曰春秋書魯用師未有如此之詳者蓋莊公此年之師尤為非義上不稟命于天王無故次郎可謂無名甲午治兵可謂黷武圍郕而郕降齊可謂無功歷三時而師還可謂害民夫逆天道親仇讐圍同姓𠞰民力與國不信伐國不服故聖人備書之以見其罪冬十有一月癸未齊無知弒其君諸兒齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代朝戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵于僖公衣服禮秩如適襄公絀之二人因之以作亂連稱有從妹在公宫無寵使間公曰捷吾以女為夫人冬十二月齊侯遊于姑棼遂田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨于徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬬死于門中石之紛如死于階下遂入殺孟陽于牀曰非君也不類見公之足于戶下遂弒之而立無知初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔謝氏曰無知僖公母弟年之子也衣服禮秩如適因以作亂然則公孫無知緣公孫之寵而敢為大逆者也春秋奪其公孫所以絶其親而誅之也公子公孫恃子孫有承繼之道而肆為逆惡者衆矣故衛州吁黜其公子齊無知黜其公孫所以正大法也所以杜後世子孫爭國之心也無知書齊與州吁書衛同意胡氏曰僖公私其同母異于他弟施及其子衣服禮秩如適此亂本也故于年之來聘特以弟書于無知之弒不稱公孫著其有寵而當國垂戒之義明矣古道親親與尊尊並行而不相悖故堯親九族必克明俊德而後九族睦周封同姓必庸康叔蔡叔而後王室強徒知寵愛親屬而不急于尊賢使為表儀以為親親之道必有篡弒之禍矣徒人費遇賊于門先入伏公出而鬭死石之棼如死于階下是能死節者也春秋重死節之臣而法有特書其不見于經何也如費等則所謂便辟私昵之臣逢君之惡田獵畢弋而不修民事使百姓苦之者也與大臣孔父仇牧義形于色不畏強禦以身死職則異矣當是時管仲隰朋鮑叔皆沉于下僚不見庸也而徒人費石之棼如乃得居左右襄公之所疏逺親信如此故以齊國之強大一也桓公用之則九合諸侯不以兵車由親賢人逺小人所以興也襄公用之不能保其身死于戶下由親小人逺賢人所以亡也此二人雖死于難與自經于溝瀆而莫之知者猶不逮焉乃致亂之臣死不償責又何取乎陳氏曰弒君者連稱管至父則其専罪無知何君弒而無知受之則賊不在二子春秋誅利心是故連稱管至父實弒齊襄無知與聞故者也而無知受之則無知為逆首張氏曰襄公即位以至于今春秋所書齊事無一非亡國戕身之謀所謂積不善之餘殃者也九年春齊人殺無知初公孫無知虐于雍廪至是雍廪殺無知胡氏曰殺無知者雍廪也而曰齊人者討賊之詞也弒君之賊人人之所惡夫人之所得討故稱人人者衆辭也無知不稱君已不能君齊人亦莫之君也公及齊大夫盟于蔇髙氏曰按國語韋昭注云齊人殺無知逆子糾于魯莊公不即遣而盟以要之齊大夫歸遂隂召小白于莒則知此盟蓋公意也故書公及凡國亂而嗣君未定則方伯請天子之命以正之可也今公既不能請天子之命乃捐禮以求盟且齊人義欲納糾而自迎之又何以盟為然齊來求君而公固欲盟茍辭不盟恐生他變故以一時之權抗公而盟于蔇所以稱齊大夫而不見名氏者聖人深察人情所難而曲盡一時之變有異乎處父髙傒也公之所為如此宜乎齊人之背盟也夏公伐齊納子糾齊小白入于齊夏公伐齊納子糾桓公自莒先入子糾公榖皆無子字程子曰春秋書公伐齊納糾而不稱子不當立者也書齊小白入于齊以國繫者明當立也桓公兄也當立子糾弟也不當爭考之春秋可見桓公之入也書曰齊小白入于齊魯之納子糾也書曰公伐齊納糾左氏誤多子字公榖之言是也楊龜山曰嘗考子糾與小白未嘗為世子而俱出奔故春秋不書子而書公伐齊納糾齊小白入于齊以齊繫小白宜有齊者也糾不稱子又不繫之齊者外之不宜有齊者不宜有齊而入之是為亂而已胡氏曰納者不受而強致之稱入者難詞襄公見殺糾與小白皆以庶子出奔而糾弟也按史周公誅管蔡以安周齊桓殺其弟以反國是糾幼而小白長其有齊宜矣宜則何以不稱公子內無所承上不稟命故以王法絶之也桓公于王法雖當絶視子糾則當立故管仲相桓公為徙義召忽死子糾為傷勇愚按子糾小白之少長傳記所載不同今亦無從考證但以論語所記子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公一匡天下民到于今受其賜微管仲吾其被髮左袵矣豈若匹夫匹婦之為諒自經于溝瀆而莫之知也觀之則桓公管仲之事決非篡弒矣故程子釋之曰桓公兄也子糾弟也仲私于所事輔之以爭國非義也桓公殺之雖過而糾之死實當仲始與之同謀遂與之同死可也知輔之爭為不義不死以圖後功亦可也故聖人不責其死而稱其功若使桓弟而糾兄管仲所輔正桓奪其國而殺之則管仲之與桓不可同世之讐也若計其後功而與其事桓無乃害義之甚起萬世反覆不忠之亂乎程子之為是説蓋以夫子之言可信也若使桓公之立非義雖有及人之功夫子之言不以過掩其功而功過並論可也許其功掩其過以成敗論人吾知夫子之言必不如是也况肻以召忽死子糾之難為匹夫匹婦自經于溝瀆而莫之知者乎程子之説千古不易之論有天下國家者之所當取法豈特施于桓公管仲而已哉秋七月丁酉葬齊襄公髙郵孫氏曰齊亂不以時葬于是小白始入葬之八月庚申及齊師戰于乾時我師敗績公喪戎路乘傳而歸胡氏曰何以不書公莊公忘親釋怨欲納讐人之子謀定其國家不為復讐與之戰是故沒公以見貶若為復讐舉事則此戰為義戰當書公冠于敗績之上與沙隨之不得見平丘之不與盟為比以示榮矣惟其不以復讐戰也是故諱公以重貶其忘親釋怨之罪其義深切著明矣髙郵孫氏曰春秋之義內不言戰言戰則敗二百四十二年之間未有內言敗績者乾時之戰書戰書敗此春秋之變例也莊公父見弒于齊齊為仇讐之國無時而可通莊公受公子糾之奔志欲納之已盟其大夫伐齊而納糾矣而公子小白先之既忘其讐也又不量力而與齊戰焉戰而不勝而至于敗師徒崩喪而子糾不免于死為莊公者其罪如何也莊公有諸侯之位國君之尊民人之所瞻望一國之所矜式也父之仇讐則忽而忘之仇讐之弟則決而納之既不果納又戰而敗其師焉不共戴天之讐已不報而與之交矣無辜之民又驅之戰而至敗焉十二公之間師之惡未有甚于此者內不言戰戰不言敗魯史所以待魯公之法也若莊公之行蓋非魯公之所宜為書戰書敗若曰吾君之所以至于是者由其不君也愚按不書公所以諱魯之辱而存臣子之禮特書敗所以見公之惡以明君父之讐其詞微而彰其義微而著非聖人孰能修之九月齊人取子糾殺之鮑叔帥師來言曰子糾親也請君討之管召讐也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治于髙傒使相可也公從之張氏曰殺兄弟當著君之罪而罪齊人者廢立之際殺生豫奪寄于當國之手毫釐之差霄壤之繆今齊大夫始以糾為先君之子而盟欲立之謀不審于初已為罪矣及桓公得國又不體其君天倫之恩從議親之辟以赦其罪而必殺之廢興生殺輕率甚矣故加子于糾又書齊人書取書殺則舉國君臣同責其忘恩失義之罪也髙氏曰書齊人殺則小白在其中書齊侯殺則國人之罪免矣榖梁氏曰外不言取言取病內也取易辭也猶曰取其子糾而殺之云爾十室之邑可以逃難百室之邑可以隱死以千乘之魯而不能存子糾以公為病矣常山劉氏曰公伐齊納不正故書納糾而不曰子齊人殺糾而書子者齊大夫既自與魯盟而立之矣又自殺之故書曰齊人取子糾殺之以罪齊也胡氏曰取者不義之辭前書納糾不稱子者明不當立也此書殺糾復稱子者明不當殺也或奪或豫于義各安春秋精意也仁人之于兄弟不藏怒焉不宿怨焉親愛之而已糾雖爭立越在他國置而勿問可也必請于魯殺之然後快于其心不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉故孟子曰五霸三王之罪人也仲尼之徒無道桓文之事者愚謂納糾不書子以明糾不可以為齊君所以罪魯納之不正殺糾復書子以明齊人殺其所立之君以罪齊殺之不當子糾之死或曰魯殺或曰齊殺以經考之齊人取之于魯而殺之齊人殺之固有罪矣魯人非特不能納之又舉以與齊使齊得殺之則猶魯殺之也故書法如此而齊魯之罪見矣冬浚洙公羊氏曰浚者深之也曷為深之畏齊也胡氏曰固國以保民為本輕用民力妄興大作邦本一搖雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而况洙乎書浚洙見勞民于守國之末務而不知本為後戒也十年春王正月公敗齊師于長勺齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未遍民弗從也公曰犧牲玉帛弗敢加也必以信對曰小信未孚神弗福也公曰小大之獄雖不能察必以情對曰忠之屬也可以一戰戰則請從公與之乘戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之髙氏曰公曷為敗齊師能強也我因敗績而修備齊師恃勝而益驕是以能敗之所以齊師之來不書侵伐蓋因其兵入吾境而遂敗之不待交戰也家氏曰乾時敗歸齊人得志取子糾而殺之魯復不敢校而桓公挾其殺糾之餘怒以兵加魯魯之師直桓之師曲春秋書法坦然易見也幸魯莊能與讐國為敵而又勝故書曰公敗齊師于長勺喜之也愚謂春秋之法詐戰曰敗然魯之敗齊齊曲魯直故春秋喜魯之勝非喜其勝也喜其勝于齊也二月公侵宋胡氏曰聲罪致討曰伐濳師掠境曰侵聲罪者鳴鐘擊鼓整衆而行兵法所謂正也濳師者銜枚卧鼓出人不意兵法所謂竒也薛氏曰侵者掠其邊鄙也怙于長勺之勝無故侵人之國書始怨也三月宋公遷宿胡氏曰其曰遷宿者宿非欲遷為宋人之所遷也懷土常物之情遷國重事也雖違害就利去危即安猶或恐沈于衆不肯率從而况迫于橫逆非其所欲棄久宅之田里刈新徙之蓬藋道路之勤營築之勞起怨咨傷和氣豈不惻然有隱乎肆行莫之顧也其不仁甚矣凡書遷不待貶而惡已見矣髙郵孫氏曰諸侯受地于天子傳國于先君不能以道守位以德懷民而見迫于強大受制于同列去南面之位而為之臣屈諸侯之尊而為附庸之國為之遷者未免有罪遷人之國蓋不可勝誅矣許氏曰遷之使未失其國家以往其義猶有所難則是王未盡亡也至僖文以後則皆滅國無遷國矣夏六月齊師宋師次于郎公敗宋師于乘丘齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙皋比而先犯之公從之大敗宋師于乘丘齊師乃還髙郵孫氏曰公正月敗齊師于長勺而二月侵宋齊納糾之恨不釋而宋見侵之怨方興故齊宋之師會次于郎將伐我公乘二國之未至先敗宋師而齊師亦還也胡氏曰齊人輕舉大衆深入他境肆其報復之心誠有罪也魯人若不用詐謀奉其辭令二國去矣偷得一時之捷而積四鄰之忿此小人之道故次者不以其事勝者不以其理交譏之愚按禮記檀弓魯莊公及宋人戰于乘丘馬驚公墜敗績與經不同當以經為正彼蓋記禮者之誤爾秋九月荆敗蔡師于莘以蔡侯獻舞歸蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救于蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸程子雜説曰莊十年荆敗蔡師于莘荆始見于經十四年入蔡十六年伐鄭皆止書荆荆本子爵僻在南蠻不能從中國政令居中國爵號不共王祭故春秋外之莊二十三年書荆人來聘于此始能修聘而未能備中國之禮故祗書人二十八年荆伐鄭猶前志也僖二年楚人伐鄭至是始改號楚蓋自此寖強矣故皆稱人然終齊桓之世惟祗人而不得與中國之會盟者為齊桓能制其強也至十有七年齊桓卒楚于是始橫十九年則已盟于齊矣二十一年又盟于鹿上用見周室衰微楚氛方惡至秋之會則書宋公會于盂執宋公以伐宋楚于是大張列位于陳蔡之上而書爵矣所以著其強大難制中國不能抗也至冬告捷以威諸侯聖人復書楚人使宜申來獻捷貶其爵又書獻以抑其強爾從是以後有事于中國皆用其爵惟貶而人之者各隨事以見焉劉氏意林曰吳楚徐越其上世皆有元德顯功通乎周室徐始稱王楚後稱王吳越因遂稱王王非諸侯所名也是以外之然猶不欲絶其類是以上不使與中國等下不使與外域均推之可逺引之可來此聖人慎絶人也謝氏曰荆之敗蔡師也哀侯無死社稷之義而臣服于荆則君位已絶于國故書名凡書敗書滅書入以其君歸者春秋皆名以其前無死義之忠後無復國之志故以匹夫名之陳氏曰春秋為尊攘作也荆敗蔡師于莘是猾夏之始也而言以歸則蔡侯服楚也是天下之大變也吳敢頓胡沈蔡陳許之師于雞父則諸夏之不亡者寡矣是故書荆自此始而春秋以吳終焉聖人之所甚懼也冬十月齊師滅談談子奔莒齊侯之出也過談談子不禮焉及其入也諸侯皆賀談又不至齊師滅談談子奔莒趙氏曰覆邦絶祀曰滅公羊氏曰何以不書出國已滅矣無所出也啖氏曰隨敵人歸者書名以重其罪故奔者不名以示等差也凡書滅又書以歸及名者罪重于奔者也既責其不死位又責其無興復之志也國滅君奔者四其三不書名惟徐子章羽書名傳以服吳後乃奔楚故書名以罪之胡氏曰國滅身奔而不能守其富貴何以書爵乎已無取滅之罪為橫逆所加而力不能勝至于出奔則亦不幸焉爾矣其義蓋未絶也謝氏曰小國為大國所滅其君力屈而奔者非其不道失國也非以屈節在所棄也以直詞訴王以王命求助邦國則社稷可以復安矣豈可遽以匹夫絶之哉故君以國滅而奔者春秋皆不名陳氏曰書滅始于此春秋滅國三十六五伯為之也愚謂此齊桓圖霸之始謀也桓公入國既定其位方欲有以合天下之諸侯而懼人心之不一首以談之不禮于已而滅之使天下諸侯懼而畏服此所謂以力服人者也夫三王之興也行一不義殺一不辜而得天下皆不為也齊桓殺糾以得國殺一不辜矣滅談以立威行一不義矣雖能九合諸侯一匡天下而仲尼之徒無道之者五伯三王之罪人豈不信哉十有一年春王正月夏五月戊寅公敗宋師于鄑宋為乘丘之役侵我公禦之宋師未陳而薄之敗諸鄑張氏曰宋師再至再敗禍旋及其君魯雖再勝其國亦困于兵矣秋宋大水宋大水公使弔焉曰天作淫雨害于粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之詞也臧孫逹曰是宜為君有恤民之心張氏曰外災不書此特書者宋來告魯弔之也此見怨不廢禮諸侯往弔主人罪已蓋古意之猶存而未泯者然文豈足以應天哉閔公不能踐敬之一言而以靳宋萬自禍董氏所謂出災害以譴告之而不知變者春秋之存災異可不察哉胡安定先生曰春秋惟內災悉書外災或舉一二以見天下之大異東萊呂氏曰諸國災則書其顯然為衆所知者亦不待告也冬王姬歸于齊愚按此王姬歸齊公榖皆以為過我故書而先儒又多以為再主齊昏以事考之襄公既弒則讐人已死王姬歸齊前已責其甚者至此不應再貶當因適齊道過于魯故魯書之公榖之説為得之也十有二年春王三月紀叔姬歸于酅啖氏曰稱紀言紀之婦也書歸善叔姬之全婦道也陳氏曰紀亡矣曷為謂之紀叔姬存紀也國滅而復見者善詞也未始復也而再見春秋所以録滅國也胡氏曰莊公四年紀侯去國至此方卒故叔姬歸酅歸者順辭以宗廟在酅歸奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸于魯所謂全節守義不以亡故而虧婦道者也魯人髙其節義恩禮有加是故其歸于酅其卒其葬史册悉書之夫子修經存而不削為後世勸家氏曰是時紀既亡矣而春秋猶書紀叔姬者録叔姬也録叔姬是存紀于既亡之後叔姬不與紀俱亡也髙郵孫氏曰叔姬為伯姬媵法不當書春秋賢之故備書之髙氏曰此見紀季以酅入齊非叛也政以存國爾衆人疑其迹而春秋明其心因叔姬之歸以見之夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧十一年乘丘之役公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾弗敬子矣病之至是宋萬弒閔公于蒙澤遇仇牧于門批而殺之遇太宰督于東宫之西又殺之立子遊羣公子奔蕭公子御説奔亳南宫牛猛獲帥師圍亳謝氏曰人君所與居處遊燕不可一非其人隂邪得居其間則雖千乘之君匹夫或得為之難宋萬凶勇之士也凶則畜禍心勇則無忌憚閔公旦夕與之相親而不知為之戒故一言拂意而不測之變發于蕭墻然則左右近習可以使非其人耶胡氏曰夫仇牧可謂不畏強禦矣然徒殺其身不能執賊無益于事亦足取乎食焉不避其難義也徒殺其身而不能執賊亦足以為求利焉而逃其難者之訓矣何名為無益哉若仇牧荀息立乎人之本朝執君之政而君見弒不以其私也雖欲勿死焉得而勿死聖人書而弗削以為求利焉而逃其難者之勸也惟此義不行然後有棄其君如土梗辨髦曽莫之省而三綱絶矣家氏曰太宰督亦死于此難奚以不書督者即前日弒殤公殺孔父之人身負弒君未討之罪今復為盜所殞此亂臣逸天討不可以死節言者舊史固與仇牧同書聖人削之爾冬十月宋萬出奔陳蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子遊于宋立桓公猛獲奔衛南宫萬奔陳以乘車輦其母一日而至宋人請猛獲于衛衛人欲勿與石祁子曰不可天下之惡一也惡于宋而保于我保之何補得一夫而失一國與惡而棄好非謀也衛人歸之亦請南宫萬于陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之謝氏曰閔公遇難已三月矣賊三月未討而又出奔宋無臣子可知也逆賊所不待告而誅也逆賊避難鄰國而陳容之陳無臣子可知也胡氏曰宋人醢萬則賊已討矣曷為不書陳人殺萬乎夫天下之惡一也陳人不以萬為賊而納之又受宋人之賂而使婦人飲之酒是與賊為黨非政刑也特書萬出奔陳以著陳人與賊為黨之罪而不正天討其法嚴矣故春秋成而亂臣賊子懼張氏曰宋人殺萬而書宋萬出奔陳者歸惡于陳也天下之惡當奉天討容受其奔罪已大矣受賂而後歸之所謂肆人欲而滅天理當服黨惡之罪也春秋闕疑卷七
