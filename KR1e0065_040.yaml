body:
  text: 春秋闕疑卷四十元鄭玉撰定公公名宋襄公之子昭公之弟敬王十一年即位諡法安民大惠曰定元年春王大東萊吕氏曰元年不書正月國無君無禀天子之正朔者也家氏曰昭公之䘮未返公子宋未立魯無君也魯無君而季氏自以為君頒朔于廟如常禮春秋黜之是故書王不書正書王明王法以治季氏也不書正月正朔非季氏所得頒也前此公雖在外而歲首必書公在存公也存公是故頒朔今公已卒于外嗣子為賊臣所廢魯國無君是故不書正月見魯國無正王朔在廟非賊臣所得頒也此春秋特立之變例前所未有也三月晉人執宋仲幾于京師春王正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政衛彪徯曰將建天子而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役于韓簡子及原夀過而田于大陸焚焉還卒于甯范獻子去其柏椁以其未復命而田也孟懿子㑹城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國于周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷于邳仲虺居薛以為湯左相若復舊職將承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徵于人宋徵于鬼宋罪大矣且已無辭而抑我以神誣我也啟寵納侮其此之謂矣必以仲幾為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍齊高張後不從諸侯穀梁氏曰此其大夫其曰人何也微之也何為微之不正其執人于尊者之所也胡氏曰周官司𨽻掌凡囚執人之事屬于司冦凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷以邦法則大司冦之職也不告諸司冦而執人于天子之側故雖以王事討有罪猶貶凡此類皆篡弑之萌履霜之漸執而書其地謹之也每謹于初而禍亂熄矣家氏曰仲幾之不受功無王也晉大夫不以王命執仲幾亦無王也是故不以城為王事而畧晉大夫之罪此聖人之特筆非因乎舊史者也高氏曰天子所居自諸侯言之則稱京師自周言之則以地名為别景王以前都王城因謂王城為京師至敬王始都成周則謂成周為京師故諸侯之大夫奉王命而城王都則亦自周而言城成周及晉人不以王命執仲幾于成周則自諸侯而言京師也言京師明天子之在是也夏六月癸亥公之喪至自乾侯戊辰公即位叔孫成子逆公之喪于乾侯季孫曰子家子亟言于我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羇未得見而從君以出君不命而薨羇不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者將唯子是聽子家子未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羇弗敢知若從君則貌而出者入可也寇而出者行可也若羇也則君知其出也而未知其入也羇將逃也喪及壞隤公子宋先入從公者皆自壞隤反六月癸亥公之喪至自乾侯戊辰公即位高氏曰公薨迨今半歳餘矣季氏不以國君喪禮迎之者謀廢公衍公為而立定公也凡即位不日此書日者非正月朔旦故也公羊氏曰曷為以戊辰之日然後即位正棺于兩楹之間然後即位蘇氏曰元年定公之元年也而書曰公之喪至自乾侯可乎昭公之喪未至定公未即位則猶昭公之年也胡氏曰昭公之薨已越葬期猶未得返至于六月癸亥然後喪至而定之即位乃在是月之戊辰蓋遲速進退為意如所制不得專也以周書顧命考之成王之崩在四月乙丑宰臣大保即于是日命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆王世子釗于南門之外延入翼室宅憂為天下主不待崇朝而後定也昭公喪至在葬期之後公子宋自壞隤先入猶未得立是知為意如所制不得以時定也家氏曰一年不二君者常也一年而二君者變也昭公之喪以是月稅輤定公即以是月即位是一歲而二君也故春秋書前公之喪至與後公之入立以示其變著魯國非常之禍亦以見定之非所當立而立也意如逐君君既死于外又廢君之子而立其弟廢其所惡立其所善廢立由己罪大惡盈中國無王莫之討之春秋書公即位于喪至六日之後見丁奪遲速惟賊臣之意所以誅之也秋七月癸巳葬我君昭公季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問于榮駕鵝曰吾欲為君諡使子孫知之對曰生不能事死又惡之以自信也將焉用之乃止秋七月癸已葬昭公于墓道南孔子之為司冦也溝而合諸墓大東萊吕氏曰葬本國之君稱葬某公足矣必曰葬我君某公者隆君臣之恩盡忠愛之義資于事父有父之道焉故必曰我君以明之也此道也常時無事則不見此理特于昭公為大有警動于其臣下者九月大雩立煬宫昭公出故季平子禱于煬公九月立煬公宫公羊氏曰煬公之宫也立者不宜立也高氏曰昔季孫行父嘗立武宫矣煬公比武公尤逺盖伯禽之子廟毁乆矣季孫意如之逐君也懼而禱焉昭公薨于外因以為應遂為之立宫盖季孫用此欺人若曰昭公之死者神實貺之也春秋誅其意而微其辭但書立煬宫而季氏行事之迹自可見矣此之謂世濟其惡也而公從之公之惡可知矣冬十月隕霜殺菽公羊氏曰何以書記異也穀梁氏曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也杜氏曰周十月今八月隕霜殺菽非常之災蘇氏曰于其不殺而言草言其廣也于其殺而言菽言其所害也謝氏曰十二月霜不殺草異之大者也十月霜殺菽災之大者也二年春王正月夏五月壬辰雉門及兩觀災范氏曰雉門公宫之南門兩觀闕也何氏曰雉門兩觀皆天子之制門為其主觀為其飾高郵孫氏曰自成王以天子禮樂賜周公而魯之羣公相承僭之國内制度一同于天子孔子非之而欲著其僭于春秋乆矣于是雉門兩觀災故孔子因其災以著其僭曰及者災自雉門而及于兩觀先後之次爾謝氏曰宫室過制天所不與然則雉門及兩觀災乃天惡其僭而災之也秋楚人伐吳昭三十年冬吳子問于伍員曰初而言伐楚余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚如何對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚于是乎始病三十一年秋吳人侵楚伐夷侵潛六楚沈尹戌帥師救潛呉師還楚師遷潛于南岡而還吳師圍弦左司馬戍右司馬稽帥師救弦及豫章呉師還始用子胥之謀也至是桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師于豫章呉人見舟于豫章而潛師于巢冬十月吳軍楚師于豫章敗之遂圍巢克之獲楚公子繁許氏曰自襄三年書楚伐吳終于人之則楚力竭矣于是有吳入郢自昭三十二年書吳伐越終于越再入吳于是吳亡楚介在南荒彼此相攻不可殫録故刪取其要如此以為伐國之戒七書楚伐僅能一克于朱方他役皆敗無功書伐而不書敗者積其陵暴首兵之咎將微之于此而後至于禍敗失國也冬十月新作雉門及兩觀穀梁氏曰言新有舊也作為也劉氏意林曰習舊而不知以為非覩變而不知以為戒無怪于季氏之脅其主矣此春秋之微辭致意也高氏曰聖人特書新作者重僭竊之罪自在定公而不在先公也胡氏曰書新作者譏僭王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其内為應門而路門在應門之内是天子之五門也僖公嘗修泮宫復閟宫非不用民力而春秋不書新作南門則獨書者南非一門也必有不當為者子家駒以設兩觀為僭天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋于僭君必書者必正之意也使定公遇災而懼革其僭禮三家陪臣雖欲僭諸侯執國命其敢乎習舊而不知以為非何以禁季氏之脅其主哉故特書新作以譏之三年春王正月公如晉至河乃復程子曰季孫意如上不請于天子下不請于方伯而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟于臯鼬二月辛卯邾子穿卒二年邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之至是二月辛卯邾子在門臺臨廷閽以瓶水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投于牀廢于鑪炭爛遂卒先葬以車五乘殉五人莊公卞急而好潔故及是夏四月秋葬邾莊公冬仲孫何忌及邾子盟于㧞修邾好也許氏曰天下有禮則邦國相下春秋之季大國日侵兵力勝而禮敬亡故志公如晉至河乃復著晉之輕魯也志仲孫何忌及邾子盟于㧞著魯之輕邾也髙氏曰邾子居喪而以吉禮與魯大夫盟則微弱可知家氏曰春秋書邾人之喪繼以仲孫之盟責魯也四月春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚三年蔡昭侯為兩佩與兩裘以如楚獻一佩一裘于昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐候自拘于司敗曰君以弄馬之故隱君身棄國家羣臣請相夫人以償馬必如之唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之乆也官不共也明日禮不畢將死蔡侯歸及漢執玊而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚至是劉文公合諸侯于召陵謀伐楚也晉荀寅求貨于蔡侯弗得言于范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損于楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄于鄭明日或斾以㑹晉于是乎失諸侯程子曰楚恃其強侵凌諸侯晉上請于天子大合諸侯以伐之而不能明暴其罪以行天討無功而還故書侵以罪之胡氏曰傳書伐而經書侵楚者楚為無道憑陵諸夏為一裘一馬拘唐蔡二君三年而後遣蔡侯既歸而請師于晉晉人請命于周大合諸侯天子之元老在焉若能暴明其罪恭行天討庶幾哉王者之師齊桓晉文之功褊矣有荀寅者求貨于蔡侯弗得遂辭蔡人晉由是失諸侯無功而還愚按召陵之㑹傳雖稱謀伐楚而實未嘗加兵于楚聖人以其雖加兵于楚亦必不能聲其罪而服之故特書曰侵楚以陋之此乃特筆與其他書侵書伐者不同以例求之則失之矣夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈胡氏曰書滅沈罪公孫姓也書以歸罪沈子嘉也書殺之罪蔡侯也奉辭致討而覆其邦家為敵所執不死于位皆不仁矣所惡于前無以先後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘于楚三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃强殺之甚矣能無公孫翩之及哉大東萊吕氏曰蔡公孫姓不能正其君之失而遂滅沈至以沈子嘉歸殺之其罪極矣春秋之世諸侯君臣失道至此者皆由不知分義茍力所能制則為之矣此與禽獸奚辨許氏曰沈不受令而使蔡滅沈許已受盟而不能禁鄭滅許有以知晉政之失諸侯矣五月公及諸侯盟于臯鼬將㑹衛子行敬子言于靈公曰㑹同難嘖有煩言莫之治也其使祝佗從公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行袚社釁鼓祝奉以從于是乎出竟若嘉好之事君行師從卿行旅從臣無事焉公曰行也及臯鼬將長蔡于衛衛侯使祝佗私于萇𢎞曰聞諸道路不知信否若聞蔡將先衛信乎萇𢎞曰信蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚徳也昔武王克商成王定之選建明徳以藩屛周故周公相王室以尹天下于周為睦分魯公以大路大旂夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜以法則周公用即命于周是使之職事于魯以昭周公之明徳分之土田陪敦祝宗卜史備物典䇿官司彜器因商奄之民命以伯禽而封于少皥之虚分康叔以大路少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土畧自武父以南及圃田之北竟取于有閻之土以共王職取于相土之東都以㑹王之東蒐聃季授土陶叔授民命以康誥而封于殷虚皆啟以商政疆以周索分唐叔以大路宻須之鼓闕鞏姑洗懷姓九宗職官五正命以唐誥而封于夏虚啟以夏政疆以戎索三者皆叔也而有令徳故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啟商惎間王室王于是乎殺管叔而蔡蔡叔其子蔡仲改行率徳周公舉之以為已卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也武王之母弟八人周公為太宰康叔為司宼聃季為司空五叔無官豈尚年哉曹文之昭也晉武之穆也曹為伯甸非尚年也今將尚之是反先王也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期蔵在周府可覆視也吾子欲復文武之畧而不正其徳將如之何萇𢎞說告劉子與范獻子乃長衛侯于盟陸氏纂例曰重言諸侯劉子不與盟也程子曰公不獲見于晉故因㑹而求盟焉則此盟公意故書公及胡氏曰定公之立上不請于天王下不告于方伯而受國于季孫意如故三年朝晉至河而復今㑹諸侯求為此盟書公及者内為志也召陵之㑹不序十有八國之諸侯則無以見侵楚之陋臯鼬之盟序與不序非義所繫則以凡舉可也劉氏意林曰楚人不義晉以霸主之勢憑王命之重而不能討顧使吳乘其釁中國不振旅功近而禍逺矣不亦病乎孔子曰夷狄之有君不如諸夏之亡是所以眷眷于臯鼬之盟者也許氏曰齊桓晉文之興至于盟不言同者過乎同之辭也春秋之季至于盟不言同者不及乎同之辭也臯鼬之盟諸侯攜矣齊梁丘據說幣錦致昭公不復楚子常志在佩裘使蔡侯自絶晉士鞅以賂罷扈之㑹荀寅求貨弗得折召陵之謀故政勝于明時而賄流于衰世君子是以察治忽也家氏曰志劉子不與諸侯之盟得王人與㑹之體也樸鄉吕氏曰嘗考春秋二百四十二年之事以為北杏以前是一時也北杏以後是一時也召陵以前是一時也召陵以後是一時也北杏以前諸侯無霸故有特相盟者有參盟參㑹者有相攻伐者北杏以後則異是矣召陵以後諸侯亦無霸故亦有特相盟者有參盟參㑹者有相攻伐者召陵以前則異是矣天下之有霸非美事也天下之無霸非細故也夫霸者王之反也有霸則無王矣名曰尊周而實奪其權北杏以前天下未知有霸也而猶知有王北杏以後天下惟知有霸矣豈美事哉雖然有霸者在焉則諸侯猶有所附中國猶得以安僣亂猶知所畏是猶幸有霸也霸衰而諸侯散霸衰而中國擾霸衰而僣亂横天下益不幸矣是故晉侯吳子㑹于黄池而春秋終焉杞伯成卒于㑹六月葬陳惠公許遷于容城謝氏曰許又自白羽遷容城國無定處民無定守故自葉至容城凡四遷秋七月公至自㑹劉卷卒杜氏曰即劉蚠也陸氏纂例曰畿内諸侯不同列國故不言劉子卷卒亦譏來赴故書葬杞悼公楚人圍蔡楚為沈故圍蔡晉士鞅衛孔圉帥師伐鮮虞許氏曰謀楚而不能討盟蔡而不能救則惟中山是伐書卿與師著威勝不行于強暴而行于寡弱也葬劉文公謝氏曰魯以外諸侯㑹葬非禮也冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭伍員為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犁之孫嚭為吳大宰以謀楚楚自昭王即位無歲不有呉師蔡侯因之以其子乾與其大夫之子為質于吳冬蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢左司馬戍謂子常曰子㳂漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥阨子濟漢而伐之我自後擊之必大敗之既謀而行武城黑謂子常曰吳用木也我用革也不可乆也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别三戰子常知不可欲奔史皇曰安求其事難而逃之將何所入子必死之初罪必盡說十一月庚午二師陳于柏舉闔廬之弟夫槩王晨請于闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死胡氏曰吳何以稱子善伐楚解蔡圍也荆楚暴横盟主不能致其討天王不得達其命長惡不悛復興師而圍蔡王法所當討而不赦也吳能自卑聴蔡侯之義以達天子之命興師救蔡戰于柏舉大敗楚師成霸討之功善矣晉主夏盟中國所仰若嘉穀之望雨也有請于晉如彼其難吳國天下莫强焉非諸侯所能以也有請于吳如此其易故召陵之㑹大合諸侯而書侵楚柏舉之戰蔡用吳師特書曰以者深罪晉人保利棄義難于救蔡也然則何以不書救乎救大矣闔廬子胥宰嚭皆懷謀楚之心蔡人往請㑹逢其適非有救災恤隣從簡書憂中國之實也聖人道大徳宏樂與人為善故因其從蔡特進而書爵囊瓦貪以敗國又不能死可賤甚矣故記其出奔特貶而稱人春秋之情見矣高氏曰書奔鄭罪鄭以中國而主荆楚奔亡之臣也庚辰吳入郢吳從楚師及清發將擊之夫槩王曰困獸猶鬬况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬬心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢己夘楚子取其妹季芉卑我以出渉睢鍼尹固與王同舟王使執燧象以奔吳師庚辰吳入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之左司馬戍及息而還敗吳師于雍澨傷初司馬臣闔廬故恥為禽焉謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷句卑布裳剄而裹之蔵其身而以其首免楚子渉睢濟江入于雲中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芉以從由于徐蘇而從鄖公辛之弟懷將弑王曰平王殺吾父我殺其子不亦可乎辛曰君討臣誰敢讐之君命天也若死天命將誰讐詩曰柔亦不茹剛亦不吐不侮鰥寡不畏强禦唯仁者能之違彊陵弱非勇也乘人之約非仁也動無令名非知也必犯是余將殺女鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罸于楚而君又竄之周室何罪楚子在公宫之北吳人在其南子期似王逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而宻邇于楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不唯一人若鳩楚竟敢不聽命吳人乃退鑪金初宦于子期氏實與隨人要言王使見辭曰不敢以約為利王割子期之心以與隨人盟初伍員與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以薦食上國虐始于楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰于君疆埸之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立于庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出五年申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知吳道使楚人先與吳人戰而自稷㑹之大敗夫槩王于沂吳人獲薳射于柏舉其子帥奔徒以從子西敗吳師于軍祥秋七月子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗奔楚為堂谿氏吳師敗楚師于雍澨秦師又敗吳師吳師居麇子期將焚之子西曰父兄親暴骨焉不能收又焚之不可子期曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰吳師敗又戰于公壻之谿吳師大敗吳子乃歸楚子入于郢初鬭辛聞吳人之争宫也曰吾聞之不讓則不和不和不可以逺征吳争于楚必有亂有亂則必歸焉能定楚王之奔隨也將渉于成臼藍尹亹渉其帑不與王舟及寧王欲殺之子西曰子常思舊怨以敗君何效焉王曰善使復其所吾以志前惡王賞鬭辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬬懷子西曰請舍懷也王曰大徳滅小怨道也申包胥曰吾為君也非為身也君旣定矣又何求且吾尤子旗其又為諸遂逃賞王將嫁季芉季芉辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹王之在隨也子西為王輿服以保路國于脾洩聞王所在而後從王王使由于城麇復命子西問高厚焉弗知子西曰不能如辭城不知高厚大小何知對曰固辭不能子使余也人各有能有不能王遇盗于雲中余受其戈其所猶在袒而示之背曰此余所能也脾洩之事余亦弗能也胡氏曰及楚人戰則稱爵入郢則舉其號何也君舍于君之室大夫舍于大夫之室亂極也聖人誰毁誰譽救災恤鄰則進而書爵非有心于與之順天命也乘約肆淫則黜而舉號非有心于貶之奉天討也伐國者固將極民于水火之中而鳩集之耳殺其父兄係其子弟毁其宗廟遷其重器而亂男女之配也如水益深如火益熱則善小而惡大功不足以掩之矣聖人心無毁譽如鏡之無妍醜也因事物善惡而施褒貶焉不期公而自公耳明此義然後可以司賞罸之權得春秋之法矣五年春王三月辛亥朔日有食之夏歸粟于蔡以周亟矜無資穀梁氏曰諸侯無粟諸侯相歸粟正也孰歸之諸侯也公羊氏曰曷為不言諸侯歸之離至不可得而序故言我也家氏曰歸之為言出于人心之所同不待勤勉而各以粟歸也於越入吳吳在楚也謝氏曰吳知郢之利在前而不知越之患在後故吳子渉千里之險入郢於越乘一朝之釁入吳空内務外有國之大患也高氏曰昭五年楚子以諸侯伐吳而越人已見于經至此及十四年至哀十三年皆書於越何也越人自名曰於越君子名之曰越治國有狀能與中國通則以君子之辭言之治國無狀不能與中國通則以其俗之辭言之越始稱人以其慕中國之義也改稱於越者惡之也吳之伐楚有安中國之意而越乃乘其士卒罷弊掩入其國至十四年又敗吳于檇李哀十二年又入吳若為楚復讐者是以君子惡之以其本俗之辭謂之於越歟六月丙申季孫意如卒六月季平子行東野還未至丙申卒于房陽虎將以璵璠歛仲梁懷弗與曰改歩改玊陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既葬桓子行東野及費子洩為費宰逆勞于郊桓子敬之勞仲梁懷仲梁懷弗敬子洩怒謂陽虎子行之乎乙亥陽虎囚季桓子及公父文伯而逐仲梁懷冬十月丁亥殺公何藐乙丑盟桓子于稷門之内庚寅大詛逐公父歜及秦遄皆奔齊胡氏曰内大夫有罪見討則不書卒公子翬是也仲遂殺惡及視罪與翬同而書卒者以事之變卒之也意如何以書卒見定公不討逐君之賊以為大夫全始終之禮也定雖受國于季氏苟有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可正公室強矣今茍于利而忘其讐三綱滅公室益侵陪臣執命宜矣故意如書卒主人習其讀而問其傳則未知已之有罪焉耳秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞三年秋九月鮮虞人敗晉師于平中獲晉觀虎恃其勇也至是晉士鞅圍鮮虞報觀虎之役也許氏曰晉始以土地之故與鮮虞睽咎不在鮮虞也而晉不自反縱兵横加而不能服則又圍之兵益忿義益不勝君子是以惡晉也春秋闕疑卷四十
