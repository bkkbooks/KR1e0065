body:
  text: 春秋闕疑卷一元鄭玉撰春秋孟子曰晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史孔子謂其義則丘竊取之矣杜氏曰春秋者魯史記之名也記事者以事繫日以日繫月以月繫時以時繫年所以記遠近别同異也故史之所記必表年以首事年有四時故錯舉以為所記之名也愚謂孔子之脩春秋假一國之史書寓百王之大法至於其名則因其舊而不易所謂述而不作者也然不觀諸天地不足以知春秋之原不觀諸春秋不足以見聖人之用蓋一生一殺而歲功成者天地之至神一賞一罰而治功成者聖人之能事錯舉四時以為名者聖人未脩之春秋魯史之舊文也法諸天地以立義者聖人已脩之春秋帝王之大法也但聖人之經詞簡義㴱本非後世儒者所能測識然聖人之意本欲使與魯史並行學者求事之本末於史而觀理之曲直於經也史則如今世吏人之文案經則如前代主者之朱書惜乎魯史不存猶頼左傳可以考其大槩然意左氏當時所見魯史已無全文故於其殘闕則妄為之説以補之是以間有本末顚倒是非錯繆之失而經之微㫖不復可見此春秋之大恨也隱公公名息姑惠公之子姬姓侯爵自周公之子伯禽始受封於魯至公十三世平王四十九年即位諡法不尸其位曰隱孟子曰王者之迹熄而詩亡詩亡然後春秋作楊龜山曰春秋之時詩未盡亡也黍離降為國風則雅亡矣雅亡則無政春秋所為作也愚按詩自黍離降為國風而雅亡平王東遷正在雅亡之後播蕩陵遲至於老死不能中興所謂王者之迹熄矣聖人於是託始於隱公而作春秋焉元年公羊氏曰元年者何君之始年也高氏曰歲在己未是隱公之始年周平王之四十九年也人君嗣位必逾年稱元者自古天子諸侯皆然非仲尼作春秋始為此法也然諸侯嗣君得有其年不得有其正正朔必稟於天子故仲尼因魯史脩春秋以正月繫之王而元年繫之魯也董仲舒曰謂一為元者示大始欲正本也一元既建累而數之為國之久新歴年之多少顯然可見矣前古人君皆然自漢文帝改後元年孝武又因事别建年號後世帝王遂因襲之數年一改以為美事乃以改元之多寡為享國之久長或於一歲之内有改元再三者又一國之中有前後重複者甚至於不待逾年而自改元又復有改年為載者斯皆率意妄作又豈知春秋書元之義乃萬世不易之法乎愚按孔子之作春秋所以記天下諸侯之事而非一國之史雖用周以紀元可也蓋周有一代之定制所謂時王之法孔子安敢置可否於其間惟託之於魯然後可以損益三代之禮因四王之事而為萬世之法也然則春秋實夫子所以為治於天下後世者特託魯史以成文爾春王正月公羊氏曰曷為先言王而後言正月王正月也何言乎王正月大一統也穀梁氏曰雖無事必舉正月謹始也程子曰春天時正月王正書春王正月示人君當上奉天時下承王正明此義則知王與天同大而人道立矣高氏曰夫春者天時也正月者王正也知王正月之為春則知王道即天道矣春秋因王命以正王道稱天王以奉天命故先書春王正月而二百四十二年之事皆天理王道也謝氏曰人君以政率天下正天下始於是月故年之一月謂之正月有德然後有政有年然後有月故聖人以元起年以正起月張氏曰示一統於此而禮樂征伐之專者以次而正焉此元年春王正月所以為謹始之書也胡氏曰正次王王次春乃立法創制裁自聖心無所述于人者非史册之舊文矣愚按春王正月或曰夏正或曰周正或曰以夏時冠周正考之于經終無定説姑闕之以竢知者三月公及邾儀父盟于蔑公攝位而欲求好於邾故為蔑之盟張氏曰魯侯爵而稱公者臣子之辭夫子魯人也書他國諸侯侵伐盟會則從其本爵而魯獨書公蓋父母之邦從臣子所稱所以崇敬也穀梁氏曰及者何内為志焉爾公羊氏曰及猶汲汲也程子曰盟誓以結信出于人情先王所不禁也盟而不信則罪也諸侯交相盟誓亂世之事也凡盟内為主稱及外為主稱會在魯地雖外為主亦稱及彼來而此及之也兩國以上皆稱會彼盟而往㑹之也邾附庸國邾子克字儀父附庸之君例稱字同王臣也在外則稱名降于内也謝氏曰諸侯敎命皆受之王而達之民也禮樂不敢擅出禁令不敢擅行制度不敢擅革臣子之道也春秋之亂列國講好脩令不復請命天子而擅相為盟上命由此不行而王綱由此壞矣凡書盟以罪諸侯之專也脩德禮明信義正法令大國得小國之道也德禮脩而小國懐信義明而小國服法令適宜而小國畏又奚待盟約相要而後協哉春秋之亂諸侯好修令不正其本而劫之以盟誠意由此不明而邦國由此不親矣凡書盟以示諸侯之失道也高郵孫氏曰盟會則以主會為首侵伐則以主兵為首所以輕重之也臨江劉氏曰公侯百里伯七十里子男國五十里不及五十里附於諸侯曰附庸愚按元年為蔑之盟七年為伐邾之舉比事而觀善惡著矣夏五月鄭伯克段于鄢初鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏故名曰寤生遂惡之愛共叔段欲立之亟請于武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙貳於已公子呂曰國不堪貳君將若之何欲與大叔臣請事之若弗與則請除之無生民心公曰無庸將自及大叔又收貳以為已邑至於廪延子封曰可矣厚將得衆公曰不義不暱厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢五月辛丑大叔出奔共遂寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之穀梁氏曰段弟也而弗謂弟公子也而弗謂公子貶之也段失子弟之道矣賤段而甚鄭伯也程子曰鄭伯失為君之道無兄弟之義故稱鄭伯而不言弟克勝也言勝見段之强使之强所以致其惡也不書奔義不繫於奔也楊龜山曰其始畏父母諸兄之言所謂小不忍也而卒害之其為言曰多行不義必自斃又曰不義不暱厚將崩其弗制也姑稔其惡也書曰鄭伯克段于鄢則克段者鄭伯而已非國人所欲也胡安定先生曰鄭伯兄也不能敎弟以養成其惡是兄不兄弟不弟故聖人書以交譏之家氏曰鄭莊始也從母之命封段于京以是為孝卒之以段之故誓母於潁曰不及黄泉無相見也孝安在焉使鄭莊于請制請京之時裁之以義諭之以禮感之以誠與其所當與勿與其所不可與則段不至於逆公不煩于討而鄭無事矣吁惟知孝弟之道者而後可以語此吾于鄭莊何責愚謂姜氏欲之焉避害之言莊公固不能勝其母也然不能勝母者情也制之以禮者義也聖賢于此安肯舍禮法縱情欲而陷其親于不義乎亦必有道也孟子曰仁人之于弟也不藏怒焉不宿怨焉親愛之而已矣使鄭伯之于段如舜之于象封之有庳使吏治之而段不得有為則段長有京城而鄭無患矣豈有置姜氏于城潁之禍哉此所謂從父之令為非孝也秋七月天王使宰咺來歸惠公仲子之賵公羊氏曰賵者蓋以馬以乘馬束帛穀梁氏曰乘馬曰賵衣衾曰襚貝玉曰含錢財曰賻髙郵孫氏曰仲子者惠公再娶之夫人不曰夫人而繫之惠公者不正其為夫人故從夫以别之見失禮者夫也仲子卒於春秋之前天王至是而來賵之耳程子曰王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也後世以智力把持天下者霸道也春秋因王命以正王法稱天王以奉天命夫婦人倫之本最當先正春秋之時嫡妾僭亂聖人尤謹其名分男女之配終身不變者也大夫而下内無主則家道不立故不得已有再娶之禮天子諸侯内職具備后夫人亡可以攝治無再娶之禮以夫人禮賵人之妾不天亂倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王胡氏曰王朝公卿書官大夫書字上士中士書名下士書人仲子惠公之妾爾以天王之尊下賵諸侯之妾是加冠于屨人道之大經拂矣夫天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則專掌其事而承命以賵諸侯之妾是壞法亂紀自王朝始也春秋重嫡妾之分故特貶而書名以見宰之非宰矣程氏學曰成風之喪亦妾母也王使榮叔歸含且賵王使召伯來會葬俱不稱天者以明無天道也前之所以書天者不如是無以見王者當奉若天道後之所以去天者不如是無以見弗克若天也春秋謹嚴大法可見愚按春秋之前王未有稱天者王稱天王春秋立法創制聖人之特筆也天子而知此則必以天自處而不敢自輕諸侯而知此則必以天事王而不敢自肆此則春秋以天書王之意也九月及宋人盟于宿惠公之季年敗宋師于黄公立而求成焉九月及宋人盟于宿始通也胡氏曰内稱及外稱人皆微者其地以國宿亦與焉微者盟會不志于春秋此其志者有宿國之君也凡書盟者惡之或曰周官有司盟掌盟載之法詛祝作其詞玉府共其器戎右役其事太史藏其約蘇公亦曰出此三物以詛爾斯夫盟以結信出于人情先王猶不禁也而謂凡書盟者惡之可乎曰盟以結信非先王所欲而不禁逮德下衰欲禁之而不克也春秋之時會而歃血其載果掌於司盟猶不以為善也又况私相要誓慢鬼神犯刑政以成傾危之習哉謝氏曰元年及宋人盟十年伐宋敗宋師盟不足以結鄰可知也故人君務修刑政以服四鄰冬十有二月祭伯來左氏曰非王命也穀梁氏曰來者來朝也其弗謂朝何也寰内諸侯非有天子之命不得出會諸侯不正其外交故弗與朝也䀻弓鍭矢不出境場束修之肉不行境中有至尊者不貳之也胡氏曰人臣義無私交大夫非君命不越境所以然者杜朋黨之原為後世事君而有貳心者之明戒也謝氏曰春秋首奪祭伯之朝而王臣擅命私交之罪著矣公子益師卒程子曰諸侯之卿必受命于天子當時不復請命故諸侯之卿皆不書官不與其為卿也惟宋王者後得自命官故獨宋卿書官卿者佐君以治其國其卒國之大事故書于此見君臣之義矣或日或不日因舊史也二年春公㑹戎于潛修惠公之好也戎請盟公辭程子曰周室旣衰絶域之民有散居中國者方伯大國眀大義以攘斥之義也其餘列國慎固封守可也若與之和好以免侵暴非所謂以固吾圉所以啟其亂源也故春秋中外之辨尤謹張氏曰惠公與之有好旣失之矣隱公眀内外之辨修戎政而絶其好會可也不能絶之而與盟于後故于此書曰會戎所以譏隱公降國君之尊失中國之重不修攘斥以啓其冦亂之階也高氏曰隱公居喪未會諸侯于王朝而先與戎會是誠何心哉及天王使凡伯來聘戎伐凡伯于楚丘以歸則魯會戎盟適所以貽王室之患耳此春秋之所誅也謝氏曰禮時見曰會則無非時者會以訓上下以正班爵以敘長幼則㑹無非事者春秋之世强凌弱小役大講好無節出師無義構事者旁午交興畏命者奔走不息故列國欲相親則為會欲求盟則為會欲合衆則為會以致勞民蠧財棄國弛政紛然會于郊境之間凡書會以罪諸侯之非法也結之以恩懐之以德綏戎之道也人君曷嘗屈辱于戎哉隱公欲修好而與戎會于郊弱邦國之勢啓外冦之心適以招患而已春秋書會戎于潛以示諸侯御戎之失道也治政中國為善人材中國為强甲兵中國為利修此以待彼而四方莫敢不服况于一戎之小乎故有國家者患内不修不患外不順患内不强不患外不畏夏五月莒人入向莒子取于向向姜不安莒而歸夏莒人入向以姜氏還胡氏曰莒子娶于向向姜不安莒而歸莒人入向以姜氏還此所謂按也春秋書曰莒人入向此所謂斷也以事言之入者造其國都以義言之入者逆而不順莒稱人小國也張氏曰莒以一婦人之故擅興兵入人之國都王法所當誅也家氏曰夫婦人倫之始國君所與共承祭祀刑家以治其國者也向姜不安莒是必有故莒子當知所以自反今也遽以兵入人之國都而奪其去妻以還此非還妻之道也無駭帥師入極司空無駭入極費庈父勝之程子曰古者卿皆受命于天子春秋之時諸侯自命已賜族者則書族不書者未賜也謝氏曰師大衆極小國以大衆入小國殘虐之大者也方是時天王無討罪之威方伯連帥無致伐之義故莒人無駭肆虐而弗能正向極小國被害而弗能救也觀莒人入向無駭入極而上下不知治罪可見矣樸鄉呂氏曰自僖以前書大夫帥師者九自文而後書大夫帥師者百有八焉世之相去畧同而帥師之多寡不侔若是蓋其始也大夫之專權猶寡其終也則視以為常矣然則無駭其始歟據事直書義自見矣秋八月庚辰公及戎盟于唐戎請盟秋盟于唐復修戎好也程子曰戎荐居而與之盟非義也程氏學曰諸侯與諸侯盟誓已曰不可况與戎人㰱血要言哉胡氏曰前此盟不日盟于唐書日謹之也高氏曰唐我地彼來而我及之也謝氏曰戎人嗜好無厭其有求也不正以義不結以威彼將肆其所欲則吾將有所不堪隱公旣與戎會于潛又與戎出盟于唐其不能制戎可知也會與之相見而已盟則以事相要非特相見也與戎㰱血要言非特不能制戎也又將受制于戎矣故戎不難治也中國自輕然後戎見陵中國自强然後戎不為寇愚按春書會戎于潛秋書盟戎于唐所以責魯者至矣比事而觀使魯能辭潛之會則無盟戎之辱旣無盟戎之辱又安有戎伐凡伯于楚邱之禍哉然則隱公能守周公魯公之舊法以禮自立豈惟魯無侵辱之患王室亦且尊安矣此春秋于盟戎之事所以㴱罪魯侯而不責戎人也九月紀履緰來逆女冬十月伯姬歸于紀杜氏曰裂繻紀大夫公羊氏曰女在其國稱女在塗稱婦入國稱夫人婦人謂嫁曰歸何以不稱使婚禮不稱主人何以書譏不親迎也穀梁氏曰逆女親者也使大夫非正也胡氏曰魯哀公問冕而親迎不已重乎孔子對曰合二姓之好以為宗廟社稷主君何謂已重乎文定厥祥親迎于渭造舟為梁不顯其光則世子而親迎也韓侯娶妻蹶父之子韓侯迎止于蹶之里則諸侯而親迎也有夫婦然後有父子有父子然後有君臣夫婦人倫之本也逆女必親使大夫非正也入春秋之始名宰咺歸賵以譏亂法書履緰逆女以志變常衆妾之分定矣大昏之禮嚴矣紀子伯莒子盟于宻程子曰闕文也胡氏曰甲戌己丑夏五紀子伯莒子盟于宻之類或曰本據舊史因之而不能益者也或曰先儒傳受承誤而不敢增者也闕疑而慎言其餘可矣必曲為之説則鑿矣十有二月乙卯夫人子氏薨程子曰薨者上墜之聲穀梁氏曰夫人者隱之妻也卒而不書葬夫人之義從君者也胡氏曰邦君之妻國人稱之曰小君卒則書薨以明齊也先卒則不書葬以明順也有夫婦然後有父子有父子然後有君臣入春秋之始於子氏書薨不書葬明示大倫茍知其義則夫夫婦婦而家道正矣鄭人伐衞元年鄭共叔之亂公孫滑出奔衞衞人為之伐鄭取廩延鄭人以王師虢師伐衞南鄙至是鄭人伐衞討公孫滑之亂也程氏曰天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐舉兵以侵伐人其罪著矣春秋直書其事而責常在被侵伐者蓋彼加兵于己則當引咎自辨喻之以禮義不得免焉則固其封疆告于天子方伯若忿而與戰則以與戰者為主處已絶亂之道也衞服故不戰衞服可免矣鄭之擅興戎王法所不容也謝氏曰伐討罪之詞也侵則以彼犯此此犯彼也故春秋之兵執言討罪為伐無名攻掠為侵雖然以義伐不義者治國之伐也以不義伐不義者亂國之伐也春秋以義行伐者寡矣若夫彼善於此惡有重輕則觀乎其事而得失見矣胡氏曰聲罪致討曰伐潛師掠境曰侵愚按春秋所書侵伐皆因當事出師之名而錄之耳非有所予奪于其間也若曰因侵伐以寓褒貶之意則征伐自天子出非諸侯之所得專也然則春秋凡書侵伐皆罪也至于齊晉伯業之盛衰則或間有微意焉夫衞人黨惡伐鄭以取廪延固不為無罪元年鄭人以王師虢師伐衞南鄙亦足以聲其罪矣故春秋不書以責衞也至是不由王命而又興師以伐衞則已甚矣故春秋書之以罪鄭也三年春王二月己巳日有食之程子曰月王月也事在二月則書王二月在三月則書王三月無事則書時書首月蓋有事則道在事無事則存天時王朔天時備則歲功成王道存則人理立春秋之大義也日有食之有食之者也更不推求何者也太陽君也而被侵食君道所忌然有常度災而非異也臨江劉氏曰或日或不日或言朔或不言朔史之記失也謝氏曰日食天變之大者也天人一氣故人事與天變相應猶影響相隨日變見于上則人事沴于下人君不知恐懼脩省則禍敗至矣周之盛時日非無食也所以上下順治而無患者盛德之君能使人事不隨日食更變而已故日食一也德足以弭變則災害消德不足以弭變則災害起故春秋日食必書以為人君警懼之戒胡氏曰日者衆陽之宗人君之表而有食之災咎象也克謹天戒則雖有其象而無其應弗克畏天災咎之來必矣愚謂不曰日食而曰日有食之者有者自外至之詞蓋陽弱而陰來食之也然則陽氣弱則陰得以食之君德衰則臣得以干之矣此有食之之謂也三月庚戌天王崩穀梁氏曰高曰崩厚曰崩尊曰崩天子之崩以尊也以其在民上故崩之程子曰崩上墜之形四海之内皆當奔赴魯君不往惡極罪大不可勝誅不書而自見也胡氏曰諸侯為天王服斬縗禮當以所聞先後而奔䘮今平王崩周人來訃而隱不往是無君也謝氏曰天王升遐王室變故之大者也諸侯以臣事君猶以子事父其聞赴也近者當奔喪逺者當會葬臣子哀痛之情也周衰列國朝聘不修征伐自擅告戒不以王命而專盟出入不以王事而專會臣子之禮掃地盡矣故天王之崩也喪不奔葬不會或以卿往而身不行或以微臣往而卿不出春秋或書卿會葬或書葬不書卿或書崩不書葬或奔葬皆不書著諸侯不臣之罪也襄王之葬叔孫得臣如京師景王之葬叔鞅如京師魯以卿會葬也桓王匡王簡王之葬不書卿者魯以微臣會葬也平王惠王定王靈王不書葬者魯不會葬也莊王釐王頃王崩葬皆不書者王室微弱不能赴諸侯驕亢不往會也夏四月辛卯君氏卒左氏曰君氏卒聲子也不赴於諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬不書姓為公故曰君氏穀梁氏曰夏四月辛卯尹氏卒尹氏者何也天子之大夫也外大夫不卒此何以卒之也於天子之崩為魯主故隱而卒之公羊氏曰其稱尹氏何譏世卿非禮也愚按三説不同未知孰是姑闕之以竢知者秋武氏子來求賻王未葬也公羊氏曰武氏子何天子之大夫也其稱武氏子者何譏父卒子未命也何以不稱使當喪未君也穀梁氏曰歸死者曰賵歸生者曰賻歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之程子曰武氏王之卿士稱武氏見世官天王崩諸侯不供其喪故武氏子徵求于四國書之以見天子失道諸侯不臣也胡氏曰古者君薨諒陰百官總己以聽于冡宰三年夫百官總己以聽則是攝行軍國之事也以非王命而不稱使所以謹天下之通喪而嚴君臣之名分也張氏曰仲子之喪宰咺歸賵而平王之喪隱公不奔喪不勝誅為政於王室者不能輔王以舉政刑而遣使下求于列國春秋書之以見其隳體失政取輕天下文武之澤斬然矣八月庚辰宋公和卒宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以没先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭八月庚辰宋穆公卒殤公即位高氏曰凡外諸侯卒書名降于天子也不曰薨異内外也先儒謂天子曰崩諸侯曰薨大夫曰卒士曰不祿是不然天子至尊天下共稱曰崩可也諸侯曰薨則本國臣子之詞至于赴告雖大夫以至士皆曰不祿史官書之亦皆曰卒爾豈得定配以為品例耶後世遷固曄壽之作史凡有爵位之臣皆書曰薨失春秋之法矣程子曰吉凶慶弔講好修睦隣國之常禮人情所當然諸侯之卒與國之大故來告則書胡氏曰外諸侯卒國史承告而後書聖人皆存而弗削而交隣國待諸侯之義見矣高郵孫氏曰春秋記外諸侯之卒百三十有三無名者十或即位之初不以名赴或史失之未可知也必若以盟會求之則未嘗與者五十有二而不名者九耳此未可通也冬十有二月齊侯鄭伯盟于石門尋盧之盟也程子曰天下無王諸侯不守信義數相盟誓所以長亂也故外諸侯盟來告者則書之胡氏曰外盟會常事也何以書在春秋之亂世常事也于聖人之王法則非常也有虞氏未施信于民而民信夏后氏未施敬于民而民敬殷人作誓而民始畔周人作會而民始疑子曰大道之行與三代之英丘未之逮也而有志焉諸侯會盟來告則書而弗削者其諸以是為非常之典而有志于天下為公之世乎陳氏曰此特相盟也書石門以志諸侯之合書醎以志諸侯之散吳氏曰諸侯之黨合而伯者之事興癸未葬宋穆公程子曰諸侯告喪魯往會則書高氏曰不稱宋葬穆公而稱葬宋穆公者據我而言葬彼也謝氏曰書葬書卿者六魯以卿往會葬也書葬不書卿者七十有四魯會而非卿也書卒不書葬者三十四彼告而魯不會也諸侯壤地相接邦事相交其相見有朝聘之歡其相親有婚姻之好其情可謂睦矣其卒而告終也以賵賻相恤以國卿會葬隣國之禮也春秋之時弱附强大輕小其弔問哀恤非以誠意也一視國勢强弱為之而已矣其勢盛者其情親而禮隆其勢微者其情踈而禮畧方是時小國之葬非特不以卿會也棄而不視者有之矣故卒而葬葬而遣卿者皆大國也卒而不葬葬而非卿者皆小國也春秋或書卿或不書卿或書葬或不書葬而諸侯恃大忽小虧闕隣好其惡見矣葬稱諡志善惡也稱公臣子辭也葬者藏也既葬則亡者不可得見也所不可没者善惡而已矣故諸侯葬則稱諡禮諸侯請諡于天子公一國之善惡而為之懲勸也周衰列國諡號皆本國臣子以私意為之其爵皆以公尊之故諸侯諡皆稱公春秋之法其卒也書公書侯書伯書子書男以正王爵書名書卒以正臣職其葬也書諡書公以明侯國僭禮君臣上下其分不可不辨也正其體於始死之時誅其僭于已葬之後而君臣上下之分明于卒葬之間矣愚謂卒以外赴書葬以魯會書不卒則是外不赴不葬則是魯不會也初無其義弑君不葬多因國亂不往會耳傳者見禮有讐不報則服不除不葬之文遂云賊不討故不書葬殊不知讐不報不葬者臣子之私情誓必報也㑹則必書葬者隣國之常禮史之實文也謂吳楚之君避其號而不書葬理或然也四年春王二月莒人伐杞取牟婁穀梁氏曰言伐言取所惡也啖氏曰凡先書伐國下書取邑者明取本國之邑也趙氏曰凡力得之曰取不當取也髙氏曰杞二王之後武王克商求夏之後得東婁公封之於杞待以賓禮雖天子猶不敢臣之而莒人敢以兵伐其國奪其先公所守天子所封之分地王法所當誅也程子曰諸侯土地有所受之伐其罪而奪取其土惡又甚焉謝氏曰春秋取邑取田皆謹而書之所以著其亂也春秋無仁義之師其侵伐以爭田土以復讐怨以逞威虐而已牟婁杞邑也伐杞而取牟婁則莒人非以討罪為心也利其土田而已惡之大者也胡氏曰上二年莒人擅興兵入向而天討不加焉至是伐國取邑其暴益肆矣戊申衞州吁弑其君完衞莊公娶于齊東宮得臣之妹曰莊姜美而無子衞人所為賦碩人也又娶于陳曰厲媯生孝伯早死其娣戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子敎之以義方弗納於邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長遠間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁游禁之不可桓公立乃老至是衞州吁弑桓公而立程子曰自古篡弑多公族蓋自謂先君子孫可以為國君人亦以為然而奉之春秋于此明大義以示萬世故春秋之初弑君者多不稱公子公孫蓋身為大惡自絶于先君矣豈復得為先公子孫也古者公族刑死則無服况弑君乎大義既明于初矣其後弑立者則皆以屬稱或見其以親而寵之太過任之太重以至于亂或見其天屬之親而反為宼讐立義各不同也春秋大率所書事同則辭同後人因謂之例然亦有事同而辭異者蓋各有義非可例拘也謝氏曰公子州吁嬖人之子也縁君之寵干紀亂法而桓公不得正東宮以繫國人之心州吁弑逆之萌兆于此矣夫嫡庶貴賤天下之定分也庶陵嫡賤易貴上不可以承宗廟下不可以聯族屬亂之大者也州吁以體則非嫡以位則非貴其出而爭國縁公子之寵而為之也恃子孫有繼承之道而為之也故其肆逆也春秋奪其公子所以黜其不正也所以絶其親而誅之也所以杜後世爭奪之心也觀州吁削奪公子而聖人討亂誅逆之意明矣世子國之根本位不正禮不隆則亂生莊公寵嬖孽以陵嫡貴致世子之位不定而州吁起爭國之心觀州吁稱衞而莊公産逆召禍其惡亦見矣高氏曰弑者殺之有漸也在易坤之初六曰履霜堅氷至象曰履霜陰始凝也馴致其道至堅氷也斯聖人防微杜漸之㴱戒然其言微其㫖遠孔子懼後世之弗辨也復贊之曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也蓋坤者臣道也子道也臣子之弑君父其包藏禍心如坤之初一陰始生萌芽有漸其理至微積久不已浸成弑逆如履霜而至于堅氷也此由君父不能防微杜漸辨之于早積至于此耳故為人君者崇學校以養人材興廉耻以勵人行其義修其節立雖未試以事而治民之端已見雖未授以位而愛民之意已彰如是而積之凡在位者皆忠臣也為人父者義方以訓其幼少師友以範其成人不示之以詐以起其姦偽之端不臨之以慢以開其干犯之漸未孝而已慈未恭而已慤如是而積之凡在家者皆孝子也不辨之于早者反此忠賢則不親而小人之與徒忠義則不教而邪僻之使習積久不已殃及其身于是乎君而見弑于臣父而見弑于子聖人傷君父辨之不早而臣子之惡不容誅也故詳著其事于春秋使元凶大惡雖假息于一時而常見誅于千載故曰春秋成而亂臣賊子懼夏公及宋公遇于清公與宋公為會將尋宿之盟未及期衞人來告亂夏公及宋公遇于清程子曰諸侯相見而不行朝會之禮如道路之相遇故書曰遇非周禮冬見曰遇之遇也程氏學曰古者諸侯因朝覲或從王命則必有會聚之事無非禮者也王室微弱典制廢壞諸侯各逞其欲盟會紛然舍此又簡易其事若道路相逢遇無國君之禮春秋所以致譏也胡氏曰春秋書遇私為之約自比于不期而遇者直欲簡其禮爾簡畧慢易無國君之禮則莫適主矣故志内之遇者三而皆書及若曰以此及彼然也志外之遇者四而皆以爵若曰以尊及卑然也其意以為莫適主者異于古之不期而會矣故凡書遇者皆惡其無人君相見之禮也宋公陳侯蔡人衞人伐鄭宋殤公之即位也公子馮出奔鄭鄭人欲納之及衞州吁立將脩先君之怨於鄭而求寵于諸侯以和其民使告于宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衞國之願也宋人許之于是陳蔡方睦于衞故宋公陳侯蔡人衞人伐鄭圍其東門五日而還公問于衆仲曰衞州吁其成乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣夫兵猶火也弗戢將自焚也夫州吁弑其君而虐用其民于是乎不務令德而欲以亂成必不免矣高郵孫氏曰書宋公陳侯之伐而不言帥師者君行師從舉君之重則帥師可知也曰蔡人衞人者將卑師少也程子曰宋以公子馮在鄭故與諸侯伐之也摟諸侯以伐鄭固為罪矣而衞弑其君天下所當誅也乃與修好而同伐人其惡甚矣胡氏曰春秋之法誅首惡興是役者首謀在位而以宋主兵何也前書州吁弑其君其罪已極至是阻兵修怨勿論可也而隣境諸侯聞衞之有大變也可但已乎陳恒弑簡公孔子沐浴而朝告于哀公曰請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可子曰以吾從大夫之後不敢不告也然則隣有弑逆聲罪赴討雖先發而後聞可也宋殤不恤衞有弑君之難欲定州吁而從其邪説是肆人欲滅天理非人之所為也故以宋公為首諸國為從示誅亂臣討賤子必先治其黨與之法也此義行為惡者孤矣張氏曰殤公茍知名州吁為賊拒其邪説告于王而討之則一舉而父子君臣之倫定中國之禍未至如後日之慘也今乃怵其邪説合陳蔡以助逆賊之黨而首修怨于隣國于是馮得以自固于鄭而宋國之人不復知君臣逆順之正理自是日從事于兵而弑逆之事卒及其身皆殤公不能早辨于此役徒自及也秋翬帥師會宋公陳侯蔡人衞人伐鄭諸侯復伐鄭宋公使來乞師公辭之羽父請以師會之公弗許固請而行諸侯之師敗鄭徒兵取其禾而還程子曰宋虐用其民衞當誅之賊而與之同伐人其罪大矣二國構怨而他國與之同伐其罪均也再序四國重言其罪左氏以為再伐妄也髙氏曰鄭本與宋結怨而他國與之同伐鄭方困于四國之役而翬復帥師往會之故再序四國以為重罪也然春秋之辭至簡至嚴若曰翬帥師會伐鄭豈不白乎再序四國何其辭費而不憚煩也言之重詞之複其中必有大美惡焉四國合黨翬復會師加兵無罪之邦欲定弑君之賊此惡之極也言之不足而再言之聖人之情見矣誅討亂臣之法嚴矣翬不稱公子者隱未命大夫至桓而受命乃得稱為公子也胡氏曰公辭而弗許義也而翬以不義强其君固請而行無君之心兆矣夫公子公孫升為貴戚之卿者其植根膠固難御于異姓之卿况翬已使主兵而方命乎隱公不能辨之于早罷其兵權猶使之帥師也是以及鍾巫之禍九月衞人殺州吁于濮州吁未能和其民厚問定君于石子石子曰王覲為可曰何以得覲曰陳桓公方有寵于王陳衞方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衞國褊小老夫耄矣無能為也此二人者實弑寡君敢即圖之陳人執之而請涖于衞九月衞人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳公羊氏曰其稱人何討賊之辭也程子曰稱衞人衆辭也舉國殺之也謝氏曰弑逆天下之大惡天地所不容臣民所共棄是不待告命而誅者也故春秋殺弑君之賊稱人以眀人皆得而殺之也春秋弑逆之主稱君以其名位定矣州吁則衞人討其逆而殺之故不書爵愚謂濮陳地書衞人善衞也書于濮善陳也衞人能以州吁為賊而請討于陳陳人能為衞執州吁而請涖于衞使臣子之心皆如石碏隣國之義皆如陳人則亂臣賊子将無所容於天地之間而篡弑之禍亦庶幾乎息矣宜聖人之善之也冬十有二月衞人立晉衞人逆公子晉于邢十二月宣公即位穀梁氏曰衞人者衆辭也立者不宜立者也程子曰衞人立晉衞人立之也諸侯之立必受命于天子當時雖不受命于天子猶受命于先君衞人以晉公子也可以立故立之春秋所不與也雖先君子孫不由天子先君之命不可立也故去其公子胡氏曰春秋于衞人特書曰立所以著擅置其君之罪于晉去其公子所以明專有其國之非以此垂法而父子君臣之義明矣陳氏曰繼故未有書立者賊不討君不葬譏不在立也必若衞人賊討君葬而後可以書立矣家氏曰春秋書法有襃而寓貶責備賢者之道也有貶而未絶開小人以自新之途也春秋于四國伐鄭之後繼書衞人殺州吁于濮又繼書衞人立晉再書衞人者襃衞人能不以篡賊為君相與仗大義而誅之所以不書入不書歸而變文書立以表異之亦以見其討之難其立之尤難惜其不能禀于王命而立之是所謂襃之中而見責備之意者也當是時四國連兵為篡賊植黨州吁之勢成矣而石碏以告老大夫非有權位之可倚毅然以討賊自任不動聲氣元惡即誅乃迎晉于邢而立之可謂居人臣之甚難是故春秋變文特書以示别異而中見責備之意非石碏之賢聖人不以是望之謂之責備則可謂之直貶則斷乎非春秋意也曰若子所言春秋何以不書石碏之名氏而惟曰衞人立晉乎曰立君從衆望也若書石碏立晉是一人之私也其可哉故尹氏立子朝言王位已定而尹氏以一人之私而立朝所以誅也觀尹氏立子朝之為誅則衞人立晉之意可識矣愚謂人欲之感人也雖深天理之感人也實易甚矣人恒蔽于人欲之私而不能啓其天理之公遂至失其本心而亦不能明乎人之本心也方陳人與州吁連兵伐鄭但知植黨之為得計豈知黨賊之為可耻及聞石碏之請幡然而悟遂變黨賊之心而為討賊之舉實以石碏之言有以祛其惡念而動其良心也今觀其言曰老夫耄矣無能為也此二人者實弑寡君敢即圖之忠義之氣貫于日月懇惻之意形于言表宜陳人為之動心而州吁之見執也惜其習于當時聞見之陋不知國君非人臣所可置公子晉之立不能請命天王故聖人既美其討賊于前復著其擅立于後使天下後世知臣子為君父討賊之為所當為而擅置其君為所不當為也然則使晉之立能請命天王則石碏此舉視夫子之沐浴請討亦可無愧矣五年春公矢魚于棠公将如棠觀魚者臧僖伯諌曰凡物不足以講大事其材不足以備器用則君不舉焉君将納民于軌物者也故春蒐夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也鳥獸之肉不登於爼皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之寔器用之資皂𨽻之事官司之守非君所及也公曰吾將畧地焉遂往陳魚而觀之僖伯稱疾不從矢公穀作觀左氏曰矢魚于棠非禮也且言遠地也薛氏曰矢魚何射魚也朱子曰矢魚當是將弓矢射之如漢武帝親射江中蛟之類程子曰諸侯非王事不遠出出觀魚非道也謝氏曰古者蒐苖獮狩非獨以禽獸為事也軍旅之法寓焉征伐之事行焉故先王舉動無非事者田獵以閲車徒廵狩以察邦國春秋遊豫以省耕歛若夫觀魚特遊觀而已在事為非事在禮為非禮在法為非法春秋直書觀魚而諸侯出不以事舉動不以禮法其失見矣胡氏曰隱公慢棄國政遠事逸游僖伯之忠言不見納則亦已矣又從而為之辭是縱欲而不能自克之以禮也能無鍾巫之及乎家氏曰臧僖伯之諫其憂深思遠有周公告成王無淫于觀于逸于游于田之意賢人之言哉夏四月葬衞桓公衞亂是以緩胡氏曰名之曰幽厲雖孝子慈孫百世不能改失位而見弑何以為桓程子曰稱桓見國人死諡送終大事也必就正寢不殁于婦人之手曾子易簀而殁豈茍然哉死而加之不正之諡知忠孝者肯為乎秋衞師入郕衞之亂也郕人侵衞故衞師入郕穀梁氏曰將卑師衆曰師程子曰晉乘亂得立不思安國保民之道以尊王為先居䘮為重乃興戎修怨入人之國書其失道也胡氏曰稱師者紀其用衆而立義不同書衞師入郕著其暴也九月考仲子之宮初獻六羽考仲子之宮將萬焉公問羽數于衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之于是初獻六羽始用六佾也程子曰諸侯無再娶仲子不得為夫人春秋之初尚以為疑故别宮以祀之考始成而祀也書以見無禮成王賜魯以天子禮樂祀周公後世遂羣廟皆用仲子别宮故不敢同羣廟而用六羽也書初獻見前此用八之僭也仲尼以魯之郊禘為周公之道衰用天子之禮祀周公成王之過也胡氏曰惠公欲以愛妾為夫人隱公欲以庻弟為嫡子孟子入惠公之廟仲子無祭享之所為别立宮以祀之非禮也故因其來賵而正名之曰仲子之賵因其考宮而正名之曰仲子之宮而夫人衆妾之分定矣隱公攝讓之實辨矣桓公篡弑之罪昭矣生則以氏繫姓以姓繫號殁則以諡繫號以姓繫氏者夫人也存不稱號殁不稱諡單舉姓氏者妾也凡宮廟非志災失禮則不書愚謂使隱公聞衆仲之言知八佾之僭羣公之廟皆降從侯國之常制則上下各守其分他日豈有季氏用八佾三家以雍徹之事乎自諸侯僭天子而後大夫僭諸侯以至陪臣執國命天下之禍無時而息矣聖人于此安得不謹而書之邾人鄭人伐宋宋人取邾田邾人告于鄭曰請君釋憾于宋敝邑為道鄭人以王師會之伐宋入其郛以報東門之役宋人使來告命公聞其入郛也將救之問于使者曰師何及對曰未及國公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也胡氏曰主兵者邾也故雖附庸小國而序乎鄭之上凡班序上下以國之小大從禮之常也而盟會征伐以主者先因事之變也然則衞州吁告于宋以伐鄭事與此同而聖人以宋為主者何此春秋撥亂之大法也凡誅亂臣討賊子必深絶其黨螟公羊氏曰記災也張氏曰蟲食苖心曰螟國以民為本民以食為天螟為災國之大事也故書冬十有二月辛巳公子彄卒臧僖伯卒公曰叔父有憾于寡人寡人弗敢忘葬之加一等穀梁氏曰隱不爵命大夫其曰公子彄何也先君之大夫也宋人伐鄭圍長葛以報入郛之役也程子曰伐國而圍邑肆其暴也胡氏曰圍者環其城邑絶其往來之使禁其樵採之途城守不下至于經年而不解誅亂臣討賊子可也長葛鄭邑何罪乎書圍于此而書取于後宋人之惡彰矣六年春鄭人來渝平渝公穀作輸高氏曰先儒以輸為渝或訓墮或訓更或訓變皆未得春秋之意按隱公自即位至此年若已與鄭平則六年之間未嘗有會同朝聘之事也自此年輸平之後宛來歸祊翬會伐宋時來之會伐許之役皆與隱公同行豈有當和平之時不相往來渝變之後反同侵伐哉胡氏曰輸者納也平者成也鄭人曷為納成于魯以利相結解怨釋讐離宋魯之黨也公之未立與鄭人戰于狐壤止焉元年及宋人盟于宿四年遇于清其秋會伐鄭即魯宋為黨與鄭有舊怨明矣五年鄭人伐宋入其郛魯欲救之使者失辭公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間可乘之隙也是以來納成耳然則善之乎曰平者解怨釋讐固所善也輸平者以利相結則貶矣曷為知其相結之以利也後此鄭伯使宛來歸祊而魯入其地會鄭人伐宋得郜及防而魯又取其二邑是以知輸平者以利相結乃貶之也諸侯修睦以蕃王室所主者義爾茍為以利使為人臣者懐利以事其君諸侯必曰何以利吾國大夫必曰何以利吾家士庻人必曰何以利吾身上下交征利不至於篡弑奪攘則不厭矣故特稱輸平以明有國者必正其義不謀其利杜亡國敗家之本也陳氏曰書鄭輸平志諸侯之合書及鄭平志諸侯之散是春秋之始終也夏五月辛酉公會齊侯盟于艾左氏曰始平于齊也薛氏曰公之會齊者何與鄭平也與鄭平則曷為與齊盟齊鄭之與國也高氏曰鄭人來輸平而不言及鄭平曁鄭平是猶未許之平也齊以是來求盟于公公于是乎會于艾而與之盟秋七月胡氏曰四德備而後為乾故易曰乾元亨利貞一德不備則乾道熄矣四時具然後成歳故春秋雖無事首時過則書一時不具則歲功虧矣旣書時又書月者時天時月王月也書時又書月見天人之理合也冬宋人取長葛杜氏曰上有伐鄭圍長葛長葛鄭邑可知故不言鄭也程子曰宋人之圍長葛歲且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而不能保有赴訴卒䘮其邑亦可罪也宋之强取不可勝誅矣春秋闕疑卷一
