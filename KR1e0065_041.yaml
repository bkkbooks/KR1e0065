body:
  text: 春秋闕疑卷四十一元鄭玉撰六年春王正月癸亥鄭遊速帥師滅許以許男斯歸因楚敗也張氏曰按許自隱十一年齊鄭魯之入至今年大抵困于與鄭為鄰至成十五年遷葉之後又畏鄭而屢遷定四年方自析遷容城以依楚不數年楚困于吳鄭遂滅之哀元年以後許復見者楚又存之也高氏曰許人本恃楚以固其國至于四遷而楚不能為之強而鄭遊速以偏師一出滅其國而俘其君楚則弱矣而鄭亦甚暴焉許男不死于位故名二月公侵鄭公至自侵鄭公侵鄭取匡為晉討鄭之伐胥靡也往不假道于衛及還陽虎使季孟自南門入出自東門舍于豚澤衛侯怒使彌子瑕追之公叔文子老矣輦而如公曰尤人而效之非禮也昭公之難君將以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質此羣臣之所聞也今將以小忿蒙舊德無乃不可乎大姒之子唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止張氏曰奉晉命以討鄭之黨惡人正也然陪臣方執國命使衛侯不聽公叔文子之言魯師危矣家氏曰天王避儋翩之亂不書非諱也蓋閔之甚憂之甚知其終不能以自振于是為之廢書夏季孫斯仲孫何忌如晉季桓子如晉獻鄭俘也陽虎強使孟懿子往報夫人之幣晉人兼享之孟孫立于房外謂范獻子曰陽虎若不能居魯而息肩于晉所以不為中軍司馬者有如先君獻子曰寡人有官將使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故強為之請以取入焉陽虎又盟公及三桓于周莊盟國人于亳社詛于五父之衢許氏曰魯國政在大夫而家臣強使之則家臣始擅國矣高氏曰夫以二子之力專國擅君而陽虎乃能制之進云則進止云則止猶僕𨽻也而莫之戒者方復為之脅請于霸國此其無所忌而必為亂之效也雖然不介晉權亂亦不得發春秋彰往察來而慎于幾微故因事以宣其指原指以見其變也嗚呼天子微諸侯僭諸侯微大夫凌大夫微陪臣脅理勢然耳秋晉人執宋行人樂祁犂八月宋樂祁言于景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行趙簡子逆而飲之酒于綿上獻楊楯六十于簡子陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已然子死晉國子孫必得志于宋范獻子言于晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可以不討也乃執樂祁八年趙鞅言于晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁士鞅曰三年止之無故而歸之宋必叛晉獻子私謂子梁曰寡君懼不得事宋君若是止子子姑使溷代子子梁以告陳寅陳寅曰宋將叛晉是棄溷也不如待之樂祁歸卒于大行士鞅曰宋必叛不如止其尸以求成焉乃止諸州張氏曰諸侯惟宋事晉懼討而遣使善逆以懷之猶懼不來而大夫黷貨賄爭權利卒使來者見執叛者得志書此所以著晉之亂政亟行霸統所由絶也胡氏曰使范趙方睦皆有獻也則弗執之矣執異國行人出于列卿私意威福之柄移矣三卿分晉而靖公廢為家人豈一朝一夕之故哉冬城中城穀梁氏曰城中城三家張也高氏曰成九年城之矣此復城者三家張矣公之所有者中城而已外又有齊鄭之怨故懼而城焉家氏曰家臣內叛蕭牆之患小戢魯君欲收其威柄在于任賢植本布德凝民城非所先也季孫斯仲孫忌帥師圍鄆七年齊人歸鄆陽關陽虎居之以為政高氏曰鄆自昭二十五年齊侯取之以居昭公三十年鄆潰遂二于齊至是二卿圍而欲復取之家氏曰取鄆以居公本齊景公之善意鄆潰而取之以歸則為利也齊取鄆固非而仲季圍之亦非也為定公者當以善辭告之齊景公必將歸之不應遽用師明年國夏伐西鄙自是交兵連歲季仲實為之也大東萊呂氏曰不曰仲孫何忌而曰仲孫忌脫文無疑也而公羊以為譏二名大抵三傳解經皆據文生義不論是非無復闕疑最學者大病不可不詳七年春王正月夏四月秋齊侯鄭伯盟于鹹陳氏曰此特相盟也自齊桓以來未之有也于是再見諸侯無盟主矣是故石門志諸侯之合也鹹志諸侯之判也許氏曰蓋自是中國無復殷會矣齊鄭之盟叛晉也齊人執衛行人北宫結以侵衛齊侯衛侯盟于沙秋齊侯鄭伯盟于鹹徵會于衛衛侯欲叛晉諸大夫不可使北宫結如齊而私于齊侯曰執結以侵我齊侯從之乃盟于瑣許氏曰晉定之季鄭獻衛靈叛而從齊齊可以霸而景不足望也劉氏意林曰善為國者親近而遠信之附內而外歸之衛侯欺其羣臣以紿晉殘其百姓以奉齊齊之執結也固非伯討矣而衛之無良又甚焉從此觀之孟子曰今之諸侯五霸之罪人也不亦信乎大雩齊國夏帥師伐我西鄙齊國夏伐我陽虎御季桓子公斂處父御孟懿子將宵軍齊師齊師聞之墮伏而待之處父曰虎不圖禍而必死苫夷曰虎陷二子于難不待有司余必殺女虎懼乃還不敗高氏曰齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆也許氏曰東夏諸侯唯魯事晉故齊伐之景公乘晉之衰不思惟德之務以懷諸侯而欲力征經營以定霸統是知時之或可而不知已之不可者也九月大雩冬十月八年春王正月公侵齊公至自侵齊公侵齊門于陽州士皆坐列曰顔高之弓六鈞皆取而傳觀之陽州人出顔高奪人弱弓籍丘子鉏擊之與一人俱斃偃且射子鉏中頰殪顔息射人中肩退曰我無勇吾志其目也師退冉猛偽傷足而先其兄會乃呼曰猛也殿二月公侵齊三月公至自侵齊公侵齊攻廪丘之郛主人焚衝或濡馬褐以救之遂毁之主人出師奔陽虎偽不見冉猛者曰猛在此必敗猛逐之顧而無繼偽顛虎曰盡客氣也高氏曰公踰月之間再出侵齊雖三家者之所為然乍往乍來見公之進退不自由矣謝氏曰三月之間再出侵齊著其産禍也曹伯露卒夏齊國夏帥師伐我西鄙公會晉師于瓦公至自瓦夏齊國夏高張伐我西鄙晉士鞅趙鞅荀寅救我公會晉師于瓦范獻子執羔趙簡子中行文子皆執鴈魯于是始尚羔謝氏曰公再侵齊故齊復來伐陳氏曰不曰會士鞅而曰會晉師重師也胡氏曰春秋大法雖師次于君而與大夫敵至用大衆則君與大夫皆以師為重而不敢輕也故棐林之會不言趙盾而言晉師瓦之會書晉師而不書士鞅于以見人臣不可取民有衆專主兵權之意陳氏厚施于齊以移其國季孫盡征于魯以奪其民皆王法所禁也春秋之義行則不得爾矣家氏曰是役也晉人興師救魯春秋不書救何哉夫所謂救者仗大義以拯人之急也魯昭棲遲乾侯困亦甚矣晉之諸卿惟賄是徇黨臣而抑君今齊師之來初非存亡危急之會而晉三卿亟以兵赴之此亦納交于季氏而非為魯國宗社計也春秋是故不與之以救秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛晉師將盟衛侯于鄟澤趙簡子曰羣臣誰敢盟衛君者涉他成何曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將歃涉他捘衛侯之手及捥衛侯怒王孫賈趨進曰盟以信禮也有如衛君其敢不惟禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故公以晉詬語之且曰寡人辱社稷其改卜嗣寡人從焉大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子厚與大夫之子為質大夫曰茍有益也公子則往羣臣之子敢不皆負羈絏以從將行王孫賈曰茍衛國有難工商未嘗不為患使皆行而後可公以告大夫乃皆將行之行有日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅會成桓公侵鄭圍蟲牢報伊關也遂侵衛陳氏曰此其言遂何晉始伐與國也于襄之二十三年齊始叛晉取朝歌去年鄭始叛晉盟齊于鹹衛始叛晉盟齊于沙于是侵鄭衛又明年及齊平雖魯亦叛晉矣故悉書之也葬曹靖公九月葬陳懷公季孫斯仲孫何忌帥師侵衛晉故也冬衛侯鄭伯盟于曲濮師氏曰晉士鞅侵鄭衛而魯亦侵衛是鄭衛不得不自為謀又且不得不合謀以相救援而備晉魯也曲濮之盟其以此與從祀先公盜竊寶玉大弓季寤公鉏極公山不狃皆不得志于季氏叔孫輒無寵于叔孫氏叔仲志不得志于魯故五人困陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛卯禘于僖公壬辰將享季氏于蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季孫戒都車何故孟孫曰吾弗聞處父曰然則亂也必及于子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徵死死無益于主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也孟氏選圉人之壯者三百人以為公期築室于門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎劫公與武叔以伐孟氏公斂處父帥成人自上東門入與陽氏戰于南門之內弗勝又戰于棘下陽氏敗陽虎説甲如公宫取寶玉大弓以出舍于五父之衢寢而為食其徒曰追其將至虎曰魯人聞余出喜于徵死何暇追余從者曰嘻速駕公斂陽在公斂陽請追之孟孫弗許陽欲殺桓子孟孫懼而歸之子言辨舍爵于季氏之廟而出陽虎入于歡陽關以叛胡氏曰蜀人馮山曰昭公至是得從祀于太廟其説是也季氏逐君而制其死生之命公薨乾侯不得終于正寢既薨七月又不得以時歸葬既葬絶其兆域又不得同于先君而在墓道之南至孔子為司寇然後溝而合諸墓則其主雖久未得從昭穆而祔祭宜矣及意如已卒陽虎專季氏將殺季孫斯而亂魯國託于正以售其不正始以昭公之主從祀太廟蓋欲著季氏之罪以取媚于國人然其事雖順其情則逆春秋原情制法故不書禘事與日特曰從祀先公于竊寶玉大弓之上見事出陽虎而不可詳也其亦深切著明矣穀梁氏曰寶玉者封圭也大弓者武王之戎弓也蘇氏曰陽虎將殺季孫斯不勝而出取寶玉大弓于公宫以行其稱盜陪臣也寶玉大弓魯之分器或謂夏后氏之璜封父之繁弱也是時陽虎以鄆歡陽關龜陰叛奔齊十年侯犯以郈叛昭十二年南蒯以費叛皆以賤不書其書竊寶玉大弓何也分器重于地者賤貨而貴命也常山劉氏曰寶玉大弓天子所錫也君之分器藏之于國子孫世世保之不可失墜而為盜所竊國慢無政可知矣故書竊以志不恭之大也九年春王正月夏四月戊申鄭伯蠆卒得寶玉大弓夏陽虎歸寶玉大弓六月伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯將許之鮑文子諫曰臣嘗為𨽻于施氏矣魯未可取也上下猶和衆庶猶睦能事大國而無天災若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已于是乎奮其詐謀夫陽虎有寵于季氏而將殺季孫以不利魯國而求容焉親富不親仁君焉用之君富于季氏而大于魯國兹陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之陽虎願東乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之載蔥靈寢于其中而逃追而得之囚于齊又以蔥靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎公羊氏曰得寶玉大弓何以書國寶也喪之書得之書高郵孫氏曰得者對失之辭也寶玉大弓去年為盜竊去則是魯失之矣于是復得之故曰得爾師氏曰去年盜竊寶玉大弓今此書得寶玉大弓蓋譏不能討賊但得寶玉大弓而已不問其所從來若無故而得之也不得盜而得寶玉大弓禮與刑并失之胡氏曰古者告終易代𢎞璧琬琰天球夷玉兊之戈和之弓垂之竹矢莫不陳列非直為觀美也先王所寶傳及其身能全而歸之則可以免矣魯失其政陪臣擅權先公分器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣六月葬鄭獻公秋齊侯衛侯次于五氏秋齊侯伐夷儀晉車千乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛禇師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏于衛家氏曰齊衛伐晉次于五氏書次不書伐不與之以伐也晉德既衰中夏莫與主盟春秋固幸齊桓子孫猶克自振庶幾託以尊攘之事今焉後其所先伐晉次于五氏又伐晉次于垂葭睨晉國之衰而欲掩有其霸業霸業在我而不在晉也是故不書伐而書次非以衛侯不當叛晉即齊而重于絶晉也叛晉即楚是之謂叛去晉即齊奚其為叛晉自平公舉中國伯權而遜之荆楚春秋固已無望乎晉今晉益不競諸侯各擇所從從齊不猶愈于從楚乎使景公能修桓公之業攘亂尊周救災恤患惟義是與則中國所賴春秋方將與之安得譏之惟不能此故皆次以譏之也秦伯卒冬葬秦哀公十年春王正月及齊平謝氏曰前此魯數侵齊齊數伐魯至孔子為相與齊釋怨相平而齊受之故魯及齊平暨齊平者彼欲平而與之平也及齊平者我欲平而彼從我平也孔子之相魯也以德親懷鄰國講信修睦而二國于此平焉能循其道則雖天下之大可得而平也豈獨一齊國哉夏公會齊侯于夾谷公至自夾谷公會齊侯于祝其實夾谷孔邱相犁彌言于齊侯曰孔邱知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔邱以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好于神為不祥干德為愆義于人為失禮君必不然齊侯聞之遽辟之將盟齊人加于載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔邱使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔邱謂梁邱據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合享而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享齊人來歸鄆歡龜陰之田謝氏曰魯自昭公失位魯君不會諸侯久矣孔子之相魯也數月之間平兩國之爭定公出會諸侯安國強君撥亂反正于是乎在矣惜乎聖人之不久用于魯也高郵孫氏曰魯公之會能使大國為之詘畏義而反其侵地未有盛于夾谷之會者然孔子書之與異時會盟等爾無異文焉蓋孔子之意以謂治國有道而交鄰有義茍治道之不至而奔走盟會以徼幸于言語之間亦不足尚也故夾谷之會為魯至榮之舉而春秋以例書之猶有譏焉孔子之道如何也胡氏曰仲尼一言威重于三軍亦順于理而已矣故天下莫大于理而強衆不與焉晉趙鞅帥師圍衛報夷儀也初衛侯伐邯鄲午于寒氏城其西北而守之宵熸及晉圍衛午以徒七十人門于衛西門殺人于門中曰請報寒氏之役涉他曰夫子則勇矣然我往必不敢啓門亦以徒七十人旦門焉步左右皆至而立如植日中不啓門乃退反役晉人討衛之叛故曰由涉他成何于是執涉他以求成于衛衛人不許晉人遂殺涉他成何奔燕家氏曰七年衛始叛晉為沙之盟晉士鞅侵鄭遂侵衛衛侯復欲與晉為盟趙鞅不善撫納乃使賤者盟以辱之衛侯怒遂絶晉而即齊九年偕齊侯為五氏之次伐晉夷儀固晉耻也晉不能治齊而圍衛以報忿貽誚于諸侯而叛者自是益衆矣許氏曰使晉有以報齊則衛可無用兵而服也今圍衛而不能服則徒足以堅齊之從而已齊人來歸鄆歡龜陰田程子曰齊服義而來歸之故書來歸公羊氏曰齊人曷為來歸鄆歡龜陰田孔子行乎季孫三月不違齊人為是來歸之胡氏曰前此嘗歸濟西田矣後此嘗歸歡及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也桓公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其績可乎聖人會人物于一身通古今于一息曰天之將喪斯文也後死者不得與于斯文也天之未喪斯文也匡人其如豫何而亦何嫌之有高氏曰孔子夾谷之事人可能也而使大國悔過效順所不可能也此修誠之至崇德之素感于其人之天譬如干羽格有苖非任智者所能測也揚子曰孔子用于魯齊人章章歸其侵疆惜乎魯不能終用之家氏曰春秋書歸疆見之書法者前後每不同齊人歸我濟西田也取汶陽田也取邾田自漷水也齊人來歸鄆歡龜陰田也齊人歸歡及闡也經凡五見取汶陽取漷水歸疆也書取不書歸以其仗大國而得歸是故書歸取濟西歸歡及闡歸疆也言歸不言來歸以其請之而後得非彼自以歸也惟鄆歡龜陰之歸書齊人來歸言齊人自以故疆來歸非假兵力智計而得之是之謂自歸視其他歸疆有不得同也嗚呼聖人道化所感強暴為之格心有莫知其然而然者左傳所載兹無還之對陋矣雖然聖人功用豈止若是而已哉故必有堯舜湯武之君而後能用臯稷伊呂之佐周室既衰諸侯皆庸夫妄人復脅于強悍不軌之卿族是豈聖人行道之時而功化因事而見者惟夾谷之會與魯疆之歸耳學者讀春秋至是可以信聖人之道不為空言儒者之學非無實用特患乎充拓有所未至耳夫豈申韓鞅斯以刑名法術劫制天下強人以必從而為之治效者哉劉氏意林曰天下之事常服于順而違于逆逆之必歸于敗也猶順之必取于勝也中賢猶足以自持況聖人乎不動而至不言而信不疾而速此之謂也故必先自勝也而後可以勝人必先自治也而後可以治人夫不自勝而務勝人不自治而務治人皆逆之類也故齊雖強以其逆而失魯雖弱以其順而得得失非強弱也在道而已陳氏曰齊強于天下于是願歸田則以孔子相夾谷之會也謂春秋之諸侯不足用為善者是不即人心者之論也故曰如有用我者期月而已可也叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈初叔孫成子欲立武叔公若藐固諫曰不可成子立之而卒公南使賊射之不能殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗能其圉人曰吾以劔過朝公若必曰誰之劔也吾稱子以告必觀之吾偽固而授之末則可殺也使如之公若曰爾若吳王我乎遂殺公若侯犯以郈叛武叔懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非惟叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣叔孫稽首駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事于齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言于郈中曰侯犯將以郈易于齊齊人將遷郈民衆凶懼駟赤謂侯犯曰衆言異矣子不如易于齊與其死也猶是郈也而得紓焉何必此齊人欲以此逼魯必倍與子地且盍多舍甲于子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易于齊齊有司觀郈將至駟赤使周呼曰齊師至矣郈人大駭介侯犯之門甲以圖侯犯駟赤將射之侯犯止之曰謀免我侯犯請行許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯謂駟赤曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈胡氏曰郈叔孫氏邑也侯犯以郈叛不書於䇿書圍郈則叛可知矣再書二卿帥師圍郈則強亦可知矣天子失道征伐自諸侯出而後大夫強諸侯失道征伐自大夫出而後家臣強其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣三家專魯為日既久至是家臣爭叛亦其理宜矣春秋制法本忠恕施諸已而不願亦勿施于人故所惡于上不以使下所惡于下不以事上二三子知傾公室以自張而不知家𨽻之擬其後也師氏曰向使魯君上知有天子而不敢蔑視周室則三家無復叛魯公向使三家知有國君而不侵侮魯公則其家臣亦何由叛叔孫是所謂以身教者從而出乎爾者未有不反乎爾者也可不戒哉可不慎哉宋樂大心出奔曹九年春宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢于晉盟且逆子梁之尸子明謂桐門右師出曰吾猶衰絰而子擊鐘何也右師曰喪不在此故也既而告人曰已衰絰而生子余何故舍鐘子明聞之怒言于公曰右師將不利戴氏不肯適晉將作亂也不然無疾乃逐桐門右師宋公子地出奔陳宋公子地嬖蘧富獵十一分其室而以其五與之公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出竟君必止子公子地出奔陳公弗止辰為之請弗聽辰曰是吾迋吾兄也吾以國人出君誰與處冬母弟辰暨仲他石彄出奔陳家氏曰春秋每于一國之事而再三書者深致意焉耳自此兩年間書宋事凡五見而大夫公子母弟奔者三罪皆纍于上此春秋所以責景公也樂大心宋之舊臣本無大罪樂溷潛焉宋景不察而遽逐之以豎子之讒而逐一大夫罪纍上一也公子地有馬公取之以與嬖臣向魋地怒抶魋公怒地奔以嬖臣之故翦其公族罪纍上二也公弟辰母弟也為地請留而公不許辰怒率仲他石彄俱奔其意亦欲君之留之而公復不為止以嬖臣而奔母弟罪纍上三也奔者固皆有罪而宋景所以待其大夫公族母弟者抑亦少恩甚矣君人者人倫風化之所自出也居其厚猶恐其薄居其薄無所往而非薄宋公以嬖臣豎子之故使其母弟公族一朝俱奔考其事過皆在公是故春秋始終備書之不加貶斥而義自見矣至于辰與地之本罪則以下文見之皆以叛書冬齊侯衛侯鄭遊速會于安甫家氏曰前此齊與鄭衛盟于鹹盟于沙矣今而三國復共為此會無所憚於晉矣前此魯受命于晉而以兵加衛今而受盟夾谷棄晉不復顧矣然而諸侯雖散于晉而不能翕然並合于齊晉雖衰而齊亦卒不能霸無人焉耳若其有人率諸侯奬王室救災恤患為桓公之所為是亦桓公而已矣惜哉有其機而無其志也叔孫州仇如齊武叔聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜宋公之弟辰暨仲他石彄出奔陳胡氏曰其弟云者罪纍上以嬖魋故而失二弟無親親之恩暨云者罪辰以兄故帥其大夫出奔無尊君之義夫暨者不得已之辭又以見仲他石彄見脅于辰不能自立無大臣之節也春秋闕疑卷四十一
