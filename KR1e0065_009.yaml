body:
  text: 春秋闕疑卷九元鄭玉撰十有八年春王三月日有食之大東萊吕氏曰無日與朔史失之春秋亦無由追考也災異之變褒貶之義蓋不在是焉夏公追戎于濟西泰山孫氏曰不言侵伐者明不覺其來已去而追之也程氏曰備預不虞武之善經也戎來侵魯不書者不知戎來已去而公追于濟西其無武備甚矣是危道也劉氏權衡曰戎來侵魯必有兵衆何緣不知愚謂若今諸蕃出人不意抄掠邉境志在得財不爭土地蹤迹如盜賊故人不知其來也秋有􅈮杜氏曰􅈮短狐也蓋以含沙射人為災胡氏曰􅈮魯所無也故以有書夫以含沙射人其為物至微矣魯人察之以聞于朝魯史異之以書于䇿何也山隂陸佃曰􅈮隂物也麋亦隂物也是時莊公上不能防間其母下不能正其身陽淑消而隂慝長矣此惡氣之應其説是也春秋書物象之應欲人主之慎所感也世衰道微邪説作正論消小人長善類退天變動于上地變動于下禽獸將食人而不知懼亦昧于仲尼之意矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊氏曰媵者諸侯娶一國則二國往媵之以姪娣從媵不書此何以書為其有遂事程子曰鄄之巨室嫁女于陳人結以其庶女媵之薛氏曰陳人之婦異邦之女而陳大夫之婦也結之媵內女也不言內女者陳人之婦而魯媵之不可也謝氏曰陳人之婦魯女嫁為卿大夫妻者古者卿大夫亦相媵故也未知孰是杜氏曰結在鄄聞齊宋有會權事之宜去其本職遂與二君為盟非魯君意而又失媵陳之好故冬各來伐胡氏曰媵淺事陳人微者公子往焉是以所重臨乎禮之輕者也齊侯霸主宋公王者之後盟國之大事也大夫輒與焉是以所輕當乎禮之重者也禮不失已亦不失人失已與人寇之招也是故結書公子而曰媵陳人之婦譏其重以失已也齊宋書爵而曰遂譏其輕以失人也遂者專事之辭聘禮大夫受命不受辭出境有可以安社稷利國家則專之可也謂本有此命得以便宜從事特不受專對之辭耳若違命行私雖有利國家安社稷之功使者當以矯制請罪有司當以擅命論刑何者終不可以一時之利亂萬世之法是春秋之旨也夫人薑氏如莒家氏曰魯莊公不能防間其母猶有望于齊桓正之前此薑氏如齊齊不能討遂使肆然無所忌憚蕩遊及莒非惟魯之辱亦齊之辱也冬齊人宋人陳人伐我西鄙胡氏曰奉辭曰伐其稱人將卑師少也結方與二國盟則其來伐我何也齊桓始霸責魯不恭所謂失已與人以招寇也或以結能為魯設免難之䇿為齊宋畫講好之計身在境外而權其國家為春秋豫之故稱公子非矣二十年春王二月夫人薑氏如莒胡氏曰十五年夫人薑氏如齊至是再如莒而春秋書者禮義天下之大防也衛女嫁于諸侯父母終思歸寧而不得故泉水賦許穆夫人閔衛之亡思歸唁其兄而阻于義故載馳作聖人録于國風以訓後世使知男女之别自逺于禽獸也今夫人如齊以寧其父母而父母已終以寧其兄弟又義不得宗國猶爾而況于莒乎婦人從人者也夫死從子而莊公失子之道不能防間其母禁亂之所由生此以舊防為無所用而廢之者也是以至此極觀春秋所書之法則知防間之道矣夏齊大災臨江劉氏曰災則其言大何大非一也宗廟廄庫盡矣此齊大災也何以書弔焉爾秋七月冬齊人伐戎朴鄉吕氏曰戎之為中國患久矣齊桓之霸豈無意于攘之哉蓋緩以圖之而未嘗絶也漸以處之而未嘗遽也中國之諸侯有一焉之不安于我則固不可以從事于外域故汲汲于會盟中國之諸侯者所以治其內也十年之久而後有伐戎之舉不用大兵而聲罪致討之義嚴焉其規模素定故也故此伐戎書人三十年伐山戎亦書人則其不用大兵亦可知矣一捷之後而戎始不能為中國患戎不能為中國患而後齊得以專意于楚此管仲之規模也雖然齊桓未霸之初滅談滅遂猶肆力以逞自柯盟之會而春秋書齊之事與滅談滅遂者異矣意者管仲得志其當在盟柯以後乎二十有一年春王正月夏五月辛酉鄭伯突卒張氏曰突鄭莊公之孽子莊公既卒即奪忽之位而篡之中間雖為祭仲所逐旋入于櫟卒取鄭國春秋不復著忽亹儀之在位所以著其不能君也故論者以為突始終能君夫篡弒竊國之人而春秋始終君之且復記其卒于位豈真與之哉所以著小人肆志亂臣賊子得以終于位王法不行而世之所由亂也秋七月戊戌夫人薑氏薨薛氏曰文薑之薨甚天王方伯之無道也張氏曰文薑以國君母寵榮終身一用小君之禮此魯之禍所以至于莊公之終兩君弒哀薑慶父誅而後魯亂始息也冬十有二月葬鄭厲公二十有二年春王正月肆大眚泰山孫氏曰肆放也眚過也肆大眚者罪惡無不赦之辭也程子曰舜典曰眚災肆赦臯陶曰宥過無大易曰君子赦過宥罪吕刑曰五刑之疑有赦五罰之疑有赦未聞肆大眚也肆大眚元惡大憝俱肆之之辭也上廢天討下虧國典縱釋有罪賊虐無辜莫斯為甚天子尚曰不可況魯國諸侯而敢專肆眚哉後世庇姦宄賊良民其泥于此乎殊失春秋之旨也胡氏曰周官司刺掌赦宥之法一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰蠢愚未聞肆大眚也肆眚而曰大眚譏失刑也癸丑葬我小君文薑穀梁氏曰小君非君也其曰君何也以其為公配可以言小君也常山劉氏曰夫人之諡皆私諡也常疑夫人之義皆從君者也無非無儀婦人不尸善名不當别諡謂為宋姬者為得禮恐此不特為私諡著譏也朴鄉吕氏曰文薑之行甚矣何以得書葬自桓薨于齊之後文薑為國君母者二十年莊公以小君葬之聖人安得不書書桓公薨于齊夫人孫于齊著其罪書夫人如齊如莒以著其惡書薨書葬以著其實並書于䇿而是非褒貶自見矣陸氏曰葬生者之事也臣子之禮其可虧乎陳人殺其公子禦寇陳人殺其太子禦寇陳公子完與顓孫奔齊顓孫自齊來奔齊侯使敬仲為卿辭曰羇旅之臣幸若獲宥及于寬政赦其不間于教訓而免于罪戾弛于負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢胡氏曰公子之重視大夫殺而或稱君或稱國或稱人何也稱君者獨出其君之意而大夫國人有不與焉如晉侯殺其世子申生之類是也稱國者國君大夫與聞其事而不請於天子如鄭殺其大夫申侯之類是也稱人者有二義其一國亂無政衆人擅殺而不出于其君則稱人如陳人殺其公子禦寇之類是也其一殺君之賊人人之所得討背叛之臣國人之所同惡則稱人如衛人殺州吁鄭人殺良霄之類是也考于傳之所載以觀經之所斷則罪之輕重見矣夏五月胡安定先生曰春秋未有書五月首時者此五月之下有脫誤春秋用竹簡故也秋七月丙申及齊髙傒盟于防公羊氏曰不書公諱與大夫盟也榖梁氏曰髙傒伉也程子曰諱公盟始與讐國為婚惡之大也謝氏曰親盟大夫以求婚耻之大也大喪未畢而謀婚惡之大也故防之盟諱不書公其始諱不書公而公之耻惡由此見矣至納幣逆女則直書以其迹不可掩故也胡氏曰娶者其為吉下主乎已上主乎宗廟以為有人心者宜于此焉變矣家氏曰魯忘君父之大讐請婚讐國齊既許之而使髙傒先要魯以盟其傲魯也甚矣春秋書之責齊也亦以責魯也以下文公如齊納幣觀之其責魯湥矣夫讐國以傲而加我不惟不怒反詘千乘之尊與其臣盟又躬于齊納幣彼固無所恤春秋為之諱之乃所以存其羞惡之心而垂法于後世也冬公如齊納幣穀梁氏曰納幣大夫之事親納非禮也程子曰齊疑婚議故公自行納幣髙郵孫氏曰莊公忘父之讐而娶讐人之女又在母三年喪內而行大夫之職書曰公如齊納幣所以見公無恩于母不孝于父無亷耻而親納幣焉一舉事而大惡者三也家氏曰或曰魯與齊既為會盟春秋無責今而通婚不亦可乎或曰主夏盟者齊桓也今納幣而請婚者齊襄之女仇女也盟讐人之弟猶曰為其霸也諸侯皆在不得不與于盟豈無他族必讐女而後娶其何以奉粢盛入先君之廟乎吁文薑親弒魯桓罪未討而死今桓之子娶薑之姪蹈覆轍而不以為戒其愚不仁亦甚矣朴鄉吕氏曰古者男二十而冠三十而娶過與不及非禮也天子諸侯十五而冠者以娶必先冠亦欲圖嗣之早定也今莊公生于桓之六年至是三十六歲矣以世適之正諸侯之貴尚無內主蓋為文薑所制使必娶于母家而齊女待年未及故自今年納幣越明年而如齊觀社又遇于穀盟于扈皆為要結婚姻而往夫娶夫人奉祭祀以為宗廟主不以大義裁之而惟母言是聽則其踰時失禮一至于此聖人一一書之所以垂戒後世也春秋闕疑卷九
