body:
  text: 春秋闕疑卷三十二元鄭玉撰二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子莒子薛伯把伯小邾子于沙隨秋欒盈自楚適齊晏平仲言于齊侯曰商任之㑹受命于晉今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽冬㑹于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼胡氏曰㑹于商任錮欒氏也㑹于沙隨復錮欒氏也古者大夫去國君不掃其社稷不繫纍其子弟不收其田邑使人導之出疆又先于其所往勑五典厚人倫也晉人不念欒氏世勳而逐盈又將摶執之而命諸侯無得納焉則亦過矣楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益于晉晉將棄之何勞錮焉其賢于商任沙隨之謀逺矣公至自㑹楚殺其大夫公子追舒楚觀起有寵于令尹子南未益祿而有馬數十乘楚人患之王將討焉子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎對曰父戮子居君焉用之泄命重刑臣亦不為王遂殺子南于朝轘觀起于四境子南之臣謂棄疾請徙子尸于朝曰君臣有禮唯二三子三日棄疾請尸王許之既葬其徒曰行乎曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讐吾弗忍也遂縊而死復使薳子馮為令尹公子齮為司馬屈建為莫敖有寵于薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入于人中又從之遂歸退朝見之曰子三困我于朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子曰何故對曰昔觀起有寵于子南子南得罪觀起車裂何故不懼自御而歸不能當道至謂八人者曰吾見申叔夫子所謂生死而骨肉也知我者如夫子則可不然請止辭八人者而後王安之髙氏曰以楚國之力而除一嬖寵之大夫顧豈難哉而康王始則泣之與人之子圖其父終則殺之轘其黨于四境威柄失于上故刑不足以馭下也夫威柄既立則責譙足以折姦臣之鋒及其失之則刀鋸不足當姦臣之罪其怨毒所鍾遂發于靈王之世楚之不亡者幸而已矣五峯胡氏曰公子追舒非有大逆之罪退之可也而王必欲殺之則非矣為棄疾者進宜陳使臣之禮以諫王退宜陳事君之禮以諫父諫于王而王不聽則竊父而去之可也諫于父而父不聽則號泣而隨之可也諫于王與父皆不聽焉則請後祖廟而以身代父死可也烏有閔默恬然不動其心坐視王殺其父然後死之者以為子則不孝以為臣則不忠噫大道不明是以人至此極而莫覺莫悟也春秋書楚殺其大夫公子追舒不罪棄疾者大夫者人君之股肱心膂也公子者宗室之枝葉庇蔭也而輕殺之所以罪楚君也棄疾殺其父矣豈必待貶絶而後見其惡哉二十有三年春王二月癸酉朔日有食之三月己巳把伯丐卒把孝公卒晉悼夫人喪之平公不徹樂夏邾畀我來奔杜氏曰畀我庶其之黨髙氏曰向愛邾之叛臣與其邑今又受其叛臣是冬臧孫紇出奔邾邾亦受之所謂出乎爾者反乎爾者也葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃自楚歸于陳陳侯如楚公子黃訴二慶于楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黃東萊吕氏曰慶虎慶寅之罪不等故言及也陳氏曰春秋不書叛而稱國以殺猶是殺大夫焉爾叛必不能殺者也胡氏曰人君擅一國之利勢使權臣暴蔑其身而不能逺欲去其親而不能保譖訴之于大國而不能辨至因楚人之力然後能克則非君人之道也故二慶之死稱國以殺公子黃之出特以弟書歸譏陳侯也髙氏曰公子黃之反書自楚罪其奔僣亂之國復藉僣亂之力以歸黃之進退皆不正矣晉欒盈復入于晉入于曲沃晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之對曰不可天之所廢誰能興之子必不免吾非愛死知不集也盈曰雖然因子而死吾無悔矣我實不天子無咎焉許諾伏之而觴曲沃人樂作午言曰今也得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳初欒盈佐魏莊子于下軍獻子私焉故因之趙氏以原屏之難怨欒氏韓趙方睦中行氏以伐秦之役怨欒氏而固與范氏和親知悼子少而聽于中行氏程鄭嬖于公唯魏氏及七輿大夫與之樂王鮒侍坐于范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也且欒氏多怨子為政欒氏自外子在位其利多矣既有利權又執民柄將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻喪王鮒使宣子墨縗冒絰二婦人輦以如公奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣使鞅逆吾子鞅請驂乘持帶遂超乘右撫劍左援帶命驅之出僕請鞅曰之公宣子逆諸喈執其手賂之以曲沃初斐豹𨽻也著于丹書欒氏之力臣曰督戎國人懼之斐豹謂宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請于君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之范氏之徒在臺後欒氏乘公門宣子謂鞅曰矢及君室死之鞅用劍以帥卒欒氏退攝車從之遇欒樂曰樂免之死將訟女于天樂射之不中又注則乘槐本而覆或以㦸鉤之斷肘而死欒魴傷欒盈奔曲沃晉人圍之大東萊吕氏曰欒盈奔楚初無大罪范宣子直以其勢位逼已兩不相容而逐之盈亡之後自楚適齊自齊入郛幾危晉室盈之罪固不可逃然考其所致之由而宣子之罪尤大臨江劉氏曰不言叛者劫衆以敵君則亂而已矣蘇氏曰齊之納盈非以兵明納之也譬如盜賊私納之耳故不書自齊胡氏曰欒氏晉室之世臣故盈雖出奔猶繫于晉復入者甚逆之辭為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至于殺身而不避莫知有君臣之分也故聞語欒孺子者則或泣或歎以為得主而為之死則死猶不死也盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在于錮之甚急使無所容于天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉秋齊侯伐衛遂伐晉八月叔孫豹帥師救晉次于雍榆齊侯伐衛自衛將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聽陳文子見崔武子曰將若君何武子曰吾言于君君弗聽也以為盟主而利其難羣臣若急君于何有子姑止之文子退告其人曰崔子將死乎謂君甚而又過之不得其死過君以義猶自也况以惡乎齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍于熒庭戍郫邵封少水以報平陰之役乃還趙勝帥東陽之師以追之獲晏氂八月叔孫豹帥師救晉次于雍榆許氏曰齊聞欒氏之難故能得志于晉而莊公禍亂之成著于此矣書齊侯本其惡也師氏曰先伐衛者意不在衛先以衛嘗師俾晉不為之備出其不意則遂由衛以伐晉所以見齊之處心積慮為難測故書伐衛遂伐晉以誅其意也常山劉氏曰晉有欒盈之難重以齊侯之伐魯命豹帥師救之斯義重也豹反怠棄君命不恤同姓之憂次于雍榆卒不克救豹罪明矣陸氏曰僖元年次于聶北救邢本次止而遙為邢援故先書次後言救譏其失救急之義也今此君命往救晉豹畏齊而次言君本命往救而豹自次止所以不譏君而罪豹也髙郵孫氏曰聶北之次先次後救可救而不救則罪重也雍榆之次先救後次欲救而不能有罪而猶輕耳春秋之義次皆有罪于次之中有足矜者雍榆是也陳氏曰書救晉則天下益多故矣盟于宋而南北之勢成㑹于申而淮夷至戰于雞父而吳之敗者六國於越入吳春秋終焉蓋于是而始故謹而書之也己卯仲孫速卒冬十月乙亥臧孫紇出奔邾季武子無適子公彌長而愛悼子欲立之訪于申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行他日又訪焉對曰其然將具敝車而行乃止訪于臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽潔之召悼子降逆之大夫皆起及旅而召公鉏使與之齒季孫失色季氏以公鉏為馬正愠而不出閔子馬見之曰子無然禍福無門唯人所召為人子者患不孝不患無所敬共父命何常之有若能孝敬富倍季氏可也姦回不軌禍倍下民可也公鉏然之敬共朝夕恪居官次季孫喜使飲已酒而以具往盡舍旃故公鉏氏富又出為公左宰孟孫惡臧孫季孫愛之孟氏之御騶豐㸃好羯也曰從吾言必為孟孫再三云羯從之孟莊子疾豐㸃謂公鉏苟立羯請讐臧氏公鉏謂季孫曰孺子秩固其所也若立羯則季氏信有力于臧氏矣弗應己卯孟孫卒公鉏奉羯立于戶側季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也且夫子之命也遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告于季孫曰臧氏將為亂不使我葬季孫不信臧氏聞之戒冬十月孟氏將辟藉除于臧氏臧孫使正夫助之除于東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾初臧宣叔娶于鑄生賈及為而死繼室以其姪穆姜之姨子也生紇長于公宫姜氏愛之故立之臧賈臧為出在鑄臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗祧敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請遂自為也臧孫如防使來告曰紇非能害也知不足也非敢私請苟守先祀無廢二勳敢不避邑乃立臧為臧紇致防而奔齊其人曰其盟我乎臧孫曰無辭將盟臧氏季孫召外史掌惡臣而問盟首焉對曰盟東門氏也曰毋或如東門遂不聽公命殺嫡立庶盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎杜氏曰紇阿季氏為之廢長立少以取奔亡書奔罪之家氏曰季孫宿自亂已之嫡庶復亂人之嫡庶又以是為臧紇之罪而逐之紇固有罪宿之恣睢不度亦甚矣晉人殺欒盈晉人克欒盈于曲沃盡殺欒盈之族黨欒魴出奔宋泰山孫氏曰不言其大夫者欒盈出奔楚當絶也稱人以殺從討賊辭家氏曰自欒盈之奔春秋閔其無罪未遽絶之至是始書晉人殺欒盈則以其挾齊光之援興曲沃之甲入絳都而與君為敵于是始明正之罪不繫之于晉而誅之春秋豈輕加人以誅斥之戮哉是時晉無賢君羣下互相吞噬以兼並其爵邑亡同括者欒郤也而欒郤之族未幾皆覆敗欒氏者士丐也而士丐之族不再世而亦亡晉君昏愚無知縱臣下以覆人之族而晉之宗社亦不能長矣春秋為此事六見之特書著晉國之亂從此始矣齊侯襲莒齊侯還自晉不入遂襲莒門于且于傷股而退明日將復戰期于壽舒把殖華還載甲夜入且于之隧宿于莒郊明日先遇莒子于蒲侯氏莒子重賂之使無死曰請有盟華周對曰貪貨棄命亦君所惡也昏而受之日未中而棄之何以事君莒子親鼓之從而伐之獲杞梁莒人行成齊侯歸遇把梁之妻于郊使弔之辭曰殖之有罪何辱命焉若免于罪猶有先人之敝廬在下妾不得與郊弔齊侯弔諸其室陸氏曰掩其不備曰襲髙氏曰凡用兵皆聲言彼罪執辭以伐之若乘人之不備掩而取之則盜賊之為耳故春秋獨此書襲莒者罪齊莊以諸侯之尊為盜賊之事也謝氏曰晉有難而伐之莒無故而襲之黨叛臣伐盟主襲鄰國齊莊之君德喪矣家氏曰著爵而書襲罪其以大國之君而行盜竊之事也二十有四年春叔孫豹如晉穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之太上有立德其次有立功其次有立言雖久不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之祿之大者不可謂不朽仲孫羯帥師侵齊晉故也髙氏曰齊之伐晉也魯使叔孫豹救之乃次于雍榆無功于晉故仲孫羯至此復帥師侵齊為晉報焉謝氏曰救而次為不仁出師而侵為不義夏楚子伐吳楚子為舟師以伐吳不為軍政無功而還髙氏曰自襄公言之楚十一年伐鄭十四年伐吳自是舍鄭而不取置欒盈而不爭又十年而一再伐吳以是知楚弱而勢分于吳方急吳而緩中國也秋七月甲子朔日有食之既齊崔杼帥師伐莒齊侯既伐晉而懼將欲見楚子楚子使薳啓疆如齊聘且請期齊社搜軍實使客觀之陳文子曰齊將有冦吾聞之兵不戢必取其族秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒侵介根大水八月癸巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀將以伐齊水不克髙氏曰自盟于柯陵之後齊有輕晉之心㑹齊侯環卒而光新立乃受盟于澶淵及商任沙隨之㑹晉失其令齊于是不賔明年乃伐衛遂伐晉又再加兵于莒晉侯于是為夷儀之㑹帥十二國諸侯之師將以討齊然㑹而不伐是有畏也國勢不競衆志不一也曰水不克者特辭不能伐耳下言崔杼伐我北鄙蓋知晉之無能為故也冬楚子蔡侯陳侯許男伐鄭楚子伐鄭以救齊門于東門次于棘澤諸侯還救鄭髙氏曰齊聞諸侯已㑹遂告急于楚楚畏吳而緩晉故舍鄭者十有四年今以鄭伯在㑹故帥三國同伐鄭以救之加楚子于三國之上雖曰主兵亦所以惡三國也許氏曰夷狄之師不能正齊之亂而徒致棘澤之役以為鄭難則諸侯之救不足録矣家氏曰書㑹不書伐不與晉以伐也書伐不書救不與楚以救也晉侯楚子以下皆書爵非爵也見中國之君與楚皆無大相逺也公至自㑹陳針宜咎出奔楚陳人復討慶氏之黨針宜咎出奔楚許氏曰針宜咎之事無聞焉爾而以慶氏黨逐則其人亦可知矣易曰比之匪人不亦傷乎叔孫豹如京師齊人城郟穆叔如周聘且賀城王嘉其有禮也賜之大路許氏曰自宣九年仲孫蔑如京師其後五十餘年乃始有叔孫豹以罕書也蓋自是不書聘王矣大饑穀梁氏曰五穀不升為大饑一穀不升謂之嗛二穀不升謂之饑三榖不升謂之饉四穀不升謂之康五穀不升謂之大侵胡氏曰古有救災之政若國凶荒或發廩以賑之或移粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有陰沴之災而冬大饑蓋所以賑業之者有不備矣二十有五年春齊崔杼帥師伐我北鄙以報孝伯之師也公患之使告于晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不寇使民不嚴異于他日齊師徒歸髙氏曰崔子之志鄰國知之而齊侯不悟嗚呼人將伐其躬之不恤而務貪伐國之功故利令智昏外競而內傾自然之符也授人兵柄者宜鑒兹夏五月乙亥齊崔杼弒其君光齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣遂娶之莊公通焉驟如崔氏以崔子之冠賜人侍者曰不可公曰不為崔子其無冠乎崔子因是又以其間伐晉也曰晉必將報欲弒公以說于晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月莒為且于之役故莒子朝于齊甲戌饗諸北郭崔子稱疾不視事乙亥公問崔子遂從姜氏姜入于室與崔子自側戶出公拊楹而歌侍人賈舉止衆從者而入閉門甲興公登臺而請弗許請盟弗許請自刃于廟弗許皆曰君之臣杼疾病不能聽命近于公宫陪臣干棷有淫者不知二命公踰牆又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝鮀父祭于髙唐至復命不說辨而死于崔氏申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死崔氏殺鬷蔑于平陰晏子立于崔氏之門外其人曰死乎曰獨吾君也乎哉吾死也曰行乎曰吾罪也乎哉吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭之興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民盧蒲癸奔晉王何奔莒叔孫宣伯之在齊也叔孫還納其女于靈公嬖生景公丁丑崔杼立而相之慶封為左相盟國人於大宫曰所不與崔慶者晏子仰天嘆曰嬰所不唯忠于君利社稷者是與有如上帝乃歃辛巳公與大夫及莒子盟大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以往聞既書矣乃還崔氏側莊公于北郭丁亥葬諸士孫之里四翣不蹕下車七乘不以兵甲許氏曰齊莊陵大國暴小國而又躬亂臣室淫肆不君故使崔杼因民不忍以至此足以為世鑒矣謝氏曰崔杼以世卿専國久矣是以難其君若難匹夫羣臣惟知聽命于崔而不知有君也然則世卿之禍可不戒哉家氏曰光之立也迫其父而奪之位蓋篡也今其死迄正天討于例當稱國以弒乃猶著弒賊之名何耶光固有當討之罪而非崔杼之所得討也導光以篡者杼也今間其有怨于大國又從而弒之蓋光因杼以得立不假杼以權杼實憾焉辭曰為晉弒君以自解于衆本非為晉也是故坐以首惡胡氏曰齊莊公見弒賈舉州綽等十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不苟者也雖在屬車後乘必不肯同入崔氏之宫矣若此十人者獨以勇力聞皆逢君之惡從君于昏亂而莊公嬖之者死非其所比諸匹夫匹婦自經于溝瀆而莫之知者猶不逮也晏平仲曰君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為己死而為己亡非其私䁥誰敢任之此十人者真其私䁥任此宜矣雖殺身不償責安得以死節許之者哉公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀晉侯濟自泮㑹于夷儀伐齊以報朝歌之役齊人以莊公說使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之使叔向告于諸侯公使子服惠伯對曰君舍有罪以靖小國君之惠也寡君聞命矣胡氏曰晉本為報朝歌之役來討及㑹夷儀既聞崔杼之弒則宜下令三軍建而復斾聲于齊人問莊公之故執崔杼以戮之謀于齊衆而置君以定其國示天討之義則方伯連帥之職修矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云愚按劉氏權衡謂晉受齊賂是成亂也春秋何以不書蓋㑹于夷儀本以伐齊未知莊公之弒齊人之賂特以免伐非為弒也六月壬子鄭公孫舍之帥師入陳二十四年二十五年陳侯㑹楚子伐鄭當陳隧者井堙木刋鄭人怨之至是六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其大子偃師奔墓遇司馬桓子曰載余曰將巡城遇賈獲載其母妻下之而授公車公曰舍而母辭曰不祥與其妻扶其母以奔墓亦免子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社使其衆男女别而纍以待于朝子展執縶而見再拜稽首承飲而進獻子美入數俘而出祝祓社司徒致民司馬致節司空致地乃還鄭子産獻捷于晉戎服將事晉人問陳之罪對曰昔虞閼父為周陶正以服事我先王我先王賴其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是賴桓公之亂蔡人欲立其出我先君莊公奉五父而立之蔡入殺之我又與蔡人奉戴厲公至于莊宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大德蔑我大惠棄我姻親介恃楚衆以馮陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其𠂻啓敝邑心陳知其罪授手于我用敢獻功晉人曰何故侵小對曰先王之命惟罪所在各致其辟且昔天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉晉人曰何故戎服對曰我先君武莊為平桓卿士城濮之役文公布命曰各服舊職命我文公戎服輔王以授楚捷不敢廢王命故也士莊伯不能詰復于趙文子文子曰其辭順犯順不祥乃受之秋八月己巳諸侯同盟于重丘齊成故也胡氏曰崔杼既弒其君矣晉侯受其賂而許之成故盟于重丘特書曰同張氏曰或曰同盟之書自幽以來皆假王命以約束諸侯何獨此盟罪之之深如胡氏之言乎按二幽之盟合諸侯以共尊周而諸侯聽命也重丘之盟合諸侯將以討齊乃受賂而釋之且列弒君之齊于盟也天下之惡孰大于是即其所同之實而觀之晉侯之罪亦一齊也故曰一美一惡無嫌于同公至自㑹衛侯入于夷儀晉侯使魏舒宛沒逆衛侯將使衛與之夷儀崔子止其帑以求五鹿衛獻公入于夷儀家氏曰春秋之世內外二君者鄭忽與􅊳也衛衎與剽也忽之君國正也而祭仲以􅊳篡之衎之君國亦正也而孫林父以剽篡之其逆順之辨較然可見其後忽既復位而突自外入乃賊也是故􅊳之入櫟以名入內外不二君也衎既入于衛地而剽猶居位剽乃賊也是故衎入夷儀而不名內外不二君也及剽死而衎入夫然後名衎所以結正其失國之罪剽既死則無嫌于二君矣陳氏曰衎列于諸侯之㑹十有三而後出其入也將焉名之剽列于諸侯之㑹七而後弒其弒也又將焉名之削一而存一是有豫奪矣春秋不沒其實而正不正不與存焉楚屈建帥師滅舒鳩二十四年吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師于荒浦使沈尹壽與師祁犁讓之舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒卒而不二吾又何求若猶叛我無辭有庸乃還至是舒鳩人卒叛楚令尹子木伐之及離城吳人救之子木遽以右師先子彊息桓子捷子駢子孟帥左師以退吳人居其間七日子彊曰久將墊隘隘乃禽也不如速戰請以其私卒誘之簡師陳以待我我克則進奔則亦視之乃可以免不然必為吳禽從之五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之𫝊諸其軍簡師㑹之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩陳氏曰楚雖滅國嘗稱君將矣于是書大夫楚强也家氏曰國雖小必著其亡以聲楚人滅國之罪冬鄭公孫夏帥師伐陳十月子展相鄭伯如晉拜陳之功子西復伐陳陳及鄭平二十六年鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服八邑賜子産次路再命之服六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固豫之乃受三邑公孫揮曰子産其將知政矣讓不失禮愚謂雖井堙木刋當陳之隧鄭人以是怨之然興是師者楚也鄭不能從盟主以大義責楚徒出偏師惟陳是務則亦報怨而已故入陳伐陳春秋備書之所以明其為忿兵也十有二月吳子遏伐楚門于巢卒吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱于短牆以射之卒公羊氏曰傷而反未至乎舍而卒也榖梁氏曰諸侯不生名取卒之名加之伐楚之上者見以伐楚卒也胡氏曰巢南國也其言門于巢卒者吳子將伐楚引師至巢入其門巢人射諸城上矢中吳丁而卒非吳子之自輕而見殺也古者入境必假道過門必釋甲入國則不馳或曰古者大國過小邑小邑必飾城而請罪亦非巢之輕以一矢相加不飾城而請罪也二十有六年春王二月辛卯衛寧喜弒其君剽二十年衛寧惠子疾召悼子曰吾得罪于君悔而無及也名藏在諸侯之策曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒二十五年衛獻公自夷儀使與寧喜言寧喜許之大叔文子聞之曰嗚呼詩所謂我躬不說遑恤我後者寧子可謂不恤其後矣將可乎哉殆必不可君子之行思其終也思其復也書曰慎始而敬終終以不困詩曰夙夜匪懈以事一人今寧子視君不如奕棋其何以免乎奕者舉棋不定不勝其耦而况置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉至是衛獻公使子鮮為復辭敬姒强命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在不然必敗故公使子鮮子鮮不獲命于敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人寧喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出告右宰穀右宰榖曰不可獲罪于兩君天下誰畜之悼子曰吾受命于先人不可以二穀曰我請使焉而觀之遂見公于夷儀反曰君淹恤在外十二年矣而無憂色亦無寬言猶夫人也若不已死無日矣悼子曰子鮮在右宰穀曰子鮮在何益多而能亡于我何為悼子曰雖然弗可以已孫文子在戚孫嘉聘于齊孫襄居守二月庚寅寧喜右宰穀伐孫氏不克伯國傷寧子出舍于郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子叔及大子角謝氏曰衎之奔也孫林父寧殖立剽以主衛衛之政令出于剽者十有三年寧喜北面臣之久矣然則剽寧喜之君也衎之入也寧喜又以子鮮之命攻剽而殺之其殺剽非以社稷為心也特以固寵而已剽之立雖非正春秋書君書弒者正剽為喜之君以著喜之逆也受其命則為之君食其祿則為之臣北面事之矣而復害之逆之大也孫林父寧殖逐衎而立剽寧喜殺剽而立衎其罪一也愚按衛衎之入使晉侯衛衎寧喜三人者有一能盡其道則遂成反正之功而不陷于弒逆之名矣晉之欲入衎于夷儀也諸侯在㑹剽亦與焉使晉能盡霸主之職明剽篡立之罪執之于㑹歸于京師然後召衎與㑹以正其位使復其國則可以令諸侯安衛國而無虞矣顧乃使魏宛復逆衎以入于夷儀將使衛以夷儀與之夫衎當立則衛國皆衎之有也衎不當立又安得以夷儀與之乎此霸主之復衎失其道以致此也為衛衎者已既當立為人所篡自當上告天王下告方伯明剽之罪而廢之然後復國則可以奉宗廟臨臣民而無愧矣顧乃假言子鮮通于寧氏與聞弒逆以求復國其何以為君乎此衎之復國不以其道以致此也為寧喜者一聞父命則當以事請于方伯告于天子正剽之罪而廢之定衎之位而復之則可以成其父之志而蓋前人之愆矣縱以利害相持剽或至死則殺有罪也亦不過坐以非司冦而擅殺之罪從末減矣安得謂之弒哉顧乃遷延不舉北面事之五六年矣及聞子鮮政由寧氏祭則寡人之語方為利而動殺其所事迎復舊君于義悖矣况剽之在國十有三年居于國曰衛侯與于㑹曰衛侯死于喜曰衛侯終無有能明其罪而廢之者既死之後春秋安得不謂之衛君而以弒書乎為人臣而不知春秋之義者必陷弒逆之名豈不信哉衛孫林父入于戚以叛孫林父以戚如晉謝氏曰獻公將反林父専邑背國有危社稷之心入戚書叛著其逆也髙氏曰前此諸大夫有不利于己則奔而已未有若林父之叛者書叛自林父始家氏曰宋魚石入于彭城不書入于彭城以叛晉欒盈入于曲沃不書入于曲沃以叛而孫林父乃以叛書何哉春秋用法未有不原其初者也魚石本無罪華元陷之欒盈本無罪士丐陷之故聖人原其初非有叛意特不書叛示華元士丐為禍之首也若林父以一朝之忿稱兵犯上逐其君于外十二年寧殖之子喜納君而逐林父喜麗于弒林父麗于叛春秋比而誅之惟其公也甲午衛侯衎復歸于衛甲午衛侯入大夫逆于竟者執其手而與之言道逆者自車揖之逆于門者頷之而已公至使讓太叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言吾子獨不在寡人古人有言曰非所怨勿怨寡人怨矣對曰臣知罪矣臣不佞不能負羈絏以從扞牧圉臣之罪一也有出者有居者臣不能二通內外之言以事君臣之罪二也有二罪敢忘其死乃行從近關出公使止之謝氏曰衎之出非有大罪剽既弒則國乃其國故其反國書歸以其播越失國故書名以其已絶而得歸故書復歸諸侯雖無大惡苟不能保國而出則其位絶矣復歸名以正獻公之罪也夏晉侯使荀吳來聘衛人侵戚東鄙孫氏訴于晉晉戍茅氏殖綽伐茅氏殺晉戍三百人孫蒯追之弗敢擊文子曰厲之不如遂從衛師敗之圉雍鉏獲殖綽復訴于晉晉人為孫氏故召諸侯將以討衛也夏中行穆子來聘召公也家氏曰孫林父據戚以叛晉人以兵戍之黨叛臣也衛人伐戚殺晉戍三百人晉不知自反乃㑹諸侯將有討于衛荀吳來召公晉平之世强臣僭橫倒行逆施卒以此失諸侯公㑹晉人鄭良霄宋人曹人于澶淵公㑹晉趙武宋向戍鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏于是衛侯㑹之家氏曰晉平之為此㑹率天下之人臣使之盡叛其君者也霸者之職以主張名分為事晉悼公務奬諸侯之大夫以抗其君而下陵上替晉亦坐受其弊矣孫林父作亂逐君悼公反列于㑹以定篡君之位衛獻流落在外十有二年今剽死獻復平公又受賊臣之譖而摧辱其君止獻公囚寧喜取衛田以益林父吁平固愚矣亦何利而為此由晉之諸臣各為其私計羽翼諸侯之大夫使之交起為亂以為彼等剖分晉國之地而其主不悟也魏斯趙籍韓䖍三分晉國悼與平實有以啓之秋宋公殺其世子痤初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖生佐惡而婉大子痤美而狠合左師畏而惡之寺人惠牆伊戾為太子內師無寵秋楚客聘于晉過宋大子知之請野享之使往伊戾請從之公曰夫不惡女乎對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有共其外莫共其內臣請往也遣之至則欿用牲加書徵之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃烹伊戾左師見夫人之步馬者問之對曰君夫人氏也左師曰誰為君夫人余胡不知圉人歸以告夫人夫人使饋之錦與馬先之以玉曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之胡氏曰殺世子母弟直書君者甚之也宋寺人伊戾為大子內師無寵譖于宋公而殺之則賊世子痤者寺人矣而獨甚宋公何哉譖言之得行也必有嬖妾配適以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者春秋正其本之意晉人執衛寧喜晉人執寧喜北宫遺使女齊以先歸衛侯如晉晉人執而囚之士弱氏秋七月齊侯鄭伯為衛侯故如晉晉侯兼享之晉侯賦嘉樂國景子相齊侯賦蓼蕭子展相鄭伯賦緇衣叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不二也國子使晏平仲私於叔向曰晉君宣其明德于諸侯恤從之子展說不禦冦十二月乙酉入南里墮其城涉于樂氏門于師之梁縣門發獲九人焉涉于汜而歸而後葬許靈公許氏曰嗟乎許男之愎也以中國諸侯而死于夷狄死非其所矣師氏曰陳蔡從夷狄以伐中國罪孰大焉書其爵以與楚並姑齒之于楚云耳髙氏曰子産之言所謂不爭之德怨之所以平兵之所以弭也家氏曰伐鄭師還乃葬許靈公楚之求諸侯亦勤矣春秋書許男卒楚伐鄭葬許靈公以警晉也春秋闕疑卷三十二
